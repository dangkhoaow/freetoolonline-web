<style>
    .w3-white {
        color: #000!important;
        background-color: #fff!important;
    }

    .w3-black {
        color: #fff!important;
        background-color: #202124!important
    }


</style>
<div class="w3-modal" id="donate-confirm" style="display: block">
    <div class="w3-modal-content" style="padding: 10px; padding-top: 40px">
        <div class='w3-container'>
            <div class="w3-display-topleft" style="left: 10px;top: 10px;color: #0066b3;">Donate Us</div>
            <div class='w3-row'>
                <p>Looks like you have a good experience at this Tool? The server cost is enormous for delivering to you the best experience. So, could you possibly support for developing by donate to Us with PayPal?</p>
            </div>
            <br/>
            <div class="w3-row w3-right-align">
                <button class="w3-btn w3-black buy-me-a-coffee-btn" style="margin-left: 10px; margin-top: 10px;" onclick="window.open($('#buyMeACoffeeBtnID').attr('href'), '_blank');document.getElementById('donate-confirm').style.display='none';localStorage[pageName + '-downloaded'] = true">Donate via Buy Me A Coffee</button>
                <button class="w3-btn w3-black" style="margin-left: 10px; margin-top: 10px;" onclick="$('#donateBtnID').click();document.getElementById('donate-confirm').style.display='none';localStorage[pageName + '-downloaded'] = true">Donate via PayPal</button>
                <button class="w3-btn w3-white w3-border" style="margin-left: 10px; margin-top: 10px;" onclick="document.getElementById('donate-confirm').style.display='none';sessionStorage[pageName + '-downloaded'] = true">No thanks</button>
            </div>
        </div>
    </div>
</div>
<script>
function sendDonateDlgEv() {
	try {
		ga('send', {
			hitType: 'event',
			eventCategory: 'CVR',
			eventAction: minifyPageName(pageName) + 'dnt dlg opened',
			eventLabel: pageName
		});
	} catch (e) {}
};

function appendDonateBannerAd() {
	try {
		if ((typeof getParamValue === 'function' && getParamValue('noads') != null) || (typeof getCookie === 'function' && getCookie('disableAd') !== '' && getCookie('disableAd') !== 'false')) {
			return;
		}
		if ($('#donate-confirm .donate-banner-ad-slot').length > 0) {
			return;
		}
		$.ajax({
			context: this,
			dataType: "html",
			url: "view/top-page-banner-ad.html?v=" + APP_VERSION,
			success: function(result) {
				try {
					if ($('#donate-confirm .donate-banner-ad-slot').length > 0) {
						return;
					}
					var $adContainer = $('<div class="donate-banner-ad-slot" style="margin-top: 12px;"></div>');
					$('#donate-confirm .w3-modal-content').append($adContainer);
					$adContainer.append(result);
					var pushAd = function() {
						try {
							(adsbygoogle = window.adsbygoogle || []).push({});
						} catch (e) {}
					};
					if (document.querySelector('script[src*="pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"]')) {
						pushAd();
					} else if (typeof loadScript === 'function') {
						loadScript('https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js', pushAd);
					} else {
						pushAd();
					}
				} catch (e) {}
			}
		});
	} catch (e) {}
}

window.__appendDonateBannerAd = appendDonateBannerAd;
sendDonateDlgEv();
appendDonateBannerAd();
</script>
