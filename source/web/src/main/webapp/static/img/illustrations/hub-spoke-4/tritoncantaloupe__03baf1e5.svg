<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">Triton cantaloupe figures</title>
  <desc id="d">Four panels: diameter, cavi size, Voyager flyby, discovery</desc>
  <rect width="640" height="360" fill="#FFFFFF"/>
  <rect x="16" y="16" width="140" height="140" rx="12" fill="#3C3C3E"/>
  <text x="86" y="90" text-anchor="middle" fill="#FFFFFF" font-size="18" font-family="sans-serif">~2700 km</text>
  <text x="86" y="118" text-anchor="middle" fill="#5B73AE" font-size="12" font-family="sans-serif">Triton</text>
  <rect x="172" y="16" width="140" height="140" rx="12" fill="#3C3C3E"/>
  <text x="242" y="90" text-anchor="middle" fill="#FFFFFF" font-size="18" font-family="sans-serif">~30-40 km</text>
  <text x="242" y="118" text-anchor="middle" fill="#FF4D00" font-size="12" font-family="sans-serif">Cavi</text>
  <rect x="328" y="16" width="140" height="140" rx="12" fill="#3C3C3E"/>
  <text x="398" y="90" text-anchor="middle" fill="#FFFFFF" font-size="18" font-family="sans-serif">1989</text>
  <text x="398" y="118" text-anchor="middle" fill="#5B73AE" font-size="12" font-family="sans-serif">Voyager 2</text>
  <rect x="484" y="16" width="140" height="140" rx="12" fill="#3C3C3E"/>
  <text x="554" y="90" text-anchor="middle" fill="#FFFFFF" font-size="18" font-family="sans-serif">1846</text>
  <text x="554" y="118" text-anchor="middle" fill="#FF4D00" font-size="12" font-family="sans-serif">Discovered</text>
  <text x="320" y="220" text-anchor="middle" fill="#3C3C3E" font-size="20" font-family="sans-serif">Triton cantaloupe terrain - published sizes</text>
  <text x="320" y="250" text-anchor="middle" fill="#5B73AE" font-size="14" font-family="sans-serif">NASA Science + Voyager 2 / terrain literature</text>
</svg>
