  <text x="248" y="115" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="248" dy="0">Stimmen Sie die Frage mit dem</tspan></text>
  <rect x="196" y="147" width="432" height="46" rx="10" fill="#3C3C3E" aria-hidden="true"/>
