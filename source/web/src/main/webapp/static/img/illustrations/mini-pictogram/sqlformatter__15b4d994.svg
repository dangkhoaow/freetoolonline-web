<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-sqlformatter-title svg-minipictogram-sqlformatter-desc">
  <title id="svg-minipictogram-sqlformatter-title">SQL Formatter</title>
