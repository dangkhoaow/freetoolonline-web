<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-cardrow4-454b64-title svg-cardrow4-454b64-desc">
  <title id="svg-cardrow4-454b64-title">Four ZIP myths that will not hit your size cap</title>
  <desc id="svg-cardrow4-454b64-desc">Double-zipping, higher compression level, 7z format, and password encryption all fail</desc>
  <style>
    :root{--p:#7DAFA3;--card:#F0F0F2;--ink:#3C3C3E;--onfill:#FFFFFF}
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .p{fill:var(--p)}.card{fill:var(--card);stroke:var(--ink);stroke-width:1}
    .ink{fill:var(--ink)}.onfill{fill:var(--onfill)}
    @media (prefers-color-scheme: dark){.card{stroke:var(--onfill)}}
  </style>
  <rect class="card" x="10" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="80" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="80" y="69" text-anchor="middle" font-size="24" font-weight="600">X</text>
  <text class="ink" x="80" y="116" text-anchor="middle" font-size="14" font-weight="600">Zip it twice</text>
  <text class="ink" x="80" y="138" text-anchor="middle" font-size="13">zero shrink</text>
  <rect class="card" x="170" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="240" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="240" y="69" text-anchor="middle" font-size="24" font-weight="600">X</text>
  <text class="ink" x="240" y="116" text-anchor="middle" font-size="14" font-weight="600">Higher level</text>
  <text class="ink" x="240" y="138" text-anchor="middle" font-size="13">only 1-5% gain</text>
  <rect class="card" x="330" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="400" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="400" y="69" text-anchor="middle" font-size="24" font-weight="600">X</text>
  <text class="ink" x="400" y="116" text-anchor="middle" font-size="14" font-weight="600">7z format</text>
  <text class="ink" x="400" y="138" text-anchor="middle" font-size="13">same limits</text>
  <rect class="card" x="490" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="560" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="560" y="69" text-anchor="middle" font-size="24" font-weight="600">X</text>
  <text class="ink" x="560" y="116" text-anchor="middle" font-size="14" font-weight="600">Password ZIP</text>
  <text class="ink" x="560" y="138" text-anchor="middle" font-size="13">same file size</text>
</svg>
