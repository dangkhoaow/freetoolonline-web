  <title id="svg-hubspoke4-92dfa5-title">How to pick FPS for GIF extraction</title>
  <desc id="svg-hubspoke4-92dfa5-desc">Set FPS 1 for a single social-post frame, match native FPS for key-frames, use high FPS for slow-motion stills, and set FPS 1-2 for a storyboard.</desc>
