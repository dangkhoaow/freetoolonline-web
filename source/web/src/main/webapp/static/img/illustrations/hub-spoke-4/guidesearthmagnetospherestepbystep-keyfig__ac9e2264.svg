<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-hubspoke4-ec8a19-title svg-hubspoke4-ec8a19-desc">
  <title id="svg-hubspoke4-ec8a19-title">Earth magnetosphere key figures</title>
  <desc id="svg-hubspoke4-ec8a19-desc">Earth magnetosphere key figures: surface field about 25 to 65 microtesla, dipole tilt about 11 degrees, magnetopause about 10 Earth radii when quiet and about 6 when compressed.</desc>
  <line x1="320" y1="180" x2="209" y2="39" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="448" y2="48" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="184" y2="312" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="440" y2="322" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <rect x="16" y="16" width="193" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="39" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="50" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Surface ~25-65 uT</tspan></text>
  <rect x="448" y="16" width="176" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="468" cy="48" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="482" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="482" dy="0">Dipole tilt ~11</tspan><tspan x="482" dy="19">deg</tspan></text>
  <rect x="16" y="280" width="168" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="312" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="50" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Quiet standoff</tspan><tspan x="50" dy="19">~10 Re</tspan></text>
  <rect x="440" y="299" width="184" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="460" cy="322" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="474" y="327" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="474" dy="0">Compressed ~6 Re</tspan></text>
  <rect x="244" y="153" width="152" height="54" rx="27" fill="#1C1C1E" stroke="#5B73AE" stroke-width="3" aria-hidden="true"/>
  <text x="320" y="186" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" font-weight="600" fill="#FFFFFF"><tspan x="320" dy="0">Earth field</tspan></text>
</svg>
