<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-numberedbars4-d7c3f3-title svg-numberedbars4-d7c3f3-desc">
  <title id="svg-numberedbars4-d7c3f3-title">Pick a Color Online - 4 Steps</title>
  <desc id="svg-numberedbars4-d7c3f3-desc">Four steps to pick a color using the free online color picker.</desc>
  <rect x="16" y="100" width="150" height="80" rx="40" fill="#1C1C1E" stroke="#5B73AE" stroke-width="3" aria-hidden="true"/>
  <text x="91" y="135" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="600" fill="#FFFFFF"><tspan x="91" dy="0">Pick a Color</tspan><tspan x="91" dy="20">Online</tspan></text>
  <rect x="196" y="27" width="432" height="46" rx="10" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="222" cy="50" r="15" fill="#1C1C1E" stroke="#5B73AE" stroke-width="2.5" aria-hidden="true"/>
  <text x="222" y="55" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">1</text>
  <text x="248" y="47" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="248" dy="0">Open the tool, click a shade in the color</tspan><tspan x="248" dy="17">box</tspan></text>
  <rect x="196" y="87" width="432" height="46" rx="10" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="222" cy="110" r="15" fill="#1C1C1E" stroke="#5B73AE" stroke-width="2.5" aria-hidden="true"/>
  <text x="222" y="115" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">2</text>
  <text x="248" y="115" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="248" dy="0">Copy HEX, RGB, or HSL to your clipboard</tspan></text>
  <rect x="196" y="147" width="432" height="46" rx="10" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="222" cy="170" r="15" fill="#1C1C1E" stroke="#5B73AE" stroke-width="2.5" aria-hidden="true"/>
  <text x="222" y="175" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">3</text>
  <text x="248" y="175" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="248" dy="0">Click a complementary or analogous swatch</tspan></text>
  <rect x="196" y="207" width="432" height="46" rx="10" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="222" cy="230" r="15" fill="#1C1C1E" stroke="#5B73AE" stroke-width="2.5" aria-hidden="true"/>
  <text x="222" y="235" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">4</text>
  <text x="248" y="235" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="248" dy="0">Save reused colors to your favorites</tspan></text>
</svg>
