<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-comparisoncardpair-558843-title svg-comparisoncardpair-558843-desc">
  <title id="svg-comparisoncardpair-558843-title">Saturn Rings 3D vs app planetarium</title>
  <desc id="svg-comparisoncardpair-558843-desc">Saturn Rings 3D tren trinh duyet: 0 MB, mien phi, tai vai giay. App planetarium: 50-500 MB, den 30+ USD.</desc>
  <rect x="20" y="20" width="280" height="200" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="160" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">Saturn Rings 3D</text>
  <text x="160" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">0 MB, tren trinh duyet</text>
  <text x="160" y="150" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Mien phi, tai vai giay</text>
  <text x="320" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#3C3C3E" aria-hidden="true">vs</text>
  <rect x="340" y="20" width="280" height="200" rx="8" fill="#3C3C3E" aria-hidden="true"/>
  <text x="480" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">App planetarium</text>
  <text x="480" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">50-500 MB</text>
  <text x="480" y="150" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Cai dat, den 30+ USD</text>
</svg>
