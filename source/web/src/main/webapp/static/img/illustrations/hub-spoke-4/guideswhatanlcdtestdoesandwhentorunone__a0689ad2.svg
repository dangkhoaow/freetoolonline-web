<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-hubspoke4-bf8c04-title svg-hubspoke4-bf8c04-desc">
  <title id="svg-hubspoke4-bf8c04-title">When running an LCD test is the right move</title>
  <desc id="svg-hubspoke4-bf8c04-desc">Four situations where an LCD test is worth running: before a return window closes, before accepting a refurbished screen, before a trade-in, or when you spot an unexplained dot.</desc>
  <line x1="320" y1="180" x2="175" y2="48" stroke="#D9C7A3" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="465" y2="48" stroke="#D9C7A3" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="209" y2="322" stroke="#D9C7A3" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="448" y2="312" stroke="#D9C7A3" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <rect x="16" y="16" width="159" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="48" r="8" fill="#D9C7A3" aria-hidden="true"/>
  <text x="50" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Before return</tspan><tspan x="50" dy="19">window</tspan></text>
  <rect x="465" y="16" width="159" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="485" cy="48" r="8" fill="#D9C7A3" aria-hidden="true"/>
  <text x="499" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="499" dy="0">Before refurb</tspan><tspan x="499" dy="19">purchase</tspan></text>
  <rect x="16" y="299" width="193" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="322" r="8" fill="#D9C7A3" aria-hidden="true"/>
  <text x="50" y="327" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Before a trade-in</tspan></text>
  <rect x="448" y="280" width="176" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="468" cy="312" r="8" fill="#D9C7A3" aria-hidden="true"/>
  <text x="482" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="482" dy="0">When you spot a</tspan><tspan x="482" dy="19">dot</tspan></text>
  <rect x="239" y="153" width="162" height="54" rx="27" fill="#1C1C1E" stroke="#D9C7A3" stroke-width="3" aria-hidden="true"/>
  <text x="320" y="186" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" font-weight="600" fill="#FFFFFF"><tspan x="320" dy="0">Run LCD Test</tspan></text>
</svg>
