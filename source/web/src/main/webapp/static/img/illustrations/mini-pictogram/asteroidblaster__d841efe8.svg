<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-a1c3d4-title svg-minipictogram-a1c3d4-desc">
  <title id="svg-minipictogram-a1c3d4-title">Blast drifting rocks in space</title>
  <desc id="svg-minipictogram-a1c3d4-desc">Rotate, thrust, and blast drifting rocks before they hit your ship. No install, loads in your tab.</desc>
