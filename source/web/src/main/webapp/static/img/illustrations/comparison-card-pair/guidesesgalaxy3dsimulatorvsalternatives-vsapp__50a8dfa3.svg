<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-comparisoncardpair-ef4ccf-title svg-comparisoncardpair-ef4ccf-desc">
  <title id="svg-comparisoncardpair-ef4ccf-title">Galaxy 3D Simulator vs una app instalada</title>
  <desc id="svg-comparisoncardpair-ef4ccf-desc">Galaxy 3D Simulator frente a una app de escritorio instalada tipica</desc>
  <rect x="20" y="20" width="280" height="200" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="160" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">Galaxy 3D Sim</text>
  <text x="160" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">0 MB instalado</text>
  <text x="160" y="150" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Gratis, pocos segundos</text>
  <text x="320" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#3C3C3E" aria-hidden="true">vs</text>
  <rect x="340" y="20" width="280" height="200" rx="8" fill="#3C3C3E" aria-hidden="true"/>
  <text x="480" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">App instalada</text>
  <text x="480" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Decenas-cientos de MB</text>
  <text x="480" y="150" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Minutos para configurar</text>
</svg>
