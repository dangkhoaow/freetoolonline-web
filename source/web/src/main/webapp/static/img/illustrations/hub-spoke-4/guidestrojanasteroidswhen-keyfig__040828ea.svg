  <circle cx="36" cy="322" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="50" y="327" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">1:1 res, ~5.2 AU</tspan></text>
