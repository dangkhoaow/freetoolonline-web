  <title id="svg-hubspoke4-be2538-title">Jupiter Trojans key figures</title>
  <desc id="svg-hubspoke4-be2538-desc">Jupiter Trojans key figures: L4 (ahead) has about 9,700 known and L5 (behind) about 5,600; both sit in Jupiter 1:1 resonance near 5.2 AU, stable as the Sun-Jupiter mass ratio ~1047 tops 24.96.</desc>
