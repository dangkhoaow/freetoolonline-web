<svg viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-numberedsteprow-3c7801-title svg-numberedsteprow-3c7801-desc">
  <title id="svg-numberedsteprow-3c7801-title">Remove a known ZIP password in three steps</title>
  <desc id="svg-numberedsteprow-3c7801-desc">Upload the protected archive, enter the password you already know, then download an unlocked copy.</desc>
  <path d="M 114 74 L 276 74 M 266 66 L 276 74 L 266 82" stroke="#7DAFA3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" aria-hidden="true"/>
  <path d="M 364 74 L 526 74 M 516 66 L 526 74 L 516 82" stroke="#7DAFA3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" aria-hidden="true"/>
  <circle cx="70" cy="74" r="38" fill="#1C1C1E" stroke="#7DAFA3" stroke-width="3" aria-hidden="true"/>
  <text x="70" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="34" font-weight="600" fill="#FFFFFF" aria-hidden="true">1</text>
  <text x="70" y="134" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="500" fill="#1C1C1E"><tspan x="70" dy="0">Upload zip</tspan></text>
  <circle cx="320" cy="74" r="38" fill="#1C1C1E" stroke="#7DAFA3" stroke-width="3" aria-hidden="true"/>
  <text x="320" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="34" font-weight="600" fill="#FFFFFF" aria-hidden="true">2</text>
  <text x="320" y="134" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="500" fill="#1C1C1E"><tspan x="320" dy="0">Enter password</tspan></text>
  <circle cx="570" cy="74" r="38" fill="#1C1C1E" stroke="#7DAFA3" stroke-width="3" aria-hidden="true"/>
  <text x="570" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="34" font-weight="600" fill="#FFFFFF" aria-hidden="true">3</text>
  <text x="570" y="134" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="500" fill="#1C1C1E"><tspan x="570" dy="0">Download copy</tspan></text>
