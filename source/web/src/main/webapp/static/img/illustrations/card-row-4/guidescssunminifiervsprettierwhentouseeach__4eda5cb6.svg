<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-cardrow4-b5ce3b-title svg-cardrow4-b5ce3b-desc">
  <title id="svg-cardrow4-b5ce3b-title">What CSS Unminifier restores</title>
  <desc id="svg-cardrow4-b5ce3b-desc">Four things a CSS unminifier puts back for reading</desc>
  <rect x="8" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="83" cy="46" r="20" fill="#1C1C1E" stroke="#B3C5B0" stroke-width="3" aria-hidden="true"/>
  <text x="83" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">W</text>
  <text x="83" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="83" dy="0">Restore</tspan><tspan x="83" dy="16">whitespace</tspan></text>
  <text x="83" y="122" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="83" dy="0">between rules</tspan></text>
  <rect x="166" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="241" cy="46" r="20" fill="#1C1C1E" stroke="#B3C5B0" stroke-width="3" aria-hidden="true"/>
  <text x="241" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">L</text>
  <text x="241" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="241" dy="0">One prop per</tspan><tspan x="241" dy="16">line</tspan></text>
  <text x="241" y="122" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="241" dy="0">each declaration</tspan></text>
  <rect x="324" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="399" cy="46" r="20" fill="#1C1C1E" stroke="#B3C5B0" stroke-width="3" aria-hidden="true"/>
  <text x="399" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">I</text>
  <text x="399" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="399" dy="0">Indent blocks</tspan></text>
  <text x="399" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="399" dy="0">under selectors</tspan></text>
  <rect x="482" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="557" cy="46" r="20" fill="#1C1C1E" stroke="#B3C5B0" stroke-width="3" aria-hidden="true"/>
  <text x="557" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">C</text>
  <text x="557" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="557" dy="0">Comments usually</tspan><tspan x="557" dy="16">gone</tspan></text>
  <text x="557" y="122" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="557" dy="0">minifiers strip</tspan><tspan x="557" dy="15">them</tspan></text>
