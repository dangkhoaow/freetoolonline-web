<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-pixelspikerun-title svg-minipictogram-pixelspikerun-desc">
  <title id="svg-minipictogram-pixelspikerun-title">Jump spikes in a pixel runner</title>
  <desc id="svg-minipictogram-pixelspikerun-desc">Endless runner: tap, click, or Space to jump over spikes; hold for higher jumps.</desc>
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="#1C1C1E" aria-hidden="true"/>
  <line x1="10" y1="46" x2="50" y2="46" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <polygon points="30,46 35,35 40,46 45,35 50,46" fill="#FF4D00"/>
  <rect x="15" y="16" width="10" height="10" fill="#FFFFFF"/>
  <rect x="21" y="19" width="2.5" height="2.5" fill="#1C1C1E"/>
  <line x1="10" y1="19" x2="13" y2="19" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="10" y1="24" x2="13" y2="24" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <text x="32" y="57" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="7" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">RUN</text>
</svg>
