  <text x="241" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="241" dy="0">ss or mm:ss</tspan></text>
  <text x="241" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="241" dy="0">both work</tspan></text>
  <rect x="324" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
