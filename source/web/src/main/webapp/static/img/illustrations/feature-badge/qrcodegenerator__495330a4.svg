<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-f4a061-title svg-featurebadge-f4a061-desc">
  <title id="svg-featurebadge-f4a061-title">Turn text or a URL into a scannable QR code and download the PNG</title>
  <desc id="svg-featurebadge-f4a061-desc">Type text or a URL and a scannable QR code renders live in your browser; set colors, size, and a center logo, then download it as a PNG or copy it.</desc>
  <rect x="2" y="2" width="196" height="44" rx="22" ry="22" fill="#D9C7A3" aria-hidden="true"/>
  <text x="100" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1C1C1E">Make a QR code</text>
</svg>
