<svg viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-numberedbars4-5ad74a-title svg-numberedbars4-5ad74a-desc">
  <title id="svg-numberedbars4-5ad74a-title">Empat uji tukar untuk mengisolasi tombol hilang</title>
  <desc id="svg-numberedbars4-5ad74a-desc">Empat uji tukar mengisolasi penyebab tombol hilang: situs lain, browser lain, akun lain, atau perangkat lain.</desc>
