<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-cardrow4-e86e27-title svg-cardrow4-e86e27-desc">
  <title id="svg-cardrow4-e86e27-title">Popular tools on FreeToolOnline</title>
  <desc id="svg-cardrow4-e86e27-desc">Four of the most-used free browser tools</desc>
  <style>
    :root{--p:#5B73AE;--card:#F0F0F2;--ink:#3C3C3E;--onfill:#FFFFFF}
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .p{fill:var(--p)}.card{fill:var(--card);stroke:var(--ink);stroke-width:1}
    .ink{fill:var(--ink)}.onfill{fill:var(--onfill)}
    @media (prefers-color-scheme: dark){.card{stroke:var(--onfill)}}
  </style>
  <rect class="card" x="10" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="80" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="80" y="69" text-anchor="middle" font-size="24" font-weight="600">Z</text>
  <text class="ink" x="80" y="116" text-anchor="middle" font-size="14" font-weight="600">ZIP compress</text>
  <text class="ink" x="80" y="138" text-anchor="middle" font-size="13">files and folders</text>
  <rect class="card" x="170" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="240" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="240" y="69" text-anchor="middle" font-size="24" font-weight="600">H</text>
  <text class="ink" x="240" y="116" text-anchor="middle" font-size="14" font-weight="600">HEIC to JPG</text>
  <text class="ink" x="240" y="138" text-anchor="middle" font-size="13">iPhone photos</text>
  <rect class="card" x="330" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="400" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="400" y="69" text-anchor="middle" font-size="24" font-weight="600">L</text>
  <text class="ink" x="400" y="116" text-anchor="middle" font-size="14" font-weight="600">LCD dead-pixel</text>
  <text class="ink" x="400" y="138" text-anchor="middle" font-size="13">screen test</text>
  <rect class="card" x="490" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="560" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="560" y="69" text-anchor="middle" font-size="24" font-weight="600">C</text>
  <text class="ink" x="560" y="116" text-anchor="middle" font-size="14" font-weight="600">Camera test</text>
  <text class="ink" x="560" y="138" text-anchor="middle" font-size="13">webcam check</text>
