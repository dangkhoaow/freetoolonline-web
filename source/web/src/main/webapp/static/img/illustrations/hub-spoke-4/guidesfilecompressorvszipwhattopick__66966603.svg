<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-hubspoke4-281b41-title svg-hubspoke4-281b41-desc">
  <title id="svg-hubspoke4-281b41-title">Four file types ZIP does not compress</title>
  <desc id="svg-hubspoke4-281b41-desc">Images, audio, video, and Office files are already compressed by their own codec - adding a ZIP wrapper saves almost nothing.</desc>
  <line x1="320" y1="180" x2="200" y2="39" stroke="#7DAFA3" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="448" y2="39" stroke="#7DAFA3" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="192" y2="322" stroke="#7DAFA3" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="465" y2="312" stroke="#7DAFA3" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <rect x="16" y="16" width="184" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="39" r="8" fill="#7DAFA3" aria-hidden="true"/>
  <text x="50" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Images: JPG, PNG</tspan></text>
  <rect x="448" y="16" width="176" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="468" cy="39" r="8" fill="#7DAFA3" aria-hidden="true"/>
  <text x="482" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="482" dy="0">Audio: MP3, AAC</tspan></text>
  <rect x="16" y="299" width="176" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="322" r="8" fill="#7DAFA3" aria-hidden="true"/>
  <text x="50" y="327" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Video: MP4, MOV</tspan></text>
  <rect x="465" y="280" width="159" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="485" cy="312" r="8" fill="#7DAFA3" aria-hidden="true"/>
  <text x="499" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="499" dy="0">Office: DOCX,</tspan><tspan x="499" dy="19">XLSX</tspan></text>
  <rect x="229" y="153" width="183" height="54" rx="27" fill="#1C1C1E" stroke="#7DAFA3" stroke-width="3" aria-hidden="true"/>
  <text x="320" y="186" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" font-weight="600" fill="#FFFFFF"><tspan x="320" dy="0">ZIP wontt help</tspan></text>
</svg>
