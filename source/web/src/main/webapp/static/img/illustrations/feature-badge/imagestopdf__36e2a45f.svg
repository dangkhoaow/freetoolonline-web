<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-imagestopdf-title svg-featurebadge-imagestopdf-desc">
  <title id="svg-featurebadge-imagestopdf-title">Multi-page PDF from your photos</title>
  <desc id="svg-featurebadge-imagestopdf-desc">Combine JPG, PNG, or WebP images into one multi-page PDF; each image becomes one page.</desc>
  <rect x="2" y="2" width="196" height="44" rx="22" ry="22" fill="#B3C5B0" aria-hidden="true"/>
  <text x="100" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1C1C1E">Multi-page PDF</text>
</svg>
