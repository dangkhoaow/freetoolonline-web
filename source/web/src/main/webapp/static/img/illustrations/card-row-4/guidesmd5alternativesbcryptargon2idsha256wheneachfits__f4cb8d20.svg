<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-cardrow4-dd5522-title svg-cardrow4-dd5522-desc">
  <title id="svg-cardrow4-dd5522-title">When to use MD5, SHA-256, Argon2id, or bcrypt - four use cases</title>
  <desc id="svg-cardrow4-dd5522-desc">Four use cases mapped to the right hashing algorithm - pick Argon2id, bcrypt, SHA-256, or keep MD5 by job type</desc>
  <style>
    :root{--p:#5B73AE;--card:#F0F0F2;--ink:#3C3C3E;--onfill:#FFFFFF}
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .p{fill:var(--p)}.card{fill:var(--card);stroke:var(--ink);stroke-width:1}
    .ink{fill:var(--ink)}.onfill{fill:var(--onfill)}
    @media (prefers-color-scheme: dark){.card{stroke:var(--onfill)}}
  </style>
  <rect class="card" x="10" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="80" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="80" y="69" text-anchor="middle" font-size="24" font-weight="600">1</text>
  <text class="ink" x="80" y="116" text-anchor="middle" font-size="14" font-weight="600">User passwords</text>
  <text class="ink" x="80" y="138" text-anchor="middle" font-size="13">use Argon2id</text>
  <rect class="card" x="170" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="240" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="240" y="69" text-anchor="middle" font-size="24" font-weight="600">2</text>
  <text class="ink" x="240" y="116" text-anchor="middle" font-size="14" font-weight="600">Legacy MD5 DB</text>
  <text class="ink" x="240" y="138" text-anchor="middle" font-size="13">migrate now</text>
  <rect class="card" x="330" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="400" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="400" y="69" text-anchor="middle" font-size="24" font-weight="600">3</text>
  <text class="ink" x="400" y="116" text-anchor="middle" font-size="14" font-weight="600">Adversarial</text>
  <text class="ink" x="400" y="138" text-anchor="middle" font-size="13">use SHA-256</text>
  <rect class="card" x="490" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="560" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="560" y="69" text-anchor="middle" font-size="24" font-weight="600">4</text>
  <text class="ink" x="560" y="116" text-anchor="middle" font-size="14" font-weight="600">Accidental</text>
  <text class="ink" x="560" y="138" text-anchor="middle" font-size="13">MD5 or SHA-256</text>
</svg>
