<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-e8d2315b-title svg-minipictogram-e8d2315b-desc">
  <title id="svg-minipictogram-e8d2315b-title">View an Apatosaurus in 3D</title>
