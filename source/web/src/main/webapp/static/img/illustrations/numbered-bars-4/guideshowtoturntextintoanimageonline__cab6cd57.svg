<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-numberedbars4-6a8bef-title svg-numberedbars4-6a8bef-desc">
  <title id="svg-numberedbars4-6a8bef-title">Four steps to turn text into an image online</title>
  <desc id="svg-numberedbars4-6a8bef-desc">Step-by-step workflow for converting typed text to a PNG image</desc>
  <rect x="16" y="100" width="150" height="80" rx="40" fill="#1C1C1E" stroke="#E8C5C9" stroke-width="3" aria-hidden="true"/>
  <text x="91" y="145" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="600" fill="#FFFFFF"><tspan x="91" dy="0">Text to image</tspan></text>
  <rect x="196" y="27" width="432" height="46" rx="10" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="222" cy="50" r="15" fill="#1C1C1E" stroke="#E8C5C9" stroke-width="2.5" aria-hidden="true"/>
  <text x="222" y="55" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">1</text>
  <text x="248" y="55" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="248" dy="0">Type or paste your text into the box</tspan></text>
  <rect x="196" y="87" width="432" height="46" rx="10" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="222" cy="110" r="15" fill="#1C1C1E" stroke="#E8C5C9" stroke-width="2.5" aria-hidden="true"/>
  <text x="222" y="115" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">2</text>
  <text x="248" y="115" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="248" dy="0">Pick font family, size, and weight</tspan></text>
  <rect x="196" y="147" width="432" height="46" rx="10" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="222" cy="170" r="15" fill="#1C1C1E" stroke="#E8C5C9" stroke-width="2.5" aria-hidden="true"/>
  <text x="222" y="175" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">3</text>
  <text x="248" y="175" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="248" dy="0">Set text color and background color</tspan></text>
  <rect x="196" y="207" width="432" height="46" rx="10" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="222" cy="230" r="15" fill="#1C1C1E" stroke="#E8C5C9" stroke-width="2.5" aria-hidden="true"/>
  <text x="222" y="235" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">4</text>
  <text x="248" y="235" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="248" dy="0">Add optional drop shadow with offset</tspan></text>
</svg>
