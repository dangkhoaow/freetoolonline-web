  <circle cx="70" cy="74" r="38" fill="#1C1C1E" stroke="#7DAFA3" stroke-width="3" aria-hidden="true"/>
  <text x="70" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="34" font-weight="600" fill="#FFFFFF" aria-hidden="true">1</text>
  <text x="70" y="134" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="500" fill="#1C1C1E"><tspan x="70" dy="0">Check inputs</tspan></text>
  <circle cx="320" cy="74" r="38" fill="#1C1C1E" stroke="#7DAFA3" stroke-width="3" aria-hidden="true"/>
  <text x="320" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="34" font-weight="600" fill="#FFFFFF" aria-hidden="true">2</text>
  <text x="320" y="134" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="500" fill="#1C1C1E"><tspan x="320" dy="0">Zip in browser</tspan></text>
