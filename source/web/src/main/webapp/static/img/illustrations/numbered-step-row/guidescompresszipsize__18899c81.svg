  <title id="svg-numberedsteprow-d079b5-title">Three steps to gauge how much a ZIP will shrink</title>
  <desc id="svg-numberedsteprow-d079b5-desc">Check what kind of files you have, build the .zip in your browser, then read the resulting size cut - text shrinks 60 to 80 percent, media barely at all.</desc>
