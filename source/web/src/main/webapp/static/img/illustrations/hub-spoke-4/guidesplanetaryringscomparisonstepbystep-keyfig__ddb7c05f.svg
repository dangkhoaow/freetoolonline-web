<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-hubspoke4-dc04bc-title svg-hubspoke4-dc04bc-desc">
  <title id="svg-hubspoke4-dc04bc-title">Planetary rings key figures</title>
  <desc id="svg-hubspoke4-dc04bc-desc">Planetary rings key figures: Saturn has about 7 major ice rings, Uranus about 13 narrow dark rings, Neptune about 5 rings with arcs, and Jupiter a faint dusty ring.</desc>
  <line x1="320" y1="180" x2="200" y2="39" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="431" y2="39" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="175" y2="312" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="456" y2="312" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <rect x="16" y="16" width="184" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="39" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="50" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Saturn: ~7 rings</tspan></text>
  <rect x="431" y="16" width="193" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="451" cy="39" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="465" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="465" dy="0">Uranus: ~13 rings</tspan></text>
  <rect x="16" y="280" width="159" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="312" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="50" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Neptune: ~5 +</tspan><tspan x="50" dy="19">arcs</tspan></text>
  <rect x="456" y="280" width="168" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="476" cy="312" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="490" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="490" dy="0">Jupiter: faint</tspan><tspan x="490" dy="19">ring</tspan></text>
  <rect x="254" y="142" width="132" height="76" rx="38" fill="#1C1C1E" stroke="#5B73AE" stroke-width="3" aria-hidden="true"/>
  <text x="320" y="175" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" font-weight="600" fill="#FFFFFF"><tspan x="320" dy="0">Planetary</tspan><tspan x="320" dy="22">rings</tspan></text>
</svg>
