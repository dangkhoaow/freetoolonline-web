<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-2048game-title svg-minipictogram-2048game-desc">
  <title id="svg-minipictogram-2048game-title">Merge numbered tiles to reach 2048</title>
  <desc id="svg-minipictogram-2048game-desc">Slide tiles with arrow keys, WASD, or a swipe. Equal tiles merge into their sum on every move.</desc>
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="#3C3C3E" aria-hidden="true"/>
  <rect x="14" y="13" width="16" height="16" rx="4" fill="#F0F0F2"/>
  <rect x="34" y="13" width="16" height="16" rx="4" fill="#F0F0F2"/>
  <rect x="14" y="33" width="16" height="16" rx="4" fill="#F0F0F2"/>
  <rect x="34" y="33" width="16" height="16" rx="4" fill="#FF4D00"/>
  <text x="32" y="57" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="7" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">2048</text>
</svg>
