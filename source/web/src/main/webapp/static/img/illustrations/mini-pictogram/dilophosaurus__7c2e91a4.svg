<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-7c2e91a4-title svg-minipictogram-7c2e91a4-desc">
  <title id="svg-minipictogram-7c2e91a4-title">View a Dilophosaurus in 3D</title>
  <desc id="svg-minipictogram-7c2e91a4-desc">Rotate the twin-crested Early Jurassic predator model, size it against a person, and read real fossil figures.</desc>
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="#5B6B5E" aria-hidden="true"/>
  <text x="32" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">DILO</text>
  <text x="32" y="48" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" letter-spacing="0.5" fill="#FFFFFF">3D</text>
</svg>
