  <text x="50" y="327" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">140-133 Mya</tspan></text>
  <rect x="440" y="280" width="184" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
