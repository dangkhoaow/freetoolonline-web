  <line x1="320" y1="180" x2="440" y2="312" stroke="#B3C5B0" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <rect x="16" y="16" width="150" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="39" r="8" fill="#B3C5B0" aria-hidden="true"/>
