<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-cardrow4-a245cf-title svg-cardrow4-a245cf-desc">
  <title id="svg-cardrow4-a245cf-title">Four iPhone photo formats and when iOS uses each</title>
  <desc id="svg-cardrow4-a245cf-desc">HEIC, JPG, PNG, and ProRAW - when iOS picks each format automatically</desc>
  <style>
    :root{--p:#E8C5C9;--card:#F0F0F2;--ink:#3C3C3E;--onfill:#FFFFFF}
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .p{fill:var(--p)}.card{fill:var(--card);stroke:var(--ink);stroke-width:1}
    .ink{fill:var(--ink)}.onfill{fill:var(--onfill)}
    @media (prefers-color-scheme: dark){.card{stroke:var(--onfill)}}
  </style>
  <rect class="card" x="10" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="80" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="80" y="69" text-anchor="middle" font-size="24" font-weight="600">H</text>
  <text class="ink" x="80" y="116" text-anchor="middle" font-size="14" font-weight="600">HEIC</text>
  <text class="ink" x="80" y="138" text-anchor="middle" font-size="13">Default iOS 11+</text>
  <rect class="card" x="170" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="240" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="240" y="69" text-anchor="middle" font-size="24" font-weight="600">J</text>
  <text class="ink" x="240" y="116" text-anchor="middle" font-size="14" font-weight="600">JPG</text>
  <text class="ink" x="240" y="138" text-anchor="middle" font-size="13">Universal fallback</text>
  <rect class="card" x="330" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="400" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="400" y="69" text-anchor="middle" font-size="24" font-weight="600">P</text>
  <text class="ink" x="400" y="116" text-anchor="middle" font-size="14" font-weight="600">PNG</text>
  <text class="ink" x="400" y="138" text-anchor="middle" font-size="13">Screenshots</text>
  <rect class="card" x="490" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="560" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="560" y="69" text-anchor="middle" font-size="24" font-weight="600">R</text>
  <text class="ink" x="560" y="116" text-anchor="middle" font-size="14" font-weight="600">ProRAW</text>
  <text class="ink" x="560" y="138" text-anchor="middle" font-size="13">Pro models only</text>
</svg>
