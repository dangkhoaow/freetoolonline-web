  <title id="svg-hubspoke4-c25241-title">Habitable zone key figures</title>
  <desc id="svg-hubspoke4-c25241-desc">Habitable zone key figures: the Sun conservative zone spans 0.95 to 1.37 AU, Earth at 1 AU, Venus about 0.72 AU, Mars about 1.52 AU.</desc>
