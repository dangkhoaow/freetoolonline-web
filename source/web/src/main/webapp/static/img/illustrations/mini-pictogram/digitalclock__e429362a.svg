<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-f7b702-title svg-minipictogram-f7b702-desc">
  <title id="svg-minipictogram-f7b702-title">Show a large live digital clock</title>
  <desc id="svg-minipictogram-f7b702-desc">Large HH:MM:SS digital readout with today date, right in your browser. No install, no account.</desc>
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="#5B73AE" aria-hidden="true"/>
  <text x="32" y="36" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">CLK</text>
  <text x="32" y="51" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="600" letter-spacing="0.5" fill="#FFFFFF">DIGI</text>
</svg>
