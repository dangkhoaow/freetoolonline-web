<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-hubspoke4-b6adae-title svg-hubspoke4-b6adae-desc">
  <title id="svg-hubspoke4-b6adae-title">Fix 1: install HEIF Image Extensions on Windows</title>
  <desc id="svg-hubspoke4-b6adae-desc">Four steps to install HEIF Image Extensions on Windows 10 or 11: open the Microsoft Store, search for HEIF Image Extensions, click Get to install, then open the HEIC file with Photos.</desc>
  <style>
    :root{--p:#B3C5B0;--card:#F0F0F2;--ink:#3C3C3E;--onfill:#FFFFFF}
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .p{fill:var(--p)}.card{fill:var(--card);stroke:var(--ink);stroke-width:1}
    .ink{fill:var(--ink)}.onfill{fill:var(--onfill)}.ln{stroke:var(--p);stroke-width:3;fill:none}
    @media (prefers-color-scheme: dark){.card{stroke:var(--onfill)}}
  </style>
  <line class="ln" x1="245" y1="130" x2="115" y2="72" aria-hidden="true"/>
  <line class="ln" x1="395" y1="130" x2="525" y2="72" aria-hidden="true"/>
  <line class="ln" x1="245" y1="230" x2="115" y2="288" aria-hidden="true"/>
  <line class="ln" x1="395" y1="230" x2="525" y2="288" aria-hidden="true"/>
  <rect class="card" x="30" y="30" width="180" height="72" rx="12" aria-hidden="true"/>
  <circle class="p" cx="58" cy="66" r="12" aria-hidden="true"/>
  <text class="ink" x="80" y="72" font-size="16">Open Microsoft Store</text>
  <rect class="card" x="430" y="30" width="180" height="72" rx="12" aria-hidden="true"/>
  <circle class="p" cx="458" cy="66" r="12" aria-hidden="true"/>
  <text class="ink" x="480" y="72" font-size="16">Search HEIF Extensions</text>
  <rect class="card" x="30" y="258" width="180" height="72" rx="12" aria-hidden="true"/>
  <circle class="p" cx="58" cy="294" r="12" aria-hidden="true"/>
  <text class="ink" x="80" y="300" font-size="16">Click Get to install</text>
  <rect class="card" x="430" y="258" width="180" height="72" rx="12" aria-hidden="true"/>
  <circle class="p" cx="458" cy="294" r="12" aria-hidden="true"/>
  <text class="ink" x="480" y="300" font-size="16">Open .heic in Photos</text>
  <circle class="p" cx="320" cy="180" r="60" aria-hidden="true"/>
  <text class="onfill" x="320" y="187" text-anchor="middle" font-size="18" font-weight="600">Install HEIF</text>
</svg>
