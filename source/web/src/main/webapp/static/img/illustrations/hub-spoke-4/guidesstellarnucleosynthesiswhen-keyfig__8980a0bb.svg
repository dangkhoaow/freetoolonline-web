  <line x1="320" y1="180" x2="448" y2="48" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="166" y2="312" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="431" y2="322" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <rect x="16" y="16" width="168" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="48" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="50" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">pp chain: 26.7</tspan><tspan x="50" dy="19">MeV</tspan></text>
  <rect x="448" y="16" width="176" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="468" cy="48" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="482" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="482" dy="0">CNO cycle: 25.0</tspan><tspan x="482" dy="19">MeV</tspan></text>
  <rect x="16" y="280" width="150" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="312" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="50" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Si burn &gt;3</tspan><tspan x="50" dy="19">billion K</tspan></text>
  <rect x="431" y="299" width="193" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="451" cy="322" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="465" y="327" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="465" dy="0">Endpoint: iron-56</tspan></text>
  <rect x="224" y="153" width="193" height="54" rx="27" fill="#1C1C1E" stroke="#5B73AE" stroke-width="3" aria-hidden="true"/>
  <text x="320" y="186" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" font-weight="600" fill="#FFFFFF"><tspan x="320" dy="0">Nucleosynthesis</tspan></text>
</svg>
