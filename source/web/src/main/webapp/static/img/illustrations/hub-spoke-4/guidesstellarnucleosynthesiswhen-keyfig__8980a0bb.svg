<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-hubspoke4-fba23f-title svg-hubspoke4-fba23f-desc">
  <title id="svg-hubspoke4-fba23f-title">Stellar nucleosynthesis key figures</title>
  <desc id="svg-hubspoke4-fba23f-desc">Stellar nucleosynthesis key figures: the pp chain yields 26.7 MeV per helium nucleus, the CNO cycle 25.0 MeV, silicon burning runs above 3 billion K, and fusion ends at iron-56.</desc>
