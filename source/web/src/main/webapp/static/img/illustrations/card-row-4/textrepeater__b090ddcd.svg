<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-cardrow4-e0ee2e-title svg-cardrow4-e0ee2e-desc">
  <title id="svg-cardrow4-e0ee2e-title">Text Repeater key features at a glance</title>
  <desc id="svg-cardrow4-e0ee2e-desc">Four cards: set a repeat count up to 10,000, one copy per line, everything stays in this tab, copy the result in one step.</desc>
  <rect x="8" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="83" cy="46" r="20" fill="#1C1C1E" stroke="#B3C5B0" stroke-width="3" aria-hidden="true"/>
  <text x="83" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">N</text>
  <text x="83" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="83" dy="0">Set the count</tspan></text>
  <text x="83" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="83" dy="0">1 to 10,000</tspan></text>
  <rect x="166" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="241" cy="46" r="20" fill="#1C1C1E" stroke="#B3C5B0" stroke-width="3" aria-hidden="true"/>
  <text x="241" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">L</text>
  <text x="241" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="241" dy="0">One per line</tspan></text>
  <text x="241" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="241" dy="0">easy to scan</tspan></text>
  <rect x="324" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="399" cy="46" r="20" fill="#1C1C1E" stroke="#B3C5B0" stroke-width="3" aria-hidden="true"/>
  <text x="399" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">P</text>
  <text x="399" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="399" dy="0">Stays local</tspan></text>
  <text x="399" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="399" dy="0">in this tab</tspan></text>
  <rect x="482" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="557" cy="46" r="20" fill="#1C1C1E" stroke="#B3C5B0" stroke-width="3" aria-hidden="true"/>
  <text x="557" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">C</text>
  <text x="557" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="557" dy="0">Copy result</tspan></text>
  <text x="557" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="557" dy="0">in one step</tspan></text>
</svg>
