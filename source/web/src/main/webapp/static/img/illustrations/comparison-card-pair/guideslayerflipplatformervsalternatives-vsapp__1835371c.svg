<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-comparisoncardpair-18a058-title svg-comparisoncardpair-18a058-desc">
  <title id="svg-comparisoncardpair-18a058-title">Layer Flip vs installed platformer apps</title>
  <desc id="svg-comparisoncardpair-18a058-desc">Layer Flip versus installed platformer apps: Layer Flip is about 44 KB in the browser with no install, 25 stages on keys or gamepad; installed apps are much larger and often need installs.</desc>
  <rect x="20" y="20" width="280" height="200" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="160" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">Layer Flip</text>
  <text x="160" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">~44 KB, no install</text>
  <text x="160" y="150" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">25 stages, keys/pad</text>
  <text x="320" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#3C3C3E" aria-hidden="true">vs</text>
  <rect x="340" y="20" width="280" height="200" rx="8" fill="#3C3C3E" aria-hidden="true"/>
  <text x="480" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">Installed app</text>
  <text x="480" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Tens-hundreds of MB</text>
  <text x="480" y="150" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Install required</text>
</svg>
