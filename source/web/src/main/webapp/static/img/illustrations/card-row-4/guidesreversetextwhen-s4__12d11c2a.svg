<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-cardrow4-158007-title svg-cardrow4-158007-desc">
  <title id="svg-cardrow4-158007-title">Reverse Text companion guides</title>
  <desc id="svg-cardrow4-158007-desc">Dedup lines, Sort lines, Text to image and the Reverse tool</desc>
  <style>
    :root{--p:#5B73AE;--card:#F0F0F2;--ink:#3C3C3E;--onfill:#FFFFFF}
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .p{fill:var(--p)}.card{fill:var(--card);stroke:var(--ink);stroke-width:1}
    .ink{fill:var(--ink)}.onfill{fill:var(--onfill)}
    @media (prefers-color-scheme: dark){.card{stroke:var(--onfill)}}
  </style>
  <rect class="card" x="10" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="80" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="80" y="69" text-anchor="middle" font-size="24" font-weight="600">D</text>
  <text class="ink" x="80" y="116" text-anchor="middle" font-size="14" font-weight="600">Dedup lines</text>
  <text class="ink" x="80" y="138" text-anchor="middle" font-size="13">Clean list</text>
  <rect class="card" x="170" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="240" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="240" y="69" text-anchor="middle" font-size="24" font-weight="600">A</text>
  <text class="ink" x="240" y="116" text-anchor="middle" font-size="14" font-weight="600">Sort lines</text>
  <text class="ink" x="240" y="138" text-anchor="middle" font-size="13">Alphabetize</text>
  <rect class="card" x="330" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="400" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="400" y="69" text-anchor="middle" font-size="24" font-weight="600">i</text>
  <text class="ink" x="400" y="116" text-anchor="middle" font-size="14" font-weight="600">Text to image</text>
  <text class="ink" x="400" y="138" text-anchor="middle" font-size="13">Share result</text>
  <rect class="card" x="490" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="560" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="560" y="69" text-anchor="middle" font-size="24" font-weight="600">R</text>
  <text class="ink" x="560" y="116" text-anchor="middle" font-size="14" font-weight="600">Reverse tool</text>
  <text class="ink" x="560" y="138" text-anchor="middle" font-size="13">The tool</text>
</svg>
