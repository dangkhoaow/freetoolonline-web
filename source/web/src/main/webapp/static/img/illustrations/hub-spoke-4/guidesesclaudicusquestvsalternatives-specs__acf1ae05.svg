  <title id="svg-hubspoke4-a3839d-title">Cifras clave de Claudicus Quest</title>
  <desc id="svg-hubspoke4-a3839d-desc">Cifras clave de Claudicus Quest: el juego pesa unos 132 KB, tiene 3 mapas (Brannford, Thornwood, Greymoor Crypt), usa un menu de combate numerado (1-5), y guarda en localStorage.</desc>
