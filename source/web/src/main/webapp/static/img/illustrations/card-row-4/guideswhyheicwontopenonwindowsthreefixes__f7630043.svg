<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-cardrow4-b87411-title svg-cardrow4-b87411-desc">
  <title id="svg-cardrow4-b87411-title">When each HEIC fix wins</title>
  <desc id="svg-cardrow4-b87411-desc">Four scenarios and which fix fits: a single photo from a friend, weekly HEIC photos with admin rights, a locked PC with no install access, and a batch of 50 or more HEIC photos.</desc>
  <style>
    :root{--p:#B3C5B0;--card:#F0F0F2;--ink:#3C3C3E;--onfill:#FFFFFF}
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .p{fill:var(--p)}.card{fill:var(--card);stroke:var(--ink);stroke-width:1}
    .ink{fill:var(--ink)}.onfill{fill:var(--onfill)}
    @media (prefers-color-scheme: dark){.card{stroke:var(--onfill)}}
  </style>
  <rect class="card" x="10" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="80" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="80" y="69" text-anchor="middle" font-size="24" font-weight="600">1</text>
  <text class="ink" x="80" y="116" text-anchor="middle" font-size="14" font-weight="600">One-off photo</text>
  <text class="ink" x="80" y="138" text-anchor="middle" font-size="13">Fix 3 - convert</text>
  <rect class="card" x="170" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="240" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="240" y="69" text-anchor="middle" font-size="24" font-weight="600">2</text>
  <text class="ink" x="240" y="116" text-anchor="middle" font-size="14" font-weight="600">Weekly HEIC</text>
  <text class="ink" x="240" y="138" text-anchor="middle" font-size="13">Fix 1 - codec</text>
  <rect class="card" x="330" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="400" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="400" y="69" text-anchor="middle" font-size="24" font-weight="600">3</text>
  <text class="ink" x="400" y="116" text-anchor="middle" font-size="14" font-weight="600">Locked-down PC</text>
  <text class="ink" x="400" y="138" text-anchor="middle" font-size="13">Fix 3 - online</text>
  <rect class="card" x="490" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="560" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="560" y="69" text-anchor="middle" font-size="24" font-weight="600">4</text>
  <text class="ink" x="560" y="116" text-anchor="middle" font-size="14" font-weight="600">Batch 50+ HEIC</text>
  <text class="ink" x="560" y="138" text-anchor="middle" font-size="13">Fix 3 + batch</text>
</svg>
