<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-hubspoke4-73b1da-title svg-hubspoke4-73b1da-desc">
  <title id="svg-hubspoke4-73b1da-title">Celestial coordinate key figures</title>
  <desc id="svg-hubspoke4-73b1da-desc">Celestial coordinate key figures: right ascension runs 0h to 24h eastward (1h equals 15 degrees), declination minus 90 to plus 90 degrees, altitude 0 to 90, azimuth 0 to 360 from north.</desc>
