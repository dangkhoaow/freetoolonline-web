  <line x1="320" y1="180" x2="456" y2="48" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="167" y2="322" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="448" y2="322" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <rect x="16" y="16" width="150" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="48" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="50" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">RA 0h-24h</tspan><tspan x="50" dy="19">(1h=15deg)</tspan></text>
  <rect x="456" y="16" width="168" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="476" cy="48" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="490" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="490" dy="0">Dec -90 to +90</tspan><tspan x="490" dy="19">deg</tspan></text>
  <rect x="16" y="299" width="151" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="322" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="50" y="327" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Alt 0-90 deg</tspan></text>
  <rect x="448" y="299" width="176" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="468" cy="322" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="482" y="327" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="482" dy="0">Az 0-360 from N</tspan></text>
  <rect x="244" y="142" width="152" height="76" rx="38" fill="#1C1C1E" stroke="#5B73AE" stroke-width="3" aria-hidden="true"/>
  <text x="320" y="175" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" font-weight="600" fill="#FFFFFF"><tspan x="320" dy="0">Sky</tspan><tspan x="320" dy="22">coordinates</tspan></text>
</svg>
