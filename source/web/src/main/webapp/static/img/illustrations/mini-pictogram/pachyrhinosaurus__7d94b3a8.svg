<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-7d94b3a8-title svg-minipictogram-7d94b3a8-desc">
  <title id="svg-minipictogram-7d94b3a8-title">View a Pachyrhinosaurus in 3D</title>
