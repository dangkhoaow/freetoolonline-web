<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-cardrow4-ea2fed-title svg-cardrow4-ea2fed-desc">
  <title id="svg-cardrow4-ea2fed-title">MP3 patents expired 2017 facts</title>
