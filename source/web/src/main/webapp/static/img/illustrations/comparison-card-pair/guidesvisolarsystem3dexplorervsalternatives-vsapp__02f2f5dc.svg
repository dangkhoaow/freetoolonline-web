<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-comparisoncardpair-e7f5f4-title svg-comparisoncardpair-e7f5f4-desc">
  <title id="svg-comparisoncardpair-e7f5f4-title">Solar System 3D vs mot app cai dat</title>
  <desc id="svg-comparisoncardpair-e7f5f4-desc">Solar System 3D Explorer so voi mot app thien van cai dat</desc>
  <rect x="20" y="20" width="280" height="200" rx="10" fill="#3C3C3E" aria-hidden="true"/>
  <rect x="20" y="20" width="280" height="10" rx="5" fill="#5B73AE" aria-hidden="true"/>
  <text x="160" y="62" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="19" font-weight="600" fill="#FFFFFF"><tspan x="160" dy="0">Solar System 3D</tspan></text>
  <text x="160" y="100" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="400" fill="#FFFFFF"><tspan x="160" dy="0">~0.7 MB, tren trinh duyet</tspan></text>
  <text x="160" y="124" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="400" fill="#FFFFFF"><tspan x="160" dy="0">Mien phi, khoi dong nhanh</tspan></text>
  <rect x="340" y="20" width="280" height="200" rx="10" fill="#3C3C3E" aria-hidden="true"/>
  <rect x="340" y="20" width="280" height="10" rx="5" fill="#3C3C3E" aria-hidden="true"/>
  <text x="480" y="62" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="19" font-weight="600" fill="#FFFFFF"><tspan x="480" dy="0">App cai dat</tspan></text>
  <text x="480" y="100" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="400" fill="#FFFFFF"><tspan x="480" dy="0">Hang chuc-hang tram MB</tspan></text>
  <text x="480" y="124" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="400" fill="#FFFFFF"><tspan x="480" dy="0">Cai dat, roi khoi dong</tspan></text>
  <circle cx="320" cy="120" r="18" fill="#3C3C3E" aria-hidden="true"/>
  <text x="320" y="125" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" aria-hidden="true">vs</text>
