  <rect x="6" y="10" width="30" height="24" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2.2" aria-hidden="true"/>
  <path d="M 11 28 L 18 20 L 24 25 L 31 15" fill="none" stroke="#7DAFA3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"/>
  <path d="M 42 40 L 42 35 A 6 6 0 1 1 54 35 L 54 40" fill="none" stroke="#FF4D00" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"/>
  <rect x="39" y="40" width="18" height="14" rx="2" fill="none" stroke="#FF4D00" stroke-width="2.2" aria-hidden="true"/>
  <circle cx="48" cy="47" r="1.8" fill="#FF4D00" aria-hidden="true"/>
  <text x="20" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="6.5" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">HIDE</text>
</svg>
