<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-84ec9d-title svg-minipictogram-84ec9d-desc">
  <title id="svg-minipictogram-84ec9d-title">Hide text inside a PNG image</title>
  <desc id="svg-minipictogram-84ec9d-desc">Hide a secret text message inside an ordinary PNG image - the picture looks identical to the eye but carries your hidden note in its pixels.</desc>
