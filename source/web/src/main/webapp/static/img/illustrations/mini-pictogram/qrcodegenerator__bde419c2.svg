  <title id="svg-minipictogram-63cca0-title">Make a QR code for URL text or Wi-Fi</title>
  <desc id="svg-minipictogram-63cca0-desc">Create a scannable QR for a URL, short text, contact vCard, or Wi-Fi credential. Download as PNG. In-browser, no account.</desc>
