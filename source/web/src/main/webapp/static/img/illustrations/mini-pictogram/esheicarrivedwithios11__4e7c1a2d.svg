<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-esheic-title svg-minipictogram-esheic-desc">
  <title id="svg-minipictogram-esheic-title">HEIC llego con iOS 11 - que sigue sin abrirlo en 2026</title>
  <desc id="svg-minipictogram-esheic-desc">Apple hizo HEIC el formato predeterminado de fotos del iPhone el 19 de septiembre de 2017. Nueve anos despues la mayoria de navegadores aun no lo abren.</desc>
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="#5B73AE" aria-hidden="true"/>
  <text x="32" y="36" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">HEIC</text>
  <text x="32" y="51" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="600" letter-spacing="0.5" fill="#FFFFFF">NEWS</text>
</svg>
