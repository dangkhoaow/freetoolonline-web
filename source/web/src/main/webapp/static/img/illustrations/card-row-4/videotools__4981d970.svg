<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-cardrow4-d1307c-title svg-cardrow4-d1307c-desc">
  <title id="svg-cardrow4-d1307c-title">Codec and container cheat sheet</title>
  <desc id="svg-cardrow4-d1307c-desc">H.264, H.265, VP9, and AV1 compared by support and compression</desc>
  <style>
    :root{--p:#D9C7A3;--card:#F0F0F2;--ink:#3C3C3E;--onfill:#FFFFFF}
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .p{fill:var(--p)}.card{fill:var(--card);stroke:var(--ink);stroke-width:1}
    .ink{fill:var(--ink)}.onfill{fill:var(--onfill)}
    @media (prefers-color-scheme: dark){.card{stroke:var(--onfill)}}
  </style>
  <rect class="card" x="10" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="80" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="80" y="69" text-anchor="middle" font-size="24" font-weight="600">1</text>
  <text class="ink" x="80" y="116" text-anchor="middle" font-size="14" font-weight="600">H.264 / AVC</text>
  <text class="ink" x="80" y="138" text-anchor="middle" font-size="13">widest support</text>
  <rect class="card" x="170" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="240" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="240" y="69" text-anchor="middle" font-size="24" font-weight="600">2</text>
  <text class="ink" x="240" y="116" text-anchor="middle" font-size="14" font-weight="600">H.265 / HEVC</text>
  <text class="ink" x="240" y="138" text-anchor="middle" font-size="13">40% smaller</text>
  <rect class="card" x="330" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="400" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="400" y="69" text-anchor="middle" font-size="24" font-weight="600">3</text>
  <text class="ink" x="400" y="116" text-anchor="middle" font-size="14" font-weight="600">VP9 open codec</text>
  <text class="ink" x="400" y="138" text-anchor="middle" font-size="13">web delivery</text>
  <rect class="card" x="490" y="15" width="140" height="150" rx="14" aria-hidden="true"/>
  <circle class="p" cx="560" cy="60" r="24" aria-hidden="true"/>
  <text class="onfill" x="560" y="69" text-anchor="middle" font-size="24" font-weight="600">4</text>
  <text class="ink" x="560" y="116" text-anchor="middle" font-size="14" font-weight="600">AV1 newest</text>
  <text class="ink" x="560" y="138" text-anchor="middle" font-size="13">archival use</text>
</svg>
