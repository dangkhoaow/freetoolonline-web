  <path d="M 24 32 Q 28 28 32 30 Q 36 27 40 30 Q 44 28 48 31" fill="none" stroke="#FF4D00" stroke-width="2.2" stroke-linejoin="round" aria-hidden="true"/>
  <circle cx="12" cy="30" r="1.4" fill="#7DAFA3" aria-hidden="true"/>
  <text x="32" y="57" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="7" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">RIDGE</text>
