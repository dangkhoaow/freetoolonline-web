<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-decisiontree2branch-83dc0c-title svg-decisiontree2branch-83dc0c-desc">
  <title id="svg-decisiontree2branch-83dc0c-title">PNG vs JPG: which format to save each extracted frame</title>
  <desc id="svg-decisiontree2branch-83dc0c-desc">PNG preserves every pixel and transparency for re-editing; JPG produces smaller files for slide decks and feed posts.</desc>
  <path d="M 200 82 L 120 158 M 112 148 L 120 158 L 130 152" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" aria-hidden="true"/>
  <path d="M 280 82 L 360 158 M 350 152 L 360 158 L 368 148" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" aria-hidden="true"/>
  <rect x="120" y="20" width="240" height="60" rx="10" fill="#3C3C3E" aria-hidden="true"/>
  <rect x="120" y="20" width="240" height="8" rx="4" fill="#5B73AE" aria-hidden="true"/>
  <text x="240" y="53" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="#FFFFFF"><tspan x="240" dy="0">How will you use the</tspan><tspan x="240" dy="18">frame?</tspan></text>
  <rect x="20" y="170" width="200" height="80" rx="10" fill="#1C1C1E" stroke="#5B73AE" stroke-width="2" aria-hidden="true"/>
  <text x="120" y="205" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="#FFFFFF"><tspan x="120" dy="0">Re-edit, composite:</tspan><tspan x="120" dy="18">pick PNG</tspan></text>
  <rect x="260" y="170" width="200" height="80" rx="10" fill="#1C1C1E" stroke="#5B73AE" stroke-width="2" aria-hidden="true"/>
  <text x="360" y="205" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="#FFFFFF"><tspan x="360" dy="0">Slide, feed post:</tspan><tspan x="360" dy="18">pick JPG</tspan></text>
</svg>
