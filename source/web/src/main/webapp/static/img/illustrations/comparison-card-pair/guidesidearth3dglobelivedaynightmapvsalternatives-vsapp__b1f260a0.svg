<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-comparisoncardpair-25596a-title svg-comparisoncardpair-25596a-desc">
  <title id="svg-comparisoncardpair-25596a-title">Earth 3D Globe vs app/layanan globe</title>
  <desc id="svg-comparisoncardpair-25596a-desc">Earth 3D Globe dibandingkan app globe virtual atau layanan peta</desc>
  <rect x="20" y="20" width="280" height="200" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="160" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">Earth 3D Globe</text>
  <text x="160" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">~0.7 MB, tanpa streaming</text>
  <text x="160" y="150" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Tak pernah minta lokasi</text>
  <text x="320" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#3C3C3E" aria-hidden="true">vs</text>
  <rect x="340" y="20" width="280" height="200" rx="8" fill="#3C3C3E" aria-hidden="true"/>
  <text x="480" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">App/layanan globe</text>
  <text x="480" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Instal atau streaming</text>
  <text x="480" y="150" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Sering minta lokasi</text>
</svg>
