<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-2c44f7-title svg-featurebadge-2c44f7-desc">
  <title id="svg-featurebadge-2c44f7-title">Pick PNG or WebP to keep transparency; JPG flattens it</title>
  <desc id="svg-featurebadge-2c44f7-desc">Pick PNG or WebP to preserve a transparent background, or JPG to flatten it onto a solid colour and shrink the file.</desc>
  <rect x="2" y="2" width="196" height="44" rx="22" ry="22" fill="#7DAFA3" aria-hidden="true"/>
  <text x="100" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1C1C1E">transparency kept</text>
</svg>
