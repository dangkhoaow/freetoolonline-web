<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-hubspoke4-90fae1-title svg-hubspoke4-90fae1-desc">
  <title id="svg-hubspoke4-90fae1-title">4 runtimes: how to get current millis</title>
  <desc id="svg-hubspoke4-90fae1-desc">JavaScript, Python, Java, and PHP each have a one-liner for reading the current millisecond timestamp</desc>
  <line x1="320" y1="180" x2="166" y2="48" stroke="#B3C5B0" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="474" y2="48" stroke="#B3C5B0" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="184" y2="312" stroke="#B3C5B0" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="440" y2="322" stroke="#B3C5B0" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <rect x="16" y="16" width="150" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="48" r="8" fill="#B3C5B0" aria-hidden="true"/>
  <text x="50" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">JavaScript:</tspan><tspan x="50" dy="19">Date.now()</tspan></text>
  <rect x="474" y="16" width="150" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="494" cy="48" r="8" fill="#B3C5B0" aria-hidden="true"/>
  <text x="508" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="508" dy="0">Python 3:</tspan><tspan x="508" dy="19">time.time()</tspan></text>
  <rect x="16" y="280" width="168" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="312" r="8" fill="#B3C5B0" aria-hidden="true"/>
  <text x="50" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Java / Kotlin:</tspan><tspan x="50" dy="19">millis</tspan></text>
  <rect x="440" y="299" width="184" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="460" cy="322" r="8" fill="#B3C5B0" aria-hidden="true"/>
  <text x="474" y="327" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="474" dy="0">PHP: microtime()</tspan></text>
  <rect x="229" y="153" width="183" height="54" rx="27" fill="#1C1C1E" stroke="#B3C5B0" stroke-width="3" aria-hidden="true"/>
  <text x="320" y="186" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" font-weight="600" fill="#FFFFFF"><tspan x="320" dy="0">Current Millis</tspan></text>
</svg>
