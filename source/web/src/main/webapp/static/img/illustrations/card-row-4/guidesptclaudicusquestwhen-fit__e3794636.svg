  <title id="svg-cardrow4-0aa037-title">Quando o Claudicus Quest e ideal</title>
  <desc id="svg-cardrow4-0aa037-desc">Quando o Claudicus Quest e ideal: teclado desktop ou laptop, 20 a 45 minutos por sessao, um carregamento unico de 132 KB, e single-player.</desc>
