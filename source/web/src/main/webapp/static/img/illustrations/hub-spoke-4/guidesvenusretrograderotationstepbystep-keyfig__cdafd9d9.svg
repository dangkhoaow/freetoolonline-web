<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-hubspoke4-4ae8b1-title svg-hubspoke4-4ae8b1-desc">
  <title id="svg-hubspoke4-4ae8b1-title">Venus rotation key figures</title>
  <desc id="svg-hubspoke4-4ae8b1-desc">Venus rotation key figures: a retrograde spin of about 243 Earth days, an orbital year of about 224.7 days, a solar day of about 116.75 days, versus Earth roughly 1-day prograde spin.</desc>
  <line x1="320" y1="180" x2="166" y2="48" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="440" y2="39" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="209" y2="312" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="431" y2="322" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <rect x="16" y="16" width="150" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="48" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="50" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Spin ~243 d</tspan><tspan x="50" dy="19">(retro)</tspan></text>
  <rect x="440" y="16" width="184" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="460" cy="39" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="474" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="474" dy="0">Year ~224.7 days</tspan></text>
  <rect x="16" y="280" width="193" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="312" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="50" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Solar day ~116.75</tspan><tspan x="50" dy="19">d</tspan></text>
  <rect x="431" y="299" width="193" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="451" cy="322" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="465" y="327" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="465" dy="0">Earth spin ~1 day</tspan></text>
  <rect x="229" y="153" width="183" height="54" rx="27" fill="#1C1C1E" stroke="#5B73AE" stroke-width="3" aria-hidden="true"/>
  <text x="320" y="186" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" font-weight="600" fill="#FFFFFF"><tspan x="320" dy="0">Venus rotation</tspan></text>
</svg>
