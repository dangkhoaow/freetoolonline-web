<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-numberedbars4-902ab1-title svg-numberedbars4-902ab1-desc">
  <title id="svg-numberedbars4-902ab1-title">Compress a folder into a zip: open, drop, add password if needed, then convert.</title>
  <desc id="svg-numberedbars4-902ab1-desc">Bundle a folder into a .zip and trim the size before sending.</desc>
  <style>
    :root{--p:#7DAFA3;--card:#F0F0F2;--ink:#3C3C3E;--onfill:#FFFFFF}
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .p{fill:var(--p)}.card{fill:var(--card);stroke:var(--ink);stroke-width:1}
    .ink{fill:var(--ink)}.onfill{fill:var(--onfill)}
    @media (prefers-color-scheme: dark){.card{stroke:var(--onfill)}}
  </style>
  <circle class="p" cx="110" cy="140" r="64" aria-hidden="true"/>
  <text class="onfill" x="110" y="134" text-anchor="middle" font-size="17" font-weight="600">Compress a</text>
  <text class="onfill" x="110" y="158" text-anchor="middle" font-size="17" font-weight="600">folder .zip</text>
  <rect class="card" x="200" y="22" width="430" height="48" rx="10" aria-hidden="true"/>
  <circle class="p" cx="226" cy="46" r="16" aria-hidden="true"/>
  <text class="onfill" x="226" y="52" text-anchor="middle" font-size="16" font-weight="600">1</text>
  <text class="ink" x="254" y="52" font-size="16">Open Zip File in the browser</text>
  <rect class="card" x="200" y="86" width="430" height="48" rx="10" aria-hidden="true"/>
  <circle class="p" cx="226" cy="110" r="16" aria-hidden="true"/>
  <text class="onfill" x="226" y="116" text-anchor="middle" font-size="16" font-weight="600">2</text>
  <text class="ink" x="254" y="116" font-size="16">Drop or pick the folder</text>
  <rect class="card" x="200" y="150" width="430" height="48" rx="10" aria-hidden="true"/>
  <circle class="p" cx="226" cy="174" r="16" aria-hidden="true"/>
  <text class="onfill" x="226" y="180" text-anchor="middle" font-size="16" font-weight="600">3</text>
  <text class="ink" x="254" y="180" font-size="16">Enter a password if needed</text>
  <rect class="card" x="200" y="214" width="430" height="48" rx="10" aria-hidden="true"/>
  <circle class="p" cx="226" cy="238" r="16" aria-hidden="true"/>
  <text class="onfill" x="226" y="244" text-anchor="middle" font-size="16" font-weight="600">4</text>
  <text class="ink" x="254" y="244" font-size="16">Click Convert to bundle the archive</text>
</svg>
