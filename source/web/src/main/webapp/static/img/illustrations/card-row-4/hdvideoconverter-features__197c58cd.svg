  <title id="svg-cardrow4-e8fd47-title">HD video converter key features</title>
  <desc id="svg-cardrow4-e8fd47-desc">Card row: four capabilities of the in-browser video converter</desc>
  <rect x="8" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
