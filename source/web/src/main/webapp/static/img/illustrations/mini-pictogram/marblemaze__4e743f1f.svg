  <text x="32" y="57" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="7" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">MAZE</text>
