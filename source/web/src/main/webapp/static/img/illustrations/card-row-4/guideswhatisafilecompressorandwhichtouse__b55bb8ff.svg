<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-cardrow4-fb4630-title svg-cardrow4-fb4630-desc">
  <title id="svg-cardrow4-fb4630-title">Four file types matched to the right compression tool.</title>
  <desc id="svg-cardrow4-fb4630-desc">Match what you have to the right compression tool.</desc>
  <rect x="8" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="83" cy="46" r="20" fill="#1C1C1E" stroke="#5B73AE" stroke-width="3" aria-hidden="true"/>
  <text x="83" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">1</text>
  <text x="83" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="83" dy="0">Mixed files?</tspan></text>
  <text x="83" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="83" dy="0">Make a ZIP</tspan></text>
  <rect x="166" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="241" cy="46" r="20" fill="#1C1C1E" stroke="#5B73AE" stroke-width="3" aria-hidden="true"/>
  <text x="241" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">2</text>
  <text x="241" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="241" dy="0">JPG/PNG?</tspan></text>
  <text x="241" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="241" dy="0">Lower quality</tspan></text>
  <rect x="324" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="399" cy="46" r="20" fill="#1C1C1E" stroke="#5B73AE" stroke-width="3" aria-hidden="true"/>
  <text x="399" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">3</text>
  <text x="399" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="399" dy="0">HEIC photos?</tspan></text>
  <text x="399" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="399" dy="0">Convert to JPG</tspan></text>
  <rect x="482" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="557" cy="46" r="20" fill="#1C1C1E" stroke="#5B73AE" stroke-width="3" aria-hidden="true"/>
  <text x="557" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">4</text>
  <text x="557" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="557" dy="0">Many images?</tspan></text>
  <text x="557" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="557" dy="0">Bundle in PDF</tspan></text>
</svg>
