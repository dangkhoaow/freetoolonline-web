  <path d="M 17 42 L 13 48" fill="none" stroke="#7DAFA3" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"/>
  <text x="32" y="57" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="7" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">1824</text>
