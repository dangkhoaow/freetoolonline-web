<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-cardrow4-1f9bd8-title svg-cardrow4-1f9bd8-desc">
  <title id="svg-cardrow4-1f9bd8-title">Four key features of the steganography tool</title>
  <desc id="svg-cardrow4-1f9bd8-desc">Hide or reveal with one switch, see the capacity before you hide, add an optional password, and keep everything on your device.</desc>
  <rect x="8" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="83" cy="46" r="20" fill="#1C1C1E" stroke="#E8C5C9" stroke-width="3" aria-hidden="true"/>
  <text x="83" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">1</text>
  <text x="83" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="83" dy="0">Two modes,</tspan></text>
  <text x="83" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="83" dy="0">one switch</tspan></text>
  <rect x="166" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="241" cy="46" r="20" fill="#1C1C1E" stroke="#E8C5C9" stroke-width="3" aria-hidden="true"/>
  <text x="241" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">2</text>
  <text x="241" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="241" dy="0">Capacity</tspan></text>
  <text x="241" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="241" dy="0">shown first</tspan></text>
  <rect x="324" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="399" cy="46" r="20" fill="#1C1C1E" stroke="#E8C5C9" stroke-width="3" aria-hidden="true"/>
  <text x="399" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">3</text>
  <text x="399" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="399" dy="0">Optional</tspan></text>
  <text x="399" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="399" dy="0">password</tspan></text>
  <rect x="482" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="557" cy="46" r="20" fill="#1C1C1E" stroke="#E8C5C9" stroke-width="3" aria-hidden="true"/>
  <text x="557" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">4</text>
  <text x="557" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="557" dy="0">Stays on</tspan></text>
  <text x="557" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="557" dy="0">your device</tspan></text>
</svg>
