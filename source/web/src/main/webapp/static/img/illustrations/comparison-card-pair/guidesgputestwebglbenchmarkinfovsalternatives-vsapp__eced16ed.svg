<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-comparisoncardpair-5eb2e6-title svg-comparisoncardpair-5eb2e6-desc">
  <title id="svg-comparisoncardpair-5eb2e6-title">GPU Test vs an installed benchmark</title>
  <desc id="svg-comparisoncardpair-5eb2e6-desc">GPU Test in the browser versus an installed benchmark suite: it loads about 0.7 MB and scores in 20 to 40 seconds; installed suites are hundreds of MB and often account-based.</desc>
  <rect x="20" y="20" width="280" height="200" rx="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="160" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">GPU Test (browser)</text>
  <text x="160" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">~0.7 MB engine</text>
  <text x="160" y="150" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Score in 20-40s</text>
  <text x="320" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#3C3C3E" aria-hidden="true">vs</text>
  <rect x="340" y="20" width="280" height="200" rx="8" fill="#3C3C3E" aria-hidden="true"/>
  <text x="480" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#FFFFFF">Installed suite</text>
  <text x="480" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Hundreds of MB+</text>
  <text x="480" y="150" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Install, then run</text>
</svg>
