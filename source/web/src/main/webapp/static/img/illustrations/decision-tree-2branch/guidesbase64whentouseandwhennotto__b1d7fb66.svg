  <title id="svg-decisiontree2branch-13c3cc-title">When to use base64 and when not to</title>
  <desc id="svg-decisiontree2branch-13c3cc-desc">Quick yes-or-no decision: small inline icons or JSON payloads carrying binary go yes; large images, sensitive data, or database BLOB storage go no</desc>
  <path d="M 200 82 L 120 158 M 112 148 L 120 158 L 130 152" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" aria-hidden="true"/>
  <path d="M 280 82 L 360 158 M 350 152 L 360 158 L 368 148" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" aria-hidden="true"/>
  <rect x="120" y="20" width="240" height="60" rx="10" fill="#3C3C3E" aria-hidden="true"/>
  <rect x="120" y="20" width="240" height="8" rx="4" fill="#5B73AE" aria-hidden="true"/>
  <text x="240" y="62" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="#FFFFFF"><tspan x="240" dy="0">Inline or binary path?</tspan></text>
  <rect x="20" y="170" width="200" height="80" rx="10" fill="#1C1C1E" stroke="#5B73AE" stroke-width="2" aria-hidden="true"/>
  <text x="120" y="205" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="#FFFFFF"><tspan x="120" dy="0">Inline: small +</tspan><tspan x="120" dy="18">text-only</tspan></text>
  <rect x="260" y="170" width="200" height="80" rx="10" fill="#1C1C1E" stroke="#5B73AE" stroke-width="2" aria-hidden="true"/>
  <text x="360" y="205" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="#FFFFFF"><tspan x="360" dy="0">Binary: large or</tspan><tspan x="360" dy="18">sensitive</tspan></text>
</svg>
