  <title id="svg-hubspoke4-948401-title">Tidal heating key figures</title>
  <desc id="svg-hubspoke4-948401-desc">Tidal heating key figures: Io has about 400 active volcanoes, its surface flexes up to 100 m, it radiates over 20 times Earth heat flow, and Io, Europa, Ganymede lock in a 1:2:4 resonance.</desc>
