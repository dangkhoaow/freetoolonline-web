  <title id="svg-hubspoke4-8689d2-title">Is ZIP the right tool for your input?</title>
  <desc id="svg-hubspoke4-8689d2-desc">ZIP fits a mixed-file folder. It saves almost nothing on loose photos, HEIC files, or images you plan to merge into one PDF document.</desc>
