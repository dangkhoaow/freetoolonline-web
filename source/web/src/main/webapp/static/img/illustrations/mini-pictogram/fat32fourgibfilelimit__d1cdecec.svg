<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-fat32fourgibfilelimit-title svg-minipictogram-fat32fourgibfilelimit-desc">
  <title id="svg-minipictogram-fat32fourgibfilelimit-title">FAT32 4 GiB File Limit - Why Large Videos Fail on USB</title>
  <desc id="svg-minipictogram-fat32fourgibfilelimit-desc">FAT32 caps any single file at 4 GiB minus 1 byte. That is why a 4.7 GB video or Windows ISO copy fails on a USB stick that still has free space.</desc>
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="#1C1C1E" aria-hidden="true"/>
  <path d="M 22 14 L 34 14 L 34 22 L 40 22 L 40 46 L 16 46 L 16 22 L 22 22 Z" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linejoin="round" aria-hidden="true"/>
  <rect x="20" y="30" width="16" height="10" rx="1.5" fill="none" stroke="#7DAFA3" stroke-width="2" aria-hidden="true"/>
  <line x1="42" y1="18" x2="42" y2="46" stroke="#FF4D00" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"/>
  <path d="M 46 30 L 42 30 M 46 30 L 43 27 M 46 30 L 43 33" fill="none" stroke="#FF4D00" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"/>
  <text x="32" y="57" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="7" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">4GB</text>
</svg>
