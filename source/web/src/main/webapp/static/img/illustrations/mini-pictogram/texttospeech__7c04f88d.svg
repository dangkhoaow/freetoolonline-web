<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-cffbee-title svg-minipictogram-cffbee-desc">
  <title id="svg-minipictogram-cffbee-title">Hear typed text read aloud in the browser</title>
  <desc id="svg-minipictogram-cffbee-desc">Type or paste text and hear it read aloud. Pick a voice, adjust rate and pitch. Nothing uploaded.</desc>
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="#5B73AE" aria-hidden="true"/>
  <text x="32" y="36" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">TTS</text>
  <text x="32" y="51" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="600" letter-spacing="0.5" fill="#FFFFFF">SPEAK</text>
</svg>
