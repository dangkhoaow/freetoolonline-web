  <title id="svg-hubspoke4-22e23a-title">Sunspot activity key figures</title>
  <desc id="svg-hubspoke4-22e23a-desc">Sunspot activity key figures: the Schwabe cycle runs about 11 years, equatorial rotation about 25 days, polar rotation about 35 days, and the Maunder Minimum spanned 1645 to 1715.</desc>
