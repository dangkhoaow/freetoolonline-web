  <line x1="320" y1="180" x2="474" y2="312" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <rect x="16" y="16" width="193" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="48" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="50" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Schwabe cycle ~11</tspan><tspan x="50" dy="19">yr</tspan></text>
  <rect x="440" y="16" width="184" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="460" cy="48" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="474" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="474" dy="0">Equator rot. ~25</tspan><tspan x="474" dy="19">days</tspan></text>
  <rect x="16" y="280" width="168" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="312" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="50" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Polar rot. ~35</tspan><tspan x="50" dy="19">days</tspan></text>
