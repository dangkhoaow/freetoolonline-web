<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-e8d3e9-title svg-minipictogram-e8d3e9-desc">
  <title id="svg-minipictogram-e8d3e9-title">Jot notes that stay in this browser</title>
  <desc id="svg-minipictogram-e8d3e9-desc">Jot quick notes and keep them in this browser - no sign-in, no sync. Notes save via local storage and survive a reload.</desc>
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="#5B73AE" aria-hidden="true"/>
  <text x="32" y="36" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">NOTE</text>
  <text x="32" y="51" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="600" letter-spacing="0.5" fill="#FFFFFF">SAVE</text>
</svg>
