  <title id="svg-hubspoke4-c5be94-title">Galilean moons key figures</title>
  <desc id="svg-hubspoke4-c5be94-desc">Galilean moons key figures: Io orbits in 1.769 days, Europa 3.551 days near a 2:1 resonance with Io, Ganymede 7.155 days as the largest moon, Callisto 16.689 days outside the resonance.</desc>
