<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-cardrow4-2c7e99-title svg-cardrow4-2c7e99-desc">
  <title id="svg-cardrow4-2c7e99-title">Four ZIP myths that will not hit your size cap</title>
  <desc id="svg-cardrow4-2c7e99-desc">Double-zipping, higher compression level, 7z format, and password encryption all fail to shrink</desc>
  <rect x="8" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="83" cy="46" r="20" fill="#1C1C1E" stroke="#7DAFA3" stroke-width="3" aria-hidden="true"/>
  <text x="83" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">X</text>
  <text x="83" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="83" dy="0">Zip it twice</tspan></text>
  <text x="83" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="83" dy="0">zero shrink</tspan></text>
  <rect x="166" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="241" cy="46" r="20" fill="#1C1C1E" stroke="#7DAFA3" stroke-width="3" aria-hidden="true"/>
  <text x="241" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">X</text>
  <text x="241" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="241" dy="0">Higher level</tspan></text>
  <text x="241" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="241" dy="0">only 1-5% gain</tspan></text>
  <rect x="324" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="399" cy="46" r="20" fill="#1C1C1E" stroke="#7DAFA3" stroke-width="3" aria-hidden="true"/>
  <text x="399" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">X</text>
  <text x="399" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="399" dy="0">7z format</tspan></text>
  <text x="399" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="399" dy="0">same limits</tspan></text>
  <rect x="482" y="12" width="150" height="156" rx="14" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="557" cy="46" r="20" fill="#1C1C1E" stroke="#7DAFA3" stroke-width="3" aria-hidden="true"/>
  <text x="557" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">X</text>
  <text x="557" y="86" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FFFFFF"><tspan x="557" dy="0">Password ZIP</tspan></text>
  <text x="557" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="400" fill="#FFFFFF"><tspan x="557" dy="0">same file size</tspan></text>
</svg>
