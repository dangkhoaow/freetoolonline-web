<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-c28966-title svg-featurebadge-c28966-desc">
  <title id="svg-featurebadge-c28966-title">Convert milliseconds to a date in your browser</title>
  <desc id="svg-featurebadge-c28966-desc">Paste a 13-digit epoch in milliseconds and read the matching date and time; the conversion runs on this page, so the value is never sent to a server.</desc>
