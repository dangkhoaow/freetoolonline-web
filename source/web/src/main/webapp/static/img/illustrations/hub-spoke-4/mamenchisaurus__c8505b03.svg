<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mamenchisaurus size figures</title>
  <desc id="desc">Compare four Mamenchisaurus figures: Len ~18 m, Neck &gt;9 m, Mass ~11.8 t, and Lived ~160-145 Mya.</desc>
  <rect width="640" height="360" fill="#0b1020"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#fff">
    <text x="80" y="70" font-size="18" font-weight="700">Len ~18 m</text>
    <text x="80" y="100" font-size="13" fill="#aab">M. hochuanensis baseline</text>
    <text x="360" y="70" font-size="18" font-weight="700">Neck &gt;9 m</text>
    <text x="360" y="100" font-size="13" fill="#aab">~half of body length</text>
    <text x="80" y="200" font-size="18" font-weight="700">Mass ~11.8 t</text>
    <text x="80" y="230" font-size="13" fill="#aab">about 13 short tons</text>
    <text x="360" y="200" font-size="18" font-weight="700">Lived ~160-145 Mya</text>
    <text x="360" y="230" font-size="13" fill="#aab">Late Jurassic China</text>
  </g>
  <circle cx="60" cy="85" r="8" fill="#FF4D00"/>
  <circle cx="340" cy="85" r="8" fill="#4CAF50"/>
  <circle cx="60" cy="215" r="8" fill="#2196F3"/>
  <circle cx="340" cy="215" r="8" fill="#FFC107"/>
</svg>
