  <circle class="p" cx="58" cy="294" r="12" aria-hidden="true"/>
  <text class="ink" x="80" y="300" font-size="16">Venus ~0.72 AU</text>
  <rect class="card" x="430" y="258" width="180" height="72" rx="12" aria-hidden="true"/>
  <circle class="p" cx="458" cy="294" r="12" aria-hidden="true"/>
  <text class="ink" x="480" y="300" font-size="16">Mars ~1.52 AU</text>
