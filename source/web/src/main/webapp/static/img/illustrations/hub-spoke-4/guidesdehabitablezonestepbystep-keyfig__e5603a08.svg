<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-hubspoke4-605e5f-title svg-hubspoke4-605e5f-desc">
  <title id="svg-hubspoke4-605e5f-title">Habitable Zone: Kennzahlen</title>
  <desc id="svg-hubspoke4-605e5f-desc">Habitable-Zone-Kennzahlen: die konservative Zone der Sonne reicht von 0.95 bis 1.37 AU, Erde bei 1 AU, Venus bei etwa 0.72 AU, Mars bei etwa 1.52 AU.</desc>
  <style>
    :root{--p:#5B73AE;--card:#F0F0F2;--ink:#3C3C3E;--onfill:#FFFFFF}
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .p{fill:var(--p)}.card{fill:var(--card);stroke:var(--ink);stroke-width:1}
    .ink{fill:var(--ink)}.onfill{fill:var(--onfill)}.ln{stroke:var(--p);stroke-width:3;fill:none}
    @media (prefers-color-scheme: dark){.card{stroke:var(--onfill)}}
  </style>
  <line class="ln" x1="245" y1="130" x2="115" y2="72" aria-hidden="true"/>
