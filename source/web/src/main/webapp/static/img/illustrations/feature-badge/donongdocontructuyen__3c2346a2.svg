  <rect x="2" y="2" width="196" height="44" rx="22" ry="22" fill="#B3C5B0" aria-hidden="true"/>
  <text x="100" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1C1C1E">Không upload</text>
</svg>
