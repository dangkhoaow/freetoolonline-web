<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-dndc-title svg-featurebadge-dndc-desc">
  <title id="svg-featurebadge-dndc-title">BAC ước lượng tính ngay trong trình duyệt - dữ liệu không upload</title>
