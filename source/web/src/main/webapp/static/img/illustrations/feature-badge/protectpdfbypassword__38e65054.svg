<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-a0cc96-title svg-featurebadge-a0cc96-desc">
  <title id="svg-featurebadge-a0cc96-title">Password-protect a PDF</title>
  <desc id="svg-featurebadge-a0cc96-desc">Set a password on a PDF you can open; the encrypted copy refuses to show its first page until that exact string is typed.</desc>
  <rect x="2" y="2" width="196" height="44" rx="22" ry="22" fill="#7DAFA3" aria-hidden="true"/>
  <text x="100" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1C1C1E">Encrypt a PDF</text>
</svg>
