<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-c9d4a1e6-title svg-minipictogram-c9d4a1e6-desc">
  <title id="svg-minipictogram-c9d4a1e6-title">View a Brachiosaurus in 3D</title>
  <desc id="svg-minipictogram-c9d4a1e6-desc">Rotate the long-necked sauropod, size it against a person, and read real fossil figures.</desc>
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="#5F7A52" aria-hidden="true"/>
  <text x="32" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11.5" font-weight="600" fill="#FFFFFF">BRACHIO</text>
  <text x="32" y="48" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" letter-spacing="0.5" fill="#FFFFFF">3D</text>
</svg>
