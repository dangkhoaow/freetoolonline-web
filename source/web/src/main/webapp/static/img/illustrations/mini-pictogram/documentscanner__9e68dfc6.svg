<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-2b42df-title svg-minipictogram-2b42df-desc">
  <title id="svg-minipictogram-2b42df-title">Turn document photos into a PDF</title>
  <desc id="svg-minipictogram-2b42df-desc">Turn one or more photos of a paper document into a single PDF, right in this browser - no upload, no app to install.</desc>
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="#5B73AE" aria-hidden="true"/>
  <text x="32" y="36" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">PDF</text>
  <text x="32" y="51" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="600" letter-spacing="0.5" fill="#FFFFFF">SCAN</text>
</svg>
