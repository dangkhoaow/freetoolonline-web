<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">Haumea elongated figures</title>
  <desc id="d">Four panels: axes, spin, ring, orbit</desc>
  <rect width="640" height="360" fill="#FFFFFF"/>
  <rect x="16" y="16" width="140" height="140" rx="12" fill="#3C3C3E"/>
  <text x="86" y="84" text-anchor="middle" fill="#FFFFFF" font-size="14" font-family="sans-serif">2322x1704</text>
  <text x="86" y="108" text-anchor="middle" fill="#FFFFFF" font-size="14" font-family="sans-serif">x1138 km</text>
  <text x="86" y="132" text-anchor="middle" fill="#5B73AE" font-size="12" font-family="sans-serif">Axes</text>
  <rect x="172" y="16" width="140" height="140" rx="12" fill="#3C3C3E"/>
  <text x="242" y="90" text-anchor="middle" fill="#FFFFFF" font-size="18" font-family="sans-serif">~3.92 h</text>
  <text x="242" y="118" text-anchor="middle" fill="#FF4D00" font-size="12" font-family="sans-serif">Spin</text>
  <rect x="328" y="16" width="140" height="140" rx="12" fill="#3C3C3E"/>
  <text x="398" y="84" text-anchor="middle" fill="#FFFFFF" font-size="16" font-family="sans-serif">70 km</text>
  <text x="398" y="108" text-anchor="middle" fill="#FFFFFF" font-size="14" font-family="sans-serif">@2287 km</text>
  <text x="398" y="132" text-anchor="middle" fill="#5B73AE" font-size="12" font-family="sans-serif">Ring</text>
  <rect x="484" y="16" width="140" height="140" rx="12" fill="#3C3C3E"/>
  <text x="554" y="90" text-anchor="middle" fill="#FFFFFF" font-size="18" font-family="sans-serif">~285 yr</text>
  <text x="554" y="118" text-anchor="middle" fill="#FF4D00" font-size="12" font-family="sans-serif">Orbit</text>
  <text x="320" y="220" text-anchor="middle" fill="#3C3C3E" font-size="20" font-family="sans-serif">Haumea elongated dwarf planet - published sizes</text>
  <text x="320" y="250" text-anchor="middle" fill="#5B73AE" font-size="14" font-family="sans-serif">Nature 2017 occultation + NASA Science</text>
</svg>
