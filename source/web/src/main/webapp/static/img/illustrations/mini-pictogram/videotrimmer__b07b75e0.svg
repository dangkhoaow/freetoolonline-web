<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-aef579-title svg-minipictogram-aef579-desc">
  <title id="svg-minipictogram-aef579-title">Trim a video to a specific time range</title>
  <desc id="svg-minipictogram-aef579-desc">Trim an MP4, MOV, or WebM video to the exact time range you need, right in your browser.</desc>
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="#5B73AE" aria-hidden="true"/>
  <text x="32" y="36" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#FFFFFF">MP4</text>
  <text x="32" y="51" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="600" letter-spacing="0.5" fill="#FFFFFF">TRIM</text>
</svg>
