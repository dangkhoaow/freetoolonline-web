<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-minipictogram-4bdd5b-title svg-minipictogram-4bdd5b-desc">
  <title id="svg-minipictogram-4bdd5b-title">Press keys to highlight and spot dead keys</title>
