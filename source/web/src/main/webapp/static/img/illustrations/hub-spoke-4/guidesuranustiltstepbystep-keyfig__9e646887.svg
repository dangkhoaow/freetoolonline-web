<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-hubspoke4-b6ebd4-title svg-hubspoke4-b6ebd4-desc">
  <title id="svg-hubspoke4-b6ebd4-title">Uranus tilt key figures</title>
  <desc id="svg-hubspoke4-b6ebd4-desc">Uranus tilt key figures: axial tilt about 97.8 degrees, orbital period about 84 years, radius about 25,559 km, versus Earth obliquity of 23.44 degrees.</desc>
  <line x1="320" y1="180" x2="200" y2="48" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="456" y2="48" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="209" y2="322" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <line x1="320" y1="180" x2="456" y2="312" stroke="#5B73AE" stroke-width="3" stroke-linecap="round" aria-hidden="true"/>
  <rect x="16" y="16" width="184" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="48" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="50" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Axial tilt ~97.8</tspan><tspan x="50" dy="19">deg</tspan></text>
  <rect x="456" y="16" width="168" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="476" cy="48" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="490" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="490" dy="0">Orbital period</tspan><tspan x="490" dy="19">~84 yr</tspan></text>
  <rect x="16" y="299" width="193" height="45" rx="12" fill="#3C3C3E" aria-hidden="true"/>
  <circle cx="36" cy="322" r="8" fill="#5B73AE" aria-hidden="true"/>
  <text x="50" y="327" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="50" dy="0">Radius ~25,559 km</tspan></text>
  <rect x="456" y="280" width="168" height="64" rx="12" fill="#3C3C3E" aria-hidden="true"/>
