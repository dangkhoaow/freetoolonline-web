  <text x="490" y="308" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="500" fill="#FFFFFF"><tspan x="490" dy="0">vs Earth 23.44</tspan><tspan x="490" dy="19">deg</tspan></text>
  <rect x="244" y="153" width="152" height="54" rx="27" fill="#1C1C1E" stroke="#5B73AE" stroke-width="3" aria-hidden="true"/>
