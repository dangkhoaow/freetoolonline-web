<script>
    web.localUpload = false;
    var SPD_GAME_URL = 'https://gh-static.freetool.online/games/space-pi-defense/index.html';
    function spdStatus(text) {
        var el = document.getElementById('spdStatus');
        if (el) el.textContent = text;
    }
    function spdInjectFrame(stage) {
        var frame = document.createElement('iframe');
        frame.id = 'spdFrame';
        frame.src = SPD_GAME_URL;
        frame.title = 'Space Pi Defense game';
        frame.setAttribute('allow', 'fullscreen');
        frame.setAttribute('allowfullscreen', '');
        frame.addEventListener('load', function () {
            spdStatus('Game loaded. Click Play Game in the menu, then pick a level. Click-drag draws lines; Space pauses.');
            try { frame.contentWindow.focus(); } catch (e) {}
        });
        var launch = document.getElementById('spdLaunch');
        if (launch && launch.parentNode === stage) stage.removeChild(launch);
        stage.appendChild(frame);
        return frame;
    }
    function doAfterPageRendered() {
        var stage = document.getElementById('spdStage');
        var playBtn = document.getElementById('spdPlayBtn');
        if (!stage || !playBtn) return;
        var fsBtn = document.getElementById('spdFullscreenBtn');
        playBtn.addEventListener('click', function () {
            spdStatus('Loading the game (about 60 KB, one time - then cached)...');
            spdInjectFrame(stage);
            if (fsBtn) fsBtn.disabled = false;
        });
        if (fsBtn) fsBtn.addEventListener('click', function () {
            if (stage.requestFullscreen) stage.requestFullscreen();
            else if (stage.webkitRequestFullscreen) stage.webkitRequestFullscreen();
            var frame = document.getElementById('spdFrame');
            if (frame) { try { frame.contentWindow.focus(); } catch (e) {} }
        });
    }
</script>
