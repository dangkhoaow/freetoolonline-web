<div class="w3-container">
    <p>Choose an image, optionally click Read Metadata to confirm tags, then click Download Without Metadata for a clean JPEG.</p>
</div>

<style>
    #exifTool .exif-row { margin-bottom: 12px; }
    #exifTool .exif-preview {
        max-width: 100%; max-height: 240px; display: block; margin: 10px 0;
        border: 1px solid #cccccc; border-radius: 4px; background: #fafafa;
    }
    #exifTool .exif-gps-warn {
        display: none; margin: 12px 0; padding: 12px; border: 1px solid #c62828;
        background: #ffebee; border-radius: 4px;
    }
    #exifTool .exif-gps-warn.show { display: block; }
    #exifTool .exif-section { margin-top: 16px; }
    #exifTool table.exif-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    #exifTool table.exif-table th, #exifTool table.exif-table td {
        border: 1px solid #dddddd; padding: 6px 8px; text-align: left; vertical-align: top;
    }
    #exifTool table.exif-table th { width: 36%; background: #f5f5f5; }
    #exifTool .exif-status { font-family: monospace; min-height: 1.4em; margin-top: 8px; }
</style>

<div id="exifTool" class="w3-container">
    <div class="exif-row">
        <label class="w3-label" for="exifFile"><b>Image file</b></label>
        <input type="file" id="exifFile" class="w3-input w3-border" accept="image/*,.heic,.heif,.tif,.tiff">
    </div>
    <div class="exif-row">
        <button type="button" id="exifRead" class="w3-button w3-red" disabled>Read Metadata</button>
        <button type="button" id="exifClear" class="w3-button w3-light-grey" style="margin-left: 8px;">Clear</button>
        <button type="button" id="exifStrip" class="w3-button w3-light-grey" style="margin-left: 8px;" disabled>Download Without Metadata</button>
    </div>
    <img id="exifPreview" class="exif-preview" alt="Selected image preview" style="display:none;">
    <div id="exifGpsWarn" class="exif-gps-warn" role="alert">
        <b>This photo leaks your location.</b>
        <span id="exifGpsText"></span>
        <a id="exifMapLink" href="#" target="_blank" rel="noopener noreferrer" style="margin-left: 8px;">Open in OpenStreetMap</a>
    </div>
    <p id="exifStatus" class="exif-status" aria-live="polite">Choose an image, then click Read Metadata. Parsing stays in the browser.</p>
    <div id="exifSections"></div>
</div>
