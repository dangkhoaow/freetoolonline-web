<script>
    // Medieval Wall Defense launcher. Adapted from Real-Fruit-Snacks/Crownfall (MIT, 2026)
    // vendored at games/medieval-wall-defense/ in an isolated same-origin iframe.
    // Single-file Canvas incremental (~631 KB), zero runtime CDN after adaptation.
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    var MWD_GAME_URL = 'https://gh-static.freetool.online/games/medieval-wall-defense/index.html';

    function mwdStatus(text) {
        var el = document.getElementById('mwdStatus');
        if (el) el.textContent = text;
    }

    function mwdInjectFrame(stage) {
        var frame = document.createElement('iframe');
        frame.id = 'mwdFrame';
        frame.src = MWD_GAME_URL;
        frame.title = 'Medieval Wall Defense';
        frame.setAttribute('allow', 'fullscreen');
        frame.setAttribute('allowfullscreen', '');
        frame.addEventListener('load', function () {
            mwdStatus('Game loaded. Tap or click inside the game to begin your run.');
            try { frame.contentWindow.focus(); } catch (e) { }
        });
        var launch = document.getElementById('mwdLaunch');
        if (launch && launch.parentNode === stage) { stage.removeChild(launch); }
        stage.appendChild(frame);
        return frame;
    }

    function doAfterPageRendered() {
        var stage = document.getElementById('mwdStage');
        var playBtn = document.getElementById('mwdPlayBtn');
        if (!stage || !playBtn) return;

        var fsBtn = document.getElementById('mwdFullscreenBtn');
        playBtn.addEventListener('click', function () {
            mwdStatus('Loading the game (about 631 KB)...');
            mwdInjectFrame(stage);
            if (fsBtn) fsBtn.disabled = false;
        });

        if (fsBtn) fsBtn.addEventListener('click', function () {
            if (stage.requestFullscreen) { stage.requestFullscreen(); }
            else if (stage.webkitRequestFullscreen) { stage.webkitRequestFullscreen(); }
            var frame = document.getElementById('mwdFrame');
            if (frame) { try { frame.contentWindow.focus(); } catch (e) { } }
        });
    }
</script>
