<script>
    // 3D scene archetype skeleton (algol-eclipsing-binary) - vendored three.js
    // (ESM, dynamic import from /vendor/three/, NO CDN), fully client-side. Built
    // LEAN from the shared t3d* skeleton - ONE scene only (algol-eclipsing-binary).
    // All geometry is procedural.
    //
    // EDUCATIONAL APPROXIMATION, not a photometry pipeline or an orbit solver.
    // Two spheres (Algol A, hot primary; Algol B, cooler larger companion)
    // orbit a shared barycenter. A 2D canvas plots the synthesized light curve
    // (normalized flux vs orbital phase) matching the published magnitude dip.
    //
    // Published figures (AAVSO / nineplanets.org eclipsing-binary references,
    // cross-checked 2026-07-22):
    //   - Orbital period 2.867 days (2 d 20 h 49 min)
    //   - Magnitude 2.1 (normal) dipping to 3.4 at primary minimum
    //   - Primary (partial) eclipse duration about 10 hours
    //   - Distance about 90 light-years (28 parsecs)
    //   - Algol A: ~3.17 solar masses, ~2.73 solar radii, spectral type B8V
    //   - Algol B: ~0.70 solar masses, ~3.48 solar radii, spectral type K0IV
    //     (subgiant, overflows its Roche lobe - the "Algol paradox")
    //   - Discovery: variability noted 1600s (Montanari); eclipsing-binary
    //     hypothesis 1783 (Goodricke, Royal Society); confirmed spectroscopically
    //     1889 (Vogel)
    //   - Distinct from binary-star-system (orbital dynamics/barycenter, no
    //     eclipse light curve) and exoplanet-transit (single shallow planet dip)
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    var T3D_SLUG = 'algol-eclipsing-binary';
    var T3D_STORE_KEY = 'ftol-game-' + T3D_SLUG;

    function t3dDetectScene(slug) { return 'algoleclipsingbinary'; }

    function ftoLoadThree() {
        if (window.__ftoThreePromise) { return window.__ftoThreePromise; }
        var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/three';
        window.__ftoThreePromise = import(base + '/three.module.min.js').then(function (mod) {
            if (!mod || !mod.WebGLRenderer) { throw new Error('three.js loaded but WebGLRenderer is missing'); }
            return mod;
        });
        return window.__ftoThreePromise;
    }

    function t3dStatus(text) {
        var el = document.getElementById('t3dStatus');
        if (el) el.textContent = text;
    }
    function t3dInfo(html) {
        var el = document.getElementById('t3dInfoPanel');
        if (el) el.innerHTML = html;
    }
    function t3dLoadStore() {
        try { return JSON.parse(localStorage.getItem(T3D_STORE_KEY) || '{}') || {}; }
        catch (e) { return {}; }
    }
    function t3dSaveStore(obj) {
        try { localStorage.setItem(T3D_STORE_KEY, JSON.stringify(obj)); }
        catch (e) { t3dStatus('Could not save to browser storage (quota or private mode) - explorer still works.'); }
    }
    function t3dFullscreen(el) {
        if (el.requestFullscreen) { el.requestFullscreen(); }
        else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
        else if (el.mozRequestFullScreen) { el.mozRequestFullScreen(); }
        else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
    }

    function t3dShell(THREE, host, opts) {
        var coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        var low = coarse || ((navigator.hardwareConcurrency || 4) <= 4);
        var renderer = new THREE.WebGLRenderer({ antialias: !low, powerPreference: 'default' });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(opts.fov || 55, 1, 0.1, 4000);
        var orbit = {
            target: new THREE.Vector3(0, opts.targetY || 0, 0),
            radius: opts.radius, theta: opts.theta || 0.6, phi: opts.phi || 1.15,
            goalRadius: opts.radius, goalTheta: opts.theta || 0.6, goalPhi: opts.phi || 1.15,
            minR: opts.minR || 4, maxR: opts.maxR || 400,
        };
        function applyCamera() {
            orbit.theta += (orbit.goalTheta - orbit.theta) * 0.14;
            orbit.phi += (orbit.goalPhi - orbit.phi) * 0.14;
            orbit.radius += (orbit.goalRadius - orbit.radius) * 0.14;
            var sp = Math.sin(orbit.phi), cp = Math.cos(orbit.phi);
            camera.position.set(
                orbit.target.x + orbit.radius * sp * Math.sin(orbit.theta),
                orbit.target.y + orbit.radius * cp,
                orbit.target.z + orbit.radius * sp * Math.cos(orbit.theta)
            );
            camera.lookAt(orbit.target);
        }
        host.innerHTML = '';
        host.appendChild(renderer.domElement);
        function resize() {
            var w = host.clientWidth || 320, h = Math.max(220, Math.round(w * 0.62));
            renderer.setSize(w, h, false);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        resize();
        window.addEventListener('resize', resize);
        if (typeof ResizeObserver === 'function') { new ResizeObserver(resize).observe(host); }
        var dragging = false, lastX = 0, lastY = 0;
        host.addEventListener('pointerdown', function (e) {
            dragging = true; lastX = e.clientX; lastY = e.clientY;
            try { host.setPointerCapture(e.pointerId); } catch (err) {}
        });
        host.addEventListener('pointerup', function () { dragging = false; });
        host.addEventListener('pointercancel', function () { dragging = false; });
        host.addEventListener('pointermove', function (e) {
            if (!dragging) return;
            var dx = e.clientX - lastX, dy = e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            orbit.goalTheta -= dx * 0.005;
            orbit.goalPhi = Math.max(0.2, Math.min(Math.PI - 0.2, orbit.goalPhi + dy * 0.005));
        });
        host.addEventListener('wheel', function (e) {
            e.preventDefault();
            orbit.goalRadius = Math.max(orbit.minR, Math.min(orbit.maxR, orbit.goalRadius * (e.deltaY > 0 ? 1.08 : 0.92)));
        }, { passive: false });
        return { THREE: THREE, scene: scene, camera: camera, renderer: renderer, orbit: orbit, applyCamera: applyCamera, low: low, resize: resize };
    }

    // Published figures (see header comment for sources).
    var T3D_ALGOL_PERIOD_D = 2.867;
    var T3D_ALGOL_MAG_MAX = 2.1;
    var T3D_ALGOL_MAG_MIN = 3.4;
    var T3D_ALGOL_ECLIPSE_HOURS = 10;
    var T3D_ALGOL_DIST_LY = 90;
    var T3D_ALGOL_A_MASS = 3.17, T3D_ALGOL_A_RADIUS = 2.73;
    var T3D_ALGOL_B_MASS = 0.70, T3D_ALGOL_B_RADIUS = 3.48;

    // Normalized flux model: baseline 1.0, primary dip at phase 0 matches the
    // published 2.1->3.4 magnitude drop; secondary dip at phase 0.5 is a shallow
    // qualitative approximation (real secondary minimum is detectable only with
    // precise photometry, not a widely-published single figure).
    var T3D_ALGOL_PRIMARY_DEPTH = 1 - Math.pow(10, -(T3D_ALGOL_MAG_MIN - T3D_ALGOL_MAG_MAX) / 2.5);
    var T3D_ALGOL_SECONDARY_DEPTH = 0.10;
    var T3D_ALGOL_HALF_WIDTH = 0.075;
    function t3dAlgolEclipseFactor(dist, halfWidth) {
        var x = Math.min(1, Math.abs(dist) / halfWidth);
        return 0.5 * (1 + Math.cos(x * Math.PI));
    }
    function t3dAlgolFlux(phase) {
        var p = ((phase % 1) + 1) % 1;
        var dPrimary = Math.min(p, 1 - p);
        var dSecondary = Math.abs(p - 0.5);
        var primary = t3dAlgolEclipseFactor(dPrimary, T3D_ALGOL_HALF_WIDTH) * T3D_ALGOL_PRIMARY_DEPTH;
        var secondary = t3dAlgolEclipseFactor(dSecondary, T3D_ALGOL_HALF_WIDTH) * T3D_ALGOL_SECONDARY_DEPTH;
        return Math.max(0.05, 1 - primary - secondary);
    }
    function t3dAlgolEclipseLabel(phase) {
        var p = ((phase % 1) + 1) % 1;
        var dPrimary = Math.min(p, 1 - p);
        var dSecondary = Math.abs(p - 0.5);
        if (dPrimary < T3D_ALGOL_HALF_WIDTH) return 'Primary eclipse - Algol B in front of Algol A';
        if (dSecondary < T3D_ALGOL_HALF_WIDTH) return 'Secondary eclipse - Algol A in front of Algol B';
        return 'Out of eclipse - normal combined brightness';
    }

    function t3dAlgolDrawCurve(canvas, phase) {
        if (!canvas || !canvas.getContext) return;
        var dpr = Math.min(window.devicePixelRatio || 1, 2);
        var cssW = canvas.clientWidth || 320, cssH = canvas.clientHeight || 120;
        if (canvas.width !== Math.round(cssW * dpr) || canvas.height !== Math.round(cssH * dpr)) {
            canvas.width = Math.round(cssW * dpr);
            canvas.height = Math.round(cssH * dpr);
        }
        var ctx = canvas.getContext('2d');
        var w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#0a0e14';
        ctx.fillRect(0, 0, w, h);
        var padTop = 10 * dpr, padBottom = 14 * dpr, plotH = h - padTop - padBottom;
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth = Math.max(1, 1.4 * dpr);
        ctx.beginPath();
        var N = 240;
        for (var i = 0; i <= N; i++) {
            var p = i / N;
            var flux = t3dAlgolFlux(p);
            var x = p * w;
            var y = padTop + (1 - flux) * plotH;
            if (i === 0) { ctx.moveTo(x, y); } else { ctx.lineTo(x, y); }
        }
        ctx.stroke();
        var cx = ((phase % 1) + 1) % 1 * w;
        var cy = padTop + (1 - t3dAlgolFlux(phase)) * plotH;
        ctx.strokeStyle = 'rgba(255,193,7,0.55)';
        ctx.lineWidth = Math.max(1, 1.2 * dpr);
        ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();
        ctx.fillStyle = '#ffc107';
        ctx.beginPath(); ctx.arc(cx, cy, Math.max(2.5, 3.2 * dpr), 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = (11 * dpr) + 'px sans-serif';
        ctx.fillText('Light curve: relative brightness over one 2.867-day orbit', 6 * dpr, 12 * dpr);
    }

    function t3dAlgolEclipsingBinary(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03040a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.15));

        // Background starfield (matches the black-hole/galaxy scene convention) -
        // purely decorative context, not part of the eclipsing-binary geometry.
        var SCOUNT = shell.low ? 500 : 900;
        var spos = new Float32Array(SCOUNT * 3);
        for (var s = 0; s < SCOUNT; s++) {
            var v = new THREE.Vector3().randomDirection().multiplyScalar(30 + Math.random() * 60);
            spos[s * 3] = v.x; spos[s * 3 + 1] = v.y; spos[s * 3 + 2] = v.z;
        }
        var sgeo = new THREE.BufferGeometry();
        sgeo.setAttribute('position', new THREE.BufferAttribute(spos, 3));
        scene.add(new THREE.Points(sgeo, new THREE.PointsMaterial({ color: 0xcfd8dc, size: 0.35, sizeAttenuation: false })));

        var SEP = 3.2;
        var totalMass = T3D_ALGOL_A_MASS + T3D_ALGOL_B_MASS;
        var rA = SEP * (T3D_ALGOL_B_MASS / totalMass);
        var rB = SEP * (T3D_ALGOL_A_MASS / totalMass);

        var starA = new THREE.Mesh(
            new THREE.SphereGeometry(0.42, shell.low ? 18 : 30, shell.low ? 14 : 22),
            new THREE.MeshBasicMaterial({ color: 0xbfd7ff })
        );
        scene.add(starA);
        var glowA = new THREE.Mesh(
            new THREE.SphereGeometry(0.52, shell.low ? 14 : 20, shell.low ? 10 : 16),
            new THREE.MeshBasicMaterial({ color: 0x9fc5ff, transparent: true, opacity: 0.18, depthWrite: false })
        );
        starA.add(glowA);

        var starB = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, shell.low ? 18 : 30, shell.low ? 14 : 22),
            new THREE.MeshBasicMaterial({ color: 0xffab66 })
        );
        scene.add(starB);
        var glowB = new THREE.Mesh(
            new THREE.SphereGeometry(0.68, shell.low ? 14 : 20, shell.low ? 10 : 16),
            new THREE.MeshBasicMaterial({ color: 0xff8a3c, transparent: true, opacity: 0.16, depthWrite: false })
        );
        starB.add(glowB);

        var barycenter = new THREE.Mesh(
            new THREE.SphereGeometry(0.04, 8, 6),
            new THREE.MeshBasicMaterial({ color: 0x666666 })
        );
        scene.add(barycenter);

        var orbitLine = new THREE.Group();
        var ringA = new THREE.Mesh(new THREE.TorusGeometry(rA, 0.008, 6, 72), new THREE.MeshBasicMaterial({ color: 0x334455, transparent: true, opacity: 0.5 }));
        ringA.rotation.x = Math.PI / 2;
        var ringB = new THREE.Mesh(new THREE.TorusGeometry(rB, 0.008, 6, 72), new THREE.MeshBasicMaterial({ color: 0x442d22, transparent: true, opacity: 0.5 }));
        ringB.rotation.x = Math.PI / 2;
        orbitLine.add(ringA); orbitLine.add(ringB);
        scene.add(orbitLine);

        var phase = 0, playing = false, viewMode = 'eclipse';
        var curveCanvas = document.getElementById('t3dAlgolCurve');

        function facts() {
            var period = T3D_ALGOL_PERIOD_D;
            var status = t3dAlgolEclipseLabel(phase);
            return '<h3>' + status + '</h3>' +
                '<p>Scrub the phase slider or press Play to run one full ' + period + '-day orbit. The light curve below plots relative brightness; it dips deepest at the primary eclipse and only slightly at the secondary eclipse.</p>' +
                '<table class="w3-table w3-bordered"><tr><td>Orbital period</td><td>' + period + ' days</td></tr>' +
                '<tr><td>Magnitude range</td><td>' + T3D_ALGOL_MAG_MAX + ' to ' + T3D_ALGOL_MAG_MIN + '</td></tr>' +
                '<tr><td>Primary eclipse duration</td><td>about ' + T3D_ALGOL_ECLIPSE_HOURS + ' hours</td></tr>' +
                '<tr><td>Distance</td><td>about ' + T3D_ALGOL_DIST_LY + ' light-years</td></tr>' +
                '<tr><td>Algol A</td><td>~' + T3D_ALGOL_A_MASS + ' solar masses, ~' + T3D_ALGOL_A_RADIUS + ' solar radii, B8V</td></tr>' +
                '<tr><td>Algol B</td><td>~' + T3D_ALGOL_B_MASS + ' solar masses, ~' + T3D_ALGOL_B_RADIUS + ' solar radii, K0IV</td></tr></table>' +
                '<p class="t3d-note">Educational approximation - star sizes, orbit separation, and the light-curve shape are simplified for teaching, not a photometry pipeline or tonight\'s sky.</p>';
        }

        function applyView() {
            var eclipseBtn = document.getElementById('t3dAlgolViewBtn');
            if (viewMode === 'eclipse') {
                shell.orbit.goalTheta = 0; shell.orbit.goalPhi = 1.48;
                if (eclipseBtn) eclipseBtn.textContent = 'Top view';
            } else {
                shell.orbit.goalTheta = 0; shell.orbit.goalPhi = 0.35;
                if (eclipseBtn) eclipseBtn.textContent = 'Eclipse view';
            }
        }

        function setPhase(p) {
            phase = ((p % 1) + 1) % 1;
            var angle = phase * Math.PI * 2;
            starA.position.set(-rA * Math.sin(angle), 0, -rA * Math.cos(angle));
            starB.position.set(rB * Math.sin(angle), 0, rB * Math.cos(angle));
            var slider = document.getElementById('t3dAlgolPhase');
            var label = document.getElementById('t3dAlgolPhaseLabel');
            if (slider) slider.value = String(Math.round(phase * 100));
            if (label) label.textContent = 'Phase ' + Math.round(phase * 100) + '%';
            t3dInfo(facts());
            t3dAlgolDrawCurve(curveCanvas, phase);
            try { t3dSaveStore({ viewMode: viewMode }); } catch (e) {}
        }

        var store = t3dLoadStore();
        if (store.viewMode === 'top' || store.viewMode === 'eclipse') viewMode = store.viewMode;
        applyView();
        setPhase(0.02);

        var playBtn = document.getElementById('t3dAlgolPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause orbit' : 'Play orbit';
        });
        var slider = document.getElementById('t3dAlgolPhase');
        if (slider) slider.addEventListener('input', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play orbit';
            setPhase(parseFloat(slider.value || '0') / 100);
        });
        var viewBtn = document.getElementById('t3dAlgolViewBtn');
        if (viewBtn) viewBtn.addEventListener('click', function () {
            viewMode = viewMode === 'eclipse' ? 'top' : 'eclipse';
            applyView();
            setPhase(phase);
        });
        window.addEventListener('resize', function () { t3dAlgolDrawCurve(curveCanvas, phase); });

        t3dStatus('Drag to orbit, scroll to zoom. Scrub the phase slider, press Play orbit, or switch views.');
        return function animate(dt) {
            if (playing) { setPhase(phase + (dt / 1000) * 0.05); if (phase >= 1) phase = 0; }
        };
    }

    function doAfterPageRendered() {
        var host = document.getElementById('t3dCanvasHost');
        var root = document.getElementById('threeSceneTool');
        if (!host || !root) return;
        var wrapper = document.getElementById('t3dWrapper') || root;
        var kind = t3dDetectScene(T3D_SLUG);
        var rows = { algoleclipsingbinary: 't3dAlgolControls' };
        for (var k in rows) {
            var el = document.getElementById(rows[k]);
            if (el) el.style.display = (k === kind) ? '' : 'none';
        }
        var fsBtn = document.getElementById('t3dFullscreenBtn');
        if (fsBtn) fsBtn.addEventListener('click', function () { t3dFullscreen(wrapper); });
        t3dStatus('Loading the 3D engine (about 0.7 MB, one time - then cached)...');
        function boot() {
            ftoLoadThree().then(function (THREE) {
                try {
                    var presets = { algoleclipsingbinary: { radius: 8.5, maxR: 26, minR: 3, phi: 1.48, theta: 0, targetY: 0 } };
                    var shell = t3dShell(THREE, host, presets[kind]);
                    var animate = t3dAlgolEclipsingBinary(shell);
                    var last = performance.now();
                    shell.renderer.setAnimationLoop(function () {
                        var now = performance.now();
                        var dt = Math.min(now - last, 100);
                        last = now;
                        animate(dt);
                        shell.applyCamera();
                        shell.renderer.render(shell.scene, shell.camera);
                    });
                } catch (err) {
                    t3dStatus('This page needs WebGL to render the 3D scene. Your browser or device has it disabled - the facts panel below still works. (' + (err && err.message ? err.message : err) + ')');
                }
            }).catch(function (err) {
                t3dStatus('Could not load the 3D engine: ' + (err && err.message ? err.message : err));
            });
        }
        if ('requestIdleCallback' in window) { requestIdleCallback(boot, { timeout: 2500 }); }
        else { setTimeout(boot, 300); }
    }
</script>
