<div class="w3-container">
    <p>Choose a source, click Start to record, then Stop to save the clip. Recording runs entirely in your browser - nothing is uploaded. Turn on the optional face blur to hide faces while a camera or screen records, and convert the finished clip to MP4 without leaving the page.</p>
</div>

<style>
    #mrTool .mr-row { margin-bottom: 14px; }
    #mrTool label.mr-label { font-weight: bold; display: block; margin-bottom: 4px; }
    #mrTool .w3-button { margin-right: 6px; }
    #mrTimer { font-family: monospace; font-size: 1.4em; vertical-align: middle; }
    #mrPreview { max-width: 100%; background: #000000; display: none; }
    #mrError { color: #b00020; }
    #mrFaceBlurRow .mr-blur-strength { display: inline-block; margin-left: 18px; }
    #mrBlurIntensity { max-width: 90px; display: inline-block; }
    #mrConvertStatus { display: inline-block; margin-left: 10px; vertical-align: middle; }
    #mrOutput { margin-top: 12px; min-height: 40px; }
    #mrOutput video, #mrOutput audio { margin-top: 8px; }
</style>

<div id="mrTool" class="w3-container">
    <div class="mr-row">
        <label class="mr-label" for="mrSource">Source</label>
        <select id="mrSource" class="w3-select w3-border" style="max-width:320px;">
            <option value="camera">Camera (video only)</option>
            <option value="camera-mic">Camera + microphone</option>
            <option value="mic">Microphone only</option>
            <option value="screen">Screen</option>
        </select>
    </div>
    <div id="mrFaceBlurRow" class="mr-row">
        <label>
            <input class="w3-check" type="checkbox" id="mrFaceBlur" style="float: left;margin-right: 5px;margin-top: -6px;">Blur faces while recording (camera or screen). Detected faces are blurred on the device before the recorder sees the frame.
        </label>
        <span class="mr-blur-strength">
            <label class="mr-label" for="mrBlurIntensity" style="display:inline;font-weight:normal;">Blur strength</label>
            <select id="mrBlurIntensity" class="w3-select w3-border">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5" selected>5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
            </select>
        </span>
    </div>
    <div class="mr-row">
        <button type="button" id="mrStart" class="w3-button w3-blue">Start recording</button>
        <button type="button" id="mrPause" class="w3-button w3-amber" disabled>Pause</button>
        <button type="button" id="mrStop" class="w3-button w3-red" disabled>Stop</button>
        <span id="mrTimer">00:00</span>
    </div>
    <div class="mr-row">
        <video id="mrPreview" autoplay playsinline muted></video>
    </div>
    <div id="mrError" class="mr-row" style="display:none;" aria-live="polite"></div>
    <div id="mrOutput" class="mr-row outputImgs" aria-live="polite"></div>
    <div class="mr-row">
        <button type="button" id="mrConvertMp4" class="w3-button w3-green" style="display:none;">Convert to MP4</button>
        <span id="mrConvertStatus" style="display:none;" aria-live="polite"></span>
    </div>
</div>
