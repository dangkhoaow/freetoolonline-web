<script>
    // Expense tracker - localStorage-backed list of amount entries, fully in-browser.
    // Built on the list_tracker_localstorage skeleton (bodyjs-skeletons/list-localstorage.template.html)
    // with an added numeric "amount" field per entry + a running total, so this
    // page genuinely tracks spending rather than acting as a plain checklist.
    // The shared skeleton file itself is left untouched - this per-slug copy is
    // the only file with the amount/total behavior.
    //
    // What it does on the client:
    //   - Reads a description + an amount from two inputs; Add button or Enter
    //     on either field appends an entry.
    //   - An empty description, or an amount that is missing/not-a-number/negative,
    //     renders an inline validation message next to the inputs (never throws).
    //   - Each entry has a checkbox (mark as reviewed) and a delete button.
    //   - The list persists in localStorage under a per-slug key, so it
    //     survives a page reload. Clearing this site's browser data removes it.
    //   - A running total (sum of every entry's amount) renders above the list,
    //     recalculated on every add/delete.
    //
    // This tool processes everything in the browser, so the upload widget is
    // disabled. The framework calls doAfterPageRendered() during page startup
    // (it fires for EVERY page once jQuery + base-script load). Do NOT call
    // $(...) at the top level of this inline script: `$` is only defined inside
    // the deferred hook.

    web.localUpload = false;

    var LIST_STORAGE_KEY = 'ftol-list-expense-tracker';
    var listItems = [];

    function listEscapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function listFormatAmount(n) {
        var v = Number(n);
        if (!isFinite(v)) v = 0;
        return v.toFixed(2);
    }

    function listLoad() {
        try {
            var raw = localStorage.getItem(LIST_STORAGE_KEY);
            if (!raw) { listItems = []; return; }
            var parsed = JSON.parse(raw);
            listItems = Array.isArray(parsed) ? parsed : [];
            for (var i = 0; i < listItems.length; i++) {
                var a = Number(listItems[i].amount);
                listItems[i].amount = isFinite(a) ? a : 0;
            }
        } catch (e) {
            // Corrupt / unparseable storage - start clean rather than throw.
            listItems = [];
        }
    }

    function listSave() {
        try { localStorage.setItem(LIST_STORAGE_KEY, JSON.stringify(listItems)); }
        catch (e) { /* storage full or blocked - the in-memory list still works this session */ }
    }

    function listMakeId() {
        // No Date.now()/Math.random() dependency for the id beyond the wall
        // clock; collisions across a single session are avoided with a counter.
        return 'i' + (Date.now()).toString(36) + '-' + (listItems.length + 1);
    }

    function listRender() {
        var $items = $('#listItems');
        var $empty = $('#listEmpty');
        var $count = $('#listCount');
        var $total = $('#listTotal');
        if ($items.length === 0) return;

        $items.empty();
        if (!listItems.length) {
            $empty.show();
            $count.text('');
            $total.text('Total spent: $0.00');
            return;
        }
        $empty.hide();

        var remaining = 0;
        var totalAll = 0;
        for (var i = 0; i < listItems.length; i++) {
            var it = listItems[i];
            totalAll += Number(it.amount) || 0;
            if (!it.done) remaining++;
            var doneCls = it.done ? ' list-item-done' : '';
            var checked = it.done ? ' checked' : '';
            $items.append(
                '<li class="list-item' + doneCls + '" data-id="' + listEscapeHtml(it.id) + '">' +
                    '<label class="list-item-main">' +
                        '<input type="checkbox" class="list-item-toggle"' + checked + ' /> ' +
                        '<span class="list-item-text">' + listEscapeHtml(it.text) + '</span>' +
                        '<span class="list-item-amount">$' + listFormatAmount(it.amount) + '</span>' +
                    '</label>' +
                    '<button type="button" class="w3-button w3-small w3-light-grey list-item-delete" ' +
                        'aria-label="Delete entry">Delete</button>' +
                '</li>'
            );
        }
        $count.text(listItems.length + ' entr' + (listItems.length === 1 ? 'y' : 'ies') +
            ', ' + remaining + ' not yet reviewed');
        $total.text('Total spent: $' + listFormatAmount(totalAll));
    }

    function listAdd() {
        var $input = $('#listInput');
        var $amount = $('#listAmountInput');
        var $err = $('#listError');
        var text = ($input.val() || '').trim();
        var amountRaw = ($amount.val() || '').trim();
        var amount = parseFloat(amountRaw);

        if (!text) {
            $err.text('Describe the expense before adding it.');
            return;
        }
        if (amountRaw === '' || !isFinite(amount) || amount < 0) {
            $err.text('Enter an amount of 0 or more (e.g. 4.50).');
            return;
        }
        $err.text('');
        listItems.unshift({ id: listMakeId(), text: text, amount: amount, done: false, createdAt: Date.now() });
        listSave();
        listRender();
        $input.val('');
        $amount.val('');
        $input.focus();
    }

    function listToggle(id) {
        for (var i = 0; i < listItems.length; i++) {
            if (listItems[i].id === id) { listItems[i].done = !listItems[i].done; break; }
        }
        listSave();
        listRender();
    }

    function listDelete(id) {
        listItems = listItems.filter(function (it) { return it.id !== id; });
        listSave();
        listRender();
    }

    // Export / import JSON (wf-a3a5c02d): browser storage is a CACHE, not a
    // guaranteed database - Safari evicts localStorage aggressively - so the
    // user must be able to back up + restore their list to a file. No upload.
    function listExport() {
        try {
            var blob = new Blob([JSON.stringify(listItems, null, 2)], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = 'expense-tracker-backup.json';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
        } catch (e) { /* nothing to export */ }
    }

    function listImport(file) {
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function () {
            try {
                var parsed = JSON.parse(reader.result);
                if (!Array.isArray(parsed)) throw new Error('not a list');
                // Merge by id (imported wins), keeping existing items not in the file.
                var byId = {};
                listItems.concat(parsed).forEach(function (it) {
                    if (it && typeof it.text === 'string') {
                        var amt = Number(it.amount);
                        byId[it.id || listMakeId()] = {
                            id: it.id || listMakeId(),
                            text: it.text,
                            amount: isFinite(amt) ? amt : 0,
                            done: !!it.done,
                            createdAt: it.createdAt || Date.now()
                        };
                    }
                });
                listItems = Object.keys(byId).map(function (k) { return byId[k]; });
                listSave(); listRender();
                var $err = $('#listError'); if ($err.length) $err.text('Imported ' + parsed.length + ' entr' + (parsed.length === 1 ? 'y' : 'ies') + '.');
            } catch (e) {
                var $e2 = $('#listError'); if ($e2.length) $e2.text('That file is not a valid expense backup.');
            }
        };
        reader.readAsText(file);
    }

    function initList() {
        if ($('#listInput').length === 0) return; // not a list page
        listLoad();
        listRender();

        $('#listAddBtn').off('click.list').on('click.list', listAdd);
        $('#listInput').off('keydown.list').on('keydown.list', function (e) {
            if (e.key === 'Enter' || e.which === 13) { e.preventDefault(); listAdd(); }
        });
        $('#listAmountInput').off('keydown.list').on('keydown.list', function (e) {
            if (e.key === 'Enter' || e.which === 13) { e.preventDefault(); listAdd(); }
        });
        // Delegated handlers so they survive re-render.
        $('#listItems').off('change.list', '.list-item-toggle')
            .on('change.list', '.list-item-toggle', function () {
                var id = $(this).closest('.list-item').attr('data-id');
                listToggle(id);
            });
        $('#listItems').off('click.list', '.list-item-delete')
            .on('click.list', '.list-item-delete', function () {
                var id = $(this).closest('.list-item').attr('data-id');
                listDelete(id);
            });
        // Export / import backup (present only when the BODYHTML includes them).
        $('#listExport').off('click.list').on('click.list', listExport);
        $('#listImport').off('change.list').on('change.list', function () {
            if (this.files && this.files[0]) listImport(this.files[0]);
            this.value = '';
        });
    }

    function doAfterPageRendered() {
        initList();
    }
</script>
