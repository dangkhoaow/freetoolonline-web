<div class='w3-container'>
    <div class='w3-row outputImgs' style="display:none">
        <div class="w3-col m2 col1"></div>
        <div class="w3-col m2 col2"></div>
        <div class="w3-col m2 col3"></div>
        <div class="w3-col m2 col4"></div>
        <div class="w3-col m2 col5"></div>
        <div class="w3-col m2 col6"></div>
    </div>
</div>

<div class="w3-container w3-padding-small">
    <div class="w3-row">
        <div class="w3-col m3 l2 w3-container" style="padding-left:0">
            <label class="w3-small w3-text-grey">Language</label>
            <select class="w3-select w3-border" id="ceLang">
                <option value="javascript" selected="selected">JavaScript</option>
                <option value="typescript">TypeScript</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="json">JSON</option>
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="csharp">C#</option>
                <option value="cpp">C++</option>
                <option value="php">PHP</option>
                <option value="ruby">Ruby</option>
                <option value="go">Go</option>
                <option value="rust">Rust</option>
                <option value="sql">SQL</option>
                <option value="markdown">Markdown</option>
                <option value="yaml">YAML</option>
                <option value="xml">XML</option>
                <option value="shell">Shell/Bash</option>
            </select>
        </div>
        <div class="w3-col m3 l2 w3-container">
            <label class="w3-small w3-text-grey">Theme</label>
            <select class="w3-select w3-border" id="ceTheme">
                <option value="vs-dark" selected="selected">Dark</option>
                <option value="vs">Light</option>
                <option value="hc-black">High Contrast Dark</option>
                <option value="hc-light">High Contrast Light</option>
            </select>
        </div>
        <div class="w3-col m4 l4 w3-container">
            <label class="w3-small w3-text-grey">Open a file from your device</label>
            <input type="file" id="ceFile" class="w3-input w3-border" accept=".js,.jsx,.mjs,.ts,.tsx,.html,.htm,.css,.json,.py,.java,.cs,.cpp,.cc,.h,.php,.rb,.go,.rs,.sql,.md,.markdown,.yml,.yaml,.xml,.sh,.bash,.txt"/>
        </div>
        <div class="w3-col m2 l4 w3-container">
            <label class="w3-small w3-text-grey">&nbsp;</label>
            <button type="button" id="ceSaveBtn" class="w3-button w3-blue w3-block">Save / Download</button>
        </div>
    </div>

    <p>
        <button type="button" id="ceLaunch" class="w3-button w3-green w3-large">Launch editor</button>
        <span id="ceStatus" class="w3-small w3-text-grey w3-margin-left"></span>
    </p>

    <div id="ceEditor" style="height:480px;border:1px solid #dddddd;border-radius:4px;overflow:hidden">
        <div class="w3-center w3-text-grey w3-padding-64">Click <b>Launch editor</b> to load the in-browser editor (one-time download, runs entirely on your device).</div>
    </div>

    <div class="w3-row w3-margin-top">
        <div class="w3-col m4 l3 w3-container" style="padding-left:0">
            <label class="w3-small w3-text-grey">Snippet name</label>
            <input type="text" id="ceSnippetName" class="w3-input w3-border" placeholder="my-snippet"/>
        </div>
        <div class="w3-col m4 l3 w3-container">
            <label class="w3-small w3-text-grey">&nbsp;</label>
            <button type="button" id="ceSaveSnippetBtn" class="w3-button w3-teal w3-block">Save snippet to this browser</button>
        </div>
        <div class="w3-col m4 l3 w3-container">
            <label class="w3-small w3-text-grey">Load a saved snippet</label>
            <select class="w3-select w3-border" id="ceSnippetList"></select>
        </div>
    </div>
    <p class="w3-small w3-text-grey">Snippets are stored only in this browser (localStorage). Nothing is uploaded.</p>
</div>
