<script>
    // Self-contained IN-BROWSER OCR (image-to-text-ocr) - Tesseract.js (WASM), ZERO upload.
    // Reads a chosen image entirely in this browser tab, runs OCR via the
    // self-hosted /vendor/tesseract engine, and renders the recognized text for
    // copy/download. No server, no upload - mirrors the /vendor/pdf-lib and
    // /vendor/ffmpeg lazy-load pattern the existing in-browser tools already use.
    //
    // NOT implemented (anti-claims, must be in tool-<slug>/SKILL.md ## NOT implemented):
    //   - Recognizes one language at a time (English by default); does not
    //     auto-detect the image's language.
    //   - Not reliable on handwriting - trained for printed text.
    //   - Output is plain text only - no preserved layout/columns/fonts, no
    //     bounding boxes.
    //   - First run on a device downloads the OCR engine + language data (a few
    //     megabytes) - later runs on that device are faster (browser-cached).

    function ftoLoadTesseract() {
        if (window.Tesseract && window.Tesseract.createWorker) { return Promise.resolve(); }
        if (window.__ftoTesseractPromise) { return window.__ftoTesseractPromise; }
        var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/tesseract';
        var url = base + '/tesseract.min.js';
        window.__ftoTesseractPromise = new Promise(function (resolve, reject) {
            var s = document.createElement('script');
            s.src = url; s.async = true;
            s.onload = function () {
                (window.Tesseract && window.Tesseract.createWorker)
                    ? resolve()
                    : reject(new Error('tesseract.js loaded but Tesseract global is missing'));
            };
            s.onerror = function () { reject(new Error('failed to load tesseract.js from ' + url)); };
            document.head.appendChild(s);
        });
        return window.__ftoTesseractPromise;
    }

    function doAfterPageRendered() {
        var fileEl = document.getElementById('ocrFile');
        var previewEl = document.getElementById('ocrPreview');
        var runBtn = document.getElementById('ocrRunBtn');
        var statusEl = document.getElementById('ocrStatus');
        var errEl = document.getElementById('ocrError');
        var outputWrap = document.getElementById('ocrOutputWrap');
        var outputEl = document.getElementById('ocrOutput');
        var copyBtn = document.getElementById('ocrCopyBtn');
        var dl = document.getElementById('ocrDownload');
        if (!fileEl || !runBtn || !outputEl) { return; }   // not the image-to-text-ocr page

        var sharedWorker = null;   // reused across recognitions on this page view
        var previewUrl = null;

        function setStatus(m) { if (statusEl) { statusEl.textContent = m || ''; } }
        function setErr(m) { if (errEl) { errEl.textContent = m || ''; } }

        fileEl.addEventListener('change', function () {
            setErr(''); setStatus('');
            if (outputWrap) { outputWrap.style.display = 'none'; }
            if (previewUrl) { URL.revokeObjectURL(previewUrl); previewUrl = null; }
            var f = fileEl.files && fileEl.files[0];
            if (!f || !previewEl) { return; }
            previewUrl = URL.createObjectURL(f);
            previewEl.src = previewUrl;
            previewEl.style.display = '';
        });

        runBtn.addEventListener('click', function () {
            setErr(''); setStatus('');
            if (outputWrap) { outputWrap.style.display = 'none'; }
            var f = fileEl.files && fileEl.files[0];
            if (!f) { setErr('Choose an image first.'); return; }
            runBtn.disabled = true;
            setStatus('Loading the OCR engine in your browser (first run on this device downloads a few megabytes) ...');
            var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/tesseract';
            ftoLoadTesseract()
                .then(function () {
                    if (sharedWorker) { return sharedWorker; }
                    return window.Tesseract.createWorker('eng', 1, {
                        workerPath: base + '/worker.min.js',
                        corePath: base,
                        langPath: base,
                        logger: function (m) {
                            if (!m || !m.status) { return; }
                            var pct = (typeof m.progress === 'number') ? ' (' + Math.round(m.progress * 100) + '%)' : '';
                            setStatus(m.status.replace(/-/g, ' ') + pct + ' ...');
                        },
                    }).then(function (w) { sharedWorker = w; return w; });
                })
                .then(function (worker) {
                    setStatus('Recognizing text ...');
                    return worker.recognize(f);
                })
                .then(function (result) {
                    var text = (result && result.data && result.data.text) ? result.data.text : '';
                    outputEl.value = text;
                    if (outputWrap) { outputWrap.style.display = ''; }
                    setStatus(text.trim()
                        ? 'Done in your browser - no upload. Review the text below (OCR is not perfect - check names, numbers, and punctuation).'
                        : 'No text was recognized in this image. Try a clearer, higher-contrast photo of printed text.');
                })
                .catch(function (err) {
                    setErr('Could not recognize text: ' + (err && err.message ? err.message : 'unknown error') + '.');
                })
                .then(function () { runBtn.disabled = false; });
        });

        if (copyBtn) {
            copyBtn.addEventListener('click', function () {
                try { navigator.clipboard.writeText(outputEl.value || ''); } catch (e) { void e; }
                var prev = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(function () { copyBtn.textContent = prev; }, 1200);
            });
        }

        if (dl) {
            dl.addEventListener('click', function () {
                var blob = new Blob([outputEl.value || ''], { type: 'text/plain' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'recognized-text-' + (typeof getCurrentDateTime === 'function' ? getCurrentDateTime() : Date.now()) + '.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
            });
        }
    }
</script>
