<script>
    // Password generator skeleton (password-generator) - Web Crypto getRandomValues, no lib,
    // no upload, no backend. Registry Gate-H entry: password_generator_webcrypto.
    // 100% client-side + cryptographically-random (the 2026 "no server / private"
    // trend): the password is generated locally and never leaves the browser.
    // Framework contract: doAfterPageRendered(); no top-level DOM; renders a
    // password on load so e2e G16 has visible output with zero interaction.

    web.localUpload = false;

    var PG_SETS = {
        lower: 'abcdefghijkmnpqrstuvwxyz',           // ambiguous-free (no l/o)
        upper: 'ABCDEFGHJKLMNPQRSTUVWXYZ',           // no I/O
        digits: '23456789',                           // no 0/1
        symbols: '!@#$%^&*-_=+?'
    };

    function pgRandInt(max) {
        // Unbiased random integer in [0, max) via rejection sampling on Web Crypto.
        var limit = Math.floor(0xFFFFFFFF / max) * max;
        var buf = new Uint32Array(1);
        var x;
        do { crypto.getRandomValues(buf); x = buf[0]; } while (x >= limit);
        return x % max;
    }

    function pgGenerate(opts) {
        var pool = '';
        if (opts.lower) pool += PG_SETS.lower;
        if (opts.upper) pool += PG_SETS.upper;
        if (opts.digits) pool += PG_SETS.digits;
        if (opts.symbols) pool += PG_SETS.symbols;
        if (!pool) return '';
        var n = Math.max(4, Math.min(128, opts.length | 0));
        var out = '';
        for (var i = 0; i < n; i++) out += pool.charAt(pgRandInt(pool.length));
        return out;
    }

    function pgStrength(pw, poolSize) {
        // Shannon-ish entropy estimate: length * log2(poolSize).
        var bits = pw.length * (Math.log(Math.max(2, poolSize)) / Math.log(2));
        if (bits >= 90) return { label: 'Very strong', color: 'w3-green', bits: Math.round(bits) };
        if (bits >= 60) return { label: 'Strong', color: 'w3-light-green', bits: Math.round(bits) };
        if (bits >= 36) return { label: 'Fair', color: 'w3-amber', bits: Math.round(bits) };
        return { label: 'Weak', color: 'w3-red', bits: Math.round(bits) };
    }

    function doAfterPageRendered() {
        var root = document.getElementById('passwordGeneratorTool');
        if (!root) return; // not a password-generator page
        root.innerHTML =
            '<div class="w3-row" style="margin-bottom:8px;">' +
            '<input id="pgOut" class="w3-input w3-border outputImgs" style="font-family:monospace;font-size:1.2em;visibility:visible !important;" readonly> ' +
            '</div>' +
            '<div class="w3-row" style="margin-bottom:8px;">' +
            '<button id="pgGen" type="button" class="w3-button w3-green">Generate</button> ' +
            '<button id="pgCopy" type="button" class="w3-button w3-blue">Copy</button> ' +
            '<span id="pgStrength" class="w3-tag" style="margin-left:6px;"></span>' +
            '</div>' +
            '<div class="w3-row" style="margin-bottom:8px;">Length <span id="pgLenVal">16</span> ' +
            '<input id="pgLen" type="range" min="4" max="64" value="16" style="vertical-align:middle;width:200px;"></div>' +
            '<div class="w3-row" style="margin-bottom:8px;">' +
            '<label><input id="pgLower" type="checkbox" checked> a-z</label> ' +
            '<label><input id="pgUpper" type="checkbox" checked> A-Z</label> ' +
            '<label><input id="pgDigits" type="checkbox" checked> 0-9</label> ' +
            '<label><input id="pgSymbols" type="checkbox" checked> !@#</label></div>' +
            '<div id="pgStatus" style="min-height:1.2em;color:#555;">Generated locally with the browser secure random generator (Web Crypto) - nothing is sent to a server.</div>';
        var q = function (id) { return root.querySelector(id); };
        function opts() { return { length: parseInt(q('#pgLen').value, 10), lower: q('#pgLower').checked, upper: q('#pgUpper').checked, digits: q('#pgDigits').checked, symbols: q('#pgSymbols').checked }; }
        function poolSize(o) { var n = 0; if (o.lower) n += PG_SETS.lower.length; if (o.upper) n += PG_SETS.upper.length; if (o.digits) n += PG_SETS.digits.length; if (o.symbols) n += PG_SETS.symbols.length; return n; }
        function gen() {
            var o = opts();
            var pw = pgGenerate(o);
            if (!pw) { q('#pgStatus').textContent = 'Select at least one character set.'; q('#pgOut').value = ''; return; }
            q('#pgOut').value = pw;
            var s = pgStrength(pw, poolSize(o));
            var tag = q('#pgStrength'); tag.textContent = s.label + ' (' + s.bits + ' bits)'; tag.className = 'w3-tag ' + s.color;
        }
        q('#pgGen').addEventListener('click', gen);
        q('#pgCopy').addEventListener('click', function () { var v = q('#pgOut').value; if (v && navigator.clipboard) navigator.clipboard.writeText(v); q('#pgStatus').textContent = v ? 'Copied to clipboard.' : 'Generate a password first.'; });
        q('#pgLen').addEventListener('input', function () { q('#pgLenVal').textContent = this.value; gen(); });
        ['#pgLower', '#pgUpper', '#pgDigits', '#pgSymbols'].forEach(function (id) { q(id).addEventListener('change', gen); });
        gen(); // render a password on load (visible output for e2e G16)
    }
</script>
