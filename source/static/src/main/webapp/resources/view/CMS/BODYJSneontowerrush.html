<script>
    // Neon Tower Rush launcher. Adapted from Ooxygen7/TowerRush (MIT, 2026)
    // vendored at games/neon-tower-rush/ in an isolated same-origin iframe.
    web.localUpload = false;
    var NTR_GAME_URL = 'https://dangkhoaow.github.io/ftol-vm-assets/games/neon-tower-rush/index.html';
    function ntrStatus(text) {
        var el = document.getElementById('ntrStatus');
        if (el) el.textContent = text;
    }
    function ntrInjectFrame(stage) {
        var frame = document.createElement('iframe');
        frame.id = 'ntrFrame';
        frame.src = NTR_GAME_URL;
        frame.title = 'Neon Tower Rush';
        frame.setAttribute('allow', 'fullscreen');
        frame.setAttribute('allowfullscreen', '');
        frame.addEventListener('load', function () {
            ntrStatus('Game loaded. Use the in-game tower draft screen to begin a match.');
            try { frame.contentWindow.focus(); } catch (e) { }
        });
        var launch = document.getElementById('ntrLaunch');
        if (launch && launch.parentNode === stage) { stage.removeChild(launch); }
        stage.appendChild(frame);
        return frame;
    }
    function doAfterPageRendered() {
        var stage = document.getElementById('ntrStage');
        var playBtn = document.getElementById('ntrPlayBtn');
        if (!stage || !playBtn) return;
        var fsBtn = document.getElementById('ntrFullscreenBtn');
        playBtn.addEventListener('click', function () {
            ntrStatus('Loading the game (about ~1.2 MB)...');
            ntrInjectFrame(stage);
            if (fsBtn) fsBtn.disabled = false;
        });
        if (fsBtn) fsBtn.addEventListener('click', function () {
            if (stage.requestFullscreen) { stage.requestFullscreen(); }
            else if (stage.webkitRequestFullscreen) { stage.webkitRequestFullscreen(); }
            var frame = document.getElementById('ntrFrame');
            if (frame) { try { frame.contentWindow.focus(); } catch (e) { } }
        });
    }
</script>
