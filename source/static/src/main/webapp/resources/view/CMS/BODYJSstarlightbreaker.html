<script>
    // Starlight Breaker launcher. Adapted from ChanMeng666/html-brick-game (MIT)
    // vendored at games/starlight-breaker/ in an isolated same-origin iframe.
    // Canvas brick breaker (~84 KB), zero runtime CDN after adaptation.
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    var SLB_GAME_URL = 'https://gh-static.freetool.online/games/starlight-breaker/index.html';

    function slbStatus(text) {
        var el = document.getElementById('slbStatus');
        if (el) el.textContent = text;
    }

    function slbInjectFrame(stage) {
        var frame = document.createElement('iframe');
        frame.id = 'slbFrame';
        frame.src = SLB_GAME_URL;
        frame.title = 'Starlight Breaker';
        frame.setAttribute('allow', 'fullscreen');
        frame.setAttribute('allowfullscreen', '');
        frame.addEventListener('load', function () {
            slbStatus('Game loaded. Click START GAME inside the frame, then move the deer paddle with mouse or touch.');
            try { frame.contentWindow.focus(); } catch (e) { }
        });
        var launch = document.getElementById('slbLaunch');
        if (launch && launch.parentNode === stage) { stage.removeChild(launch); }
        stage.appendChild(frame);
        return frame;
    }

    function doAfterPageRendered() {
        var stage = document.getElementById('slbStage');
        var playBtn = document.getElementById('slbPlayBtn');
        if (!stage || !playBtn) return;

        var fsBtn = document.getElementById('slbFullscreenBtn');
        playBtn.addEventListener('click', function () {
            slbStatus('Loading the game (about 84 KB)...');
            slbInjectFrame(stage);
            if (fsBtn) fsBtn.disabled = false;
        });

        if (fsBtn) fsBtn.addEventListener('click', function () {
            if (stage.requestFullscreen) { stage.requestFullscreen(); }
            else if (stage.webkitRequestFullscreen) { stage.webkitRequestFullscreen(); }
            var frame = document.getElementById('slbFrame');
            if (frame) { try { frame.contentWindow.focus(); } catch (e) { } }
        });
    }
</script>
