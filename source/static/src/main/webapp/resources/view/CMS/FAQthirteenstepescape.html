<details class="faq-item"><summary>What is the 13-step rule?</summary><p>Each puzzle level allows only 13 steps or actions. Exceed the limit and the level respawns.</p></details>
<details class="faq-item"><summary>How large is the download?</summary><p>About ~16 KB in a single inlined index.html canvas bundle.</p></details>
<details class="faq-item"><summary>Can I undo a move?</summary><p>Yes. Press E inside the game to undo your last action.</p></details>
