<script>
    web.localUpload = false;
    var ORS_GAME_URL = 'https://dangkhoaow.github.io/ftol-vm-assets/games/orbital-radius-shooter/index.html';
    function orsStatus(t){ var el=document.getElementById('orsStatus'); if(el) el.textContent=t; }
    function orsInjectFrame(stage){
        var frame=document.createElement('iframe');
        frame.id='orsFrame'; frame.src=ORS_GAME_URL; frame.title='Orbital Radius Shooter';
        frame.setAttribute('allow','fullscreen'); frame.setAttribute('allowfullscreen','');
        frame.addEventListener('load',function(){ orsStatus('Loaded. Click PLAY inside the frame to begin.'); });
        var launch=document.getElementById('orsLaunch');
        if(launch&&launch.parentNode===stage) stage.removeChild(launch);
        stage.appendChild(frame);
    }
    function doAfterPageRendered(){
        var stage=document.getElementById('orsStage'), playBtn=document.getElementById('orsPlayBtn');
        if(!stage||!playBtn) return;
        var fsBtn=document.getElementById('orsFullscreenBtn');
        playBtn.addEventListener('click',function(){
            orsStatus('Loading about ~170 KB...'); orsInjectFrame(stage);
            if(fsBtn) fsBtn.disabled=false;
        });
        if(fsBtn) fsBtn.addEventListener('click',function(){
            if(stage.requestFullscreen) stage.requestFullscreen();
            else if(stage.webkitRequestFullscreen) stage.webkitRequestFullscreen();
        });
    }
</script>
