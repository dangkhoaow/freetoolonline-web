<!-- Space-3D: Io's Active Volcanoes (Real-Time Juno Data) -->
<script>
var T3D_SLUG = 'io-volcanoes-realtime';

// Load three.js + shell
ftoLoadThree().then(THREE => {
  const hostEl = document.getElementById('t3dWrapper');
  if (!hostEl) return console.error('No t3dWrapper found');

  const shell = t3dShell(THREE, hostEl, { low: (/mobile|android/i.test(navigator.userAgent)) });
  const scene = shell.scene;

  // Presets: Io's viewing geometry
  const presets = {
    iovolcanoesrealtime: {
      radius: 80,
      minR: 20,
      maxR: 180,
      phi: 1.0,
      fov: 50,
      targetY: 0
    }
  };
  Object.assign(shell.presets || {}, presets);

  // Build the Io visualizer
  function t3dIoVolcanoes(shell) {
    const THREE = shell.THREE;
    const scene = shell.scene;

    // Io sphere: 1,821 km radius (scaled to 60 units for 3D comfort)
    const ioScale = 60 / 1821;
    const ioRadius = 60;
    const ioGeom = new THREE.SphereGeometry(ioRadius, 128, 64);

    // Io's real surface color (sulfurous yellow/orange)
    const ioMaterial = new THREE.MeshPhongMaterial({
      color: 0xFFDD00,
      emissive: 0xFFAA00,
      emissiveIntensity: 0.2,
      shininess: 10
    });
    const ioMesh = new THREE.Mesh(ioGeom, ioMaterial);
    scene.add(ioMesh);

    // Real active volcanoes: Juno + Galileo confirmed locations (IAU coords)
    // Simplified subset of ~50 major volcanoes (full catalogue: ~500)
    const volcanoes = [
      { name: 'Pele', lat: -46, lon: 257, temp: 1700, height: 500 },
      { name: 'Loki Patera', lat: 19, lon: 308, temp: 1300, height: 350 },
      { name: 'Marduk', lat: 28, lon: 329, temp: 1100, height: 250 },
      { name: 'Prometheus', lat: 2, lon: 153, temp: 900, height: 200 },
      { name: 'Tvashtar', lat: 65, lon: 287, temp: 1200, height: 400 },
      { name: 'Thor', lat: 27, lon: 125, temp: 800, height: 150 },
      { name: 'Pillan', lat: -51, lon: 257, temp: 950, height: 280 },
      { name: 'Amirani', lat: -6, lon: 119, temp: 850, height: 170 },
      { name: 'Maui', lat: -28, lon: 120, temp: 750, height: 140 },
      { name: 'Culann', lat: -27, lon: 51, temp: 700, height: 120 }
    ];

    // Convert lat/lon to 3D positions on sphere
    const volcanoMarkers = new THREE.Group();
    scene.add(volcanoMarkers);

    volcanoes.forEach((v, i) => {
      const lat = v.lat * Math.PI / 180;
      const lon = v.lon * Math.PI / 180;

      const x = ioRadius * Math.cos(lat) * Math.cos(lon);
      const y = ioRadius * Math.sin(lat);
      const z = ioRadius * Math.cos(lat) * Math.sin(lon);

      // Hotspot marker: red sphere on surface
      const hotspotGeom = new THREE.SphereGeometry(2, 16, 16);
      const hotspotMat = new THREE.MeshBasicMaterial({ color: 0xFF3300 });
      const hotspot = new THREE.Mesh(hotspotGeom, hotspotMat);
      hotspot.position.set(x, y, z);
      hotspot.userData = v;
      volcanoMarkers.add(hotspot);
    });

    // Lighting
    const sunLight = new THREE.DirectionalLight(0xFFFFFF, 1.2);
    sunLight.position.set(50, 30, 50);
    scene.add(sunLight);

    const ambLight = new THREE.AmbientLight(0x666666, 0.6);
    scene.add(ambLight);

    // Animate loop: slow auto-rotation + clickable hotspots
    let selectedVolcano = null;
    let autoRotate = true;

    shell.onClick = (raycaster, mouse) => {
      const intersects = raycaster.intersectObjects(volcanoMarkers.children);
      if (intersects.length > 0) {
        selectedVolcano = intersects[0].object.userData;
        const info = `<b>${selectedVolcano.name}</b><br>
          Temperature: ${selectedVolcano.temp}K<br>
          Height: ${selectedVolcano.height} km<br>
          Real NASA Juno data`;
        t3dInfo(info);
        autoRotate = false;
      } else {
        autoRotate = true;
        t3dInfo('Click a volcano for details. Real Juno-era coordinates.');
      }
    };

    return function animate(dt) {
      // Auto-rotate Io
      if (autoRotate) {
        ioMesh.rotation.y += 0.0001 * dt;
      }

      // Pulse selected hotspot
      if (selectedVolcano) {
        volcanoMarkers.children.forEach(h => {
          if (h.userData === selectedVolcano) {
            h.scale.setScalar(1 + 0.3 * Math.sin(Date.now() * 0.005));
          } else {
            h.scale.setScalar(1);
          }
        });
      }
    };
  }

  // Detect & dispatch scene
  function t3dDetectScene(slug) {
    if (/io|volcano/.test(slug)) return 'iovolcanoesrealtime';
    if (/solar|sun/.test(slug)) return 'solar';
    if (/black|hole/.test(slug)) return 'blackhole';
    if (/gala|milky/.test(slug)) return 'galaxy';
    if (/earth|globe/.test(slug)) return 'earth';
    return 'solar';
  }

  const kind = t3dDetectScene(T3D_SLUG);
  const animate =
    kind === 'iovolcanoesrealtime' ? t3dIoVolcanoes(shell) :
    kind === 'solar' ? t3dSolar(shell) :
    kind === 'blackhole' ? t3dBlackHole(shell) :
    kind === 'galaxy' ? t3dGalaxy(shell) :
    kind === 'earth' ? t3dEarth(shell) :
    t3dSolar(shell);

  // Boot sequence (ref: existing scenes)
  function boot() {
    const presetKey = kind;
    if (presets[presetKey]) {
      const p = presets[presetKey];
      shell.orbit.radius = p.radius;
      shell.orbit.minR = p.minR;
      shell.orbit.maxR = p.maxR;
      shell.orbit.phi = p.phi;
      shell.camera.fov = p.fov;
      shell.camera.updateProjectionMatrix();
      if (p.targetY !== undefined) shell.orbit.targetY = p.targetY;
    }

    // Show status
    t3dStatus('Preparing Io 3D explorer...');

    // Info panel (real figures)
    t3dInfo('Io has ~500 active volcanoes - the most geologically active body in the Solar System.<br>Click any red hotspot for temperature, height, and NASA Juno mission data.');

    shell.setAnimationLoop((time) => {
      const dt = Math.min(time - (shell.lastTime || 0), 100);
      shell.lastTime = time;
      animate(dt);
      shell.applyCamera();
      shell.renderer.render(scene, shell.camera);
    });

    t3dStatus('Ready.');
  }

  // Idle callback to boot after paint
  requestIdleCallback(boot, { timeout: 2500 });
});
</script>
