<div class="w3-container">
    <p>Style your text - choose a font, size, weight, colors, spacing, and an optional drop shadow - then download it as a PNG image. The preview updates live and everything runs in your browser.</p>
</div>

<style>
    #fsTool .fs-row { margin-bottom: 14px; }
    #fsTool label.fs-label { font-weight: bold; display: block; margin-bottom: 4px; }
    #fsTool h3.fs-h { margin: 18px 0 6px; font-size: 1.05em; }
    #fsTool .fs-controls { display: flex; flex-wrap: wrap; gap: 14px; }
    #fsTool .fs-controls .fs-field { flex: 1 1 150px; }
    #fsTool input[type="color"] { width: 60px; height: 40px; padding: 2px; vertical-align: middle; }
    #fsTool .fs-actions .w3-button { margin: 0 8px 8px 0; }
    #fsTool .outputImgs { margin-bottom: 16px; text-align: center; }
    #fsTool #fsCanvas { max-width: 100%; height: auto; border: 1px solid #cccccc; border-radius: 4px; background: #ffffff; }
    #fsTool .fs-check { font-weight: bold; }
    #fsTool .fs-preset-row { padding: 6px 0; }
    #fsTool #fsPresetList .w3-text-grey { color: #777777; }
</style>

<div id="fsTool" class="w3-container">
    <div class="outputImgs">
        <canvas id="fsCanvas" aria-label="Styled text preview"></canvas>
    </div>
    <div class="fs-row fs-actions">
        <button type="button" id="fsDownload" class="w3-button w3-red">Download PNG</button>
        <button type="button" id="fsCopy" class="w3-button w3-small w3-light-grey">Copy image</button>
        <button type="button" id="fsReset" class="w3-button w3-small w3-light-grey">Reset</button>
    </div>

    <h3 class="fs-h">Your text</h3>
    <div class="fs-row">
        <textarea id="fsText" class="w3-input w3-border" rows="2"
                  style="resize: vertical;">Your Custom Text</textarea>
    </div>

    <h3 class="fs-h">Font</h3>
    <div class="fs-row fs-controls">
        <div class="fs-field">
            <label class="fs-label" for="fsFontFamily">Font family</label>
            <select id="fsFontFamily" class="w3-select w3-border">
                <option value="Arial">Arial</option>
                <option value="Verdana">Verdana</option>
                <option value="Helvetica">Helvetica</option>
                <option value="Tahoma">Tahoma</option>
                <option value="Trebuchet MS">Trebuchet MS</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Georgia">Georgia</option>
                <option value="Garamond">Garamond</option>
                <option value="Courier New">Courier New</option>
                <option value="Brush Script MT">Brush Script MT</option>
                <option value="Impact">Impact</option>
                <option value="Comic Sans MS">Comic Sans MS</option>
                <option value="Lucida Console">Lucida Console</option>
                <option value="Palatino">Palatino</option>
                <option value="Bookman">Bookman</option>
                <option value="Arial Black">Arial Black</option>
                <option value="Lucida Sans">Lucida Sans</option>
            </select>
        </div>
        <div class="fs-field">
            <label class="fs-label" for="fsFontSize">Size (px)</label>
            <input type="number" id="fsFontSize" class="w3-input w3-border" value="48" min="8" max="200" step="1" />
        </div>
        <div class="fs-field">
            <label class="fs-label" for="fsFontWeight">Weight</label>
            <select id="fsFontWeight" class="w3-select w3-border">
                <option value="100">Thin (100)</option>
                <option value="200">Extra Light (200)</option>
                <option value="300">Light (300)</option>
                <option value="400" selected>Regular (400)</option>
                <option value="500">Medium (500)</option>
                <option value="600">Semi Bold (600)</option>
                <option value="700">Bold (700)</option>
                <option value="800">Extra Bold (800)</option>
                <option value="900">Black (900)</option>
            </select>
        </div>
        <div class="fs-field">
            <label class="fs-label" for="fsFontStyle">Style</label>
            <select id="fsFontStyle" class="w3-select w3-border">
                <option value="normal">Normal</option>
                <option value="italic">Italic</option>
                <option value="oblique">Oblique</option>
            </select>
        </div>
        <div class="fs-field">
            <label class="fs-label" for="fsTextAlign">Alignment</label>
            <select id="fsTextAlign" class="w3-select w3-border">
                <option value="left">Left</option>
                <option value="center" selected>Center</option>
                <option value="right">Right</option>
            </select>
        </div>
    </div>

    <h3 class="fs-h">Colors</h3>
    <div class="fs-row fs-controls">
        <div class="fs-field">
            <label class="fs-label" for="fsColor">Text color</label>
            <input type="color" id="fsColor" class="w3-border" value="#000000" />
        </div>
        <div class="fs-field">
            <label class="fs-label" for="fsBg">Background</label>
            <input type="color" id="fsBg" class="w3-border" value="#ffffff" />
        </div>
    </div>

    <h3 class="fs-h">Spacing</h3>
    <div class="fs-row fs-controls">
        <div class="fs-field">
            <label class="fs-label" for="fsLetterSpacing">Letter spacing (px)</label>
            <input type="number" id="fsLetterSpacing" class="w3-input w3-border" value="0" min="-20" max="100" step="1" />
        </div>
        <div class="fs-field">
            <label class="fs-label" for="fsLineHeight">Line height</label>
            <input type="number" id="fsLineHeight" class="w3-input w3-border" value="1.2" min="0.5" max="4" step="0.1" />
        </div>
        <div class="fs-field">
            <label class="fs-label" for="fsPadding">Padding (px)</label>
            <input type="number" id="fsPadding" class="w3-input w3-border" value="20" min="0" max="200" step="1" />
        </div>
    </div>

    <h3 class="fs-h">Shadow</h3>
    <div class="fs-row">
        <label class="fs-check"><input type="checkbox" id="fsTextShadow" class="w3-check" /> Add a drop shadow</label>
    </div>
    <div id="fsShadowFields" class="fs-row fs-controls" style="display: none;">
        <div class="fs-field">
            <label class="fs-label" for="fsShadowColor">Shadow color</label>
            <input type="color" id="fsShadowColor" class="w3-border" value="#000000" />
        </div>
        <div class="fs-field">
            <label class="fs-label" for="fsShadowBlur">Blur (px)</label>
            <input type="number" id="fsShadowBlur" class="w3-input w3-border" value="4" min="0" max="100" step="1" />
        </div>
        <div class="fs-field">
            <label class="fs-label" for="fsShadowOffsetX">Offset X (px)</label>
            <input type="number" id="fsShadowOffsetX" class="w3-input w3-border" value="2" min="-100" max="100" step="1" />
        </div>
        <div class="fs-field">
            <label class="fs-label" for="fsShadowOffsetY">Offset Y (px)</label>
            <input type="number" id="fsShadowOffsetY" class="w3-input w3-border" value="2" min="-100" max="100" step="1" />
        </div>
    </div>

    <h3 class="fs-h">Presets</h3>
    <div class="fs-row">
        <input type="text" id="fsPresetName" class="w3-input w3-border" maxlength="60"
               placeholder="Preset name" style="max-width: 280px; display: inline-block;" />
        <button type="button" id="fsSavePreset" class="w3-button w3-red">Save preset</button>
    </div>
    <div id="fsPresetList" aria-live="polite"></div>
</div>
