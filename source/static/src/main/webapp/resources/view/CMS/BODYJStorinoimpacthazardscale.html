<script>
    // 3D scene archetype skeleton (Torino Impact Hazard Scale) - vendored
    // three.js (ESM, dynamic import from /vendor/three/, NO CDN), fully
    // client-side. Built LEAN, forked from the yarkovsky-effect shape - ONE
    // scene only (a risk-dial explorer). All geometry is procedural.
    //
    // EDUCATIONAL APPROXIMATION, not an orbital-dynamics or risk-assessment
    // simulation. A teaching scene: Earth plus an approaching asteroid whose
    // beacon color follows the real IAU Torino Impact Hazard Scale band for
    // a picked historical near-Earth-object case; a companion 0-10 band grid
    // highlights that case's real assigned rating.
    //
    // Published figures (cross-checked via WebSearch 2026-07-23):
    //   - The Torino Impact Hazard Scale is a 0-10 integer scale developed by
    //     Richard Binzel (MIT), adopted by the IAU in 1999 and revised in 2005.
    //   - Bands: 0 White (no hazard); 1 Green (normal, no unusual danger);
    //     2-4 Yellow (merits attention by astronomers); 5-7 Orange
    //     (threatening event); 8-10 Red (certain collision).
    //   - 99942 Apophis: on 2004-12-27 rated Torino 4 - the highest rating
    //     ever assigned to a real object at that time - over a possible 2029
    //     impact. By 2006-08, a refined orbit (added observational arc)
    //     dropped the rating to 0. On 2021-03-25, NASA JPL radar tracking
    //     (Goldstone) definitively ruled out any Earth-impact risk from
    //     Apophis for at least the next 100 years.
    //   - 2023 DW: briefly rated Torino 1 in 2023 over a small chance of a
    //     2046 impact; refined tracking later removed it from the risk list.
    //   - NASA JPL Center for Near-Earth Object Studies (CNEOS) Sentry system
    //     continuously re-assesses Torino/Palermo ratings as new observations
    //     arrive - a rating is a snapshot of current knowledge, not a fixed
    //     verdict.
    //   - Distinct from chelyabinsk-meteor.html (a single 2013 impact event
    //     that occurred with no advance warning, so it was never Torino-rated
    //     beforehand) and apophis-2029-flyby.html (the geometry of one
    //     specific 2029 close approach) - this page is the classification
    //     SCALE itself, compared across several real historical cases.
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    var T3D_SLUG = 'torinoimpacthazardscale';
    var T3D_STORE_KEY = 'ftol-game-' + T3D_SLUG;

    function t3dDetectScene(slug) { return 'torinoimpacthazardscale'; }

    function ftoLoadThree() {
        if (window.__ftoThreePromise) { return window.__ftoThreePromise; }
        var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/three';
        window.__ftoThreePromise = import(base + '/three.module.min.js').then(function (mod) {
            if (!mod || !mod.WebGLRenderer) { throw new Error('three.js loaded but WebGLRenderer is missing'); }
            return mod;
        });
        return window.__ftoThreePromise;
    }

    function t3dStatus(text) {
        var el = document.getElementById('t3dStatus');
        if (el) el.textContent = text;
    }
    function t3dInfo(html) {
        var el = document.getElementById('t3dInfoPanel');
        if (el) el.innerHTML = html;
    }
    function t3dLoadStore() {
        try { return JSON.parse(localStorage.getItem(T3D_STORE_KEY) || '{}') || {}; }
        catch (e) { return {}; }
    }
    function t3dSaveStore(obj) {
        try { localStorage.setItem(T3D_STORE_KEY, JSON.stringify(obj)); }
        catch (e) { t3dStatus('Could not save to browser storage (quota or private mode) - explorer still works.'); }
    }
    function t3dFullscreen(el) {
        if (el.requestFullscreen) { el.requestFullscreen(); }
        else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
        else if (el.mozRequestFullScreen) { el.mozRequestFullScreen(); }
        else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
    }

    function t3dShell(THREE, host, opts) {
        var coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        var low = coarse || ((navigator.hardwareConcurrency || 4) <= 4);
        var renderer = new THREE.WebGLRenderer({ antialias: !low, powerPreference: 'default' });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(opts.fov || 55, 1, 0.1, 4000);
        var orbit = {
            target: new THREE.Vector3(0, opts.targetY || 0, 0),
            radius: opts.radius, theta: opts.theta || 0.6, phi: opts.phi || 1.15,
            goalRadius: opts.radius, goalTheta: opts.theta || 0.6, goalPhi: opts.phi || 1.15,
            minR: opts.minR || 4, maxR: opts.maxR || 400,
        };
        function applyCamera() {
            orbit.theta += (orbit.goalTheta - orbit.theta) * 0.14;
            orbit.phi += (orbit.goalPhi - orbit.phi) * 0.14;
            orbit.radius += (orbit.goalRadius - orbit.radius) * 0.14;
            var sp = Math.sin(orbit.phi), cp = Math.cos(orbit.phi);
            camera.position.set(
                orbit.target.x + orbit.radius * sp * Math.sin(orbit.theta),
                orbit.target.y + orbit.radius * cp,
                orbit.target.z + orbit.radius * sp * Math.cos(orbit.theta)
            );
            camera.lookAt(orbit.target);
        }
        host.innerHTML = '';
        host.appendChild(renderer.domElement);
        function resize() {
            var w = host.clientWidth || 320, h = Math.max(220, Math.round(w * 0.62));
            renderer.setSize(w, h, false);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        resize();
        window.addEventListener('resize', resize);
        if (typeof ResizeObserver === 'function') {
            try { new ResizeObserver(resize).observe(host); } catch (e) {}
        }
        var dragging = false, lastX = 0, lastY = 0;
        host.addEventListener('pointerdown', function (e) {
            dragging = true; lastX = e.clientX; lastY = e.clientY;
            try { host.setPointerCapture(e.pointerId); } catch (err) {}
        });
        host.addEventListener('pointerup', function () { dragging = false; });
        host.addEventListener('pointercancel', function () { dragging = false; });
        host.addEventListener('pointermove', function (e) {
            if (!dragging) return;
            var dx = e.clientX - lastX, dy = e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            orbit.goalTheta -= dx * 0.005;
            orbit.goalPhi = Math.max(0.2, Math.min(Math.PI - 0.2, orbit.goalPhi + dy * 0.005));
        });
        host.addEventListener('wheel', function (e) {
            e.preventDefault();
            orbit.goalRadius = Math.max(orbit.minR, Math.min(orbit.maxR, orbit.goalRadius * (e.deltaY > 0 ? 1.08 : 0.92)));
        }, { passive: false });
        return { THREE: THREE, scene: scene, camera: camera, renderer: renderer, orbit: orbit, applyCamera: applyCamera, low: low, resize: resize };
    }

    // Real published Torino cases (only these three are cited with an
    // assigned rating; the scale's 11 bands are the fixed IAU definition).
    var T3D_TORINO_CASES = {
        apophis2004: {
            label: 'Apophis, Dec 2004 rating',
            rating: 4,
            note: 'Highest Torino rating ever assigned to a real object at the time, over a possible 2029 impact (assigned 2004-12-27).'
        },
        apophis2006: {
            label: 'Apophis, refined Aug 2006 rating',
            rating: 0,
            note: 'A longer observed arc refined the orbit and dropped the rating to 0. NASA JPL radar (2021-03-25) later ruled out any impact risk for at least 100 years.'
        },
        dw2023: {
            label: '2023 DW, 2023 rating',
            rating: 1,
            note: 'Briefly rated 1 over a small chance of a 2046 impact; refined tracking later removed it from the risk list.'
        }
    };
    var T3D_TORINO_BANDS = [
        { min: 0, max: 0, color: 0xe0e0e0, name: 'White' },
        { min: 1, max: 1, color: 0x66bb6a, name: 'Green' },
        { min: 2, max: 4, color: 0xffee58, name: 'Yellow' },
        { min: 5, max: 7, color: 0xffa726, name: 'Orange' },
        { min: 8, max: 10, color: 0xef5350, name: 'Red' }
    ];
    function t3dTorinoBandFor(rating) {
        for (var i = 0; i < T3D_TORINO_BANDS.length; i++) {
            if (rating >= T3D_TORINO_BANDS[i].min && rating <= T3D_TORINO_BANDS[i].max) return T3D_TORINO_BANDS[i];
        }
        return T3D_TORINO_BANDS[0];
    }

    function t3dTorinoImpactHazardScale(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03040a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        var sunLight = new THREE.DirectionalLight(0xfff3d6, 1.1);
        sunLight.position.set(10, 6, 8);
        scene.add(sunLight);

        // Starfield backdrop
        var starN = shell.low ? 260 : 520;
        var starPos = new Float32Array(starN * 3);
        for (var s = 0; s < starN; s++) {
            var r = 40 + Math.random() * 60;
            var th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
            starPos[s * 3] = r * Math.sin(ph) * Math.cos(th);
            starPos[s * 3 + 1] = r * Math.cos(ph) * 0.55;
            starPos[s * 3 + 2] = r * Math.sin(ph) * Math.sin(th) - 10;
        }
        var starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        var stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xaad4ff, size: 0.3, sizeAttenuation: true, transparent: true, opacity: 0.7 }));
        scene.add(stars);

        // Earth (procedural, simple lit sphere - not a textured globe)
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(3, 32, 22),
            new THREE.MeshStandardMaterial({ color: 0x2f6fb0, roughness: 0.85, metalness: 0.05, emissive: 0x0a2540, emissiveIntensity: 0.15 })
        );
        scene.add(earth);
        var atmosphere = new THREE.Mesh(
            new THREE.SphereGeometry(3.16, 32, 22),
            new THREE.MeshBasicMaterial({ color: 0x64b5f6, transparent: true, opacity: 0.14 })
        );
        scene.add(atmosphere);

        // Approach path (a slightly bent line from far out toward a
        // closest-approach point near Earth - not a to-scale orbit).
        var pathPts = [];
        var pathStart = new THREE.Vector3(-16, 6, -10);
        var pathClose = new THREE.Vector3(5.4, 0.6, 1.2);
        var pathEnd = new THREE.Vector3(14, -4, 9);
        for (var i = 0; i <= 60; i++) {
            var t = i / 60;
            var p = t < 0.5
                ? pathStart.clone().lerp(pathClose, t * 2)
                : pathClose.clone().lerp(pathEnd, (t - 0.5) * 2);
            pathPts.push(p);
        }
        var pathGeo = new THREE.BufferGeometry().setFromPoints(pathPts);
        var pathLine = new THREE.Line(pathGeo, new THREE.LineBasicMaterial({ color: 0x90a4ae, transparent: true, opacity: 0.5 }));
        scene.add(pathLine);

        // Asteroid (deformed icosahedron, procedural) riding the approach path
        var astGeo = new THREE.IcosahedronGeometry(0.55, 1);
        var posAttr = astGeo.attributes.position;
        for (var v = 0; v < posAttr.count; v++) {
            var px = posAttr.getX(v), py = posAttr.getY(v), pz = posAttr.getZ(v);
            var n = 1 + (Math.sin(px * 3.4 + py * 1.9) * 0.16) + (Math.cos(pz * 2.6 + px * 1.1) * 0.11);
            posAttr.setXYZ(v, px * n, py * n, pz * n);
        }
        astGeo.computeVertexNormals();
        var asteroid = new THREE.Mesh(astGeo, new THREE.MeshStandardMaterial({ color: 0x8d7461, roughness: 0.95, metalness: 0.05 }));
        scene.add(asteroid);

        // Beacon halo around the asteroid - its color is the current case's
        // real Torino band color (the teaching cue for the risk dial).
        var beacon = new THREE.Mesh(new THREE.SphereGeometry(0.85, 16, 12), new THREE.MeshBasicMaterial({ color: 0xe0e0e0, transparent: true, opacity: 0.28 }));
        scene.add(beacon);

        var caseKey = 'apophis2004';
        var approachT = 0.5; // 0..1 along pathPts, scrubbable

        function fmtRating(r) { return r + ' / 10'; }

        function panelHtml() {
            var c = T3D_TORINO_CASES[caseKey];
            var band = t3dTorinoBandFor(c.rating);
            return '<h3>Torino Impact Hazard Scale</h3>' +
                '<p>The IAU-adopted 0-10 scale (Richard Binzel, MIT; adopted 1999, revised 2005) turns impact probability and consequence into one number.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Case</td><td>' + c.label + '</td></tr>' +
                '<tr><td>Torino rating</td><td>' + fmtRating(c.rating) + ' (' + band.name + ' band)</td></tr>' +
                '<tr><td>What happened</td><td>' + c.note + '</td></tr>' +
                '</table>' +
                '<p class="t3d-note">Educational approximation - the approach path, closest-approach distance, and asteroid size on screen are not to scale. The band colors and the three cited ratings are the real IAU/NASA-JPL-published values.</p>';
        }

        var caseEl = document.getElementById('t3dTorinoCase');
        var scrubEl = document.getElementById('t3dTorinoScrub');
        var scrubLab = document.getElementById('t3dTorinoScrubLabel');
        var bandCells = {};
        for (var bi = 0; bi < 11; bi++) {
            var cell = document.getElementById('t3dTorinoCell' + bi);
            if (cell) bandCells[bi] = cell;
        }
        function apply() {
            if (caseEl && caseEl.value !== caseKey) caseEl.value = caseKey;
            var c = T3D_TORINO_CASES[caseKey];
            var band = t3dTorinoBandFor(c.rating);
            beacon.material.color.setHex(band.color);
            for (var i = 0; i <= 10; i++) {
                if (bandCells[i]) {
                    bandCells[i].style.outline = (i === c.rating) ? '3px solid #1a237e' : 'none';
                    bandCells[i].style.transform = (i === c.rating) ? 'scale(1.12)' : 'scale(1)';
                }
            }
            t3dInfo(panelHtml());
            try { t3dSaveStore({ caseKey: caseKey }); } catch (e) {}
        }

        var store = t3dLoadStore();
        if (store.caseKey && T3D_TORINO_CASES[store.caseKey]) caseKey = store.caseKey;
        apply();

        if (caseEl) caseEl.addEventListener('change', function () {
            caseKey = T3D_TORINO_CASES[caseEl.value] ? caseEl.value : caseKey;
            apply();
        });
        var playing = false;
        var playBtn = document.getElementById('t3dTorinoPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () { playing = !playing; });
        if (scrubEl) scrubEl.addEventListener('input', function () {
            approachT = Math.max(0, Math.min(1, parseInt(scrubEl.value || '50', 10) / 100));
            playing = false;
            if (scrubLab) scrubLab.textContent = Math.round(approachT * 100) + '%';
        });

        t3dStatus('Drag to orbit, scroll to zoom. Pick a historical case, then scrub the approach.');
        return function animate(dt) {
            stars.rotation.y += dt * 0.00002;
            earth.rotation.y += dt * 0.00025;
            asteroid.rotation.x += dt * 0.0009;
            asteroid.rotation.y += dt * 0.0013;

            if (playing) {
                approachT += dt * 0.00012;
                if (approachT >= 1) { approachT = 1; playing = false; }
                if (scrubEl) scrubEl.value = String(Math.round(approachT * 100));
                if (scrubLab) scrubLab.textContent = Math.round(approachT * 100) + '%';
            }
            var idx = approachT * (pathPts.length - 1);
            var lo = Math.floor(idx), hi = Math.min(pathPts.length - 1, lo + 1);
            var frac = idx - lo;
            var pos = pathPts[lo].clone().lerp(pathPts[hi], frac);
            asteroid.position.copy(pos);
            beacon.position.copy(pos);
            beacon.scale.setScalar(1 + 0.06 * Math.sin(performance.now() * 0.003));
        };
    }

    function doAfterPageRendered() {
        var host = document.getElementById('t3dCanvasHost');
        var root = document.getElementById('threeSceneTool');
        if (!host || !root) return;
        var wrapper = document.getElementById('t3dWrapper') || root;
        var kind = t3dDetectScene(T3D_SLUG);
        var rows = { torinoimpacthazardscale: 't3dTorinoControls' };
        for (var k in rows) {
            var el = document.getElementById(rows[k]);
            if (el) el.style.display = (k === kind) ? '' : 'none';
        }
        var fsBtn = document.getElementById('t3dFullscreenBtn');
        if (fsBtn) fsBtn.addEventListener('click', function () { t3dFullscreen(wrapper); });
        t3dStatus('Loading the 3D engine (about 0.7 MB, one time - then cached)...');
        function boot() {
            ftoLoadThree().then(function (THREE) {
                try {
                    var presets = { torinoimpacthazardscale: { radius: 16, maxR: 60, minR: 4, phi: 1.15, theta: 0.5, targetY: 0 } };
                    var shell = t3dShell(THREE, host, presets[kind]);
                    var animate = t3dTorinoImpactHazardScale(shell);
                    var last = performance.now();
                    shell.renderer.setAnimationLoop(function () {
                        var now = performance.now();
                        var dt = Math.min(now - last, 100);
                        last = now;
                        animate(dt);
                        shell.applyCamera();
                        shell.renderer.render(shell.scene, shell.camera);
                    });
                } catch (err) {
                    t3dStatus('This page needs WebGL to render the 3D scene. Your browser or device has it disabled - the facts panel below still works. (' + (err && err.message ? err.message : err) + ')');
                }
            }).catch(function (err) {
                t3dStatus('Could not load the 3D engine: ' + (err && err.message ? err.message : err));
            });
        }
        if ('requestIdleCallback' in window) { requestIdleCallback(boot, { timeout: 2500 }); }
        else { setTimeout(boot, 300); }
    }
</script>
