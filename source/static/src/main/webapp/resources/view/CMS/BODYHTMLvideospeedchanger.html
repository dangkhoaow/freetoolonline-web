<div class='w3-container'>
    <div class='w3-row w3-padding-small ffmpeg-edit-options' style='margin-bottom:8px'>
        <div class='w3-col m6'>
            <label for='ffmpegTrimStart'><b>Start time (mm:ss or seconds):</b></label>
            <input type='text' id='ffmpegTrimStart' class='w3-input w3-border' placeholder='0:00' value='0:00' style='max-width:200px'>
        </div>
        <div class='w3-col m6'>
            <label for='ffmpegTrimEnd'><b>End time (mm:ss or seconds, blank = end of file):</b></label>
            <input type='text' id='ffmpegTrimEnd' class='w3-input w3-border' placeholder='e.g. 1:30' style='max-width:200px'>
        </div>
    </div>

    <div class='w3-row w3-padding-small ffmpeg-compress-options' style='margin-bottom:8px;display:none'>
        <div class='w3-col m6'>
            <label for='ffmpegCompressQuality'><b>Compression level:</b></label>
            <select id='ffmpegCompressQuality' class='w3-select w3-border' style='max-width:260px'>
                <option value='smaller'>Smaller file (more compression)</option>
                <option value='balanced' selected>Balanced</option>
                <option value='higher'>Higher quality (less compression)</option>
            </select>
        </div>
    </div>

    <div class='w3-row w3-padding-small ffmpeg-speed-options' style='margin-bottom:8px;display:none'>
        <div class='w3-col m6'>
            <label for='ffmpegSpeedFactor'><b>Speed:</b></label>
            <select id='ffmpegSpeedFactor' class='w3-select w3-border' style='max-width:200px'>
                <option value='0.25'>0.25x (4x slower)</option>
                <option value='0.5'>0.5x (2x slower)</option>
                <option value='0.75'>0.75x (slightly slower)</option>
                <option value='1.25'>1.25x (slightly faster)</option>
                <option value='1.5' selected>1.5x faster</option>
                <option value='2'>2x faster</option>
                <option value='3'>3x faster</option>
                <option value='4'>4x faster</option>
            </select>
        </div>
    </div>

    <div class='w3-row w3-padding-small ffmpeg-split-options' style='margin-bottom:8px;display:none'>
        <div class='w3-col m6'>
            <label for='ffmpegSplitAt'><b>Split at (mm:ss or seconds):</b></label>
            <input type='text' id='ffmpegSplitAt' class='w3-input w3-border' placeholder='e.g. 1:00' style='max-width:200px'>
        </div>
    </div>

    <div class='w3-row w3-padding-small ffmpeg-merge-options' style='margin-bottom:8px;display:none'>
        <div class='w3-col m12'>
            <ol class='ffmpeg-merge-filelist' style='padding-left:20px'></ol>
            <p class='w3-small w3-text-grey ffmpeg-merge-hint'>Add 2 or more video files above (same format), in the order you want them merged.</p>
            <button type='button' class='ffmpeg-merge-button w3-button w3-blue' disabled>Merge Videos</button>
        </div>
    </div>

    <div class='w3-row'>
        <p class='w3-small w3-text-grey ffmpeg-status' style='margin:8px 0;display:none'></p>
    </div>

    <div class='w3-row outputImgs'>
        <div class="w3-col m2 col1"></div>
        <div class="w3-col m2 col2"></div>
        <div class="w3-col m2 col3"></div>
        <div class="w3-col m2 col4"></div>
        <div class="w3-col m2 col5"></div>
        <div class="w3-col m2 col6"></div>
    </div>
</div>

<div class="w3-container w3-padding-small" style="margin-top:8px">
    <p>Upload the video file, pick a speed factor (0.25x to 4x), and download - the audio track's pitch and duration are kept matched to the new video timing, not just sped up or slowed down separately.</p>
</div>
