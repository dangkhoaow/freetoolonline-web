<script>
    web.localUpload = false;
    var OTP_GAME_URL = 'https://gh-static.freetool.online/games/one-tap-platformer/index.html';
    function otpStatus(t){ var el=document.getElementById('otpStatus'); if(el) el.textContent=t; }
    function otpInjectFrame(stage){
        var frame=document.createElement('iframe');
        frame.id='otpFrame'; frame.src=OTP_GAME_URL; frame.title='One Tap Platformer';
        frame.setAttribute('allow','fullscreen'); frame.setAttribute('allowfullscreen','');
        frame.addEventListener('load',function(){ otpStatus('Loaded. Tap or click inside the frame to dash.'); });
        var launch=document.getElementById('otpLaunch');
        if(launch&&launch.parentNode===stage) stage.removeChild(launch);
        stage.appendChild(frame);
    }
    function doAfterPageRendered(){
        var stage=document.getElementById('otpStage'), playBtn=document.getElementById('otpPlayBtn');
        if(!stage||!playBtn) return;
        var fsBtn=document.getElementById('otpFullscreenBtn');
        playBtn.addEventListener('click',function(){
            otpStatus('Loading about ~34 KB...'); otpInjectFrame(stage);
            if(fsBtn) fsBtn.disabled=false;
        });
        if(fsBtn) fsBtn.addEventListener('click',function(){
            if(stage.requestFullscreen) stage.requestFullscreen();
            else if(stage.webkitRequestFullscreen) stage.webkitRequestFullscreen();
        });
    }
</script>
