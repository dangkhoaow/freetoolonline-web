<script>
    // Night Swarm Survivor launcher. Adapted from Stark-52/codequest (MIT, 2026)
    // vendored at games/night-swarm-survivor/ in an isolated same-origin iframe.
    // Single index.html (~368 KB), procedural Canvas sprites + Web Audio chiptune,
    // zero runtime dependencies. The iframe loads only when the reader presses Play.
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    var NSS_GAME_URL = 'night-swarm-survivor/index.html';

    function nssStatus(text) {
        var el = document.getElementById('nssStatus');
        if (el) el.textContent = text;
    }

    function nssInjectFrame(stage) {
        var frame = document.createElement('iframe');
        frame.id = 'nssFrame';
        frame.src = NSS_GAME_URL;
        frame.title = 'Night Swarm Survivor';
        frame.setAttribute('allow', 'fullscreen; gamepad');
        frame.setAttribute('allowfullscreen', '');
        frame.addEventListener('load', function () {
            nssStatus('Game loaded. Click Start, then move with WASD, arrows, touch, or gamepad.');
            try { frame.contentWindow.focus(); } catch (e) { }
        });
        var launch = document.getElementById('nssLaunch');
        if (launch && launch.parentNode === stage) { stage.removeChild(launch); }
        stage.appendChild(frame);
        return frame;
    }

    function doAfterPageRendered() {
        var stage = document.getElementById('nssStage');
        var playBtn = document.getElementById('nssPlayBtn');
        if (!stage || !playBtn) return;

        var coarse = false;
        try { coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches; } catch (e) { }
        if (coarse) {
            var note = document.getElementById('nssTouchNote');
            if (note) note.style.display = 'block';
        }

        var fsBtn = document.getElementById('nssFullscreenBtn');
        playBtn.addEventListener('click', function () {
            nssStatus('Loading the game (about 368 KB)...');
            nssInjectFrame(stage);
            if (fsBtn) fsBtn.disabled = false;
        });

        if (fsBtn) fsBtn.addEventListener('click', function () {
            if (stage.requestFullscreen) { stage.requestFullscreen(); }
            else if (stage.webkitRequestFullscreen) { stage.webkitRequestFullscreen(); }
            var frame = document.getElementById('nssFrame');
            if (frame) { try { frame.contentWindow.focus(); } catch (e) { } }
        });
    }
</script>
