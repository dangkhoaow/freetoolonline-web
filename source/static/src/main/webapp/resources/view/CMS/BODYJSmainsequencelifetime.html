<script>
    // 3D scene archetype skeleton (main-sequence-lifetime) - vendored three.js
    // (ESM, dynamic import from /vendor/three/, NO CDN), fully client-side. Built
    // LEAN from the shared t3d* skeleton - ONE scene only (main-sequence-lifetime).
    // All geometry is procedural.
    //
    // EDUCATIONAL APPROXIMATION, not a stellar-structure solver. A mass slider
    // moves a highlighted probe star along the main-sequence Teff-luminosity
    // curve and reads off its lifetime from the mass-lifetime relation. Five
    // fixed reference stars mark the published spectral-type benchmarks.
    //
    // Published figures (stellar evolution models, e.g. Kippenhahn & Weigert;
    // IAU-defined solar values; cross-checked 2026-07-22):
    //   - Main-sequence lifetime ~ M^-2.5 (mass in solar masses, lifetime in
    //     solar lifetimes, Sun = 10 Gy at 1 solar mass)
    //   - Effective temperature scales ~ M^0.57 (Sun Teff 5778 K, IAU definition)
    //   - Luminosity scales ~ M^3.5 on the main sequence (Sun = 1 Lsun)
    //   - M dwarf (0.1 Msun): ~3000 K, lifetime far exceeds the current age of
    //     the universe (~13.8 Gy)
    //   - O star (20 Msun): ~30,000 K, ~10 million year lifetime
    //   - Distinct from hr-diagram (schematic main sequence + giants + white
    //     dwarfs, no lifetime probe) and star-lifecycle (post-main-sequence
    //     evolutionary stages, not the mass-lifetime scaling relation)
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    var T3D_SLUG = 'main-sequence-lifetime';
    var T3D_STORE_KEY = 'ftol-game-' + T3D_SLUG;

    function t3dDetectScene(slug) { return 'mainsequencelifetime'; }

    function ftoLoadThree() {
        if (window.__ftoThreePromise) { return window.__ftoThreePromise; }
        var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/three';
        window.__ftoThreePromise = import(base + '/three.module.min.js').then(function (mod) {
            if (!mod || !mod.WebGLRenderer) { throw new Error('three.js loaded but WebGLRenderer is missing'); }
            return mod;
        });
        return window.__ftoThreePromise;
    }

    function t3dStatus(text) {
        var el = document.getElementById('t3dStatus');
        if (el) el.textContent = text;
    }
    function t3dInfo(html) {
        var el = document.getElementById('t3dInfoPanel');
        if (el) el.innerHTML = html;
    }
    function t3dLoadStore() {
        try { return JSON.parse(localStorage.getItem(T3D_STORE_KEY) || '{}') || {}; }
        catch (e) { return {}; }
    }
    function t3dSaveStore(obj) {
        try { localStorage.setItem(T3D_STORE_KEY, JSON.stringify(obj)); }
        catch (e) { t3dStatus('Could not save to browser storage (quota or private mode) - explorer still works.'); }
    }
    function t3dFullscreen(el) {
        if (el.requestFullscreen) { el.requestFullscreen(); }
        else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
        else if (el.mozRequestFullScreen) { el.mozRequestFullScreen(); }
        else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
    }

    function t3dShell(THREE, host, opts) {
        var coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        var low = coarse || ((navigator.hardwareConcurrency || 4) <= 4);
        var renderer = new THREE.WebGLRenderer({ antialias: !low, powerPreference: 'default' });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(opts.fov || 55, 1, 0.1, 4000);
        var orbit = {
            target: new THREE.Vector3(0, opts.targetY || 0, 0),
            radius: opts.radius, theta: opts.theta || 0.6, phi: opts.phi || 1.15,
            goalRadius: opts.radius, goalTheta: opts.theta || 0.6, goalPhi: opts.phi || 1.15,
            minR: opts.minR || 4, maxR: opts.maxR || 400,
        };
        function applyCamera() {
            orbit.theta += (orbit.goalTheta - orbit.theta) * 0.14;
            orbit.phi += (orbit.goalPhi - orbit.phi) * 0.14;
            orbit.radius += (orbit.goalRadius - orbit.radius) * 0.14;
            var sp = Math.sin(orbit.phi), cp = Math.cos(orbit.phi);
            camera.position.set(
                orbit.target.x + orbit.radius * sp * Math.sin(orbit.theta),
                orbit.target.y + orbit.radius * cp,
                orbit.target.z + orbit.radius * sp * Math.cos(orbit.theta)
            );
            camera.lookAt(orbit.target);
        }
        host.innerHTML = '';
        host.appendChild(renderer.domElement);
        function resize() {
            var w = host.clientWidth || 320, h = Math.max(220, Math.round(w * 0.62));
            renderer.setSize(w, h, false);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        resize();
        window.addEventListener('resize', resize);
        if (typeof ResizeObserver === 'function') { new ResizeObserver(resize).observe(host); }
        var dragging = false, lastX = 0, lastY = 0;
        host.addEventListener('pointerdown', function (e) {
            dragging = true; lastX = e.clientX; lastY = e.clientY;
            try { host.setPointerCapture(e.pointerId); } catch (err) {}
        });
        host.addEventListener('pointerup', function () { dragging = false; });
        host.addEventListener('pointercancel', function () { dragging = false; });
        host.addEventListener('pointermove', function (e) {
            if (!dragging) return;
            var dx = e.clientX - lastX, dy = e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            orbit.goalTheta -= dx * 0.005;
            orbit.goalPhi = Math.max(0.2, Math.min(Math.PI - 0.2, orbit.goalPhi + dy * 0.005));
        });
        host.addEventListener('wheel', function (e) {
            e.preventDefault();
            orbit.goalRadius = Math.max(orbit.minR, Math.min(orbit.maxR, orbit.goalRadius * (e.deltaY > 0 ? 1.08 : 0.92)));
        }, { passive: false });
        return { THREE: THREE, scene: scene, camera: camera, renderer: renderer, orbit: orbit, applyCamera: applyCamera, low: low, resize: resize };
    }

    // Published figures (see header comment for sources).
    var T3D_MSL_SUN_TEFF = 5778;
    var T3D_MSL_SUN_LIFETIME_GY = 10;
    var T3D_MSL_MASS_MIN = 0.1;
    var T3D_MSL_MASS_MAX = 20;
    var T3D_MSL_REFERENCE_STARS = [
        { label: 'M dwarf (red)', mass: 0.1 },
        { label: 'G dwarf (Sun)', mass: 1.0 },
        { label: 'A star (white)', mass: 2.0 },
        { label: 'B star (blue-white)', mass: 5.0 },
        { label: 'O star (blue)', mass: 20 }
    ];
    var T3D_MSL_SUN_LOG_TEFF = Math.log10(T3D_MSL_SUN_TEFF);

    function t3dMslLifetimeGy(M) {
        // Lifetime ~ M^-2.5 relative to the Sun (10 Gy at M = 1 Msun).
        return T3D_MSL_SUN_LIFETIME_GY * Math.pow(M, -2.5);
    }
    function t3dMslTeff(M) {
        // Teff ~ M^0.57 relative to the Sun (5778 K at M = 1 Msun).
        return T3D_MSL_SUN_TEFF * Math.pow(M, 0.57);
    }
    function t3dMslLbol(M) {
        // Lbol ~ M^3.5 in solar units (1 Lsun at M = 1 Msun).
        return Math.pow(M, 3.5);
    }
    function t3dMslDiagramX(M) {
        return -(Math.log10(t3dMslTeff(M)) - T3D_MSL_SUN_LOG_TEFF) * 34;
    }
    function t3dMslDiagramY(M) {
        return Math.log10(Math.max(t3dMslLbol(M), 1e-6)) * 12;
    }
    function t3dMslSliderToMass(pct) {
        // Log-scale slider: 0 -> 0.1 Msun, 100 -> 20 Msun.
        var p = Math.max(0, Math.min(100, pct)) / 100;
        return T3D_MSL_MASS_MIN * Math.pow(T3D_MSL_MASS_MAX / T3D_MSL_MASS_MIN, p);
    }
    function t3dMslFormatLifetime(gy) {
        if (gy >= 1) return gy.toFixed(gy >= 10 ? 1 : 2) + ' billion years';
        var my = gy * 1000;
        if (my >= 1) return my.toFixed(my >= 10 ? 0 : 1) + ' million years';
        return (my * 1000).toFixed(0) + ' thousand years';
    }
    function t3dMslTempColor(THREE, teff) {
        var hue = Math.min(teff / 32000, 1) * 0.68; // 0 = red (cool), 0.68 = blue (hot)
        var c = new THREE.Color();
        c.setHSL(hue, 0.82, 0.55);
        return c;
    }

    function t3dMainSequenceLifetime(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03040a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.35));
        scene.add(new THREE.PointLight(0xffffff, 0.4, 0, 0));

        // Background starfield (matches the black-hole/galaxy/algol scene
        // convention) - purely decorative context, not part of the HR-diagram
        // geometry.
        var SCOUNT = shell.low ? 500 : 900;
        var spos = new Float32Array(SCOUNT * 3);
        for (var s = 0; s < SCOUNT; s++) {
            var v = new THREE.Vector3().randomDirection().multiplyScalar(80 + Math.random() * 140);
            spos[s * 3] = v.x; spos[s * 3 + 1] = v.y; spos[s * 3 + 2] = v.z;
        }
        var sgeo = new THREE.BufferGeometry();
        sgeo.setAttribute('position', new THREE.BufferAttribute(spos, 3));
        scene.add(new THREE.Points(sgeo, new THREE.PointsMaterial({ color: 0xcfd8dc, size: 0.6, sizeAttenuation: false })));

        scene.add(new THREE.AxesHelper(40));

        // Main-sequence curve: sample the mass range densely and draw the
        // resulting (Teff, Lbol) track so the reader sees where the probe
        // star's position comes from.
        var CURVE_N = 64;
        var curvePts = [];
        for (var i = 0; i <= CURVE_N; i++) {
            var t = i / CURVE_N;
            var m = T3D_MSL_MASS_MIN * Math.pow(T3D_MSL_MASS_MAX / T3D_MSL_MASS_MIN, t);
            curvePts.push(new THREE.Vector3(t3dMslDiagramX(m), t3dMslDiagramY(m), 0));
        }
        var curveGeo = new THREE.BufferGeometry().setFromPoints(curvePts);
        scene.add(new THREE.Line(curveGeo, new THREE.LineBasicMaterial({ color: 0x556677, transparent: true, opacity: 0.6 })));

        // Five fixed reference stars matching the published table (BODYWELCOME).
        var refGroup = new THREE.Group();
        T3D_MSL_REFERENCE_STARS.forEach(function (ref) {
            var teff = t3dMslTeff(ref.mass);
            var geo = new THREE.SphereGeometry(ref.mass >= 1 ? 1.1 + Math.log10(ref.mass) * 0.5 : 0.7, shell.low ? 14 : 22, shell.low ? 10 : 16);
            var mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: t3dMslTempColor(THREE, teff) }));
            mesh.position.set(t3dMslDiagramX(ref.mass), t3dMslDiagramY(ref.mass), 0);
            mesh.userData.ref = ref;
            refGroup.add(mesh);
        });
        scene.add(refGroup);

        // Probe star: the mass-slider-controlled highlight. Bigger, with a
        // soft glow shell, so it reads clearly against the fixed reference set.
        var probe = new THREE.Mesh(
            new THREE.SphereGeometry(1.3, shell.low ? 18 : 28, shell.low ? 14 : 20),
            new THREE.MeshBasicMaterial({ color: 0xffee88 })
        );
        scene.add(probe);
        var probeGlow = new THREE.Mesh(
            new THREE.SphereGeometry(1.7, shell.low ? 14 : 20, shell.low ? 10 : 16),
            new THREE.MeshBasicMaterial({ color: 0xffe066, transparent: true, opacity: 0.22, depthWrite: false })
        );
        probe.add(probeGlow);

        var mass = 1.0, pulse = 0;

        function facts() {
            var teff = t3dMslTeff(mass), lbol = t3dMslLbol(mass), lifetime = t3dMslLifetimeGy(mass);
            return '<h3>Probe star: ' + mass.toFixed(mass < 1 ? 2 : 1) + ' solar masses</h3>' +
                '<p>Drag the slider to move the glowing probe star along the main-sequence curve. Its position comes straight from the mass-luminosity and mass-temperature relations.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Surface temperature</td><td>' + Math.round(teff).toLocaleString() + ' K</td></tr>' +
                '<tr><td>Luminosity</td><td>' + (lbol >= 1 ? lbol.toFixed(lbol >= 100 ? 0 : 1) : lbol.toFixed(4)) + ' Lsun</td></tr>' +
                '<tr><td>Main-sequence lifetime</td><td>' + t3dMslFormatLifetime(lifetime) + '</td></tr>' +
                '</table>' +
                '<p class="t3d-note">Educational approximation - the mass-lifetime, mass-temperature, and mass-luminosity scalings are simplified power laws, not a full stellar-structure solver.</p>';
        }

        function setMass(m) {
            mass = Math.max(T3D_MSL_MASS_MIN, Math.min(T3D_MSL_MASS_MAX, m));
            var teff = t3dMslTeff(mass);
            probe.position.set(t3dMslDiagramX(mass), t3dMslDiagramY(mass), 0);
            probe.material.color.copy(t3dMslTempColor(THREE, teff));
            probeGlow.material.color.copy(probe.material.color);
            var slider = document.getElementById('t3dMslMassSlider');
            var label = document.getElementById('t3dMslMassLabel');
            var pct = 100 * Math.log(mass / T3D_MSL_MASS_MIN) / Math.log(T3D_MSL_MASS_MAX / T3D_MSL_MASS_MIN);
            if (slider) slider.value = String(Math.round(pct));
            if (label) label.textContent = mass.toFixed(mass < 1 ? 2 : 1) + ' Msun';
            t3dInfo(facts());
            try { t3dSaveStore({ mass: mass }); } catch (e) {}
        }

        var store = t3dLoadStore();
        if (typeof store.mass === 'number' && store.mass >= T3D_MSL_MASS_MIN && store.mass <= T3D_MSL_MASS_MAX) mass = store.mass;
        setMass(mass);

        var slider = document.getElementById('t3dMslMassSlider');
        if (slider) slider.addEventListener('input', function () {
            setMass(t3dMslSliderToMass(parseFloat(slider.value || '50')));
        });
        var sunBtn = document.getElementById('t3dMslSunBtn');
        if (sunBtn) sunBtn.addEventListener('click', function () { setMass(1.0); });

        t3dStatus('Drag to orbit, scroll to zoom. Drag the mass slider to move the probe star along the main sequence.');
        return function animate(dt) {
            pulse += dt * 0.003;
            var glowOpacity = 0.16 + 0.10 * (0.5 + 0.5 * Math.sin(pulse));
            probeGlow.material.opacity = glowOpacity;
        };
    }

    function doAfterPageRendered() {
        var host = document.getElementById('t3dCanvasHost');
        var root = document.getElementById('threeSceneTool');
        if (!host || !root) return;
        var wrapper = document.getElementById('t3dWrapper') || root;
        var kind = t3dDetectScene(T3D_SLUG);
        var rows = { mainsequencelifetime: 't3dMslControls' };
        for (var k in rows) {
            var el = document.getElementById(rows[k]);
            if (el) el.style.display = (k === kind) ? '' : 'none';
        }
        var fsBtn = document.getElementById('t3dFullscreenBtn');
        if (fsBtn) fsBtn.addEventListener('click', function () { t3dFullscreen(wrapper); });
        t3dStatus('Loading the 3D engine (about 0.7 MB, one time - then cached)...');
        function boot() {
            ftoLoadThree().then(function (THREE) {
                try {
                    var presets = { mainsequencelifetime: { radius: 210, maxR: 500, minR: 40, phi: 1.15, theta: 0.5, targetY: 20 } };
                    var shell = t3dShell(THREE, host, presets[kind]);
                    var animate = t3dMainSequenceLifetime(shell);
                    var last = performance.now();
                    shell.renderer.setAnimationLoop(function () {
                        var now = performance.now();
                        var dt = Math.min(now - last, 100);
                        last = now;
                        animate(dt);
                        shell.applyCamera();
                        shell.renderer.render(shell.scene, shell.camera);
                    });
                } catch (err) {
                    t3dStatus('This page needs WebGL to render the 3D scene. Your browser or device has it disabled - the facts panel below still works. (' + (err && err.message ? err.message : err) + ')');
                }
            }).catch(function (err) {
                t3dStatus('Could not load the 3D engine: ' + (err && err.message ? err.message : err));
            });
        }
        if ('requestIdleCallback' in window) { requestIdleCallback(boot, { timeout: 2500 }); }
        else { setTimeout(boot, 300); }
    }
</script>
