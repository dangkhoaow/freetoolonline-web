<script>
    if (typeof web !== "undefined") web.localUpload = false;
    var SFB_GAME_URL = 'https://dangkhoaow.github.io/ftol-vm-assets/games/star-fuel-battle/index.html';
    function sfbStatus(text) {
        var el = document.getElementById('sfbStatus');
        if (el) el.textContent = text;
    }
    function sfbInjectFrame(stage) {
        var frame = document.createElement('iframe');
        frame.id = 'sfbFrame';
        frame.src = SFB_GAME_URL;
        frame.title = 'Star Fuel Battle game';
        frame.setAttribute('allow', 'fullscreen');
        frame.setAttribute('allowfullscreen', '');
        frame.addEventListener('load', function () {
            sfbStatus('Game loaded. Click Start game inside the frame, then fly with WASD and fire with Space.');
            try { frame.contentWindow.focus(); } catch (e) {}
        });
        var launch = document.getElementById('sfbLaunch');
        if (launch && launch.parentNode === stage) stage.removeChild(launch);
        stage.appendChild(frame);
        return frame;
    }
    function doAfterPageRendered() {
        var stage = document.getElementById('sfbStage');
        var playBtn = document.getElementById('sfbPlayBtn');
        if (!stage || !playBtn) return;
        if (playBtn.dataset.bound === '1') return;
        playBtn.dataset.bound = '1';
        var fsBtn = document.getElementById('sfbFullscreenBtn');
        playBtn.addEventListener('click', function () {
            sfbStatus('Loading the game (about 0.67 MB, one time - then cached)...');
            sfbInjectFrame(stage);
            if (fsBtn) fsBtn.disabled = false;
        });
        if (fsBtn) fsBtn.addEventListener('click', function () {
            if (stage.requestFullscreen) stage.requestFullscreen();
            else if (stage.webkitRequestFullscreen) stage.webkitRequestFullscreen();
            var frame = document.getElementById('sfbFrame');
            if (frame) { try { frame.contentWindow.focus(); } catch (e) {} }
        });
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', doAfterPageRendered);
    } else {
        doAfterPageRendered();
    }
</script>
