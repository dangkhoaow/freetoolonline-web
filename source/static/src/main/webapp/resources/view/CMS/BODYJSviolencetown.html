<script>
    // Violence Town launcher. The game is the open-source Violencetown engine
    // (Caelan Gander; MIT - full analysis in tool-violencetown/SKILL.md),
    // vendored at static/games/violence-town/ in an isolated same-origin iframe:
    // ~1.1 MB HTML + JS + CSS + JSON maps, no analytics, no CDN. The iframe
    // loads only when the reader presses Play.
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    // Relative to /games/, resolves to the vendored bundle under static/games/violence-town/
    var VTN_GAME_URL = 'violence-town/index.html';

    function vtnStatus(text) {
        var el = document.getElementById('vtnStatus');
        if (el) el.textContent = text;
    }

    function vtnInjectFrame(stage) {
        var frame = document.createElement('iframe');
        frame.id = 'vtnFrame';
        frame.src = VTN_GAME_URL;
        frame.title = 'Violence Town game';
        frame.setAttribute('allow', 'fullscreen');
        frame.setAttribute('allowfullscreen', '');
        frame.addEventListener('load', function () {
            vtnStatus('Game loaded. Press GAME START or Space on the splash, or CONTINUE if you have a save.');
            try { frame.contentWindow.focus(); } catch (e) { /* focus is best-effort */ }
        });
        var launch = document.getElementById('vtnLaunch');
        if (launch && launch.parentNode === stage) { stage.removeChild(launch); }
        stage.appendChild(frame);
        return frame;
    }

    function doAfterPageRendered() {
        var stage = document.getElementById('vtnStage');
        var playBtn = document.getElementById('vtnPlayBtn');
        if (!stage || !playBtn) return;

        var fsBtn = document.getElementById('vtnFullscreenBtn');
        playBtn.addEventListener('click', function () {
            vtnStatus('Loading the game (about 1.1 MB, one time - then cached)...');
            vtnInjectFrame(stage);
            if (fsBtn) fsBtn.disabled = false;
        });

        if (fsBtn) fsBtn.addEventListener('click', function () {
            if (stage.requestFullscreen) { stage.requestFullscreen(); }
            else if (stage.webkitRequestFullscreen) { stage.webkitRequestFullscreen(); }
            var frame = document.getElementById('vtnFrame');
            if (frame) { try { frame.contentWindow.focus(); } catch (e) { } }
        });
    }
</script>
