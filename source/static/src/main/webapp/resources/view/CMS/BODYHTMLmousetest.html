<div class="w3-container">
    <p>Click Start to begin; results render below as the diagnostic runs.</p>
</div>

<style>
    #mouseTestTool .mt-row { margin-bottom: 12px; }
    #mouseTestTool .mt-status {
        font-family: monospace; margin-top: 10px; min-height: 1.4em; white-space: pre-wrap;
    }
    #mouseTestTool .mt-pad {
        position: relative; height: 220px; border: 2px dashed #999999;
        border-radius: 4px; background: #f7f7f7; cursor: crosshair;
        touch-action: none; user-select: none;
    }
    #mouseTestTool .mt-pad.mt-listening { border-color: #c62828; background: #fff8f8; }
    #mouseTestTool .mt-cross {
        position: absolute; width: 14px; height: 14px; margin: -7px 0 0 -7px;
        border: 2px solid #c62828; border-radius: 50%; pointer-events: none;
        display: none;
    }
    #mouseTestTool .mt-btns span {
        display: inline-block; min-width: 64px; text-align: center;
        padding: 6px 10px; margin-right: 8px; border: 1px solid #cccccc;
        border-radius: 4px; background: #eeeeee; font-family: monospace;
    }
    #mouseTestTool .mt-btns span.mt-on { background: #c62828; color: #ffffff; border-color: #8e0000; }
    #mouseTestTool .mt-meter-wrap {
        margin-top: 12px; padding: 12px; border: 1px solid #cccccc; border-radius: 4px;
        background: #fafafa;
    }
</style>

<div id="mouseTestTool" class="w3-container">
    <div class="mt-row">
        <button type="button" id="mtEnable" class="w3-button w3-red">Enable mouse listening</button>
        <button type="button" id="mtReset" class="w3-button w3-light-grey" style="margin-left: 8px;">Reset counters</button>
    </div>
    <div class="mt-row mt-btns" aria-label="Mouse buttons">
        <span id="mtBtn0">Left</span>
        <span id="mtBtn1">Middle</span>
        <span id="mtBtn2">Right</span>
    </div>
    <div id="mtPad" class="mt-pad" tabindex="0" role="application"
        aria-label="Mouse test pad - move and click here">
        <div id="mtCross" class="mt-cross" aria-hidden="true"></div>
    </div>
    <div class="mt-meter-wrap">
        <b>Live readout</b>
        <p id="mtCue" class="mt-status" aria-live="polite">Click Enable mouse listening, then move, click, or scroll on the pad. Coordinates stay in this tab - nothing is uploaded.</p>
        <p id="mtStats" class="mt-status" aria-live="polite">moves: 0 | clicks: 0 | wheel: 0</p>
    </div>
</div>
