<script>
    // 3D scene archetype skeleton (coronal-mass-ejection) - vendored three.js
    // (ESM, dynamic import from /vendor/three/, NO CDN), fully client-side. Built
    // LEAN from the shared t3d* skeleton - ONE scene only (cme).
    // All geometry is procedural.
    //
    // EDUCATIONAL APPROXIMATION, not a physical MHD
    // solar-wind solver. The CME is a parametric expanding cloud whose travel
    // time to Earth is computed from published speed ranges (NOAA SWPC).
    // Distances are compressed for readability.
    //
    // Published figures (NOAA / NWS Space Weather Prediction Center + NASA
    // GSFC CME overview, cross-checked 2026-07-21):
    //   - CME speed range: slower than 250 km/s to nearly 3000 km/s
    //   - Fastest Earth-directed CMEs: arrive in as little as 15-18 hours
    //   - Slower CMEs: several days (typically ~1-3 days for common events)
    //   - Mass scale: can eject billions of tons (~1e16 g class, NASA GSFC)
    //   - Distinct from carrington-event (one historical storm) and
    //     solar-wind-heliosphere (ambient wind bubble, not a discrete CME)
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    var T3D_SLUG = 'coronal-mass-ejection';
    var T3D_STORE_KEY = 'ftol-game-' + T3D_SLUG;

    function t3dDetectScene(slug) { return 'cme'; }

    function ftoLoadThree() {
        if (window.__ftoThreePromise) { return window.__ftoThreePromise; }
        var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/three';
        window.__ftoThreePromise = import(base + '/three.module.min.js').then(function (mod) {
            if (!mod || !mod.WebGLRenderer) { throw new Error('three.js loaded but WebGLRenderer is missing'); }
            return mod;
        });
        return window.__ftoThreePromise;
    }

    function t3dStatus(text) {
        var el = document.getElementById('t3dStatus');
        if (el) el.textContent = text;
    }
    function t3dInfo(html) {
        var el = document.getElementById('t3dInfoPanel');
        if (el) el.innerHTML = html;
    }
    function t3dLoadStore() {
        try { return JSON.parse(localStorage.getItem(T3D_STORE_KEY) || '{}') || {}; }
        catch (e) { return {}; }
    }
    function t3dSaveStore(obj) {
        try { localStorage.setItem(T3D_STORE_KEY, JSON.stringify(obj)); }
        catch (e) { t3dStatus('Could not save to browser storage (quota or private mode) - explorer still works.'); }
    }
    function t3dFullscreen(el) {
        if (el.requestFullscreen) { el.requestFullscreen(); }
        else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
        else if (el.mozRequestFullScreen) { el.mozRequestFullScreen(); }
        else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
    }

    function t3dShell(THREE, host, opts) {
        var coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        var low = coarse || ((navigator.hardwareConcurrency || 4) <= 4);
        var renderer = new THREE.WebGLRenderer({ antialias: !low, powerPreference: 'default' });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(opts.fov || 55, 1, 0.1, 4000);
        var orbit = {
            target: new THREE.Vector3(0, opts.targetY || 0, 0),
            radius: opts.radius, theta: opts.theta || 0.6, phi: opts.phi || 1.15,
            goalRadius: opts.radius, goalTheta: opts.theta || 0.6, goalPhi: opts.phi || 1.15,
            minR: opts.minR || 4, maxR: opts.maxR || 400,
        };
        function applyCamera() {
            orbit.theta += (orbit.goalTheta - orbit.theta) * 0.14;
            orbit.phi += (orbit.goalPhi - orbit.phi) * 0.14;
            orbit.radius += (orbit.goalRadius - orbit.radius) * 0.14;
            var sp = Math.sin(orbit.phi), cp = Math.cos(orbit.phi);
            camera.position.set(
                orbit.target.x + orbit.radius * sp * Math.sin(orbit.theta),
                orbit.target.y + orbit.radius * cp,
                orbit.target.z + orbit.radius * sp * Math.cos(orbit.theta)
            );
            camera.lookAt(orbit.target);
        }
        function size() {
            var w = Math.max(260, host.clientWidth);
            var h = Math.round(w * 0.62);
            var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
            if (fsEl && fsEl.contains(host)) { h = Math.max(240, (window.innerHeight || h) - 150); }
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        host.appendChild(renderer.domElement);
        renderer.domElement.style.touchAction = 'none';
        renderer.domElement.style.borderRadius = '6px';
        var drag = null, pinch = null, moved = 0;
        host.addEventListener('pointerdown', function (e) {
            drag = { x: e.clientX, y: e.clientY }; moved = 0;
            host.setPointerCapture && host.setPointerCapture(e.pointerId);
        });
        host.addEventListener('pointermove', function (e) {
            if (!drag) return;
            var dx = e.clientX - drag.x, dy = e.clientY - drag.y;
            moved += Math.abs(dx) + Math.abs(dy);
            drag = { x: e.clientX, y: e.clientY };
            orbit.goalTheta -= dx * 0.006;
            orbit.goalPhi = Math.min(Math.max(orbit.goalPhi - dy * 0.005, 0.15), Math.PI - 0.2);
        });
        host.addEventListener('pointerup', function (e) {
            var wasClick = moved < 8;
            drag = null;
            if (wasClick && shell.onClick) { shell.onClick(e); }
        });
        host.addEventListener('wheel', function (e) {
            e.preventDefault();
            orbit.goalRadius = Math.min(Math.max(orbit.goalRadius * (e.deltaY > 0 ? 1.12 : 0.9), orbit.minR), orbit.maxR);
        }, { passive: false });
        host.addEventListener('touchstart', function (e) {
            if (e.touches.length === 2) {
                pinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        }, { passive: true });
        host.addEventListener('touchmove', function (e) {
            if (e.touches.length === 2 && pinch) {
                var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                orbit.goalRadius = Math.min(Math.max(orbit.goalRadius * (pinch / d), orbit.minR), orbit.maxR);
                pinch = d;
            }
        }, { passive: true });
        window.addEventListener('resize', size);
        document.addEventListener('fullscreenchange', size);
        document.addEventListener('webkitfullscreenchange', size);
        size();
        var shell = {
            THREE: THREE, renderer: renderer, scene: scene, camera: camera,
            orbit: orbit, low: low, applyCamera: applyCamera, size: size, onClick: null,
            ndc: function (e) {
                var r = renderer.domElement.getBoundingClientRect();
                return new THREE.Vector2(((e.clientX - r.left) / r.width) * 2 - 1, -((e.clientY - r.top) / r.height) * 2 + 1);
            },
        };
        return shell;
    }

    // ================= CORONAL MASS EJECTION =================================
    var T3D_CME_EARTH_X = 36;
    var T3D_CME_AU_KM = 149600000;
    var T3D_CME_V_MIN = 250;
    var T3D_CME_V_MAX = 3000;
    var T3D_CME_V_TYPICAL = 1000;
    var T3D_CME_FAST_H_LO = 15;
    var T3D_CME_FAST_H_HI = 18;

    function t3dCme(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.28));
        var glow = new THREE.PointLight(0xffe082, 1.4, 220);
        scene.add(glow);

        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(2.4, 28, 20),
            new THREE.MeshBasicMaterial({ color: 0xffc107 })
        );
        scene.add(sun);
        var corona = new THREE.Mesh(
            new THREE.SphereGeometry(3.1, 24, 16),
            new THREE.MeshBasicMaterial({ color: 0xffecb3, transparent: true, opacity: 0.18, wireframe: true })
        );
        scene.add(corona);

        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 18, 14),
            new THREE.MeshLambertMaterial({ color: 0x42a5f5, emissive: 0x102040 })
        );
        earth.position.set(T3D_CME_EARTH_X, 0, 0);
        scene.add(earth);
        var earthOrbit = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints((function () {
                var pts = [];
                for (var i = 0; i <= 96; i++) {
                    var a = (i / 96) * Math.PI * 2;
                    pts.push(new THREE.Vector3(Math.cos(a) * T3D_CME_EARTH_X, 0, Math.sin(a) * T3D_CME_EARTH_X));
                }
                return pts;
            })()),
            new THREE.LineBasicMaterial({ color: 0x546e7a, transparent: true, opacity: 0.35 })
        );
        scene.add(earthOrbit);

        var N = shell.low ? 900 : 2200;
        var geo = new THREE.BufferGeometry();
        var pos = new Float32Array(N * 3);
        var col = new Float32Array(N * 3);
        var base = new Float32Array(N * 3); // unit direction in cone
        for (var i = 0; i < N; i++) {
            var u = Math.random();
            var v = Math.random();
            var th = (u - 0.5) * 0.9; // cone half-angle ~rad
            var ph = v * Math.PI * 2;
            var x = Math.cos(th);
            var y = Math.sin(th) * Math.cos(ph);
            var z = Math.sin(th) * Math.sin(ph);
            base[i * 3] = x; base[i * 3 + 1] = y; base[i * 3 + 2] = z;
            var c = new THREE.Color().setHSL(0.08 + Math.random() * 0.06, 0.85, 0.55 + Math.random() * 0.2);
            col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b;
        }
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
        var cloud = new THREE.Points(geo, new THREE.PointsMaterial({
            size: shell.low ? 0.18 : 0.14, vertexColors: true, transparent: true, opacity: 0.9, depthAttenuation: true
        }));
        scene.add(cloud);

        var frontMarker = new THREE.Mesh(
            new THREE.SphereGeometry(0.35, 12, 10),
            new THREE.MeshBasicMaterial({ color: 0xffee58 })
        );
        scene.add(frontMarker);

        var speed = T3D_CME_V_TYPICAL;
        var progress = 0; // 0..1 fraction of Sun-Earth
        var playing = true;

        function travelHours(v) {
            return (T3D_CME_AU_KM / v) / 3600;
        }
        function formatTravel(h) {
            if (h < 48) return (Math.round(h * 10) / 10) + ' hours';
            var d = h / 24;
            return (Math.round(d * 10) / 10) + ' days (' + Math.round(h) + ' h)';
        }
        function panelHtml() {
            var h = travelHours(speed);
            var noteFast = (speed >= 2000)
                ? ' At this high speed the teaching clock is in the same ballpark as NOAA\'s fastest Earth-directed window (' + T3D_CME_FAST_H_LO + '-' + T3D_CME_FAST_H_HI + ' hours).'
                : '';
            return '<h3>Coronal mass ejection</h3>' +
                '<p>A billion-ton-class plasma cloud leaves the Sun\'s corona and expands toward Earth. Scrub CME speed and watch the travel-time estimate update from the real 1 AU distance.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>CME speed (this scrub)</td><td>' + Math.round(speed).toLocaleString() + ' km/s</td></tr>' +
                '<tr><td>Published speed range</td><td>&lt;' + T3D_CME_V_MIN + ' to nearly ' + T3D_CME_V_MAX.toLocaleString() + ' km/s (NOAA SWPC)</td></tr>' +
                '<tr><td>Travel time to 1 AU (this scrub)</td><td>' + formatTravel(h) + noteFast + '</td></tr>' +
                '<tr><td>Fastest Earth-directed CMEs</td><td>' + T3D_CME_FAST_H_LO + '-' + T3D_CME_FAST_H_HI + ' hours (NOAA SWPC)</td></tr>' +
                '<tr><td>Slower / typical arrivals</td><td>several days; common events often ~1-3 days</td></tr>' +
                '<tr><td>Mass scale</td><td>billions of tons (~1e16 g class, NASA GSFC)</td></tr>' +
                '<tr><td>Progress to Earth</td><td>' + Math.round(progress * 100) + '%</td></tr>' +
                '</table>' +
                '<p class="t3d-note">Educational approximation, not a physical MHD solar-wind model. On-screen Sun-Earth distance is compressed; travel time uses the real 1 AU distance (149,600,000 km) divided by the scrubbed speed. Distinct from the Carrington Event page (one historical storm) and the solar-wind heliosphere page (the ambient wind bubble).</p>';
        }

        function applySpeed(v) {
            speed = Math.max(T3D_CME_V_MIN, Math.min(T3D_CME_V_MAX, v));
            var slider = document.getElementById('t3dCmeSpeed');
            var label = document.getElementById('t3dCmeSpeedLabel');
            if (slider && Math.round(parseFloat(slider.value || '0')) !== Math.round(speed)) slider.value = String(Math.round(speed));
            if (label) label.textContent = Math.round(speed).toLocaleString() + ' km/s';
            t3dInfo(panelHtml());
            try { t3dSaveStore({ speed: speed, progress: progress }); } catch (e) {}
        }
        function applyProgress(p) {
            progress = Math.max(0, Math.min(0.999, p));
            var R = 3.4 + progress * (T3D_CME_EARTH_X - 3.4);
            var spread = 0.35 + progress * 2.8;
            for (var i = 0; i < N; i++) {
                var rr = R * (0.55 + 0.45 * ((i % 17) / 16));
                pos[i * 3] = base[i * 3] * rr;
                pos[i * 3 + 1] = base[i * 3 + 1] * rr * spread * 0.55;
                pos[i * 3 + 2] = base[i * 3 + 2] * rr * spread * 0.55;
            }
            geo.attributes.position.needsUpdate = true;
            frontMarker.position.set(R, 0, 0);
            var pSlider = document.getElementById('t3dCmeProgress');
            var pLabel = document.getElementById('t3dCmeProgressLabel');
            if (pSlider && Math.round(parseFloat(pSlider.value || '0')) !== Math.round(progress * 100)) pSlider.value = String(Math.round(progress * 100));
            if (pLabel) pLabel.textContent = Math.round(progress * 100) + '%';
            t3dInfo(panelHtml());
        }

        var store = t3dLoadStore();
        if (typeof store.speed === 'number') speed = store.speed;
        if (typeof store.progress === 'number') progress = store.progress;
        applySpeed(speed);
        applyProgress(progress);

        var speedEl = document.getElementById('t3dCmeSpeed');
        if (speedEl) speedEl.addEventListener('input', function () {
            applySpeed(parseFloat(speedEl.value || String(T3D_CME_V_TYPICAL)));
        });
        var progEl = document.getElementById('t3dCmeProgress');
        if (progEl) progEl.addEventListener('input', function () {
            playing = false;
            var playBtn = document.getElementById('t3dCmePlayBtn');
            if (playBtn) playBtn.textContent = 'Play';
            applyProgress(parseFloat(progEl.value || '0') / 100);
        });
        var playBtn = document.getElementById('t3dCmePlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause' : 'Play';
        });
        var resetBtn = document.getElementById('t3dCmeResetBtn');
        if (resetBtn) resetBtn.addEventListener('click', function () {
            applyProgress(0);
            playing = true;
            if (playBtn) playBtn.textContent = 'Pause';
        });

        t3dStatus('Drag to orbit, scroll to zoom. Scrub CME speed or progress, or press Play.');
        return function animate(dt) {
            if (!playing) return;
            // Advance progress so a full Sun-Earth crossing takes ~travelHours at current speed, sped up for teaching.
            var h = travelHours(speed);
            var teachSec = Math.max(8, Math.min(40, h / 4)); // compress real hours into seconds
            var next = progress + (dt / 1000) / teachSec;
            if (next >= 1) next = 0;
            applyProgress(next);
        };
    }

    function doAfterPageRendered() {
        var host = document.getElementById('t3dCanvasHost');
        var root = document.getElementById('threeSceneTool');
        if (!host || !root) return;
        var wrapper = document.getElementById('t3dWrapper') || root;
        var kind = t3dDetectScene(T3D_SLUG);
        var rows = { cme: 't3dCmeControls' };
        for (var k in rows) {
            var el = document.getElementById(rows[k]);
            if (el) el.style.display = (k === kind) ? '' : 'none';
        }
        var fsBtn = document.getElementById('t3dFullscreenBtn');
        if (fsBtn) fsBtn.addEventListener('click', function () { t3dFullscreen(wrapper); });
        t3dStatus('Loading the 3D engine (about 0.7 MB, one time - then cached)...');
        function boot() {
            ftoLoadThree().then(function (THREE) {
                try {
                    var presets = { cme: { radius: 48, maxR: 140, minR: 16, phi: 1.2, theta: 0.5, targetY: 0 } };
                    var shell = t3dShell(THREE, host, presets[kind]);
                    shell.orbit.target.set(T3D_CME_EARTH_X * 0.4, 0, 0);
                    var animate = t3dCme(shell);
                    var last = performance.now();
                    shell.renderer.setAnimationLoop(function () {
                        var now = performance.now();
                        var dt = Math.min(now - last, 100);
                        last = now;
                        animate(dt);
                        shell.applyCamera();
                        shell.renderer.render(shell.scene, shell.camera);
                    });
                } catch (err) {
                    t3dStatus('This page needs WebGL to render the 3D scene. Your browser or device has it disabled - the facts panel below still works. (' + (err && err.message ? err.message : err) + ')');
                }
            }).catch(function (err) {
                t3dStatus('Could not load the 3D engine: ' + (err && err.message ? err.message : err));
            });
        }
        if ('requestIdleCallback' in window) { requestIdleCallback(boot, { timeout: 2500 }); }
        else { setTimeout(boot, 300); }
    }
</script>
