<script>
    // PDF multitool skeleton (pdf-compressor) - pdf-lib (vendored /vendor/pdf-lib), ZERO
    // upload, no backend. Registry Gate-H entry: pdf_pdflib. 100% client-side (the
    // 2026 "no upload PDF" trend): the PDF never leaves the browser. Slug-dispatched:
    //   - merge / combine  -> merge N PDFs into one.
    //   - split            -> extract a page range into a new PDF.
    //   - rotate           -> rotate every page by a fixed clockwise angle
    //                         (90/180/270), relative to each page's current
    //                         rotation. Seeded 2026-07 to release the Gate-H
    //                         registry-starvation escalation on the long-
    //                         standing "rotate-pdf" evergreen candidate.
    //   - delete (+ pages) -> remove a page range, keep the rest. Seeded
    //                         2026-07-12 (fire111) to release the Gate-H
    //                         registry-starvation escalation on the
    //                         "delete-pdf-pages" evergreen candidate. Reuses
    //                         the split-mode range input + pmParseRanges()
    //                         helper, then copies the COMPLEMENT set of pages.
    //   - watermark/stamp  -> stamp the SAME text on every page, one fixed
    //                         diagonal gray semi-transparent style. Seeded
    //                         2026-07-12 (fire115) to release the Gate-H
    //                         registry-starvation escalation on the
    //                         "add-watermark-to-pdf" evergreen candidate.
    //                         Font sized per-page to fit 70% of that page's
    //                         width (no per-page text/position/color choice).
    //   - numbers (+ pages)-> print "Page N" centered at the bottom of every
    //                         page, counting up from a chosen starting
    //                         number. Seeded 2026-07-23 (fire354) to release
    //                         the Gate-H registry-starvation escalation on
    //                         the "add-page-numbers-to-pdf" evergreen
    //                         candidate. One fixed bottom-center style, no
    //                         per-page position/format/skip-cover choice.
    //   - compress         -> re-save with object streams (honest: a structural
    //                         re-save that can shrink some PDFs; it does NOT
    //                         recompress embedded raster images - see the tool-skill
    //                         ## NOT implemented anti-claims).
    //   - organize/reorder -> re-order every page of one PDF per a typed
    //                         1-based sequence (e.g. "3,1,2,4"); every original
    //                         page must appear exactly once. Seeded 2026-07-23
    //                         (fire356) to release the Gate-H registry-
    //                         starvation escalation on the "organize-pdf-pages"
    //                         evergreen candidate. isPdfMultitoolSlug() already
    //                         routed organize/reorder slugs here; this was the
    //                         missing pmMode() case (previously fell through to
    //                         'merge'). No new lib - reuses copyPages() exactly
    //                         like split/delete.
    // Framework contract: doAfterPageRendered(); no top-level DOM. Plain
    // <input type=file>, no server upload widget.

    web.localUpload = false;

    var PM_SLUG = 'pdf-compressor';

    function pmMode(slug) {
        var s = String(slug || '').toLowerCase();
        if (/\brotat(e|or)\b/.test(s)) return 'rotate';
        if (/\bdelete\b/.test(s) && /\bpages?\b/.test(s)) return 'delete';
        if (/\bwatermark\b|\bstamp\b/.test(s)) return 'watermark';
        if (/\bnumbers?\b/.test(s) && /\bpages?\b/.test(s)) return 'page-numbers';
        if (/\borganiz(e|ing)\b|\breorder\b/.test(s)) return 'organize';
        if (/\bsplit\b|extract-pages?/.test(s)) return 'split';
        if (/\bcompress(or)?\b|shrink|reduce/.test(s)) return 'compress';
        return 'merge'; // merge / combine / default
    }

    function ftoLoadPdfLib() {
        if (window.PDFLib && window.PDFLib.PDFDocument) { return Promise.resolve(); }
        if (window.__ftoPdfLibPromise) { return window.__ftoPdfLibPromise; }
        var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/pdf-lib';
        var url = base + '/pdf-lib.min.js';
        window.__ftoPdfLibPromise = new Promise(function (resolve, reject) {
            var s = document.createElement('script');
            s.src = url; s.async = true;
            s.onload = function () { (window.PDFLib && window.PDFLib.PDFDocument) ? resolve() : reject(new Error('pdf-lib loaded but PDFLib global is missing')); };
            s.onerror = function () { reject(new Error('failed to load pdf-lib from ' + url)); };
            document.head.appendChild(s);
        });
        return window.__ftoPdfLibPromise;
    }

    function pmKb(bytes) { return Math.round(bytes / 1024) + ' KB'; }

    function pmParseRanges(spec, pageCount) {
        // "1-3,5,8-10" (1-based) -> array of 0-based page indices, clamped/deduped.
        var out = [], seen = {};
        String(spec || '').split(',').forEach(function (part) {
            part = part.trim(); if (!part) return;
            var m = part.match(/^(\d+)\s*-\s*(\d+)$/);
            if (m) { for (var i = +m[1]; i <= +m[2]; i++) pushIdx(i); }
            else if (/^\d+$/.test(part)) pushIdx(+part);
        });
        function pushIdx(oneBased) { var idx = oneBased - 1; if (idx >= 0 && idx < pageCount && !seen[idx]) { seen[idx] = 1; out.push(idx); } }
        return out;
    }

    function pmParseOrder(spec, total) {
        // Every page 1..total must appear exactly once (a full permutation) -
        // reordering never silently drops a page. Returns 0-based indices in
        // the new order, or null when the spec is not a valid permutation.
        var parts = String(spec || '').split(',').map(function (p) { return p.trim(); }).filter(Boolean);
        if (!total || parts.length !== total) return null;
        var seen = {}, idxs = [];
        for (var i = 0; i < parts.length; i++) {
            if (!/^\d+$/.test(parts[i])) return null;
            var n = parseInt(parts[i], 10);
            if (n < 1 || n > total || seen[n]) return null;
            seen[n] = 1;
            idxs.push(n - 1);
        }
        return idxs;
    }

    function doAfterPageRendered() {
        var root = document.getElementById('pdfMultitoolTool');
        if (!root) return; // not a pdf-multitool page
        var mode = pmMode(PM_SLUG);
        var multi = (mode === 'merge');
        var rangeRow = (mode === 'split' || mode === 'delete')
            ? '<div class="w3-row" style="margin:8px 0;">' + (mode === 'delete' ? 'Delete pages' : 'Pages') + ' <input id="pmRange" class="w3-input w3-border" style="max-width:220px;display:inline-block;" placeholder="e.g. 1-3,5"></div>' : '';
        var angleRow = (mode === 'rotate')
            ? '<div class="w3-row" style="margin:8px 0;">Rotate <select id="pmAngle" class="w3-select w3-border" style="max-width:260px;display:inline-block;">' +
              '<option value="90">90&deg; clockwise</option>' +
              '<option value="180">180&deg;</option>' +
              '<option value="270">270&deg; clockwise (= 90&deg; counter-clockwise)</option>' +
              '</select></div>' : '';
        var watermarkRow = (mode === 'watermark')
            ? '<div class="w3-row" style="margin:8px 0;">Watermark text <input id="pmWmText" type="text" maxlength="60" class="w3-input w3-border" style="max-width:320px;display:inline-block;" placeholder="e.g. DRAFT"></div>' : '';
        var pageNumRow = (mode === 'page-numbers')
            ? '<div class="w3-row" style="margin:8px 0;">Start numbering at <input id="pmPnStart" type="number" min="1" step="1" value="1" class="w3-input w3-border" style="max-width:120px;display:inline-block;"></div>' : '';
        var orderRow = (mode === 'organize')
            ? '<div class="w3-row" style="margin:8px 0;">New page order <input id="pmOrder" type="text" class="w3-input w3-border" style="max-width:320px;display:inline-block;" placeholder="e.g. 3,1,2,4"></div>' : '';
        var verb = mode === 'merge' ? 'Merge PDFs' : (mode === 'split' ? 'Extract pages' : (mode === 'rotate' ? 'Rotate PDF' : (mode === 'delete' ? 'Delete pages' : (mode === 'watermark' ? 'Add watermark' : (mode === 'page-numbers' ? 'Add page numbers' : (mode === 'organize' ? 'Reorder pages' : 'Compress PDF'))))));
        root.innerHTML =
            '<div class="w3-row" style="margin-bottom:8px;"><input type="file" id="pmFile" accept="application/pdf,.pdf"' + (multi ? ' multiple' : '') + ' class="w3-input w3-border" style="max-width:460px;"></div>' +
            rangeRow + angleRow + watermarkRow + pageNumRow + orderRow +
            '<div style="margin-bottom:8px;"><button id="pmRun" type="button" class="w3-button w3-green" disabled>' + verb + '</button> ' +
            '<a id="pmDl" class="w3-button w3-blue" style="display:none;">Download PDF</a></div>' +
            '<div id="pmOut" class="outputImgs" style="visibility:visible !important;min-height:1.2em;color:#555;">Choose ' + (multi ? 'two or more PDFs' : 'a PDF') + '. Everything runs locally - nothing is uploaded.</div>';
        var fileEl = root.querySelector('#pmFile'), runBtn = root.querySelector('#pmRun'), dl = root.querySelector('#pmDl'), out = root.querySelector('#pmOut');
        function status(m) { out.textContent = m; }
        fileEl.addEventListener('change', function () {
            runBtn.disabled = !(fileEl.files && fileEl.files.length);
            dl.style.display = 'none';
            if (mode === 'organize' && fileEl.files && fileEl.files.length) {
                status('Reading page count...');
                ftoLoadPdfLib().then(function () {
                    return PL_load(fileEl.files[0]);
                }).then(function (n) {
                    var hint = []; for (var i = n; i >= 1; i--) hint.push(i);
                    status('This PDF has ' + n + ' pages. Enter the new order as all ' + n + ' page numbers, each once (e.g. ' + hint.join(',') + ' reverses it).');
                }).catch(function (e) { status('Could not read that PDF: ' + (e && e.message ? e.message : 'error') + '.'); });
            }
        });
        function PL_load(file) {
            return file.arrayBuffer().then(function (buf) {
                return window.PDFLib.PDFDocument.load(buf, { ignoreEncryption: true });
            }).then(function (doc) { return doc.getPageCount(); });
        }
        runBtn.addEventListener('click', function () {
            var files = fileEl.files ? Array.prototype.slice.call(fileEl.files) : [];
            if (!files.length) { status('Choose a PDF first.'); return; }
            runBtn.disabled = true; status('Working locally...');
            ftoLoadPdfLib().then(async function () {
                var PL = window.PDFLib;
                var outDoc, name;
                if (mode === 'merge') {
                    outDoc = await PL.PDFDocument.create();
                    for (var i = 0; i < files.length; i++) {
                        var src = await PL.PDFDocument.load(await files[i].arrayBuffer(), { ignoreEncryption: true });
                        var pages = await outDoc.copyPages(src, src.getPageIndices());
                        pages.forEach(function (p) { outDoc.addPage(p); });
                    }
                    name = 'merged.pdf';
                } else if (mode === 'split') {
                    var src2 = await PL.PDFDocument.load(await files[0].arrayBuffer(), { ignoreEncryption: true });
                    var idxs = pmParseRanges(root.querySelector('#pmRange').value, src2.getPageCount());
                    if (!idxs.length) { status('Enter a valid page range (e.g. 1-3,5). The PDF has ' + src2.getPageCount() + ' pages.'); runBtn.disabled = false; return; }
                    outDoc = await PL.PDFDocument.create();
                    var copied = await outDoc.copyPages(src2, idxs);
                    copied.forEach(function (p) { outDoc.addPage(p); });
                    name = 'extracted-pages.pdf';
                } else if (mode === 'rotate') {
                    outDoc = await PL.PDFDocument.load(await files[0].arrayBuffer(), { ignoreEncryption: true });
                    var deg = parseInt((root.querySelector('#pmAngle') || {}).value || '90', 10);
                    outDoc.getPages().forEach(function (p) {
                        var cur = (p.getRotation() && p.getRotation().angle) || 0;
                        p.setRotation(PL.degrees((cur + deg) % 360));
                    });
                    name = 'rotated.pdf';
                } else if (mode === 'delete') {
                    var src3 = await PL.PDFDocument.load(await files[0].arrayBuffer(), { ignoreEncryption: true });
                    var delIdxs = pmParseRanges(root.querySelector('#pmRange').value, src3.getPageCount());
                    if (!delIdxs.length) { status('Enter a valid page range to delete (e.g. 1-3,5). The PDF has ' + src3.getPageCount() + ' pages.'); runBtn.disabled = false; return; }
                    var delSet = {};
                    delIdxs.forEach(function (i) { delSet[i] = 1; });
                    var keepIdxs = [];
                    for (var pi = 0; pi < src3.getPageCount(); pi++) { if (!delSet[pi]) keepIdxs.push(pi); }
                    if (!keepIdxs.length) { status('Cannot delete every page - the PDF would have zero pages left.'); runBtn.disabled = false; return; }
                    outDoc = await PL.PDFDocument.create();
                    var copiedKeep = await outDoc.copyPages(src3, keepIdxs);
                    copiedKeep.forEach(function (p) { outDoc.addPage(p); });
                    name = 'pages-deleted.pdf';
                } else if (mode === 'watermark') {
                    var wmText = ((root.querySelector('#pmWmText') || {}).value || '').trim();
                    if (!wmText) { status('Type the watermark text first.'); runBtn.disabled = false; return; }
                    outDoc = await PL.PDFDocument.load(await files[0].arrayBuffer(), { ignoreEncryption: true });
                    var wmFont = await outDoc.embedFont(PL.StandardFonts.HelveticaBold);
                    outDoc.getPages().forEach(function (p) {
                        var pw = p.getWidth(), ph = p.getHeight();
                        var size = 48;
                        while (size > 8 && wmFont.widthOfTextAtSize(wmText, size) > pw * 0.7) { size -= 2; }
                        var textWidth = wmFont.widthOfTextAtSize(wmText, size);
                        p.drawText(wmText, {
                            x: (pw - textWidth) / 2,
                            y: ph / 2,
                            size: size,
                            font: wmFont,
                            color: PL.rgb(0.6, 0.6, 0.6),
                            opacity: 0.35,
                            rotate: PL.degrees(45)
                        });
                    });
                    name = 'watermarked.pdf';
                } else if (mode === 'page-numbers') {
                    var startNum = parseInt((root.querySelector('#pmPnStart') || {}).value || '1', 10);
                    if (!isFinite(startNum) || startNum < 1) startNum = 1;
                    outDoc = await PL.PDFDocument.load(await files[0].arrayBuffer(), { ignoreEncryption: true });
                    var pnFont = await outDoc.embedFont(PL.StandardFonts.Helvetica);
                    outDoc.getPages().forEach(function (p, pIdx) {
                        var label = 'Page ' + (startNum + pIdx);
                        var pw = p.getWidth();
                        var size = 11;
                        var textWidth = pnFont.widthOfTextAtSize(label, size);
                        p.drawText(label, {
                            x: (pw - textWidth) / 2,
                            y: 18,
                            size: size,
                            font: pnFont,
                            color: PL.rgb(0.35, 0.35, 0.35),
                            opacity: 0.9
                        });
                    });
                    name = 'numbered.pdf';
                } else if (mode === 'organize') {
                    var srcOrg = await PL.PDFDocument.load(await files[0].arrayBuffer(), { ignoreEncryption: true });
                    var totalOrg = srcOrg.getPageCount();
                    var orderIdxs = pmParseOrder((root.querySelector('#pmOrder') || {}).value, totalOrg);
                    if (!orderIdxs) { status('Enter the new order as all ' + totalOrg + ' page numbers, each exactly once (e.g. 1,2,3,...,' + totalOrg + ').'); runBtn.disabled = false; return; }
                    outDoc = await PL.PDFDocument.create();
                    var reordered = await outDoc.copyPages(srcOrg, orderIdxs);
                    reordered.forEach(function (p) { outDoc.addPage(p); });
                    name = 'reordered.pdf';
                } else { // compress = structural re-save
                    outDoc = await PL.PDFDocument.load(await files[0].arrayBuffer(), { ignoreEncryption: true });
                    name = 'optimized.pdf';
                }
                var bytes = await outDoc.save({ useObjectStreams: true });
                var blob = new Blob([bytes], { type: 'application/pdf' });
                var url = URL.createObjectURL(blob);
                dl.href = url; dl.download = name; dl.style.display = '';
                var inSize = files.reduce(function (a, f) { return a + f.size; }, 0);
                var delta = mode === 'compress' ? (' (' + pmKb(inSize) + ' -> ' + pmKb(blob.size) + (blob.size < inSize ? ', ' + Math.round((1 - blob.size / inSize) * 100) + '% smaller' : ', already optimal') + ')') : '';
                status('Done locally - no upload. Output ' + pmKb(blob.size) + delta + '.');
                runBtn.disabled = false;
            }).catch(function (e) { status('Could not process the PDF: ' + (e && e.message ? e.message : 'error') + '.'); runBtn.disabled = false; });
        });
    }
</script>
