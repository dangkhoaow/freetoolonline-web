<script>
    web.localUpload = false;
    var SLB_GAME_URL = 'https://dangkhoaow.github.io/ftol-vm-assets/games/species-life-battle/index.html';
    function slbStatus(t){ var el=document.getElementById('slbStatus'); if(el) el.textContent=t; }
    function slbInjectFrame(stage){
        var frame=document.createElement('iframe');
        frame.id='slbFrame'; frame.src=SLB_GAME_URL; frame.title='Species Life Battle';
        frame.setAttribute('allow','fullscreen'); frame.setAttribute('allowfullscreen','');
        frame.addEventListener('load',function(){ slbStatus('Loaded. Click Start game inside the frame.'); });
        var launch=document.getElementById('slbLaunch');
        if(launch&&launch.parentNode===stage) stage.removeChild(launch);
        stage.appendChild(frame);
    }
    function doAfterPageRendered(){
        var stage=document.getElementById('slbStage'), playBtn=document.getElementById('slbPlayBtn');
        if(!stage||!playBtn) return;
        var fsBtn=document.getElementById('slbFullscreenBtn');
        playBtn.addEventListener('click',function(){
            slbStatus('Loading about ~47 KB...'); slbInjectFrame(stage);
            if(fsBtn) fsBtn.disabled=false;
        });
        if(fsBtn) fsBtn.addEventListener('click',function(){
            if(stage.requestFullscreen) stage.requestFullscreen();
            else if(stage.webkitRequestFullscreen) stage.webkitRequestFullscreen();
        });
    }
</script>
