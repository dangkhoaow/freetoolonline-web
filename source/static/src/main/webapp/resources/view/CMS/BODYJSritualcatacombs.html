<script>
    web.localUpload = false;
    var RCA_GAME_URL = 'ritual-catacombs/index.html';
    function rcaStatus(text) {
        var el = document.getElementById('rcaStatus');
        if (el) el.textContent = text;
    }
    function rcaInjectFrame(stage) {
        var frame = document.createElement('iframe');
        frame.id = 'rcaFrame';
        frame.src = RCA_GAME_URL;
        frame.title = 'Ritual Catacombs game';
        frame.setAttribute('allow', 'fullscreen; pointer-lock');
        frame.setAttribute('allowfullscreen', '');
        frame.addEventListener('load', function () {
            rcaStatus('Game loaded. Click inside the frame to capture the mouse, then use WASD and left click to explore.');
            try { frame.contentWindow.focus(); } catch (e) {}
        });
        var launch = document.getElementById('rcaLaunch');
        if (launch && launch.parentNode === stage) stage.removeChild(launch);
        stage.appendChild(frame);
        return frame;
    }
    function doAfterPageRendered() {
        var stage = document.getElementById('rcaStage');
        var playBtn = document.getElementById('rcaPlayBtn');
        if (!stage || !playBtn) return;
        if (playBtn.dataset.bound === '1') return;
        playBtn.dataset.bound = '1';
        var fsBtn = document.getElementById('rcaFullscreenBtn');
        playBtn.addEventListener('click', function () {
            rcaStatus('Loading the game (about 94 KB, one time - then cached)...');
            rcaInjectFrame(stage);
            if (fsBtn) fsBtn.disabled = false;
        });
        if (fsBtn) fsBtn.addEventListener('click', function () {
            if (stage.requestFullscreen) stage.requestFullscreen();
            else if (stage.webkitRequestFullscreen) stage.webkitRequestFullscreen();
            var frame = document.getElementById('rcaFrame');
            if (frame) { try { frame.contentWindow.focus(); } catch (e) {} }
        });
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', doAfterPageRendered);
    } else {
        doAfterPageRendered();
    }
</script>
