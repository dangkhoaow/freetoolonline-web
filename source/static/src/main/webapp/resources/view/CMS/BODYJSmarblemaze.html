<script>
    // Marble Maze launcher. The game is the open-source Astray engine
    // (wwwtyro; public-domain "the Unlicense" - full analysis in
    // tool-marblemaze/SKILL.md), vendored as static files at
    // games/marble-maze/ in an isolated same-origin iframe: classic
    // scripts, relative paths, ~1.7 MB total. No analytics or CDN calls
    // existed upstream. The iframe loads only when the reader presses Play.
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    // Relative to /games/, so it resolves under any base path (staging subpath
    // included) without needing BASE_PATH.
    var MMZ_GAME_URL = 'https://dangkhoaow.github.io/ftol-vm-assets/games/marble-maze/index.html';

    function mmzStatus(text) {
        var el = document.getElementById('mmzStatus');
        if (el) el.textContent = text;
    }

    function mmzInjectFrame(stage) {
        var frame = document.createElement('iframe');
        frame.id = 'mmzFrame';
        frame.src = MMZ_GAME_URL;
        frame.title = 'Marble Maze game';
        frame.setAttribute('allow', 'fullscreen');
        frame.setAttribute('allowfullscreen', '');
        frame.addEventListener('load', function () {
            mmzStatus('Game loaded. Use the arrow keys (or h / j / k / l) to roll the ball.');
            try { frame.contentWindow.focus(); } catch (e) { /* focus is best-effort */ }
        });
        var launch = document.getElementById('mmzLaunch');
        if (launch && launch.parentNode === stage) { stage.removeChild(launch); }
        stage.appendChild(frame);
        return frame;
    }

    function doAfterPageRendered() {
        var stage = document.getElementById('mmzStage');
        var playBtn = document.getElementById('mmzPlayBtn');
        if (!stage || !playBtn) return; // not this page

        var fsBtn = document.getElementById('mmzFullscreenBtn');
        playBtn.addEventListener('click', function () {
            mmzStatus('Loading the game (about 1.7 MB, one time - then cached)...');
            mmzInjectFrame(stage);
            if (fsBtn) fsBtn.disabled = false;
        });

        if (fsBtn) fsBtn.addEventListener('click', function () {
            if (stage.requestFullscreen) { stage.requestFullscreen(); }
            else if (stage.webkitRequestFullscreen) { stage.webkitRequestFullscreen(); }
            var frame = document.getElementById('mmzFrame');
            if (frame) { try { frame.contentWindow.focus(); } catch (e) { } }
        });
    }
</script>
