<div class="w3-container">
    <p>Choose the photos (the file picker also offers your camera on mobile), optionally check "Enhance for text" for a grayscale and contrast boost, then click Scan to PDF.</p>
</div>

<style>
    #documentScannerTool .doc-scan-row { margin-bottom: 12px; }
    #documentScannerTool label.doc-scan-label { font-weight: bold; display: block; margin-bottom: 4px; }
    #docScanThumbs { margin: 8px 0; font-size: 0.9em; color: #444; }
    #docScanThumbs .doc-scan-chip { display: inline-block; margin: 2px 6px 2px 0; padding: 2px 8px; background: #f1f1f1; border-radius: 10px; }
    #docScanStatus { margin-top: 8px; min-height: 1em; }
    #docScanError { color: #b00020; font-weight: bold; min-height: 1em; }
    #docScanDownload { margin-top: 10px; }
</style>

<div id="documentScannerTool" class="w3-container">
    <div class="doc-scan-row">
        <label class="doc-scan-label" for="docScanFile">Choose one or more photos of your document (or use your camera on mobile)</label>
        <input type="file" id="docScanFile" accept="image/*" multiple class="w3-input w3-border" />
    </div>
    <div id="docScanThumbs"></div>
    <div class="doc-scan-row">
        <label><input type="checkbox" id="docScanEnhance" /> Enhance for text (grayscale + contrast boost)</label>
    </div>
    <div class="doc-scan-row">
        <button type="button" id="docScanBtn" class="w3-button w3-red">Scan to PDF</button>
    </div>
    <div id="docScanError"></div>
    <div id="docScanStatus"></div>
    <div class="w3-row outputImgs">
        <a id="docScanDownload" style="display: none; visibility: visible !important;" class="w3-button w3-blue" href="#">Download scanned PDF</a>
    </div>
</div>
