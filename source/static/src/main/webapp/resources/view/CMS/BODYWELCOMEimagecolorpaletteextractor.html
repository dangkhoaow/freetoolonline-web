<h1 class="text-uppercase"><b>Image Color Palette Extractor</b></h1>
<time itemprop="dateUpdated" datetime="2026-07-21T00:00:00"><b>Last reviewed: 2026-07-21</b></time>
<hr/>
<p>Choose a local image and extract the top HEX colors from its pixels.</p>
<p>Pick how many colors to return (5, 8, 12, or 16), then click Extract Palette.</p>
<p>Everything runs in the browser - the image is never uploaded and no account is required.</p>
