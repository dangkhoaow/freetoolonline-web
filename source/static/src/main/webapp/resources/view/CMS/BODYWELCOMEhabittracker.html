<h1 class="text-uppercase"><b>Habit Tracker</b></h1>
<time itemprop="dateUpdated" datetime="2026-07-03T00:00:00"><b>Last reviewed: 2026-07-03</b></time>
<hr/>
<p>Keep a habit list in the browser - add, check off, and delete items.</p>
<p>Use it for a quick checklist when you do not want to install an app or sign in.</p>
<p>Each item gets a checkbox to mark it done and a button to remove it.</p>
