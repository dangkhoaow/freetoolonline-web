<script>
    // Voxel World Builder launcher. The full three.js voxel engine lives in an
    // isolated same-origin iframe at games/voxel-world/ (static asset; ES
    // modules; import map resolves 'three' to the vendored
    // /vendor/three/three.module.min.js - NO CDN). The page itself stays light:
    // the ~0.9 MB engine loads only when the reader presses Play. Pointer lock,
    // keyboard input, and the engine's full-viewport CSS all stay inside the
    // iframe document, so nothing collides with page styles or ids.
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    // Relative to /games/, so it resolves under any base path (staging subpath
    // included) without needing BASE_PATH.
    var VWB_GAME_URL = 'https://dangkhoaow.github.io/ftol-vm-assets/games/voxel-world/index.html';

    function vwbStatus(text) {
        var el = document.getElementById('vwbStatus');
        if (el) el.textContent = text;
    }

    function vwbInjectFrame(stage) {
        var frame = document.createElement('iframe');
        frame.id = 'vwbFrame';
        frame.src = VWB_GAME_URL;
        frame.title = 'Voxel World Builder game';
        frame.setAttribute('allow', 'fullscreen; pointer-lock; autoplay');
        frame.setAttribute('allowfullscreen', '');
        frame.addEventListener('load', function () {
            vwbStatus('Engine loaded. Click Play World on the title screen; ESC pauses.');
            try { frame.contentWindow.focus(); } catch (e) { /* focus is best-effort */ }
        });
        var launch = document.getElementById('vwbLaunch');
        if (launch && launch.parentNode === stage) { stage.removeChild(launch); }
        stage.appendChild(frame);
        return frame;
    }

    function doAfterPageRendered() {
        var stage = document.getElementById('vwbStage');
        var playBtn = document.getElementById('vwbPlayBtn');
        if (!stage || !playBtn) return; // not this page

        var coarse = false;
        try { coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches; } catch (e) { }
        if (coarse) {
            var note = document.getElementById('vwbTouchNote');
            if (note) note.style.display = 'block';
        }

        var fsBtn = document.getElementById('vwbFullscreenBtn');
        playBtn.addEventListener('click', function () {
            vwbStatus('Loading the game engine (about 0.9 MB, one time - then cached)...');
            vwbInjectFrame(stage);
            if (fsBtn) fsBtn.disabled = false;
        });

        if (fsBtn) fsBtn.addEventListener('click', function () {
            if (stage.requestFullscreen) { stage.requestFullscreen(); }
            else if (stage.webkitRequestFullscreen) { stage.webkitRequestFullscreen(); }
            var frame = document.getElementById('vwbFrame');
            if (frame) { try { frame.contentWindow.focus(); } catch (e) { } }
        });
    }
</script>
