<div class="w3-container">
    <p>Paste a JSON sample in the input box, click Generate, then copy the TypeScript interfaces from the output box. Nothing leaves your browser.</p>
</div>

<div id='formatEditor' class='w3-container jsonParser' style='opacity: 1'>
    <div class='w3-row w3-container beautify'>
        <div class='ui-editor'>
            <textarea class='input w3-input w3-border' id='inputText' spellcheck='false' placeholder='Paste your input here, then click JSON to TypeScript Interface Generator.'></textarea>
            <div style='display: none;' class='ui-resizer'></div>
            <div class='w3-row'>
                <button style='margin-top: 10px !important;margin-left: 0px !important;float: left !important;' type='button' id='convertButton' class='w3-button w3-red w3-left'>JSON to TypeScript Interface Generator</button>
                <button style='margin-top: 10px !important;margin-left: 8px !important;float: left !important;' type='button' id='clearInputButton' class='w3-button w3-light-grey w3-left'>Clear</button>
            </div>
        </div>
        <div class='ui-editor'>
            <textarea readonly class='output w3-input w3-border' id='outputText' spellcheck='false' placeholder='Output will appear here.'></textarea>
            <div style='display: none;' class='ui-resizer'></div>
            <div class='w3-row'>
                <button style='margin-top: 10px !important;margin-left: 0px !important;float: left !important;' type='button' id='copyOutputButton' class='w3-button w3-red w3-left'>Copy Output</button>
            </div>
        </div>
        <div class="w3-row stats w3-hide">
            <div class="w3-col w3-half">Input: <span id="oriSize"></span> bytes</div>
            <div class="w3-col w3-half">Output: <span id="outSize"></span> bytes</div>
        </div>
    </div>
</div>
