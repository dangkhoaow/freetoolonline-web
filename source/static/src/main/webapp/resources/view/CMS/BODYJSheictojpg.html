<style>
    /* cycle160 P160.A — force imgOutDownBtn visible regardless of hover.
       Same root-cause class as cycle97 P97.A (svgtopng) and cycle159
       P159.A (resizeimage): default cloudfront CSS sets
       `.imgOutDownBtn { visibility: hidden }` and only flips to `visible`
       on `.imageOut:hover`, which silently breaks mobile/touch UX (no
       hover) AND blocks Playwright's `state: visible` check used by the
       qa-e2e-test G16 gate on `expect_visible: a.imageDownloadBtn`. This
       override makes the Download CTA reachable on touch and on headless
       audits. */
    .imageOut .imgOutDownBtn,
    .imageOut.retouch .imgOutDownBtn { visibility: visible !important; opacity: 1 !important; }
</style>

<script>
    function loadUploadHandlersByPage(){
        web.includesProcess = true;
        var onFileCompleteOrigin = onFileComplete;
        onFileComplete = function(e, file, response) {
            var response = onFileCompleteOrigin.call(this, e, file, response);
            try{
                generateImgThumbs(response);
            } catch(e){}
        };
        
        var onCompleteOrigin = onComplete;
        onComplete = function(e) {
            onCompleteOrigin.call(this, e);
            try{
                if(web.fileInfoResult.length > 1){
                    web.fileInfoResult[0]["pageName"] = "combine-output";
                    web.fileInfoResult[0]["outPutfileType"] = !isPdfOut() ? ".zip" : ".pdf";
                    web.fileInfoResult[0]['customInputString'] = $('#dimensionOpts').val().split('x')[0];
                    web.fileInfoResult[0]['customInputString2'] = $('#dimensionOpts').val().split('x')[1];
                    getStatus(web.fileInfoResult[0]);
                } else if(web.fileInfoResult.length == 0){
                    $('.errorMsgAction').text('Error has occured').show();
                }
            } catch(e){
                $('.errorMsgAction').text('Error has occured').show();
            }
        };

        function isPdfOut() {
            return $('#outputFormat').val() === 'pdf';
        };
        
        buildInputObjBeforeSend = function(fileBase) {
            fileBase["hasExifData"] = $('#exifData').is(':checked') + "";
            fileBase["customInputString3"] = $('#autoOptimizeQuality').is(':checked') + "";
            fileBase["quality"] = parseInt($('#quality').val());
            fileBase["pageName"] = $('#outputFormat').val() === 'jpg' ? pageName : pageName.replace('jpg', $('#outputFormat').val());
            fileBase["inputFolder"] = "input";
            fileBase["includeProcess"] = "true";
            fileBase["outputFolder"] = "output";
            fileBase["outPutfileType"] = !isPdfOut() ? ".zip" : ".pdf";
            fileBase['customInputString'] = $('#dimensionOpts').val().split('x')[0];
            fileBase['customInputString2'] = $('#dimensionOpts').val().split('x')[1];
            $('.downloadBtnContainer').hide();
            return fileBase;
        };
        
        function getStatus(fileBase){
            callAjax(fileBase, 
                function(result){
                    generateDownloadZip(result);			
                },
                function(){}
            );
        };
        
        function generateDownloadZip(result){
            if (result && result.downloadUrl && result.downloadUrl !== '') {
                $('.downloadBtnContainer').show().find('#downloadLink').attr('href', setOutputUrl(result, false));
                $('.downloadBtnContainer').show().find('#downloadLink').text(!isPdfOut() ? 'Download all '+$('#outputFormat').val()+' images' : 'Download combined pdf file');
            } 
        };
        
        var recentCol = 0,
            tempPdf = "<div title='Click here to download' id='imgOut-{0}' class='imageOut'><img loading='lazy' src='{1}'><div class='imgOutDownBtn'><a class='w3-button w3-light-grey imageDownloadBtn' target='_blank' href='{2}'><span>Download<br/><i class='fa fa-photo'></i> {3}</span></button></div></div>",
            temp = '<div title="Click here to download" id="{0}" class="imageOut retouch"><img loading="lazy" src="{1}"><div class="imgOutDownBtn"><a class="w3-button w3-light-grey imageDownloadBtn" target="_blank" href="{2}"><span>Download<br> {3}</span></a></div><a title="Click here to retouch with photo editor" target="_blank" href="https://freetoolonline.com/photo-editor.html?img-url={4}"><span><i class="fa fa-photo"></i> Retouch</span></a></div>';
               
        function generateImgThumbs(result){
            var imgsOut = '',
                imgName = result.name,
                viewUrl = result.thumbUrl + "";
            
            if (!isPdfOut()){
                imgsOut = imgsOut + String.format(temp, imgName, result.thumbUrl, result.downloadUrl, result.name, result.downloadUrl);
            } else {
                viewUrl = viewUrl.substring(0, viewUrl.lastIndexOf(".pdf")) + '.png';
                imgsOut = imgsOut + String.format(tempPdf, imgName, viewUrl, result.downloadUrl.replace('output', 'thumb'), imgName);
            }
            
            if (imgsOut !== '') {
                if (recentCol < $('.outputImgs .w3-col').length){
                    recentCol = recentCol + 1;
                } else {
                    recentCol = 1;
                }
                $('.col' + recentCol).append(imgsOut);
            }
        };
        
        var slider = document.getElementById("quality");
        var output = document.getElementById("qualityValue");
        slider.value = slider.max;
        output.innerHTML = slider.value + "-<b>max</b>";
        slider.oninput = function() {
          output.innerHTML = this.value;
          if(parseInt(this.value) == slider.max){
              output.innerHTML = output.innerHTML + "-<b>max</b>";
          }
        };
        $('#outputFormat').change(function(){
            if ($('#outputFormat').val() === 'jpg') {
                $('#exifData').prop('checked', true);
            }
        });
        
        $('#autoOptimizeQuality').change(function(){
            var isChecked = $(this).is(':checked');
            $('#quality').attr('disabled', isChecked);
            $('.qualityC').css('opacity', isChecked ? 0.4 : 1);
        });
    };

    function doAfterPageRendered(){
        loadDeferredStyle('https://dkbg1jftzfsd2.cloudfront.net/style/convert/heic-to-jpg.css');
        $('.downloadBtnContainer').hide();
        $('#outputFormat').change(function(e){
            if ($(this).val() === "pdf"){
                $('.dimensionOptsC').show();
            } else {
                $('.dimensionOptsC').hide();
            }
        })
    };
    
    function getInfosHook(){
        if (heathyHost && ($('#autoOptimizeQuality').attr('data-default-check-from-status') == true || $('#autoOptimizeQuality').attr('data-default-check-from-status') === 'true')) {
            $('#autoOptimizeQuality').prop('checked', true);
            $('#quality').attr('disabled', true);
            $('.qualityC').css('opacity', 0.4);
        } else {
            $('#quality').attr('disabled', false);
            $('.qualityC').css('opacity', 1);
        }
    };
</script>

<!-- E4 freetool-migration: ADDITIVE in-browser HEIC->JPG/PNG/WebP path (heic-to, zero upload).
     The server multi-file convert path above (upload -> callAjax) is UNTOUCHED. This client
     path decodes HEIC entirely on the device (libheif WASM). Activates only when the
     client-mode controls (added in ui_and_skill) are present. -->
<script>
    // Idempotent lazy-loader for the self-hosted heic-to IIFE (window.HeicTo; libheif WASM inlined).
    function ftoLoadHeicTo() {
        if (window.HeicTo) { return Promise.resolve(); }
        if (window.__ftoHeicToPromise) { return window.__ftoHeicToPromise; }
        var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/heic-to';
        window.__ftoHeicToPromise = new Promise(function (resolve, reject) {
            var s = document.createElement('script');
            s.src = base + '/heic-to.js'; s.async = true;
            s.onload = function () { window.HeicTo ? resolve() : reject(new Error('heic-to loaded but HeicTo global is missing')); };
            s.onerror = function () { reject(new Error('failed to load heic-to from ' + base)); };
            document.head.appendChild(s);
        });
        return window.__ftoHeicToPromise;
    }

    // Real client-side HEIC decode. opts: { format:'jpg'|'png'|'webp', quality:1-100 }.
    // Mirrors the source convertHeicInBrowser: HeicTo({blob,type,quality/100}) with a 60s
    // timeout race. Returns { blob, ext }. Zero backend calls (libheif WASM in-browser).
    function ftoClientHeicConvert(file, opts, onProgress) {
        opts = opts || {};
        var fmt = (opts.format === 'png') ? 'png' : (opts.format === 'webp') ? 'webp' : 'jpg';
        var mime = fmt === 'png' ? 'image/png' : fmt === 'webp' ? 'image/webp' : 'image/jpeg';
        var quality = Math.min(100, Math.max(1, parseInt(opts.quality, 10) || 80)) / 100;
        return ftoLoadHeicTo().then(function () {
            if (typeof onProgress === 'function') { onProgress(0.2); }
            var conv = window.HeicTo({ blob: file, type: mime, quality: quality });
            var timeout = new Promise(function (_, rej) { setTimeout(function () { rej(new Error('Conversion timed out after 60s')); }, 60000); });
            return Promise.race([conv, timeout]).then(function (blob) {
                if (typeof onProgress === 'function') { onProgress(1); }
                return { blob: blob, ext: fmt };
            });
        });
    }

    // Guarded wiring to the client-mode controls (added in ui_and_skill). No-op until then.
    function ftoWireClientHeicToJpg() {
        var input = document.getElementById('hjClientFile');
        var btn = document.getElementById('hjClientBtn');
        if (!input || !btn) { return; }
        // E4 verify-fix: relocate this client panel out of any hidden server-flow .step
        // so the in-browser (no-upload) tool is visible without uploading. No-op when not nested.
        var __ftoRow = btn.closest ? btn.closest('.w3-row') : null;
        var __ftoStep = __ftoRow && __ftoRow.closest ? __ftoRow.closest('.step') : null;
        if (__ftoStep && __ftoStep.parentNode) { __ftoStep.parentNode.insertBefore(__ftoRow, __ftoStep.nextSibling); }
        var status = document.getElementById('hjStatus');
        var dl = document.getElementById('hjDownload');
        function val(id, d) { var el = document.getElementById(id); return el ? el.value : d; }
        function setStatus(m) { if (status) { status.textContent = m; } }
        btn.addEventListener('click', function () {
            var f = input.files && input.files[0];
            if (!f) { setStatus('Select a HEIC file to convert.'); return; }
            btn.disabled = true;
            if (dl) { dl.style.display = 'none'; dl.removeAttribute('href'); }
            setStatus('Converting in your browser ...');
            var doConvert = function () {
                var fmt = val('hjFormat', 'jpg');
                return ftoClientHeicConvert(f, { format: fmt, quality: val('hjQuality', '80') }, function (frac) {
                    setStatus('Converting in your browser ... ' + Math.round(frac * 100) + '%');
                }).then(function (res) {
                    var url = URL.createObjectURL(res.blob);
                    var baseName = (f.name || 'image').replace(/\.[^.]+$/, '');
                    if (dl) {
                        dl.href = url; dl.download = baseName + '.' + res.ext;
                        dl.style.display = ''; dl.textContent = 'Download .' + res.ext;
                    }
                    setStatus('Done in your browser - no upload. Converted to ' + res.ext.toUpperCase() + ' (' + (res.blob.size / 1024).toFixed(0) + ' KB).');
                });
            };
            // Optional pre-check: warn (do not block) if the file does not look like HEIC.
            ftoLoadHeicTo().then(function () {
                return (window.HeicTo && window.HeicTo.isHeic) ? window.HeicTo.isHeic(f).catch(function () { return true; }) : true;
            }).then(function (isH) {
                if (isH === false) { setStatus('That file does not look like HEIC; trying anyway ...'); }
                return doConvert();
            }).catch(function (err) {
                setStatus('Could not convert in the browser: ' + (err && err.message ? err.message : 'unknown error') + '. The server convert above still works.');
            }).then(function () { btn.disabled = false; });
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', ftoWireClientHeicToJpg);
    } else {
        ftoWireClientHeicToJpg();
    }
</script>
