<div class="w3-container">
    <p>Click Start to begin; results render below as the diagnostic runs.</p>
</div>

<style>
    #refreshRateTestTool .rr-row { margin-bottom: 12px; }
    #refreshRateTestTool .rr-status {
        font-family: monospace; margin-top: 10px; min-height: 1.4em; white-space: pre-wrap;
    }
    #refreshRateTestTool .rr-hz {
        font-size: 42px; font-weight: 700; font-family: monospace; line-height: 1.2;
        margin: 8px 0;
    }
    #refreshRateTestTool .rr-panel {
        margin-top: 12px; padding: 12px; border: 1px solid #cccccc; border-radius: 4px;
        background: #fafafa;
    }
    #refreshRateTestTool .rr-panel.rr-running { border-color: #6a1b9a; background: #faf5ff; }
    #refreshRateTestTool .rr-bar-wrap {
        height: 12px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-top: 8px;
    }
    #refreshRateTestTool .rr-bar {
        height: 100%; width: 0%; background: #6a1b9a; transition: width 0.05s linear;
    }
</style>

<div id="refreshRateTestTool" class="w3-container">
    <div class="rr-row">
        <button type="button" id="rrStart" class="w3-button w3-red">Start measuring</button>
        <button type="button" id="rrStop" class="w3-button w3-light-grey" style="margin-left: 8px;">Stop</button>
        <button type="button" id="rrReset" class="w3-button w3-light-grey" style="margin-left: 8px;">Reset</button>
    </div>
    <div id="rrPanel" class="rr-panel" role="status" aria-live="polite">
        <b>Estimated refresh rate</b>
        <div id="rrHz" class="rr-hz">-- Hz</div>
        <div class="rr-bar-wrap" aria-hidden="true"><div id="rrBar" class="rr-bar"></div></div>
        <p id="rrCue" class="rr-status">Ready. Click Start measuring to sample requestAnimationFrame timing in this tab. Nothing is uploaded.</p>
        <p id="rrStats" class="rr-status">frames: 0 | avgDelta: -- ms | samples: 0</p>
    </div>
</div>
