    // ---- vendored ESM loader (ftoLoadPdfLib shape, but a cached import()) ----
    function ftoLoadThree() {
        if (window.__ftoThreePromise) { return window.__ftoThreePromise; }
        var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/three';
        window.__ftoThreePromise = import(base + '/three.module.min.js').then(function (mod) {
            if (!mod || !mod.WebGLRenderer) { throw new Error('three.js loaded but WebGLRenderer is missing'); }
            return mod;
        });
        return window.__ftoThreePromise;
    }

    function t3dStatus(text) {
        var el = document.getElementById('t3dStatus');
        if (el) el.textContent = text;
    }
    function t3dInfo(html) {
        var el = document.getElementById('t3dInfoPanel');
        if (el) el.innerHTML = html;
    }
    function t3dLoadStore() {
        try { return JSON.parse(localStorage.getItem(T3D_STORE_KEY) || '{}') || {}; }
        catch (e) { return {}; }
    }
    function t3dSaveStore(obj) {
        try { localStorage.setItem(T3D_STORE_KEY, JSON.stringify(obj)); }
        catch (e) { t3dStatus('Could not save to browser storage (quota or private mode) - building still works.'); }
    }
    function t3dFullscreen(el) {
        if (el.requestFullscreen) { el.requestFullscreen(); }
        else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
        else if (el.mozRequestFullScreen) { el.mozRequestFullScreen(); }
        else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
    }

    // ---- shared scene shell: renderer + camera + custom pointer-orbit --------
    // OrbitControls is NOT vendored (jsm addons import the bare 'three'
    // specifier); this ~40-line orbit covers drag-rotate + wheel/pinch zoom
    // with damping and a clamped pitch.
    function t3dShell(THREE, host, opts) {
        var coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        var low = coarse || ((navigator.hardwareConcurrency || 4) <= 4);
        var renderer = new THREE.WebGLRenderer({ antialias: !low, powerPreference: 'default' });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(opts.fov || 55, 1, 0.1, 4000);
        var orbit = {
            target: new THREE.Vector3(0, opts.targetY || 0, 0),
            radius: opts.radius, theta: opts.theta || 0.6, phi: opts.phi || 1.15,
            goalRadius: opts.radius, goalTheta: opts.theta || 0.6, goalPhi: opts.phi || 1.15,
            minR: opts.minR || 4, maxR: opts.maxR || 400,
        };
        function applyCamera() {
            // critically-damped-ish lerp toward the goal orbit
            orbit.theta += (orbit.goalTheta - orbit.theta) * 0.14;
            orbit.phi += (orbit.goalPhi - orbit.phi) * 0.14;
            orbit.radius += (orbit.goalRadius - orbit.radius) * 0.14;
            var sp = Math.sin(orbit.phi), cp = Math.cos(orbit.phi);
            camera.position.set(
                orbit.target.x + orbit.radius * sp * Math.sin(orbit.theta),
                orbit.target.y + orbit.radius * cp,
                orbit.target.z + orbit.radius * sp * Math.cos(orbit.theta)
            );
            camera.lookAt(orbit.target);
        }
        function size() {
            var w = Math.max(260, host.clientWidth);
            var h = Math.round(w * 0.62);
            var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
            if (fsEl && fsEl.contains(host)) { h = Math.max(240, (window.innerHeight || h) - 150); }
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        host.appendChild(renderer.domElement);
        renderer.domElement.style.touchAction = 'none';
        renderer.domElement.style.borderRadius = '6px';
        // pointer-orbit input
        var drag = null, pinch = null, moved = 0;
        host.addEventListener('pointerdown', function (e) {
            drag = { x: e.clientX, y: e.clientY }; moved = 0;
            host.setPointerCapture && host.setPointerCapture(e.pointerId);
        });
        host.addEventListener('pointermove', function (e) {
            if (!drag) return;
            var dx = e.clientX - drag.x, dy = e.clientY - drag.y;
            moved += Math.abs(dx) + Math.abs(dy);
            drag = { x: e.clientX, y: e.clientY };
            orbit.goalTheta -= dx * 0.006;
            orbit.goalPhi = Math.min(Math.max(orbit.goalPhi - dy * 0.005, 0.15), Math.PI - 0.2);
        });
        host.addEventListener('pointerup', function (e) {
            var wasClick = moved < 8;
            drag = null;
            if (wasClick && shell.onClick) { shell.onClick(e); }
        });
        host.addEventListener('wheel', function (e) {
            e.preventDefault();
            orbit.goalRadius = Math.min(Math.max(orbit.goalRadius * (e.deltaY > 0 ? 1.12 : 0.9), orbit.minR), orbit.maxR);
        }, { passive: false });
        host.addEventListener('touchstart', function (e) {
            if (e.touches.length === 2) {
                pinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        }, { passive: true });
        host.addEventListener('touchmove', function (e) {
            if (e.touches.length === 2 && pinch) {
                var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                orbit.goalRadius = Math.min(Math.max(orbit.goalRadius * (pinch / d), orbit.minR), orbit.maxR);
                pinch = d;
            }
        }, { passive: true });
        window.addEventListener('resize', size);
        document.addEventListener('fullscreenchange', size);
        document.addEventListener('webkitfullscreenchange', size);
        size();
        var shell = {
            THREE: THREE, renderer: renderer, scene: scene, camera: camera,
            orbit: orbit, low: low, applyCamera: applyCamera, size: size, onClick: null,
            ndc: function (e) {
                var r = renderer.domElement.getBoundingClientRect();
                return new THREE.Vector2(((e.clientX - r.left) / r.width) * 2 - 1, -((e.clientY - r.top) / r.height) * 2 + 1);
            },
        };
        return shell;
    }

    // ================= SOLAR SYSTEM ==========================================
    // Display scale is COMPRESSED (planet sizes ~1000x vs distances) so all 8

    var T3D_PLANETS = [

    function t3dSolar(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        scene.add(new THREE.AmbientLight(0xffffff, 0.35));
        var sunLight = new THREE.PointLight(0xfff3d0, 1400, 0, 1.8);
        scene.add(sunLight);
        var sun = new THREE.Mesh(new THREE.SphereGeometry(7, 32, 16), new THREE.MeshBasicMaterial({ color: 0xffd54f }));
        sun.userData = { kind: 'sun' };
        scene.add(sun);
        var planets = [];
        for (var i = 0; i < T3D_PLANETS.length; i++) {
            var p = T3D_PLANETS[i];
            var mesh = new THREE.Mesh(
                new THREE.SphereGeometry(p.r, 24, 12),
                new THREE.MeshLambertMaterial({ color: p.color })
            );
            mesh.userData = { kind: 'planet', idx: i, angle: Math.random() * Math.PI * 2 };
            scene.add(mesh);
            var ring = new THREE.Mesh(
                new THREE.TorusGeometry(p.orbit, 0.06, 6, 96),
                new THREE.MeshBasicMaterial({ color: 0x37474f })
            );
            ring.rotation.x = Math.PI / 2;
            scene.add(ring);
            if (p.name === 'Saturn') {
                var sr = new THREE.Mesh(new THREE.TorusGeometry(p.r * 1.8, 0.35, 6, 48), new THREE.MeshLambertMaterial({ color: 0xd8cba8 }));
                sr.rotation.x = Math.PI / 2.4;
                mesh.add(sr);
            }
            planets.push(mesh);
        }
        var speedEl = document.getElementById('t3dSpeed');
        var paused = false;
        var pauseBtn = document.getElementById('t3dPauseBtn');
        if (pauseBtn) pauseBtn.addEventListener('click', function () { paused = !paused; pauseBtn.textContent = paused ? 'Resume orbits' : 'Pause orbits'; });
        function facts(idx) {
            if (idx === -1) {
                t3dInfo('<h3>The Sun</h3><p>A main-sequence star holding 99.8 percent of the solar system\'s mass. Diameter about 1,392,000 km - 109 Earths across.</p><p class="t3d-note">Scale note: sizes and distances on screen are compressed so all eight planets fit one view; the numbers here are the real ones.</p>');
                return;
            }
            var p = T3D_PLANETS[idx];
            var period = p.periodDays >= 1000 ? (p.periodDays / 365.25).toFixed(1) + ' years' : p.periodDays + ' days';
            t3dInfo('<h3>' + p.name + '</h3><table class="w3-table w3-bordered"><tr><td>Diameter</td><td>' + p.realKm.toLocaleString('en-US') + ' km</td></tr><tr><td>Distance from sun</td><td>' + p.au + ' AU</td></tr><tr><td>Orbital period</td><td>' + period + '</td></tr></table><p class="t3d-note">On-screen sizes and distances are compressed for readability - this table has the real figures.</p>');
        }
        facts(-1);

    // ================= LUNAR ECLIPSE =============================================

    // Embedding-diagram teaching stage: well depth tracks escape velocity.
    // Escape v (km/s): Moon 2.38, Earth 11.2, Jupiter 59.5, Sun 617.5.
    // r_s = 2GM/c^2 literacy (e.g. Sun ~2.95 km) - NOT a GR simulator.
    var T3D_GW_BODIES = [
        { id: 'moon', name: 'Moon', vesc: 2.38, color: 0xcfd8dc, massScale: 0.22, note: 'Weakest well here - escape only 2.38 km/s.' },
        { id: 'earth', name: 'Earth', vesc: 11.2, color: 0x42a5f5, massScale: 0.55, note: 'Earth escape velocity is about 11.2 km/s from the surface.' },
        { id: 'jupiter', name: 'Jupiter', vesc: 59.5, color: 0xffb74d, massScale: 1.15, note: 'Jupiter escape velocity about 59.5 km/s - a much deeper well than Earth.' },
        { id: 'sun', name: 'Sun', vesc: 617.5, color: 0xffe082, massScale: 2.4, note: 'Sun escape from photosphere about 617.5 km/s; Schwarzschild radius ~2.95 km.' }
    ];
    function t3dGravityWell(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.35));
        var key = new THREE.DirectionalLight(0xfff8e1, 0.9);
        key.position.set(5, 12, 4);
        scene.add(key);
        var group = new THREE.Group();
        scene.add(group);

        var seg = shell.low ? 28 : 48;
        var size = 18;
        var geo = new THREE.PlaneGeometry(size, size, seg, seg);
        geo.rotateX(-Math.PI / 2);
        var mat = new THREE.MeshPhongMaterial({
            color: 0x1a237e,
            emissive: 0x0d1333,
            shininess: 12,
            flatShading: true,
            side: THREE.DoubleSide,
            wireframe: false
        });
        var sheet = new THREE.Mesh(geo, mat);
        group.add(sheet);
        var wire = new THREE.Mesh(
            geo.clone(),
            new THREE.MeshBasicMaterial({ color: 0x90caf9, wireframe: true, transparent: true, opacity: 0.22 })
        );
        group.add(wire);

        var bodyMesh = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 24, 16),
            new THREE.MeshPhongMaterial({ color: 0x42a5f5, emissive: 0x102030, shininess: 30 })
        );
        bodyMesh.position.set(0, 0.55, 0);
        group.add(bodyMesh);

        // Horizon teaching ring (Schwarzschild scale exaggerated so it stays visible)
        var rsRing = new THREE.Mesh(
            new THREE.TorusGeometry(0.35, 0.035, 8, 48),
            new THREE.MeshBasicMaterial({ color: 0xff7043 })
        );
        rsRing.rotation.x = Math.PI / 2;
        rsRing.visible = false;
        group.add(rsRing);

        var probe = new THREE.Mesh(
            new THREE.SphereGeometry(0.18, 12, 10),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        group.add(probe);

        var bodyIdx = 1; // Earth default
        var depthMul = 1;
        var showRs = false;
        var orbitPhase = 0;

        function deform(depth) {
            var pos = geo.attributes.position;
            for (var i = 0; i < pos.count; i++) {
                var x = pos.getX(i);
                var z = pos.getZ(i);
                var r = Math.sqrt(x * x + z * z);
                // Flamm-like funnels are extreme; use a smooth 1/sqrt(r^2+a^2) well
                var a = 1.15;
                var y = -depth * (1 / Math.sqrt(r * r + a * a) - 1 / Math.sqrt((size * 0.55) * (size * 0.55) + a * a));
                pos.setY(i, y);
            }
            pos.needsUpdate = true;
            geo.computeVertexNormals();
            wire.geometry.attributes.position.copy(pos);
            wire.geometry.attributes.position.needsUpdate = true;
        }

        function applyBody() {
            var b = T3D_GW_BODIES[bodyIdx];
            // Depth proxy scales with log(vesc) so Sun/Moon stay in one view
            var depth = (Math.log(b.vesc + 1) / Math.log(617.5 + 1)) * 6.5 * depthMul;
            deform(depth);
            bodyMesh.material.color.setHex(b.color);
            bodyMesh.scale.setScalar(0.7 + b.massScale * 0.45);
            bodyMesh.position.y = 0.2 + bodyMesh.scale.x * 0.45;
            rsRing.visible = showRs && b.id === 'sun';
            t3dInfo(panelHtml());
            t3dStatus(b.name + ' well selected - escape ' + b.vesc + ' km/s. Drag to orbit the embedding sheet.');
        }

        function panelHtml() {
            var b = T3D_GW_BODIES[bodyIdx];
            var html =
                '<h3>Gravity well</h3>' +
                '<p>An embedding-diagram teaching surface: the funnel deepens with escape velocity. This is a classic rubber-sheet picture - not a full GR metric solver.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Selected body</td><td>' + b.name + '</td></tr>' +
                '<tr><td>Escape velocity</td><td>' + b.vesc + ' km/s</td></tr>' +
                '<tr><td>Moon / Earth / Jupiter / Sun</td><td>2.38 / 11.2 / 59.5 / 617.5 km/s</td></tr>' +
                '<tr><td>r_s = 2GM/c^2 (Sun)</td><td>about 2.95 km</td></tr>' +
                '</table>' +
                '<p>' + b.note + '</p>' +
                '<p class="t3d-note">Distinct from Black Hole 3D Visualizer (accretion disk / horizon art). Depth here is an escape-velocity teaching proxy, not to geographic scale.</p>';
            return html;
        }

        var moonBtn = document.getElementById('t3dGwMoonBtn');
        var earthBtn = document.getElementById('t3dGwEarthBtn');
        var jupBtn = document.getElementById('t3dGwJupBtn');
        var sunBtn = document.getElementById('t3dGwSunBtn');
        var rsBtn = document.getElementById('t3dGwRsBtn');
        var deepBtn = document.getElementById('t3dGwDeepBtn');
        if (moonBtn) moonBtn.addEventListener('click', function () { bodyIdx = 0; applyBody(); });
        if (earthBtn) earthBtn.addEventListener('click', function () { bodyIdx = 1; applyBody(); });
        if (jupBtn) jupBtn.addEventListener('click', function () { bodyIdx = 2; applyBody(); });
        if (sunBtn) sunBtn.addEventListener('click', function () { bodyIdx = 3; applyBody(); });
        if (rsBtn) rsBtn.addEventListener('click', function () {
            showRs = !showRs;
            rsBtn.textContent = showRs ? 'Hide r_s ring' : 'Show r_s (Sun)';
            applyBody();
        });
        if (deepBtn) deepBtn.addEventListener('click', function () {
            depthMul = depthMul >= 1.6 ? 1 : 1.7;
            deepBtn.textContent = depthMul > 1 ? 'Normal depth' : 'Exaggerated depth';
            applyBody();
        });

        applyBody();
        return function animate(dt) {
            orbitPhase += dt * 0.00055;
            var b = T3D_GW_BODIES[bodyIdx];
            var R = 3.2 + b.massScale * 0.6;
            probe.position.set(Math.cos(orbitPhase) * R, bodyMesh.position.y + 0.15, Math.sin(orbitPhase) * R);
            bodyMesh.rotation.y += dt * 0.0004;
        };
    }





    // ================= SIDEREAL VS SOLAR DAY =================================
    // Why a star-day is shorter than a mean solar day: Earth also orbits.
    // Mean sidereal day ~23h56m04.09s; mean solar day 24h; difference ~3m56s.
    // Educational approximation - not a precise ephemeris / equation-of-time plot.
    var T3D_SS_SIDEREAL_S = 86164.0905; // mean sidereal day seconds
    var T3D_SS_SOLAR_S = 86400;         // mean solar day seconds
    var T3D_SS_DIFF_S = T3D_SS_SOLAR_S - T3D_SS_SIDEREAL_S; // ~235.91 s ~ 3m56s

    // ================= AURORA ==================================================
    // Auroral oval + altitude color curtain (NOAA OVATION / emission-line literacy).
    // Educational approximation - not real-time space weather.
    // Green O 557.7 nm ~90-150 km; red O 630.0 nm ~200-300 km; N2+ 427.8 nm lower edge.
    // Quiet oval ~65-70 deg mag lat; expands equatorward as Kp rises.
    function t3dAurora(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x010208, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.22));
        var sun = new THREE.DirectionalLight(0xfff3c4, 0.55);
        sun.position.set(6, 4, 2);
        scene.add(sun);
        var group = new THREE.Group();
        scene.add(group);

        var earthR = 4.2;
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(earthR, 48, 32),
            new THREE.MeshPhongMaterial({ color: 0x1b4f72, emissive: 0x051018, shininess: 12 })
        );
        group.add(earth);
        // dark night hemisphere cue
        var night = new THREE.Mesh(
            new THREE.SphereGeometry(earthR * 1.002, 32, 24, 0, Math.PI),
            new THREE.MeshBasicMaterial({ color: 0x02060c, transparent: true, opacity: 0.55, side: THREE.DoubleSide })
        );
        night.rotation.y = Math.PI * 0.5;
        group.add(night);

        // Magnetic pole teaching axis (north)
        var axis = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, -earthR * 1.35, 0),
                new THREE.Vector3(0, earthR * 1.35, 0)
            ]),
            new THREE.LineBasicMaterial({ color: 0x90a4ae, transparent: true, opacity: 0.55 })
        );
        group.add(axis);

        var curtain = new THREE.Group();
        group.add(curtain);

        var kp = 3; // 0..9 teaching slider
        var spin = 0;
        var playing = true;

        function ovalLatDeg(k) {
            // Quiet ~67.5 deg; expand equatorward (~ lower latitude) as Kp rises
            return 67.5 - k * 1.8; // Kp9 -> ~51 deg teaching
        }
        function altColor(altKm) {
            // Altitude colour literacy (teaching)
            if (altKm >= 200) return { c: 0xff5252, a: 0.55 }; // red O 630.0
            if (altKm >= 90) return { c: 0x69f0ae, a: 0.7 };  // green O 557.7
            return { c: 0x7c4dff, a: 0.5 }; // blue/purple N2+ 427.8 lower edge
        }

        function rebuildCurtain() {
            while (curtain.children.length) {
                var ch = curtain.children.pop();
                if (ch.geometry) ch.geometry.dispose();
                if (ch.material) ch.material.dispose();
            }
            var lat0 = ovalLatDeg(kp) * Math.PI / 180;
            var bands = [
                { altKm: 110, h: 0.55 }, // green peak band
                { altKm: 230, h: 0.85 }, // red higher
                { altKm: 85, h: 0.28 }   // purple lower fringe
            ];
            bands.forEach(function (b) {
                var col = altColor(b.altKm);
                var r = earthR + (b.altKm / 300) * 1.7;
                var tube = 0.08 + (kp / 9) * 0.12;
                // Torus in magnetic latitude plane
                var tor = new THREE.Mesh(
                    new THREE.TorusGeometry(r * Math.cos(lat0), tube, 10, 96),
                    new THREE.MeshBasicMaterial({
                        color: col.c, transparent: true, opacity: col.a,
                        depthWrite: false, blending: THREE.AdditiveBlending
                    })
                );
                tor.rotation.x = Math.PI / 2;
                tor.position.y = r * Math.sin(lat0);
                curtain.add(tor);
                // northern mirror
                var torS = tor.clone();
                torS.position.y = -r * Math.sin(lat0);
                curtain.add(torS);
                // vertical ray sprites (curtains)
                for (var i = 0; i < 18; i++) {
                    var a = (i / 18) * Math.PI * 2;
                    var x = Math.cos(a) * r * Math.cos(lat0);
                    var z = Math.sin(a) * r * Math.cos(lat0);
                    var y0 = r * Math.sin(lat0);
                    var ray = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.03, 0.06, b.h, 6),
                        new THREE.MeshBasicMaterial({
                            color: col.c, transparent: true, opacity: col.a * 0.85,
                            depthWrite: false, blending: THREE.AdditiveBlending
                        })
                    );
                    ray.position.set(x, y0 + b.h * 0.35, z);
                    curtain.add(ray);
                    var rayS = ray.clone();
                    rayS.position.set(x, -y0 - b.h * 0.35, z);
                    curtain.add(rayS);
                }
            });
        }

        function panelHtml() {
            var lat = ovalLatDeg(kp).toFixed(1);
            return '<h3>Aurora (auroral oval)</h3>' +
                '<p>Auroras form where charged particles follow magnetic field lines into the upper atmosphere. Colour tracks altitude and emission lines: green oxygen 557.7 nm peaks about 90-150 km, red oxygen 630.0 nm about 200-300 km, and blue/purple N2+ 427.8 nm often marks the lower fringe of rays.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Altitude range</td><td>~80-300 km</td></tr>' +
                '<tr><td>Green O 557.7 nm</td><td>~90-150 km (most common)</td></tr>' +
                '<tr><td>Red O 630.0 nm</td><td>~200-300 km (needs strong storms)</td></tr>' +
                '<tr><td>N2+ 427.8 nm</td><td>Lower edge of rays</td></tr>' +
                '<tr><td>Quiet oval</td><td>~65-70 deg magnetic latitude</td></tr>' +
                '<tr><td>Teaching Kp</td><td>' + kp + ' (oval ~' + lat + ' deg)</td></tr>' +
                '</table>' +
                '<p class="t3d-note">Educational approximation inspired by NOAA SWPC OVATION / emission-line altitudes - not live space-weather data, not a particle solver. Distinct from Earth 3D Globe (geography / lighting).</p>';
        }

        function apply() {
            rebuildCurtain();
            t3dInfo(panelHtml());
            t3dStatus('Aurora oval - green 557.7 nm / red 630.0 nm / N2+ 427.8 nm. Drag to orbit; raise Kp to expand equatorward.');
            var label = document.getElementById('t3dAuroraKpLabel');
            if (label) label.textContent = 'Kp ' + kp;
        }

        var kpDown = document.getElementById('t3dAuroraKpDown');
        var kpUp = document.getElementById('t3dAuroraKpUp');
        var playBtn = document.getElementById('t3dAuroraPlayBtn');
        var resetBtn = document.getElementById('t3dAuroraResetBtn');
        if (kpDown) kpDown.addEventListener('click', function () { kp = Math.max(0, kp - 1); apply(); });
        if (kpUp) kpUp.addEventListener('click', function () { kp = Math.min(9, kp + 1); apply(); });
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause spin' : 'Play spin';
        });
        if (resetBtn) resetBtn.addEventListener('click', function () { kp = 3; spin = 0; apply(); });

        apply();
        return function animate(dt) {
            if (playing) {
                spin += dt * 0.00025;
                earth.rotation.y = spin;
                night.rotation.y = Math.PI * 0.5 + spin;
                curtain.rotation.y = spin * 0.35;
            }
        };
    }

    function t3dSsFmtHms(sec) {
        var s = Math.round(sec);
        var h = Math.floor(s / 3600);
        s -= h * 3600;
        var m = Math.floor(s / 60);
        s -= m * 60;
        function z(n) { return (n < 10 ? '0' : '') + n; }
        return h + 'h ' + z(m) + 'm ' + z(s) + 's';
    }
    function t3dSiderealVsSolarDay(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);

        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(0.85, 24, 16),
            new THREE.MeshBasicMaterial({ color: 0xffe082 })
        );
        group.add(sun);
        var sunGlow = new THREE.Mesh(
            new THREE.SphereGeometry(1.25, 16, 12),
            new THREE.MeshBasicMaterial({ color: 0xfff59d, transparent: true, opacity: 0.3, depthWrite: false })
        );
        sun.add(sunGlow);

        // Earth orbit (teaching radius)
        var orbitR = 7.5;
        var orbitPts = [];
        for (var i = 0; i <= 96; i++) {
            var a = (i / 96) * Math.PI * 2;
            orbitPts.push(new THREE.Vector3(Math.cos(a) * orbitR, 0, Math.sin(a) * orbitR));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(orbitPts),
            new THREE.LineBasicMaterial({ color: 0x546e7a, transparent: true, opacity: 0.65 })
        ));

        var earthG = new THREE.Group();
        group.add(earthG);
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(0.72, 28, 20),
            new THREE.MeshPhongMaterial({ color: 0x42a5f5, emissive: 0x0a2030, shininess: 18 })
        );
        earthG.add(earth);
        // Observer mark (city) sticking out
        var mark = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 10, 8),
            new THREE.MeshBasicMaterial({ color: 0xff7043 })
        );
        mark.position.set(0.78, 0, 0);
        earth.add(mark);

        // Distant reference star (fixed in inertial direction +X)
        var star = new THREE.Mesh(
            new THREE.SphereGeometry(0.28, 12, 10),
            new THREE.MeshBasicMaterial({ color: 0xe1f5fe })
        );
        star.position.set(18, 0, 0);
        group.add(star);
        var starGlow = new THREE.Mesh(
            new THREE.SphereGeometry(0.45, 10, 8),
            new THREE.MeshBasicMaterial({ color: 0xb3e5fc, transparent: true, opacity: 0.35, depthWrite: false })
        );
        star.add(starGlow);

        // Sight lines: Earth -> Sun (solar noon when aligned with mark) and Earth -> star
        var lineSun = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
            new THREE.LineBasicMaterial({ color: 0xffe082, transparent: true, opacity: 0.75 })
        );
        var lineStar = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
            new THREE.LineBasicMaterial({ color: 0x81d4fa, transparent: true, opacity: 0.75 })
        );
        group.add(lineSun); group.add(lineStar);

        var mode = 'both'; // sidereal | solar | both
        var playing = true;
        var dayFrac = 0; // 0..1 fraction of one solar day for teaching scrub
        // Orbit phase advances ~1/365.25 per solar day
        var yearDays = 365.25;

        function place() {
            // After dayFrac solar days, Earth has moved in its orbit
            var orbAng = (dayFrac / yearDays) * Math.PI * 2;
            earthG.position.set(Math.cos(orbAng) * orbitR, 0, Math.sin(orbAng) * orbitR);
            // Spin: sidereal rate would be dayFrac * (86400/86164) turns in one solar day teaching frame
            // In one solar day Earth rotates ~361 deg (360 * 86400/86164)
            var spinTurns = dayFrac * (T3D_SS_SOLAR_S / T3D_SS_SIDEREAL_S);
            earth.rotation.y = spinTurns * Math.PI * 2;
            // Lines
            var ep = earthG.position;
            lineSun.geometry.dispose();
            lineSun.geometry = new THREE.BufferGeometry().setFromPoints([
                ep.clone(), new THREE.Vector3(0, 0, 0)
            ]);
            lineStar.geometry.dispose();
            lineStar.geometry = new THREE.BufferGeometry().setFromPoints([
                ep.clone(), star.position.clone()
            ]);

        function panelHtml() {
            var sidElapsed = dayFrac * T3D_SS_SIDEREAL_S;
            var solElapsed = dayFrac * T3D_SS_SOLAR_S;

    // ================= BLACK-BODY RADIATION ==================================
    // Star color vs temperature via Wien peak + Planck B(lambda) teaching curve.
    // Educational approximation - not a full stellar-atmosphere solver.
    // Wien: l_max (m) = 2.897771955e-3 / T(K); Sun Teff ~5772 K -> ~502 nm.
    var T3D_BB_WIEN = 2.897771955e-3; // m*K
    var T3D_BB_SUN_K = 5772;
    var T3D_BB_TYPES = [
        { id: 'O', name: 'O type', T: 30000, note: 'Hot blue - peak deep in UV; photosphere looks blue-white.' },
        { id: 'B', name: 'B type', T: 15000, note: 'Blue-white; peak still UV/blue.' },
        { id: 'A', name: 'A type', T: 8500, note: 'White; Vega-class temperatures.' },
        { id: 'F', name: 'F type', T: 6500, note: 'Yellow-white; between A and G.' },
        { id: 'G', name: 'G type (Sun)', T: 5772, note: 'Sun Teff about 5772 K; Wien peak about 502 nm.' },
        { id: 'K', name: 'K type', T: 4200, note: 'Orange; cooler photosphere.' },
        { id: 'M', name: 'M type', T: 3000, note: 'Cool red; peak in near-IR; looks reddish.' }
    ];
    function t3dBbLmaxNm(T) {
        return (T3D_BB_WIEN / T) * 1e9;
    }
    function t3dBbPlanck(lambdaNm, T) {
        // Relative spectral radiance (arbitrary units) - teach curve shape
        var l = lambdaNm * 1e-9;
        var h = 6.62607015e-34, c = 2.99792458e8, k = 1.380649e-23;
        var a = 2 * h * c * c / Math.pow(l, 5);
        var x = (h * c) / (l * k * T);
        if (x > 80) return 0;
        return a / (Math.exp(x) - 1);
    }
    function t3dBbTempToRgb(T) {
        // Approximate blackbody-to-sRGB teaching tint (not CIE XYZ convert)
        var t = Math.max(1000, Math.min(40000, T)) / 100;
        var r, g, b;
        if (t <= 66) {
            r = 255;
            g = 99.4708025861 * Math.log(t) - 161.1195681661;
            b = t <= 19 ? 0 : 138.5177312231 * Math.log(t - 10) - 305.0447927307;
        } else {
            r = 329.698727446 * Math.pow(t - 60, -0.1332047592);
            g = 288.1221695283 * Math.pow(t - 60, -0.0755148492);
            b = 255;
        }
        function clip(v) { return Math.max(0, Math.min(255, v)) / 255; }
        return { r: clip(r), g: clip(g), b: clip(b) };
    }
    function t3dBlackBodyRadiation(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.25));
        var group = new THREE.Group();
        scene.add(group);

        var star = new THREE.Mesh(
            new THREE.SphereGeometry(2.2, shell.low ? 24 : 40, shell.low ? 18 : 28),
            new THREE.MeshBasicMaterial({ color: 0xfff176 })
        );
        group.add(star);
        var glow = new THREE.Mesh(
            new THREE.SphereGeometry(2.9, 20, 16),
            new THREE.MeshBasicMaterial({ color: 0xffe082, transparent: true, opacity: 0.28, depthWrite: false })
        );
        star.add(glow);

        // Spectrum rail: visible band 380-750 nm colored markers + curve line
        var rail = new THREE.Group();
        rail.position.set(0, -4.2, 0);
        group.add(rail);
        var curvePts = [];
        var N = shell.low ? 48 : 96;
        var T = T3D_BB_SUN_K;
        var peakMarker = new THREE.Mesh(
            new THREE.SphereGeometry(0.18, 10, 8),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        rail.add(peakMarker);
        var curveLine = new THREE.Line(
            new THREE.BufferGeometry(),
            new THREE.LineBasicMaterial({ color: 0x80cbc4 })
        );
        rail.add(curveLine);

        // Base rainbow strip
        for (var i = 0; i < 40; i++) {
            var lam = 380 + (i / 39) * 370;
            var x = -6 + (i / 39) * 12;
            var col = new THREE.Color();
            // rough wavelength -> hue
            var hue = Math.max(0, Math.min(1, (750 - lam) / 370)) * 0.75;
            col.setHSL(hue, 0.85, 0.45);
            var bar = new THREE.Mesh(
                new THREE.BoxGeometry(12 / 40 * 0.92, 0.35, 0.2),
                new THREE.MeshBasicMaterial({ color: col })
            );
            bar.position.set(x, -0.6, 0);
            rail.add(bar);
        }

        function rebuildCurve() {
            var maxB = 0;
            var samples = [];
            for (var i = 0; i <= N; i++) {
                var lam = 200 + (i / N) * 1000; // 200-1200 nm teaching window
                var B = t3dBbPlanck(lam, T);
                samples.push({ lam: lam, B: B });
                if (B > maxB) maxB = B;
            }
            var pts = [];
            for (var j = 0; j < samples.length; j++) {
                var s = samples[j];
                var xn = -6 + ((s.lam - 200) / 1000) * 12;
                var yn = maxB > 0 ? (s.B / maxB) * 2.6 : 0;
                pts.push(new THREE.Vector3(xn, yn, 0));
            }
            curveLine.geometry.dispose();
            curveLine.geometry = new THREE.BufferGeometry().setFromPoints(pts);
            var lmax = t3dBbLmaxNm(T);
            var px = -6 + ((lmax - 200) / 1000) * 12;
            peakMarker.position.set(px, 2.85, 0.1);
        }

        function applyTemp() {
            var rgb = t3dBbTempToRgb(T);
            star.material.color.setRGB(rgb.r, rgb.g, rgb.b);
            glow.material.color.setRGB(rgb.r, rgb.g, rgb.b);
            rebuildCurve();
            var lmax = t3dBbLmaxNm(T);
            var typeHint = '';
            for (var i = 0; i < T3D_BB_TYPES.length; i++) {
                if (Math.abs(T3D_BB_TYPES[i].T - T) < 1) { typeHint = T3D_BB_TYPES[i].name; break; }
            }
            t3dInfo(panelHtml(lmax, typeHint));
            t3dStatus('T = ' + Math.round(T) + ' K - Wien peak ~' + lmax.toFixed(0) + ' nm. Drag to orbit the teaching star.');
        }

        function panelHtml(lmax, typeHint) {
            return '<h3>Black-body radiation</h3>' +
                '<p>Wien displacement law marks the peak wavelength of a black-body spectrum: l_max = 2.897771955e-3 / T (metres). The Planck curve shape is a teaching plot - not a stellar-atmosphere model with lines.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Temperature</td><td>' + Math.round(T) + ' K</td></tr>' +
                '<tr><td>Wien peak</td><td>~' + lmax.toFixed(0) + ' nm</td></tr>' +
                '<tr><td>Sun Teff</td><td>~5772 K -> ~502 nm</td></tr>' +
                '<tr><td>O / M teaching</td><td>~30,000 K blue / ~3,000 K red</td></tr>' +
                (typeHint ? '<tr><td>Preset</td><td>' + typeHint + '</td></tr>' : '') +
                '</table>' +
                '<p class="t3d-note">Distinct from Star Lifecycle 3D Explorer (evolution timeline) and Stellar Magnitude 3D Explorer (brightness). Color tint is a teaching approximation of blackbody chromaticity.</p>';
        }

        function setType(idx) {
            T = T3D_BB_TYPES[idx].T;
            applyTemp();
        }

        var oBtn = document.getElementById('t3dBbOBtn');
        var bBtn = document.getElementById('t3dBbBBtn');
        var aBtn = document.getElementById('t3dBbABtn');
        var fBtn = document.getElementById('t3dBbFBtn');
        var gBtn = document.getElementById('t3dBbGBtn');
        var kBtn = document.getElementById('t3dBbKBtn');
        var mBtn = document.getElementById('t3dBbMBtn');
        var coolBtn = document.getElementById('t3dBbCoolBtn');
        var hotBtn = document.getElementById('t3dBbHotBtn');
        if (oBtn) oBtn.addEventListener('click', function () { setType(0); });
        if (bBtn) bBtn.addEventListener('click', function () { setType(1); });
        if (aBtn) aBtn.addEventListener('click', function () { setType(2); });
        if (fBtn) fBtn.addEventListener('click', function () { setType(3); });
        if (gBtn) gBtn.addEventListener('click', function () { setType(4); });
        if (kBtn) kBtn.addEventListener('click', function () { setType(5); });
        if (mBtn) mBtn.addEventListener('click', function () { setType(6); });
        if (coolBtn) coolBtn.addEventListener('click', function () {
            T = Math.max(2500, T - 500);
            applyTemp();
        });
        if (hotBtn) hotBtn.addEventListener('click', function () {
            T = Math.min(40000, T + 500);
            applyTemp();
        });

        applyTemp();
        return function animate(dt) {
            star.rotation.y += dt * 0.00025;
        };
    }

    // Asterism edges as star-name pairs (traditional teaching sticks)

    function t3dCsRaDecToVec(raH, decDeg, radius) {
        var ra = (raH / 24) * Math.PI * 2;
        var dec = (decDeg / 180) * Math.PI;
        var x = Math.cos(dec) * Math.cos(ra);
        var y = Math.sin(dec);
        var z = Math.cos(dec) * Math.sin(ra);

    }
    function t3dConstellationSphere(shell) {

            }

        }

            var pts2 = [];
            for (var j = 0; j <= 48; j++) {
                var dec = -90 + (j / 48) * 180;
                var v2 = t3dCsRaDecToVec(h, dec, R * 0.985);
                pts2.push(new THREE.Vector3(v2.x, v2.y, v2.z));
            }

            if (hits.length) {
                var u = hits[0].object.userData;
                t3dInfo(panelHtml() + '<p><b>' + u.name + '</b> - V mag ' + u.mag + ', RA ' + u.ra.toFixed(3) + 'h, Dec ' + u.dec.toFixed(2) + ' deg (approx catalog values).</p>');
            }
        });

        setFocus('orion');
        return function animate(dt) {
            group.rotation.y += dt * 0.00008;
        };
    }


    // ================= PARALLAX DISTANCE ======================================
    // Earth-baseline parallax angle -> stellar distance - educational geometry.
    var T3D_PX_PC_LY = 3.26;       // 1 parsec in light-years
    var T3D_PX_PC_AU = 206265;     // 1 parsec in AU (approx)
    var T3D_PX_PROXIMA_AS = 0.7687; // Proxima Centauri parallax arcsec
    function t3dParallaxDistance(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.25));
        var sun = new THREE.PointLight(0xfff3c4, 1.4, 80);
        sun.position.set(0, 2, 0);
        scene.add(sun);
        var group = new THREE.Group();
        scene.add(group);

        // Sun at origin, Earth orbit teaching ring (1 AU display radius)
        var sunMesh = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 24, 16),
            new THREE.MeshBasicMaterial({ color: 0xffe082 })
        );
        group.add(sunMesh);
        var earthR = 4.2;
        var earthOrbit = [];
        for (var i = 0; i <= 64; i++) {
            var a = (i / 64) * Math.PI * 2;
            earthOrbit.push(new THREE.Vector3(Math.cos(a) * earthR, 0, Math.sin(a) * earthR));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(earthOrbit),
            new THREE.LineBasicMaterial({ color: 0x546e7a, transparent: true, opacity: 0.7 })
        ));
        var earthA = new THREE.Mesh(
            new THREE.SphereGeometry(0.22, 16, 12),
            new THREE.MeshBasicMaterial({ color: 0x4fc3f7 })
        );
        var earthB = new THREE.Mesh(
            new THREE.SphereGeometry(0.22, 16, 12),
            new THREE.MeshBasicMaterial({ color: 0x81d4fa })
        );
        earthA.position.set(earthR, 0, 0);
        earthB.position.set(-earthR, 0, 0);
        group.add(earthA); group.add(earthB);

        // Distant star on +Z teaching axis; distance scrubbed by parallax (arcsec)
        var star = new THREE.Mesh(
            new THREE.SphereGeometry(0.35, 16, 12),
            new THREE.MeshBasicMaterial({ color: 0xffecb3 })
        );
        group.add(star);
        var glow = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 12, 10),
            new THREE.MeshBasicMaterial({ color: 0xfff8e1, transparent: true, opacity: 0.3, depthWrite: false })
        );
        star.add(glow);

        // Sight lines Earth A/B -> star
        var lineA = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
            new THREE.LineBasicMaterial({ color: 0x90caf9, transparent: true, opacity: 0.85 })
        );
        var lineB = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
            new THREE.LineBasicMaterial({ color: 0xa5d6a7, transparent: true, opacity: 0.85 })
        );
        group.add(lineA); group.add(lineB);

        // Baseline chord A-B
        var baseLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
            new THREE.LineBasicMaterial({ color: 0xffab91, transparent: true, opacity: 0.9 })
        );
        group.add(baseLine);

        var parallaxAs = T3D_PX_PROXIMA_AS; // arcsec
        var presets = {
            proxima: T3D_PX_PROXIMA_AS,
            oneas: 1.0,
            half: 0.5
        };

        function distPc(pAs) { return 1 / pAs; }
        function distLy(pAs) { return distPc(pAs) * T3D_PX_PC_LY; }
        function distAu(pAs) { return distPc(pAs) * T3D_PX_PC_AU; }

        function applyGeometry() {
            // Teaching display: star Z scales with 1/parallax (softer clamp for camera)
            var pc = distPc(parallaxAs);
            var z = Math.min(28, 6 + Math.sqrt(pc) * 3.2);
            star.position.set(0, 0.15, z);
            // Parallax half-angle exaggerated for visibility (true angles are sub-arcsec)
            var halfAngle = Math.min(0.22, 0.04 + (0.12 / Math.max(parallaxAs, 0.2)));
            earthA.position.set(Math.cos(0) * earthR, 0, Math.sin(0) * earthR);
            earthB.position.set(Math.cos(Math.PI) * earthR, 0, Math.sin(Math.PI) * earthR);
            // Slight lateral offset of star endpoints for the textbook triangle
            var lat = Math.tan(halfAngle) * z * 0.35;
            lineA.geometry.setFromPoints([earthA.position.clone(), new THREE.Vector3(lat, 0.1, z)]);
            lineB.geometry.setFromPoints([earthB.position.clone(), new THREE.Vector3(-lat, 0.1, z)]);
            baseLine.geometry.setFromPoints([earthA.position.clone(), earthB.position.clone()]);
            star.position.x = 0;
        }
        applyGeometry();

        function panelHtml(focus) {
            var pc = distPc(parallaxAs);
            var html =
                '<h3>Stellar parallax distance</h3>' +
                '<p>With a 1 AU Earth-orbit baseline, parallax angle p (arcseconds) gives distance d = 1/p in parsecs. One parsec is about ' +
                T3D_PX_PC_LY + ' ly or about ' + T3D_PX_PC_AU.toLocaleString() + ' AU.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Current parallax p</td><td>about ' + parallaxAs.toFixed(4) + ' arcsec</td></tr>' +
                '<tr><td>Distance</td><td>about ' + pc.toFixed(3) + ' pc (~' + distLy(parallaxAs).toFixed(2) + ' ly)</td></tr>' +
                '<tr><td>1 pc</td><td>about ' + T3D_PX_PC_LY + ' ly = about ' + T3D_PX_PC_AU.toLocaleString() + ' AU</td></tr>' +
                '<tr><td>Proxima Centauri p</td><td>about ' + T3D_PX_PROXIMA_AS + ' arcsec</td></tr>' +
                '</table>';
            if (focus === 'proxima') {
                html += '<p><b>Proxima Centauri</b> - published parallax about ' + T3D_PX_PROXIMA_AS +
                    ' arcsec implies about ' + (1 / T3D_PX_PROXIMA_AS).toFixed(3) + ' pc (~' +
                    ((1 / T3D_PX_PROXIMA_AS) * T3D_PX_PC_LY).toFixed(2) + ' ly).</p>';
            } else if (focus === 'formula') {
                html += '<p><b>Formula</b> - d (pc) = 1 / p (arcsec). Doubling parallax halves distance.</p>';
            } else if (focus === 'baseline') {
                html += '<p><b>Baseline</b> - Earth at opposite ends of its orbit (about 2 AU apart) supplies the triangle base against the distant star.</p>';
            }
            html += '<p class="t3d-note">Sight-line angles are exaggerated for teaching - real stellar parallaxes are below one arcsecond. This is educational geometry, not a Hipparcos reduction pipeline.</p>';
            return html;
        }
        t3dInfo(panelHtml('overview'));

        var proxBtn = document.getElementById('t3dPxProxBtn');
        var oneBtn = document.getElementById('t3dPxOneBtn');
        var halfBtn = document.getElementById('t3dPxHalfBtn');
        var formBtn = document.getElementById('t3dPxFormBtn');
        var baseBtn = document.getElementById('t3dPxBaseBtn');
        if (proxBtn) proxBtn.addEventListener('click', function () {
            parallaxAs = presets.proxima; applyGeometry(); t3dInfo(panelHtml('proxima'));
            t3dStatus('Proxima Centauri preset - parallax about ' + T3D_PX_PROXIMA_AS + ' arcsec.');
        });
        if (oneBtn) oneBtn.addEventListener('click', function () {
            parallaxAs = presets.oneas; applyGeometry(); t3dInfo(panelHtml('formula'));
            t3dStatus('1.0000 arcsec preset - distance is exactly 1 parsec by definition.');
        });
        if (halfBtn) halfBtn.addEventListener('click', function () {
            parallaxAs = presets.half; applyGeometry(); t3dInfo(panelHtml('formula'));
            t3dStatus('0.5000 arcsec preset - distance about 2 pc.');
        });
        if (formBtn) formBtn.addEventListener('click', function () { t3dInfo(panelHtml('formula')); });
        if (baseBtn) baseBtn.addEventListener('click', function () { t3dInfo(panelHtml('baseline')); });

        t3dStatus('Drag to orbit, scroll to zoom. Try Proxima, 1 arcsec, and 0.5 arcsec presets - star depth follows 1/p.');
        var spin = 0;
        return function animate(dt) {
            spin += dt * 0.0002;
            sunMesh.rotation.y += dt * 0.0005;
            star.position.y = 0.15 + Math.sin(spin * 2) * 0.05;
        };
    }


    // ================= STELLAR MAGNITUDE ======================================
    // Apparent vs absolute magnitude brightness scale - educational, not catalogs.
    var T3D_SM_SUN_APP = -26.74;
    var T3D_SM_SIRIUS_APP = -1.46;
    var T3D_SM_VEGA_APP = 0.03;
    var T3D_SM_NAKED = 6;
    var T3D_SM_STEP = 2.512; // Pogson ratio per magnitude
    function t3dStellarMagnitude(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        var group = new THREE.Group();
        scene.add(group);
        // Reference stars at fixed rail positions; size ~ sqrt(flux) from magnitude
        var stars = [
            { name: 'Sun', mApp: T3D_SM_SUN_APP, mAbs: 4.83, x: -10, color: 0xfff176 },
            { name: 'Sirius', mApp: T3D_SM_SIRIUS_APP, mAbs: 1.42, x: -3.5, color: 0xe3f2fd },
            { name: 'Vega', mApp: T3D_SM_VEGA_APP, mAbs: 0.58, x: 2.5, color: 0xbbdefb },
            { name: 'Naked-eye limit', mApp: T3D_SM_NAKED, mAbs: T3D_SM_NAKED, x: 9, color: 0x90a4ae }
        ];
        var mode = 'apparent'; // or absolute
        var meshes = [];
        function fluxFromMag(m) {
            // relative to Vega ~0; clamp for display so Sun does not blow out camera
            var rel = Math.pow(T3D_SM_STEP, -(m - 0));
            return rel;
        }
        function radiusFor(m) {
            var f = fluxFromMag(m);
            // Soft display scale: Sun capped
            var r = 0.35 + Math.min(4.2, Math.pow(f, 0.22) * 0.55);
            if (m < -20) r = 4.5; // Sun teaching size
            return r;
        }
        stars.forEach(function (s) {
            var geo = new THREE.SphereGeometry(1, 24, 16);
            var mat = new THREE.MeshBasicMaterial({ color: s.color });
            var mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(s.x, 0, 0);
            mesh.userData = { kind: 'star', name: s.name, def: s };
            group.add(mesh);
            // Glow sprite-ish: transparent outer sphere
            var glow = new THREE.Mesh(
                new THREE.SphereGeometry(1.35, 16, 12),
                new THREE.MeshBasicMaterial({ color: s.color, transparent: true, opacity: 0.22, depthWrite: false })
            );
            mesh.add(glow);
            meshes.push(mesh);
        });
        // Magnitude rail
        var rail = [];
        for (var i = 0; i <= 40; i++) {
            rail.push(new THREE.Vector3(-12 + i * 0.55, -3.2, 0));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(rail),
            new THREE.LineBasicMaterial({ color: 0x546e7a, transparent: true, opacity: 0.55 })
        ));
        function applyMode() {
            meshes.forEach(function (mesh) {
                var s = mesh.userData.def;
                var m = mode === 'apparent' ? s.mApp : s.mAbs;
                var r = radiusFor(m);
                mesh.scale.set(r, r, r);
            });
        }
        applyMode();
        function panelHtml(sel) {
            var base =
                '<h3>Stellar magnitude scale</h3>' +
                '<p>Brighter objects have smaller (more negative) magnitudes. Each step of 1 mag changes flux by about ' +
                T3D_SM_STEP + ' (Pogson). Apparent magnitude is as seen from Earth; absolute magnitude is brightness at 10 pc.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Sun (apparent)</td><td>about ' + T3D_SM_SUN_APP + '</td></tr>' +
                '<tr><td>Sirius (apparent)</td><td>about ' + T3D_SM_SIRIUS_APP + '</td></tr>' +
                '<tr><td>Vega (apparent)</td><td>about ' + T3D_SM_VEGA_APP + '</td></tr>' +
                '<tr><td>Naked-eye limit</td><td>about +' + T3D_SM_NAKED + '</td></tr>' +
                '<tr><td>Flux step per mag</td><td>about ' + T3D_SM_STEP + 'x</td></tr>' +
                '</table>' +
                '<p>Mode now: <b>' + (mode === 'apparent' ? 'apparent magnitude' : 'absolute magnitude (10 pc)') + '</b>.</p>';
            if (sel && sel !== 'overview') {
                var hit = stars.filter(function (s) { return s.name === sel; })[0];
                if (hit) {
                    base += '<p><b>' + hit.name + '</b> - apparent about ' + hit.mApp +
                        '; absolute about ' + hit.mAbs +
                        '. Sphere size scales with a softened flux from the magnitude so the Sun does not dominate the camera.</p>';
                }
            }
            base += '<p class="t3d-note">Sizes are teaching display scales from Pogson flux - not angular diameters or a Hipparcos map. Absolute magnitudes for the naked-eye limit marker reuse +6 as a sky-limit label only.</p>';
            return base;
        }
        t3dInfo(panelHtml('overview'));
        var appBtn = document.getElementById('t3dSmAppBtn');
        var absBtn = document.getElementById('t3dSmAbsBtn');
        if (appBtn) appBtn.addEventListener('click', function () {
            mode = 'apparent'; applyMode(); t3dInfo(panelHtml('overview'));
            t3dStatus('Apparent magnitude mode - brightness as seen from Earth.');
        });
        if (absBtn) absBtn.addEventListener('click', function () {
            mode = 'absolute'; applyMode(); t3dInfo(panelHtml('overview'));
            t3dStatus('Absolute magnitude mode - each star as if placed at 10 pc (Sun looks much fainter).');
        });
        [['t3dSmSunBtn','Sun'],['t3dSmSirBtn','Sirius'],['t3dSmVegBtn','Vega'],['t3dSmLimBtn','Naked-eye limit']].forEach(function (pair) {
            var b = document.getElementById(pair[0]);
            if (!b) return;
            b.addEventListener('click', function () { t3dInfo(panelHtml(pair[1])); });
        });
        t3dStatus('Drag to orbit, scroll to zoom. Toggle Apparent vs Absolute; sphere size follows a softened Pogson flux scale.');
        var spin = 0;
        return function animate(dt) {
            spin += dt * 0.00015;
            meshes.forEach(function (m, i) {
                m.rotation.y += dt * 0.0004;
                m.position.y = Math.sin(spin * 3 + i) * 0.08;
            });
        };
    }


    // ================= ORBITAL RESONANCE ======================================
    // Laplace Io:Europa:Ganymede 1:2:4 mean-motion beat - educational, not N-body.
    var T3D_OR_IO = 1;
    var T3D_OR_EU = 2;
    var T3D_OR_GA = 4;
    var T3D_OR_NP = 3; // Neptune:Pluto literacy
    var T3D_OR_PL = 2;
    function t3dOrbitalResonance(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        var light = new THREE.PointLight(0xfff3d0, 800, 0, 1.5);
        scene.add(light);
        var group = new THREE.Group();
        scene.add(group);
        var jup = new THREE.Mesh(
            new THREE.SphereGeometry(2.2, 28, 18),
            new THREE.MeshLambertMaterial({ color: 0xd4a574 })
        );
        jup.userData = { kind: 'center', name: 'Jupiter' };
        group.add(jup);
        light.position.set(0, 8, 12);
        function ring(r, color) {
            var pts = [];
            for (var i = 0; i <= 96; i++) {
                var a = (i / 96) * Math.PI * 2;
                pts.push(new THREE.Vector3(Math.cos(a) * r, 0, Math.sin(a) * r));
            }
            group.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.4 })
            ));
        }
        // Radii spaced for readable 1:2:4 teaching (not true AU scales)
        var R_IO = 6, R_EU = 9.5, R_GA = 14;
        ring(R_IO, 0xfff59d); ring(R_EU, 0x90caf9); ring(R_GA, 0xce93d8);
        function moon(r, color, name) {
            var m = new THREE.Mesh(
                new THREE.SphereGeometry(0.55, 14, 12),
                new THREE.MeshLambertMaterial({ color: color })
            );
            m.userData = { kind: 'moon', name: name, radius: r };
            group.add(m);
            return m;
        }
        var io = moon(R_IO, 0xffee58, 'Io');
        var europa = moon(R_EU, 0x81d4fa, 'Europa');
        var ganymede = moon(R_GA, 0xb39ddb, 'Ganymede');
        // Conjunction beat flash line (Jupiter -> aligned moon stack)
        var conjLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0.2, 0),
                new THREE.Vector3(R_GA, 0.2, 0)
            ]),
            new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 })
        );
        group.add(conjLine);
        var playing = true;
        var t0 = 0;
        // Mean motions proportional to 4 : 2 : 1 so periods are 1 : 2 : 4
        var nIo = 4, nEu = 2, nGa = 1;
        var speed = 0.55;
        var conjFlash = 0;
        var lastConj = -1;
        function panelHtml(sel) {
            var base =
                '<h3>Orbital resonance (Laplace 1:2:4)</h3>' +
                '<p>Io, Europa, and Ganymede keep mean motions near a 4:2:1 ratio - periods about 1:2:4. When Io gains two full laps, Europa gains one, and Ganymede gains half - a classroom beat Solar System 3D Explorer does not isolate.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Io : Europa : Ganymede periods</td><td>about 1 : 2 : 4</td></tr>' +
                '<tr><td>Mean-motion ratio</td><td>about 4 : 2 : 1</td></tr>' +
                '<tr><td>Another classic pair</td><td>Neptune : Pluto about 3 : 2</td></tr>' +
                '</table>';
            if (sel === 'Io') {
                base += '<p><b>Io</b> - innermost of the three; period unit 1 in the teaching 1:2:4 stack.</p>';
            } else if (sel === 'Europa') {
                base += '<p><b>Europa</b> - period about 2 Io periods in the Laplace chain.</p>';
            } else if (sel === 'Ganymede') {
                base += '<p><b>Ganymede</b> - period about 4 Io periods; slowest of the three teaching moons.</p>';
            } else if (sel === 'Neptune:Pluto 3:2') {
                base += '<p><b>Neptune : Pluto ~3:2</b> - another mean-motion classic: Pluto completes about 2 orbits while Neptune completes about 3. Shown here as literacy only; this scene animates the Galilean Laplace chain.</p>';
            }
            base += '<p class="t3d-note">Circular coplanar orbits and period ratios are educational - not a full N-body ephemeris or forced-eccentricity Laplace model.</p>';
            return base;
        }
        t3dInfo(panelHtml('overview'));
        var playBtn = document.getElementById('t3dOrPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause orbits' : 'Play orbits';
        });
        [['t3dOrIoBtn','Io'],['t3dOrEuBtn','Europa'],['t3dOrGaBtn','Ganymede'],['t3dOrNpBtn','Neptune:Pluto 3:2']].forEach(function (pair) {
            var b = document.getElementById(pair[0]);
            if (!b) return;
            b.addEventListener('click', function () { t3dInfo(panelHtml(pair[1])); });
        });
        t3dStatus('Drag to orbit, scroll to zoom. Play the 1:2:4 beat; a white flash marks near-alignments of the three moons.');
        function place(m, radius, angle) {
            m.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
        }
        return function animate(dt) {
            if (!playing) return;
            t0 += (dt / 1000) * speed;
            var aIo = t0 * nIo;
            var aEu = t0 * nEu;
            var aGa = t0 * nGa;
            place(io, R_IO, aIo);
            place(europa, R_EU, aEu);
            place(ganymede, R_GA, aGa);
            // Conjunction when all three near same longitude (mod 2pi)
            function wrap(a) { return ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2); }
            var d1 = Math.abs(wrap(aIo) - wrap(aEu));
            var d2 = Math.abs(wrap(aEu) - wrap(aGa));
            if (d1 > Math.PI) d1 = Math.PI * 2 - d1;
            if (d2 > Math.PI) d2 = Math.PI * 2 - d2;
            if (d1 < 0.12 && d2 < 0.12) {
                var bucket = Math.floor(t0 * 2);
                if (bucket !== lastConj) {
                    lastConj = bucket;
                    conjFlash = 1;
                    var ang = wrap(aGa);
                    conjLine.geometry.setFromPoints([
                        new THREE.Vector3(0, 0.25, 0),
                        new THREE.Vector3(Math.cos(ang) * R_GA, 0.25, Math.sin(ang) * R_GA)
                    ]);
                }
            }
            if (conjFlash > 0) {
                conjFlash -= dt / 600;
                conjLine.material.opacity = Math.max(0, conjFlash);
            }
        };
    }


    // ================= GAS GIANT ATMOSPHERE ===================================
    // Banded Jupiter-like atmosphere + Great Red Spot - educational shader art.
    var T3D_GG_ROT_H = 9 + 55 / 60; // ~9h55m
    var T3D_GG_GRS_KM = 16000;
    var T3D_GG_WIND_MS = 125; // mid of 100-150
    function t3dGasGiantAtmosphere(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.35));
        var sun = new THREE.DirectionalLight(0xfff3d0, 1.15);
        sun.position.set(40, 20, 30);
        scene.add(sun);
        var group = new THREE.Group();
        scene.add(group);
        var uniforms = {
            uTime: { value: 0 },
            uBandShift: { value: 0 }
        };
        var mat = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: [
                'varying vec2 vUv;',
                'varying vec3 vN;',
                'void main(){',
                '  vUv = uv;',
                '  vN = normalize(normalMatrix * normal);',
                '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);',
                '}'
            ].join('\n'),
            fragmentShader: [
                'uniform float uTime;',
                'uniform float uBandShift;',
                'varying vec2 vUv;',
                'varying vec3 vN;',
                'void main(){',
                '  float lat = vUv.y;',
                '  float bands = 0.55 + 0.45 * sin((lat * 28.0 + uBandShift) * 3.14159);',
                '  vec3 dark = vec3(0.55, 0.32, 0.18);',
                '  vec3 lite = vec3(0.92, 0.78, 0.55);',
                '  vec3 col = mix(dark, lite, bands);',
                '  // Great Red Spot region near mid-southern latitude',
                '  vec2 spot = vec2(fract(vUv.x + uTime * 0.015) - 0.62, lat - 0.38);',
                '  float ell = spot.x * spot.x / 0.018 + spot.y * spot.y / 0.006;',
                '  float grs = smoothstep(1.0, 0.35, ell);',
                '  col = mix(col, vec3(0.78, 0.22, 0.12), grs * 0.92);',
                '  float light = clamp(dot(vN, normalize(vec3(0.4,0.6,0.5))) * 0.55 + 0.45, 0.25, 1.0);',
                '  gl_FragColor = vec4(col * light, 1.0);',
                '}'
            ].join('\n')
        });
        var planet = new THREE.Mesh(new THREE.SphereGeometry(8, 64, 48), mat);
        planet.userData = { kind: 'planet', name: 'Gas giant atmosphere' };
        group.add(planet);

            var spread = (Math.random() - 0.5) * (0.55 + rad * 0.045);
            var ang = arm.phase + spiral + spread * 0.3;

            var tcol = rad / Rmax;

    // ================= RETROGRADE MOTION =====================================
    // Apparent Mars loop from Earth\'s faster inside orbit - educational, not ephemeris.
    var T3D_RETRO_SYNODIC_D = 779.9;
    var T3D_RETRO_ARC_D = 72;
    var T3D_RETRO_MONTHS = 26;
    function t3dRetrogradeMotion(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.25));
        var sunL = new THREE.PointLight(0xfff3c4, 1.4, 200);
        sunL.position.set(0, 0, 0);
        scene.add(sunL);
        var group = new THREE.Group();
        scene.add(group);
        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 28, 20),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        group.add(sun);
        var earthR = 8;
        var marsR = 12.2;
        // Orbit rings
        function ring(r, color) {
            var pts = [];
            for (var i = 0; i <= 96; i++) {
                var a = (i / 96) * Math.PI * 2;
                pts.push(new THREE.Vector3(Math.cos(a) * r, 0, Math.sin(a) * r));
            }
            group.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.4 })
            ));
        }
        ring(earthR, 0x64b5f6);
        ring(marsR, 0xff8a65);
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 20, 16),
            new THREE.MeshLambertMaterial({ color: 0x42a5f5, emissive: 0x102040 })
        );
        group.add(earth);
        var mars = new THREE.Mesh(
            new THREE.SphereGeometry(0.42, 18, 14),
            new THREE.MeshLambertMaterial({ color: 0xe57373, emissive: 0x301010 })
        );
        group.add(mars);
        // LOS line Earth -> Mars
        var losGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(), new THREE.Vector3(1, 0, 0)
        ]);
        var los = new THREE.Line(losGeom, new THREE.LineBasicMaterial({ color: 0xffee58, transparent: true, opacity: 0.75 }));
        group.add(los);
        // Sky trail of apparent elongation (projected behind Earth along LOS direction onto a cylinder/arc belt)
        var trailPts = [];
        var trailMax = 180;
        var trailLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
            new THREE.LineBasicMaterial({ color: 0xce93d8, transparent: true, opacity: 0.85 })
        );
        group.add(trailLine);
        // Angular rates: Earth 360/365.25, Mars 360/686.98 - use compressed visual year
        // Synodic relative rate: when relative mean anomaly wraps once per T3D_RETRO_SYNODIC_D
        var day = 0;
        var playing = true;
        var showTrail = true;
        var showLos = true;
        // Place opposition near day 0 so scrub starts teaching the loop
        // Use mean motion: nE = 2pi/365.25, nM = 2pi/686.98
        var nE = (Math.PI * 2) / 365.25;
        var nM = (Math.PI * 2) / 686.98;
        function earthAngle(d) { return d * nE; }
        function marsAngle(d) { return d * nM + Math.PI; } // start near opposition geometry vs Earth at 0
        function elongDeg(d) {
            // Angle of Mars as seen from Earth relative to anti-sun / heliocentric transfer
            var ae = earthAngle(d);
            var am = marsAngle(d);
            var ex = Math.cos(ae) * earthR, ez = Math.sin(ae) * earthR;
            var mx = Math.cos(am) * marsR, mz = Math.sin(am) * marsR;
            var dx = mx - ex, dz = mz - ez;
            // Angle of LOS in plane, minus Earth\'s orbital angle (local sky abscissa)
            var losA = Math.atan2(dz, dx);
            var sky = ((losA - ae) * 180 / Math.PI + 540) % 360 - 180;
            return sky;
        }
        function isRetrograde(d) {
            // Finite difference of sky elongation
            var e0 = elongDeg(d - 0.5);
            var e1 = elongDeg(d + 0.5);
            var de = e1 - e0;
            if (de > 180) de -= 360;
            if (de < -180) de += 360;
            return de < 0; // westward on typical convention for outer planet near opposition
        }
        function panelHtml(d, elong, retro) {
            return '<h3>Mars retrograde (apparent)</h3>' +
                '<p>Earth on the inside track overtakes Mars. Near opposition the line of sight to Mars sweeps backward against the stars for a while - an optical loop, not Mars reversing its heliocentric orbit.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Mars synodic period</td><td>about ' + T3D_RETRO_SYNODIC_D + ' d (~' + T3D_RETRO_MONTHS + ' months)</td></tr>' +
                '<tr><td>Typical retrograde arc</td><td>about ' + T3D_RETRO_ARC_D + ' d</td></tr>' +
                '<tr><td>Day scrub</td><td>' + Math.round(d) + '</td></tr>' +
                '<tr><td>Approx. sky elongation</td><td>' + elong.toFixed(1) + ' deg (teaching scale)</td></tr>' +
                '<tr><td>Apparent motion</td><td>' + (retro ? 'Retrograde (westward stretch)' : 'Direct (eastward)') + '</td></tr>' +
                '</table>' +
                '<p class="t3d-note">Orbit sizes and rates are compressed for one view. Synodic and arc figures are published order-of-magnitude teaching values - not a high-precision ephemeris or sky chart for tonight.</p>';
        }
        function applyDay(d) {
            day = d;
            var ae = earthAngle(d);
            var am = marsAngle(d);
            earth.position.set(Math.cos(ae) * earthR, 0, Math.sin(ae) * earthR);
            mars.position.set(Math.cos(am) * marsR, 0, Math.sin(am) * marsR);
            var pos = los.geometry.attributes.position;
            pos.setXYZ(0, earth.position.x, earth.position.y, earth.position.z);
            pos.setXYZ(1, mars.position.x, mars.position.y, mars.position.z);
            pos.needsUpdate = true;
            los.visible = showLos;
            var elong = elongDeg(d);
            var retro = isRetrograde(d);
            // Build trail: sample past ~140 days of sky elongation mapped onto a raised arc above the plane
            trailPts = [];
            var span = 140;
            for (var i = 0; i <= span; i++) {
                var td = d - span + i;
                var el = elongDeg(td);
                // Map elongation to arc in sky belt above Earth-Sun average
                var mid = earth.position.clone().add(sun.position).multiplyScalar(0.5);
                // Place trail at radius ~16 around sun, height by sample, angle = elongation + earth
                var skyR = 16;
                var ang = ae + el * Math.PI / 180;
                var y = (i / span - 0.5) * 0.02; // nearly flat; keep subtle vertical to separate lines
                // Better: fixed ring height 3, longitude = elong over time so loop shapes show
                trailPts.push(new THREE.Vector3(Math.cos(ang) * skyR, 3.2 + (retro && Math.abs(el) < 40 ? 0.4 : 0), Math.sin(ang) * skyR));
            }
            trailLine.geometry.dispose();
            trailLine.geometry = new THREE.BufferGeometry().setFromPoints(trailPts);
            trailLine.visible = showTrail;
            var slider = document.getElementById('t3dRetroDay');
            var label = document.getElementById('t3dRetroDayLabel');
            if (slider) slider.value = String(Math.round(((d % T3D_RETRO_SYNODIC_D) + T3D_RETRO_SYNODIC_D) % T3D_RETRO_SYNODIC_D));
            if (label) label.textContent = 'day ' + Math.round(d);
            var badge = document.getElementById('t3dRetroBadge');
            if (badge) {
                badge.textContent = retro ? 'Retrograde now' : 'Direct now';
                badge.className = 'w3-tag ' + (retro ? 'w3-deep-orange' : 'w3-teal');
            }
            t3dInfo(panelHtml(d, elong, retro));
        }
        applyDay(0);
        var playBtn = document.getElementById('t3dRetroPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause' : 'Play';
        });
        var trailBtn = document.getElementById('t3dRetroTrailBtn');
        if (trailBtn) trailBtn.addEventListener('click', function () {
            showTrail = !showTrail;
            trailBtn.className = 'w3-button ' + (showTrail ? 'w3-amber' : 'w3-light-grey');
            applyDay(day);
        });
        var losBtn = document.getElementById('t3dRetroLosBtn');
        if (losBtn) losBtn.addEventListener('click', function () {
            showLos = !showLos;
            losBtn.className = 'w3-button ' + (showLos ? 'w3-amber' : 'w3-light-grey');
            applyDay(day);
        });
        var oppBtn = document.getElementById('t3dRetroOppBtn');
        if (oppBtn) oppBtn.addEventListener('click', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play';
            // Find a nearby day with opposition-ish (Earth and Mars nearly aligned sun-earth-mars)
            var best = day;
            var bestScore = 1e9;
            for (var t = day - 400; t < day + 400; t += 1) {
                var ae = earthAngle(t), am = marsAngle(t);
                var diff = Math.abs(((am - ae + Math.PI) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2) - Math.PI);
                // Prefer Sun-Earth-Mars nearly straight: angle Mars - Earth ~ pi difference from Sun
                // Earth-Sun-Mars angle: |am-ae|
                var aDiff = Math.abs(((am - ae) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2));
                if (aDiff > Math.PI) aDiff = Math.PI * 2 - aDiff;
                var score = Math.abs(aDiff - Math.PI); // want ~180 deg - opposition outer
                if (score < bestScore) { bestScore = score; best = t; }
            }
            applyDay(best);
        });
        var slider = document.getElementById('t3dRetroDay');
        if (slider) slider.addEventListener('input', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play';
            applyDay(parseFloat(slider.value || '0'));
        });
        t3dStatus('Drag to orbit, scroll to zoom. Play the overtakes, toggle the sky trail, and watch Mars loop when Earth passes inside.');
        return function animate(dt) {
            if (playing) applyDay(day + (dt / 1000) * 18);
        };
    }

    // ================= SEASONS EARTH ===========================================
    // Axial tilt -> insolation / solstice+equinox subsolar point - educational, not climate model.
    var T3D_SEASONS_OBLIQ_DEG = 23.44;
    var T3D_SEASONS_PERI_AU = 0.983;
    function t3dSeasonsEarth(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.22));
        var sunL = new THREE.DirectionalLight(0xfff3c4, 1.55);
        sunL.position.set(40, 0, 0);
        scene.add(sunL);
        var group = new THREE.Group();
        scene.add(group);
        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(1.6, 32, 24),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        sun.position.set(0, 0, 0);
        group.add(sun);
        // Earth hold: orbit radius compressed for one view
        var earthHold = new THREE.Group();
        group.add(earthHold);
        var orbR = 12;
        // Axis tilt about Z so northern winter/summer reads while orbiting in XZ
        var tiltRad = T3D_SEASONS_OBLIQ_DEG * Math.PI / 180;
        var earthTilt = new THREE.Group();
        earthTilt.rotation.z = tiltRad;
        earthHold.add(earthTilt);
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(1.35, 36, 28),
            new THREE.MeshLambertMaterial({ color: 0x3a7bd5, emissive: 0x102038 })
        );
        earthTilt.add(earth);
        // Equator ring + axis pole stick
        earthTilt.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints((function () {
                var pts = [];
                for (var i = 0; i <= 64; i++) {
                    var a = (i / 64) * Math.PI * 2;
                    pts.push(new THREE.Vector3(Math.cos(a) * 1.42, 0, Math.sin(a) * 1.42));
                }
                return pts;
            })()),
            new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.55 })
        ));
        earthTilt.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, -2.2, 0), new THREE.Vector3(0, 2.2, 0)
            ]),
            new THREE.LineBasicMaterial({ color: 0xff7043 })
        ));
        // Tropic of Cancer / Capricorn guide circles (lat +/- obliquity)
        function tropic(latDeg, color) {
            var lat = latDeg * Math.PI / 180;
            var y = Math.sin(lat) * 1.36;
            var r = Math.cos(lat) * 1.36;
            var pts = [];
            for (var i = 0; i <= 48; i++) {
                var a = (i / 48) * Math.PI * 2;
                pts.push(new THREE.Vector3(Math.cos(a) * r, y, Math.sin(a) * r));
            }
            earthTilt.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.7 })
            ));
        }
        tropic(T3D_SEASONS_OBLIQ_DEG, 0xffe082);
        tropic(-T3D_SEASONS_OBLIQ_DEG, 0x80deea);
        // Subsolar marker (yellow fleck on lit side)
        var subsolar = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 10, 8),
            new THREE.MeshBasicMaterial({ color: 0xffeb3b })
        );
        earth.add(subsolar);
        // Orbit path
        var orbitPts = [];
        for (var i = 0; i <= 96; i++) {
            var th = (i / 96) * Math.PI * 2;
            orbitPts.push(new THREE.Vector3(Math.cos(th) * orbR, 0, Math.sin(th) * orbR));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(orbitPts),
            new THREE.LineBasicMaterial({ color: 0x546e7a, transparent: true, opacity: 0.45 })
        ));
        var day = 172; // ~June solstice
        var playing = true;
        var showTropics = true;
        function dayToAngle(d) {
            // Day 0 ~ perihelion early Jan; angle increases counter-clockwise
            return (d / 365.25) * Math.PI * 2;
        }
        function declinationDeg(d) {
            // Approximate solar declination: epsilon * sin(lambda), lambda ~ day from Mar equinox (~80)
            var eps = T3D_SEASONS_OBLIQ_DEG;
            var lambda = ((d - 80) / 365.25) * Math.PI * 2;
            return eps * Math.sin(lambda);
        }
        function seasonName(d) {
            // Northern: Mar~80 equinox, Jun~172 solstice, Sep~266, Dec~355
            var x = ((d % 365.25) + 365.25) % 365.25;
            if (x < 80) return 'Northern winter (past Dec solstice)';
            if (x < 172) return 'Northern spring (past Mar equinox)';
            if (x < 266) return 'Northern summer (past Jun solstice)';
            if (x < 355) return 'Northern autumn (past Sep equinox)';
            return 'Northern winter (past Dec solstice)';
        }
        function panelHtml(dec, d) {
            return '<h3>Seasons from axial tilt</h3>' +
                '<p>Earth\'s spin axis stays tilted about ' + T3D_SEASONS_OBLIQ_DEG + ' deg while Earth orbits the Sun. That tilt - not distance - drives the season cycle: solstice subsolar latitudes reach about +/-' + T3D_SEASONS_OBLIQ_DEG + ' deg.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Obliquity</td><td>' + T3D_SEASONS_OBLIQ_DEG + ' deg</td></tr>' +
                '<tr><td>Approx. solar declination</td><td>' + dec.toFixed(2) + ' deg</td></tr>' +
                '<tr><td>Day of year (scrub)</td><td>' + Math.round(d) + ' / 365</td></tr>' +
                '<tr><td>Season (N. hemisphere)</td><td>' + seasonName(d) + '</td></tr>' +
                '<tr><td>Perihelion distance</td><td>about ' + T3D_SEASONS_PERI_AU + ' AU in early January</td></tr>' +
                '</table>' +
                '<p class="t3d-note">Earth is closest to the Sun in January (perihelion about ' + T3D_SEASONS_PERI_AU + ' AU) - yet northern winter shows tilt rules seasons, not orbital distance. This is an educational geometry visualization, not a climate or weather model.</p>';
        }
        function applyDay(d) {
            day = ((d % 365.25) + 365.25) % 365.25;
            var ang = dayToAngle(day);
            earthHold.position.set(Math.cos(ang) * orbR, 0, Math.sin(ang) * orbR);
            // Keep axis orientation fixed in space (no precession demo): counter-rotate hold yaw lightly
            // Place subsolar at (lat=declination) on the sunward face
            var dec = declinationDeg(day);
            var lat = dec * Math.PI / 180;
            // Sunward direction from earth to sun (toward origin)
            var toSun = earthHold.position.clone().multiplyScalar(-1).normalize();
            // Build local orthonormal: east / north / out - approximate on tilted sphere
            var north = new THREE.Vector3(0, 1, 0).applyAxisAngle(new THREE.Vector3(0, 0, 1), tiltRad);

            var face = Math.atan2(toSun.z, toSun.x);

            sunL.position.copy(toSun.clone().multiplyScalar(-50).add(earthHold.position));
