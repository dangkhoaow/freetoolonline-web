            var label = document.getElementById('t3dSeasonsDayLabel');
            if (slider) slider.value = String(Math.round(day));
            if (label) label.textContent = 'day ' + Math.round(day);
            t3dInfo(panelHtml(dec, day));
        }
        applyDay(day);
        var playBtn = document.getElementById('t3dSeasonsPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause year' : 'Play year';
        });
        var tropBtn = document.getElementById('t3dSeasonsTropicsBtn');
        if (tropBtn) tropBtn.addEventListener('click', function () {
            showTropics = !showTropics;
            earthTilt.children.forEach(function (c, idx) {
                // tropics are line idx 2 and 3 after equator+axis (mesh earth is idx0; wait structure)
            });
            // Toggle by walking Line materials that are tropic colors - simpler: scale visibility on last two Lines added before subsolar
            tropBtn.className = 'w3-button ' + (showTropics ? 'w3-amber' : 'w3-light-grey');
            tropBtn.textContent = showTropics ? 'Hide tropics' : 'Show tropics';
            // Tropics are earthTilt children after equator+axis (indices 2,3 of Line; earth is Mesh at 0)
            var lines = [];
            earthTilt.traverse(function (o) {
                if (o.isLine) lines.push(o);
            });
            // equator, axis, cancer, capricorn
            if (lines.length >= 4) {
                lines[2].visible = showTropics;
                lines[3].visible = showTropics;
            }
        });
        var jumper = function (btnId, d) {
            var b = document.getElementById(btnId);
            if (!b) return;
            b.addEventListener('click', function () {
                playing = false;
                if (playBtn) playBtn.textContent = 'Play year';
                applyDay(d);
            });
        };
        jumper('t3dSeasonsMarBtn', 80);
        jumper('t3dSeasonsJunBtn', 172);
        jumper('t3dSeasonsSepBtn', 266);
        jumper('t3dSeasonsDecBtn', 355);
        var slider = document.getElementById('t3dSeasonsDay');
        if (slider) slider.addEventListener('input', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play year';
            applyDay(parseFloat(slider.value || '0'));
        });

        };
    }

    // ================= COMET ORBIT =============================================
    // Eccentric Halley-like orbit with anti-sunward ion + dust tails - educational.
    var T3D_COMET_P_YR = 76;
    var T3D_COMET_Q_AU = 0.586;
    var T3D_COMET_Q_AP_AU = 35.1;
    var T3D_COMET_E = 0.967;
    function t3dCometOrbit(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        var sunL = new THREE.PointLight(0xfff3c4, 1.6, 250);
        sunL.position.set(0, 0, 0);
        scene.add(sunL);
        var group = new THREE.Group();
        scene.add(group);
        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(1.4, 32, 24),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        group.add(sun);
        // Ellipse geometry: a from q = a(1-e), focus at sun (origin)
        // Compress aphelion for one-screen readability while panel cites real 35.1 AU
        var e = T3D_COMET_E;
        var aVis = 14; // visual semi-major so full orbit fits
        var bVis = aVis * Math.sqrt(1 - e * e);
        var cVis = aVis * e; // sun at focus: comet center offset along +x
        var orbitPts = [];
        for (var i = 0; i <= 160; i++) {
            var th = (i / 160) * Math.PI * 2;
            // parametric ellipse centered on empty focus; sun at (cVis,0)
            var x = aVis * Math.cos(th) + cVis;
            var z = bVis * Math.sin(th);
            orbitPts.push(new THREE.Vector3(x, 0, z));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(orbitPts),
            new THREE.LineBasicMaterial({ color: 0x78909c, transparent: true, opacity: 0.55 })
        ));
        var nucleus = new THREE.Mesh(
            new THREE.SphereGeometry(0.35, 16, 12),
            new THREE.MeshLambertMaterial({ color: 0xb0bec5, emissive: 0x333333 })
        );
        group.add(nucleus);
        // Dust tail (yellowish, longer) + ion tail (bluish) - both anti-sunward
        function makeTail(color, len, width) {
            var g = new THREE.ConeGeometry(width, len, 10, 1, true);
            g.translate(0, -len / 2, 0);
            var m = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.55, side: THREE.DoubleSide, depthWrite: false });
            var mesh = new THREE.Mesh(g, m);
            return mesh;
        }
        var ionTail = makeTail(0x81d4fa, 5.5, 0.22);
        var dustTail = makeTail(0xffe082, 3.8, 0.45);
        nucleus.add(ionTail);
        nucleus.add(dustTail);
        var progress = 0.08; // near perihelion start for visible tails
        var playing = true;
        var showIon = true;
        var showDust = true;
        function trueAnomaly(p) {
            // Map scrub 0..1 around orbit; denser time near perihelion via eccentric anomaly-ish
            return p * Math.PI * 2;
        }
        function cometPos(nu) {
            var x = aVis * Math.cos(nu) + cVis;
            var z = bVis * Math.sin(nu);
            return new THREE.Vector3(x, 0, z);
        }
        function heliocentricDistAU(pos) {
            // Map visual radius roughly onto published q..Q for panel readout only
            var rVis = pos.length();
            var rMin = aVis * (1 - e); // near perihelion visual
            var rMax = aVis * (1 + e);
            var t = Math.max(0, Math.min(1, (rVis - rMin) / (rMax - rMin)));
            return T3D_COMET_Q_AU + t * (T3D_COMET_Q_AP_AU - T3D_COMET_Q_AU);
        }
        function panelHtml(rAu) {
            return '<h3>Halley-like comet orbit</h3>' +
                '<p>An eccentric ellipse (e = ' + T3D_COMET_E + ') with perihelion about ' + T3D_COMET_Q_AU + ' AU and aphelion about ' + T3D_COMET_Q_AP_AU + ' AU. Both tails point roughly anti-sunward - ion (blue) and dust (yellow).</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Orbital period</td><td>about ' + T3D_COMET_P_YR + ' yr</td></tr>' +
                '<tr><td>Perihelion</td><td>' + T3D_COMET_Q_AU + ' AU</td></tr>' +
                '<tr><td>Aphelion</td><td>' + T3D_COMET_Q_AP_AU + ' AU</td></tr>' +
                '<tr><td>Eccentricity</td><td>' + T3D_COMET_E + '</td></tr>' +
                '<tr><td>Approx. heliocentric dist</td><td>' + rAu.toFixed(2) + ' AU (compressed orbit)</td></tr>' +
                '</table>' +
                '<p class="t3d-note">On-screen distances are compressed so perihelion and aphelion fit one view - the table has the real Halley figures. This is an educational geometry visualization, not an N-body or outgassing simulation.</p>';
        }
        function orientTails(pos) {
            // Point cone axis away from sun (radial out)
            var away = pos.clone().normalize();
            // Cone default axis is +Y; aim -Y along away (since geometry translated -Y)
            var quat = new THREE.Quaternion();
            quat.setFromUnitVectors(new THREE.Vector3(0, -1, 0), away);
            ionTail.setRotationFromQuaternion(quat);
            dustTail.setRotationFromQuaternion(quat);
            // Stretch tails when closer to sun
            var near = Math.max(0.15, 1 - Math.min(1, pos.length() / (aVis * 1.2)));
            ionTail.scale.set(1, 0.6 + near * 1.4, 1);
            dustTail.scale.set(1, 0.5 + near * 1.1, 1);
            ionTail.visible = showIon;
            dustTail.visible = showDust;
        }
        function applyProgress(p) {
            progress = ((p % 1) + 1) % 1;
            var nu = trueAnomaly(progress);
            var pos = cometPos(nu);
            nucleus.position.copy(pos);
            orientTails(pos);
            var rAu = heliocentricDistAU(pos);
            var slider = document.getElementById('t3dCometProgress');
            var label = document.getElementById('t3dCometProgressLabel');
            if (slider) slider.value = String(Math.round(progress * 100));
            if (label) label.textContent = Math.round(progress * 100) + '%';
            t3dInfo(panelHtml(rAu));
        }
        applyProgress(progress);
        var playBtn = document.getElementById('t3dCometPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause orbit' : 'Play orbit';
        });
        var ionBtn = document.getElementById('t3dCometIonBtn');
        if (ionBtn) ionBtn.addEventListener('click', function () {
            showIon = !showIon;
            ionBtn.className = 'w3-button ' + (showIon ? 'w3-amber' : 'w3-light-grey');
            applyProgress(progress);
        });
        var dustBtn = document.getElementById('t3dCometDustBtn');
        if (dustBtn) dustBtn.addEventListener('click', function () {
            showDust = !showDust;
            dustBtn.className = 'w3-button ' + (showDust ? 'w3-amber' : 'w3-light-grey');
            applyProgress(progress);
        });
        var slider = document.getElementById('t3dCometProgress');
        if (slider) slider.addEventListener('input', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play orbit';
            applyProgress(parseFloat(slider.value || '0') / 100);
        });
        t3dStatus('Drag to orbit, scroll to zoom. Scrub the Halley-like ellipse, toggle ion/dust tails, and watch both point away from the Sun.');
        return function animate(dt) {
            if (playing) applyProgress(progress + (dt / 1000) * 0.045);
        };
    }

    // ================= ASTEROID BELT ===========================================
    // Main-belt particle ring with Kirkwood gaps + Ceres - educational, not N-body.
    var T3D_BELT_INNER_AU = 2.2;
    var T3D_BELT_OUTER_AU = 3.2;
    var T3D_CERES_DIAM_KM = 940;
    var T3D_BELT_MASS_PCT_MOON = 3;
    var T3D_KIRKWOOD = [
        { label: '3:1', au: 2.50 },
        { label: '5:2', au: 2.82 },
        { label: '7:3', au: 2.95 }
    ];
    function t3dAsteroidBelt(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x020308, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.22));
        var sunL = new THREE.PointLight(0xfff3c4, 1.4, 200);
        sunL.position.set(0, 0, 0);
        scene.add(sunL);
        var group = new THREE.Group();
        scene.add(group);
        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(1.6, 32, 24),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        group.add(sun);
        // Scale AU onto orbit radius units: 1 AU -> 5 units so belt spans ~11-16
        var auScale = 5;
        var rInner = T3D_BELT_INNER_AU * auScale;
        var rOuter = T3D_BELT_OUTER_AU * auScale;
        // Gap half-widths in AU (visual) so Kirkwood belts read as clear rings
        var gapHalf = 0.08;
        function inGap(au) {
            for (var g = 0; g < T3D_KIRKWOOD.length; g++) {
                if (Math.abs(au - T3D_KIRKWOOD[g].au) < gapHalf) return true;
            }
            return false;
        }
        var N = 1400;
        var positions = new Float32Array(N * 3);
        var colors = new Float32Array(N * 3);
        var i = 0;
        var placed = 0;
        while (placed < N && i < N * 8) {
            i++;
            var au = T3D_BELT_INNER_AU + Math.random() * (T3D_BELT_OUTER_AU - T3D_BELT_INNER_AU);
            if (inGap(au)) continue;
            var ang = Math.random() * Math.PI * 2;
            var r = au * auScale;
            var y = (Math.random() - 0.5) * 0.55;
            var idx = placed * 3;
            positions[idx] = Math.cos(ang) * r;
            positions[idx + 1] = y;
            positions[idx + 2] = Math.sin(ang) * r;
            var shade = 0.45 + Math.random() * 0.4;
            colors[idx] = shade;
            colors[idx + 1] = shade * 0.92;
            colors[idx + 2] = shade * 0.78;
            placed++;
        }
        var geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        var points = new THREE.Points(geo, new THREE.PointsMaterial({
            size: 0.12, vertexColors: true, transparent: true, opacity: 0.92, depthWrite: false
        }));
        group.add(points);
        // Kirkwood gap guide rings (thin lines)
        var gapLines = [];
        for (var k = 0; k < T3D_KIRKWOOD.length; k++) {
            var pts = [];
            var rr = T3D_KIRKWOOD[k].au * auScale;
            for (var j = 0; j <= 96; j++) {
                var a = (j / 96) * Math.PI * 2;
                pts.push(new THREE.Vector3(Math.cos(a) * rr, 0, Math.sin(a) * rr));
            }
            var line = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: 0xff7043, transparent: true, opacity: 0.55 })
            );
            line.visible = false;
            group.add(line);
            gapLines.push(line);
        }
        // Ceres as larger dwarf-planet marker near ~2.77 AU
        var ceresAU = 2.77;
        var ceres = new THREE.Mesh(
            new THREE.SphereGeometry(0.42, 20, 16),
            new THREE.MeshLambertMaterial({ color: 0xb0bec5, emissive: 0x222222 })
        );
        var ceresAng = 0.6;
        ceres.position.set(Math.cos(ceresAng) * ceresAU * auScale, 0.05, Math.sin(ceresAng) * ceresAU * auScale);
        group.add(ceres);
        var showGaps = false;
        var highlightCeres = true;
        var spinning = true;
        function panelHtml() {
            var gaps = showGaps
                ? '<p>Highlighted Kirkwood gaps mark Jupiter mean-motion resonances at about 2.50 AU (3:1), 2.82 AU (5:2), and 2.95 AU (7:3).</p>'
                : '';
            return '<h3>Main asteroid belt</h3>' +
                '<p>A procedural particle ring from ' + T3D_BELT_INNER_AU + ' to ' + T3D_BELT_OUTER_AU + ' AU. The larger gray body marks Ceres (about ' + T3D_CERES_DIAM_KM + ' km across). Belt mass is roughly ' + T3D_BELT_MASS_PCT_MOON + '% of the Moon.</p>' +
                gaps +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Belt span</td><td>' + T3D_BELT_INNER_AU + '-' + T3D_BELT_OUTER_AU + ' AU</td></tr>' +
                '<tr><td>Ceres diameter</td><td>about ' + T3D_CERES_DIAM_KM + ' km</td></tr>' +
                '<tr><td>Kirkwood gaps</td><td>3:1 / 5:2 / 7:3</td></tr>' +
                '<tr><td>Belt mass</td><td>~' + T3D_BELT_MASS_PCT_MOON + '% of Moon</td></tr>' +
                '</table>' +
                '<p class="t3d-note">On-screen counts and sizes are compressed for readability - the table has the real figures. This is an educational visualization of belt structure, not an N-body gravitational model.</p>';
        }
        function refresh() {
            for (var g = 0; g < gapLines.length; g++) gapLines[g].visible = showGaps;
            ceres.visible = highlightCeres;
            t3dInfo(panelHtml());
            var gapBtn = document.getElementById('t3dBeltGapsBtn');
            if (gapBtn) gapBtn.textContent = showGaps ? 'Hide Kirkwood gaps' : 'Show Kirkwood gaps';
            var cerBtn = document.getElementById('t3dBeltCeresBtn');
            if (cerBtn) cerBtn.className = 'w3-button ' + (highlightCeres ? 'w3-amber' : 'w3-light-grey');
        }
        refresh();
        var gapBtn = document.getElementById('t3dBeltGapsBtn');
        if (gapBtn) gapBtn.addEventListener('click', function () { showGaps = !showGaps; refresh(); });
        var cerBtn = document.getElementById('t3dBeltCeresBtn');
        if (cerBtn) cerBtn.addEventListener('click', function () { highlightCeres = !highlightCeres; refresh(); });
        var playBtn = document.getElementById('t3dBeltPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            spinning = !spinning;
            playBtn.textContent = spinning ? 'Pause spin' : 'Play spin';
        });
        var speedEl = document.getElementById('t3dBeltSpeed');
        var speed = 1;
        if (speedEl) speedEl.addEventListener('input', function () { speed = parseFloat(speedEl.value || '1'); });
        t3dStatus('Drag to orbit, scroll to zoom. Toggle Kirkwood gap rings, highlight Ceres, and spin the belt.');
        return function animate(dt) {
            if (spinning) group.rotation.y += (dt / 1000) * 0.12 * speed;
        };
    }

    // ================= TIDAL LOCKING ===========================================
    // Why the Moon keeps one face toward Earth - synchronous rotation demo.
    var T3D_MOON_SIDEREAL_D = 27.32;
    var T3D_MOON_RECESSION_CM_YR = 3.8;
    var T3D_DAY_LENGTHEN_MS_CENT = 1.7;
    function t3dTidalLocking(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.28));
        var sun = new THREE.DirectionalLight(0xffffff, 1.05);
        sun.position.set(40, 20, 30);
        scene.add(sun);
        var group = new THREE.Group();
        scene.add(group);
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(3.2, 40, 28),
            new THREE.MeshPhongMaterial({ color: 0x2e7d9a, emissive: 0x0a1520, shininess: 14 })
        );
        group.add(earth);
        var moon = new THREE.Mesh(
            new THREE.SphereGeometry(0.95, 28, 20),
            new THREE.MeshLambertMaterial({ color: 0xcfd8dc, emissive: 0x222222 })
        );
        // Near-side marker (dark patch) so the reader sees which face points at Earth
        var nearFace = new THREE.Mesh(
            new THREE.SphereGeometry(0.96, 16, 12, 0, Math.PI * 0.55, 0, Math.PI),
            new THREE.MeshLambertMaterial({ color: 0x78909c, emissive: 0x111111 })
        );
        nearFace.rotation.y = Math.PI; // face Earth at phase 0 when locked
        moon.add(nearFace);
        group.add(moon);
        var orbitR = 9.5;
        // orbit ring
        var ringPts = [];
        for (var i = 0; i <= 96; i++) {
            var a = (i / 96) * Math.PI * 2;
            ringPts.push(new THREE.Vector3(Math.cos(a) * orbitR, 0, Math.sin(a) * orbitR));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(ringPts),
            new THREE.LineBasicMaterial({ color: 0x546e7a, transparent: true, opacity: 0.45 })
        ));
        var locked = true;
        var progress = 0.15;
        var playing = true;
        var earthSpin = 0;
        function panelHtml() {
            var mode = locked ? 'Tidally locked (synchronous)' : 'Unlocked spin demo';
            return '<h3>' + mode + '</h3>' +
                '<p>The Moon\'s spin period equals its orbital period of ' + T3D_MOON_SIDEREAL_D + ' days, so the same face stays toward Earth. Toggle Unlocked spin to watch a free-spinning moon show its far side as it orbits.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Moon spin = orbit</td><td>' + T3D_MOON_SIDEREAL_D + ' d (sidereal)</td></tr>' +
                '<tr><td>Lunar recession</td><td>' + T3D_MOON_RECESSION_CM_YR + ' cm/yr</td></tr>' +
                '<tr><td>Earth day lengthening</td><td>' + T3D_DAY_LENGTHEN_MS_CENT + ' ms/century</td></tr>' +
                '</table>' +
                '<p class="t3d-note">On-screen sizes and distances are compressed for readability - the table has the real figures. This is an educational geometry visualization, not a physical simulation of tidal friction.</p>';
        }
        function applyProgress(p) {
            progress = ((p % 1) + 1) % 1;
            var ang = progress * Math.PI * 2;
            moon.position.set(Math.cos(ang) * orbitR, 0, Math.sin(ang) * orbitR);
            if (locked) {
                // Keep near-face toward Earth: moon.y rotation follows orbit angle
                moon.rotation.y = ang + Math.PI;
            } else {
                // Free spin ~3x orbital rate so far side clearly appears
                moon.rotation.y = ang * 3.2;
            }
            earth.rotation.y = earthSpin;
            var slider = document.getElementById('t3dTidalProgress');
            var label = document.getElementById('t3dTidalProgressLabel');
            if (slider) slider.value = String(Math.round(progress * 100));
            if (label) label.textContent = Math.round(progress * 100) + '%';
            t3dInfo(panelHtml());
        }
        function setLocked(on) {
            locked = on;
            var lockBtn = document.getElementById('t3dTidalLockBtn');
            var unlockBtn = document.getElementById('t3dTidalUnlockBtn');
            if (lockBtn) lockBtn.className = 'w3-button ' + (on ? 'w3-amber' : 'w3-light-grey');
            if (unlockBtn) unlockBtn.className = 'w3-button ' + (!on ? 'w3-amber' : 'w3-light-grey');
            applyProgress(progress);
        }
        setLocked(true);
        var lockBtn = document.getElementById('t3dTidalLockBtn');
        var unlockBtn = document.getElementById('t3dTidalUnlockBtn');
        if (lockBtn) lockBtn.addEventListener('click', function () { setLocked(true); });
        if (unlockBtn) unlockBtn.addEventListener('click', function () { setLocked(false); });
        var playBtn = document.getElementById('t3dTidalPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause orbit' : 'Play orbit';
        });
        var slider = document.getElementById('t3dTidalProgress');
        if (slider) slider.addEventListener('input', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play orbit';
            applyProgress(parseFloat(slider.value || '0') / 100);
        });
        t3dStatus('Drag to orbit, scroll to zoom. Toggle Tidally locked vs Unlocked spin, scrub orbit phase, and watch which lunar face points at Earth.');
        return function animate(dt) {
            earthSpin += (dt / 1000) * 0.35;
            if (playing) applyProgress(progress + (dt / 1000) * 0.06);
            else {
                earth.rotation.y = earthSpin;
                t3dInfo(panelHtml());
            }
        };
    }

    function t3dExoplanetTransit(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x020308, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.25));
        var group = new THREE.Group();
        scene.add(group);
        var star = new THREE.Mesh(
            new THREE.SphereGeometry(4.2, 48, 36),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        group.add(star);
        var planet = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 28, 20),
            new THREE.MeshLambertMaterial({ color: 0x5c6bc0, emissive: 0x111122 })
        );
        group.add(planet);
        var orbitR = 9;
        var preset = 'jupiter';
        var progress = 0.42;
        var playing = false;
        var trappist = false;
        function depthPct() { return preset === 'jupiter' ? T3D_JUP_DEPTH_PCT : T3D_EARTH_DEPTH_PCT; }
        function planetRadius() { return preset === 'jupiter' ? 0.55 : 0.16; }
        function overlapDim(p) {
            var ang = p * Math.PI * 2;
            planet.position.set(Math.cos(ang) * orbitR, 0, Math.sin(ang) * orbitR);
            planet.geometry.dispose();
            planet.geometry = new THREE.SphereGeometry(planetRadius(), 28, 20);
            var dx = planet.position.x;
            var overlap = Math.max(0, 1 - Math.abs(dx) / (planetRadius() + 0.3));
            var dim = 1 - (depthPct() / 100) * overlap;
            star.material.color.setRGB(1 * dim, 0.84 * dim, 0.31 * dim);
            var inTransit = overlap > 0.35;
            return inTransit;
        }
        function panelHtml(inTransit) {
            var depth = depthPct();
            var trap = trappist
                ? '<p>TRAPPIST-1 hosts ' + T3D_TRAPPIST_COUNT + ' known transiting planets with orbital periods from ' + T3D_TRAPPIST_PERIOD_MIN_D + ' to ' + T3D_TRAPPIST_PERIOD_MAX_D + ' days (published catalog values).</p>'
                : '';
            return '<h3>' + (inTransit ? 'Planet in transit' : 'Planet outside transit') + '</h3>' +
                '<p>Transit depth scales as (R<sub>planet</sub>/R<sub>star</sub>)<sup>2</sup>. A Jupiter-Sun analog dips about ' + T3D_JUP_DEPTH_PCT + '%; an Earth-Sun analog about ' + T3D_EARTH_DEPTH_PCT + '%. Current preset depth: ' + depth + '%.</p>' +
                trap +
                '<table class="w3-table w3-bordered"><tr><td>Jupiter-Sun depth</td><td>about ' + T3D_JUP_DEPTH_PCT + '%</td></tr>' +
                '<tr><td>Earth-Sun depth</td><td>about ' + T3D_EARTH_DEPTH_PCT + '%</td></tr>' +
                '<tr><td>TRAPPIST-1 planets</td><td>' + T3D_TRAPPIST_COUNT + ' (1.5-19 d periods)</td></tr></table>' +
                '<p class="t3d-note">Educational geometry visualization - not a photometry pipeline or real observation matched to tonight\'s sky. This is not a physical simulation.</p>';
        }
        function applyProgress(p) {
            progress = Math.max(0, Math.min(1, p));
            var inTransit = overlapDim(progress);
            var slider = document.getElementById('t3dTransitProgress');
            var label = document.getElementById('t3dTransitProgressLabel');
            if (slider) slider.value = String(Math.round(progress * 100));
            if (label) label.textContent = Math.round(progress * 100) + '%';
            t3dInfo(panelHtml(inTransit));
        }
        function setPreset(id) {
            preset = id;
            var jup = document.getElementById('t3dTransitBtn-jupiter');
            var earth = document.getElementById('t3dTransitBtn-earth');
            if (jup) jup.className = 'w3-button ' + (id === 'jupiter' ? 'w3-amber' : 'w3-light-grey');
            if (earth) earth.className = 'w3-button ' + (id === 'earth' ? 'w3-amber' : 'w3-light-grey');
            applyProgress(progress);
        }
        setPreset('jupiter');
        var jupBtn = document.getElementById('t3dTransitBtn-jupiter');
        var earthBtn = document.getElementById('t3dTransitBtn-earth');
        if (jupBtn) jupBtn.addEventListener('click', function () { setPreset('jupiter'); });
        if (earthBtn) earthBtn.addEventListener('click', function () { setPreset('earth'); });
        var trapBtn = document.getElementById('t3dTrappistBtn');
        if (trapBtn) trapBtn.addEventListener('click', function () {
            trappist = !trappist;
            trapBtn.textContent = trappist ? 'Hide TRAPPIST-1 note' : 'Show TRAPPIST-1 note';
            applyProgress(progress);
        });
        var playBtn = document.getElementById('t3dTransitPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause orbit' : 'Play orbit';
        });
        var slider = document.getElementById('t3dTransitProgress');
        if (slider) slider.addEventListener('input', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play orbit';
            applyProgress(parseFloat(slider.value || '0') / 100);
        });
        t3dStatus('Drag to orbit, scroll to zoom. Pick Jupiter or Earth depth, scrub orbit phase, and watch the star dim during transit.');
        return function animate(dt) {
            if (playing) applyProgress(progress + (dt / 1000) * 0.08);
            if (progress >= 1) progress = 0;
        };
    }

    // ================= ISS ORBIT TRACKER =======================================
    // Procedural low-Earth orbit of the ISS around Earth - educational, not live tracking.
    var T3D_ISS_ALT_KM = 408;
    var T3D_ISS_PERIOD_MIN = 92.9;
    var T3D_ISS_SPEED_KMS = 7.66;
    var T3D_ISS_INCL_DEG = 51.64;
    var T3D_ISS_ORBITS_PER_DAY = 15.5;
    var T3D_EARTH_RADIUS_KM = 6371;
    function t3dIssOrbitTracker(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0x334455, 0.35));
        var sun = new THREE.DirectionalLight(0xffffff, 1.1);
        sun.position.set(80, 40, 60);
        scene.add(sun);
        var earthR = 12;
        var orbitR = earthR * (1 + T3D_ISS_ALT_KM / T3D_EARTH_RADIUS_KM);
        var incl = T3D_ISS_INCL_DEG * Math.PI / 180;
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(earthR, 48, 32),
            new THREE.MeshPhongMaterial({ color: 0x2e7d9a, emissive: 0x0a1a22, shininess: 12 })
        );
        scene.add(earth);
        var atmos = new THREE.Mesh(
            new THREE.SphereGeometry(earthR * 1.02, 32, 24),
            new THREE.MeshBasicMaterial({ color: 0x66aaff, transparent: true, opacity: 0.12, depthWrite: false })
        );
        scene.add(atmos);
        var orbitPts = [];
        for (var i = 0; i <= 128; i++) {
            var a = (i / 128) * Math.PI * 2;
            orbitPts.push(new THREE.Vector3(
                Math.cos(a) * orbitR,
                Math.sin(a) * orbitR * Math.sin(incl),
                Math.sin(a) * orbitR * Math.cos(incl)
            ));
        }
        var orbitLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(orbitPts),
            new THREE.LineBasicMaterial({ color: 0x90caf9, transparent: true, opacity: 0.55 })
        );
        scene.add(orbitLine);
        var iss = new THREE.Mesh(
            new THREE.BoxGeometry(1.4, 0.7, 0.7),
            new THREE.MeshLambertMaterial({ color: 0xe0e0e0 })
        );
        var panel = new THREE.Mesh(
            new THREE.BoxGeometry(2.8, 0.08, 0.5),
            new THREE.MeshLambertMaterial({ color: 0xb0bec5 })
        );
        panel.position.set(0, 0.5, 0);
        iss.add(panel);
        scene.add(iss);

            phase = (parseFloat(phaseEl.value || '0') / 100) * Math.PI * 2;
            if (phaseLabel) phaseLabel.textContent = parseFloat(phaseEl.value || '0').toFixed(0) + '%';

    // ================= MOON CALENDAR 3D ==========================================
    // Face-on Moon with phase by calendar day, faint earthshine on the dark limb,

    var T3D_CAL_SYNODIC = 29.53;

    function t3dMoonCalendar3d(shell) {
        var THREE = shell.THREE, scene = shell.scene;

        function phaseName(t) {
            if (t < 0.03 || t > 0.97) return 'New Moon';

            if (t < 0.28) return 'First Quarter';
            if (t < 0.47) return 'Waxing Gibbous';
            if (t < 0.53) return 'Full Moon';
            if (t < 0.72) return 'Waning Gibbous';
            if (t < 0.78) return 'Last Quarter';
            return 'Waning Crescent';
        }
        function setDay(d) {
            day = Math.max(0, Math.min(T3D_CAL_SYNODIC, d));
            var t = day / T3D_CAL_SYNODIC;

            sunLight.position.set(Math.cos(ang) * 40, 6, Math.sin(ang) * 40);

        }
        setDay(0);
        var slider = document.getElementById('t3dCalendarDay');
        if (slider) slider.addEventListener('input', function () { playing = false; var pb = document.getElementById('t3dCalendarPlayBtn'); if (pb) pb.textContent = 'Play month'; setDay(parseFloat(slider.value || '0')); });
        var playBtn = document.getElementById('t3dCalendarPlayBtn');

        return function animate(dt) {
            if (librationOn) {
                libT += dt / 1000;

    // ================= KEPLER ORBITS ===========================================
    // Ellipse with Sun at one focus; motion follows Kepler's equation (equal-area
    // sweep in equal time). Educational visualization - not an N-body integrator.
    var T3D_KEPLER_PRESETS = {
        mercury: { name: 'Mercury', aAu: 0.387, e: 0.206, color: 0x9e9e9e },
        earth: { name: 'Earth', aAu: 1.0, e: 0.017, color: 0x42a5f5 },
        halley: { name: "Halley's comet", aAu: 17.8, e: 0.967, color: 0xb0bec5 }
    };
    function t3dSolveKepler(M, ecc) {
        var E = M;
        for (var i = 0; i < 10; i++) E = M + ecc * Math.sin(E);
        return E;
    }
    function t3dKeplerOrbits(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x050810, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.42));
        var sunLight = new THREE.DirectionalLight(0xfff0d0, 1.1);
        sunLight.position.set(20, 30, 18);
        scene.add(sunLight);
        var SCOUNT = shell.low ? 300 : 700;
        var spos = new Float32Array(SCOUNT * 3);
        for (var s = 0; s < SCOUNT; s++) {
            var v = new THREE.Vector3().randomDirection().multiplyScalar(80 + Math.random() * 120);
            spos[s * 3] = v.x; spos[s * 3 + 1] = v.y; spos[s * 3 + 2] = v.z;
        }
        var sgeo = new THREE.BufferGeometry();
        sgeo.setAttribute('position', new THREE.BufferAttribute(spos, 3));
        scene.add(new THREE.Points(sgeo, new THREE.PointsMaterial({ color: 0xcfd8dc, size: 0.45, sizeAttenuation: false })));
        var sun = new THREE.Mesh(new THREE.SphereGeometry(2.2, 32, 16), new THREE.MeshBasicMaterial({ color: 0xffd54f }));
        scene.add(sun);
        var state = { aAu: 1.0, e: 0.017, color: 0x42a5f5, name: 'Earth', M: 0, paused: false, showSweep: true };
        var orbitLine, planet, sweepMesh, sweepVerts = [];
        function auToScene(aAu) { return 8 + aAu * 4.5; }
        function periodYears(aAu) { return Math.pow(aAu, 1.5); }
        function posFromE(E, aScene, ecc) {
            var b = aScene * Math.sqrt(1 - ecc * ecc);
            return new THREE.Vector3(aScene * (Math.cos(E) - ecc), 0, b * Math.sin(E));
        }
        function rebuildOrbit() {
            if (orbitLine) { scene.remove(orbitLine); orbitLine.geometry.dispose(); orbitLine.material.dispose(); }
            var aScene = auToScene(state.aAu), ecc = state.e, pts = [];
            for (var i = 0; i <= 128; i++) {
                var E = (i / 128) * Math.PI * 2;
                var p = posFromE(E, aScene, ecc);
                pts.push(p.x, p.y, p.z);
            }
            var g = new THREE.BufferGeometry();
            g.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
            orbitLine = new THREE.Line(g, new THREE.LineBasicMaterial({ color: 0x546e7a }));
            scene.add(orbitLine);
            if (planet) { scene.remove(planet); }
            planet = new THREE.Mesh(
                new THREE.SphereGeometry(Math.max(0.7, 1.6 - state.e * 0.4), 20, 12),
                new THREE.MeshLambertMaterial({ color: state.color })
            );
            scene.add(planet);
            sweepVerts = [];
            if (sweepMesh) { scene.remove(sweepMesh); sweepMesh.geometry.dispose(); sweepMesh.material.dispose(); sweepMesh = null; }
            updateFacts();
        }
        function updateSweep(prev, curr) {
            if (!state.showSweep || !prev || !curr) return;
            sweepVerts.push(prev.x, prev.y, prev.z, 0, 0, 0, curr.x, curr.y, curr.z);
            if (sweepVerts.length > 360) sweepVerts = sweepVerts.slice(-360);
            if (sweepMesh) { scene.remove(sweepMesh); sweepMesh.geometry.dispose(); }
            var sg = new THREE.BufferGeometry();
            sg.setAttribute('position', new THREE.Float32BufferAttribute(sweepVerts, 3));
            sweepMesh = new THREE.Mesh(sg, new THREE.MeshBasicMaterial({ color: 0x26a69a, transparent: true, opacity: 0.22, side: THREE.DoubleSide }));
            scene.add(sweepMesh);
        }
        function updateFacts() {
            var Ty = periodYears(state.aAu).toFixed(state.aAu > 5 ? 1 : 3);
            var a3 = Math.pow(state.aAu, 3).toFixed(3);
            var t2 = Math.pow(periodYears(state.aAu), 2).toFixed(3);
            t3dInfo('<h3>' + state.name + ' orbit</h3><table class="w3-table w3-bordered"><tr><td>Semi-major axis a</td><td>' + state.aAu + ' AU</td></tr><tr><td>Eccentricity e</td><td>' + state.e + '</td></tr><tr><td>Orbital period T</td><td>' + Ty + ' yr</td></tr><tr><td>T squared</td><td>' + t2 + ' yr^2</td></tr><tr><td>a cubed</td><td>' + a3 + ' AU^3</td></tr></table><p>Kepler\'s 1st law: the path is an ellipse with the Sun at one focus. 2nd law: equal areas in equal times (teal wedges). 3rd law: T^2 is proportional to a^3.</p><p class="t3d-note">Educational visualization using Kepler\'s equation - not a full gravity integrator. On-screen orbit size is scaled for readability; AU and year figures are real.</p>');
        }
        rebuildOrbit();
        var prevPos = null;
        function applyPreset(key) {
            var p = T3D_KEPLER_PRESETS[key];
            if (!p) return;
            state.aAu = p.aAu; state.e = p.e; state.color = p.color; state.name = p.name; state.M = 0;
            var eccEl = document.getElementById('t3dKeplerEcc');
            if (eccEl) eccEl.value = String(p.e);
            rebuildOrbit();
        }
        ['mercury', 'earth', 'halley'].forEach(function (key) {
            var btn = document.getElementById('t3dKeplerBtn-' + key);
            if (btn) btn.addEventListener('click', function () { applyPreset(key); });
        });
        var eccSlider = document.getElementById('t3dKeplerEcc');
        if (eccSlider) eccSlider.addEventListener('input', function () {
            state.e = Math.min(0.97, Math.max(0, parseFloat(eccSlider.value || '0.017')));
            state.name = 'Custom orbit';
            rebuildOrbit();
        });
        var playBtn = document.getElementById('t3dKeplerPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            state.paused = !state.paused;
            playBtn.textContent = state.paused ? 'Play orbit' : 'Pause orbit';
        });
        var sweepBtn = document.getElementById('t3dKeplerSweepBtn');
        if (sweepBtn) sweepBtn.addEventListener('click', function () {
            state.showSweep = !state.showSweep;
            sweepBtn.textContent = state.showSweep ? 'Hide area wedges' : 'Show area wedges';
            if (!state.showSweep && sweepMesh) { scene.remove(sweepMesh); sweepMesh.geometry.dispose(); sweepMesh.material.dispose(); sweepMesh = null; sweepVerts = []; }
        });
        return function animate(dt) {
            if (state.paused) return;
            var aScene = auToScene(state.aAu), ecc = state.e;
            var Ty = periodYears(state.aAu);
            var n = (Math.PI * 2) / (Ty * 12);
            state.M += (dt / 1000) * n;
            if (state.M > Math.PI * 2) state.M -= Math.PI * 2;
            var E = t3dSolveKepler(state.M, ecc);
            var pos = posFromE(E, aScene, ecc);
            if (planet) planet.position.copy(pos);
            updateSweep(prevPos, pos);
            prevPos = pos.clone();
        };
    }

    // ================= SATURN RINGS ==========================================
    // Main-ring radii from Saturn center (km, NASA/PDS Ring-Moon Node). Scene
    // scale compresses 60,268 km equatorial radius to a 6-unit sphere.

    // ================= MOON PHASES 3D ======================================

    var T3D_SYNODIC_D = 29.53;

            new THREE.TorusGeometry(moonOrbitR, 0.04, 6, 96),

        );

        var phaseDay = 0;

            if (t < 0.47) return 'Waxing Gibbous';

            phaseDay = Math.max(0, Math.min(T3D_SYNODIC_D, day));

            moon.position.set(Math.cos(ang + Math.PI) * moonOrbitR, 0, Math.sin(ang + Math.PI) * moonOrbitR);

            var slider = document.getElementById('t3dPhaseDay');

    // ================= BLACK HOLE ============================================
    function t3dBlackHole(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        // Event horizon: a light-swallowing sphere.
        var horizon = new THREE.Mesh(new THREE.SphereGeometry(6, 48, 24), new THREE.MeshBasicMaterial({ color: 0x000000 }));
        scene.add(horizon);
        var glow = new THREE.Mesh(new THREE.SphereGeometry(6.35, 48, 24), new THREE.MeshBasicMaterial({ color: 0x3949ab, transparent: true, opacity: 0.22, side: THREE.BackSide }));
        scene.add(glow);
        // Accretion disk: particles on orbits, inner ones faster and hotter.
        var COUNT = shell.low ? 12000 : 32000;
        var pos = new Float32Array(COUNT * 3);
        var col = new Float32Array(COUNT * 3);
        var meta = [];
        var color = new THREE.Color();
        for (var i = 0; i < COUNT; i++) {
            var rad = 8.5 + Math.pow(Math.random(), 1.6) * 26;
            var ang = Math.random() * Math.PI * 2;
            var thick = (Math.random() - 0.5) * (0.4 + (rad - 8.5) * 0.08);
            meta.push({ rad: rad, ang: ang, y: thick });
            // heat ramp: inner = near-white, outer = deep orange/red
            var t = (rad - 8.5) / 26;
            color.setHSL(0.08 - t * 0.06, 1.0, 0.72 - t * 0.42);
            col[i * 3] = color.r; col[i * 3 + 1] = color.g; col[i * 3 + 2] = color.b;
        }
        var geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
        var disk = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.22, vertexColors: true, transparent: true, opacity: 0.95, depthWrite: false }));
        disk.rotation.x = 0.28;
        scene.add(disk);
        // Background stars.
        var SCOUNT = 1500;
        var spos = new Float32Array(SCOUNT * 3);
        for (var s = 0; s < SCOUNT; s++) {
            var v = new THREE.Vector3().randomDirection().multiplyScalar(320 + Math.random() * 500);
            spos[s * 3] = v.x; spos[s * 3 + 1] = v.y; spos[s * 3 + 2] = v.z;
        }
        var sgeo = new THREE.BufferGeometry();
        sgeo.setAttribute('position', new THREE.BufferAttribute(spos, 3));
        scene.add(new THREE.Points(sgeo, new THREE.PointsMaterial({ color: 0xcfd8dc, size: 0.7, sizeAttenuation: false })));
        t3dInfo('<h3>Black hole - what you are seeing</h3><p>The black sphere marks the event horizon - the boundary light cannot leave. The glowing ring is an accretion disk: gas spiraling inward, friction-heated so the inner edge glows hottest. Inner particles orbit faster, as real disks do.</p><table class="w3-table w3-bordered"><tr><td>Sagittarius A*</td><td>about 4.3 million solar masses, about 26,000 light-years away (our galaxy\'s center)</td></tr><tr><td>M87*</td><td>about 6.5 billion solar masses - the first black hole ever imaged (2019)</td></tr><tr><td>Event-horizon size</td><td>roughly 3 km of radius per solar mass, so a 10-solar-mass black hole spans about 60 km</td></tr></table><p class="t3d-note">This is an artistic, educational approximation - it does not solve general relativity, and effects like gravitational lensing are only hinted at. The figures in the table are real.</p>');
        var pa = disk.geometry.attributes.position.array;
        return function animate(dt) {
            for (var i = 0; i < COUNT; i++) {
                var m = meta[i];
                m.ang += (dt / 1000) * (2.2 / Math.pow(m.rad / 10, 1.5)); // inner orbits faster
                pa[i * 3] = Math.cos(m.ang) * m.rad;
                pa[i * 3 + 1] = m.y;
                pa[i * 3 + 2] = Math.sin(m.ang) * m.rad;
            }
            disk.geometry.attributes.position.needsUpdate = true;
            glow.rotation.y += dt * 0.0001;
        };
    }

    // ================= GALAXY =================================================
    function t3dGalaxy(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        var group = null;
        function build(seed) {
            if (group) { scene.remove(group); group.traverse(function (o) { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); }); }
            group = new THREE.Group();
            var COUNT = shell.low ? 30000 : 100000;
            var ARMS = 3 + Math.floor(seed * 2.999);
            var pos = new Float32Array(COUNT * 3);
            var col = new Float32Array(COUNT * 3);
            var color = new THREE.Color();
            for (var i = 0; i < COUNT; i++) {
                var rad = Math.pow(Math.random(), 0.6) * 42;
                var arm = i % ARMS;
                var armAngle = (arm / ARMS) * Math.PI * 2;
                var spiral = rad * 0.16;
                var spread = (Math.random() - 0.5) * (0.5 + rad * 0.05) * (Math.random() < 0.1 ? 3 : 1);
                var ang = armAngle + spiral + spread * 0.25;
                var y = (Math.random() - 0.5) * Math.max(0.4, 5.5 - rad * 0.12);
                pos[i * 3] = Math.cos(ang) * rad + (Math.random() - 0.5) * 1.2;
                pos[i * 3 + 1] = y;
                pos[i * 3 + 2] = Math.sin(ang) * rad + (Math.random() - 0.5) * 1.2;
                var t = rad / 42;
                // warm core -> blue-white arms
                color.setHSL(0.12 - t * 0.04 + (Math.random() < 0.25 ? 0.45 : 0), 0.8, 0.55 + (1 - t) * 0.2);
                col[i * 3] = color.r; col[i * 3 + 1] = color.g; col[i * 3 + 2] = color.b;
            }
            var geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
            group.add(new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.18, vertexColors: true, transparent: true, opacity: 0.9, depthWrite: false })));
            var core = new THREE.Mesh(new THREE.SphereGeometry(2.6, 24, 12), new THREE.MeshBasicMaterial({ color: 0xfff2cc, transparent: true, opacity: 0.85 }));
            group.add(core);
            scene.add(group);
            t3dStatus('Rendering ' + COUNT.toLocaleString('en-US') + ' points in ' + ARMS + ' spiral arms - drag to rotate, scroll to zoom.');
        }
        build(Math.random());
        var regen = document.getElementById('t3dRegen');
        if (regen) regen.addEventListener('click', function () { build(Math.random()); });
        t3dInfo('<h3>A spiral galaxy</h3><p>Each point is a rendered star-stand-in; real spiral galaxies hold vastly more.</p><table class="w3-table w3-bordered"><tr><td>Milky Way stars</td><td>more than 100 billion</td></tr><tr><td>Milky Way diameter</td><td>about 100,000 light-years</td></tr><tr><td>Sun\'s position</td><td>about 26,000 light-years from the center</td></tr><tr><td>One solar orbit</td><td>about 230 million years</td></tr></table><p class="t3d-note">The spiral shape here is parametric art tuned to look right, not a gravitational model - the table figures are real.</p>');
        return function animate(dt) {
            if (group) group.rotation.y += dt * 0.00006;
        };
    }

    // ================= VOXEL WORLD BUILDER (game region) ====================
    function t3dVoxel(shell) {
        var THREE = shell.THREE, scene = shell.scene;

            { name: 'Grass', color: 0x66bb6a },
            { name: 'Dirt', color: 0x8d6e63 },

            shell.renderer.setClearColor(day ? 0x87ceeb : 0x0d1330, 1);

        var unit = new THREE.BoxGeometry(1, 1, 1);
        var dummy = new THREE.Object3D();
        function rebuild() {
            for (var i = 0; i < meshes.length; i++) { scene.remove(meshes[i]); }
            meshes = [];
            var byType = [];
            for (var t = 0; t < TYPES.length; t++) byType.push([]);
            var keys = Object.keys(blocks);
            for (var k = 0; k < keys.length; k++) byType[blocks[keys[k]]].push(keys[k]);
            for (var ty = 0; ty < TYPES.length; ty++) {
                var list = byType[ty];

                var mat = new THREE.MeshLambertMaterial({ color: TYPES[ty].color, transparent: ty === 5, opacity: ty === 5 ? 0.8 : 1 });
                var im = new THREE.InstancedMesh(unit, mat, list.length);
                for (var j = 0; j < list.length; j++) {
                    var c = list[j].split(',');
                    dummy.position.set(parseInt(c[0], 10) + 0.5, parseInt(c[1], 10) + 0.5, parseInt(c[2], 10) + 0.5);
                    dummy.updateMatrix();
                    im.setMatrixAt(j, dummy.matrix);
                }
                im.userData = { keys: list };
                scene.add(im);
                meshes.push(im);
            }
            var count = keys.length;
            t3dStatus(count + ' block' + (count === 1 ? '' : 's') + ' placed - ' + (mode === 'place' ? 'click to place ' + TYPES[selected].name : 'click a block to remove it') + '. Drag to orbit, scroll to zoom.');
        }
        var saveTimer = null;
        function scheduleSave() {
            if (saveTimer) clearTimeout(saveTimer);
            saveTimer = setTimeout(function () {
                var store = t3dLoadStore();
                store.world = blocks; store.savedAt = new Date().toISOString();
                t3dSaveStore(store);
            }, 600);
        }
        // starter cottage so the first view is not empty
        function seedWorld() {
            var w = {};
            for (var x = -3; x <= 1; x++) for (var z = -2; z <= 2; z++) w[x + ',0,' + z] = 4;
            for (var y = 0; y < 3; y++) {
                for (var x2 = 4; x2 <= 8; x2++) for (var z2 = -2; z2 <= 2; z2++) {
                    if (y < 2 && (x2 === 4 || x2 === 8 || z2 === -2 || z2 === 2)) w[x2 + ',' + y + ',' + z2] = (y === 0 ? 2 : 3);
                    if (y === 2) w[x2 + ',' + y + ',' + z2] = 3;
                }
            }
            delete w['4,0,0']; delete w['4,1,0']; // doorway
            for (var g = -8; g <= -5; g++) w[g + ',0,' + (g % 2 ? 1 : -1)] = 0;
            return w;
        }
        var store0 = t3dLoadStore();
        blocks = (store0.world && typeof store0.world === 'object') ? store0.world : seedWorld();
        var selected = 0, mode = 'place';
        function paintHotbar() {
            for (var i = 0; i < TYPES.length; i++) {
                var b = document.getElementById('t3dHot-' + i);
                if (b) b.style.outline = i === selected ? '3px solid #1a73e8' : '1px solid #999';
            }
            var pm = document.getElementById('t3dModePlace'), rm = document.getElementById('t3dModeRemove');
            if (pm) pm.className = 'w3-button ' + (mode === 'place' ? 'w3-blue' : 'w3-white w3-border');
            if (rm) rm.className = 'w3-button ' + (mode === 'remove' ? 'w3-blue' : 'w3-white w3-border');
        }
        for (var hb = 0; hb < TYPES.length; hb++) {
            (function (i) {
                var b = document.getElementById('t3dHot-' + i);
                if (b) {
                    b.style.background = '#' + TYPES[i].color.toString(16).padStart(6, '0');
                    b.title = TYPES[i].name;
                    b.addEventListener('click', function () { selected = i; mode = 'place'; paintHotbar(); rebuild(); });
                }
            })(hb);
        }
        var pmBtn = document.getElementById('t3dModePlace'), rmBtn = document.getElementById('t3dModeRemove');
        if (pmBtn) pmBtn.addEventListener('click', function () { mode = 'place'; paintHotbar(); rebuild(); });
        if (rmBtn) rmBtn.addEventListener('click', function () { mode = 'remove'; paintHotbar(); rebuild(); });
        var dnBtn = document.getElementById('t3dDayNight');
        if (dnBtn) dnBtn.addEventListener('click', function () { day = !day; applyDayNight(); });
        var exBtn = document.getElementById('t3dExport');
        if (exBtn) exBtn.addEventListener('click', function () {
            var blob = new Blob([JSON.stringify({ world: blocks, exportedAt: new Date().toISOString() }, null, 1)], { type: 'application/json' });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = T3D_SLUG + '-world.json';
            document.body.appendChild(a); a.click(); a.remove();
        });
        var clrBtn = document.getElementById('t3dClear');

        });
        var ray = new THREE.Raycaster();
        shell.onClick = function (e) {
            ray.setFromCamera(shell.ndc(e), shell.camera);
            var targets = [ground];
            for (var i = 0; i < meshes.length; i++) if (meshes[i]) targets.push(meshes[i]);
            var hits = ray.intersectObjects(targets, false);
            if (!hits.length) return;
            var hit = hits[0];
            if (mode === 'remove') {
                if (hit.object === ground) return;
                var key = hit.object.userData.keys[hit.instanceId];
                delete blocks[key];
                rebuild(); scheduleSave();
                return;
            }
            // place adjacent to the face that was hit
            var p = hit.point.clone().add(hit.face.normal.clone().multiplyScalar(0.5));
            var x = Math.floor(p.x), y = Math.floor(p.y), z = Math.floor(p.z);

            }

            if (Object.keys(blocks).length >= 20000) { t3dStatus('Block cap reached (20,000) - remove some blocks or clear the world.'); return; }
            blocks[key2] = selected;
            rebuild(); scheduleSave();
        };
        applyDayNight();
        paintHotbar();
        rebuild();
        t3dInfo('<h3>Voxel World Builder</h3><p>A finite ' + N + 'x' + N + ' block sandbox with a height cap of ' + MAXY + '. Pick a block from the hotbar, click the ground or a block face to place, switch to Remove to take blocks away. The world autosaves to this browser\'s local storage and Export downloads it as a JSON file.</p><p class="t3d-note">Saves live only in this browser - clearing site data clears the world, so Export anything you want to keep.</p>');
        return function animate() { /* static world; camera damping runs in the shell */ };
    }

            for (i = 0; i <= 128; i++) {

                pts.push(or * Math.cos(th), 0, or * Math.sin(th));
            }
        } else if (typeId === 'suborbital') {
            for (i = 0; i <= 96; i++) {
                t = i / 96;
                th = t * Math.PI * 0.95;
                r = R + (R * 1.6) * Math.sin(th);
                pts.push(r * Math.cos(th), 0, r * Math.sin(th));
            }
        } else if (typeId === 'escape') {
            for (i = 0; i <= 100; i++) {
                t = i / 100;
                r = R + t * 38;
                bend = 0.3 * (1 - t) * (1 - t);
                pts.push(r - bend * R, 0, bend * R * 2.2);
            }
        } else {
            for (i = 0; i <= 100; i++) {
                t = i / 100;
                r = R + t * 42;
                bend = 0.12 * (1 - t);
                pts.push(r - bend * R * 0.4, 0, bend * R * 3.5);
            }
        }
        return pts;
    }

    function t3dBinaryStarSystem(shell) {
        var THREE = shell.THREE;
        var g = new THREE.Group();
        shell.scene.add(g);
        var state = { key: 'sirius', t: 0, playing: true, speed: 1 };
        var bary = new THREE.Mesh(
            new THREE.SphereGeometry(0.45, 12, 12),
            new THREE.MeshBasicMaterial({ color: 0xfff066 })
        );
        g.add(bary);
        var starA = new THREE.Mesh(
            new THREE.SphereGeometry(1.8, 24, 24),
            new THREE.MeshBasicMaterial({ color: 0xddeeff })
        );
        var starB = new THREE.Mesh(
            new THREE.SphereGeometry(1.1, 20, 20),
            new THREE.MeshBasicMaterial({ color: 0xffe8b0 })
        );
        g.add(starA); g.add(starB);
        var orbitLine = null;
        var clickTargets = [];

        function baryFrac(mA, mB) {
            return mB / (mA + mB);
        }
        function buildOrbit(p) {
            if (orbitLine) { g.remove(orbitLine); orbitLine.geometry.dispose(); orbitLine.material.dispose(); }
            var N = shell.low ? 96 : 180;
            var pts = [];
            var a = 12;
            var e = p.ecc;
            var b = a * Math.sqrt(1 - e * e);
            for (var i = 0; i <= N; i++) {
                var th = (i / N) * Math.PI * 2;
                pts.push(new THREE.Vector3(a * Math.cos(th) - a * e, 0, b * Math.sin(th)));
            }
            orbitLine = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: 0x99ccff, transparent: true, opacity: 0.95 })
            );
            g.add(orbitLine);
        }
        function place(p, phase) {
            var a = 12;
            var e = p.ecc;
            var b = a * Math.sqrt(1 - e * e);
            var th = phase;
            var x = a * Math.cos(th) - a * e;
            var z = b * Math.sin(th);
            var fB = baryFrac(p.massA, p.massB);
            var fA = 1 - fB;
            // Relative vector A->B along the radius from bary approach; place opposite sides of barycenter.
            starA.position.set(-x * fB, 0, -z * fB);
            starB.position.set(x * fA, 0, z * fA);
            var rA = 0.7 + 0.55 * Math.pow(p.massA / 2.1, 0.55);
            var rB = 0.45 + 0.4 * Math.pow(p.massB / 1.1, 0.55);
            if (state.key === 'sirius') { rA = 1.9; rB = 0.85; starA.material.color.setHex(0xcce0ff); starB.material.color.setHex(0xfff4cc); }
            else { rA = 1.55; rB = 1.25; starA.material.color.setHex(0xfff0a8); starB.material.color.setHex(0xffc080); }
            starA.scale.setScalar(rA);
            starB.scale.setScalar(rB);
        }
        function factsHtml() {
            var p = T3D_BINARY_PRESETS[state.key];
            var fB = baryFrac(p.massA, p.massB);
            var rows = '<table class="w3-table-all w3-small"><tbody>'
                + '<tr><td>System</td><td>' + p.label + '</td></tr>'
                + '<tr><td>Orbital period</td><td>' + p.periodYr + ' years</td></tr>'
                + '<tr><td>Mass A</td><td>' + p.massA + ' Msun</td></tr>'
                + '<tr><td>Mass B</td><td>' + p.massB + ' Msun</td></tr>'
                + '<tr><td>Barycenter share (B)</td><td>' + (fB * 100).toFixed(1) + '% of A-B separation from A</td></tr>'
                + '<tr><td>Eccentricity</td><td>' + p.ecc + '</td></tr>';
            if (p.periAu != null) {
                rows += '<tr><td>Periastron / apastron</td><td>' + p.periAu + ' AU / ' + p.apoAu + ' AU</td></tr>';
            }
            rows += '</tbody></table>';
            return '<h3>' + p.label + '</h3>'
                + '<p>' + p.aNote + '. ' + p.sepNote + '.</p>'
                + rows
                + '<p class="t3d-note">Both stars orbit the shared barycenter (yellow). Heavier star sits closer to the barycenter - that is the mass-ratio offset. On-screen sizes and separations are compressed for readability; the period, masses, and eccentricity in the table are real published figures. Educational visualization - not an n-body gravity simulation. Source: ' + p.source + '.</p>';
        }
        function applyPreset(key) {
            state.key = key;
            buildOrbit(T3D_BINARY_PRESETS[key]);
            place(T3D_BINARY_PRESETS[key], state.t);
            t3dInfo(factsHtml());
            t3dStatus(T3D_BINARY_PRESETS[key].label + ' - drag to orbit; Play pauses/resumes the period.');
            clickTargets = [
                { mesh: starA, html: function () { return factsHtml(); } },
                { mesh: starB, html: function () { return factsHtml(); } },
                { mesh: bary, html: function () {
                    var p = T3D_BINARY_PRESETS[state.key];
                    var fB = baryFrac(p.massA, p.massB);
                    return '<h3>Barycenter</h3><p>The shared center of mass. With M_A=' + p.massA + ' Msun and M_B=' + p.massB + ' Msun, star B contributes '
                        + (fB * 100).toFixed(1) + '% of the A-B separation measured from A - so the heavier primary sits closer to this point.</p>';
                } }
            ];
        }
        applyPreset('sirius');

        var btnS = document.getElementById('t3dBinaryBtn-sirius');
        var btnA = document.getElementById('t3dBinaryBtn-alphacen');
        var btnP = document.getElementById('t3dBinaryPlayBtn');
        if (btnS) btnS.addEventListener('click', function () { applyPreset('sirius'); });
        if (btnA) btnA.addEventListener('click', function () { applyPreset('alphacen'); });
        if (btnP) btnP.addEventListener('click', function () {
            state.playing = !state.playing;
            btnP.textContent = state.playing ? 'Pause orbit' : 'Play orbit';
        });

        shell.onClick = function (hits) {
            if (!hits || !hits.length) return;
            for (var i = 0; i < clickTargets.length; i++) {
                if (hits[0].object === clickTargets[i].mesh || hits[0].object.parent === clickTargets[i].mesh) {
                    t3dInfo(clickTargets[i].html());
                    return;
                }
            }
        };

        return function animate(dt) {
            if (state.playing) {
                var p = T3D_BINARY_PRESETS[state.key];
                // One full period ~28s at 1x so the orbit is readable.
                state.t += (dt / 1000) * state.speed * (Math.PI * 2) / 28;
                place(p, state.t);
            }
            shell.applyCamera();
        };
    }

    function t3dHohmannEccentricity(p) {
        return (p.sceneR2 - p.sceneR1) / (p.sceneR2 + p.sceneR1);
    }
    function t3dHohmannTransfer(shell) {

        scene.add(new THREE.Points(sgeo, new THREE.PointsMaterial({ color: 0xcfd8dc, size: 0.45, sizeAttenuation: false })));

        scene.add(bodyMesh);

        var innerRing, outerRing, transferLine, craft, depMarker, arrMarker;
        var state = { key: 'leogeo', phase: 'onInner', t: 0, angleInner: 0, angleOuter: Math.PI };

        function updateFacts() { t3dInfo(factsHtml()); }

        function factsHtml() {
            var p = T3D_HOHMANN_PRESETS[state.key];
            var rows = '<tr><td>Inner orbit r1</td><td>' + p.r1Label + '</td></tr>' +
                '<tr><td>Outer orbit r2</td><td>' + p.r2Label + '</td></tr>' +

                rows += '<tr><td>Departure burn (teal marker)</td><td>' + p.dv1 + '</td></tr>' +
                    '<tr><td>Arrival burn (orange marker)</td><td>' + p.dv2 + '</td></tr>';

        }

        function build() {
            var p = T3D_HOHMANN_PRESETS[state.key];
            bodyMesh.material.color.setHex(p.bodyColor);
            if (innerRing) { scene.remove(innerRing); innerRing.geometry.dispose(); innerRing.material.dispose(); }
            if (outerRing) { scene.remove(outerRing); outerRing.geometry.dispose(); outerRing.material.dispose(); }
            if (transferLine) { scene.remove(transferLine); transferLine.geometry.dispose(); transferLine.material.dispose(); }

            innerRing.rotation.x = Math.PI / 2;

            outerRing.rotation.x = Math.PI / 2;
            scene.add(outerRing);
            var a = (p.sceneR1 + p.sceneR2) / 2, e = t3dHohmannEccentricity(p);
            var pts = [];
            for (var i = 0; i <= 96; i++) {
                var E = (i / 96) * Math.PI; // only the half-ellipse actually flown
                pts.push(a * (Math.cos(E) - e), 0, a * Math.sqrt(1 - e * e) * Math.sin(E));

                depMarker = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 8), new THREE.MeshBasicMaterial({ color: 0x26a69a }));
                scene.add(depMarker);
                arrMarker = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 8), new THREE.MeshBasicMaterial({ color: 0xffa726 }));
                scene.add(arrMarker);
                craft = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.4, 8), new THREE.MeshLambertMaterial({ color: 0xffffff }));
                scene.add(craft);
            }
            depMarker.position.set(p.sceneR1, 0, 0);
            arrMarker.position.set(-p.sceneR2, 0, 0);
            craft.position.set(p.sceneR1, 0, 0);
            state.phase = 'onInner'; state.t = 0; state.angleInner = 0; state.angleOuter = Math.PI;
            var pb = document.getElementById('t3dHohmannPlayBtn');
            if (pb) pb.textContent = 'Play transfer';
            updateFacts();
            t3dStatus('Drag to orbit, scroll or pinch to zoom. Press Play transfer to fire both burns, or click a marker for its facts.');
        }

        ['leogeo', 'earthmars'].forEach(function (key) {
            var btn = document.getElementById('t3dHohmannBtn-' + key);
            if (btn) btn.addEventListener('click', function () { state.key = key; build(); });
        });
        var playBtn = document.getElementById('t3dHohmannPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            if (state.phase === 'onOuter') { build(); return; }
            if (state.phase === 'onInner') {
                state.phase = 'transferring'; state.t = 0;
                craft.position.set(T3D_HOHMANN_PRESETS[state.key].sceneR1, 0, 0);
                playBtn.textContent = 'Transferring...';
            }
        });

        var ray = new THREE.Raycaster();
        shell.onClick = function (e) {
            ray.setFromCamera(shell.ndc(e), shell.camera);
            var hits = ray.intersectObjects([depMarker, arrMarker].filter(Boolean), false);
            if (!hits.length) return;
            var p = T3D_HOHMANN_PRESETS[state.key];
            if (hits[0].object === depMarker) {
                t3dInfo('<h3>Departure burn</h3><p>Fired at the inner orbit (r1 = ' + p.r1Label + ') to raise the far side of the orbit out to r2, entering the transfer ellipse.</p><table class="w3-table w3-bordered"><tr><td>Delta-v</td><td>' + (p.dv1 || p.dvTotal) + '</td></tr></table>');
            } else {
                t3dInfo('<h3>Arrival burn</h3><p>Fired at the outer orbit (r2 = ' + p.r2Label + ') to circularize the transfer ellipse into the outer circular orbit.</p><table class="w3-table w3-bordered"><tr><td>Delta-v</td><td>' + (p.dv2 || p.dvTotal) + '</td></tr></table>');
            }
        };

        build();
        return function animate(dt) {
            var p = T3D_HOHMANN_PRESETS[state.key];
            var a = (p.sceneR1 + p.sceneR2) / 2, e = t3dHohmannEccentricity(p);
            craft.rotation.y += dt * 0.002;
            if (state.phase === 'transferring') {
                state.t += dt / 3200; // about 3.2s on-screen for the whole half-ellipse
                var E = Math.min(state.t, 1) * Math.PI;
                craft.position.set(a * (Math.cos(E) - e), 0, a * Math.sqrt(1 - e * e) * Math.sin(E));
                if (state.t >= 1) {
                    state.phase = 'onOuter';
                    state.angleOuter = Math.PI;

                }
            } else if (state.phase === 'onInner') {
                state.angleInner += dt * 0.00035;
                craft.position.set(p.sceneR1 * Math.cos(state.angleInner), 0, p.sceneR1 * Math.sin(state.angleInner));
            } else if (state.phase === 'onOuter') {
                state.angleOuter += dt * 0.00018;
                craft.position.set(p.sceneR2 * Math.cos(state.angleOuter), 0, p.sceneR2 * Math.sin(state.angleOuter));
            }
