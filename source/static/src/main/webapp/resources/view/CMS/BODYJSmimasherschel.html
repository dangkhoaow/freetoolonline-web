    // ---- bootstrap ------------------------------------------------------------

    // ================= MARS TERRAIN (real MOLA elevation) ====================
    // Real Mars global elevation data (NASA MGS MOLA DEM mosaic, 463 m/px,
    // public domain via USGS Astrogeology PDS) is served from the ftol-vm-assets
    // CDN under the CLAUDE.md large-asset + license gate - NOT committed to this
    // repo. First paint is a plain procedural sphere (G16 render-only pass); the
    // real heightmap fetches + IndexedDB-caches afterward and enhances it in
    // place. Relief is exaggerated for teaching visibility - real Martian relief
    // is under 1% of the planet's radius and would look almost perfectly smooth
    // at true scale, and the info panel discloses this every time.
    var T3D_MARS_CDN = 'https://dangkhoaow.github.io/ftol-vm-assets/space-3d';
    var T3D_MARS_DB = 'ftol-space3d-assets';

    function t3dMarsIdbOpen() {
        return new Promise(function (resolve, reject) {
            var req = indexedDB.open(T3D_MARS_DB, 1);
            req.onupgradeneeded = function () {
                if (!req.result.objectStoreNames.contains('assets')) {
                    req.result.createObjectStore('assets', { keyPath: 'key' });
                }
            };
            req.onsuccess = function () { resolve(req.result); };
            req.onerror = function () { reject(req.error || new Error('IndexedDB open failed')); };
        });
    }
    function t3dMarsIdbGet(key) {
        return t3dMarsIdbOpen().then(function (db) {
            return new Promise(function (resolve) {
                var tx = db.transaction('assets', 'readonly');
                var rq = tx.objectStore('assets').get(key);
                rq.onsuccess = function () { resolve(rq.result ? rq.result.blob : null); };
                rq.onerror = function () { resolve(null); };
            });
        }).catch(function () { return null; });
    }
    function t3dMarsIdbPut(key, blob) {
        return t3dMarsIdbOpen().then(function (db) {
            return new Promise(function (resolve) {
                var tx = db.transaction('assets', 'readwrite');
                tx.objectStore('assets').put({ key: key, blob: blob });
                tx.oncomplete = function () { resolve(true); };
                tx.onerror = function () { resolve(false); };
            });
        }).catch(function () { return false; });
    }
    function t3dMarsSha256Hex(buf) {
        return crypto.subtle.digest('SHA-256', buf).then(function (hash) {
            var b = new Uint8Array(hash), hex = '';
            for (var i = 0; i < b.length; i++) hex += b[i].toString(16).padStart(2, '0');
            return hex;
        });
    }

    function t3dMarsTerrain(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x05030a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.35));
        var sun = new THREE.DirectionalLight(0xfff1de, 1.0);
        sun.position.set(6, 3, 4);
        scene.add(sun);

        var R = 22; // scene units for the Mars sphere (compressed display scale)
        var MEAN_RADIUS_KM = 3389.5; // NASA planetary fact sheet, Mars mean (volumetric) radius
        var ELEV_MIN_M = -8201, ELEV_MAX_M = 21241; // NASA MGS MOLA global DEM, relative to the areoid
        var segs = shell.low ? { w: 72, h: 36 } : { w: 128, h: 64 };

        var geo = new THREE.SphereGeometry(R, segs.w, segs.h);
        var mat = new THREE.MeshStandardMaterial({ color: 0xb1531f, roughness: 0.95, metalness: 0.0 });
        var mesh = new THREE.Mesh(geo, mat);
        scene.add(mesh);

        var exaggeration = 16; // teaching default
        var heightCanvas = null; // filled once the real heightmap decodes
        var dataReady = false;

        function hypsoColor(lum) {
            // Schematic elevation ramp (NOT true-colour Mars imagery): dark
            // rust lowlands -> ochre midlands -> pale highlands.
            var stops = [
                [0.00, 0x5a2410], [0.35, 0x8a3f18], [0.60, 0xb9722c],
                [0.80, 0xd9a45c], [1.00, 0xefe0c0]
            ];
            for (var i = 1; i < stops.length; i++) {
                if (lum <= stops[i][0] || i === stops.length - 1) {
                    var a = stops[i - 1], b = stops[i];
                    var t = (lum - a[0]) / Math.max(0.0001, b[0] - a[0]);
                    var ca = new THREE.Color(a[1]), cb = new THREE.Color(b[1]);
                    return ca.lerp(cb, Math.min(1, Math.max(0, t)));
                }
            }
            return new THREE.Color(0xb1531f);
        }
        function buildHypsoLut() {
            var lut = new Uint8Array(256 * 3);
            for (var i = 0; i < 256; i++) {
                var col = hypsoColor(i / 255);
                lut[i * 3] = Math.round(col.r * 255);
                lut[i * 3 + 1] = Math.round(col.g * 255);
                lut[i * 3 + 2] = Math.round(col.b * 255);
            }
            return lut;
        }

        function applyExaggeration() {
            if (!dataReady) return;
            var pos = geo.attributes.position;
            var base = geo.userData.basePos;
            var lum = geo.userData.lum;
            var maxDisp = (ELEV_MAX_M - ELEV_MIN_M) / (MEAN_RADIUS_KM * 1000) * R;
            for (var i = 0; i < pos.count; i++) {
                var d = 1 + (lum[i] * maxDisp * exaggeration) / R;
                pos.setXYZ(i, base[i * 3] * d, base[i * 3 + 1] * d, base[i * 3 + 2] * d);
            }
            pos.needsUpdate = true;
            geo.computeVertexNormals();
        }

        function decodeHeightmap(img) {
            var c = document.createElement('canvas');
            c.width = img.width; c.height = img.height;
            var ctx = c.getContext('2d');
            ctx.drawImage(img, 0, 0);
            heightCanvas = c;
            var iw = c.width, ih = c.height;
            var idata = ctx.getImageData(0, 0, iw, ih).data;
            var lut = buildHypsoLut();
            var colorCanvas = document.createElement('canvas');
            colorCanvas.width = iw; colorCanvas.height = ih;
            var cctx = colorCanvas.getContext('2d');
            var out = cctx.createImageData(iw, ih);
            for (var p = 0; p < iw * ih; p++) {
                var v = idata[p * 4];
                out.data[p * 4] = lut[v * 3];
                out.data[p * 4 + 1] = lut[v * 3 + 1];
                out.data[p * 4 + 2] = lut[v * 3 + 2];
                out.data[p * 4 + 3] = 255;
            }
            cctx.putImageData(out, 0, 0);
            var tex = new THREE.CanvasTexture(colorCanvas);
            tex.flipY = false; // keep colour + displacement sampling on the same (u,v) convention below
            tex.colorSpace = THREE.SRGBColorSpace;
            mat.map = tex;
            mat.color.set(0xffffff);
            mat.needsUpdate = true;

            // per-vertex sample for displacement, using the SAME (u,v)->pixel
            // convention as the flipY=false texture above (internal consistency
            // between colour and bump matters more here than absolute lon/lat -
            // the page never claims an exact clicked coordinate, only elevation).
            var uv = geo.attributes.uv;
            var pos = geo.attributes.position;
            var basePos = new Float32Array(pos.count * 3);
            var lumArr = new Float32Array(pos.count);
            for (var i = 0; i < pos.count; i++) {
                basePos[i * 3] = pos.getX(i);
                basePos[i * 3 + 1] = pos.getY(i);
                basePos[i * 3 + 2] = pos.getZ(i);
                var u = uv.getX(i), v = uv.getY(i);
                var x = Math.min(iw - 1, Math.max(0, Math.round(u * iw)));
                var y = Math.min(ih - 1, Math.max(0, Math.round(v * ih)));
                lumArr[i] = idata[(y * iw + x) * 4] / 255;
            }
            geo.userData.basePos = basePos;
            geo.userData.lum = lumArr;
            dataReady = true;
            applyExaggeration();
        }

        function realElevationAt(u, v) {
            if (!heightCanvas) return null;
            var ctx = heightCanvas.getContext('2d');
            var x = Math.min(heightCanvas.width - 1, Math.max(0, Math.round(u * heightCanvas.width)));
            var y = Math.min(heightCanvas.height - 1, Math.max(0, Math.round(v * heightCanvas.height)));
            var px = ctx.getImageData(x, y, 1, 1).data;
            var lum = px[0] / 255; // canvas quantizes to 8-bit even though the source PNG is 16-bit
            return ELEV_MIN_M + lum * (ELEV_MAX_M - ELEV_MIN_M);
        }

        function loadRealData() {
            t3dStatus('Fetching real Mars elevation data (NASA MOLA, one time, then cached)...');
            fetch(T3D_MARS_CDN + '/manifest.json').then(function (r) { return r.json(); })
                .then(function (manifest) {
                    var asset = manifest && manifest.assets && manifest.assets['mars-terrain'];
                    var file = asset && asset.files && asset.files[0];
                    if (!file) throw new Error('manifest missing the mars-terrain asset');
                    var idbKey = 'mars-terrain@' + manifest.version;
                    return t3dMarsIdbGet(idbKey).then(function (cached) {
                        if (cached) return cached;
                        return fetch(T3D_MARS_CDN + '/' + file.file).then(function (r) {
                            if (!r.ok) throw new Error('HTTP ' + r.status);
                            return r.arrayBuffer();
                        }).then(function (buf) {
                            return t3dMarsSha256Hex(buf).then(function (hex) {
                                if (file.sha256 && hex !== file.sha256) { throw new Error('sha256 mismatch on downloaded elevation data'); }
                                var blob = new Blob([buf], { type: 'image/png' });
                                t3dMarsIdbPut(idbKey, blob);
                                return blob;
                            });
                        });
                    });
                })
                .then(function (blob) {
                    var url = URL.createObjectURL(blob);
                    var img = new Image();
                    img.onload = function () { decodeHeightmap(img); URL.revokeObjectURL(url); apply(); };
                    img.onerror = function () { t3dStatus('Could not decode the Mars elevation image - showing the procedural placeholder.'); };
                    img.src = url;
                })
                .catch(function (err) {
                    t3dStatus('Could not load real Mars elevation data (' + (err && err.message ? err.message : err) + ') - showing the procedural placeholder.');
                });
        }

        function panelHtml() {
            var scaleNote = dataReady
                ? 'Real NASA MOLA elevation is loaded - both the colour ramp and the bulge trace the actual dataset.'
                : 'Loading real elevation data now - this placeholder is a plain procedural sphere.';
            return '<h3>Mars terrain (real elevation)</h3>' +
                '<p>' + scaleNote + ' Relief is stretched ' + exaggeration + 'x here for visibility - real Martian relief is under 1% of the planet\'s radius and would look almost perfectly smooth at true scale.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Elevation range (areoid datum)</td><td>-8,201 m to +21,241 m</td></tr>' +
                '<tr><td>Highest mapped region</td><td>~21.2 km (near Olympus Mons)</td></tr>' +
                '<tr><td>Lowest mapped region</td><td>~-8.2 km (near Hellas Planitia)</td></tr>' +
                '<tr><td>Mars mean radius</td><td>3,389.5 km</td></tr>' +
                '<tr><td>Source</td><td>NASA MGS MOLA global DEM, 463 m/px, public domain (USGS Astrogeology PDS)</td></tr>' +
                '</table>' +
                '<p class="t3d-note">Colours are a schematic elevation ramp, not true-colour Mars imagery. Educational approximation - not a live rover feed, not a geology simulator.</p>';
        }

        function apply() {
            t3dInfo(panelHtml());
            var lbl = document.getElementById('t3dMarsTerrainReliefLabel');
            if (lbl) lbl.textContent = 'Relief ' + exaggeration + 'x';
            t3dStatus(dataReady
                ? 'Real MOLA elevation loaded. Drag to orbit; click the globe for a real elevation reading.'
                : 'Drag to orbit while the real elevation data downloads...');
        }

        shell.onClick = function (e) {
            if (!dataReady) return;
            var ndc = shell.ndc(e);
            var ray = new THREE.Raycaster();
            ray.setFromCamera(ndc, shell.camera);
            var hit = ray.intersectObject(mesh)[0];
            if (!hit || !hit.uv) return;
            var elev = realElevationAt(hit.uv.x, hit.uv.y);
            if (elev === null) return;
            t3dInfo(panelHtml() + '<p><b>At the point you clicked: real elevation ~' + Math.round(elev) + ' m (MOLA areoid datum).</b></p>');
        };

        var reliefDown = document.getElementById('t3dMarsTerrainReliefDown');
        var reliefUp = document.getElementById('t3dMarsTerrainReliefUp');
        var realBtn = document.getElementById('t3dMarsTerrainRealBtn');
        var resetBtn = document.getElementById('t3dMarsTerrainResetBtn');
        if (reliefDown) reliefDown.addEventListener('click', function () { exaggeration = Math.max(1, exaggeration - 5); applyExaggeration(); apply(); });
        if (reliefUp) reliefUp.addEventListener('click', function () { exaggeration = Math.min(40, exaggeration + 5); applyExaggeration(); apply(); });
        if (realBtn) realBtn.addEventListener('click', function () { exaggeration = 1; applyExaggeration(); apply(); });
        if (resetBtn) resetBtn.addEventListener('click', function () { exaggeration = 16; applyExaggeration(); apply(); });

        apply();
        loadRealData();

        var spin = 0;
        return function animate(dt) {
            spin += dt * 0.00006;
            mesh.rotation.y = spin;
        };
    }



    // ================= TIDES: EARTH-MOON OCEAN BULGES =========================
    // Equilibrium-tide teaching model: two tidal bulges align with the Earth-Moon
    // axis (near-side: direct pull; far-side: inertia/differential gravity - NOAA
    // oceanservice.noaa.gov/education/tutorial_tides/tides03_gravity.html) while
    // Earth's solid body spins underneath. NOT a real hydrodynamic tide model -
    // no coastlines, resonance, or currents; a single idealized ocean shell.
    var T3D_TIDE_MODES = [
        { id: 'spring', label: 'Spring tide (Sun + Moon aligned)', amp: 1.5, sunAngleDeg: 0 },
        { id: 'normal', label: 'Normal tide (Moon only, for reference)', amp: 1.0, sunAngleDeg: 45 },
        { id: 'neap', label: 'Neap tide (Sun + Moon at right angles)', amp: 0.5, sunAngleDeg: 90 },
    ];

    // Heliosphere teaching scale: termination shock ~94 AU; heliopause ~121 AU (Voyager 1, 2012); wind ~400 km/s.
    var T3D_SW_SHOCK_AU = 94;
    var T3D_SW_HP_AU = 121;
    var T3D_SW_WIND_KMS = 400;
    var T3D_SW_AU_SCALE = 0.22;


    // Cosmic distance ladder teaching constants (km).
    var T3D_CDL_AU_KM = 1.496e8;
    var T3D_CDL_LY_KM = 9.461e12;
    var T3D_CDL_PC_KM = 3.086e13;
    var T3D_CDL_PC_LY = 3.26;
    var T3D_CDL_PARALLAX_PC = 1000;
    var T3D_CDL_MPC_KM = 3.086e19;
    var T3D_CDL_LOG_MIN = Math.log10(T3D_CDL_AU_KM);
    var T3D_CDL_LOG_MAX = Math.log10(T3D_CDL_MPC_KM);
    var T3D_CDL_R_MIN = 2.5;
    var T3D_CDL_R_MAX = 36;

    function t3dCdlLogToR(logKm) {
        var t = (logKm - T3D_CDL_LOG_MIN) / (T3D_CDL_LOG_MAX - T3D_CDL_LOG_MIN);
        if (t < 0) t = 0;
        if (t > 1) t = 1;
        return T3D_CDL_R_MIN + t * (T3D_CDL_R_MAX - T3D_CDL_R_MIN);
    }
    function t3dCdlKmToR(km) { return t3dCdlLogToR(Math.log10(km)); }
    function t3dCdlScrubToLog(scrub) {
        return T3D_CDL_LOG_MIN + (Number(scrub) / 1000) * (T3D_CDL_LOG_MAX - T3D_CDL_LOG_MIN);
    }
    function t3dCdlLogToScrub(logKm) {
        return Math.round(1000 * (logKm - T3D_CDL_LOG_MIN) / (T3D_CDL_LOG_MAX - T3D_CDL_LOG_MIN));
    }
    function t3dCdlFmtKm(km) {
        if (km >= 1e19) return (km / 1e19).toFixed(2) + 'e19 km';
        if (km >= 1e12) return km.toExponential(3) + ' km';
        return km.toExponential(3) + ' km';
    }


    // Axial precession teaching constants (IAU-style figures).
    var T3D_PREC_PERIOD_YR = 25772;
    var T3D_PREC_OBLIQ_DEG = 23.44;
    var T3D_PREC_OBLIQ = T3D_PREC_OBLIQ_DEG * Math.PI / 180;
    var T3D_PREC_RATE_YR_PER_DEG = 72;
    var T3D_PREC_YEAR_NOW = 2000;
    var T3D_PREC_YEAR_VEGA = 14000;
    var T3D_PREC_POLE_R = 8.5;

    function t3dPrecYearToPhase(year) {
        return ((year - T3D_PREC_YEAR_NOW) / T3D_PREC_PERIOD_YR) * Math.PI * 2;
    }
    function t3dPrecPoleDir(year) {
        var phi = t3dPrecYearToPhase(year);
        var s = Math.sin(T3D_PREC_OBLIQ), c = Math.cos(T3D_PREC_OBLIQ);
        return { x: s * Math.cos(phi), y: c, z: s * Math.sin(phi) };
    }
    function t3dPrecFmtYear(y) {
        var n = Math.round(Number(y));
        if (n >= 0) return String(n) + ' CE';
        return String(-n) + ' BCE';
    }


    // HR diagram teaching constants (schematic loci, not a catalog).
    var T3D_HR_SUN_TEFF = 5772;
    var T3D_HR_SUN_L = 1;
    var T3D_HR_T_MIN = 2800;
    var T3D_HR_T_MAX = 42000;
    var T3D_HR_LOG_L_MIN = -3.5;
    var T3D_HR_LOG_L_MAX = 5.5;
    var T3D_HR_SPEC_CLASSES = ['O', 'B', 'A', 'F', 'G', 'K', 'M'];
    var T3D_HR_SPEC_TEFF = [35000, 15000, 8500, 6500, 5772, 4500, 3200];

    function t3dHrTeffToX(teff) {
        var u = (Math.log10(teff) - Math.log10(T3D_HR_T_MIN)) / (Math.log10(T3D_HR_T_MAX) - Math.log10(T3D_HR_T_MIN));
        return 11 - u * 22;
    }
    function t3dHrLogLToY(logL) {
        return (logL - T3D_HR_LOG_L_MIN) / (T3D_HR_LOG_L_MAX - T3D_HR_LOG_L_MIN) * 13 - 6.5;
    }
    function t3dHrTempColor(teff) {
        if (teff >= 20000) return 0x90caf9;
        if (teff >= 10000) return 0xe3f2fd;
        if (teff >= 7500) return 0xfff9c4;
        if (teff >= 5500) return 0xffd54f;
        if (teff >= 4000) return 0xff9800;
        return 0xe64a19;
    }
    function t3dHrMsLogL(teff) {
        return Math.max(T3D_HR_LOG_L_MIN + 0.2, Math.min(T3D_HR_LOG_L_MAX - 0.5, 7.2 * Math.log10(teff / T3D_HR_SUN_TEFF)));
    }

    function t3dHrDiagram(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.55));

        var state = { highlight: 'all', specIdx: 4 };
        var groups = { ms: new THREE.Group(), giants: new THREE.Group(), wd: new THREE.Group(), sun: new THREE.Group() };
        scene.add(groups.ms, groups.giants, groups.wd, groups.sun);

        var y0 = t3dHrLogLToY(T3D_HR_LOG_L_MIN);
        var xHot = t3dHrTeffToX(T3D_HR_T_MAX);
        var xCool = t3dHrTeffToX(T3D_HR_T_MIN);
        var yTop = t3dHrLogLToY(T3D_HR_LOG_L_MAX);
        var axisMat = new THREE.LineBasicMaterial({ color: 0x607d8b, transparent: true, opacity: 0.85 });
        scene.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(xHot, y0, 0),
                new THREE.Vector3(xCool, y0, 0)
            ]),
            axisMat
        ));
        scene.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(xCool, y0, 0),
                new THREE.Vector3(xCool, yTop, 0)
            ]),
            axisMat
        ));

        function addCloud(group, count, gen) {

    // Wikipedia, as "all these characteristics" expected of "a continuous

    // observations of that same sky position within six weeks, and many
    // more since, the signal "has never recurred" (Wikipedia, verbatim),
    // and "no explanation, terrestrial or otherwise, has been confirmed."
    // Recent research (2025 papers) increasingly favors a rare, natural

    // artificial signal - genuinely still unresolved, not a "confirmed

        t3dStatus('Watch the real recorded intensity rise and fall as the source drifts through the beam. Drag to orbit.');

        shell.renderer.setClearColor(0x030307, 1);

        var state = { t: 0, playing: true, speed: 1, showPhoto: false };

        var bgGeo = new THREE.BufferGeometry(), bn = 420, bp = new Float32Array(bn * 3);
        for (var i = 0; i < bn; i++) { bp[i * 3] = (Math.random() - 0.5) * 140; bp[i * 3 + 1] = (Math.random() - 0.5) * 90; bp[i * 3 + 2] = (Math.random() - 0.5) * 140; }

        var pathPts = [];

        function factsHtml() {
            return '<h3>The photo taken from the edge of leaving</h3>'
                + '<p>On 14 February 1990, the Voyager 1 spacecraft - already well past Neptune and speeding away from the Sun forever - was commanded to turn its cameras back toward home one last time. From about 40.5 AU away, Earth showed up as less than a single pixel: a barely visible speck caught inside a scattered ray of sunlight, an accident of the camera pointing so close to the Sun\'s glare. Voyager imaging scientist Carl Sagan later wrote of the image: "Look again at that dot. That\'s here. That\'s home. That\'s us." Just 34 minutes after taking it, Voyager 1 switched its cameras off forever to save power for the long journey still ahead.</p>'

                + '<tr><td>Earth\'s size in the photo</td><td>about 0.12 of a pixel</td></tr>'

        }
        function wire() {
            var pBtn = document.getElementById('t3dPbdPlayBtn');

        return function animate(dt) {

    // Pillars of Creation, Eagle Nebula / M16 (ALL figures real, cited): a
    // small, active star-forming region 6,500-7,000 light-years away
    // (sources vary; both cited) in the constellation Serpens, made famous
    // by Hubble's iconic 1 April 1995 image (Jeff Hester and Paul Scowen,
    // Arizona State University) - "arguably...the single most important
    // image taken with the Hubble Space Telescope during [its] first
    // decade" (Big Think). Hubble revisited with a sharper, wider view in
    // 2014; the James Webb Space Telescope (JWST) captured a near-infrared
    // NIRCam view, unveiled 19 October 2022. The pillars stretch "roughly
    // 4 to 5 light-years" (NASA, verbatim; the leftmost pillar specifically
    // "about four light-years," Wikipedia) - a small feature within the
    // much larger Eagle Nebula, which itself spans "70 by 55 light-years."
    // They are cool molecular hydrogen and dust, continuously eroded by
    // photoevaporation from the ultraviolet light of nearby hot young
    // stars just outside the frame - and are expected to fully dissipate
    // in "roughly 100,000 years" (Wikipedia/Big Think). The KEY real,
    // citable contrast driving this scene: Hubble's VISIBLE-light images
    // show the pillars as dense, opaque, dark silhouettes, hiding the
    // stars behind and forming within them - while JWST's INFRARED view
    // "helps us peer through more of the dust," making the pillars "no
    // longer as opaque" and revealing "many more red stars that are still
    // forming" that Hubble could not show (NASA, verbatim, "Hubble and
    // Webb Images Side by Side"). Finger-like protrusions at the pillar
    // tips are Evaporating Gaseous Globules (EGGs) - themselves stellar
    // incubators, "larger than the Solar System" (Wikipedia).
    var T3D_POC_EGG_COUNT = 22; // illustrative embedded-star count, revealed progressively by the JWST toggle

    function t3dPillarsOfCreation(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x030308, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.35));
        var uvLight = new THREE.PointLight(0xbfe0ff, 1.3, 0, 0);
        uvLight.position.set(10, 8, -6);
        scene.add(uvLight);

        var state = { mode: 'hubble', playing: true, speed: 1, rot: 0 };

        var bgGeo = new THREE.BufferGeometry(), bn = 300, bp = new Float32Array(bn * 3);
        for (var i = 0; i < bn; i++) { bp[i * 3] = (Math.random() - 0.5) * 90; bp[i * 3 + 1] = (Math.random() - 0.5) * 60; bp[i * 3 + 2] = (Math.random() - 0.5) * 90; }
        bgGeo.setAttribute('position', new THREE.BufferAttribute(bp, 3));
        scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0x596488, size: 0.3, transparent: true, opacity: 0.5 })));

        var hotStars = new THREE.Group();
        [[9, 7, -5], [11, 5, -7], [8, 9, -4]].forEach(function (pos) {
            var s = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12, 8), new THREE.MeshBasicMaterial({ color: 0xdfeeff }));
            s.position.set(pos[0], pos[1], pos[2]);
            hotStars.add(s);
        });
        scene.add(hotStars);

        // three tapering pillar "cones" (the iconic composition), plus a
        // bright EGG tip on each
        var pillarGroup = new THREE.Group();
        var pillarMats = [];
        var pillarDefs = [
            { x: -3.0, h: 7.5, r: 1.5, tilt: 0.08 },
            { x: 0.2, h: 8.5, r: 1.7, tilt: -0.05 },
            { x: 3.4, h: 6.5, r: 1.3, tilt: 0.12 }
        ];
        pillarDefs.forEach(function (p) {
            var geo = new THREE.ConeGeometry(p.r, p.h, 10, 1, true);
            var mat = new THREE.MeshStandardMaterial({ color: 0x6b4a36, roughness: 0.95, transparent: true, opacity: 0.96, side: THREE.DoubleSide });
            var mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(p.x, p.h / 2 - 3.5, 0);
            mesh.rotation.z = p.tilt;
            pillarGroup.add(mesh);
            pillarMats.push(mat);
            // EGG tip sits at the cone's actual rotated apex (local +y/2 before rotation.z)
            var egg = new THREE.Mesh(new THREE.SphereGeometry(0.34, 12, 10), new THREE.MeshBasicMaterial({ color: 0xffcf9a }));
            egg.position.set(p.x - Math.sin(p.tilt) * (p.h / 2), (p.h / 2 - 3.5) + Math.cos(p.tilt) * (p.h / 2), 0);
            pillarGroup.add(egg);
        });
        scene.add(pillarGroup);

        // embedded forming stars: nearly invisible in Hubble (visible)
        // mode, revealed as glowing red points in JWST (infrared) mode
        var eggStars = [];
        for (var e = 0; e < T3D_POC_EGG_COUNT; e++) {
            var pd = pillarDefs[e % pillarDefs.length];
            var yFrac = 0.15 + Math.random() * 0.7;
            var x = pd.x + (Math.random() - 0.5) * pd.r * 1.4;
            var y = -3.5 + yFrac * pd.h;
            var z = (Math.random() - 0.5) * pd.r * 1.2;
            var mat = new THREE.MeshBasicMaterial({ color: 0xff5a3a, transparent: true, opacity: 0.05 });
            var star = new THREE.Mesh(new THREE.SphereGeometry(0.09 + Math.random() * 0.05, 8, 6), mat);
            star.position.set(x, y, z);
            scene.add(star);
            eggStars.push(mat);
        }

        function factsHtml() {
            var modeLabel = state.mode === 'hubble' ? 'Hubble (visible light, 1995/2014)' : 'James Webb (infrared, 2022)';
            return '<h3>The same pillars, 27 years and one wavelength apart</h3>'
                + '<p>In 1995, the Hubble Space Telescope took what became one of its most famous images ever: towering columns of gas and dust in the Eagle Nebula, quickly nicknamed the Pillars of Creation. In visible light, the pillars look dense and almost solid, hiding everything behind and inside them. In 2022, the James Webb Space Telescope photographed the same region in infrared light, which cuts through dust far more easily - suddenly the pillars looked less opaque, and many more young, still-forming stars that Hubble could never show became visible.</p>'
                + '<p><b>Current view: ' + modeLabel + '</b></p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>Distance</td><td>about 6,500-7,000 light-years</td></tr>'
                + '<tr><td>Pillar height</td><td>roughly 4-5 light-years</td></tr>'
                + '<tr><td>First iconic image</td><td>1 April 1995 (Hubble)</td></tr>'
                + '<tr><td>Infrared view</td><td>19 October 2022 (James Webb)</td></tr>'
                + '<tr><td>Cause of erosion</td><td>ultraviolet light from nearby hot stars</td></tr>'
                + '<tr><td>Expected to fully erode</td><td>in roughly 100,000 years</td></tr>'
                + '</table>'
                + '<p class="t3d-note">Pillar shapes, the embedded-star count, and the erosion glow are illustrative reconstructions, not a pixel-accurate reproduction of either telescope\'s image. The real difference between visible and infrared views is real and cited; the exact stars shown here are not.</p>';
        }
        function wire() {
            var pBtn = document.getElementById('t3dPocPlayBtn');
            var mBtn = document.getElementById('t3dPocModeBtn');
            var sl = document.getElementById('t3dPocSpeed');
            if (pBtn) pBtn.onclick = function () { state.playing = !state.playing; pBtn.textContent = state.playing ? 'Pause' : 'Play'; };
            if (mBtn) mBtn.onclick = function () {
                state.mode = state.mode === 'hubble' ? 'jwst' : 'hubble';
                mBtn.textContent = state.mode === 'jwst' ? 'View: James Webb (infrared)' : 'View: Hubble (visible)';
                t3dInfo(factsHtml());
            };
            if (sl) sl.oninput = function () { state.speed = parseFloat(sl.value); };
        }
        wire(); t3dInfo(factsHtml());
        t3dStatus('Toggle the telescope view to see how infrared light reveals hidden forming stars. Drag to orbit.');

        return function animate(dt) {
            dt = dt / 1000;
            if (state.playing) { state.rot += dt * 0.12 * state.speed; }
            pillarGroup.rotation.y = state.rot;
            hotStars.rotation.y = state.rot;

            var jwstT = state.mode === 'jwst' ? 1 : 0;
            pillarMats.forEach(function (m) {
                m.opacity = 0.96 - jwstT * 0.55;
                m.color.setRGB(0.42 - jwstT * 0.12, 0.29 - jwstT * 0.05, 0.21 + jwstT * 0.18);
            });
            eggStars.forEach(function (m, idx) {
                var target = jwstT * (0.65 + 0.35 * Math.sin(idx * 1.7));
                m.opacity += (target - m.opacity) * Math.min(1, dt * 4);
            });
            shell.applyCamera();
        };
    }

    // Betelgeuse's Great Dimming, 2019-2020 (ALL figures real, cited): the
    // red supergiant Betelgeuse (Alpha Orionis), about 725 light-years away
    // (NASA, verbatim) - so large that "if it replaced the Sun at the
    // center of our solar system, its outer surface would extend past the
    // orbit of Jupiter" (NASA, verbatim). Starting October 2019 it dimmed
    // dramatically, "eventually noticeable to even the naked eye"; "by
    // mid-February 2020, the monster star had lost more than two-thirds of
    // its brilliance" (NASA, verbatim) - the faintest it had been in nearly
    // two centuries of recorded observation (PPPL). By April 2020 it had
    // fully recovered. The real cause, established by Hubble-led research
    // (Dupree et al.): a giant convective cell triggered a Surface Mass
    // Ejection (SME) - a huge amount of hot, dense gas moving outward
    // through the star's extended atmosphere "at 200,000 miles per hour"
    // (CfA, verbatim, observed by Hubble Oct-Nov 2019) - which then cooled
    // (down to about 2400 K, per the 2022 ApJ paper) and condensed into a
    // dust cloud "more than a hundred million miles wide" (PPPL, verbatim)
    // that blocked light from about a quarter of the star's surface
    // (NASA), dimming the affected region to roughly one-tenth of its
    // normal brightness in that patch (Nature-published VLT imaging, via
    // DongA Science). Some astronomers considered the dimming a possible
    // pre-supernova sign - a real, legitimate hypothesis (Betelgeuse WILL
    // eventually go supernova) - but the star's return to normal
    // brightness by April 2020 favored the transient dust-cloud
    // explanation. Real lasting aftereffect: the SME left the photosphere
    // measurably cooler and disrupted the star's normally reliable ~400-day
    // pulsation cycle for more than two years afterward (2022 ApJ paper).
    var T3D_BD_LOW_FRAC = 0.30; // "lost more than two-thirds" -> under ~1/3 remains
    var T3D_BD_DAYS = 180; // scene timeline, Oct 2019 (day 0) to ~Apr 2020 (day 180)

    function t3dBetelgeuseBrightness(day) {
        if (day < 20) return 1 - (day / 20) * 0.05;
        if (day < 60) return 0.95 - ((day - 20) / 40) * 0.35;
        if (day < 135) return 0.60 - ((day - 60) / 75) * (0.60 - T3D_BD_LOW_FRAC);
        return T3D_BD_LOW_FRAC + ((day - 135) / (T3D_BD_DAYS - 135)) * (1 - T3D_BD_LOW_FRAC);
    }

    function t3dBetelgeuseDimming(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03040a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.25));

        var state = { day: 0, playing: true, speed: 1 };

        var bgGeo = new THREE.BufferGeometry(), bn = 240, bp = new Float32Array(bn * 3);
        for (var i = 0; i < bn; i++) { bp[i * 3] = (Math.random() - 0.5) * 110; bp[i * 3 + 1] = (Math.random() - 0.5) * 70; bp[i * 3 + 2] = (Math.random() - 0.5) * 110; }
        bgGeo.setAttribute('position', new THREE.BufferAttribute(bp, 3));
        scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0x596488, size: 0.32, transparent: true, opacity: 0.5 })));

        // fixed reference markers for the real "would extend past Jupiter"
        // size comparison: a tiny Sun-sized dot and Jupiter's real orbital
        // radius (scaled the same way) both sitting well INSIDE the giant
        // star's own rendered radius
        var STAR_R = 5.2;
        var sunRef = new THREE.Mesh(new THREE.SphereGeometry(0.09, 12, 8), new THREE.MeshBasicMaterial({ color: 0xffe08a }));
        sunRef.position.set(0, 0, 0);
        scene.add(sunRef);
        var jupiterRing = new THREE.Mesh(new THREE.RingGeometry(2.2, 2.26, 48), new THREE.MeshBasicMaterial({ color: 0xd8b98a, transparent: true, opacity: 0.55, side: THREE.DoubleSide }));
        jupiterRing.rotation.x = Math.PI / 2;
        scene.add(jupiterRing);

        var starMat = new THREE.MeshBasicMaterial({ color: 0xff6a3a });
        var star = new THREE.Mesh(new THREE.SphereGeometry(STAR_R, 32, 24), starMat);
        scene.add(star);

        // the dust cloud that forms over the southern hemisphere
        var cloudN = shell.low ? 260 : 520;
        var cloudGeo = new THREE.BufferGeometry();
        var cloudPos = new Float32Array(cloudN * 3), cloudDir = new Float32Array(cloudN * 3);
        for (var p = 0; p < cloudN; p++) {
            var theta = Math.random() * Math.PI * 2, phi = Math.PI * 0.55 + Math.random() * Math.PI * 0.4; // biased to the southern hemisphere
            var v = new THREE.Vector3(Math.sin(phi) * Math.cos(theta), Math.cos(phi), Math.sin(phi) * Math.sin(theta));
            cloudDir[p * 3] = v.x; cloudDir[p * 3 + 1] = v.y; cloudDir[p * 3 + 2] = v.z;
        }
        cloudGeo.setAttribute('position', new THREE.BufferAttribute(cloudPos, 3));
        var cloudMat = new THREE.PointsMaterial({ color: 0x8a7a68, size: 0.32, transparent: true, opacity: 0 });
        var cloud = new THREE.Points(cloudGeo, cloudMat);
        scene.add(cloud);

        function phaseLabel(day) {
            if (day < 20) return 'October 2019 - a convective upwelling begins';
            if (day < 60) return 'Nov-Dec 2019 - hot gas erupts outward (Surface Mass Ejection)';
            if (day < 135) return 'Jan-mid Feb 2020 - gas cools into a dust cloud, dimming the star';
            if (day < T3D_BD_DAYS) return 'Late Feb-Mar 2020 - dust disperses, brightness returning';
            return 'April 2020 - fully recovered';
        }
        function factsHtml(day, bright) {
            return '<h3>The star that briefly looked like it might explode</h3>'
                + '<p>Betelgeuse is a red supergiant so large that if it sat where the Sun does, its surface would reach past Jupiter\'s orbit - shown here by the small reference dot and ring. Starting in October 2019 it dimmed dramatically, losing more than two-thirds of its brightness by February 2020 - visible to the naked eye and the faintest recorded observation of the star in nearly two centuries. Because Betelgeuse will eventually end its life in a real supernova, some astronomers considered whether this might be the beginning of that explosion. Instead, Hubble observations traced the cause: a giant convective cell erupted hot gas outward at 200,000 miles per hour, which cooled into a dust cloud covering part of the star\'s surface. By April 2020, the dust had dispersed and Betelgeuse was back to normal.</p>'
                + '<p><b>' + phaseLabel(day) + '</b> - brightness about ' + Math.round(bright * 100) + '% of normal.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>Distance</td><td>about 725 light-years</td></tr>'
                + '<tr><td>Size comparison</td><td>surface would reach past Jupiter\'s orbit</td></tr>'
                + '<tr><td>Dimming began</td><td>October 2019</td></tr>'
                + '<tr><td>Faintest point</td><td>mid-February 2020, over two-thirds dimmer</td></tr>'
                + '<tr><td>Ejected-gas speed</td><td>about 200,000 mph (Hubble)</td></tr>'
                + '<tr><td>Recovered</td><td>April 2020</td></tr>'
                + '</table>'
                + '<p class="t3d-note">The star, the Sun-size reference dot, and Jupiter\'s orbit ring are all scaled for legibility, not to true relative distance. The dust cloud\'s shape and the timeline speed are illustrative and heavily compressed.</p>';
        }
        function wire() {
            var pBtn = document.getElementById('t3dBdPlayBtn');
            var sl = document.getElementById('t3dBdDay');
            if (sl) sl.oninput = function () { state.day = parseFloat(sl.value); state.playing = false; if (pBtn) pBtn.textContent = 'Play'; };
            if (pBtn) pBtn.onclick = function () { state.playing = !state.playing; pBtn.textContent = state.playing ? 'Pause' : 'Play'; };
            var slSpeed = document.getElementById('t3dBdSpeed');
            if (slSpeed) slSpeed.oninput = function () { state.speed = parseFloat(slSpeed.value); };
        }
        wire();
        var lastPanelUpdate = 0;
        var bright0 = t3dBetelgeuseBrightness(0);
        t3dInfo(factsHtml(0, bright0));
        t3dStatus(phaseLabel(0) + '. Drag to orbit.');

        return function animate(dt) {
            dt = dt / 1000;
            if (state.playing) {
                state.day += dt * state.speed * 9;
                if (state.day > T3D_BD_DAYS) state.day = 0;
                var sl2 = document.getElementById('t3dBdDay');
                if (sl2) sl2.value = state.day;
            }
            var bright = t3dBetelgeuseBrightness(state.day);
            starMat.color.setRGB(0.55 + 0.4 * bright, 0.18 + 0.22 * bright, 0.10 + 0.14 * bright);
            var cloudAmt = Math.max(0, Math.min(1, (0.95 - bright) / 0.65));
            cloudMat.opacity = cloudAmt * 0.85;
            var arr = cloudGeo.attributes.position.array;
            var cloudR = STAR_R * (1 + cloudAmt * 0.55);
            for (var q = 0; q < cloudN; q++) {
                arr[q * 3] = cloudDir[q * 3] * cloudR;
                arr[q * 3 + 1] = cloudDir[q * 3 + 1] * cloudR;
                arr[q * 3 + 2] = cloudDir[q * 3 + 2] * cloudR;
            }
            cloudGeo.attributes.position.needsUpdate = true;

            lastPanelUpdate += dt;
            if (lastPanelUpdate > 0.4) {
                lastPanelUpdate = 0;
                t3dStatus(phaseLabel(state.day) + ' - brightness about ' + Math.round(bright * 100) + '%. Drag to orbit.');
                t3dInfo(factsHtml(state.day, bright));
            }
            shell.applyCamera();
        };
    }

    // 'Oumuamua / 1I/2017 U1 (ALL figures real, cited): the first confirmed
    // interstellar object ever detected passing through the Solar System -
    // discovered 19 October 2017 by Robert Weryk using the Pan-STARRS
    // telescope, Haleakala Observatory, Hawaii (Wikipedia 1I/'Oumuamua,
    // verbatim), about 40 days after its closest approach to the Sun on
    // 9 September 2017 (perihelion q ~ 0.25 AU). It arrived on a hyperbolic,
    // UNBOUND trajectory (eccentricity ~1.2, ESO/Nature paper) - definitive
    // proof it came from outside the Solar System and will never return.
    // Closest-approach speed: "196,000 miles per hour (87.3 kilometers per

        scene.add(new THREE.AmbientLight(0xffffff, 0.55));
        var keyLight = new THREE.PointLight(0xffffff, 1.2, 0, 0);
        keyLight.position.set(10, 8, 10);
        scene.add(keyLight);

        var state = { mjup: 30, playing: true, realistic: false, dir: 1 };

        var bgGeo = new THREE.BufferGeometry(), bn = 220, bp = new Float32Array(bn * 3);
        for (var i = 0; i < bn; i++) { bp[i * 3] = (Math.random() - 0.5) * 90; bp[i * 3 + 1] = (Math.random() - 0.5) * 60; bp[i * 3 + 2] = (Math.random() - 0.5) * 90; }
        bgGeo.setAttribute('position', new THREE.BufferAttribute(bp, 3));
        scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0x596488, size: 0.3, transparent: true, opacity: 0.5 })));

        // the object under the mass slider
        var bodyGeo = new THREE.SphereGeometry(1, 40, 28);
        var bodyMat = new THREE.MeshStandardMaterial({ color: 0x9c8a6e, emissive: 0x000000, emissiveIntensity: 0, roughness: 0.75, metalness: 0.05 });
        var body = new THREE.Mesh(bodyGeo, bodyMat);
        scene.add(body);
        var glowMat = new THREE.MeshBasicMaterial({ color: 0xff3355, transparent: true, opacity: 0.18 });
        var glow = new THREE.Mesh(new THREE.SphereGeometry(1, 24, 18), glowMat);
        scene.add(glow);

        // a literal mass "ruler" - a line from 0 to 95 Mjup with ticks at the
        // two real category boundaries (13, 80) plus the real Teide 1 estimate
        var RULER_LEN = 16, RULER_MAX = 95;
        function ruX(mj) { return -RULER_LEN / 2 + (mj / RULER_MAX) * RULER_LEN; }

        // fixed Jupiter reference sphere (1 Mjup, ~1 Rjup) parked right over
        // its own 1-Mjup mark for constant-scale comparison
        var jupRef = new THREE.Mesh(new THREE.SphereGeometry(T3D_BD_JUP_R, 24, 16), new THREE.MeshStandardMaterial({ color: 0xd8b98a, roughness: 0.8 }));
        jupRef.position.set(ruX(1), -3.2, 0);
        scene.add(jupRef);
        var rulerPts = [new THREE.Vector3(ruX(0), -6, 0), new THREE.Vector3(ruX(RULER_MAX), -6, 0)];
        scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(rulerPts), new THREE.LineBasicMaterial({ color: 0x556, transparent: true, opacity: 0.6 })));
        [13, 80].forEach(function (mj) {
            var x = ruX(mj);
            var tickPts = [new THREE.Vector3(x, -6.6, 0), new THREE.Vector3(x, -5.4, 0)];
            scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(tickPts), new THREE.LineBasicMaterial({ color: 0xffcf6a })));
        });
        var teideX = ruX(55);
        var teideMarker = new THREE.Mesh(new THREE.SphereGeometry(0.28, 12, 10), new THREE.MeshBasicMaterial({ color: 0xff8855 }));
        teideMarker.position.set(teideX, -6, 0);
        scene.add(teideMarker);
        var sliderMarker = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 10), new THREE.MeshBasicMaterial({ color: 0xffffff }));
        scene.add(sliderMarker);

        function facts() {
            var html = '<h3>The gap between a planet and a star</h3>'
                + '<p>Slide the mass and watch two things happen. Below 13 Jupiter masses, the object is just a gas giant - no fusion at all. Between 13 and 80 Jupiter masses it becomes a brown dwarf: massive enough to fuse deuterium (a heavier form of hydrogen) but never quite massive enough to fuse ordinary hydrogen, the reaction that powers real stars. Cross 80 Jupiter masses and hydrogen fusion finally switches on - now it is a true star. The surprise: the sphere barely changes size while this happens. Degeneracy pressure keeps brown dwarfs close to Jupiter\'s own radius across almost the whole range - only once an object becomes a proper star does radius start growing with mass again.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>Planet / brown dwarf line</td><td>about 13 Jupiter masses (deuterium fusion)</td></tr>'
                + '<tr><td>Brown dwarf / star line</td><td>about 80 Jupiter masses (hydrogen fusion)</td></tr>'
                + '<tr><td>Radius across that range</td><td>stays within about 30% of Jupiter\'s</td></tr>'
                + '<tr><td>First confirmed brown dwarf</td><td>Teide 1, 1995 (about 55 Jupiter masses)</td></tr>'
                + '</table>'
                + '<p class="t3d-note">An honest color note: real brown dwarfs are far dimmer in visible light than shown here by default - toggle "Realistic dim" to see it. The name is actually a misnomer: to the human eye most would look magenta, purple, or nearly black, not brown. The small tan sphere parked over the ruler\'s 1-Jupiter-mass mark is a fixed size reference, not to orbital scale.</p>';
            t3dInfo(html);
        }
        function updateStatus() {
            t3dStatus(t3dBrownDwarfPhase(state.mjup) + ' - ' + state.mjup.toFixed(0) + ' Jupiter masses, radius ~' + t3dBrownDwarfRadiusRJ(state.mjup).toFixed(2) + ' Rjup. Drag to orbit.');
        }
        function wire() {
            var pBtn = document.getElementById('t3dBdPlayBtn');
            var rBtn = document.getElementById('t3dBdRealisticBtn');
            var sl = document.getElementById('t3dBdMass');
            if (sl) sl.oninput = function () { state.mjup = parseFloat(sl.value); state.playing = false; if (pBtn) pBtn.textContent = 'Play'; updateStatus(); };
            if (pBtn) pBtn.onclick = function () { state.playing = !state.playing; pBtn.textContent = state.playing ? 'Pause' : 'Play'; };
            if (rBtn) rBtn.onclick = function () { state.realistic = !state.realistic; rBtn.textContent = state.realistic ? 'Realistic dim: on' : 'Realistic dim: off'; };
        }
        wire(); facts(); updateStatus();

        return function animate(dt) {
            dt = dt / 1000;
            if (state.playing) {
                state.mjup += state.dir * dt * 9;
                if (state.mjup > 92) { state.mjup = 92; state.dir = -1; }
                if (state.mjup < 2) { state.mjup = 2; state.dir = 1; }
                var sl2 = document.getElementById('t3dBdMass');
                if (sl2) sl2.value = state.mjup;
                updateStatus();
            }
            var rRJ = t3dBrownDwarfRadiusRJ(state.mjup);
            var worldR = rRJ * T3D_BD_JUP_R;
            body.scale.setScalar(worldR);
            glow.scale.setScalar(worldR * 1.22);
            var c = t3dBrownDwarfColor(state.mjup);
            bodyMat.color.setHex(c.base);
            var glowAmt = state.realistic ? c.glowAmt * 0.12 : c.glowAmt;
            bodyMat.emissive.setHex(c.glow);
            bodyMat.emissiveIntensity = glowAmt;
            glowMat.color.setHex(c.glow);
            glowMat.opacity = glowAmt * 0.5;
            body.rotation.y += dt * 0.15;
            sliderMarker.position.set(ruX(state.mjup), -6, 0);
            shell.applyCamera();
        };
    }

    // Beta Pictoris debris disk (ALL figures real, cited): first imaged 1984
    // (Smith and Terrile, Science 226) after IRAS found its 1983 infrared
    // excess; disk extends "more than 400 AU" in the discovery image, with
    // fainter dust mapped out to 1000+ AU in later work; surface brightness
    // (mass density) falls off close to r^-3; a real vertical WARP appears
    // near 50 AU, attributed to the gravity of embedded planet Beta
    // Pictoris b (confirmed by direct imaging, 2008-2009), which orbits at
    // about 9-10 AU. System age about 20-26 Myr (Beta Pictoris moving group).
    var T3D_DD_AU = 0.12;                  // scene units per AU
    var T3D_DD_MAIN_AU = 400, T3D_DD_HALO_AU = 1000, T3D_DD_WARP_AU = 50, T3D_DD_PLANET_AU = 9.5;

    function t3dDebrisDisk(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));
        scene.add(new THREE.PointLight(0xdce8ff, 1.6, 0, 0));

        var SCALE = T3D_DD_AU;
        var state = { playing: true, warp: false, speed: 3, t: 0 };

        // background stars
        var bgGeo = new THREE.BufferGeometry(), bn = 260, bp = new Float32Array(bn * 3);
        for (var i = 0; i < bn; i++) { bp[i * 3] = (Math.random() - 0.5) * 220; bp[i * 3 + 1] = (Math.random() - 0.5) * 120; bp[i * 3 + 2] = (Math.random() - 0.5) * 220; }
        bgGeo.setAttribute('position', new THREE.BufferAttribute(bp, 3));
        scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0x596488, size: 0.35, transparent: true, opacity: 0.5 })));

        // Beta Pictoris - a hot young A-type star, bluer/whiter than the Sun
        scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.6, 24, 18), new THREE.MeshBasicMaterial({ color: 0xcfe0ff })));
        scene.add(new THREE.Mesh(new THREE.SphereGeometry(2.6, 18, 12), new THREE.MeshBasicMaterial({ color: 0xbcd4ff, transparent: true, opacity: 0.2 })));

        // density envelope: real ~r^-3 falloff for the main disk (400 AU),
        // plus a much fainter extended halo component out to 1000 AU
        function density(au) {
            if (au <= T3D_DD_MAIN_AU) return Math.pow(T3D_DD_MAIN_AU / Math.max(au, 8), 1.15) * 0.02;
            return 0.06 * Math.pow(T3D_DD_MAIN_AU / au, 2.2);
        }

        var N = shell.low ? 3200 : 6600;
        var rAU = new Float32Array(N), theta0 = new Float32Array(N), yOff = new Float32Array(N);
        var positions = new Float32Array(N * 3), colorsArr = new Float32Array(N * 3);
        var placed = 0, tries = 0;
        while (placed < N && tries < N * 40) {
            tries++;
            var au = Math.sqrt(Math.random()) * T3D_DD_HALO_AU;
            if (Math.random() > Math.min(1, density(au))) continue;
            rAU[placed] = au;
            theta0[placed] = Math.random() * Math.PI * 2;
            yOff[placed] = (Math.random() - 0.5) * (0.5 + au * 0.012);
            var warmth = Math.max(0, 1 - au / 500);
            colorsArr[placed * 3] = 0.55 + warmth * 0.35;
            colorsArr[placed * 3 + 1] = 0.58 + warmth * 0.32;
            colorsArr[placed * 3 + 2] = 0.68 + warmth * 0.25;
            placed++;
        }
        var geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colorsArr, 3));
        scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.32, vertexColors: true, transparent: true, opacity: 0.82, depthWrite: false })));

        // the hidden planet whose gravity is thought to warp the inner disk
        var planet = new THREE.Mesh(new THREE.SphereGeometry(0.55, 16, 12), new THREE.MeshBasicMaterial({ color: 0xffa63d }));
        planet.visible = false;
        scene.add(planet);

        function facts() {
            var html = '<h3>A dusty disk that gave away a hidden planet</h3>'
                + '<p>Beta Pictoris was the first star ever imaged with a clear disk of dust and debris around it, photographed in 1984 after an infrared satellite had already hinted something was there a year earlier. The disk is seen almost edge-on from Earth and reaches out more than 400 AU - fainter dust has been traced out to 1,000 AU or beyond. Near the star, the disk is subtly warped rather than flat, and that warp is how astronomers inferred a hidden planet years before one was actually photographed. Toggle Warp to see the tilt and where the real planet, Beta Pictoris b, was later confirmed.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>First imaged</td><td>1984 (Smith and Terrile)</td></tr>'
                + '<tr><td>Main disk radius</td><td>more than 400 AU</td></tr>'
                + '<tr><td>Faint outer dust</td><td>traced to about 1,000 AU</td></tr>'
                + '<tr><td>Inner warp radius</td><td>about 50 AU</td></tr>'
                + '<tr><td>Beta Pictoris b orbit</td><td>about 9-10 AU (confirmed 2008-2009)</td></tr>'
                + '<tr><td>System age</td><td>about 20-26 million years</td></tr>'
                + '</table>'
                + '<p class="t3d-note">An educational approximation: the warp is exaggerated for clarity and the planet marker is enlarged; particle brightness follows the real reported falloff (roughly the inverse cube of distance) but is not a dust-collision simulation. Motion is heavily sped up - the outer disk really takes thousands of years per turn.</p>';
            t3dInfo(html);
        }
        function wire() {
            var pBtn = document.getElementById('t3dDdPlayBtn');
            var wBtn = document.getElementById('t3dDdWarpBtn');
            var sl = document.getElementById('t3dDdSpeed');
            if (pBtn) pBtn.onclick = function () { state.playing = !state.playing; pBtn.textContent = state.playing ? 'Pause' : 'Play'; };
            if (wBtn) wBtn.onclick = function () { state.warp = !state.warp; planet.visible = state.warp; wBtn.textContent = state.warp ? 'Warp: on' : 'Warp: off'; };
            if (sl) sl.oninput = function () { state.speed = parseFloat(sl.value); };
        }
        wire(); facts();
        t3dStatus('The disk is shown nearly edge-on, as astronomers first saw it. Toggle Warp to see the inner tilt and the hidden planet it revealed. Drag to orbit.');

        return function animate(dt) {
            dt = dt / 1000; // shell driver emits milliseconds; scene runs in seconds
            if (state.playing) {
                state.t += dt * state.speed;
                var arr = geo.attributes.position.array;
                for (var p = 0; p < N; p++) {
                    var au = rAU[p];
                    var rate = Math.pow(20 / Math.max(au, 2), 1.5);
                    var ang = theta0[p] + state.t * 0.22 * rate;
                    var rs = au * SCALE;
                    var y = yOff[p];
                    if (state.warp && au < T3D_DD_WARP_AU * 2.2) {
                        var warpAmt = Math.max(0, 1 - au / (T3D_DD_WARP_AU * 2.2));
                        y += Math.sin(ang * 0.5) * warpAmt * 2.2;
                    }
                    arr[p * 3] = rs * Math.cos(ang);
                    arr[p * 3 + 1] = y;
                    arr[p * 3 + 2] = rs * Math.sin(ang);
                }
                geo.attributes.position.needsUpdate = true;
                if (state.warp) {
                    var pRate = Math.pow(20 / T3D_DD_PLANET_AU, 1.5);
                    var pAng = state.t * 0.22 * pRate;
                    planet.position.set(T3D_DD_PLANET_AU * SCALE * Math.cos(pAng), 0, T3D_DD_PLANET_AU * SCALE * Math.sin(pAng));
                }
            }
            shell.applyCamera();
        };
    }

    // Kepler-16 system (ALL figures real, cited): binary semi-major axis
    // ~0.226 AU (about 21 million miles), eccentricity ~0.16, period ~41 days;
    // masses ~0.69 and ~0.20 solar masses (Doyle et al. 2011, Science; NASA
    // Exoplanet Catalog; Wikipedia Kepler-16b). Planet Kepler-16b: semimajor
    // axis 0.7048 AU, eccentricity 0.0069, period 228.776 days, radius 0.7538
    // Jupiter radii, mass 0.333 Jupiter masses (Saturn-like) - orbits the
    // SAME barycenter as the binary, nearly coplanar with it (within ~0.4 deg).
    var T3D_CBP_AU = 12;                 // scene units per AU
    var T3D_CBP_MA = 0.69, T3D_CBP_MB = 0.20;   // solar masses
    var T3D_CBP_ABIN = 0.226, T3D_CBP_EBIN = 0.16;
    var T3D_CBP_APL = 0.7048, T3D_CBP_EPL = 0.0069;

    function t3dCircumbinaryPlanet(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        var SCALE = T3D_CBP_AU;
        var Mtot = T3D_CBP_MA + T3D_CBP_MB;
        var Hbin = Math.sqrt(T3D_CBP_ABIN * (1 - T3D_CBP_EBIN * T3D_CBP_EBIN));
        var Hpl = Math.sqrt(T3D_CBP_APL * (1 - T3D_CBP_EPL * T3D_CBP_EPL));
        var state = { playing: true, trails: false, speed: 3, nuBin: 0.3, nuPl: 1.1 };

        // background stars
        var bgGeo = new THREE.BufferGeometry(), bn = 220, bp = new Float32Array(bn * 3);
        for (var i = 0; i < bn; i++) { bp[i * 3] = (Math.random() - 0.5) * 70; bp[i * 3 + 1] = (Math.random() - 0.5) * 40; bp[i * 3 + 2] = (Math.random() - 0.5) * 70; }
        bgGeo.setAttribute('position', new THREE.BufferAttribute(bp, 3));
        scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0x596488, size: 0.24, transparent: true, opacity: 0.5 })));

        // the two stars (Kepler-16A, a K dwarf; Kepler-16B, a smaller red dwarf)
        // - enlarged well beyond real proportions so both remain visible next
        // to their orbit scale (disclosed in the facts panel and FAQ)
        var starA = new THREE.Mesh(new THREE.SphereGeometry(0.85, 26, 20), new THREE.MeshBasicMaterial({ color: 0xffb84d }));
        var starB = new THREE.Mesh(new THREE.SphereGeometry(0.5, 20, 16), new THREE.MeshBasicMaterial({ color: 0xd8583a }));
        var starAGlow = new THREE.Mesh(new THREE.SphereGeometry(1.15, 18, 14), new THREE.MeshBasicMaterial({ color: 0xffb84d, transparent: true, opacity: 0.18 }));
        scene.add(starA); scene.add(starB); scene.add(starAGlow);
        scene.add(new THREE.PointLight(0xfff2cc, 1.4, 0, 0));

        // the circumbinary planet (Kepler-16b, Saturn-like gas giant)
        var planet = new THREE.Mesh(new THREE.SphereGeometry(0.62, 22, 16), new THREE.MeshLambertMaterial({ color: 0xd8c48a }));
        scene.add(planet);

        // orbit trail guide rings (toggle) - real semimajor axes
        var trailGroup = new THREE.Group(); trailGroup.visible = false; scene.add(trailGroup);
        function guideRing(a, e, color) {
            var pts = [];
            for (var k = 0; k <= 120; k++) { var nu = k / 120 * Math.PI * 2, r = a * (1 - e * e) / (1 + e * Math.cos(nu)); pts.push(new THREE.Vector3(r * SCALE * Math.cos(nu), 0, r * SCALE * Math.sin(nu))); }
            return new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.55 }));
        }
        trailGroup.add(guideRing(T3D_CBP_ABIN * T3D_CBP_MB / Mtot, T3D_CBP_EBIN, 0xffb84d));
        trailGroup.add(guideRing(T3D_CBP_ABIN * T3D_CBP_MA / Mtot, T3D_CBP_EBIN, 0xd8583a));
        trailGroup.add(guideRing(T3D_CBP_APL, T3D_CBP_EPL, 0x7dafa3));

        function facts() {
            var html = '<h3>A planet with two suns, almost like Tatooine</h3>'
                + '<p>Kepler-16b, found in 2011, was the first confirmed planet proven to orbit two stars at once - a real-life echo of Luke Skywalker\'s fictional home world. It circles the pair every 228.8 days at about the distance Venus orbits the Sun, while the two stars themselves orbit each other every 41 days. Unlike the movie, Kepler-16b is a cold gas giant with no solid ground to stand on and watch a double sunset.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>Discovered</td><td>2011, Kepler space telescope</td></tr>'
                + '<tr><td>Distance</td><td>about 200-245 light-years</td></tr>'
                + '<tr><td>Star masses</td><td>about 0.69 and 0.20 solar masses</td></tr>'
                + '<tr><td>Binary orbit</td><td>about 41 days, 0.23 AU apart</td></tr>'
                + '<tr><td>Planet orbit</td><td>228.8 days, 0.70 AU out</td></tr>'
                + '<tr><td>Planet size</td><td>0.75 Jupiter radii, 0.33 Jupiter masses (Saturn-like)</td></tr>'
                + '</table>'
                + '<p class="t3d-note">An educational approximation: star and planet sizes are enlarged for visibility relative to their orbits, and the motion is sped up. The real bodies were measured this precisely because the planet transits both stars and the stars eclipse each other, as seen from Earth - not from a rendered viewpoint here.</p>';
            t3dInfo(html);
        }
        function wire() {
            var pBtn = document.getElementById('t3dCbpPlayBtn');
            var tBtn = document.getElementById('t3dCbpTrailsBtn');
            var sl = document.getElementById('t3dCbpSpeed');
            if (pBtn) pBtn.onclick = function () { state.playing = !state.playing; pBtn.textContent = state.playing ? 'Pause' : 'Play'; };
            if (tBtn) tBtn.onclick = function () { state.trails = !state.trails; trailGroup.visible = state.trails; tBtn.textContent = state.trails ? 'Orbits: on' : 'Orbits: off'; };
            if (sl) sl.oninput = function () { state.speed = parseFloat(sl.value); };
        }
        wire(); facts();
        t3dStatus('The two stars (orange and red) orbit each other every 41 days while the tan planet circles them both every 228.8 days. Toggle Orbits to see the paths. Drag to orbit the view.');

        return function animate(dt) {
            dt = dt / 1000; // shell driver emits milliseconds; scene runs in seconds
            if (state.playing) {
                var rBin = T3D_CBP_ABIN * (1 - T3D_CBP_EBIN * T3D_CBP_EBIN) / (1 + T3D_CBP_EBIN * Math.cos(state.nuBin));
                state.nuBin += (Hbin / (rBin * rBin)) * dt * state.speed * 0.55;
                if (state.nuBin > Math.PI * 2) state.nuBin -= Math.PI * 2;
                var bx = rBin * Math.cos(state.nuBin) * SCALE, bz = rBin * Math.sin(state.nuBin) * SCALE;
                starA.position.set(-bx * (T3D_CBP_MB / Mtot), 0, -bz * (T3D_CBP_MB / Mtot));
                starAGlow.position.copy(starA.position);
                starB.position.set(bx * (T3D_CBP_MA / Mtot), 0, bz * (T3D_CBP_MA / Mtot));

                var rPl = T3D_CBP_APL * (1 - T3D_CBP_EPL * T3D_CBP_EPL) / (1 + T3D_CBP_EPL * Math.cos(state.nuPl));
                state.nuPl += (Hpl / (rPl * rPl)) * dt * state.speed * 0.55;
                if (state.nuPl > Math.PI * 2) state.nuPl -= Math.PI * 2;
                planet.position.set(rPl * SCALE * Math.cos(state.nuPl), 0, rPl * SCALE * Math.sin(state.nuPl));
            }
            shell.applyCamera();
        };
    }

    function t3dVanAllenBelts(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.32));
        var sunLight = new THREE.DirectionalLight(0xfff4e0, 1.0);
        sunLight.position.set(1, 0.5, 0.6);
        scene.add(sunLight);

        var EARTH_R = 2.4;
        var INNER_RE = [1.2, 3];   // real Re range (Wikipedia / NASA)
        var OUTER_RE = [3, 9];     // real range is 3-10 Re, compressed slightly for scene density
        var LAT_MAX = 65 * Math.PI / 180;  // belts confined within about 65 deg of the equator
        var SAA_LON = 4.2;                 // fixed reference longitude for the illustrative dip
        var state = { playing: true, saa: false, speed: 3, t: 0 };

        // background stars
        var bgGeo = new THREE.BufferGeometry(), bn = 240, bp = new Float32Array(bn * 3);
        for (var i = 0; i < bn; i++) { bp[i * 3] = (Math.random() - 0.5) * 140; bp[i * 3 + 1] = (Math.random() - 0.5) * 70; bp[i * 3 + 2] = (Math.random() - 0.5) * 140; }
        bgGeo.setAttribute('position', new THREE.BufferAttribute(bp, 3));
        scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0x596488, size: 0.3, transparent: true, opacity: 0.5 })));

        // Earth
        scene.add(new THREE.Mesh(new THREE.SphereGeometry(EARTH_R, 40, 30), new THREE.MeshLambertMaterial({ color: 0x2f6fb0 })));

        // safe-zone guide ring at ~2-4 Re (between the belts)
        var safePts = [];
        for (var s = 0; s <= 100; s++) { var a = s / 100 * Math.PI * 2; safePts.push(new THREE.Vector3(EARTH_R * 3 * Math.cos(a), 0, EARTH_R * 3 * Math.sin(a))); }
        scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(safePts), new THREE.LineBasicMaterial({ color: 0x3a4460, transparent: true, opacity: 0.4 })));

        function buildBelt(reMin, reMax, count, color) {
            var rMin = EARTH_R * reMin, rMax = EARTH_R * reMax;
            var rArr = new Float32Array(count), thetaArr = new Float32Array(count), latArr = new Float32Array(count);
            var positions = new Float32Array(count * 3), colors = new Float32Array(count * 3);
            var c = new THREE.Color(color);
            for (var p = 0; p < count; p++) {
                rArr[p] = rMin + Math.random() * (rMax - rMin);
                thetaArr[p] = Math.random() * Math.PI * 2;
                latArr[p] = (Math.random() * 2 - 1) * LAT_MAX;

        // background stars

        bgGeo.setAttribute('position', new THREE.BufferAttribute(bp, 3));
        scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0x5a6488, size: 0.22, transparent: true, opacity: 0.5 })));

        // ray-march the Roche lobe contour around a star center
        function lobe(cx) {
            var pts = [];

                for (var r = A / 400; r < A * 0.9; r += A / 400) { if (Phi(cx + r * cs, r * sn) >= phiL1) { hit = r; break; } }

    function t3dEquationOfTime(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x061024, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.95));

        var state = { playing: true, showMonths: true, t: 0 };
        var XS = 0.92, YS = 0.42, Y0 = 2.5;

        var ground = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), new THREE.MeshBasicMaterial({ color: 0x14261a, side: THREE.DoubleSide }));
        ground.rotation.x = -Math.PI / 2; ground.position.y = -12; scene.add(ground);

        function sample(d) {
            var B = 2 * Math.PI * (d - 81) / 365;
            var eot = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
            var decl = 23.44 * Math.sin(2 * Math.PI * (d - 80) / 365);
            return { x: eot * XS, y: decl * YS + Y0, eot: eot, decl: decl };
        }

        // reference axes: mean-sun vertical (EoT=0) + declination-0 horizontal
        var vax = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, -11, 0), new THREE.Vector3(0, 13.5, 0)]), new THREE.LineBasicMaterial({ color: 0x3a4a6a }));
        var hax = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-16, Y0, 0), new THREE.Vector3(16, Y0, 0)]), new THREE.LineBasicMaterial({ color: 0x3a4a6a }));
        scene.add(vax); scene.add(hax);

        // analemma figure-8
        var anaPts = [];
        for (var d = 0; d <= 365; d += 2) { var p = sample(d); anaPts.push(new THREE.Vector3(p.x, p.y, 0)); }
        var ana = new THREE.Line(new THREE.BufferGeometry().setFromPoints(anaPts), new THREE.LineBasicMaterial({ color: 0xffcaa0, transparent: true, opacity: 0.85 }));
        scene.add(ana);

        // month markers
        var months = [];
        for (var m = 0; m < 12; m++) {
            var dm = m * 30.4 + 15, pm = sample(dm);
            var dot = new THREE.Mesh(new THREE.SphereGeometry(0.32, 12, 10), new THREE.MeshBasicMaterial({ color: 0x9fd8ff }));
            dot.position.set(pm.x, pm.y, 0.05); scene.add(dot); months.push(dot);
        }

        var sun = new THREE.Mesh(new THREE.SphereGeometry(0.95, 20, 16), new THREE.MeshBasicMaterial({ color: 0xffe066 }));
        var sunGlow = new THREE.Mesh(new THREE.SphereGeometry(1.6, 16, 12), new THREE.MeshBasicMaterial({ color: 0xffd23f, transparent: true, opacity: 0.3 }));
        scene.add(sun); scene.add(sunGlow);

        function facts() {
            var html = '<h3>The equation of time</h3>'
                + '<p>Photograph the Sun at the same clock time every day for a year and it traces a figure-8 in the sky - the <b>analemma</b>. Its sideways swing is the <b>equation of time</b>: how far a sundial runs ahead of or behind the clock.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>Two causes</td><td>axial tilt (23.44 deg) + orbital eccentricity (0.0167)</td></tr>'
                + '<tr><td>Sundial ahead</td><td>up to ~ +16 minutes (early November)</td></tr>'
                + '<tr><td>Sundial behind</td><td>down to ~ -14 minutes (mid February)</td></tr>'
                + '<tr><td>Matches the clock</td><td>~4 times a year (around Apr 15, Jun 13, Sep 1, Dec 25)</td></tr>'
                + '</table>'
                + '<p class="t3d-note">Up-down is the Sun declination (+/-23.4 deg over the year); left-right is the equation of time. Blue dots mark the months. Positions use a standard approximation and are not to exact scale.</p>';
            t3dInfo(html);
        }

        function wire() {
            var pBtn = document.getElementById('t3dEotPlayBtn');
            var mBtn = document.getElementById('t3dEotMonthsBtn');
            if (pBtn) pBtn.onclick = function () { state.playing = !state.playing; pBtn.textContent = state.playing ? 'Pause' : 'Play'; };
            if (mBtn) mBtn.onclick = function () { state.showMonths = !state.showMonths; for (var i = 0; i < months.length; i++) months[i].visible = state.showMonths; };
        }
        wire(); facts();
        t3dStatus('The Sun traces a figure-8 (the analemma) over a year; its sideways swing is the equation of time. Drag to orbit.');

        return function animate(dt) {
            dt = dt / 1000; // shell driver emits milliseconds; scene runs in seconds
            if (state.playing) state.t += dt;
            var day = (state.t * 15) % 365;
            var p = sample(day);
            sun.position.set(p.x, p.y, 0.12); sunGlow.position.copy(sun.position);
            for (var i = 0; i < months.length; i++) months[i].visible = state.showMonths;
            shell.applyCamera();
        };
    }

    function t3dKirkwoodGaps(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.95));

        var state = { playing: true, showRes: true, t: 0 };
        var AU = 4;

        var sun = new THREE.Mesh(new THREE.SphereGeometry(1.4, 24, 18), new THREE.MeshBasicMaterial({ color: 0xffd23f }));
        scene.add(sun);
        var sunGlow = new THREE.Mesh(new THREE.SphereGeometry(2.0, 18, 14), new THREE.MeshBasicMaterial({ color: 0xffb733, transparent: true, opacity: 0.22 }));
        scene.add(sunGlow);

        function ring(rad, color, op) {
            var pts = [];
            for (var a = 0; a <= 120; a++) { var th = a / 120 * Math.PI * 2; pts.push(new THREE.Vector3(rad * Math.cos(th), 0, rad * Math.sin(th))); }
            return new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: op }));
        }
        var marsA = 1.52 * AU, jupA = 5.2 * AU;
        scene.add(ring(marsA, 0x6a3a2a, 0.5));
        scene.add(ring(jupA, 0x5a4a2a, 0.6));
        var mars = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 12), new THREE.MeshBasicMaterial({ color: 0xc1440e }));
        var jup = new THREE.Mesh(new THREE.SphereGeometry(1.5, 20, 16), new THREE.MeshBasicMaterial({ color: 0xd8a06a }));
        scene.add(mars); scene.add(jup);

        var gaps = [{ a: 2.06, w: 0.06 }, { a: 2.50, w: 0.10 }, { a: 2.82, w: 0.07 }, { a: 2.95, w: 0.05 }, { a: 3.28, w: 0.09 }];
        var resRings = [];
        for (var gi = 0; gi < gaps.length; gi++) { var rr = ring(gaps[gi].a * AU, 0x7fb0ff, 0.55); resRings.push(rr); scene.add(rr); }

        var NB = 2600;
        var aa = new Float32Array(NB), ang = new Float32Array(NB), yj = new Float32Array(NB);
        var pos = new Float32Array(NB * 3), col = new Float32Array(NB * 3);
        function inGap(a) { for (var k = 0; k < gaps.length; k++) { if (Math.abs(a - gaps[k].a) < gaps[k].w) return true; } return false; }
        var filled = 0, guard = 0;
        while (filled < NB && guard < NB * 25) {
            guard++;
            var a = 2.02 + Math.random() * (3.32 - 2.02);
            if (inGap(a)) continue;
            aa[filled] = a; ang[filled] = Math.random() * Math.PI * 2; yj[filled] = (Math.random() - 0.5) * 0.9;
            var c = a < 2.50 ? [0.68, 0.74, 0.95] : (a < 2.82 ? [0.95, 0.86, 0.62] : [0.72, 0.92, 0.78]);
            col[filled * 3] = c[0]; col[filled * 3 + 1] = c[1]; col[filled * 3 + 2] = c[2];
            filled++;
        }
        NB = filled;
        var beltGeo = new THREE.BufferGeometry();
        beltGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

                + '<table class="w3-table w3-bordered">'

                + '</table>'
                + '<p class="t3d-note">The blue ring is the tidal radius; outside it the star holds together, inside it the black-hole tide wins. First theorized by Jack Hills (1975); Martin Rees (1988) showed about half the mass stays bound. Sizes here are illustrative and the timeline is compressed to a few seconds.</p>';

        }

        function wire() {
            var pBtn = document.getElementById('t3dTdePlayBtn');
            var tBtn = document.getElementById('t3dTdeTidalBtn');
            if (pBtn) pBtn.onclick = function () { state.playing = !state.playing; pBtn.textContent = state.playing ? 'Pause' : 'Play'; };
            if (tBtn) tBtn.onclick = function () { state.showTidal = !state.showTidal; tidal.visible = state.showTidal; };

            var period = 10;
            var u = (state.t % period) / period; // 0..1 loop

            if (u < 0.35) {

                    var a2 = -0.6 + s * 3.4;
                    var rr = base + (s - 0.5) * 6 * f2;
                    streamPos[i * 3] = Math.cos(a2) * rr;
                    streamPos[i * 3 + 1] = (s - 0.5) * 0.6;
                    streamPos[i * 3 + 2] = Math.sin(a2) * rr;

            shell.applyCamera();
        };
    }

    function t3dCmbSky(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x01020a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));

        var state = { showDipole: true, showAniso: true, spinning: true, t: 0 };
        var R = 12;

        // dipole axis (illustrative direction) and a fixed set of anisotropy
        // spots so the mottled pattern is deterministic across frames.
        var dipoleAxis = new THREE.Vector3(0.6, 0.2, 0.78).normalize();
        var spots = [];
        var SEED = 20260717;
        function rnd() { SEED = (SEED * 1103515245 + 12345) & 0x7fffffff; return SEED / 0x7fffffff; }
        for (var i = 0; i < 90; i++) {
            var u = rnd() * 2 - 1, th = rnd() * Math.PI * 2, rr = Math.sqrt(1 - u * u);
            spots.push({ dir: new THREE.Vector3(rr * Math.cos(th), u, rr * Math.sin(th)), amp: (rnd() * 2 - 1), width: 0.18 + rnd() * 0.22 });
        }

        function anisoAt(dir) {
            var s = 0;
            for (var i = 0; i < spots.length; i++) {
                var d = dir.dot(spots[i].dir);
                var ang = Math.acos(Math.max(-1, Math.min(1, d)));
                s += spots[i].amp * Math.exp(-(ang * ang) / (spots[i].width * spots[i].width));
            }
            return s; // roughly -1..1
        }
        // temperature (in illustrative normalized units) -> Planck-style colour
        function tempColor(temp) {
            // temp normalized about 0; clamp to -1..1; blue(cold) - white - red(hot)
            var x = Math.max(-1, Math.min(1, temp));
            var c = new THREE.Color();
            if (x < 0) c.setRGB(0.15 + 0.85 * (1 + x), 0.25 + 0.75 * (1 + x), 1.0);
            else c.setRGB(1.0, 0.85 * (1 - x) + 0.15, 0.55 * (1 - x));
            return c;
        }

        var geo = new THREE.SphereGeometry(R, 96, 64);
        var pos = geo.attributes.position;
        var colors = new Float32Array(pos.count * 3);
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        var dirs = [];
        for (var i = 0; i < pos.count; i++) {
            dirs.push(new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i)).normalize());
        }
        var mat = new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.BackSide });
        var sphere = new THREE.Mesh(geo, mat);
        scene.add(sphere);

        function recolor() {
            for (var i = 0; i < dirs.length; i++) {
                var temp = 0;
                if (state.showDipole) temp += 0.55 * dirs[i].dot(dipoleAxis);
                if (state.showAniso) temp += 0.5 * anisoAt(dirs[i]);
                var c = tempColor(temp);
                colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
            }
            geo.attributes.color.needsUpdate = true;
        }
