    function t3dCoordinateSystemsSky(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x05060f, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.75));

        var R = 10;
        var DEG = Math.PI / 180;
        var OBLIQUITY = 23.44 * DEG;
        var state = { lat: 40, spinning: true, t: 0, showEqu: true, showHor: true, showEcl: true };

        // ---- faint star field so the sphere reads as the sky ----
        var starGeo = new THREE.BufferGeometry();
        var starN = 360, sp = new Float32Array(starN * 3);
        for (var i = 0; i < starN; i++) {
            var u = Math.random() * 2 - 1, th = Math.random() * Math.PI * 2, rr = Math.sqrt(1 - u * u);
            sp[i * 3] = rr * Math.cos(th) * R * 0.98;
            sp[i * 3 + 1] = u * R * 0.98;
            sp[i * 3 + 2] = rr * Math.sin(th) * R * 0.98;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(sp, 3));
        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x9fb4d8, size: 0.09 })));

        function circle(radius, y, color, seg) {
            var g = new THREE.BufferGeometry(), n = seg || 128, a = new Float32Array((n + 1) * 3);
            for (var k = 0; k <= n; k++) {
                var t = k / n * Math.PI * 2;
                a[k * 3] = Math.cos(t) * radius; a[k * 3 + 1] = y; a[k * 3 + 2] = Math.sin(t) * radius;
            }
            g.setAttribute('position', new THREE.BufferAttribute(a, 3));
            return new THREE.Line(g, new THREE.LineBasicMaterial({ color: color }));
        }
        // a great/small circle in a plane, built then oriented by the caller
        function meridian(color) {
            var g = new THREE.BufferGeometry(), n = 128, a = new Float32Array((n + 1) * 3);
            for (var k = 0; k <= n; k++) {
                var t = k / n * Math.PI * 2;
                a[k * 3] = Math.cos(t) * R; a[k * 3 + 1] = Math.sin(t) * R; a[k * 3 + 2] = 0;
            }
            g.setAttribute('position', new THREE.BufferAttribute(a, 3));
            return new THREE.Line(g, new THREE.LineBasicMaterial({ color: color }));
        }
        function dot(x, y, z, color, size) {
            var m = new THREE.Mesh(new THREE.SphereGeometry(size || 0.16, 12, 8), new THREE.MeshBasicMaterial({ color: color }));
            m.position.set(x, y, z); return m;
        }

        // ================= EQUATORIAL grid (RA/Dec), NCP at +Y =========
        var equ = new THREE.Group();
        var EQU_COLOR = 0x4fc3f7;
        equ.add(circle(R, 0, 0x81d4fa, 160)); // celestial equator (Dec 0), brighter
        [30, 60].forEach(function (d) {
            var y = Math.sin(d * DEG) * R, r = Math.cos(d * DEG) * R;
            equ.add(circle(r, y, EQU_COLOR)); equ.add(circle(r, -y, EQU_COLOR));
        });
        for (var h = 0; h < 12; h++) { // hour circles every 2h (30 deg)
            var m = meridian(EQU_COLOR); m.rotation.y = h * 30 * DEG; equ.add(m);
        }
        equ.add(dot(0, R, 0, 0xffffff, 0.22));   // North celestial pole
        equ.add(dot(0, -R, 0, 0x90a4ae, 0.18));  // South celestial pole
        // Polaris ~ Dec +89.26 deg (just off the NCP)
        var pd = 89.26 * DEG; equ.add(dot(0, Math.sin(pd) * R, Math.cos(pd) * R * 0.0, 0xfff59d, 0.16));
        equ.add(dot(Math.cos(0) * R, 0, Math.sin(0) * R, 0xff8a80, 0.18)); // vernal equinox at RA 0h, Dec 0
        scene.add(equ);

        // ================= ECLIPTIC (tilted OBLIQUITY from equator) =====
        var ecl = circle(R, 0, 0x9ccc65, 160);
        ecl.rotation.z = OBLIQUITY; // tilt the equator-plane circle by the obliquity
        scene.add(ecl);

        // ================= HORIZONTAL grid (Alt/Az) ====================
        // Observer-fixed: zenith at local +Y; tilted from the NCP by the
        // co-latitude (90 - lat). Rebuilt when latitude changes.
        var hor = new THREE.Group();
        var HOR_COLOR = 0xffb74d;
        function buildHorizon() {
            while (hor.children.length) hor.remove(hor.children[0]);
            hor.add(circle(R, 0, 0xffcc80, 160));           // horizon (Alt 0), brighter
            [30, 60].forEach(function (a) {                 // almucantars (Alt circles)
                var y = Math.sin(a * DEG) * R, r = Math.cos(a * DEG) * R; hor.add(circle(r, y, HOR_COLOR));
            });
            for (var az = 0; az < 6; az++) { var mm = meridian(HOR_COLOR); mm.rotation.y = az * 30 * DEG; hor.add(mm); }
            hor.add(dot(0, R, 0, 0xfff3e0, 0.2));           // zenith
            // cardinal points on the horizon (N toward -Z after tilt, standard)
            hor.add(dot(0, 0, -R, 0xffffff, 0.14));         // N
            hor.add(dot(R, 0, 0, 0xffffff, 0.11));          // E
            hor.add(dot(0, 0, R, 0xffffff, 0.11));          // S
            hor.add(dot(-R, 0, 0, 0xffffff, 0.11));         // W
            // tilt: NCP sits at altitude = latitude above the north horizon,
            // so the zenith is (90 - lat) away from the NCP -> rotate about X.
            hor.rotation.x = (90 - state.lat) * DEG;
        }
        buildHorizon();
        scene.add(hor);

        function facts() {
            var html = '<h3>Two ways to map the same sky</h3>'
                + '<p>The blue EQUATORIAL grid is fixed to the stars; the amber HORIZONTAL grid is fixed to you, the observer. They tilt apart by your co-latitude, and the sky wheels about the celestial pole.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>Right Ascension (RA)</td><td>0h to 24h eastward; 1h = 15 deg</td></tr>'
                + '<tr><td>Declination (Dec)</td><td>-90 deg (SCP) to +90 deg (NCP)</td></tr>'
                + '<tr><td>Altitude (Alt)</td><td>0 deg horizon to 90 deg zenith</td></tr>'
                + '<tr><td>Azimuth (Az)</td><td>0 to 360 deg clockwise from North</td></tr>'
                + '<tr><td>Obliquity of ecliptic</td><td>23.44 deg (J2000)</td></tr>'
                + '<tr><td>Polaris</td><td>Dec +89 deg 16 min - about 0.7 deg off the NCP</td></tr>'
                + '<tr><td>Observer latitude</td><td>' + state.lat + ' deg N (pole altitude = latitude)</td></tr>'
                + '</table>'
                + '<p class="t3d-note">Equatorial coordinates (RA/Dec) are the star-fixed J2000 frame catalogs publish; horizontal coordinates (Alt/Az) depend on your location and the time. Precession drifts the equinox about 50 arcsec per year.</p>';
            t3dInfo(html);
        }

        function applyVis() { equ.visible = state.showEqu; hor.visible = state.showHor; ecl.visible = state.showEcl; }
        function wire() {
            var eqBtn = document.getElementById('t3dCoordEquBtn');
            var hoBtn = document.getElementById('t3dCoordHorBtn');
            var ecBtn = document.getElementById('t3dCoordEclBtn');
            var spBtn = document.getElementById('t3dCoordSpinBtn');
            var latEl = document.getElementById('t3dCoordLat');
            if (eqBtn) eqBtn.onclick = function () { state.showEqu = !state.showEqu; applyVis(); };
            if (hoBtn) hoBtn.onclick = function () { state.showHor = !state.showHor; applyVis(); };
            if (ecBtn) ecBtn.onclick = function () { state.showEcl = !state.showEcl; applyVis(); };
            if (spBtn) spBtn.onclick = function () { state.spinning = !state.spinning; spBtn.textContent = state.spinning ? 'Pause sky' : 'Spin sky'; };
            if (latEl) latEl.oninput = function () { state.lat = parseInt(latEl.value || '40', 10); buildHorizon(); facts(); };
        }

        wire();
        applyVis();
        facts();
        t3dStatus('Blue = equatorial (RA/Dec, star-fixed). Amber = horizontal (Alt/Az, your sky). Green = ecliptic. Drag to look around.');

        return function animate(dt) {
            dt = dt / 1000; // shell driver emits milliseconds; scene runs in seconds
            if (state.spinning) {
                state.t += dt;
                // diurnal wheel: the star-fixed frames (equatorial + ecliptic)
                // rotate about the celestial pole; the horizon stays put.
                equ.rotation.y += dt * 0.12;
                ecl.rotation.y = equ.rotation.y;
            }
            shell.applyCamera();
        };
    }

    function t3dNBodySandbox(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02030a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.55));

        // Newtonian gravitation literacy: G = 6.674 30(15) x 10^-11
        // m^3 kg^-1 s^-2 (CODATA 2022). Real pairwise F = G m1 m2 / r^2 for
        // every body added here - a genuine N-body integration, not a
        // scripted orbit. On-screen mass/distance units use a scaled
        // teaching constant so motion is visible in one screen; the real
        // G value above is shown for literacy, disclosed as scaled here.
        var G_REAL = 6.67430e-11;
        var G_TEACH = 2.2;
        var SOFTEN = 0.22;
        var MAX_BODIES = 16;

        var root = new THREE.Group();
        scene.add(root);
        var groundGeo = new THREE.RingGeometry(0.01, 6, 48);
        var groundMat = new THREE.MeshBasicMaterial({ color: 0x1a237e, transparent: true, opacity: 0.12, side: THREE.DoubleSide });
        var ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        root.add(ground);

        var bodies = [];
        function addBody(x, z, mass, vx, vz, color) {
            if (bodies.length >= MAX_BODIES) return null;
            var radius = 0.12 + Math.pow(mass, 1 / 3) * 0.16;
            var mesh = new THREE.Mesh(
                new THREE.SphereGeometry(radius, 14, 10),
                new THREE.MeshLambertMaterial({ color: color, emissive: color, emissiveIntensity: 0.15 })
            );
            mesh.position.set(x, 0, z);
            root.add(mesh);
            var trailGeo = new THREE.BufferGeometry();
            var MAX_TRAIL = 90;
            var trailPositions = new Float32Array(MAX_TRAIL * 3);
            trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
            trailGeo.setDrawRange(0, 0);
            var trailLine = new THREE.Line(trailGeo, new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.45 }));
            root.add(trailLine);
            var b = {
                mesh: mesh, mass: mass, radius: radius,
                pos: new THREE.Vector3(x, 0, z),
                vel: new THREE.Vector3(vx, 0, vz),
                acc: new THREE.Vector3(0, 0, 0),
                trailGeo: trailGeo, trailPositions: trailPositions, trailCount: 0,
                isPrimary: false
            };
            bodies.push(b);
            return b;
        }

        function reset() {
            for (var i = 0; i < bodies.length; i++) {
                root.remove(bodies[i].mesh);
                root.remove(bodies[i].trailGeo.__lineRef || bodies[i].mesh);
            }
            while (root.children.length > 1) root.remove(root.children[1]);
            bodies.length = 0;
            addBody(0, 0, 26, 0, 0, 0xffe082);
            addBody(1.9, 0, 0.9, 0, 1.35, 0x64b5f6);
            addBody(-2.7, 0.3, 0.6, 0.05, -1.05, 0xef9a9a);
            addBody(0.4, -3.3, 0.4, -1.0, -0.05, 0x81c784);
        }

        var state = { playing: true, nextMass: 'light', t: 0 };

        function primaryBody() {
            var best = null;
            for (var i = 0; i < bodies.length; i++) {
                if (!best || bodies[i].mass > best.mass) best = bodies[i];
            }
            return best;
        }

        function updateFacts() {
            var primary = primaryBody();
            var bound = 0, escaping = 0;
            for (var i = 0; i < bodies.length; i++) {
                var b = bodies[i];
                if (b === primary) continue;
                var relVel = b.vel.clone().sub(primary.vel);
                var relPos = b.pos.clone().sub(primary.pos);
                var r = Math.max(relPos.length(), 0.05);
                var energy = 0.5 * relVel.lengthSq() - (G_TEACH * primary.mass) / r;
                if (energy < 0) bound++; else escaping++;
            }
            var html = '<h3>N-body sandbox - real gravity, your setup</h3>'
                + '<p>Every body pulls on every other body with F = G m1 m2 / r^2. Add bodies and watch bound orbits, scatters, and captures emerge.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>Newtonian G (real)</td><td>6.674 30 x 10^-11 m^3 kg^-1 s^-2</td></tr>'
                + '<tr><td>Bodies in scene</td><td>' + bodies.length + ' of ' + MAX_BODIES + ' max</td></tr>'
                + '<tr><td>Bound orbits</td><td>' + bound + '</td></tr>'
                + '<tr><td>Escaping / scattering</td><td>' + escaping + '</td></tr>'
                + '<tr><td>Next body mass</td><td>' + state.nextMass + '</td></tr>'
                + '</table>'
                + '<p class="t3d-note">On-screen motion uses a scaled gravitational constant for visible dynamics in one screen - the real G = 6.674e-11 is shown here for literacy. Gravity is softened at close range to avoid a numerical blow-up, standard N-body practice.</p>';
            t3dInfo(html);
        }

        function wire() {
            var lightBtn = document.getElementById('t3dNbodyLightBtn');
            var heavyBtn = document.getElementById('t3dNbodyHeavyBtn');
            var playBtn = document.getElementById('t3dNbodyPlayBtn');
            var resetBtn = document.getElementById('t3dNbodyResetBtn');
            if (lightBtn) lightBtn.onclick = function () { state.nextMass = 'light'; updateFacts(); };
            if (heavyBtn) heavyBtn.onclick = function () { state.nextMass = 'heavy'; updateFacts(); };
            if (playBtn) playBtn.onclick = function () {
                state.playing = !state.playing;
                playBtn.textContent = state.playing ? 'Pause' : 'Play';
            };
            if (resetBtn) resetBtn.onclick = function () { reset(); updateFacts(); };
        }

        var ray = new THREE.Raycaster();
        var groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        shell.onClick = function (e) {
            ray.setFromCamera(shell.ndc(e), shell.camera);
            var hit = new THREE.Vector3();
            if (!ray.ray.intersectPlane(groundPlane, hit)) return;
            var mass = state.nextMass === 'heavy' ? 3.2 : 0.55;
            var color = state.nextMass === 'heavy' ? 0xba68c8 : 0x4dd0e1;
            var speed = 0.4 + Math.random() * 0.5;
            var ang = Math.random() * Math.PI * 2;
            addBody(hit.x, hit.z, mass, Math.cos(ang) * speed, Math.sin(ang) * speed, color);
            updateFacts();
        };

        reset();
        wire();
        updateFacts();
        t3dStatus('Click anywhere on the ground to add a body. Watch real pairwise gravity play out.');

        return function animate(dt) {
            dt = dt / 1000; // shell driver emits milliseconds; scene physics runs in seconds
            if (state.playing) {
                state.t += dt;
                for (var i = 0; i < bodies.length; i++) bodies[i].acc.set(0, 0, 0);
                for (var i = 0; i < bodies.length; i++) {
                    for (var j = i + 1; j < bodies.length; j++) {
                        var a = bodies[i], b = bodies[j];
                        var dx = b.pos.x - a.pos.x, dz = b.pos.z - a.pos.z;
                        var rSq = dx * dx + dz * dz + SOFTEN * SOFTEN;
                        var r = Math.sqrt(rSq);
                        var f = G_TEACH / (rSq * r);
                        var fx = f * dx, fz = f * dz;
                        a.acc.x += fx * b.mass;
                        a.acc.z += fz * b.mass;
                        b.acc.x -= fx * a.mass;
                        b.acc.z -= fz * a.mass;
                    }
                }
                for (var i = 0; i < bodies.length; i++) {
                    var body = bodies[i];
                    body.vel.x += body.acc.x * dt;
                    body.vel.z += body.acc.z * dt;
                    body.pos.x += body.vel.x * dt;
                    body.pos.z += body.vel.z * dt;
                    body.mesh.position.set(body.pos.x, 0, body.pos.z);

                    var idx = body.trailCount % (body.trailPositions.length / 3);
                    body.trailPositions[idx * 3] = body.pos.x;
                    body.trailPositions[idx * 3 + 1] = 0.02;
                    body.trailPositions[idx * 3 + 2] = body.pos.z;
                    body.trailCount = Math.min(body.trailCount + 1, body.trailPositions.length / 3);
                    body.trailGeo.setDrawRange(0, body.trailCount);
                    body.trailGeo.attributes.position.needsUpdate = true;
                }
                if (Math.floor(state.t * 3) !== Math.floor((state.t - dt) * 3)) updateFacts();
            }
        };
    }

    function t3dPlanetaryRingsComparison(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        var key = new THREE.DirectionalLight(0xfff3e0, 0.85);
        key.position.set(6, 12, 8);
        scene.add(key);

        // Ring-system literacy: Saturn 7 major rings (A-G), water ice, found
        // 1655 (Huygens). Uranus 13 known rings, dark carbon-rich, found 1977
        // via occultation. Neptune 5 main rings incl partial arcs, confirmed
        // 1989 (Voyager 2). Jupiter faint dusty ring, found 1979 (Voyager 1),
        // constantly replenished, age under 1 million years. Compressed scale

        var PLANETS = {

            saturn: { label: 'Saturn', color: 0xe0c68c, x: -1.5, ringInfo: '7 major named rings (A-G), almost entirely water ice', discovered: '1655 (Huygens)', count: 'Brightest and most massive ring system' },
            uranus: { label: 'Uranus', color: 0x9fe3e0, x: 1.5, ringInfo: '13 known rings, narrow and dark, carbon-rich', discovered: '1977 (stellar occultation)', count: 'Epsilon ring is the widest and most massive' },
            neptune: { label: 'Neptune', color: 0x3d5afe, x: 4.5, ringInfo: '5 main rings, including partial ring arcs', discovered: '1989 (Voyager 2 confirmed)', count: 'Faintest of the four ring systems' }
        };

                color: color, transparent: true, opacity: opacity, side: THREE.DoubleSide
            });

            mesh.rotation.x = -Math.PI / 2 + 0.35;

        }

        function buildRingArc(radius, color, opacity, startDeg, spanDeg) {
            var pts = [];
            var steps = 24;
            for (var i = 0; i <= steps; i++) {
                var deg = startDeg + (spanDeg * i / steps);
                var rad = deg * Math.PI / 180;
                pts.push(new THREE.Vector3(Math.cos(rad) * radius, 0, Math.sin(rad) * radius));
            }
            var line = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),

            );

            if (key === 'saturn') {

                g.add(buildRingBand(0.94, 1.05, 0xd8c090, 0.6));
            } else if (key === 'uranus') {
                g.add(buildRingBand(0.62, 0.66, 0x37474f, 0.55));
                g.add(buildRingBand(0.72, 0.75, 0x263238, 0.4));
                g.add(buildRingBand(0.85, 0.87, 0x1c2327, 0.35));
            } else if (key === 'neptune') {
                g.add(buildRingBand(0.6, 0.63, 0x5c6bc0, 0.25));
                g.add(buildRingArc(0.75, 0x9fa8da, 0.7, 20, 55));
                g.add(buildRingArc(0.75, 0x9fa8da, 0.7, 210, 40));
            } else if (key === 'jupiter') {
                g.add(buildRingBand(0.55, 0.62, 0xbcaaa4, 0.12));
            }

            var hi = new THREE.Mesh(
                new THREE.RingGeometry(1.15, 1.22, 32),
                new THREE.MeshBasicMaterial({ color: 0xffe082, transparent: true, opacity: 0, side: THREE.DoubleSide })
            );
            hi.rotation.x = -Math.PI / 2;
            g.add(hi);

            groups[key] = g;
            highlightRings[key] = hi;
        });

        function fmtFacts(key) {

            var html = '<h3>' + p.label + ' rings</h3>'
                + '<p>' + p.ringInfo + '.</p>'
                + '<table class="w3-table w3-bordered">'

                + '</table>'
                + '<p class="t3d-note">Compressed teaching lineup - ring width, brightness, and planet size are not to real relative scale. Distinct from Saturn Rings 3D, which is a single-planet deep dive.</p>';

    function t3dStarTrails(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02030a, 1);

        // Diurnal-motion literacy: sidereal day ~= 23h 56m 4s; rotation rate
        // 15 deg/hour around the celestial pole; circumpolar-circle radius
        // (stars that never set) equals the observer latitude in degrees.
        // Real 3D vector geometry - pole altitude = latitude, so stars closer
        // to the pole than the latitude stay above the horizon all night.
        var LAT_PRESETS = { equator: 0, midlat: 45, nearpole: 80 };
        var state = { latDeg: 45, playing: true, t: 0, speed: 1 };

        var root = new THREE.Group();
        scene.add(root);

        });

        var horizonRing = new THREE.LineLoop(
            new THREE.BufferGeometry().setFromPoints((function () {
                var pts = [];
                for (var i = 0; i <= 64; i++) {
                    var a = (i / 64) * Math.PI * 2;
                    pts.push(new THREE.Vector3(Math.cos(a) * 6, 0, Math.sin(a) * 6));
                }
                return pts;
            })()),
            new THREE.LineBasicMaterial({ color: 0x5c6bc0, transparent: true, opacity: 0.5 })
        );
        root.add(horizonRing);

        var poleMarker = new THREE.Mesh(
            new THREE.SphereGeometry(0.09, 10, 8),

        );

        var STAR_COUNT = 26;
        var MAX_TRAIL = 200;
        var R = 5.4;
        var stars = [];
        for (var i = 0; i < STAR_COUNT; i++) {
            var phiDeg = 6 + (i / STAR_COUNT) * 82;
            var thetaDeg = (i * 137.5) % 360;
            var brightness = 0.5 + Math.random() * 0.5;
            var color = new THREE.Color().setHSL(0.55 + Math.random() * 0.12, 0.25, 0.55 + brightness * 0.25);

            var positions = new Float32Array(MAX_TRAIL * 3);
            var geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setDrawRange(0, 0);
            var mat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.8 });

            root.add(line);

            var dot = new THREE.Mesh(
                new THREE.SphereGeometry(0.045, 6, 5),
                new THREE.MeshBasicMaterial({ color: color })
            );
            root.add(dot);

            stars.push({
                phiRad: phiDeg * Math.PI / 180,
                phiDeg: phiDeg,
                thetaRad: thetaDeg * Math.PI / 180,
                positions: positions, geo: geo, line: line, dot: dot,
                count: 0, wasVisible: true
            });
        }

        var poleDir = new THREE.Vector3();
        var uAxis = new THREE.Vector3();
        var vAxis = new THREE.Vector3();
        function rebuildAxes() {
            var latRad = state.latDeg * Math.PI / 180;
            poleDir.set(0, Math.sin(latRad), Math.cos(latRad)).normalize();
            uAxis.set(1, 0, 0).cross(poleDir).normalize();
            vAxis.copy(poleDir).cross(uAxis).normalize();
            poleMarker.position.copy(poleDir).multiplyScalar(R * 1.02);
        }
        rebuildAxes();

        function updateFacts() {
            var circumpolarCount = stars.filter(function (s) { return s.phiDeg <= state.latDeg; }).length;
            var html = '<h3>Star trails - diurnal motion literacy</h3>'
                + '<p>Earth spins once relative to the stars every sidereal day. Stars closer to the pole than your latitude never set - they trace full circles.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>Sidereal day</td><td>23h 56m 4s</td></tr>'
                + '<tr><td>Rotation rate</td><td>15 deg per hour around the pole</td></tr>'
                + '<tr><td>Circumpolar circle radius</td><td>equals latitude (' + state.latDeg + ' deg here)</td></tr>'
                + '<tr><td>Circumpolar stars shown</td><td>' + circumpolarCount + ' of ' + stars.length + '</td></tr>'
                + '</table>'
                + '<p class="t3d-note">Teaching diurnal-motion schematic with real pole-tilt geometry - not tonight sky and not a star catalog. Distinct from Constellation Sphere (static asterisms) and Sidereal vs Solar Day (day-length comparison).</p>';
            t3dInfo(html);
        }

        function resetTrails() {
            for (var i = 0; i < stars.length; i++) {
                stars[i].count = 0;
                stars[i].geo.setDrawRange(0, 0);
            }
            state.t = 0;
        }

            var eqBtn = document.getElementById('t3dTrailsEqBtn');
            var midBtn = document.getElementById('t3dTrailsMidBtn');
            var poleBtn = document.getElementById('t3dTrailsPoleBtn');
            var playBtn = document.getElementById('t3dTrailsPlayBtn');
            var resetBtn = document.getElementById('t3dTrailsResetBtn');
            function setLat(v) { state.latDeg = v; rebuildAxes(); resetTrails(); updateFacts(); }
            if (eqBtn) eqBtn.onclick = function () { setLat(LAT_PRESETS.equator); };
            if (midBtn) midBtn.onclick = function () { setLat(LAT_PRESETS.midlat); };
            if (poleBtn) poleBtn.onclick = function () { setLat(LAT_PRESETS.nearpole); };
            if (playBtn) playBtn.onclick = function () {

                playBtn.textContent = state.playing ? 'Pause' : 'Play';
            };
            if (resetBtn) resetBtn.onclick = function () { resetTrails(); updateFacts(); };
        }

        wire();
        updateFacts();
        t3dStatus('Long-exposure trails build up around the pole. Stars beyond the latitude circle dip below the horizon and their trails pause.');

        var tmp = new THREE.Vector3();
        return function animate(dt) {
            if (state.playing) state.t += dt * state.speed;
            var rateRadPerSec = (15 * Math.PI / 180) / 12;
            for (var i = 0; i < stars.length; i++) {
                var s = stars[i];
                var theta = s.thetaRad + state.t * rateRadPerSec;
                tmp.copy(poleDir).multiplyScalar(Math.cos(s.phiRad));
                tmp.addScaledVector(uAxis, Math.cos(theta) * Math.sin(s.phiRad));
                tmp.addScaledVector(vAxis, Math.sin(theta) * Math.sin(s.phiRad));
                tmp.multiplyScalar(R);
                var visible = tmp.y > 0.02;
                s.dot.visible = visible;
                s.dot.position.copy(tmp);
                if (visible && state.playing) {
                    var idx = s.count % (s.positions.length / 3);
                    s.positions[idx * 3] = tmp.x;
                    s.positions[idx * 3 + 1] = tmp.y;
                    s.positions[idx * 3 + 2] = tmp.z;
                    s.count = Math.min(s.count + 1, s.positions.length / 3);
                    s.geo.setDrawRange(0, s.count);
                    s.geo.attributes.position.needsUpdate = true;
                }
            }
        };
    }

    function t3dExpandingUniverse(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03040d, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.55));

        // Hubble Law literacy: v = H0 * d. H0 ~= 67.4 (Planck CMB) to ~73.5
        // (SH0ES distance-ladder) km/s/Mpc - the Hubble tension. Age ~13.8 Gyr.
        // The grid stretches uniformly (space itself expands) - distinct from a
        // single moving light source Doppler-shifting through static space.
        var H0_LOW = 67.4, H0_HIGH = 73.5;
        var state = { playing: true, scale: 1, t: 0, showVectors: true };

        var root = new THREE.Group();
        scene.add(root);

        var galaxies = [];
        var GRID = 4;
        var SPAN = 3.2;
        var galGroup = new THREE.Group();
        root.add(galGroup);
        for (var ix = -GRID; ix <= GRID; ix++) {
            for (var iy = -GRID; iy <= GRID; iy++) {
                for (var iz = -GRID; iz <= GRID; iz++) {
                    if (ix === 0 && iy === 0 && iz === 0) continue;
                    if (Math.random() > 0.34) continue;
                    var base = new THREE.Vector3(
                        (ix / GRID) * SPAN,
                        (iy / GRID) * SPAN,
                        (iz / GRID) * SPAN
                    );
                    var isFar = base.length() > SPAN * 0.62;
                    var geo = new THREE.SphereGeometry(isFar ? 0.05 : 0.07, shell.low ? 6 : 8, shell.low ? 5 : 6);
                    var mat = new THREE.MeshBasicMaterial({ color: isFar ? 0xff8a65 : 0x81d4fa });
                    var mesh = new THREE.Mesh(geo, mat);
                    galGroup.add(mesh);
                    galaxies.push({ mesh: mesh, base: base, isFar: isFar });
                }
            }
        }

        var observer = new THREE.Mesh(
            new THREE.SphereGeometry(0.1, shell.low ? 10 : 14, shell.low ? 8 : 10),
            new THREE.MeshBasicMaterial({ color: 0xffe082 })
        );
        root.add(observer);

        var vectorGroup = new THREE.Group();
        root.add(vectorGroup);
        var vectorLines = [];
        var SAMPLE_COUNT = 5;
        for (var i = 0; i < SAMPLE_COUNT && i < galaxies.length; i++) {
            var g = galaxies[Math.floor((i + 1) * galaxies.length / (SAMPLE_COUNT + 1))];
            if (!g) continue;
            var lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), g.base.clone()]);
            var lineMat = new THREE.LineBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.5 });
            var line = new THREE.Line(lineGeo, lineMat);
            vectorGroup.add(line);
            vectorLines.push({ line: line, target: g.base });
        }

        function mpcForDistanceUnit(d) {
            // Teaching scale: one scene unit stands in for 200 Mpc so the
            // literacy numbers stay in a familiar range - not a real parallax.
            return d * 200;
        }

        function updateFacts() {
            var farGal = galaxies.filter(function (g) { return g.isFar; })[0];
            var nearGal = galaxies.filter(function (g) { return !g.isFar; })[0];
            var dFar = farGal ? mpcForDistanceUnit(farGal.base.length()) : 0;
            var dNear = nearGal ? mpcForDistanceUnit(nearGal.base.length()) : 0;
            var vFarLow = (H0_LOW * dFar / 1000).toFixed(0);
            var vFarHigh = (H0_HIGH * dFar / 1000).toFixed(0);
            var vNearLow = (H0_LOW * dNear / 1000).toFixed(0);
            var html = '<h3>Expanding universe - Hubble Law literacy</h3>'

        };

    function t3dGravitationalWaves(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x05070f, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.45));
        var key = new THREE.DirectionalLight(0xe3f2fd, 0.85);
        key.position.set(6, 14, 8);
        scene.add(key);

        // GW150914 literacy (LIGO 2015): 36+29 -> 62 Msun; ~410 Mpc (~1.3B ly);
        // peak strain ~1e-21; chirp ~35-150 Hz. Teaching chirp - not a GR solver.
        var state = { playing: true, speed: 1, showRings: true, t: 0, phase: 0 };

        var root = new THREE.Group();
        scene.add(root);

        var grid = new THREE.Group();
        root.add(grid);
        var n = shell.low ? 10 : 16;
        var span = 8;
        for (var i = 0; i <= n; i++) {
            var u = -span + (2 * span * i / n);
            var ptsX = [], ptsZ = [];
            for (var j = 0; j <= n; j++) {
                var v = -span + (2 * span * j / n);
                ptsX.push(new THREE.Vector3(u, 0, v));
                ptsZ.push(new THREE.Vector3(v, 0, u));
            }
            var gmat = new THREE.LineBasicMaterial({ color: 0x455a64, transparent: true, opacity: 0.55 });
            grid.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(ptsX), gmat));
            grid.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(ptsZ), gmat.clone()));
        }

        var bhMatA = new THREE.MeshLambertMaterial({ color: 0x212121, emissive: 0x311b92, emissiveIntensity: 0.35 });
        var bhMatB = new THREE.MeshLambertMaterial({ color: 0x263238, emissive: 0x4a148c, emissiveIntensity: 0.3 });
        var bhA = new THREE.Mesh(new THREE.SphereGeometry(0.42, shell.low ? 12 : 20, shell.low ? 10 : 16), bhMatA);
        var bhB = new THREE.Mesh(new THREE.SphereGeometry(0.34, shell.low ? 12 : 20, shell.low ? 10 : 16), bhMatB);
        root.add(bhA);
        root.add(bhB);

        var rings = [];
        var ringGroup = new THREE.Group();
        root.add(ringGroup);
        function spawnRing(phaseBoost) {
            var geo = new THREE.RingGeometry(0.2, 0.28, shell.low ? 24 : 40);
            var mat = new THREE.MeshBasicMaterial({
                color: 0x80deea, transparent: true, opacity: 0.55,
                side: THREE.DoubleSide, depthWrite: false
            });
            var mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.userData = { age: 0, phase0: state.phase + (phaseBoost || 0) };
            ringGroup.add(mesh);
            rings.push(mesh);
        }

        function orbitRadius(phase) {
            // Shrinks as chirp progresses (teaching inspiral).
            return 2.4 * Math.max(0.35, 1 - 0.55 * phase);
        }
        function strainAmp(phase) {
            return 0.12 + 0.55 * phase * phase;
        }
        function freqHz(phase) {
            return 35 + 115 * phase; // ~35 -> ~150 Hz teaching sweep
        }

        function updateFacts() {
            var f = freqHz(state.phase).toFixed(0);
            var html = '<h3>Gravitational waves - chirp literacy</h3>'
                + '<p>Two black holes spiral inward and emit a rising <b>chirp</b>. '
                + 'Ripple rings are exaggerated so the strain pattern is visible on one screen.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>GW150914</td><td>2015-09-14 (LIGO Hanford + Livingston)</td></tr>'
                + '<tr><td>Component masses</td><td>~36 + ~29 Msun</td></tr>'
                + '<tr><td>Final mass</td><td>~62 Msun (rest radiated as waves)</td></tr>'
                + '<tr><td>Distance</td><td>~410 Mpc (~1.3 billion ly)</td></tr>'
                + '<tr><td>Peak strain h</td><td>~1 x 10^-21</td></tr>'
                + '<tr><td>Chirp band</td><td>~35 Hz to ~150 Hz</td></tr>'
                + '<tr><td>On-screen frequency cue</td><td>~' + f + ' Hz (teaching scrub)</td></tr>'
                + '</table>'
                + '<p class="t3d-note">Educational chirp schematic - not a numerical-relativity waveform solver. '
                + 'Ring sizes exaggerate strain (~1e-21 at Earth) so the pattern is readable.</p>';
            t3dInfo(html);
        }

        function wire() {
            var play = document.getElementById('t3dGwPlayBtn');
            var slow = document.getElementById('t3dGwSlowBtn');
            var fast = document.getElementById('t3dGwFastBtn');
            var ringsBtn = document.getElementById('t3dGwRingsBtn');
            var reset = document.getElementById('t3dGwResetBtn');
            if (play) play.onclick = function () {
                state.playing = !state.playing;
                play.textContent = state.playing ? 'Pause' : 'Play';
            };
            if (slow) slow.onclick = function () { state.speed = 0.45; };
            if (fast) fast.onclick = function () { state.speed = 1.6; };
            if (ringsBtn) ringsBtn.onclick = function () {
                state.showRings = !state.showRings;
                ringGroup.visible = state.showRings;
                ringsBtn.textContent = state.showRings ? 'Hide rings' : 'Show rings';
            };
            if (reset) reset.onclick = function () {
                state.phase = 0;
                state.t = 0;
                while (rings.length) {
                    var r = rings.pop();
                    ringGroup.remove(r);
                    r.geometry.dispose();
                    r.material.dispose();
                }
                updateFacts();
            };
        }

        var lastSpawn = 0;
        wire();
        updateFacts();
        t3dStatus('Play the chirp - rings expand as frequency rises toward merger.');

        return function animate(dt) {
            if (state.playing) {
                state.t += dt * state.speed;
                state.phase = Math.min(1, state.phase + dt * state.speed * 0.12);
            }
            var R = orbitRadius(state.phase);
            var ang = state.t * (1.2 + 3.5 * state.phase);
            bhA.position.set(Math.cos(ang) * R * 0.55, 0.15, Math.sin(ang) * R * 0.55);
            bhB.position.set(Math.cos(ang + Math.PI) * R * 0.45, 0.12, Math.sin(ang + Math.PI) * R * 0.45);

            // Soft grid bobble - exaggerated strain cue.
            var amp = strainAmp(state.phase);
            var wob = Math.sin(state.t * (4 + 10 * state.phase)) * amp * 0.08;
            grid.scale.set(1 + wob, 1, 1 - wob * 0.6);

            if (state.playing && state.showRings && state.t - lastSpawn > Math.max(0.18, 0.55 - 0.35 * state.phase)) {
                spawnRing(0);
                lastSpawn = state.t;
            }
            for (var i = rings.length - 1; i >= 0; i--) {
                var mesh = rings[i];
                mesh.userData.age += dt * state.speed;
                var s = 0.4 + mesh.userData.age * (2.2 + 2.5 * state.phase);
                mesh.scale.set(s, s, s);
                mesh.material.opacity = Math.max(0, 0.55 - mesh.userData.age * 0.35);
                if (mesh.userData.age > 1.8) {
                    ringGroup.remove(mesh);
                    mesh.geometry.dispose();
                    mesh.material.dispose();
                    rings.splice(i, 1);
                }
            }
            if (Math.floor(state.t * 2) !== Math.floor((state.t - dt) * 2)) updateFacts();
        };
    }

    function t3dSpacetimeCurvature(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x04060d, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        var key = new THREE.DirectionalLight(0xe8eaf6, 0.9);
        key.position.set(8, 16, 10);
        scene.add(key);

        // Curved-spacetime literacy: r_s = 2GM/c^2; Sun ~2.95 km; Earth ~8.87 mm.
        // Teaching grid + geodesics - not a Schwarzschild metric solver.
        var BODIES = {
            earth: { label: 'Earth', rsKm: 8.87e-6, depth: 0.55, color: 0x42a5f5 },
            sun: { label: 'Sun', rsKm: 2.95, depth: 1.35, color: 0xffe082 },
            bh: { label: '10 Msun BH', rsKm: 29.5, depth: 2.4, color: 0xce93d8 }
        };
        var state = { body: 'sun', showGeodesics: true, showRs: true, t: 0 };

        var root = new THREE.Group();
        scene.add(root);

        var gridGroup = new THREE.Group();
        root.add(gridGroup);
        var geoGroup = new THREE.Group();
        root.add(geoGroup);
        var mass = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, shell.low ? 16 : 24, shell.low ? 12 : 18),
            new THREE.MeshLambertMaterial({ color: 0xffe082, emissive: 0x4e342e, emissiveIntensity: 0.35 })
        );
        root.add(mass);
        var rsRing = null;

        function depthFor(r, body) {
            var d = BODIES[body].depth;
            var soft = 0.55;
            return -d * Math.exp(-(r * r) / (2.8 * soft * soft));
        }

        function rebuildGrid() {
            while (gridGroup.children.length) {
                var ch = gridGroup.children.pop();
                if (ch.geometry) ch.geometry.dispose();
                if (ch.material) ch.material.dispose();
            }
            var n = shell.low ? 14 : 22;
            var span = 9;
            for (var i = 0; i <= n; i++) {

                var ptsX = [], ptsZ = [];
                for (var j = 0; j <= n; j++) {

                    var r2 = Math.sqrt(v * v + u * u);

                gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(ptsX), mat));
                gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(ptsZ), mat.clone()));
            }
            mass.material.color.setHex(BODIES[state.body].color);
            mass.position.y = depthFor(0, state.body) + 0.35;

        function rebuildRs() {
            if (rsRing) { root.remove(rsRing); rsRing.geometry.dispose(); rsRing.material.dispose(); rsRing = null; }
            if (!state.showRs) return;
            // Exaggerated teaching ring - real r_s is tiny vs orbital scales on this diagram.
            var rad = 0.85 + BODIES[state.body].depth * 0.15;
            var pts = [];
            var n = shell.low ? 36 : 56;
            for (var i = 0; i <= n; i++) {
                var a = (i / n) * Math.PI * 2;

                    var x = x0 * (1 - pull / (Math.abs(x0) + 2.2));
                    var r = Math.sqrt(x * x + z * z);
                    pts.push(new THREE.Vector3(x, depthFor(r, state.body) + 0.12, z));

                geoGroup.add(new THREE.Line(

    function t3dLightCone(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x05070f, 1);

        var key = new THREE.DirectionalLight(0xe3f2fd, 0.85);

        scene.add(key);

        // Minkowski teaching diagram: ct vertical, x horizontal.
        // Null lines at 45 deg when units are chosen so c=1. Literacy: c=299,792.458 km/s.
        var C_KMS = 299792.458;
        var state = { eventX: 2.4, eventT: 1.2, showPast: true, showFuture: true, showElsewhere: true, t: 0 };

        var root = new THREE.Group();
        scene.add(root);

        // Axes: x (space) and ct (time)
        function axisLine(a, b, color) {
            return new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([a, b]),
                new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.85 })
            );
        }
        root.add(axisLine(new THREE.Vector3(-8, 0, 0), new THREE.Vector3(8, 0, 0), 0x90a4ae));
        root.add(axisLine(new THREE.Vector3(0, -8, 0), new THREE.Vector3(0, 8, 0), 0xb0bec5));

        var origin = new THREE.Mesh(
            new THREE.SphereGeometry(0.18, 12, 10),
            new THREE.MeshBasicMaterial({ color: 0xffecb3 })
        );
        root.add(origin);

        var futureCone = null;
        var pastCone = null;
        var elsewhereGroup = new THREE.Group();
        root.add(elsewhereGroup);
        var probe = new THREE.Mesh(
            new THREE.SphereGeometry(0.16, 10, 8),
            new THREE.MeshBasicMaterial({ color: 0x4fc3f7 })
        );
        root.add(probe);
        var probeLink = null;

        function makeConeMesh(up, color) {
            // Open double-napped cone: radius grows with |ct| at 45 deg (c=1 units)
            var h = 6.5;
            var geo = new THREE.ConeGeometry(h, h, shell.low ? 24 : 40, 1, true);
            var mat = new THREE.MeshBasicMaterial({
                color: color, wireframe: true, transparent: true, opacity: 0.55, side: THREE.DoubleSide
            });
            var mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = up ? h / 2 : -h / 2;
            if (!up) mesh.rotation.x = Math.PI;
            return mesh;
        }

        function rebuildCones() {
            if (futureCone) { root.remove(futureCone); futureCone.geometry.dispose(); futureCone.material.dispose(); }
            if (pastCone) { root.remove(pastCone); pastCone.geometry.dispose(); pastCone.material.dispose(); }
            futureCone = makeConeMesh(true, 0x81c784);
            pastCone = makeConeMesh(false, 0xff8a65);
            futureCone.visible = state.showFuture;
            pastCone.visible = state.showPast;
            root.add(futureCone);
            root.add(pastCone);
        }

        function rebuildElsewhere() {
            while (elsewhereGroup.children.length) {
                var ch = elsewhereGroup.children.pop();
                if (ch.geometry) ch.geometry.dispose();
                if (ch.material) ch.material.dispose();
            }
            if (!state.showElsewhere) return;
            // Sample markers in spacelike region |x| > |ct|
            var pts = [];

                var x = (Math.random() - 0.5) * 14;
                var ct = (Math.random() - 0.5) * 10;

            if (absT > absX) return ct >= 0 ? 'timelike future' : 'timelike past';
            return 'spacelike (elsewhere)';
        }

        function rebuildProbe() {
            probe.position.set(state.eventX, state.eventT, 0);
            if (probeLink) { root.remove(probeLink); probeLink.geometry.dispose(); probeLink.material.dispose(); }
            probeLink = axisLine(new THREE.Vector3(0, 0, 0), probe.position.clone(), 0x4fc3f7);
            root.add(probeLink);

        function factsHtml() {
            return '<h3>Light cone (Minkowski teaching diagram)</h3>'
                + '<p>In units where <b>c = 1</b>, light traces <b>45 deg</b> null lines. Absolute speed of light <b>c = 299,792.458 km/s</b>. Regions: future / past (timelike) and elsewhere (spacelike).</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Speed of light c</td><td>299,792.458 km/s</td><td>Exact SI-defined literacy</td></tr>'
                + '<tr><td>Null lines</td><td>45 deg (c=1 units)</td><td>Light-like paths on this diagram</td></tr>'
                + '<tr><td>Probe event</td><td>x=' + state.eventX.toFixed(2) + ', ct=' + state.eventT.toFixed(2) + '</td><td>' + causalLabel() + '</td></tr>'
                + '<tr><td>Regions</td><td>past / future / elsewhere</td><td>Causal structure of flat spacetime</td></tr>'

                + '<p class="t3d-note">Educational Minkowski diagram - not a curved-spacetime solver. Axes are teaching coordinates (ct vs x), not a GR geodesic integrator.</p>';
        }
        function updateFacts() {
            t3dInfo(factsHtml());
            t3dStatus('c = 299,792.458 km/s - null lines at 45 deg (c=1) - probe is ' + causalLabel() + '.');
        }

        rebuildCones();
        rebuildElsewhere();
        rebuildProbe();

        var xEl = document.getElementById('t3dConeX');
        if (xEl) xEl.addEventListener('input', function () {
            state.eventX = Math.min(6, Math.max(-6, parseFloat(xEl.value || '0')));

        });
        var tEl = document.getElementById('t3dConeT');
        if (tEl) tEl.addEventListener('input', function () {
            state.eventT = Math.min(6, Math.max(-6, parseFloat(tEl.value || '0')));

        [['t3dConeFutureBtn', 'showFuture', 'Future cone'], ['t3dConePastBtn', 'showPast', 'Past cone'], ['t3dConeElseBtn', 'showElsewhere', 'Elsewhere']].forEach(function (row) {
            var btn = document.getElementById(row[0]);

        if (lightBtn) lightBtn.addEventListener('click', function () {
            // Place probe on the future null ray at 45 deg
            state.eventX = 3.2;
            state.eventT = 3.2;
            if (xEl) xEl.value = String(state.eventX);
            if (tEl) tEl.value = String(state.eventT);
            rebuildProbe();
        });

        return function animate(dt) {
            state.t += dt;
            root.rotation.y = Math.sin(state.t * 0.00008) * 0.12;
            shell.applyCamera();
        };
    }

    function t3dJupiterMagnetosphere(shell) {

    function t3dKuiperBeltOortCloud(shell) {

            var pts = [];

            for (var i = 0; i <= n; i++) {

            var t = (Math.log10(au) - Math.log10(OORT_IN)) / (Math.log10(OORT_OUT) - Math.log10(OORT_IN));
            return 6.2 + t * 5.3;

        for (var oi = 0; oi < oN; oi++) {

            leonids: { name: 'Leonids', peak: 'Nov 17-18', zhr: 'variable', parent: '55P/Tempel-Tuttle', radiant: { az: 102, alt: 56 }, color: 0xffc46b }
        };

        scene.add(root);

        var starPts = [];
        for (var i = 0; i < 220; i++) {
            var th = i * 2.399963 + (i % 11) * 0.07;

        );

        radiantMarker.add(radiantRing);
        root.add(radiantMarker);

        var meteorGroup = new THREE.Group();
        root.add(meteorGroup);
        var meteors = [];

        function radiantVector() {
            var cfg = SHOWERS[state.shower].radiant;
            var az = cfg.az * Math.PI / 180;
            var alt = cfg.alt * Math.PI / 180;
            return new THREE.Vector3(
                Math.sin(az) * Math.cos(alt),
                Math.sin(alt),
                -Math.cos(az) * Math.cos(alt)
            ).normalize();
        }

        function rebuildMeteorField() {
            while (meteorGroup.children.length) meteorGroup.remove(meteorGroup.children[0]);
            meteors = [];
            var rv = radiantVector();
            var color = SHOWERS[state.shower].color;
            radiantMarker.position.copy(rv.clone().multiplyScalar(10.5));
            radiantMarker.lookAt(radiantMarker.position.clone().multiplyScalar(2));
            for (var i = 0; i < 22; i++) {
                var spread = 0.15 + (i % 5) * 0.018;
                var basisA = new THREE.Vector3(rv.z, 0, -rv.x).normalize();
                if (basisA.lengthSq() < 0.01) basisA.set(1, 0, 0);
                var basisB = new THREE.Vector3().crossVectors(rv, basisA).normalize();
                var ax = ((i * 37) % 100) / 100 - 0.5;
                var ay = ((i * 73) % 100) / 100 - 0.5;
                var dir = rv.clone()
                    .add(basisA.clone().multiplyScalar(ax * spread))
                    .add(basisB.clone().multiplyScalar(ay * spread))
                    .normalize();
                var start = dir.clone().multiplyScalar(13.2 + (i % 6) * 0.7);
                var end = start.clone().add(dir.clone().multiplyScalar(-3.4 - (i % 4) * 0.45));
                var geom = new THREE.BufferGeometry().setFromPoints([start, end]);
                var line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.82 }));
                meteorGroup.add(line);
                meteors.push({ line: line, dir: dir, baseStart: start, len: start.distanceTo(end), phase: i / 22 });
            }
        }

            if (state.playing) state.t += dt * 0.00022 * state.speed;
            for (var i = 0; i < meteors.length; i++) {
                var m = meteors[i];
                var slide = ((state.t + m.phase) % 1);
                var head = m.baseStart.clone().add(m.dir.clone().multiplyScalar(-slide * 8.6));
                var tail = head.clone().add(m.dir.clone().multiplyScalar(-m.len * state.trail));
                m.line.geometry.setFromPoints([head, tail]);
                m.line.geometry.attributes.position.needsUpdate = true;

        function factsHtml() {

            return '<h3>Meteor shower radiant (' + cfg.name + ')</h3>'
                + '<p>Meteors in one shower travel on nearly parallel paths in space, but perspective makes them appear to radiate from a single point on the sky. This page contrasts the <b>' + cfg.name + '</b> radiant with the local horizon.</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'

                + '<tr><td>Perseid parent</td><td>109P/Swift-Tuttle</td><td>Dust stream source</td></tr>'
                + '<tr><td>Leonid parent</td><td>55P/Tempel-Tuttle</td><td>Second contrast shower</td></tr>'
                + '<tr><td>Current radiant</td><td>' + cfg.name + '</td><td>Az ' + cfg.radiant.az + ' deg, alt ' + cfg.radiant.alt + ' deg teaching sky</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational perspective-geometry sky scene - not a real-time meteor forecast. Meteors are stylized parallel streaks, not a live shower simulator.</p>';
        }

        function updateFacts() {
            var cfg = SHOWERS[state.shower];
            t3dInfo(factsHtml());
            t3dStatus(cfg.name + ' radiant - peak ' + cfg.peak + ' - parent ' + cfg.parent
                + ' - speed ' + state.speed.toFixed(2)
                + (state.playing ? ' - playing' : ' - paused') + '.');
        }

        rebuildMeteorField();
        updateFacts();

        var typeEl = document.getElementById('t3dMeteorShowerType');
        if (typeEl) typeEl.addEventListener('change', function () {
            state.shower = typeEl.value || 'perseids';
            rebuildMeteorField();
            updateFacts();
        });
        var speedEl = document.getElementById('t3dMeteorSpeed');
        if (speedEl) speedEl.addEventListener('input', function () {
            state.speed = Math.min(2.5, Math.max(0.4, parseFloat(speedEl.value || '1')));
            updateFacts();
        });
        var trailEl = document.getElementById('t3dMeteorTrail');
        if (trailEl) trailEl.addEventListener('input', function () {
            state.trail = Math.min(1.1, Math.max(0.35, parseFloat(trailEl.value || '0.65')));
            updateFacts();
        });
        var playBtn = document.getElementById('t3dMeteorPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            state.playing = !state.playing;
            playBtn.textContent = state.playing ? 'Pause streaks' : 'Play streaks';
            updateFacts();
        });

            if (Math.floor(state.t * 1000 / 450) !== Math.floor((state.t * 1000 - dt) / 450)) updateFacts();
            shell.applyCamera();

    function t3dThreeBodyProblem(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.45));
        var key = new THREE.DirectionalLight(0xfff2d6, 0.95);
        key.position.set(6, 10, 4);
        scene.add(key);

        // Chenciner-Montgomery figure-8 choreography (equal masses, G=1 units).
        // Classic IC published for the planar figure-8 periodic solution (2000).
        var state = { speed: 1.0, playing: true, t: 0, trailLen: shell.low ? 180 : 320, kick: 0 };

        var root = new THREE.Group();
        scene.add(root);

        // Bodies: equal mass teaching case
        var colors = [0xff8a80, 0x80cbc4, 0xffd54f];
        var bodies = [];
        var trails = [];
        var trailMeshes = [];
        for (var bi = 0; bi < 3; bi++) {
            var mesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.28, shell.low ? 14 : 22, shell.low ? 12 : 18),
                new THREE.MeshLambertMaterial({ color: colors[bi], emissive: colors[bi], emissiveIntensity: 0.18 })
            );
            root.add(mesh);
            bodies.push({ mesh: mesh, x: 0, y: 0, z: 0, vx: 0, vy: 0, vz: 0, m: 1 });
            trails.push([]);
            var tGeom = new THREE.BufferGeometry();
            var tPos = new Float32Array(state.trailLen * 3);
            tGeom.setAttribute('position', new THREE.BufferAttribute(tPos, 3));
            var tLine = new THREE.Line(tGeom, new THREE.LineBasicMaterial({
                color: colors[bi], transparent: true, opacity: 0.75
            }));
            root.add(tLine);
            trailMeshes.push({ geom: tGeom, line: tLine, pos: tPos });
        }

        function resetIC() {
            // Figure-8 initial conditions (planar; y-axis = screen vertical)
            var x1 = 0.97000436, y1 = -0.24308753;
            var vx1 = 0.4662036850, vy1 = 0.4323657300;
            bodies[0].x = x1; bodies[0].y = y1; bodies[0].z = 0;
            bodies[1].x = -x1; bodies[1].y = -y1; bodies[1].z = 0;
            bodies[2].x = 0; bodies[2].y = 0; bodies[2].z = 0;
            bodies[0].vx = vx1; bodies[0].vy = vy1; bodies[0].vz = 0;
            bodies[1].vx = vx1; bodies[1].vy = vy1; bodies[1].vz = 0;
            bodies[2].vx = -2 * vx1; bodies[2].vy = -2 * vy1; bodies[2].vz = 0;
            // optional tiny kick to show sensitivity (slider 0..1 maps to small dv)
            if (state.kick > 0) {
                bodies[0].vx += state.kick * 0.02;
                bodies[0].vy += state.kick * 0.01;
            }
            for (var ti = 0; ti < 3; ti++) trails[ti] = [];
            placeBodies();
            updateTrails();
        }

        function accel(parts) {
            var out = [];
            for (var i = 0; i < 3; i++) out.push({ ax: 0, ay: 0, az: 0 });
            for (i = 0; i < 3; i++) {
                for (var j = i + 1; j < 3; j++) {
                    var dx = parts[j].x - parts[i].x;
                    var dy = parts[j].y - parts[i].y;
                    var dz = parts[j].z - parts[i].z;
                    var r2 = dx * dx + dy * dy + dz * dz + 1e-8;
                    var r = Math.sqrt(r2);
                    var f = 1 / (r2 * r); // G=1, m=1
                    out[i].ax += f * dx; out[i].ay += f * dy; out[i].az += f * dz;
                    out[j].ax -= f * dx; out[j].ay -= f * dy; out[j].az -= f * dz;
                }
            }
            return out;
        }

        function snapshot() {
            return bodies.map(function (b) {
                return { x: b.x, y: b.y, z: b.z, vx: b.vx, vy: b.vy, vz: b.vz, m: b.m };
            });
        }

        function rk4Step(h) {
            var p0 = snapshot();
            var a0 = accel(p0);
            var p1 = p0.map(function (b, i) {
                return {
                    x: b.x + 0.5 * h * b.vx, y: b.y + 0.5 * h * b.vy, z: b.z + 0.5 * h * b.vz,
                    vx: b.vx + 0.5 * h * a0[i].ax, vy: b.vy + 0.5 * h * a0[i].ay, vz: b.vz + 0.5 * h * a0[i].az, m: 1
                };
            });
            var a1 = accel(p1);
            var p2 = p0.map(function (b, i) {
                return {
                    x: b.x + 0.5 * h * p1[i].vx, y: b.y + 0.5 * h * p1[i].vy, z: b.z + 0.5 * h * p1[i].vz,
                    vx: b.vx + 0.5 * h * a1[i].ax, vy: b.vy + 0.5 * h * a1[i].ay, vz: b.vz + 0.5 * h * a1[i].az, m: 1
                };
            });
            var a2 = accel(p2);
            var p3 = p0.map(function (b, i) {
                return {
                    x: b.x + h * p2[i].vx, y: b.y + h * p2[i].vy, z: b.z + h * p2[i].vz,
                    vx: b.vx + h * a2[i].ax, vy: b.vy + h * a2[i].ay, vz: b.vz + h * a2[i].az, m: 1
                };
            });
            var a3 = accel(p3);
            for (var i = 0; i < 3; i++) {
                bodies[i].x = p0[i].x + (h / 6) * (p0[i].vx + 2 * p1[i].vx + 2 * p2[i].vx + p3[i].vx);
                bodies[i].y = p0[i].y + (h / 6) * (p0[i].vy + 2 * p1[i].vy + 2 * p2[i].vy + p3[i].vy);
                bodies[i].z = p0[i].z + (h / 6) * (p0[i].vz + 2 * p1[i].vz + 2 * p2[i].vz + p3[i].vz);
                bodies[i].vx = p0[i].vx + (h / 6) * (a0[i].ax + 2 * a1[i].ax + 2 * a2[i].ax + a3[i].ax);
                bodies[i].vy = p0[i].vy + (h / 6) * (a0[i].ay + 2 * a1[i].ay + 2 * a2[i].ay + a3[i].ay);
                bodies[i].vz = p0[i].vz + (h / 6) * (a0[i].az + 2 * a1[i].az + 2 * a2[i].az + a3[i].az);
            }
        }

        function placeBodies() {
            var scale = 3.6;
            for (var i = 0; i < 3; i++) {
                bodies[i].mesh.position.set(bodies[i].x * scale, bodies[i].y * scale, bodies[i].z * scale);
            }
        }

        function updateTrails() {
            for (var i = 0; i < 3; i++) {
                var tr = trails[i];
                tr.push(bodies[i].mesh.position.x, bodies[i].mesh.position.y, bodies[i].mesh.position.z);
                while (tr.length > state.trailLen * 3) {
                    tr.shift(); tr.shift(); tr.shift();
                }
                var pos = trailMeshes[i].pos;
                for (var k = 0; k < pos.length; k++) pos[k] = tr[k] !== undefined ? tr[k] : 0;
                trailMeshes[i].geom.attributes.position.needsUpdate = true;
                trailMeshes[i].geom.setDrawRange(0, Math.floor(tr.length / 3));
            }
        }

        function updateFacts() {

    function t3dGravitationalSlingshot(shell) {

        // (order-of-magnitude teaching figure; hyperbolic flyby schematic).
        var DV_KMS = 10;
        var state = { peri: 2.8, phase: 0.35, playing: true, t: 0 };

        var root = new THREE.Group();
        scene.add(root);

        // Moving planet (Jupiter teaching stand-in)
        var planet = new THREE.Mesh(
            new THREE.SphereGeometry(1.6, shell.low ? 28 : 40, shell.low ? 20 : 28),

        var band = new THREE.Mesh(
            new THREE.TorusGeometry(1.62, 0.08, 8, shell.low ? 32 : 48),
            new THREE.MeshBasicMaterial({ color: 0xb8865a, transparent: true, opacity: 0.55 })
        );
        band.rotation.x = Math.PI / 2;
        root.add(band);

        // Planet velocity direction (prograde)
        var vPlanet = new THREE.Group();
        vPlanet.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(3.2, 0, 0)
            ]),
            new THREE.LineBasicMaterial({ color: 0x81c784 })
        ));
        var vHead = new THREE.Mesh(
            new THREE.ConeGeometry(0.22, 0.45, 10),
            new THREE.MeshBasicMaterial({ color: 0x81c784 })
        );
        vHead.position.set(3.2, 0, 0);
        vHead.rotation.z = -Math.PI / 2;
        vPlanet.add(vHead);
        root.add(vPlanet);

        // Hyperbolic flyby path (schematic in planet frame, then offset)
        var pathPts = [];
        var n = shell.low ? 80 : 120;
        for (var i = 0; i <= n; i++) {
            var u = (i / n) * 2 - 1; // -1..1 along flyby
            var x = u * 10;
            var z = state.peri * (1 + 0.15 * u * u) * (u < 0 ? 1 : -1) * Math.sign(1);
            // classic teaching hyperbola: approach from +z, bend, leave +x-ish
            var ang = u * 1.15;
            var r = state.peri / (1 + 0.55 * Math.cos(ang + 0.2));
            pathPts.push(new THREE.Vector3(Math.sin(ang) * r * 3.2, 0, Math.cos(ang) * r * 2.4));
        }
        var pathGeom = new THREE.BufferGeometry().setFromPoints(pathPts);
        var pathLine = new THREE.Line(pathGeom, new THREE.LineBasicMaterial({ color: 0x64b5f6, transparent: true, opacity: 0.9 }));
        root.add(pathLine);

        var craft = new THREE.Mesh(
            new THREE.ConeGeometry(0.22, 0.55, 8),
            new THREE.MeshBasicMaterial({ color: 0xfff176 })
        );
        craft.rotation.x = Math.PI / 2;
        root.add(craft);

        // Incoming / outgoing velocity ticks (schematic lengths)
        var vinGroup = new THREE.Group();
        var voutGroup = new THREE.Group();
        root.add(vinGroup);
        root.add(voutGroup);

        function rebuildPath() {
            pathPts = [];
            for (var i = 0; i <= n; i++) {
                var u = (i / n) * 2 - 1;
                var ang = u * 1.2;
                var e = 0.35 + (state.peri - 2.0) * 0.08;
                var r = Math.max(1.9, state.peri / (1 + e * Math.cos(ang)));
                pathPts.push(new THREE.Vector3(Math.sin(ang) * r * 2.8, 0.02 * Math.sin(i), Math.cos(ang) * r * 2.2));
            }
            pathGeom.setFromPoints(pathPts);
            pathGeom.attributes.position.needsUpdate = true;
        }

        function placeCraft() {
            var idx = Math.min(n, Math.max(0, Math.floor(state.phase * n)));
            var p = pathPts[idx];
            craft.position.copy(p);
            var p2 = pathPts[Math.min(n, idx + 1)];
            craft.lookAt(p2);
            // rebuild vin/vout ticks near ends
            while (vinGroup.children.length) vinGroup.remove(vinGroup.children[0]);
            while (voutGroup.children.length) voutGroup.remove(voutGroup.children[0]);
            var a0 = pathPts[2], a1 = pathPts[8];
            var b0 = pathPts[n - 8], b1 = pathPts[n - 2];
            vinGroup.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([a0, a1]),
                new THREE.LineBasicMaterial({ color: 0xef5350 })
            ));
            voutGroup.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([b0, b1]),
                new THREE.LineBasicMaterial({ color: 0xffb74d })
            ));
        }

        function factsHtml() {
            var gain = (DV_KMS * (1.15 - Math.min(0.35, (state.peri - 2.0) * 0.08))).toFixed(1);
            return '<h3>Gravitational slingshot (Voyager / Jupiter teaching case)</h3>'
                + '<p>A spacecraft on a hyperbolic flyby can leave with a higher heliocentric speed when it exits in the planet\'s velocity direction. Voyager\'s Jupiter assist is a classic literacy case at about <b>+10 km/s</b>.</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Teaching delta-v</td><td>~+' + DV_KMS + ' km/s</td><td>Voyager Jupiter assist order of magnitude</td></tr>'
                + '<tr><td>Periapsis scrub</td><td>' + state.peri.toFixed(2) + ' R</td><td>Closer flyby bends the hyperbola more</td></tr>'
                + '<tr><td>Schematic gain</td><td>~+' + gain + ' km/s</td><td>On-screen teaching scale only</td></tr>'
                + '<tr><td>Green arrow</td><td>planet velocity</td><td>Prograde direction of the planet</td></tr>'
                + '<tr><td>Blue path</td><td>hyperbolic flyby</td><td>Not a closed Hohmann ellipse</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational gravity-assist schematic - not an N-body ephemeris. Distinct from Hohmann Transfer 3D (two burns on ellipses) and Escape Velocity 3D (local launch speeds).</p>';
        }
        function updateFacts() {
            t3dInfo(factsHtml());
            t3dStatus('Gravity assist schematic - Voyager Jupiter ~+10 km/s - periapsis '
                + state.peri.toFixed(2) + ' R'
                + (state.playing ? ' - playing' : ' - paused') + '.');
        }

        rebuildPath();
        placeCraft();
        updateFacts();

        var periEl = document.getElementById('t3dSlingPeri');
        if (periEl) periEl.addEventListener('input', function () {
            state.peri = Math.min(5.5, Math.max(2.0, parseFloat(periEl.value || '2.8')));
            rebuildPath();
            placeCraft();
            updateFacts();
        });
        var phaseEl = document.getElementById('t3dSlingPhase');
        if (phaseEl) phaseEl.addEventListener('input', function () {
            state.phase = Math.min(1, Math.max(0, parseFloat(phaseEl.value || '0.35')));
            placeCraft();
            updateFacts();
        });
        var playBtn = document.getElementById('t3dSlingPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            state.playing = !state.playing;
            playBtn.textContent = state.playing ? 'Pause flyby' : 'Play flyby';
        });

        return function animate(dt) {
            state.t += dt;
            if (state.playing) {
                state.phase += dt * 0.00012;
                if (state.phase > 1) state.phase = 0;
                if (phaseEl) phaseEl.value = String(state.phase.toFixed(3));
            }
            // subtle planet drift to sell "moving planet" frame
            root.rotation.y = Math.sin(state.t * 0.00005) * 0.04;
            placeCraft();
            if (Math.floor(state.t / 400) !== Math.floor((state.t - dt) / 400)) updateFacts();
            shell.applyCamera();
        };
    }

    function t3dPlanetaryNebula(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x04060c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        var key = new THREE.DirectionalLight(0xe8f0ff, 0.85);
        key.position.set(6, 10, 8);
        scene.add(key);

        // Ring Nebula (M57) teaching figures: ~2,600 ly; shell ~20-30 km/s; white-dwarf core.
        var DIST_LY = 2600;
        var V_LO = 20;
        var V_HI = 30;
        var state = { ageKyr: 7, playing: true, showOuter: true, t: 0 };

        scene.add(root);

        );

            new THREE.MeshBasicMaterial({ color: 0x90caf9, transparent: true, opacity: 0.4 })
        );
        root.add(wdGlow);

        // Inner ionized shell (torus-like ring for Ring Nebula literacy)
        var inner = new THREE.Mesh(
            new THREE.TorusGeometry(2.2, 0.55, shell.low ? 10 : 16, shell.low ? 36 : 56),
            new THREE.MeshLambertMaterial({ color: 0x66bb6a, emissive: 0x1b5e20, emissiveIntensity: 0.35, transparent: true, opacity: 0.75 })
        );
        inner.rotation.x = Math.PI / 2.4;
        root.add(inner);

        // Outer halo shell
        var outer = new THREE.Mesh(
            new THREE.SphereGeometry(1, shell.low ? 18 : 28, shell.low ? 12 : 18),
            new THREE.MeshBasicMaterial({ color: 0x7e57c2, wireframe: true, transparent: true, opacity: 0.35 })
        );
        root.add(outer);

        // Shell particles
        var n = shell.low ? 70 : 120;
        var geo = new THREE.BufferGeometry();
        var pos = new Float32Array(n * 3);
        var base = [];
        for (var i = 0; i < n; i++) {
            var a = (i / n) * Math.PI * 2;
            var tilt = (Math.random() - 0.5) * 0.6;
            base.push({ a: a, tilt: tilt, r: 1.8 + Math.random() * 1.2 });
        }
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

    function t3dSolarAnalemma(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x0a1220, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.45));
        var key = new THREE.DirectionalLight(0xfff4d6, 1.05);
        key.position.set(6, 10, 8);
        scene.add(key);

        var OBLIQ = 23.44;
        var state = { day: 172, playing: true, showEot: true };

        var root = new THREE.Group();
        scene.add(root);

        // Sky dome grid (schematic celestial sphere slice)
        var dome = new THREE.Mesh(
            new THREE.SphereGeometry(14, shell.low ? 24 : 36, shell.low ? 16 : 24),
            new THREE.MeshBasicMaterial({ color: 0x152238, transparent: true, opacity: 0.35, side: THREE.BackSide })
        );
        root.add(dome);

        // Meridian + horizon markers
        var meridian = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, -8, 0), new THREE.Vector3(0, 8, 0)
            ]),
            new THREE.LineBasicMaterial({ color: 0x607d8b })
        );
        root.add(meridian);
        var horizon = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints((function () {
                var pts = [];
                for (var i = 0; i <= 64; i++) {
                    var a = (i / 64) * Math.PI * 2;
                    pts.push(new THREE.Vector3(Math.cos(a) * 8, 0, Math.sin(a) * 8));
                }
                return pts;
            })()),
            new THREE.LineBasicMaterial({ color: 0x455a64 })
        );
        root.add(horizon);

        // Analemma path (figure-8) from teaching approx: declination + equation of time
        function dayToPos(dayOfYear) {
            var n = dayOfYear; // 0..365
            var B = (2 * Math.PI / 365) * (n - 81);
            // Equation of time minutes (Spencer / common teaching approx)
            var eotMin = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
            // Solar declination degrees
            var dec = OBLIQ * Math.sin((2 * Math.PI / 365) * (n - 81));
            // Map to local sky panel: x = EoT (east-west), y = declination (altitude-like)
            var x = (eotMin / 16) * 3.2; // ~+/-16 min scale
            var y = (dec / OBLIQ) * 5.5;
            return { x: x, y: y, eotMin: eotMin, dec: dec };
        }

        var pathPts = [];
        var N = shell.low ? 90 : 180;
        for (var i = 0; i <= N; i++) {
            var d = (i / N) * 365;
            var p = dayToPos(d);
            pathPts.push(new THREE.Vector3(p.x, p.y, 0));
        }
        var analemmaLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(pathPts),
            new THREE.LineBasicMaterial({ color: 0xffb300 })
        );
        root.add(analemmaLine);

        // Month ticks (approx day-of-year mid-month)
        var monthDays = [15, 46, 74, 105, 135, 166, 196, 227, 258, 288, 319, 349];
        monthDays.forEach(function (md) {
            var p = dayToPos(md);
            var tick = new THREE.Mesh(
                new THREE.SphereGeometry(0.12, 8, 6),
                new THREE.MeshBasicMaterial({ color: 0xffe082 })
            );
            tick.position.set(p.x, p.y, 0.05);
            root.add(tick);
        });

        var sunMarker = new THREE.Mesh(
            new THREE.SphereGeometry(0.42, 16, 12),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        root.add(sunMarker);

        var eotBar = new THREE.Mesh(
            new THREE.BoxGeometry(0.08, 0.08, 0.08),
            new THREE.MeshBasicMaterial({ color: 0x4fc3f7 })
        );
        root.add(eotBar);

        function place() {
            var p = dayToPos(state.day);
            sunMarker.position.set(p.x, p.y, 0.15);
            eotBar.visible = state.showEot;
            if (state.showEot) {
                eotBar.scale.set(1, 1, 1);
                eotBar.position.set(p.x * 0.5, -6.2, 0);
                eotBar.scale.x = Math.max(0.3, Math.abs(p.eotMin) / 4);
                eotBar.position.x = (p.eotMin >= 0 ? 1 : -1) * (eotBar.scale.x * 0.04);
            }
            return p;
        }

        function factsHtml() {
            var p = dayToPos(state.day);
            return '<h3>Solar analemma (teaching schematic)</h3>'
                + '<p>Photograph the Sun at the same clock time for a year and the spots form a figure-8. The shape mixes <b>declination</b> (Earth obliquity ~<b>23.44 deg</b>) with the <b>equation of time</b> (orbit eccentricity + obliquity).</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Obliquity</td><td>23.44 deg</td><td>IAU / Earth orientation - drives north-south swing</td></tr>'
                + '<tr><td>Equation of time range</td><td>about +/-16 min</td><td>Teaching approx (Spencer-style formula)</td></tr>'
                + '<tr><td>Day of year</td><td>' + Math.round(state.day) + '</td><td>Slider 0-365 (non-leap teaching year)</td></tr>'
                + '<tr><td>Declination now</td><td>' + p.dec.toFixed(1) + ' deg</td><td>Approx from obliquity sine model</td></tr>'
                + '<tr><td>Equation of time now</td><td>' + p.eotMin.toFixed(1) + ' min</td><td>Positive = sundial ahead of mean time</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational analemma schematic - not an ephemeris. The figure-8 uses a common teaching approximation for EoT and declination; sizes are exaggerated for one-screen clarity.</p>';
        }
        function updateFacts() {
            place();
            t3dInfo(factsHtml());
            var p = dayToPos(state.day);
            t3dStatus('Analemma day ' + Math.round(state.day)
                + ' - dec ' + p.dec.toFixed(1) + ' deg - EoT ' + p.eotMin.toFixed(1)
                + ' min - obliquity 23.44 deg.');
        }

        place();
        updateFacts();

        var dayEl = document.getElementById('t3dAnalemmaDay');
        if (dayEl) dayEl.addEventListener('input', function () {
            state.day = Math.min(365, Math.max(0, parseFloat(dayEl.value || '172')));
            updateFacts();
        });
        var playBtn = document.getElementById('t3dAnalemmaPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            state.playing = !state.playing;
            playBtn.textContent = state.playing ? 'Pause year' : 'Play year';
        });
        var eotBtn = document.getElementById('t3dAnalemmaEotBtn');
        if (eotBtn) eotBtn.addEventListener('click', function () {
            state.showEot = !state.showEot;
            eotBtn.textContent = state.showEot ? 'Hide EoT bar' : 'Show EoT bar';
            updateFacts();
        });

        return function animate(dt) {
            if (state.playing) {
                state.day += dt * 0.012;
                if (state.day > 365) state.day -= 365;
                if (dayEl) dayEl.value = String(state.day.toFixed(0));
            }
            place();
            if (Math.floor(state.day) !== Math.floor(state.day - dt * 0.012)) updateFacts();
            shell.applyCamera();
        };
    }
