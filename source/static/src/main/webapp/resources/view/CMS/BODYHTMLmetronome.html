<div class="w3-container">
    <p>Drag the tempo slider (or tap tempo), pick beats per bar, then click Start click for audible ticks; a visual beat lamp pulses on load.</p>
</div>

<style>
    #metronomeTool .mt-row { margin-bottom: 12px; }
    #metronomeTool .mt-bpm {
        font: 700 56px/1.1 monospace; letter-spacing: 1px; margin: 8px 0 4px;
    }
    #metronomeTool .mt-beat {
        width: 72px; height: 72px; border-radius: 50%; margin: 12px auto;
        background: #e0e0e0; border: 3px solid #333; transition: background 0.05s linear;
    }
    #metronomeTool .mt-beat.mt-on { background: #c62828; }
    #metronomeTool .mt-beat.mt-accent { background: #1565c0; }
    #metronomeTool .mt-status {
        font-family: monospace; min-height: 1.4em; margin-top: 8px;
    }
    #metronomeTool .mt-meter {
        display: flex; gap: 6px; justify-content: center; margin: 10px 0;
    }
    #metronomeTool .mt-dot {
        width: 14px; height: 14px; border-radius: 50%; background: #ccc; border: 1px solid #666;
    }
    #metronomeTool .mt-dot.mt-lit { background: #c62828; }
    #metronomeTool .mt-dot.mt-lit-accent { background: #1565c0; }
</style>

<div id="metronomeTool" class="w3-container outputImgs" style="text-align:center; visibility:visible !important; min-height:180px; padding:16px 0;">
    <noscript>This tool runs in your browser and needs JavaScript enabled.</noscript>
    <div class="mt-row">
        <label class="w3-label" for="mtBpm"><b>Tempo (BPM)</b></label>
        <input type="range" id="mtBpm" class="w3-input" min="40" max="240" step="1" value="120"
            aria-valuemin="40" aria-valuemax="240" aria-valuenow="120" style="max-width:420px;margin:0 auto;">
        <div id="mtBpmReadout" class="mt-bpm" aria-live="polite">120 BPM</div>
    </div>
    <div class="mt-row">
        <label class="w3-label" for="mtBeats"><b>Beats per bar</b></label>
        <select id="mtBeats" class="w3-select w3-border" style="max-width:120px;margin:0 auto;display:inline-block;">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
        </select>
    </div>
    <div id="mtLamp" class="mt-beat" role="img" aria-label="Beat indicator"></div>
    <div id="mtMeter" class="mt-meter" aria-hidden="true"></div>
    <div class="mt-row">
        <button type="button" id="mtStart" class="w3-button w3-green">Start click</button>
        <button type="button" id="mtStop" class="w3-button w3-light-grey" style="margin-left:8px;">Stop</button>
        <button type="button" id="mtTap" class="w3-button w3-blue" style="margin-left:8px;">Tap tempo</button>
    </div>
    <p id="mtStatus" class="mt-status" aria-live="polite">Visual beat is running. Click Start click for audible ticks (Web Audio).</p>
</div>
