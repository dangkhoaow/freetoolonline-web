<div class="w3-container">
    <p>Choose a local image, type your watermark text, then adjust position, size, opacity, and color before downloading the result.</p>
</div>

<style>
    #imageWatermarkTool .iwm-row { margin-bottom: 12px; }
    #imageWatermarkTool .iwm-controls {
        display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; justify-content: center; margin: 12px 0;
    }
    #imageWatermarkTool .iwm-field { display: flex; flex-direction: column; min-width: 140px; }
    #imageWatermarkTool .iwm-field label { font-size: 0.85em; margin-bottom: 4px; }
    #imageWatermarkTool canvas {
        display: block; max-width: 100%; height: auto; margin: 12px auto;
        border: 1px solid #ccc;
        background: repeating-conic-gradient(#eee 0% 25%, #fff 0% 50%) 50% / 16px 16px;
    }
    #imageWatermarkTool .iwm-status {
        font-family: monospace; min-height: 1.4em; margin-top: 8px; text-align: center;
    }
</style>

<div id="imageWatermarkTool" class="w3-container outputImgs" style="text-align:center; visibility:visible !important; min-height:220px; padding:16px 0;">
    <noscript>This tool runs in your browser and needs JavaScript enabled.</noscript>
    <div class="iwm-row">
        <label class="w3-label" for="iwmFile"><b>Source image</b></label>
        <input type="file" id="iwmFile" accept="image/*" class="w3-input w3-border" style="max-width:420px;margin:0 auto;">
    </div>
    <div class="iwm-controls">
        <div class="iwm-field">
            <label for="iwmText">Watermark text</label>
            <input type="text" id="iwmText" class="w3-input w3-border" placeholder="© Your Name" value="SAMPLE">
        </div>
        <div class="iwm-field">
            <label for="iwmPosition">Position</label>
            <select id="iwmPosition" class="w3-select w3-border">
                <option value="bottom-right" selected>Bottom right</option>
                <option value="bottom-left">Bottom left</option>
                <option value="top-right">Top right</option>
                <option value="top-left">Top left</option>
                <option value="center">Center</option>
                <option value="center-left">Center left</option>
                <option value="center-right">Center right</option>
                <option value="top-center">Top center</option>
            </select>
        </div>
        <div class="iwm-field">
            <label for="iwmSize">Font size (<span id="iwmSizeVal">36</span>px)</label>
            <input type="range" id="iwmSize" min="12" max="160" value="36" oninput="document.getElementById('iwmSizeVal').textContent=this.value">
        </div>
        <div class="iwm-field">
            <label for="iwmOpacity">Opacity (<span id="iwmOpacityVal">50</span>%)</label>
            <input type="range" id="iwmOpacity" min="5" max="100" value="50" oninput="document.getElementById('iwmOpacityVal').textContent=this.value">
        </div>
        <div class="iwm-field">
            <label for="iwmColor">Color</label>
            <input type="color" id="iwmColor" value="#ffffff">
        </div>
        <div class="iwm-field">
            <label for="iwmTile">Tile across image</label>
            <input type="checkbox" id="iwmTile">
        </div>
    </div>
    <canvas id="iwmCanvas" width="480" height="270"></canvas>
    <div class="iwm-row">
        <button id="iwmDownload" class="w3-button w3-green" style="display:none;">Download watermarked image</button>
    </div>
    <p id="iwmStatus" class="iwm-status" aria-live="polite">Choose an image, then type your watermark text. Everything runs in this tab - nothing is uploaded.</p>
</div>
