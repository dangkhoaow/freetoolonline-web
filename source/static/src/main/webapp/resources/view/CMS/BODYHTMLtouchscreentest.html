<div class="w3-container">
    <p>Click Start to begin; results render below as the diagnostic runs.</p>
</div>

<style>
    #touchscreenTestTool .ts-row { margin-bottom: 12px; }
    #touchscreenTestTool .ts-status {
        font-family: monospace; margin-top: 10px; min-height: 1.4em; white-space: pre-wrap;
    }
    #touchscreenTestTool .ts-pad {
        position: relative; height: 260px; border: 2px dashed #999999;
        border-radius: 4px; background: #f7f7f7; cursor: crosshair;
        touch-action: none; user-select: none; -webkit-user-select: none;
    }
    #touchscreenTestTool .ts-pad.ts-listening { border-color: #2e7d32; background: #f3fff5; }
    #touchscreenTestTool .ts-dot {
        position: absolute; width: 28px; height: 28px; margin: -14px 0 0 -14px;
        border: 2px solid #2e7d32; border-radius: 50%; pointer-events: none;
        background: rgba(46, 125, 50, 0.25); display: none;
        font-family: monospace; font-size: 10px; color: #1b5e20;
        text-align: center; line-height: 24px;
    }
    #touchscreenTestTool .ts-meter-wrap {
        margin-top: 12px; padding: 12px; border: 1px solid #cccccc; border-radius: 4px;
        background: #fafafa;
    }
</style>

<div id="touchscreenTestTool" class="w3-container">
    <div class="ts-row">
        <button type="button" id="tsEnable" class="w3-button w3-red">Enable touch listening</button>
        <button type="button" id="tsReset" class="w3-button w3-light-grey" style="margin-left: 8px;">Reset counters</button>
    </div>
    <div id="tsPad" class="ts-pad" tabindex="0" role="application"
        aria-label="Touchscreen test pad - touch or click here">
        <div id="tsDot0" class="ts-dot" aria-hidden="true">0</div>
        <div id="tsDot1" class="ts-dot" aria-hidden="true">1</div>
        <div id="tsDot2" class="ts-dot" aria-hidden="true">2</div>
        <div id="tsDot3" class="ts-dot" aria-hidden="true">3</div>
        <div id="tsDot4" class="ts-dot" aria-hidden="true">4</div>
    </div>
    <div class="ts-meter-wrap">
        <b>Live readout</b>
        <p id="tsCue" class="ts-status" aria-live="polite">Ready. Click Enable touch listening, then touch or click the pad. Coordinates stay in this tab - nothing is uploaded.</p>
        <p id="tsStats" class="ts-status" aria-live="polite">touches: 0 | moves: 0 | maxFingers: 0</p>
    </div>
</div>
