<script>
    web.localUpload = false;
    var LFP_GAME_URL = 'https://gh-static.freetool.online/games/layer-flip-platformer/index.html';
    function lfpStatus(t){ var el=document.getElementById('lfpStatus'); if(el) el.textContent=t; }
    function lfpInjectFrame(stage){
        var frame=document.createElement('iframe');
        frame.id='lfpFrame'; frame.src=LFP_GAME_URL; frame.title='Layer Flip Platformer';
        frame.setAttribute('allow','fullscreen'); frame.setAttribute('allowfullscreen','');
        frame.addEventListener('load',function(){ lfpStatus('Loaded. A/D move, W/Up jump, Space flips layers.'); });
        var launch=document.getElementById('lfpLaunch');
        if(launch&&launch.parentNode===stage) stage.removeChild(launch);
        stage.appendChild(frame);
    }
    function doAfterPageRendered(){
        var stage=document.getElementById('lfpStage'), playBtn=document.getElementById('lfpPlayBtn');
        if(!stage||!playBtn) return;
        var fsBtn=document.getElementById('lfpFullscreenBtn');
        playBtn.addEventListener('click',function(){
            lfpStatus('Loading about ~44 KB...'); lfpInjectFrame(stage);
            if(fsBtn) fsBtn.disabled=false;
        });
        if(fsBtn) fsBtn.addEventListener('click',function(){
            if(stage.requestFullscreen) stage.requestFullscreen();
            else if(stage.webkitRequestFullscreen) stage.webkitRequestFullscreen();
        });
    }
</script>
