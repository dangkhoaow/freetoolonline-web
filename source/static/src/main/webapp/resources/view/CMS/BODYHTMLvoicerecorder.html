<div class="w3-container">
    <p>Choose a source, click Start to record, then Stop to save the clip as a WebM file.</p>
</div>

<style>
    #mrTool .mr-row { margin-bottom: 14px; }
    #mrTool label.mr-label { font-weight: bold; display: block; margin-bottom: 4px; }
    #mrTool .w3-button { margin-right: 6px; }
    #mrTimer { font-family: monospace; font-size: 1.4em; vertical-align: middle; }
    #mrPreview { max-width: 100%; background: #000000; display: none; }
    #mrError { color: #b00020; }
    #mrOutput { margin-top: 12px; min-height: 40px; }
    #mrOutput video, #mrOutput audio { margin-top: 8px; }
</style>

<div id="mrTool" class="w3-container">
    <div class="mr-row">
        <label class="mr-label" for="mrSource">Source</label>
        <select id="mrSource" class="w3-select w3-border" style="max-width:320px;">
            <option value="camera">Camera (video only)</option>
            <option value="camera-mic">Camera + microphone</option>
            <option value="mic">Microphone only</option>
            <option value="screen">Screen</option>
        </select>
    </div>
    <div class="mr-row">
        <button type="button" id="mrStart" class="w3-button w3-blue">Start recording</button>
        <button type="button" id="mrPause" class="w3-button w3-amber" disabled>Pause</button>
        <button type="button" id="mrStop" class="w3-button w3-red" disabled>Stop</button>
        <span id="mrTimer">00:00</span>
    </div>
    <div class="mr-row">
        <video id="mrPreview" autoplay playsinline muted></video>
    </div>
    <div id="mrError" class="mr-row" style="display:none;" aria-live="polite"></div>
    <div id="mrOutput" class="mr-row outputImgs" aria-live="polite"></div>
</div>
