<script>
    web.localUpload = false;
    var ICL_GAME_URL = 'https://gh-static.freetool.online/games/idle-capitalist-loop/index.html';
    function iclStatus(text) {
        var el = document.getElementById('iclStatus');
        if (el) el.textContent = text;
    }
    function iclInjectFrame(stage) {
        var frame = document.createElement('iframe');
        frame.id = 'iclFrame';
        frame.src = ICL_GAME_URL;
        frame.title = 'Idle Capitalist Loop game';
        frame.setAttribute('allow', 'fullscreen');
        frame.setAttribute('allowfullscreen', '');
        frame.addEventListener('load', function () {
            iclStatus('Game loaded. Click businesses, hire managers, and use Settings to wipe the save if needed.');
            try { frame.contentWindow.focus(); } catch (e) {}
        });
        var launch = document.getElementById('iclLaunch');
        if (launch && launch.parentNode === stage) stage.removeChild(launch);
        stage.appendChild(frame);
        return frame;
    }
    function doAfterPageRendered() {
        var stage = document.getElementById('iclStage');
        var playBtn = document.getElementById('iclPlayBtn');
        if (!stage || !playBtn) return;
        if (playBtn.dataset.bound === '1') return;
        playBtn.dataset.bound = '1';
        var fsBtn = document.getElementById('iclFullscreenBtn');
        playBtn.addEventListener('click', function () {
            iclStatus('Loading the game (about 87 KB, one time - then cached)...');
            iclInjectFrame(stage);
            if (fsBtn) fsBtn.disabled = false;
        });
        if (fsBtn) fsBtn.addEventListener('click', function () {
            if (stage.requestFullscreen) stage.requestFullscreen();
            else if (stage.webkitRequestFullscreen) stage.webkitRequestFullscreen();
            var frame = document.getElementById('iclFrame');
            if (frame) { try { frame.contentWindow.focus(); } catch (e) {} }
        });
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', doAfterPageRendered);
    } else {
        doAfterPageRendered();
    }
</script>
