<div class="w3-container">
    <p>Click Play Left, Play Right, or Play Both; use headphones to confirm each channel.</p>
</div>

<style>
    #spkTestTool .spk-row { margin-bottom: 12px; }
    #spkTestTool .spk-status {
        font-family: monospace; margin-top: 10px; min-height: 1.4em;
    }
    #spkTestTool .spk-btn-active { outline: 2px solid #c62828; outline-offset: 2px; }
    #spkTestTool .spk-meter-wrap {
        margin-top: 12px; padding: 12px; border: 1px solid #cccccc; border-radius: 4px;
        background: #fafafa;
    }
    #spkTestTool .spk-meter-bar {
        height: 14px; background: #e0e0e0; border-radius: 4px; overflow: hidden;
    }
    #spkTestTool .spk-meter-fill {
        height: 100%; width: 0%; background: #c62828; transition: width 0.05s linear;
    }
</style>

<div id="spkTestTool" class="w3-container">
    <div class="spk-row">
        <label class="w3-label" for="spkFreq"><b>Tone frequency (Hz)</b></label>
        <input type="range" id="spkFreq" class="w3-input" min="220" max="2000" step="10" value="440"
            aria-valuemin="220" aria-valuemax="2000" aria-valuenow="440">
        <span id="spkFreqLabel">440 Hz</span>
    </div>
    <div class="spk-row">
        <button type="button" id="spkLeft" class="w3-button w3-red">Play Left</button>
        <button type="button" id="spkRight" class="w3-button w3-red" style="margin-left: 8px;">Play Right</button>
        <button type="button" id="spkBoth" class="w3-button w3-red" style="margin-left: 8px;">Play Both</button>
        <button type="button" id="spkStop" class="w3-button w3-light-grey" style="margin-left: 8px;">Stop</button>
    </div>
    <div class="spk-meter-wrap">
        <b>Channel cue</b>
        <p id="spkCue" class="spk-status" aria-live="polite">Click Play Left, Play Right, or Play Both. A short tone plays through that channel only - nothing is uploaded.</p>
        <div class="spk-meter-bar" aria-hidden="true"><div id="spkMeter" class="spk-meter-fill"></div></div>
    </div>
</div>
