<script>
    // 3D scene archetype skeleton (kepler-orbits) - vendored three.js (ESM, dynamic
    // import from /vendor/three/, NO CDN), fully client-side. Registry Gate-H
    // entry: three_3d_scene_vendored. ONE skeleton serves the 3D family; the
    // scene is dispatched from the slug: voxel (block-building sandbox game),
    // solar (solar system explorer), blackhole (black hole visualization),
    // galaxy (spiral galaxy). All geometry is procedural - no model files, no
    // textures fetched. The space scenes are EDUCATIONAL APPROXIMATIONS, not
    // physical simulations; scales are compressed and the info panel says so.
    //
    // A visible wrapper + "Loading 3D engine..." placeholder renders
    // synchronously (G16 render-only pass); the ~0.7 MB engine lazy-loads
    // post-paint via requestIdleCallback and is cached by the browser.
    // Fullscreen targets the WRAPPER div (controls stay visible).
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    var T3D_SLUG = 'orbital-resonance';
    var T3D_STORE_KEY = 'ftol-game-' + T3D_SLUG;

    function t3dDetectScene(slug) {
        var s = String(slug || '').toLowerCase();
        if (/voxel|builder|block/.test(s)) return 'voxel';
        if (/orbital.?resonance|laplace|io.?europa|ganymede.?resonance|mean.?motion/.test(s)) return 'orbitalresonance';
        if (/gas.?giant|great.?red.?spot|jupiter.?band|banded.?atmosphere/.test(s)) return 'gasgiantatmosphere';
        if (/neutron.?star|pulsar|lighthouse.?beam/.test(s)) return 'neutronstarpulsar';
        if (/lagrange|l1|l2|jwst|soho/.test(s)) return 'lagrangepoints';
        if (/milky.?way|orion.?arm|perseus.?arm|sagittarius.?arm/.test(s)) return 'milkywaymap';
        if (/retrograde|mars.?loop|synodic/.test(s)) return 'retrogrademotion';
        if (/season.?earth|axial.?tilt|solstice|equinox|seasons/.test(s)) return 'seasonsearth';
        if (/comet.?orbit|halley|comet/.test(s)) return 'cometorbit';
        if (/asteroid.?belt|kirkwood|ceres/.test(s)) return 'asteroidbelt';
        if (/tidal.?lock|synchronous.?rotat/.test(s)) return 'tidallocking';
        if (/exoplanet|transit|light.?curve/.test(s)) return 'exoplanettransit';
        if (/star.*lifecycle|lifecycle.*star|starlifecycle/.test(s)) return 'starlifecycle';
        if (/planet.*size|size.*comparison|planetsize/.test(s)) return 'planetsizecomparison';
        if (/solar.*eclipse|eclipse.*solar/.test(s)) return 'solareclipse';
        if (/lunar.*eclipse|eclipse.*lunar/.test(s)) return 'lunareclipse';
        if (/iss|orbit.*tracker/.test(s)) return 'issorbittracker';
        if (/moon.*calendar|calendar.*moon/.test(s)) return 'mooncalendar3d';
        if (/moon.*phase|phases-3d/.test(s)) return 'moonphases3d';
        if (/kepler|kepler-orbits/.test(s)) return 'keplerorbits';
        if (/saturn|rings/.test(s)) return 'saturnrings';
        if (/solar|planet/.test(s)) return 'solar';
        if (/black/.test(s)) return 'blackhole';
        if (/galaxy/.test(s)) return 'galaxy';
        return 'solar';
    }

    // ---- vendored ESM loader (ftoLoadPdfLib shape, but a cached import()) ----
    function ftoLoadThree() {
        if (window.__ftoThreePromise) { return window.__ftoThreePromise; }
        var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/three';
        window.__ftoThreePromise = import(base + '/three.module.min.js').then(function (mod) {
            if (!mod || !mod.WebGLRenderer) { throw new Error('three.js loaded but WebGLRenderer is missing'); }
            return mod;
        });
        return window.__ftoThreePromise;
    }

    function t3dStatus(text) {
        var el = document.getElementById('t3dStatus');
        if (el) el.textContent = text;
    }
    function t3dInfo(html) {
        var el = document.getElementById('t3dInfoPanel');
        if (el) el.innerHTML = html;
    }
    function t3dLoadStore() {
        try { return JSON.parse(localStorage.getItem(T3D_STORE_KEY) || '{}') || {}; }
        catch (e) { return {}; }
    }
    function t3dSaveStore(obj) {
        try { localStorage.setItem(T3D_STORE_KEY, JSON.stringify(obj)); }
        catch (e) { t3dStatus('Could not save to browser storage (quota or private mode) - building still works.'); }
    }
    function t3dFullscreen(el) {
        if (el.requestFullscreen) { el.requestFullscreen(); }
        else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
        else if (el.mozRequestFullScreen) { el.mozRequestFullScreen(); }
        else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
    }

    // ---- shared scene shell: renderer + camera + custom pointer-orbit --------
    // OrbitControls is NOT vendored (jsm addons import the bare 'three'
    // specifier); this ~40-line orbit covers drag-rotate + wheel/pinch zoom
    // with damping and a clamped pitch.
    function t3dShell(THREE, host, opts) {
        var coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        var low = coarse || ((navigator.hardwareConcurrency || 4) <= 4);
        var renderer = new THREE.WebGLRenderer({ antialias: !low, powerPreference: 'default' });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(opts.fov || 55, 1, 0.1, 4000);
        var orbit = {
            target: new THREE.Vector3(0, opts.targetY || 0, 0),
            radius: opts.radius, theta: opts.theta || 0.6, phi: opts.phi || 1.15,
            goalRadius: opts.radius, goalTheta: opts.theta || 0.6, goalPhi: opts.phi || 1.15,
            minR: opts.minR || 4, maxR: opts.maxR || 400,
        };
        function applyCamera() {
            // critically-damped-ish lerp toward the goal orbit
            orbit.theta += (orbit.goalTheta - orbit.theta) * 0.14;
            orbit.phi += (orbit.goalPhi - orbit.phi) * 0.14;
            orbit.radius += (orbit.goalRadius - orbit.radius) * 0.14;
            var sp = Math.sin(orbit.phi), cp = Math.cos(orbit.phi);
            camera.position.set(
                orbit.target.x + orbit.radius * sp * Math.sin(orbit.theta),
                orbit.target.y + orbit.radius * cp,
                orbit.target.z + orbit.radius * sp * Math.cos(orbit.theta)
            );
            camera.lookAt(orbit.target);
        }
        function size() {
            var w = Math.max(260, host.clientWidth);
            var h = Math.round(w * 0.62);
            var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
            if (fsEl && fsEl.contains(host)) { h = Math.max(240, (window.innerHeight || h) - 150); }
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        host.appendChild(renderer.domElement);
        renderer.domElement.style.touchAction = 'none';
        renderer.domElement.style.borderRadius = '6px';
        // pointer-orbit input
        var drag = null, pinch = null, moved = 0;
        host.addEventListener('pointerdown', function (e) {
            drag = { x: e.clientX, y: e.clientY }; moved = 0;
            host.setPointerCapture && host.setPointerCapture(e.pointerId);
        });
        host.addEventListener('pointermove', function (e) {
            if (!drag) return;
            var dx = e.clientX - drag.x, dy = e.clientY - drag.y;
            moved += Math.abs(dx) + Math.abs(dy);
            drag = { x: e.clientX, y: e.clientY };
            orbit.goalTheta -= dx * 0.006;
            orbit.goalPhi = Math.min(Math.max(orbit.goalPhi - dy * 0.005, 0.15), Math.PI - 0.2);
        });
        host.addEventListener('pointerup', function (e) {
            var wasClick = moved < 8;
            drag = null;
            if (wasClick && shell.onClick) { shell.onClick(e); }
        });
        host.addEventListener('wheel', function (e) {
            e.preventDefault();
            orbit.goalRadius = Math.min(Math.max(orbit.goalRadius * (e.deltaY > 0 ? 1.12 : 0.9), orbit.minR), orbit.maxR);
        }, { passive: false });
        host.addEventListener('touchstart', function (e) {
            if (e.touches.length === 2) {
                pinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        }, { passive: true });
        host.addEventListener('touchmove', function (e) {
            if (e.touches.length === 2 && pinch) {
                var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                orbit.goalRadius = Math.min(Math.max(orbit.goalRadius * (pinch / d), orbit.minR), orbit.maxR);
                pinch = d;
            }
        }, { passive: true });
        window.addEventListener('resize', size);
        document.addEventListener('fullscreenchange', size);
        document.addEventListener('webkitfullscreenchange', size);
        size();
        var shell = {
            THREE: THREE, renderer: renderer, scene: scene, camera: camera,
            orbit: orbit, low: low, applyCamera: applyCamera, size: size, onClick: null,
            ndc: function (e) {
                var r = renderer.domElement.getBoundingClientRect();
                return new THREE.Vector2(((e.clientX - r.left) / r.width) * 2 - 1, -((e.clientY - r.top) / r.height) * 2 + 1);
            },
        };
        return shell;
    }

    // ================= SOLAR SYSTEM ==========================================
    // Display scale is COMPRESSED (planet sizes ~1000x vs distances) so all 8
    // planets fit one screen; the facts table carries the real figures.
    var T3D_PLANETS = [
        { name: 'Mercury', color: 0x9e9e9e, r: 0.9, orbit: 16, periodDays: 88, realKm: 4879, au: 0.39 },
        { name: 'Venus', color: 0xffcc80, r: 1.4, orbit: 22, periodDays: 225, realKm: 12104, au: 0.72 },
        { name: 'Earth', color: 0x42a5f5, r: 1.5, orbit: 29, periodDays: 365, realKm: 12756, au: 1.0 },
        { name: 'Mars', color: 0xef5350, r: 1.1, orbit: 36, periodDays: 687, realKm: 6792, au: 1.52 },
        { name: 'Jupiter', color: 0xd7a86e, r: 4.4, orbit: 50, periodDays: 4333, realKm: 142984, au: 5.2 },
        { name: 'Saturn', color: 0xf0e0a2, r: 3.8, orbit: 64, periodDays: 10756, realKm: 120536, au: 9.58 },
        { name: 'Uranus', color: 0x80deea, r: 2.4, orbit: 76, periodDays: 30687, realKm: 51118, au: 19.2 },
        { name: 'Neptune', color: 0x5c6bc0, r: 2.3, orbit: 86, periodDays: 60190, realKm: 49528, au: 30.05 },
    ];
    function t3dSolar(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        scene.add(new THREE.AmbientLight(0xffffff, 0.35));
        var sunLight = new THREE.PointLight(0xfff3d0, 1400, 0, 1.8);
        scene.add(sunLight);
        var sun = new THREE.Mesh(new THREE.SphereGeometry(7, 32, 16), new THREE.MeshBasicMaterial({ color: 0xffd54f }));
        sun.userData = { kind: 'sun' };
        scene.add(sun);
        var planets = [];
        for (var i = 0; i < T3D_PLANETS.length; i++) {
            var p = T3D_PLANETS[i];
            var mesh = new THREE.Mesh(
                new THREE.SphereGeometry(p.r, 24, 12),
                new THREE.MeshLambertMaterial({ color: p.color })
            );
            mesh.userData = { kind: 'planet', idx: i, angle: Math.random() * Math.PI * 2 };
            scene.add(mesh);
            var ring = new THREE.Mesh(
                new THREE.TorusGeometry(p.orbit, 0.06, 6, 96),
                new THREE.MeshBasicMaterial({ color: 0x37474f })
            );
            ring.rotation.x = Math.PI / 2;
            scene.add(ring);
            if (p.name === 'Saturn') {
                var sr = new THREE.Mesh(new THREE.TorusGeometry(p.r * 1.8, 0.35, 6, 48), new THREE.MeshLambertMaterial({ color: 0xd8cba8 }));
                sr.rotation.x = Math.PI / 2.4;
                mesh.add(sr);
            }
            planets.push(mesh);
        }
        var speedEl = document.getElementById('t3dSpeed');
        var paused = false;
        var pauseBtn = document.getElementById('t3dPauseBtn');
        if (pauseBtn) pauseBtn.addEventListener('click', function () { paused = !paused; pauseBtn.textContent = paused ? 'Resume orbits' : 'Pause orbits'; });
        function facts(idx) {
            if (idx === -1) {
                t3dInfo('<h3>The Sun</h3><p>A main-sequence star holding 99.8 percent of the solar system\'s mass. Diameter about 1,392,000 km - 109 Earths across.</p><p class="t3d-note">Scale note: sizes and distances on screen are compressed so all eight planets fit one view; the numbers here are the real ones.</p>');
                return;
            }
            var p = T3D_PLANETS[idx];
            var period = p.periodDays >= 1000 ? (p.periodDays / 365.25).toFixed(1) + ' years' : p.periodDays + ' days';
            t3dInfo('<h3>' + p.name + '</h3><table class="w3-table w3-bordered"><tr><td>Diameter</td><td>' + p.realKm.toLocaleString('en-US') + ' km</td></tr><tr><td>Distance from sun</td><td>' + p.au + ' AU</td></tr><tr><td>Orbital period</td><td>' + period + '</td></tr></table><p class="t3d-note">On-screen sizes and distances are compressed for readability - this table has the real figures.</p>');
        }
        facts(-1);
        var ray = new THREE.Raycaster();
        shell.onClick = function (e) {
            ray.setFromCamera(shell.ndc(e), shell.camera);
            var hits = ray.intersectObjects([sun].concat(planets), false);
            if (!hits.length) return;
            var u = hits[0].object.userData;
            facts(u.kind === 'sun' ? -1 : u.idx);
        };
        return function animate(dt) {
            if (paused) return;
            var mult = speedEl ? parseFloat(speedEl.value || '1') : 1;
            for (var i = 0; i < planets.length; i++) {
                var mesh = planets[i], p = T3D_PLANETS[i];
                // one real Earth year = ~12 on-screen seconds at 1x
                mesh.userData.angle += (dt / 1000) * (365.25 / p.periodDays) * mult * (Math.PI * 2 / 12);
                mesh.position.set(Math.cos(mesh.userData.angle) * p.orbit, 0, Math.sin(mesh.userData.angle) * p.orbit);
                mesh.rotation.y += dt * 0.0004;
            }
        };
    }

    // ================= LUNAR ECLIPSE =============================================
    // Sun-Earth-Moon alignment with umbra/penumbra shadow on the Moon - educational, not ephemeris.
    var T3D_TOTality_MAX_MIN = 107;
    var T3D_DANJON = [
        { l: 'L0', label: 'L0 - very dark', color: 0x1a1010 },
        { l: 'L1', label: 'L1 - dark gray-brown', color: 0x3d2820 },
        { l: 'L2', label: 'L2 - rust red', color: 0x6b3028 },
        { l: 'L3', label: 'L3 - brick red', color: 0x8b3a30 },
        { l: 'L4', label: 'L4 - copper-red', color: 0xa84838 }
    ];
    function t3dLunarEclipse(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x020408, 1);
        scene.add(new THREE.AmbientLight(0x222233, 0.2));
        var sunPos = new THREE.Vector3(-90, 8, 0);
        var sunLight = new THREE.DirectionalLight(0xfff4e0, 1.4);
        sunLight.position.copy(sunPos);
        scene.add(sunLight);
        var sunMesh = new THREE.Mesh(
            new THREE.SphereGeometry(6, 24, 16),
            new THREE.MeshBasicMaterial({ color: 0xffdd66 })
        );
        sunMesh.position.copy(sunPos);
        scene.add(sunMesh);
        var earthR = 10;
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(earthR, 48, 32),
            new THREE.MeshPhongMaterial({ color: 0x2e7d9a, emissive: 0x081018, shininess: 10 })
        );
        scene.add(earth);
        var umbraGeo = new THREE.ConeGeometry(earthR * 0.85, 55, 24, 1, true);
        var umbra = new THREE.Mesh(umbraGeo, new THREE.MeshBasicMaterial({ color: 0x050508, transparent: true, opacity: 0.35, depthWrite: false }));
        umbra.rotation.z = -Math.PI / 2;
        umbra.position.set(earthR * 0.5, 0, 0);
        scene.add(umbra);
        var penumbraGeo = new THREE.ConeGeometry(earthR * 1.35, 58, 24, 1, true);
        var penumbra = new THREE.Mesh(penumbraGeo, new THREE.MeshBasicMaterial({ color: 0x1a1a28, transparent: true, opacity: 0.18, depthWrite: false }));
        penumbra.rotation.z = -Math.PI / 2;
        penumbra.position.set(earthR * 0.5, 0, 0);
        scene.add(penumbra);
        var moonMat = new THREE.MeshLambertMaterial({ color: 0xcfd8dc });
        var moon = new THREE.Mesh(new THREE.SphereGeometry(4.5, 40, 28), moonMat);
        scene.add(moon);
        var progress = 0.35;
        var playing = false;
        var danjonIdx = 2;
        function moonShadowFactor(pos) {
            var toSun = sunPos.clone().sub(pos).normalize();
            var toEarth = earth.position.clone().sub(pos);
            var along = toSun.dot(toEarth);
            if (along <= 0) return 1;
            var closest = pos.clone().add(toSun.clone().multiplyScalar(along));
            var dist = closest.distanceTo(earth.position);
            var umbraEdge = earthR * 0.92;
            var penEdge = earthR * 1.38;
            if (dist < umbraEdge) return Math.max(0.02, dist / umbraEdge * 0.25);
            if (dist < penEdge) return 0.25 + 0.75 * ((dist - umbraEdge) / (penEdge - umbraEdge));
            return 1;
        }
        function phaseName(t, shade) {
            if (shade > 0.85) return 'Full moon (outside shadow)';
            if (shade > 0.55) return 'Penumbral eclipse';
            if (shade > 0.2) return 'Partial umbral eclipse';
            return 'Total eclipse (Danjon ' + T3D_DANJON[danjonIdx].l + ')';
        }
        function setProgress(t) {
            progress = Math.max(0, Math.min(1, t));
            var z = (progress - 0.5) * 28;
            moon.position.set(earthR + 22, 0, z);
            var shade = moonShadowFactor(moon.position);
            if (shade < 0.25) {
                var dj = T3D_DANJON[danjonIdx];
                moonMat.color.setHex(dj.color);
                moonMat.emissive.setHex(dj.color);
                moonMat.emissiveIntensity = 0.35;
            } else {
                moonMat.emissive.setHex(0x000000);
                moonMat.emissiveIntensity = 0;
                moonMat.color.setRGB(0.75 + shade * 0.2, 0.78 + shade * 0.15, 0.82 + shade * 0.1);
            }
            var label = document.getElementById('t3dEclipseProgressLabel');
            if (label) label.textContent = Math.round(progress * 100) + '%';
            var slider = document.getElementById('t3dEclipseProgress');
            if (slider && parseFloat(slider.value) !== progress * 100) slider.value = String(progress * 100);
            t3dInfo('<h3>' + phaseName(progress, shade) + '</h3><p>The Moon passes through Earth\'s penumbra (partial dimming) and umbra (full shadow) when Sun, Earth, and Moon align near a orbital node. The reddish totality is sunlight refracted through Earth\'s atmosphere - the Danjon scale rates its brightness.</p><table class="w3-table w3-bordered"><tr><td>Maximum totality duration</td><td>up to ' + T3D_TOTality_MAX_MIN + ' min</td></tr><tr><td>Danjon scale</td><td>L0 (darkest) through L4 (brightest copper-red)</td></tr><tr><td>Node alignment</td><td>Required - Moon must cross the ecliptic plane near full moon</td></tr><tr><td>Selected Danjon</td><td>' + T3D_DANJON[danjonIdx].label + '</td></tr></table><p class="t3d-note">Educational geometry visualization - not matched to tonight\'s sky or a specific eclipse date. This is not a physical simulation.</p>');
        }
        setProgress(progress);
        var playBtn = document.getElementById('t3dEclipsePlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () { playing = !playing; playBtn.textContent = playing ? 'Pause eclipse' : 'Play eclipse'; });
        var slider = document.getElementById('t3dEclipseProgress');
        if (slider) slider.addEventListener('input', function () { playing = false; if (playBtn) playBtn.textContent = 'Play eclipse'; setProgress(parseFloat(slider.value || '0') / 100); });
        T3D_DANJON.forEach(function (dj, i) {
            var btn = document.getElementById('t3dDanjonBtn-' + i);
            if (btn) btn.addEventListener('click', function () {
                danjonIdx = i;
                T3D_DANJON.forEach(function (_, j) {
                    var b = document.getElementById('t3dDanjonBtn-' + j);
                    if (b) b.className = 'w3-button ' + (j === danjonIdx ? 'w3-amber' : 'w3-light-grey');
                });
                setProgress(progress);
            });
        });
        t3dStatus('Drag to orbit the view, scroll to zoom. Scrub eclipse progress or press Play eclipse.');
        return function animate(dt) {
            if (!playing) return;
            setProgress(progress + (dt / 1000) * 0.08);
            if (progress >= 1) setProgress(0);
        };
    }

    // ================= SOLAR ECLIPSE =========================================
    // Moon umbra cone on Earth - educational geometry, not live ephemeris.
    var T3D_SUN_APPARENT_DEG = 0.53;
    var T3D_MOON_APPARENT_DEG = 0.52;
    var T3D_UMBRA_MIN_KM = 100;
    var T3D_UMBRA_MAX_KM = 270;
    var T3D_SAROS_YEARS = 18;
    var T3D_SAROS_DAYS = 11;
    function t3dSolarEclipse(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x020408, 1);
        scene.add(new THREE.AmbientLight(0x334455, 0.3));
        var sunPos = new THREE.Vector3(-95, 6, 0);
        var sunLight = new THREE.DirectionalLight(0xfff4e0, 1.35);
        sunLight.position.copy(sunPos);
        scene.add(sunLight);
        var sunMesh = new THREE.Mesh(
            new THREE.SphereGeometry(7, 28, 18),
            new THREE.MeshBasicMaterial({ color: 0xffdd66 })
        );
        sunMesh.position.copy(sunPos);
        scene.add(sunMesh);
        var earthR = 12;
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(earthR, 56, 36),
            new THREE.MeshPhongMaterial({ color: 0x2e7d9a, emissive: 0x081018, shininess: 10 })
        );
        scene.add(earth);
        var atmos = new THREE.Mesh(
            new THREE.SphereGeometry(earthR * 1.015, 40, 28),
            new THREE.MeshBasicMaterial({ color: 0x66aaff, transparent: true, opacity: 0.1, depthWrite: false })
        );
        scene.add(atmos);
        var moonR = 3.2;
        var moon = new THREE.Mesh(
            new THREE.SphereGeometry(moonR, 32, 20),
            new THREE.MeshLambertMaterial({ color: 0xb0bec5 })
        );
        scene.add(moon);
        var umbraGeo = new THREE.ConeGeometry(moonR * 0.55, 42, 20, 1, true);
        var umbra = new THREE.Mesh(umbraGeo, new THREE.MeshBasicMaterial({ color: 0x050508, transparent: true, opacity: 0.4, depthWrite: false }));
        umbra.rotation.z = -Math.PI / 2;
        umbra.position.set(-moonR * 0.3, 0, 0);
        moon.add(umbra);
        var pathPts = [];
        for (var i = 0; i <= 64; i++) {
            var t = (i / 64) * Math.PI - Math.PI / 2;
            var lat = Math.sin(t) * 0.55;
            var lon = t * 1.4;
            var cl = Math.cos(lat);
            pathPts.push(new THREE.Vector3(
                Math.cos(lon) * cl * earthR * 1.002,
                Math.sin(lat) * earthR * 1.002,
                Math.sin(lon) * cl * earthR * 1.002
            ));
        }
        var pathGeo = new THREE.BufferGeometry().setFromPoints(pathPts);
        var pathLine = new THREE.Line(pathGeo, new THREE.LineBasicMaterial({ color: 0xffeb3b, transparent: true, opacity: 0.85 }));
        scene.add(pathLine);
        var shadowDot = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 12, 8),
            new THREE.MeshBasicMaterial({ color: 0x111111 })
        );
        scene.add(shadowDot);
        var penumbraRing = new THREE.Mesh(
            new THREE.RingGeometry(0.9, 1.8, 24),
            new THREE.MeshBasicMaterial({ color: 0x333344, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
        );
        scene.add(penumbraRing);
        var progress = 0.42;
        var playing = false;
        var showPath = true;
        function pathPoint(t) {
            var u = Math.max(0, Math.min(1, t));
            var idx = u * (pathPts.length - 1);
            var i0 = Math.floor(idx);

    // ================= RETROGRADE MOTION =====================================
    // Apparent Mars loop from Earth's faster inside orbit - educational, not ephemeris.
    var T3D_RETRO_SYNODIC_D = 779.9;
    var T3D_RETRO_ARC_D = 72;
    var T3D_RETRO_MONTHS = 26;
    function t3dRetrogradeMotion(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.25));
        var sunL = new THREE.PointLight(0xfff3c4, 1.4, 200);
        sunL.position.set(0, 0, 0);
        scene.add(sunL);
        var group = new THREE.Group();
        scene.add(group);
        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 28, 20),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        group.add(sun);
        var earthR = 8;
        var marsR = 12.2;
        // Orbit rings
        function ring(r, color) {
            var pts = [];
            for (var i = 0; i <= 96; i++) {
                var a = (i / 96) * Math.PI * 2;
                pts.push(new THREE.Vector3(Math.cos(a) * r, 0, Math.sin(a) * r));
            }
            group.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.4 })
            ));
        }
        ring(earthR, 0x64b5f6);
        ring(marsR, 0xff8a65);
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 20, 16),
            new THREE.MeshLambertMaterial({ color: 0x42a5f5, emissive: 0x102040 })
        );
        group.add(earth);
        var mars = new THREE.Mesh(
            new THREE.SphereGeometry(0.42, 18, 14),
            new THREE.MeshLambertMaterial({ color: 0xe57373, emissive: 0x301010 })
        );
        group.add(mars);
        // LOS line Earth -> Mars
        var losGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(), new THREE.Vector3(1, 0, 0)
        ]);
        var los = new THREE.Line(losGeom, new THREE.LineBasicMaterial({ color: 0xffee58, transparent: true, opacity: 0.75 }));
        group.add(los);
        // Sky trail of apparent elongation (projected behind Earth along LOS direction onto a cylinder/arc belt)
        var trailPts = [];
        var trailMax = 180;
        var trailLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
            new THREE.LineBasicMaterial({ color: 0xce93d8, transparent: true, opacity: 0.85 })
        );
        group.add(trailLine);
        // Angular rates: Earth 360/365.25, Mars 360/686.98 - use compressed visual year
        // Synodic relative rate: when relative mean anomaly wraps once per T3D_RETRO_SYNODIC_D
        var day = 0;
        var playing = true;
        var showTrail = true;
        var showLos = true;
        // Place opposition near day 0 so scrub starts teaching the loop
        // Use mean motion: nE = 2pi/365.25, nM = 2pi/686.98
        var nE = (Math.PI * 2) / 365.25;
        var nM = (Math.PI * 2) / 686.98;
        function earthAngle(d) { return d * nE; }
        function marsAngle(d) { return d * nM + Math.PI; } // start near opposition geometry vs Earth at 0
        function elongDeg(d) {
            // Angle of Mars as seen from Earth relative to anti-sun / heliocentric transfer
            var ae = earthAngle(d);
            var am = marsAngle(d);
            var ex = Math.cos(ae) * earthR, ez = Math.sin(ae) * earthR;
            var mx = Math.cos(am) * marsR, mz = Math.sin(am) * marsR;
            var dx = mx - ex, dz = mz - ez;
            // Angle of LOS in plane, minus Earth's orbital angle (local sky abscissa)
            var losA = Math.atan2(dz, dx);
            var sky = ((losA - ae) * 180 / Math.PI + 540) % 360 - 180;
            return sky;
        }
        function isRetrograde(d) {
            // Finite difference of sky elongation
            var e0 = elongDeg(d - 0.5);
            var e1 = elongDeg(d + 0.5);
            var de = e1 - e0;
            if (de > 180) de -= 360;
            if (de < -180) de += 360;
            return de < 0; // westward on typical convention for outer planet near opposition
        }
        function panelHtml(d, elong, retro) {
            return '<h3>Mars retrograde (apparent)</h3>' +
                '<p>Earth on the inside track overtakes Mars. Near opposition the line of sight to Mars sweeps backward against the stars for a while - an optical loop, not Mars reversing its heliocentric orbit.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Mars synodic period</td><td>about ' + T3D_RETRO_SYNODIC_D + ' d (~' + T3D_RETRO_MONTHS + ' months)</td></tr>' +
                '<tr><td>Typical retrograde arc</td><td>about ' + T3D_RETRO_ARC_D + ' d</td></tr>' +
                '<tr><td>Day scrub</td><td>' + Math.round(d) + '</td></tr>' +
                '<tr><td>Approx. sky elongation</td><td>' + elong.toFixed(1) + ' deg (teaching scale)</td></tr>' +
                '<tr><td>Apparent motion</td><td>' + (retro ? 'Retrograde (westward stretch)' : 'Direct (eastward)') + '</td></tr>' +
                '</table>' +
                '<p class="t3d-note">Orbit sizes and rates are compressed for one view. Synodic and arc figures are published order-of-magnitude teaching values - not a high-precision ephemeris or sky chart for tonight.</p>';
        }
        function applyDay(d) {
            day = d;
            var ae = earthAngle(d);
            var am = marsAngle(d);
            earth.position.set(Math.cos(ae) * earthR, 0, Math.sin(ae) * earthR);
            mars.position.set(Math.cos(am) * marsR, 0, Math.sin(am) * marsR);
            var pos = los.geometry.attributes.position;
            pos.setXYZ(0, earth.position.x, earth.position.y, earth.position.z);
            pos.setXYZ(1, mars.position.x, mars.position.y, mars.position.z);
            pos.needsUpdate = true;
            los.visible = showLos;
            var elong = elongDeg(d);
            var retro = isRetrograde(d);
            // Build trail: sample past ~140 days of sky elongation mapped onto a raised arc above the plane
            trailPts = [];
            var span = 140;
            for (var i = 0; i <= span; i++) {
                var td = d - span + i;
                var el = elongDeg(td);
                // Map elongation to arc in sky belt above Earth-Sun average
                var mid = earth.position.clone().add(sun.position).multiplyScalar(0.5);
                // Place trail at radius ~16 around sun, height by sample, angle = elongation + earth
                var skyR = 16;
                var ang = ae + el * Math.PI / 180;
                var y = (i / span - 0.5) * 0.02; // nearly flat; keep subtle vertical to separate lines
                // Better: fixed ring height 3, longitude = elong over time so loop shapes show
                trailPts.push(new THREE.Vector3(Math.cos(ang) * skyR, 3.2 + (retro && Math.abs(el) < 40 ? 0.4 : 0), Math.sin(ang) * skyR));
            }
            trailLine.geometry.dispose();
            trailLine.geometry = new THREE.BufferGeometry().setFromPoints(trailPts);
            trailLine.visible = showTrail;
            var slider = document.getElementById('t3dRetroDay');
            var label = document.getElementById('t3dRetroDayLabel');
            if (slider) slider.value = String(Math.round(((d % T3D_RETRO_SYNODIC_D) + T3D_RETRO_SYNODIC_D) % T3D_RETRO_SYNODIC_D));
            if (label) label.textContent = 'day ' + Math.round(d);
            var badge = document.getElementById('t3dRetroBadge');
            if (badge) {
                badge.textContent = retro ? 'Retrograde now' : 'Direct now';
                badge.className = 'w3-tag ' + (retro ? 'w3-deep-orange' : 'w3-teal');
            }
            t3dInfo(panelHtml(d, elong, retro));
        }
        applyDay(0);
        var playBtn = document.getElementById('t3dRetroPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause' : 'Play';
        });
        var trailBtn = document.getElementById('t3dRetroTrailBtn');
        if (trailBtn) trailBtn.addEventListener('click', function () {
            showTrail = !showTrail;
            trailBtn.className = 'w3-button ' + (showTrail ? 'w3-amber' : 'w3-light-grey');
            applyDay(day);
        });
        var losBtn = document.getElementById('t3dRetroLosBtn');
        if (losBtn) losBtn.addEventListener('click', function () {
            showLos = !showLos;
            losBtn.className = 'w3-button ' + (showLos ? 'w3-amber' : 'w3-light-grey');
            applyDay(day);
        });
        var oppBtn = document.getElementById('t3dRetroOppBtn');
        if (oppBtn) oppBtn.addEventListener('click', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play';
            // Find a nearby day with opposition-ish (Earth and Mars nearly aligned sun-earth-mars)
            var best = day;
            var bestScore = 1e9;
            for (var t = day - 400; t < day + 400; t += 1) {
                var ae = earthAngle(t), am = marsAngle(t);
                var diff = Math.abs(((am - ae + Math.PI) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2) - Math.PI);
                // Prefer Sun-Earth-Mars nearly straight: angle Mars - Earth ~ pi difference from Sun
                // Earth-Sun-Mars angle: |am-ae|
                var aDiff = Math.abs(((am - ae) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2));
                if (aDiff > Math.PI) aDiff = Math.PI * 2 - aDiff;
                var score = Math.abs(aDiff - Math.PI); // want ~180 deg - opposition outer
                if (score < bestScore) { bestScore = score; best = t; }
            }
            applyDay(best);
        });
        var slider = document.getElementById('t3dRetroDay');
        if (slider) slider.addEventListener('input', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play';
            applyDay(parseFloat(slider.value || '0'));
        });
        t3dStatus('Drag to orbit, scroll to zoom. Play the overtakes, toggle the sky trail, and watch Mars loop when Earth passes inside.');
        return function animate(dt) {
            if (playing) applyDay(day + (dt / 1000) * 18);
        };
    }

    // ================= SEASONS EARTH ===========================================
    // Axial tilt -> insolation / solstice+equinox subsolar point - educational, not climate model.
    var T3D_SEASONS_OBLIQ_DEG = 23.44;
    var T3D_SEASONS_PERI_AU = 0.983;
    function t3dSeasonsEarth(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.22));
        var sunL = new THREE.DirectionalLight(0xfff3c4, 1.55);
        sunL.position.set(40, 0, 0);
        scene.add(sunL);
        var group = new THREE.Group();
        scene.add(group);
        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(1.6, 32, 24),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        sun.position.set(0, 0, 0);
        group.add(sun);
        // Earth hold: orbit radius compressed for one view
        var earthHold = new THREE.Group();
        group.add(earthHold);
        var orbR = 12;
        // Axis tilt about Z so northern winter/summer reads while orbiting in XZ
        var tiltRad = T3D_SEASONS_OBLIQ_DEG * Math.PI / 180;
        var earthTilt = new THREE.Group();
        earthTilt.rotation.z = tiltRad;
        earthHold.add(earthTilt);
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(1.35, 36, 28),
            new THREE.MeshLambertMaterial({ color: 0x3a7bd5, emissive: 0x102038 })
        );
        earthTilt.add(earth);
        // Equator ring + axis pole stick
        earthTilt.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints((function () {
                var pts = [];
                for (var i = 0; i <= 64; i++) {
                    var a = (i / 64) * Math.PI * 2;
                    pts.push(new THREE.Vector3(Math.cos(a) * 1.42, 0, Math.sin(a) * 1.42));
                }
                return pts;
            })()),
            new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.55 })
        ));
        earthTilt.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, -2.2, 0), new THREE.Vector3(0, 2.2, 0)
            ]),
            new THREE.LineBasicMaterial({ color: 0xff7043 })
        ));
        // Tropic of Cancer / Capricorn guide circles (lat +/- obliquity)
        function tropic(latDeg, color) {
            var lat = latDeg * Math.PI / 180;
            var y = Math.sin(lat) * 1.36;
            var r = Math.cos(lat) * 1.36;
            var pts = [];
            for (var i = 0; i <= 48; i++) {
                var a = (i / 48) * Math.PI * 2;
                pts.push(new THREE.Vector3(Math.cos(a) * r, y, Math.sin(a) * r));
            }
            earthTilt.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.7 })
            ));
        }
        tropic(T3D_SEASONS_OBLIQ_DEG, 0xffe082);
        tropic(-T3D_SEASONS_OBLIQ_DEG, 0x80deea);
        // Subsolar marker (yellow fleck on lit side)
        var subsolar = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 10, 8),
            new THREE.MeshBasicMaterial({ color: 0xffeb3b })
        );
        earth.add(subsolar);
        // Orbit path
        var orbitPts = [];
        for (var i = 0; i <= 96; i++) {
            var th = (i / 96) * Math.PI * 2;
            orbitPts.push(new THREE.Vector3(Math.cos(th) * orbR, 0, Math.sin(th) * orbR));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(orbitPts),
            new THREE.LineBasicMaterial({ color: 0x546e7a, transparent: true, opacity: 0.45 })
        ));
        var day = 172; // ~June solstice
        var playing = true;
        var showTropics = true;
        function dayToAngle(d) {
            // Day 0 ~ perihelion early Jan; angle increases counter-clockwise
            return (d / 365.25) * Math.PI * 2;
        }
        function declinationDeg(d) {
            // Approximate solar declination: epsilon * sin(lambda), lambda ~ day from Mar equinox (~80)
            var eps = T3D_SEASONS_OBLIQ_DEG;
            var lambda = ((d - 80) / 365.25) * Math.PI * 2;
            return eps * Math.sin(lambda);
        }
        function seasonName(d) {
            // Northern: Mar~80 equinox, Jun~172 solstice, Sep~266, Dec~355
            var x = ((d % 365.25) + 365.25) % 365.25;
            if (x < 80) return 'Northern winter (past Dec solstice)';
            if (x < 172) return 'Northern spring (past Mar equinox)';
            if (x < 266) return 'Northern summer (past Jun solstice)';
            if (x < 355) return 'Northern autumn (past Sep equinox)';
            return 'Northern winter (past Dec solstice)';
        }
        function panelHtml(dec, d) {
            return '<h3>Seasons from axial tilt</h3>' +
                '<p>Earth\'s spin axis stays tilted about ' + T3D_SEASONS_OBLIQ_DEG + ' deg while Earth orbits the Sun. That tilt - not distance - drives the season cycle: solstice subsolar latitudes reach about +/-' + T3D_SEASONS_OBLIQ_DEG + ' deg.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Obliquity</td><td>' + T3D_SEASONS_OBLIQ_DEG + ' deg</td></tr>' +
                '<tr><td>Approx. solar declination</td><td>' + dec.toFixed(2) + ' deg</td></tr>' +
                '<tr><td>Day of year (scrub)</td><td>' + Math.round(d) + ' / 365</td></tr>' +
                '<tr><td>Season (N. hemisphere)</td><td>' + seasonName(d) + '</td></tr>' +
                '<tr><td>Perihelion distance</td><td>about ' + T3D_SEASONS_PERI_AU + ' AU in early January</td></tr>' +
                '</table>' +
                '<p class="t3d-note">Earth is closest to the Sun in January (perihelion about ' + T3D_SEASONS_PERI_AU + ' AU) - yet northern winter shows tilt rules seasons, not orbital distance. This is an educational geometry visualization, not a climate or weather model.</p>';
        }
        function applyDay(d) {
            day = ((d % 365.25) + 365.25) % 365.25;
            var ang = dayToAngle(day);
            earthHold.position.set(Math.cos(ang) * orbR, 0, Math.sin(ang) * orbR);
            // Keep axis orientation fixed in space (no precession demo): counter-rotate hold yaw lightly
            // Place subsolar at (lat=declination) on the sunward face
            var dec = declinationDeg(day);
            var lat = dec * Math.PI / 180;
            // Sunward direction from earth to sun (toward origin)
            var toSun = earthHold.position.clone().multiplyScalar(-1).normalize();
            // Build local orthonormal: east / north / out - approximate on tilted sphere
            var north = new THREE.Vector3(0, 1, 0).applyAxisAngle(new THREE.Vector3(0, 0, 1), tiltRad);
            // Position on untilted sphere then parent already tilted - use lat on earth local Y
            var cl = Math.cos(lat);
            // Put fleck on +X of earth local (rough sunward when orbit on +X); rotate earth so +X faces sun
            var face = Math.atan2(toSun.z, toSun.x);
            earth.rotation.y = -face;
            subsolar.position.set(Math.cos(lat) * 1.38, Math.sin(lat) * 1.38, 0);
            // Light from sun direction
            sunL.position.copy(toSun.clone().multiplyScalar(-50).add(earthHold.position));
            sunL.target.position.copy(earthHold.position);
            scene.add(sunL.target);
            var slider = document.getElementById('t3dSeasonsDay');
            var label = document.getElementById('t3dSeasonsDayLabel');
            if (slider) slider.value = String(Math.round(day));
            if (label) label.textContent = 'day ' + Math.round(day);
            t3dInfo(panelHtml(dec, day));
        }
        applyDay(day);
        var playBtn = document.getElementById('t3dSeasonsPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause year' : 'Play year';
        });
        var tropBtn = document.getElementById('t3dSeasonsTropicsBtn');
        if (tropBtn) tropBtn.addEventListener('click', function () {
            showTropics = !showTropics;
            earthTilt.children.forEach(function (c, idx) {
                // tropics are line idx 2 and 3 after equator+axis (mesh earth is idx0; wait structure)
            });
            // Toggle by walking Line materials that are tropic colors - simpler: scale visibility on last two Lines added before subsolar
            tropBtn.className = 'w3-button ' + (showTropics ? 'w3-amber' : 'w3-light-grey');
            tropBtn.textContent = showTropics ? 'Hide tropics' : 'Show tropics';
            // Tropics are earthTilt children after equator+axis (indices 2,3 of Line; earth is Mesh at 0)
            var lines = [];
            earthTilt.traverse(function (o) {
                if (o.isLine) lines.push(o);
            });
            // equator, axis, cancer, capricorn
            if (lines.length >= 4) {
                lines[2].visible = showTropics;
                lines[3].visible = showTropics;
            }
        });
        var jumper = function (btnId, d) {
            var b = document.getElementById(btnId);
            if (!b) return;
            b.addEventListener('click', function () {
                playing = false;
                if (playBtn) playBtn.textContent = 'Play year';
                applyDay(d);
            });
        };
        jumper('t3dSeasonsMarBtn', 80);
        jumper('t3dSeasonsJunBtn', 172);
        jumper('t3dSeasonsSepBtn', 266);
        jumper('t3dSeasonsDecBtn', 355);
        var slider = document.getElementById('t3dSeasonsDay');
        if (slider) slider.addEventListener('input', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play year';
            applyDay(parseFloat(slider.value || '0'));
        });
        t3dStatus('Drag to orbit, scroll to zoom. Scrub the year, jump to equinox/solstice, and watch the yellow subsolar point climb between the tropics.');
        return function animate(dt) {
            if (playing) applyDay(day + (dt / 1000) * 28);
        };
    }

    // ================= COMET ORBIT =============================================
    // Eccentric Halley-like orbit with anti-sunward ion + dust tails - educational.
    var T3D_COMET_P_YR = 76;
    var T3D_COMET_Q_AU = 0.586;
    var T3D_COMET_Q_AP_AU = 35.1;
    var T3D_COMET_E = 0.967;
    function t3dCometOrbit(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        var sunL = new THREE.PointLight(0xfff3c4, 1.6, 250);
        sunL.position.set(0, 0, 0);
        scene.add(sunL);
        var group = new THREE.Group();
        scene.add(group);
        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(1.4, 32, 24),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        group.add(sun);
        // Ellipse geometry: a from q = a(1-e), focus at sun (origin)
        // Compress aphelion for one-screen readability while panel cites real 35.1 AU
        var e = T3D_COMET_E;
        var aVis = 14; // visual semi-major so full orbit fits
        var bVis = aVis * Math.sqrt(1 - e * e);
        var cVis = aVis * e; // sun at focus: comet center offset along +x
        var orbitPts = [];
        for (var i = 0; i <= 160; i++) {
            var th = (i / 160) * Math.PI * 2;
            // parametric ellipse centered on empty focus; sun at (cVis,0)
            var x = aVis * Math.cos(th) + cVis;
            var z = bVis * Math.sin(th);
            orbitPts.push(new THREE.Vector3(x, 0, z));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(orbitPts),
            new THREE.LineBasicMaterial({ color: 0x78909c, transparent: true, opacity: 0.55 })
        ));
        var nucleus = new THREE.Mesh(
            new THREE.SphereGeometry(0.35, 16, 12),
            new THREE.MeshLambertMaterial({ color: 0xb0bec5, emissive: 0x333333 })
        );
        group.add(nucleus);
        // Dust tail (yellowish, longer) + ion tail (bluish) - both anti-sunward
        function makeTail(color, len, width) {
            var g = new THREE.ConeGeometry(width, len, 10, 1, true);
            g.translate(0, -len / 2, 0);
            var m = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.55, side: THREE.DoubleSide, depthWrite: false });
            var mesh = new THREE.Mesh(g, m);
            return mesh;
        }
        var ionTail = makeTail(0x81d4fa, 5.5, 0.22);
        var dustTail = makeTail(0xffe082, 3.8, 0.45);
        nucleus.add(ionTail);
        nucleus.add(dustTail);
        var progress = 0.08; // near perihelion start for visible tails
        var playing = true;
        var showIon = true;
        var showDust = true;
        function trueAnomaly(p) {
            // Map scrub 0..1 around orbit; denser time near perihelion via eccentric anomaly-ish
            return p * Math.PI * 2;
        }
        function cometPos(nu) {
            var x = aVis * Math.cos(nu) + cVis;
            var z = bVis * Math.sin(nu);
            return new THREE.Vector3(x, 0, z);
        }
        function heliocentricDistAU(pos) {
            // Map visual radius roughly onto published q..Q for panel readout only
            var rVis = pos.length();
            var rMin = aVis * (1 - e); // near perihelion visual
            var rMax = aVis * (1 + e);
            var t = Math.max(0, Math.min(1, (rVis - rMin) / (rMax - rMin)));
            return T3D_COMET_Q_AU + t * (T3D_COMET_Q_AP_AU - T3D_COMET_Q_AU);
        }
        function panelHtml(rAu) {
            return '<h3>Halley-like comet orbit</h3>' +
                '<p>An eccentric ellipse (e = ' + T3D_COMET_E + ') with perihelion about ' + T3D_COMET_Q_AU + ' AU and aphelion about ' + T3D_COMET_Q_AP_AU + ' AU. Both tails point roughly anti-sunward - ion (blue) and dust (yellow).</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Orbital period</td><td>about ' + T3D_COMET_P_YR + ' yr</td></tr>' +
                '<tr><td>Perihelion</td><td>' + T3D_COMET_Q_AU + ' AU</td></tr>' +
                '<tr><td>Aphelion</td><td>' + T3D_COMET_Q_AP_AU + ' AU</td></tr>' +
                '<tr><td>Eccentricity</td><td>' + T3D_COMET_E + '</td></tr>' +
                '<tr><td>Approx. heliocentric dist</td><td>' + rAu.toFixed(2) + ' AU (compressed orbit)</td></tr>' +
                '</table>' +
                '<p class="t3d-note">On-screen distances are compressed so perihelion and aphelion fit one view - the table has the real Halley figures. This is an educational geometry visualization, not an N-body or outgassing simulation.</p>';
        }
        function orientTails(pos) {
            // Point cone axis away from sun (radial out)
            var away = pos.clone().normalize();
            // Cone default axis is +Y; aim -Y along away (since geometry translated -Y)
            var quat = new THREE.Quaternion();
            quat.setFromUnitVectors(new THREE.Vector3(0, -1, 0), away);
            ionTail.setRotationFromQuaternion(quat);
            dustTail.setRotationFromQuaternion(quat);
            // Stretch tails when closer to sun
            var near = Math.max(0.15, 1 - Math.min(1, pos.length() / (aVis * 1.2)));
            ionTail.scale.set(1, 0.6 + near * 1.4, 1);
            dustTail.scale.set(1, 0.5 + near * 1.1, 1);
            ionTail.visible = showIon;
            dustTail.visible = showDust;
        }
        function applyProgress(p) {
            progress = ((p % 1) + 1) % 1;
            var nu = trueAnomaly(progress);
            var pos = cometPos(nu);
            nucleus.position.copy(pos);
            orientTails(pos);
            var rAu = heliocentricDistAU(pos);
            var slider = document.getElementById('t3dCometProgress');
            var label = document.getElementById('t3dCometProgressLabel');
            if (slider) slider.value = String(Math.round(progress * 100));
            if (label) label.textContent = Math.round(progress * 100) + '%';
            t3dInfo(panelHtml(rAu));
        }
        applyProgress(progress);
        var playBtn = document.getElementById('t3dCometPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause orbit' : 'Play orbit';
        });
        var ionBtn = document.getElementById('t3dCometIonBtn');
        if (ionBtn) ionBtn.addEventListener('click', function () {
            showIon = !showIon;
            ionBtn.className = 'w3-button ' + (showIon ? 'w3-amber' : 'w3-light-grey');
            applyProgress(progress);
        });
        var dustBtn = document.getElementById('t3dCometDustBtn');
        if (dustBtn) dustBtn.addEventListener('click', function () {
            showDust = !showDust;
            dustBtn.className = 'w3-button ' + (showDust ? 'w3-amber' : 'w3-light-grey');
            applyProgress(progress);
        });
        var slider = document.getElementById('t3dCometProgress');
        if (slider) slider.addEventListener('input', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play orbit';
            applyProgress(parseFloat(slider.value || '0') / 100);
        });
        t3dStatus('Drag to orbit, scroll to zoom. Scrub the Halley-like ellipse, toggle ion/dust tails, and watch both point away from the Sun.');
        return function animate(dt) {
            if (playing) applyProgress(progress + (dt / 1000) * 0.045);
        };
    }

    // ================= ASTEROID BELT ===========================================
    // Main-belt particle ring with Kirkwood gaps + Ceres - educational, not N-body.
    var T3D_BELT_INNER_AU = 2.2;
    var T3D_BELT_OUTER_AU = 3.2;
    var T3D_CERES_DIAM_KM = 940;
    var T3D_BELT_MASS_PCT_MOON = 3;
    var T3D_KIRKWOOD = [
        { label: '3:1', au: 2.50 },
        { label: '5:2', au: 2.82 },
        { label: '7:3', au: 2.95 }
    ];
    function t3dAsteroidBelt(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x020308, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.22));
        var sunL = new THREE.PointLight(0xfff3c4, 1.4, 200);
        sunL.position.set(0, 0, 0);
        scene.add(sunL);
        var group = new THREE.Group();
        scene.add(group);
        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(1.6, 32, 24),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        group.add(sun);
        // Scale AU onto orbit radius units: 1 AU -> 5 units so belt spans ~11-16
        var auScale = 5;
        var rInner = T3D_BELT_INNER_AU * auScale;
        var rOuter = T3D_BELT_OUTER_AU * auScale;
        // Gap half-widths in AU (visual) so Kirkwood belts read as clear rings
        var gapHalf = 0.08;
        function inGap(au) {
            for (var g = 0; g < T3D_KIRKWOOD.length; g++) {
                if (Math.abs(au - T3D_KIRKWOOD[g].au) < gapHalf) return true;
            }
            return false;
        }
        var N = 1400;
        var positions = new Float32Array(N * 3);
        var colors = new Float32Array(N * 3);
        var i = 0;
        var placed = 0;
        while (placed < N && i < N * 8) {
            i++;
            var au = T3D_BELT_INNER_AU + Math.random() * (T3D_BELT_OUTER_AU - T3D_BELT_INNER_AU);
            if (inGap(au)) continue;
            var ang = Math.random() * Math.PI * 2;
            var r = au * auScale;
            var y = (Math.random() - 0.5) * 0.55;
            var idx = placed * 3;
            positions[idx] = Math.cos(ang) * r;
            positions[idx + 1] = y;
            positions[idx + 2] = Math.sin(ang) * r;
            var shade = 0.45 + Math.random() * 0.4;
            colors[idx] = shade;
            colors[idx + 1] = shade * 0.92;
            colors[idx + 2] = shade * 0.78;
            placed++;
        }
        var geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        var points = new THREE.Points(geo, new THREE.PointsMaterial({
            size: 0.12, vertexColors: true, transparent: true, opacity: 0.92, depthWrite: false
        }));
        group.add(points);
        // Kirkwood gap guide rings (thin lines)
        var gapLines = [];
        for (var k = 0; k < T3D_KIRKWOOD.length; k++) {
            var pts = [];
            var rr = T3D_KIRKWOOD[k].au * auScale;
            for (var j = 0; j <= 96; j++) {
                var a = (j / 96) * Math.PI * 2;
                pts.push(new THREE.Vector3(Math.cos(a) * rr, 0, Math.sin(a) * rr));
            }
            var line = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: 0xff7043, transparent: true, opacity: 0.55 })
            );
            line.visible = false;
            group.add(line);
            gapLines.push(line);
        }
        // Ceres as larger dwarf-planet marker near ~2.77 AU
        var ceresAU = 2.77;
        var ceres = new THREE.Mesh(
            new THREE.SphereGeometry(0.42, 20, 16),
            new THREE.MeshLambertMaterial({ color: 0xb0bec5, emissive: 0x222222 })
        );
        var ceresAng = 0.6;
        ceres.position.set(Math.cos(ceresAng) * ceresAU * auScale, 0.05, Math.sin(ceresAng) * ceresAU * auScale);
        group.add(ceres);
        var showGaps = false;
        var highlightCeres = true;
        var spinning = true;
        function panelHtml() {
            var gaps = showGaps
                ? '<p>Highlighted Kirkwood gaps mark Jupiter mean-motion resonances at about 2.50 AU (3:1), 2.82 AU (5:2), and 2.95 AU (7:3).</p>'
                : '';
            return '<h3>Main asteroid belt</h3>' +
                '<p>A procedural particle ring from ' + T3D_BELT_INNER_AU + ' to ' + T3D_BELT_OUTER_AU + ' AU. The larger gray body marks Ceres (about ' + T3D_CERES_DIAM_KM + ' km across). Belt mass is roughly ' + T3D_BELT_MASS_PCT_MOON + '% of the Moon.</p>' +
                gaps +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Belt span</td><td>' + T3D_BELT_INNER_AU + '-' + T3D_BELT_OUTER_AU + ' AU</td></tr>' +
                '<tr><td>Ceres diameter</td><td>about ' + T3D_CERES_DIAM_KM + ' km</td></tr>' +
                '<tr><td>Kirkwood gaps</td><td>3:1 / 5:2 / 7:3</td></tr>' +
                '<tr><td>Belt mass</td><td>~' + T3D_BELT_MASS_PCT_MOON + '% of Moon</td></tr>' +
                '</table>' +
                '<p class="t3d-note">On-screen counts and sizes are compressed for readability - the table has the real figures. This is an educational visualization of belt structure, not an N-body gravitational model.</p>';
        }
        function refresh() {
            for (var g = 0; g < gapLines.length; g++) gapLines[g].visible = showGaps;
            ceres.visible = highlightCeres;
            t3dInfo(panelHtml());
            var gapBtn = document.getElementById('t3dBeltGapsBtn');
            if (gapBtn) gapBtn.textContent = showGaps ? 'Hide Kirkwood gaps' : 'Show Kirkwood gaps';
            var cerBtn = document.getElementById('t3dBeltCeresBtn');
            if (cerBtn) cerBtn.className = 'w3-button ' + (highlightCeres ? 'w3-amber' : 'w3-light-grey');
        }
        refresh();
        var gapBtn = document.getElementById('t3dBeltGapsBtn');
        if (gapBtn) gapBtn.addEventListener('click', function () { showGaps = !showGaps; refresh(); });
        var cerBtn = document.getElementById('t3dBeltCeresBtn');
        if (cerBtn) cerBtn.addEventListener('click', function () { highlightCeres = !highlightCeres; refresh(); });
        var playBtn = document.getElementById('t3dBeltPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            spinning = !spinning;
            playBtn.textContent = spinning ? 'Pause spin' : 'Play spin';
        });
        var speedEl = document.getElementById('t3dBeltSpeed');
        var speed = 1;
        if (speedEl) speedEl.addEventListener('input', function () { speed = parseFloat(speedEl.value || '1'); });
        t3dStatus('Drag to orbit, scroll to zoom. Toggle Kirkwood gap rings, highlight Ceres, and spin the belt.');
        return function animate(dt) {
            if (spinning) group.rotation.y += (dt / 1000) * 0.12 * speed;
        };
    }

    // ================= TIDAL LOCKING ===========================================
    // Why the Moon keeps one face toward Earth - synchronous rotation demo.
    var T3D_MOON_SIDEREAL_D = 27.32;
    var T3D_MOON_RECESSION_CM_YR = 3.8;
    var T3D_DAY_LENGTHEN_MS_CENT = 1.7;
    function t3dTidalLocking(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.28));
        var sun = new THREE.DirectionalLight(0xffffff, 1.05);
        sun.position.set(40, 20, 30);
        scene.add(sun);
        var group = new THREE.Group();
        scene.add(group);
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(3.2, 40, 28),
            new THREE.MeshPhongMaterial({ color: 0x2e7d9a, emissive: 0x0a1520, shininess: 14 })
        );
        group.add(earth);
        var moon = new THREE.Mesh(
            new THREE.SphereGeometry(0.95, 28, 20),
            new THREE.MeshLambertMaterial({ color: 0xcfd8dc, emissive: 0x222222 })
        );
        // Near-side marker (dark patch) so the reader sees which face points at Earth
        var nearFace = new THREE.Mesh(
            new THREE.SphereGeometry(0.96, 16, 12, 0, Math.PI * 0.55, 0, Math.PI),
            new THREE.MeshLambertMaterial({ color: 0x78909c, emissive: 0x111111 })
        );
        nearFace.rotation.y = Math.PI; // face Earth at phase 0 when locked
        moon.add(nearFace);
        group.add(moon);
        var orbitR = 9.5;
        // orbit ring
        var ringPts = [];
        for (var i = 0; i <= 96; i++) {
            var a = (i / 96) * Math.PI * 2;
            ringPts.push(new THREE.Vector3(Math.cos(a) * orbitR, 0, Math.sin(a) * orbitR));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(ringPts),
            new THREE.LineBasicMaterial({ color: 0x546e7a, transparent: true, opacity: 0.45 })
        ));
        var locked = true;
        var progress = 0.15;
        var playing = true;
        var earthSpin = 0;
        function panelHtml() {
            var mode = locked ? 'Tidally locked (synchronous)' : 'Unlocked spin demo';
            return '<h3>' + mode + '</h3>' +
                '<p>The Moon\'s spin period equals its orbital period of ' + T3D_MOON_SIDEREAL_D + ' days, so the same face stays toward Earth. Toggle Unlocked spin to watch a free-spinning moon show its far side as it orbits.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Moon spin = orbit</td><td>' + T3D_MOON_SIDEREAL_D + ' d (sidereal)</td></tr>' +
                '<tr><td>Lunar recession</td><td>' + T3D_MOON_RECESSION_CM_YR + ' cm/yr</td></tr>' +
                '<tr><td>Earth day lengthening</td><td>' + T3D_DAY_LENGTHEN_MS_CENT + ' ms/century</td></tr>' +
                '</table>' +
                '<p class="t3d-note">On-screen sizes and distances are compressed for readability - the table has the real figures. This is an educational geometry visualization, not a physical simulation of tidal friction.</p>';
        }
        function applyProgress(p) {
            progress = ((p % 1) + 1) % 1;
            var ang = progress * Math.PI * 2;
            moon.position.set(Math.cos(ang) * orbitR, 0, Math.sin(ang) * orbitR);
            if (locked) {
                // Keep near-face toward Earth: moon.y rotation follows orbit angle
                moon.rotation.y = ang + Math.PI;
            } else {
                // Free spin ~3x orbital rate so far side clearly appears
                moon.rotation.y = ang * 3.2;
            }
            earth.rotation.y = earthSpin;
            var slider = document.getElementById('t3dTidalProgress');
            var label = document.getElementById('t3dTidalProgressLabel');
            if (slider) slider.value = String(Math.round(progress * 100));
            if (label) label.textContent = Math.round(progress * 100) + '%';
            t3dInfo(panelHtml());
        }
        function setLocked(on) {
            locked = on;
            var lockBtn = document.getElementById('t3dTidalLockBtn');
            var unlockBtn = document.getElementById('t3dTidalUnlockBtn');
            if (lockBtn) lockBtn.className = 'w3-button ' + (on ? 'w3-amber' : 'w3-light-grey');
            if (unlockBtn) unlockBtn.className = 'w3-button ' + (!on ? 'w3-amber' : 'w3-light-grey');
            applyProgress(progress);
        }
        setLocked(true);
        var lockBtn = document.getElementById('t3dTidalLockBtn');
        var unlockBtn = document.getElementById('t3dTidalUnlockBtn');
        if (lockBtn) lockBtn.addEventListener('click', function () { setLocked(true); });
        if (unlockBtn) unlockBtn.addEventListener('click', function () { setLocked(false); });
        var playBtn = document.getElementById('t3dTidalPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause orbit' : 'Play orbit';
        });
        var slider = document.getElementById('t3dTidalProgress');
        if (slider) slider.addEventListener('input', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play orbit';
            applyProgress(parseFloat(slider.value || '0') / 100);
        });
        t3dStatus('Drag to orbit, scroll to zoom. Toggle Tidally locked vs Unlocked spin, scrub orbit phase, and watch which lunar face points at Earth.');
        return function animate(dt) {
            earthSpin += (dt / 1000) * 0.35;
            if (playing) applyProgress(progress + (dt / 1000) * 0.06);
            else {
                earth.rotation.y = earthSpin;
                t3dInfo(panelHtml());
            }
        };
    }

    function t3dExoplanetTransit(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x020308, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.25));
        var group = new THREE.Group();
        scene.add(group);
        var star = new THREE.Mesh(
            new THREE.SphereGeometry(4.2, 48, 36),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        group.add(star);
        var planet = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 28, 20),
            new THREE.MeshLambertMaterial({ color: 0x5c6bc0, emissive: 0x111122 })
        );
        group.add(planet);
        var orbitR = 9;
        var preset = 'jupiter';
        var progress = 0.42;
        var playing = false;
        var trappist = false;
        function depthPct() { return preset === 'jupiter' ? T3D_JUP_DEPTH_PCT : T3D_EARTH_DEPTH_PCT; }
        function planetRadius() { return preset === 'jupiter' ? 0.55 : 0.16; }
        function overlapDim(p) {
            var ang = p * Math.PI * 2;
            planet.position.set(Math.cos(ang) * orbitR, 0, Math.sin(ang) * orbitR);
            planet.geometry.dispose();
            planet.geometry = new THREE.SphereGeometry(planetRadius(), 28, 20);
            var dx = planet.position.x;
            var overlap = Math.max(0, 1 - Math.abs(dx) / (planetRadius() + 0.3));
            var dim = 1 - (depthPct() / 100) * overlap;
            star.material.color.setRGB(1 * dim, 0.84 * dim, 0.31 * dim);
            var inTransit = overlap > 0.35;
            return inTransit;
        }
        function panelHtml(inTransit) {
            var depth = depthPct();
            var trap = trappist
                ? '<p>TRAPPIST-1 hosts ' + T3D_TRAPPIST_COUNT + ' known transiting planets with orbital periods from ' + T3D_TRAPPIST_PERIOD_MIN_D + ' to ' + T3D_TRAPPIST_PERIOD_MAX_D + ' days (published catalog values).</p>'
                : '';
            return '<h3>' + (inTransit ? 'Planet in transit' : 'Planet outside transit') + '</h3>' +
                '<p>Transit depth scales as (R<sub>planet</sub>/R<sub>star</sub>)<sup>2</sup>. A Jupiter-Sun analog dips about ' + T3D_JUP_DEPTH_PCT + '%; an Earth-Sun analog about ' + T3D_EARTH_DEPTH_PCT + '%. Current preset depth: ' + depth + '%.</p>' +
                trap +
                '<table class="w3-table w3-bordered"><tr><td>Jupiter-Sun depth</td><td>about ' + T3D_JUP_DEPTH_PCT + '%</td></tr>' +
                '<tr><td>Earth-Sun depth</td><td>about ' + T3D_EARTH_DEPTH_PCT + '%</td></tr>' +
                '<tr><td>TRAPPIST-1 planets</td><td>' + T3D_TRAPPIST_COUNT + ' (1.5-19 d periods)</td></tr></table>' +
                '<p class="t3d-note">Educational geometry visualization - not a photometry pipeline or real observation matched to tonight\'s sky. This is not a physical simulation.</p>';
        }
        function applyProgress(p) {
            progress = Math.max(0, Math.min(1, p));
            var inTransit = overlapDim(progress);
            var slider = document.getElementById('t3dTransitProgress');
            var label = document.getElementById('t3dTransitProgressLabel');
            if (slider) slider.value = String(Math.round(progress * 100));
            if (label) label.textContent = Math.round(progress * 100) + '%';
            t3dInfo(panelHtml(inTransit));
        }
        function setPreset(id) {
            preset = id;
            var jup = document.getElementById('t3dTransitBtn-jupiter');
            var earth = document.getElementById('t3dTransitBtn-earth');
            if (jup) jup.className = 'w3-button ' + (id === 'jupiter' ? 'w3-amber' : 'w3-light-grey');
            if (earth) earth.className = 'w3-button ' + (id === 'earth' ? 'w3-amber' : 'w3-light-grey');
            applyProgress(progress);
        }
        setPreset('jupiter');
        var jupBtn = document.getElementById('t3dTransitBtn-jupiter');
        var earthBtn = document.getElementById('t3dTransitBtn-earth');
        if (jupBtn) jupBtn.addEventListener('click', function () { setPreset('jupiter'); });
        if (earthBtn) earthBtn.addEventListener('click', function () { setPreset('earth'); });
        var trapBtn = document.getElementById('t3dTrappistBtn');
        if (trapBtn) trapBtn.addEventListener('click', function () {
            trappist = !trappist;
            trapBtn.textContent = trappist ? 'Hide TRAPPIST-1 note' : 'Show TRAPPIST-1 note';
            applyProgress(progress);
        });
        var playBtn = document.getElementById('t3dTransitPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause orbit' : 'Play orbit';
        });
        var slider = document.getElementById('t3dTransitProgress');

    // ================= ISS ORBIT TRACKER =======================================
    // Procedural low-Earth orbit of the ISS around Earth - educational, not live tracking.
    var T3D_ISS_ALT_KM = 408;
    var T3D_ISS_PERIOD_MIN = 92.9;

    var T3D_ISS_INCL_DEG = 51.64;

    function t3dIssOrbitTracker(shell) {

        );

            new THREE.BoxGeometry(1.4, 0.7, 0.7),
            new THREE.MeshLambertMaterial({ color: 0xe0e0e0 })
        );
        var panel = new THREE.Mesh(
            new THREE.BoxGeometry(2.8, 0.08, 0.5),
            new THREE.MeshLambertMaterial({ color: 0xb0bec5 })
        );

        scene.add(iss);

        var trackMax = 220;
        var trackPos = new Float32Array(trackMax * 3);

        var phase = 0;
        var playing = true;

        function issPos(theta) {

            trackPos[idx * 3 + 2] = g.z;

        function setInfo() {
            t3dInfo('<h3>ISS low-Earth orbit</h3><p>Procedural orbit of the International Space Station around Earth. The yellow line is the ground track - where the station passes over the surface. This is an educational visualization, not live tracking.</p><table class="w3-table w3-bordered"><tr><td>Mean altitude</td><td>' + T3D_ISS_ALT_KM + ' km</td></tr><tr><td>Orbital period</td><td>' + T3D_ISS_PERIOD_MIN + ' min</td></tr><tr><td>Orbital speed</td><td>' + T3D_ISS_SPEED_KMS + ' km/s</td></tr><tr><td>Inclination</td><td>' + T3D_ISS_INCL_DEG + ' deg</td></tr><tr><td>Orbits per day</td><td>' + T3D_ISS_ORBITS_PER_DAY + '</td></tr></table><p class="t3d-note">Earth and orbit sizes are compressed for readability. Figures are NASA published values. This is not a physical simulation and does not show tonight\'s pass times.</p>');

        var trackBtn = document.getElementById('t3dIssTrackBtn');
        if (trackBtn) trackBtn.addEventListener('click', function () { showTrack = !showTrack; trackLine.visible = showTrack; trackBtn.textContent = showTrack ? 'Hide ground track' : 'Show ground track'; if (!showTrack) { trackCount = 0; trackGeo.setDrawRange(0, 0); } });
        var speedEl = document.getElementById('t3dIssSpeed');

        var phaseEl = document.getElementById('t3dIssPhase');
        var phaseLabel = document.getElementById('t3dIssPhaseLabel');
        if (phaseEl) phaseEl.addEventListener('input', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play orbit';
            phase = (parseFloat(phaseEl.value || '0') / 100) * Math.PI * 2;
            if (phaseLabel) phaseLabel.textContent = parseFloat(phaseEl.value || '0').toFixed(0) + '%';
            syncIss();
        });
        t3dStatus('Drag to orbit Earth, scroll to zoom. Watch the ISS circle Earth and read the ground track.');
        return function animate(dt) {
            if (!playing) return;
            phase += (dt / 1000) * (Math.PI * 2 / (T3D_ISS_PERIOD_MIN * 60)) * speed * 8;
            if (phase > Math.PI * 2) phase -= Math.PI * 2;
            if (phaseEl && !phaseEl.matches(':active')) {
                var pct = (phase / (Math.PI * 2)) * 100;

    // ================= MOON CALENDAR 3D ==========================================
    // Face-on Moon with phase by calendar day, faint earthshine on the dark limb,
    // and a libration wobble. Educational - not an ephemeris or tonight's sky.
    var T3D_CAL_SYNODIC = 29.53;
    var T3D_LIB_LONG_DEG = 7.9;
    var T3D_LIB_LAT_DEG = 6.7;
    function t3dMoonCalendar3d(shell) {
        var THREE = shell.THREE, scene = shell.scene;

        var sunLight = new THREE.DirectionalLight(0xfff8e8, 1.25);
        scene.add(sunLight);
        var earthShine = new THREE.DirectionalLight(0x6688aa, 0.22);
        scene.add(earthShine);
        var SCOUNT = shell.low ? 350 : 800;
        var spos = new Float32Array(SCOUNT * 3);
        for (var s = 0; s < SCOUNT; s++) {
            var v = new THREE.Vector3().randomDirection().multiplyScalar(90 + Math.random() * 140);
            spos[s * 3] = v.x; spos[s * 3 + 1] = v.y; spos[s * 3 + 2] = v.z;
        }
        var sgeo = new THREE.BufferGeometry();
        sgeo.setAttribute('position', new THREE.BufferAttribute(spos, 3));
