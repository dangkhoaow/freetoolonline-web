<script>
    // 2D canvas game archetype skeleton (2048-game) - pure JS + canvas, no upload,
    // no backend, no external lib. Registry Gate-H entry: game_2d_canvas_purejs.
    // ONE skeleton serves the 2D game family; the game is dispatched from the
    // slug: snake (grid snake), tanks (arcade tank battle), defense (lane
    // defense), g2048 (sliding tile-merge puzzle). All art is procedural
    // (canvas shapes + gradients) - no sprite assets, no third-party media.
    // Scores persist ONLY in this browser via localStorage 'ftol-game-2048-game'.
    //
    // MODULE PRUNING (fire-31 - same contract as T3D_MODULE): each game lives
    // in /* G2D_MODULE:<kind> START/END */ markers and self-registers in
    // G2D_REGISTRY; emit-cms-fragments strips non-matching modules per slug,
    // so an emitted page carries only its own game. Unmarked content is the
    // SHARED core. Shipped fire-23 pages are never re-emitted.
    //
    // Renders a visible start screen synchronously on load so qa-e2e-test G16
    // (visible output) passes with no interaction. Fullscreen targets the
    // WRAPPER div (HUD + buttons stay visible); Escape exits natively.
    //
    // Framework contract: bootstrap in doAfterPageRendered() (called for EVERY
    // page after base-script load). Do NOT touch the DOM at top level.

    web.localUpload = false;

    var G2D_SLUG = '2048-game';
    var G2D_STORE_KEY = 'ftol-game-' + G2D_SLUG;

    function g2dDetectGame(slug) {
        var s = String(slug || '').toLowerCase();
        if (/2048|number-merge/.test(s)) return 'g2048';
        if (/snake/.test(s)) return 'snake';
        if (/tank/.test(s)) return 'tanks';
        if (/defense|defend|garden/.test(s)) return 'defense';
        return 'snake';
    }

    // Module registry: each G2D_MODULE block below registers itself here
    // ({fn, logical:[w,h], cards?}). Bootstrap reads the registry instead of
    // naming modules - pruned modules never register, so no dangling
    // identifiers remain on emitted pages.
    var G2D_REGISTRY = {};

    // ---- shared: persistence (localStorage is a cache - guard every access) ----
    function g2dLoadStore() {
        try { return JSON.parse(localStorage.getItem(G2D_STORE_KEY) || '{}') || {}; }
        catch (e) { return {}; }
    }
    function g2dSaveStore(obj) {
        try { localStorage.setItem(G2D_STORE_KEY, JSON.stringify(obj)); }
        catch (e) { /* quota / private mode - play continues without persistence */ }
    }

    // ---- shared: fullscreen on the wrapper (lcd-test vendor-chain pattern) ----
    function g2dFullscreen(el) {
        if (el.requestFullscreen) { el.requestFullscreen(); }
        else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
        else if (el.mozRequestFullScreen) { el.mozRequestFullScreen(); }
        else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
    }

    // ---- shared: canvas sizing (container-width scaled, DPR-aware, cap 2) ----
    function g2dFitCanvas(canvas, logicalW, logicalH) {
        var wrap = canvas.parentElement;
        var avail = Math.max(240, Math.min(wrap.clientWidth - 4, 720));
        var cssW = avail;
        var cssH = Math.round(avail * (logicalH / logicalW));
        // In fullscreen, fit the viewport height too (HUD needs ~120px).
        var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
        if (fsEl && fsEl.contains(canvas)) {
            var maxH = (window.innerHeight || cssH) - 140;
            if (cssH > maxH) { cssH = maxH; cssW = Math.round(maxH * (logicalW / logicalH)); }
        }
        var dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.style.width = cssW + 'px';
        canvas.style.height = cssH + 'px';
        canvas.width = Math.round(logicalW * dpr);
        canvas.height = Math.round(logicalH * dpr);
        var ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        return ctx;
    }

    // ---- shared: fixed-timestep loop -----------------------------------------
    // update(dtMs) runs at a fixed 1000/60 step; render() once per animation frame.
    function g2dLoop(game) {
        var STEP = 1000 / 60;
        var last = performance.now(), acc = 0;
        function frame(now) {
            var elapsed = Math.min(now - last, 250); // clamp tab-switch jumps
            last = now;
            if (!game.paused && !game.over) {
                acc += elapsed;
                while (acc >= STEP) { game.update(STEP); acc -= STEP; }
            }
            game.render();
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    }

    // ---- shared: input (keyboard + touch swipe + on-screen pad) --------------
    function g2dBindInput(root, handlers) {
        window.addEventListener('keydown', function (e) {
            var k = e.key;
            var used = true;
            if (k === 'ArrowUp' || k === 'w' || k === 'W') handlers.dir && handlers.dir(0, -1);
            else if (k === 'ArrowDown' || k === 's' || k === 'S') handlers.dir && handlers.dir(0, 1);
            else if (k === 'ArrowLeft' || k === 'a' || k === 'A') handlers.dir && handlers.dir(-1, 0);
            else if (k === 'ArrowRight' || k === 'd' || k === 'D') handlers.dir && handlers.dir(1, 0);
            else if (k === ' ') handlers.action && handlers.action();
            else if (k === 'p' || k === 'P') handlers.pause && handlers.pause();
            else used = false;
            // Only steal the keys while the game area is on screen.
            if (used && root.getBoundingClientRect().top < (window.innerHeight || 0)) e.preventDefault();
        });
        // Touch: swipe on the canvas = direction; tap = action.
        var canvas = root.querySelector('canvas');
        var t0 = null;
        canvas.addEventListener('touchstart', function (e) {
            if (e.touches.length === 1) t0 = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: performance.now() };
        }, { passive: true });
        canvas.addEventListener('touchend', function (e) {
            if (!t0) return;
            var t1 = e.changedTouches[0];
            var dx = t1.clientX - t0.x, dy = t1.clientY - t0.y;
            var adx = Math.abs(dx), ady = Math.abs(dy);
            if (Math.max(adx, ady) < 18 && performance.now() - t0.t < 400) { handlers.action && handlers.action(); }
            else if (adx > ady) { handlers.dir && handlers.dir(dx > 0 ? 1 : -1, 0); }
            else { handlers.dir && handlers.dir(0, dy > 0 ? 1 : -1); }
            t0 = null;
        }, { passive: true });
        // On-screen pad buttons (rendered by BODYHTML; visible on coarse pointers).
        function pad(id, fn) {
            var b = document.getElementById(id);
            if (!b) return;
            b.addEventListener('click', function (e) { e.preventDefault(); fn(); });
        }
        pad('g2dPadUp', function () { handlers.dir && handlers.dir(0, -1); });
        pad('g2dPadDown', function () { handlers.dir && handlers.dir(0, 1); });
        pad('g2dPadLeft', function () { handlers.dir && handlers.dir(-1, 0); });
        pad('g2dPadRight', function () { handlers.dir && handlers.dir(1, 0); });
        pad('g2dPadAction', function () { handlers.action && handlers.action(); });
    }

    function g2dHud(text) {
        var el = document.getElementById('g2dHudStatus');
        if (el) el.textContent = text;
    }
    function g2dScoreLine(text) {
        var el = document.getElementById('g2dHudScore');
        if (el) el.textContent = text;
    }




    /* G2D_MODULE:g2048 START */
    // ================= 2048 (sliding tile-merge puzzle) ======================
    // Independent canvas implementation of the classic tile-merge mechanic
    // (the original 2048 was released as MIT-licensed open source). Slide with
    // arrows/WASD/swipe; equal tiles merge into their sum; a new 2 (or 4)
    // appears after every move; the board ends when no move changes anything.
    // Tiles slide with a short ease-out animation; merges and spawns pop.
    function g2d2048(root, canvas) {
        var N = 4, GAP = 12, CELL = 105, W = N * (CELL + GAP) + GAP, H = W;
        var ctx = g2dFitCanvas(canvas, W, H);
        var store = g2dLoadStore();
        var COLORS = {
            2: ['#efe5d6', '#6f675c'], 4: ['#ecd9b0', '#6f675c'], 8: ['#f1a96b', '#ffffff'],
            16: ['#ef8d55', '#ffffff'], 32: ['#ec7150', '#ffffff'], 64: ['#e8553a', '#ffffff'],
            128: ['#eccb62', '#ffffff'], 256: ['#eac74f', '#ffffff'], 512: ['#e8c33d', '#ffffff'],
            1024: ['#e6bf2c', '#ffffff'], 2048: ['#e4ba1b', '#ffffff'],
        };
        var game = {
            paused: false, over: false, started: true,
            grid: null, score: 0, best: store.best || 0,
            reached: !!store.reached2048, anim: null, pops: [],
        };
        function emptyGrid() {
            var g = [];
            for (var r = 0; r < N; r++) g.push([0, 0, 0, 0]);
            return g;
        }
        function addTile(pop) {
            var cells = [];
            for (var r = 0; r < N; r++) for (var c = 0; c < N; c++) if (!game.grid[r][c]) cells.push([r, c]);
            if (!cells.length) return;
            var rc = cells[Math.floor(Math.random() * cells.length)];
            game.grid[rc[0]][rc[1]] = Math.random() < 0.9 ? 2 : 4;
            if (pop) game.pops.push({ r: rc[0], c: rc[1], t: 0, grow: true });
        }
        function reset() {
            game.grid = emptyGrid();
            game.score = 0; game.over = false; game.anim = null; game.pops = [];
            addTile(false); addTile(false);
            hud();
        }
        function hud() {
            g2dScoreLine('Score: ' + game.score + '  Best: ' + game.best);
            g2dHud(game.over ? 'No moves left - press Space or tap to start a new board.'
                : (game.reached ? 'You built the 2048 tile - keep merging for a higher score.'
                    : 'Arrow keys, WASD, or swipe to slide. Equal tiles merge when they collide.'));
        }
        function movable() {
            for (var r = 0; r < N; r++) for (var c = 0; c < N; c++) {
                var v = game.grid[r][c];
                if (!v) return true;
                if (c + 1 < N && game.grid[r][c + 1] === v) return true;
                if (r + 1 < N && game.grid[r + 1][c] === v) return true;
            }
            return false;
        }
        function doMove(dx, dy) {
            if (game.anim || game.over) return;
            var list = [], merges = [], gained = 0, changed = false;
            var next = emptyGrid();
            function slotRC(line, s) {
                return dx !== 0 ? [line, dx > 0 ? N - 1 - s : s] : [dy > 0 ? N - 1 - s : s, line];
            }
            for (var line = 0; line < N; line++) {
                var out = [];
                for (var k = 0; k < N; k++) {
                    var r = dx !== 0 ? line : (dy > 0 ? N - 1 - k : k);
                    var c = dx !== 0 ? (dx > 0 ? N - 1 - k : k) : line;
                    var v = game.grid[r][c];
                    if (!v) continue;
                    var last = out.length ? out[out.length - 1] : null;
                    var rc;
                    if (last && last.v === v && !last.merged) {
                        last.v *= 2; last.merged = true; gained += last.v;
                        rc = slotRC(line, out.length - 1);
                        list.push({ v: v, fr: r, fc: c, tr: rc[0], tc: rc[1] });
                        merges.push({ r: rc[0], c: rc[1] });
                        changed = true;
                    } else {
                        out.push({ v: v, merged: false });
                        rc = slotRC(line, out.length - 1);
                        list.push({ v: v, fr: r, fc: c, tr: rc[0], tc: rc[1] });
                        if (rc[0] !== r || rc[1] !== c) changed = true;
                    }
                }
                for (var s = 0; s < out.length; s++) {
                    var rc2 = slotRC(line, s);
                    next[rc2[0]][rc2[1]] = out[s].v;
                }
            }
            if (!changed) return;
            game.grid = next;
            game.score += gained;
            if (game.score > game.best) { game.best = game.score; store.best = game.best; g2dSaveStore(store); }
            if (!game.reached) {
                for (var r2 = 0; r2 < N; r2++) for (var c2 = 0; c2 < N; c2++) {
                    if (game.grid[r2][c2] >= 2048) { game.reached = true; store.reached2048 = true; g2dSaveStore(store); }
                }
            }
            game.anim = { t: 0, dur: 110, list: list, merges: merges };
            hud();
        }
        game.update = function (dt) {
            if (game.anim) {
                game.anim.t += dt;
                if (game.anim.t >= game.anim.dur) {
                    for (var m = 0; m < game.anim.merges.length; m++) {
                        game.pops.push({ r: game.anim.merges[m].r, c: game.anim.merges[m].c, t: 0, grow: false });
                    }
                    game.anim = null;
                    addTile(true);
                    if (!movable()) game.over = true;
                    hud();
                }
            }
            for (var p = game.pops.length - 1; p >= 0; p--) {
                game.pops[p].t += dt;
                if (game.pops[p].t >= 130) game.pops.splice(p, 1);
            }
        };
        function rr(x, y, w, h, rad) {
            ctx.beginPath();
            ctx.moveTo(x + rad, y);
            ctx.arcTo(x + w, y, x + w, y + h, rad);
            ctx.arcTo(x + w, y + h, x, y + h, rad);
            ctx.arcTo(x, y + h, x, y, rad);
            ctx.arcTo(x, y, x + w, y, rad);
            ctx.closePath();
        }
        function tileXY(r, c) { return [GAP + c * (CELL + GAP), GAP + r * (CELL + GAP)]; }
        function drawTile(x, y, v, scale) {
            var col = COLORS[v] || ['#3b3833', '#ffffff'];
            var cx = x + CELL / 2, cy = y + CELL / 2;
            var s = CELL * (scale || 1);
            ctx.fillStyle = col[0];
            rr(cx - s / 2, cy - s / 2, s, s, 8);
            ctx.fill();
            ctx.fillStyle = col[1];
            var digits = String(v).length;
            ctx.font = '700 ' + (digits <= 2 ? 52 : digits === 3 ? 44 : digits === 4 ? 34 : 26) + 'px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(String(v), cx, cy + 2);
        }
        game.render = function () {
            ctx.fillStyle = '#b3a396'; ctx.fillRect(0, 0, W, H);
            var r, c, xy;
            for (r = 0; r < N; r++) for (c = 0; c < N; c++) {
                xy = tileXY(r, c);
                ctx.fillStyle = '#c9bcae';
                rr(xy[0], xy[1], CELL, CELL, 8);
                ctx.fill();
            }
            if (game.anim) {
                var p = Math.min(1, game.anim.t / game.anim.dur);
                var e = 1 - (1 - p) * (1 - p);
                for (var i = 0; i < game.anim.list.length; i++) {
                    var t = game.anim.list[i];
                    var a = tileXY(t.fr, t.fc), b = tileXY(t.tr, t.tc);
                    drawTile(a[0] + (b[0] - a[0]) * e, a[1] + (b[1] - a[1]) * e, t.v, 1);
                }
            } else {
                for (r = 0; r < N; r++) for (c = 0; c < N; c++) {
                    var v = game.grid[r][c];
                    if (!v) continue;
                    var scale = 1;
                    for (var q = 0; q < game.pops.length; q++) {
                        var pop = game.pops[q];
                        if (pop.r === r && pop.c === c) {
                            var pt = pop.t / 130;
                            scale = pop.grow ? 0.35 + 0.65 * pt : 1 + 0.18 * Math.sin(Math.PI * pt);
                        }
                    }
                    xy = tileXY(r, c);
                    drawTile(xy[0], xy[1], v, scale);
                }
            }
            if (game.over) {
                ctx.fillStyle = 'rgba(250,248,239,0.72)'; ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#6f675c'; ctx.font = '700 40px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('No moves left', W / 2, H / 2 - 18);
                ctx.font = '400 17px sans-serif';
                ctx.fillText('Score ' + game.score + ' - best ' + game.best, W / 2, H / 2 + 18);
                ctx.fillText('Space or tap to play again', W / 2, H / 2 + 44);
            }
        };
        g2dBindInput(root, {
            dir: function (x, y) { doMove(x, y); },
            action: function () { if (game.over) reset(); },
            pause: function () { /* turn-based board - nothing runs between moves */ },
        });
        reset();
        return game;
    }
    G2D_REGISTRY.g2048 = { fn: g2d2048, logical: [480, 480] };
    /* G2D_MODULE:g2048 END */

    // ---- bootstrap ------------------------------------------------------------
    function doAfterPageRendered() {
        var root = document.getElementById('gameCanvasTool');
        if (!root) return; // not a 2D game page
        var canvas = root.querySelector('canvas');
        var wrapper = document.getElementById('g2dWrapper') || root;
        try {
            var kind = g2dDetectGame(G2D_SLUG);
            var mod = G2D_REGISTRY[kind];
            if (!mod) { for (var kk in G2D_REGISTRY) { kind = kk; mod = G2D_REGISTRY[kk]; break; } }
            if (!mod) { root.textContent = 'No game module is registered on this page.'; return; }
            // Only defense registers cards; other games hide the card row.
            var cards = document.getElementById('g2dCards');
            if (cards) cards.style.display = mod.cards ? '' : 'none';
            var game = mod.fn(root, canvas);
            g2dLoop(game);
            var fsBtn = document.getElementById('g2dFullscreenBtn');
            if (fsBtn) fsBtn.addEventListener('click', function () { g2dFullscreen(wrapper); });
            var pauseBtn = document.getElementById('g2dPauseBtn');
            if (pauseBtn) pauseBtn.addEventListener('click', function () { if (!game.over) { game.paused = !game.paused; } });
            var restartBtn = document.getElementById('g2dRestartBtn');
            if (restartBtn) restartBtn.addEventListener('click', function () { window.location.reload(); });
            function refit() { g2dFitCanvas(canvas, mod.logical[0], mod.logical[1]); }
            window.addEventListener('resize', refit);
            document.addEventListener('fullscreenchange', refit);
            document.addEventListener('webkitfullscreenchange', refit);
        } catch (e) {
            root.textContent = 'Could not start the game: ' + (e && e.message ? e.message : String(e));
        }
    }
</script>
