        );
        var earthB = new THREE.Mesh(
            new THREE.SphereGeometry(0.22, 16, 12),
            new THREE.MeshBasicMaterial({ color: 0x81d4fa })
        );
        earthA.position.set(earthR, 0, 0);
        earthB.position.set(-earthR, 0, 0);
        group.add(earthA); group.add(earthB);

        // Distant star on +Z teaching axis; distance scrubbed by parallax (arcsec)
        var star = new THREE.Mesh(
            new THREE.SphereGeometry(0.35, 16, 12),
            new THREE.MeshBasicMaterial({ color: 0xffecb3 })
        );
        group.add(star);
        var glow = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 12, 10),
            new THREE.MeshBasicMaterial({ color: 0xfff8e1, transparent: true, opacity: 0.3, depthWrite: false })
        );
        star.add(glow);

        // Sight lines Earth A/B -> star
        var lineA = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
            new THREE.LineBasicMaterial({ color: 0x90caf9, transparent: true, opacity: 0.85 })
        );
        var lineB = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
            new THREE.LineBasicMaterial({ color: 0xa5d6a7, transparent: true, opacity: 0.85 })
        );
        group.add(lineA); group.add(lineB);

        // Baseline chord A-B
        var baseLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
            new THREE.LineBasicMaterial({ color: 0xffab91, transparent: true, opacity: 0.9 })
        );

        var parallaxAs = T3D_PX_PROXIMA_AS; // arcsec
        var presets = {
            proxima: T3D_PX_PROXIMA_AS,
            oneas: 1.0,

        function distPc(pAs) { return 1 / pAs; }
        function distLy(pAs) { return distPc(pAs) * T3D_PX_PC_LY; }
        function distAu(pAs) { return distPc(pAs) * T3D_PX_PC_AU; }

        function applyGeometry() {
            // Teaching display: star Z scales with 1/parallax (softer clamp for camera)
            var pc = distPc(parallaxAs);
            var z = Math.min(28, 6 + Math.sqrt(pc) * 3.2);
            star.position.set(0, 0.15, z);
            // Parallax half-angle exaggerated for visibility (true angles are sub-arcsec)
            var halfAngle = Math.min(0.22, 0.04 + (0.12 / Math.max(parallaxAs, 0.2)));
            earthA.position.set(Math.cos(0) * earthR, 0, Math.sin(0) * earthR);
            earthB.position.set(Math.cos(Math.PI) * earthR, 0, Math.sin(Math.PI) * earthR);

            lineB.geometry.setFromPoints([earthB.position.clone(), new THREE.Vector3(-lat, 0.1, z)]);
            baseLine.geometry.setFromPoints([earthA.position.clone(), earthB.position.clone()]);
            star.position.x = 0;

        applyGeometry();

        function panelHtml(focus) {

        if (baseBtn) baseBtn.addEventListener('click', function () { t3dInfo(panelHtml('baseline')); });

        t3dStatus('Drag to orbit, scroll to zoom. Try Proxima, 1 arcsec, and 0.5 arcsec presets - star depth follows 1/p.');
        var spin = 0;
        return function animate(dt) {

    // ================= STELLAR MAGNITUDE ======================================
    // Apparent vs absolute magnitude brightness scale - educational, not catalogs.
    var T3D_SM_SUN_APP = -26.74;
    var T3D_SM_SIRIUS_APP = -1.46;
    var T3D_SM_VEGA_APP = 0.03;
    var T3D_SM_NAKED = 6;
    var T3D_SM_STEP = 2.512; // Pogson ratio per magnitude
    function t3dStellarMagnitude(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        var group = new THREE.Group();
        scene.add(group);
        // Reference stars at fixed rail positions; size ~ sqrt(flux) from magnitude
        var stars = [
            { name: 'Sun', mApp: T3D_SM_SUN_APP, mAbs: 4.83, x: -10, color: 0xfff176 },
            { name: 'Sirius', mApp: T3D_SM_SIRIUS_APP, mAbs: 1.42, x: -3.5, color: 0xe3f2fd },
            { name: 'Vega', mApp: T3D_SM_VEGA_APP, mAbs: 0.58, x: 2.5, color: 0xbbdefb },
            { name: 'Naked-eye limit', mApp: T3D_SM_NAKED, mAbs: T3D_SM_NAKED, x: 9, color: 0x90a4ae }
        ];
        var mode = 'apparent'; // or absolute
        var meshes = [];
        function fluxFromMag(m) {
            // relative to Vega ~0; clamp for display so Sun does not blow out camera
            var rel = Math.pow(T3D_SM_STEP, -(m - 0));
            return rel;
        }
        function radiusFor(m) {
            var f = fluxFromMag(m);
            // Soft display scale: Sun capped
            var r = 0.35 + Math.min(4.2, Math.pow(f, 0.22) * 0.55);
            if (m < -20) r = 4.5; // Sun teaching size
            return r;
        }
        stars.forEach(function (s) {
            var geo = new THREE.SphereGeometry(1, 24, 16);
            var mat = new THREE.MeshBasicMaterial({ color: s.color });
            var mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(s.x, 0, 0);
            mesh.userData = { kind: 'star', name: s.name, def: s };
            group.add(mesh);
            // Glow sprite-ish: transparent outer sphere
            var glow = new THREE.Mesh(
                new THREE.SphereGeometry(1.35, 16, 12),
                new THREE.MeshBasicMaterial({ color: s.color, transparent: true, opacity: 0.22, depthWrite: false })
            );
            mesh.add(glow);
            meshes.push(mesh);
        });
        // Magnitude rail
        var rail = [];
        for (var i = 0; i <= 40; i++) {
            rail.push(new THREE.Vector3(-12 + i * 0.55, -3.2, 0));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(rail),
            new THREE.LineBasicMaterial({ color: 0x546e7a, transparent: true, opacity: 0.55 })
        ));
        function applyMode() {
            meshes.forEach(function (mesh) {
                var s = mesh.userData.def;
                var m = mode === 'apparent' ? s.mApp : s.mAbs;
                var r = radiusFor(m);
                mesh.scale.set(r, r, r);
            });
        }
        applyMode();
        function panelHtml(sel) {
            var base =
                '<h3>Stellar magnitude scale</h3>' +
                '<p>Brighter objects have smaller (more negative) magnitudes. Each step of 1 mag changes flux by about ' +
                T3D_SM_STEP + ' (Pogson). Apparent magnitude is as seen from Earth; absolute magnitude is brightness at 10 pc.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Sun (apparent)</td><td>about ' + T3D_SM_SUN_APP + '</td></tr>' +
                '<tr><td>Sirius (apparent)</td><td>about ' + T3D_SM_SIRIUS_APP + '</td></tr>' +
                '<tr><td>Vega (apparent)</td><td>about ' + T3D_SM_VEGA_APP + '</td></tr>' +
                '<tr><td>Naked-eye limit</td><td>about +' + T3D_SM_NAKED + '</td></tr>' +
                '<tr><td>Flux step per mag</td><td>about ' + T3D_SM_STEP + 'x</td></tr>' +
                '</table>' +
                '<p>Mode now: <b>' + (mode === 'apparent' ? 'apparent magnitude' : 'absolute magnitude (10 pc)') + '</b>.</p>';
            if (sel && sel !== 'overview') {
                var hit = stars.filter(function (s) { return s.name === sel; })[0];
                if (hit) {
                    base += '<p><b>' + hit.name + '</b> - apparent about ' + hit.mApp +
                        '; absolute about ' + hit.mAbs +
                        '. Sphere size scales with a softened flux from the magnitude so the Sun does not dominate the camera.</p>';
                }
            }
            base += '<p class="t3d-note">Sizes are teaching display scales from Pogson flux - not angular diameters or a Hipparcos map. Absolute magnitudes for the naked-eye limit marker reuse +6 as a sky-limit label only.</p>';
            return base;
        }
        t3dInfo(panelHtml('overview'));
        var appBtn = document.getElementById('t3dSmAppBtn');
        var absBtn = document.getElementById('t3dSmAbsBtn');
        if (appBtn) appBtn.addEventListener('click', function () {
            mode = 'apparent'; applyMode(); t3dInfo(panelHtml('overview'));
            t3dStatus('Apparent magnitude mode - brightness as seen from Earth.');
        });
        if (absBtn) absBtn.addEventListener('click', function () {
            mode = 'absolute'; applyMode(); t3dInfo(panelHtml('overview'));
            t3dStatus('Absolute magnitude mode - each star as if placed at 10 pc (Sun looks much fainter).');
        });
        [['t3dSmSunBtn','Sun'],['t3dSmSirBtn','Sirius'],['t3dSmVegBtn','Vega'],['t3dSmLimBtn','Naked-eye limit']].forEach(function (pair) {
            var b = document.getElementById(pair[0]);
            if (!b) return;
            b.addEventListener('click', function () { t3dInfo(panelHtml(pair[1])); });
        });
        t3dStatus('Drag to orbit, scroll to zoom. Toggle Apparent vs Absolute; sphere size follows a softened Pogson flux scale.');
        var spin = 0;
        return function animate(dt) {
            spin += dt * 0.00015;
            meshes.forEach(function (m, i) {
                m.rotation.y += dt * 0.0004;
                m.position.y = Math.sin(spin * 3 + i) * 0.08;
            });
        };
    }


    // ================= ORBITAL RESONANCE ======================================
    // Laplace Io:Europa:Ganymede 1:2:4 mean-motion beat - educational, not N-body.
    var T3D_OR_IO = 1;
    var T3D_OR_EU = 2;
    var T3D_OR_GA = 4;
    var T3D_OR_NP = 3; // Neptune:Pluto literacy
    var T3D_OR_PL = 2;
    function t3dOrbitalResonance(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        var light = new THREE.PointLight(0xfff3d0, 800, 0, 1.5);
        scene.add(light);
        var group = new THREE.Group();
        scene.add(group);
        var jup = new THREE.Mesh(
            new THREE.SphereGeometry(2.2, 28, 18),
            new THREE.MeshLambertMaterial({ color: 0xd4a574 })
        );
        jup.userData = { kind: 'center', name: 'Jupiter' };
        group.add(jup);
        light.position.set(0, 8, 12);
        function ring(r, color) {
            var pts = [];
            for (var i = 0; i <= 96; i++) {
                var a = (i / 96) * Math.PI * 2;
                pts.push(new THREE.Vector3(Math.cos(a) * r, 0, Math.sin(a) * r));
            }
            group.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.4 })
            ));
        }
        // Radii spaced for readable 1:2:4 teaching (not true AU scales)
        var R_IO = 6, R_EU = 9.5, R_GA = 14;
        ring(R_IO, 0xfff59d); ring(R_EU, 0x90caf9); ring(R_GA, 0xce93d8);
        function moon(r, color, name) {
            var m = new THREE.Mesh(
                new THREE.SphereGeometry(0.55, 14, 12),
                new THREE.MeshLambertMaterial({ color: color })
            );
            m.userData = { kind: 'moon', name: name, radius: r };
            group.add(m);
            return m;
        }
        var io = moon(R_IO, 0xffee58, 'Io');
        var europa = moon(R_EU, 0x81d4fa, 'Europa');
        var ganymede = moon(R_GA, 0xb39ddb, 'Ganymede');
        // Conjunction beat flash line (Jupiter -> aligned moon stack)
        var conjLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0.2, 0),
                new THREE.Vector3(R_GA, 0.2, 0)
            ]),
            new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 })
        );
        group.add(conjLine);
        var playing = true;
        var t0 = 0;
        // Mean motions proportional to 4 : 2 : 1 so periods are 1 : 2 : 4
        var nIo = 4, nEu = 2, nGa = 1;
        var speed = 0.55;
        var conjFlash = 0;
        var lastConj = -1;
        function panelHtml(sel) {
            var base =
                '<h3>Orbital resonance (Laplace 1:2:4)</h3>' +
                '<p>Io, Europa, and Ganymede keep mean motions near a 4:2:1 ratio - periods about 1:2:4. When Io gains two full laps, Europa gains one, and Ganymede gains half - a classroom beat Solar System 3D Explorer does not isolate.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Io : Europa : Ganymede periods</td><td>about 1 : 2 : 4</td></tr>' +
                '<tr><td>Mean-motion ratio</td><td>about 4 : 2 : 1</td></tr>' +
                '<tr><td>Another classic pair</td><td>Neptune : Pluto about 3 : 2</td></tr>' +
                '</table>';
            if (sel === 'Io') {
                base += '<p><b>Io</b> - innermost of the three; period unit 1 in the teaching 1:2:4 stack.</p>';
            } else if (sel === 'Europa') {
                base += '<p><b>Europa</b> - period about 2 Io periods in the Laplace chain.</p>';
            } else if (sel === 'Ganymede') {
                base += '<p><b>Ganymede</b> - period about 4 Io periods; slowest of the three teaching moons.</p>';
            } else if (sel === 'Neptune:Pluto 3:2') {
                base += '<p><b>Neptune : Pluto ~3:2</b> - another mean-motion classic: Pluto completes about 2 orbits while Neptune completes about 3. Shown here as literacy only; this scene animates the Galilean Laplace chain.</p>';
            }
            base += '<p class="t3d-note">Circular coplanar orbits and period ratios are educational - not a full N-body ephemeris or forced-eccentricity Laplace model.</p>';
            return base;
        }
        t3dInfo(panelHtml('overview'));
        var playBtn = document.getElementById('t3dOrPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause orbits' : 'Play orbits';
        });
        [['t3dOrIoBtn','Io'],['t3dOrEuBtn','Europa'],['t3dOrGaBtn','Ganymede'],['t3dOrNpBtn','Neptune:Pluto 3:2']].forEach(function (pair) {
            var b = document.getElementById(pair[0]);
            if (!b) return;
            b.addEventListener('click', function () { t3dInfo(panelHtml(pair[1])); });
        });
        t3dStatus('Drag to orbit, scroll to zoom. Play the 1:2:4 beat; a white flash marks near-alignments of the three moons.');
        function place(m, radius, angle) {
            m.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
        }
        return function animate(dt) {
            if (!playing) return;
            t0 += (dt / 1000) * speed;
            var aIo = t0 * nIo;
            var aEu = t0 * nEu;
            var aGa = t0 * nGa;
            place(io, R_IO, aIo);
            place(europa, R_EU, aEu);
            place(ganymede, R_GA, aGa);
            // Conjunction when all three near same longitude (mod 2pi)
            function wrap(a) { return ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2); }
            var d1 = Math.abs(wrap(aIo) - wrap(aEu));
            var d2 = Math.abs(wrap(aEu) - wrap(aGa));
            if (d1 > Math.PI) d1 = Math.PI * 2 - d1;
            if (d2 > Math.PI) d2 = Math.PI * 2 - d2;
            if (d1 < 0.12 && d2 < 0.12) {
                var bucket = Math.floor(t0 * 2);
                if (bucket !== lastConj) {
                    lastConj = bucket;
                    conjFlash = 1;
                    var ang = wrap(aGa);
                    conjLine.geometry.setFromPoints([
                        new THREE.Vector3(0, 0.25, 0),
                        new THREE.Vector3(Math.cos(ang) * R_GA, 0.25, Math.sin(ang) * R_GA)
                    ]);
                }
            }
            if (conjFlash > 0) {
                conjFlash -= dt / 600;
                conjLine.material.opacity = Math.max(0, conjFlash);
            }
        };
    }


    // ================= GAS GIANT ATMOSPHERE ===================================
    // Banded Jupiter-like atmosphere + Great Red Spot - educational shader art.
    var T3D_GG_ROT_H = 9 + 55 / 60; // ~9h55m
    var T3D_GG_GRS_KM = 16000;
    var T3D_GG_WIND_MS = 125; // mid of 100-150
    function t3dGasGiantAtmosphere(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.35));
        var sun = new THREE.DirectionalLight(0xfff3d0, 1.15);
        sun.position.set(40, 20, 30);
        scene.add(sun);
        var group = new THREE.Group();
        scene.add(group);
        var uniforms = {
            uTime: { value: 0 },
            uBandShift: { value: 0 }
        };
        var mat = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: [
                'varying vec2 vUv;',
                'varying vec3 vN;',
                'void main(){',
                '  vUv = uv;',
                '  vN = normalize(normalMatrix * normal);',
                '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);',
                '}'
            ].join('\n'),
            fragmentShader: [
                'uniform float uTime;',
                'uniform float uBandShift;',
                'varying vec2 vUv;',
                'varying vec3 vN;',
                'void main(){',
                '  float lat = vUv.y;',
                '  float bands = 0.55 + 0.45 * sin((lat * 28.0 + uBandShift) * 3.14159);',
                '  vec3 dark = vec3(0.55, 0.32, 0.18);',
                '  vec3 lite = vec3(0.92, 0.78, 0.55);',
                '  vec3 col = mix(dark, lite, bands);',
                '  // Great Red Spot region near mid-southern latitude',
                '  vec2 spot = vec2(fract(vUv.x + uTime * 0.015) - 0.62, lat - 0.38);',
                '  float ell = spot.x * spot.x / 0.018 + spot.y * spot.y / 0.006;',
                '  float grs = smoothstep(1.0, 0.35, ell);',
                '  col = mix(col, vec3(0.78, 0.22, 0.12), grs * 0.92);',
                '  float light = clamp(dot(vN, normalize(vec3(0.4,0.6,0.5))) * 0.55 + 0.45, 0.25, 1.0);',
                '  gl_FragColor = vec4(col * light, 1.0);',
                '}'
            ].join('\n')
        });
        var planet = new THREE.Mesh(new THREE.SphereGeometry(8, 64, 48), mat);
        planet.userData = { kind: 'planet', name: 'Gas giant atmosphere' };
        group.add(planet);
        // GRS click marker (invisible-ish but for focus literacy via button primarily)
        var grsMark = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 12, 10),
            new THREE.MeshBasicMaterial({ color: 0xe53935, transparent: true, opacity: 0.85 })
        );
        grsMark.position.set(6.2, -2.8, 3.5);
        grsMark.userData = { kind: 'grs', name: 'Great Red Spot' };
        group.add(grsMark);
        var playing = true;
        var windDemo = T3D_GG_WIND_MS;
        function panelHtml(sel) {
            var base =
                '<h3>Gas giant atmosphere</h3>' +
                '<p>Banded cloud belts and zones on a Jupiter-like world, with a Great Red Spot teaching oval about ' +
                T3D_GG_GRS_KM.toLocaleString('en-US') + ' km wide. Solar System 3D Explorer shows Jupiter as a plain sphere - this page is the atmosphere story.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Rotation period</td><td>about 9h55m</td></tr>' +
                '<tr><td>Great Red Spot width</td><td>about ' + T3D_GG_GRS_KM.toLocaleString('en-US') + ' km</td></tr>' +
                '<tr><td>Jet / storm winds</td><td>often 100-150 m/s (demo mid ' + windDemo + ')</td></tr>' +
                '</table>';
            if (sel === 'Great Red Spot') {
                base += '<p><b>Great Red Spot</b> - a long-lived anticyclonic storm oval roughly ' +
                    T3D_GG_GRS_KM.toLocaleString('en-US') + ' km across (published order of magnitude; the real spot slowly changes size).</p>';
            } else if (sel === 'Gas giant atmosphere') {
                base += '<p><b>Belts and zones</b> - alternating dark and bright bands. Jets near ' + windDemo +
                    ' m/s (100-150 range) shear the cloud decks; this shader is teaching art, not a Navier-Stokes run.</p>';
            }
            base += '<p class="t3d-note">Bands and the red oval are educational shader art sized to published figures - not a weather forecast or Voyager map mosaic.</p>';
            return base;
        }
        t3dInfo(panelHtml('overview'));
        var playBtn = document.getElementById('t3dGgPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause spin' : 'Play spin';
        });
        [['t3dGgAtmBtn','Gas giant atmosphere'],['t3dGgGrsBtn','Great Red Spot']].forEach(function (pair) {
            var b = document.getElementById(pair[0]);
            if (!b) return;
            b.addEventListener('click', function () { t3dInfo(panelHtml(pair[1])); });
        });
        t3dStatus('Drag to orbit, scroll to zoom. Play spin turns the banded world; watch the Great Red Spot oval drift with the cloud deck.');
        // Visual rotation rate: compress 9h55m into a readable beat
        var omega = (2 * Math.PI) / 18; // ~full turn in 18s educational
        return function animate(dt) {
            if (!playing) return;
            var sec = dt / 1000;
            group.rotation.y += omega * sec;
            uniforms.uTime.value += sec;
            uniforms.uBandShift.value += sec * 0.08;
            // Keep marker roughly over the drifting GRS teaching region
            var a = uniforms.uTime.value * 0.015 * Math.PI * 2;
            grsMark.position.set(Math.cos(a) * 7.2, -2.8, Math.sin(a) * 7.2);
        };
    }


    // ================= NEUTRON STAR / PULSAR ==================================
    // Rotating pulsar with tilted magnetic lighthouse beams - educational, not GRMHD.
    var T3D_NS_R_KM = 12;
    var T3D_NS_M_MSUN = 1.4;
    var T3D_NS_SPIN_MAX_HZ = 716;
    var T3D_NS_SPIN_DEMO_HZ = 30;
    function t3dNeutronStarPulsar(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.25));
        var key = new THREE.DirectionalLight(0xffe0c0, 0.9);
        key.position.set(20, 30, 10);
        scene.add(key);
        var group = new THREE.Group();
        scene.add(group);
        // Compact star (~12 km) as a dense sphere; magnetic axis tilted ~55 deg from spin
        var star = new THREE.Mesh(
            new THREE.SphereGeometry(2.4, 32, 24),
            new THREE.MeshPhongMaterial({ color: 0xb0bec5, emissive: 0x263238, shininess: 40 })
        );
        group.add(star);
        // Spin axis (visual)
        var spinAxis = new THREE.Mesh(
            new THREE.CylinderGeometry(0.06, 0.06, 8.5, 8),
            new THREE.MeshBasicMaterial({ color: 0x90a4ae, transparent: true, opacity: 0.55 })
        );
        group.add(spinAxis);
        // Magnetic poles + beams as cones along tilted magnet axis
        var magTilt = 55 * Math.PI / 180;
        var magGroup = new THREE.Group();
        magGroup.rotation.z = magTilt;
        group.add(magGroup);
        function makeBeam(sign) {
            var cone = new THREE.Mesh(
                new THREE.ConeGeometry(1.1, 14, 20, 1, true),
                new THREE.MeshBasicMaterial({ color: 0x81d4fa, transparent: true, opacity: 0.28, side: THREE.DoubleSide, depthWrite: false })
            );
            cone.position.y = sign * 8.5;
            if (sign < 0) cone.rotation.x = Math.PI;
            magGroup.add(cone);
            var tip = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 12, 10),
                new THREE.MeshBasicMaterial({ color: 0x29b6f6 })
            );
            tip.position.y = sign * 2.55;
            tip.userData = { kind: 'pole', name: sign > 0 ? 'Magnetic north beam' : 'Magnetic south beam' };
            magGroup.add(tip);
            return tip;
        }
        var nPole = makeBeam(1);
        var sPole = makeBeam(-1);
        // Soft equatorial glow ring
        var eq = new THREE.Mesh(
            new THREE.TorusGeometry(2.55, 0.08, 8, 48),
            new THREE.MeshBasicMaterial({ color: 0xffe082, transparent: true, opacity: 0.5 })
        );
        eq.rotation.x = Math.PI / 2;
        group.add(eq);
        star.userData = { kind: 'star', name: 'Neutron star' };
        var Hz = T3D_NS_SPIN_DEMO_HZ;
        var playing = true;
        function panelHtml(sel) {
            var base =
                '<h3>Neutron star / pulsar</h3>' +
                '<p>A tiny, dense remnant spinning with a tilted magnetic axis. Radio beams sweep space like a lighthouse - when a beam crosses Earth we call it a pulse.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Radius</td><td>about ' + T3D_NS_R_KM + ' km (order 10-12)</td></tr>' +
                '<tr><td>Mass</td><td>about ' + T3D_NS_M_MSUN + ' solar masses</td></tr>' +
                '<tr><td>Fastest known spins</td><td>up to about ' + T3D_NS_SPIN_MAX_HZ + ' Hz</td></tr>' +
                '<tr><td>Demo spin in this scene</td><td>about ' + Hz + ' Hz (slowed for eyes)</td></tr>' +
                '<tr><td>Magnetic field</td><td>often 1e8 to 1e15 G (order of magnitude)</td></tr>' +
                '</table>';
            if (sel === 'Neutron star') {
                base += '<p><b>Neutron star</b> - about ' + T3D_NS_R_KM + ' km across with mass near ' + T3D_NS_M_MSUN + ' Msun. Distinct from a black hole: a hard surface and beamed poles instead of an event horizon.</p>';
            } else if (sel && /beam/i.test(sel)) {
                base += '<p><b>' + sel + '</b> - the magnetosphere channel. Observers see a pulse when a beam sweeps across the line of sight.</p>';
            }
            base += '<p class="t3d-note">Beams and spin period here are educational geometry - not a GRMHD plasma simulation or a timing catalog. Radius, mass, and max spin figures are published order-of-magnitude references.</p>';
            return base;
        }
        t3dInfo(panelHtml('overview'));
        var playBtn = document.getElementById('t3dNsPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause spin' : 'Play spin';
        });
        var slower = document.getElementById('t3dNsSlowBtn');
        if (slower) slower.addEventListener('click', function () {
            Hz = Math.max(1, Math.round(Hz / 2));
            t3dInfo(panelHtml('overview'));
            t3dStatus('Demo spin about ' + Hz + ' Hz (still slowed vs fastest pulsars near ' + T3D_NS_SPIN_MAX_HZ + ' Hz).');
        });
        var faster = document.getElementById('t3dNsFastBtn');
        if (faster) faster.addEventListener('click', function () {
            Hz = Math.min(120, Hz * 2);
            t3dInfo(panelHtml('overview'));
            t3dStatus('Demo spin about ' + Hz + ' Hz (still slowed vs fastest pulsars near ' + T3D_NS_SPIN_MAX_HZ + ' Hz).');
        });
        [['t3dNsStarBtn','Neutron star'],['t3dNsBeamBtn','Magnetic north beam']].forEach(function (pair) {
            var b = document.getElementById(pair[0]);
            if (!b) return;
            b.addEventListener('click', function () { t3dInfo(panelHtml(pair[1])); });
        });
        t3dStatus('Drag to orbit, scroll to zoom. Play spin turns the lighthouse; Slow/Fast change the demo rate (real max ~' + T3D_NS_SPIN_MAX_HZ + ' Hz).');
        return function animate(dt) {
            if (!playing) return;
            // Map demo Hz to visual rad/s with a readability factor
            var omega = (Hz / T3D_NS_SPIN_DEMO_HZ) * 2.2;
            group.rotation.y += omega * (dt / 1000);
        };
    }


    // ================= LAGRANGE POINTS ========================================
    // Sun-Earth collinear + triangular Lagrange points - educational CR3BP sketch.
    var T3D_L12_KM = 1500000;
    var T3D_AU_KM = 149597870.7;
    function t3dLagrangePoints(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        var sunLight = new THREE.PointLight(0xfff3d0, 900, 0, 1.6);
        scene.add(sunLight);
        var group = new THREE.Group();
        scene.add(group);
        // Visual AU scale: Earth at x = 28. mu_sun_earth ~ 3e-6 -> L1/L2 ~ 0.01 AU from Earth.
        var AU = 28;
        var earthX = AU;
        var dL = AU * 0.01; // ~1.5e6 km / 1 AU
        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(3.2, 28, 18),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        group.add(sun);
        sunLight.position.copy(sun.position);
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(0.85, 20, 14),
            new THREE.MeshLambertMaterial({ color: 0x42a5f5 })
        );
        earth.position.set(earthX, 0, 0);
        group.add(earth);
        // Earth orbit
        var orbPts = [];
        for (var i = 0; i <= 96; i++) {
            var a = (i / 96) * Math.PI * 2;
            orbPts.push(new THREE.Vector3(Math.cos(a) * AU, 0, Math.sin(a) * AU));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(orbPts),
            new THREE.LineBasicMaterial({ color: 0x455a64, transparent: true, opacity: 0.55 })
        ));
        function makeL(name, x, z, color) {
            var m = new THREE.Mesh(
                new THREE.SphereGeometry(0.42, 12, 10),
                new THREE.MeshBasicMaterial({ color: color })
            );
            m.position.set(x, 0.2, z);
            m.userData = { kind: 'L', name: name };
            group.add(m);
            return m;
        }
        var L1 = makeL('L1', earthX - dL, 0, 0xff7043);
        var L2 = makeL('L2', earthX + dL, 0, 0xab47bc);
        var L3 = makeL('L3', -AU * 0.98, 0, 0x66bb6a);
        var L4 = makeL('L4', AU * 0.5, AU * Math.sqrt(3) / 2, 0x29b6f6);
        var L5 = makeL('L5', AU * 0.5, -AU * Math.sqrt(3) / 2, 0x26c6da);
        // Craft markers (educational positions)
        var soho = new THREE.Mesh(
            new THREE.BoxGeometry(0.35, 0.22, 0.35),
            new THREE.MeshBasicMaterial({ color: 0xfff176 })
        );
        soho.position.copy(L1.position); soho.position.y = 0.7;
        soho.userData = { kind: 'craft', name: 'SOHO (near L1)' };
        group.add(soho);
        var jwst = new THREE.Mesh(
            new THREE.BoxGeometry(0.4, 0.18, 0.55),
            new THREE.MeshBasicMaterial({ color: 0xe0e0e0 })
        );
        jwst.position.copy(L2.position); jwst.position.y = 0.75;
        jwst.userData = { kind: 'craft', name: 'JWST (near L2)' };
        group.add(jwst);
        // Triangle guides L4/L5
        function dashLine(a, b, c) {
            group.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([a, b]),
                new THREE.LineBasicMaterial({ color: c, transparent: true, opacity: 0.35 })
            ));
        }
        var sunP = new THREE.Vector3(0, 0.05, 0);
        var earP = new THREE.Vector3(earthX, 0.05, 0);
        dashLine(sunP, earP, 0x90a4ae);
        dashLine(sunP, L4.position.clone().setY(0.05), 0x4fc3f7);
        dashLine(earP, L4.position.clone().setY(0.05), 0x4fc3f7);
        dashLine(sunP, L5.position.clone().setY(0.05), 0x4dd0e1);
        dashLine(earP, L5.position.clone().setY(0.05), 0x4dd0e1);
        var kmFmt = T3D_L12_KM.toLocaleString('en-US');
        function panelHtml(sel) {
            var base =
                '<h3>Sun-Earth Lagrange points</h3>' +
                '<p>Five equilibrium points of the circular restricted three-body problem for Sun + Earth. L1 and L2 sit about ' +
                kmFmt + ' km from Earth (about 0.01 AU). L4 and L5 form 60 deg equilateral triangles with Sun and Earth.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>L1 / L2 distance from Earth</td><td>about ' + kmFmt + ' km</td></tr>' +
                '<tr><td>L4 / L5 geometry</td><td>60 deg leading / trailing</td></tr>' +
                '<tr><td>Example craft</td><td>SOHO near L1; JWST near L2</td></tr>' +
                '<tr><td>1 AU</td><td>about ' + Math.round(T3D_AU_KM).toLocaleString('en-US') + ' km</td></tr>' +
                '</table>';
            var blurbs = {
                L1: '<p><b>L1</b> - on the Sun-Earth line between the two bodies. A spacecraft there has an uninterrupted look at the Sun (for example SOHO).</p>',
                L2: '<p><b>L2</b> - on the Sun-Earth line beyond Earth. JWST stations near L2 so Earth and Sun stay in a tight sky patch for the sunshield.</p>',
                L3: '<p><b>L3</b> - nearly opposite the Sun from Earth on the shared orbit line. Hard to reach and rarely used for missions.</p>',
                L4: '<p><b>L4</b> - 60 deg ahead of Earth on the orbit; forms an equilateral triangle with Sun and Earth.</p>',
                L5: '<p><b>L5</b> - 60 deg behind Earth on the orbit; the trailing equilateral twin of L4.</p>',
                'SOHO (near L1)': '<p><b>SOHO</b> - Solar and Heliospheric Observatory, stationed near Sun-Earth L1 for continuous solar monitoring.</p>',
                'JWST (near L2)': '<p><b>JWST</b> - James Webb Space Telescope, stationed near Sun-Earth L2.</p>'
            };
            if (sel && blurbs[sel]) base += blurbs[sel];
            base += '<p class="t3d-note">Positions are an educational CR3BP sketch with compressed scales - not a high-fidelity ephemeris. Distances in the table use published order-of-magnitude values (~1.5 million km for L1/L2).</p>';
            return base;
        }
        t3dInfo(panelHtml('overview'));
        var playing = true;
        var angle = 0;
        var playBtn = document.getElementById('t3dLpPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause orbit' : 'Play orbit';
        });
        [['t3dLpL1Btn','L1'],['t3dLpL2Btn','L2'],['t3dLpL3Btn','L3'],['t3dLpL4Btn','L4'],['t3dLpL5Btn','L5'],['t3dLpJwstBtn','JWST (near L2)'],['t3dLpSohoBtn','SOHO (near L1)']].forEach(function (pair) {
            var b = document.getElementById(pair[0]);
            if (!b) return;
            b.addEventListener('click', function () { t3dInfo(panelHtml(pair[1])); });
        });
        t3dStatus('Drag to orbit, scroll to zoom. Highlight L1-L5 or craft markers; Play orbit turns the co-rotating frame slowly.');
        return function animate(dt) {
            if (!playing) return;
            angle += dt * 0.00018;
            var c = Math.cos(angle), s = Math.sin(angle);
            earth.position.set(c * AU, 0, s * AU);
            L1.position.set(c * (AU - dL), 0.2, s * (AU - dL));
            L2.position.set(c * (AU + dL), 0.2, s * (AU + dL));
            L3.position.set(-c * AU * 0.98, 0.2, -s * AU * 0.98);
            // L4 = +60 deg from Earth angle, L5 = -60
            var a4 = angle + Math.PI / 3;
            var a5 = angle - Math.PI / 3;
            L4.position.set(Math.cos(a4) * AU, 0.2, Math.sin(a4) * AU);
            L5.position.set(Math.cos(a5) * AU, 0.2, Math.sin(a5) * AU);
            soho.position.set(L1.position.x, 0.7, L1.position.z);
            jwst.position.set(L2.position.x, 0.75, L2.position.z);
        };
    }


    // ================= MILKY WAY MAP ==========================================
    // Top-down labeled Milky Way: named arms + Sun - educational, not N-body.
    var T3D_MW_DIAM_LY = 100000;
    var T3D_MW_SUN_LY = 26000;
    var T3D_MW_GYR_MYR = 230;
    function t3dMilkyWayMap(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.35));
        var group = new THREE.Group();
        scene.add(group);
        // Scale: visual radius 40 ~ 50,000 ly (half diameter)
        var Rmax = 40;
        var lyPerUnit = (T3D_MW_DIAM_LY / 2) / Rmax;
        var COUNT = shell.low ? 22000 : 52000;
        var ARMS = [
            { name: 'Sagittarius', phase: 0.15, color: 0xffb74d },
            { name: 'Orion (Local)', phase: 1.35, color: 0x81d4fa },
            { name: 'Perseus', phase: 2.55, color: 0xce93d8 }
        ];
        var pos = new Float32Array(COUNT * 3);
        var col = new Float32Array(COUNT * 3);
        var color = new THREE.Color();
        for (var i = 0; i < COUNT; i++) {
            var arm = ARMS[i % ARMS.length];
            var rad = Math.pow(Math.random(), 0.55) * Rmax;
            var spiral = rad * 0.18;
            var spread = (Math.random() - 0.5) * (0.55 + rad * 0.045);
            var ang = arm.phase + spiral + spread * 0.3;
            var y = (Math.random() - 0.5) * Math.max(0.35, 4.2 - rad * 0.09);
            pos[i * 3] = Math.cos(ang) * rad + (Math.random() - 0.5) * 0.9;
            pos[i * 3 + 1] = y;
            pos[i * 3 + 2] = Math.sin(ang) * rad + (Math.random() - 0.5) * 0.9;
            var tcol = rad / Rmax;
            color.setHex(arm.color);
            color.offsetHSL(0, 0, (1 - tcol) * 0.15 - 0.05);
            col[i * 3] = color.r; col[i * 3 + 1] = color.g; col[i * 3 + 2] = color.b;
        }
        var geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
        group.add(new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.2, vertexColors: true, transparent: true, opacity: 0.92, depthWrite: false })));
        var core = new THREE.Mesh(
            new THREE.SphereGeometry(2.4, 24, 14),
            new THREE.MeshBasicMaterial({ color: 0xffe082, transparent: true, opacity: 0.9 })
        );
        group.add(core);
        // Galactic center marker
        var gc = new THREE.Mesh(
            new THREE.SphereGeometry(0.35, 12, 10),
            new THREE.MeshBasicMaterial({ color: 0xff7043 })
        );
        group.add(gc);
        // Sun at ~26,000 ly (~0.52 of half-diameter)
        var sunR = T3D_MW_SUN_LY / lyPerUnit;
        var sunAng = ARMS[1].phase + sunR * 0.18; // along Orion arm
        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 14, 12),
            new THREE.MeshBasicMaterial({ color: 0xffeb3b })
        );
        sun.position.set(Math.cos(sunAng) * sunR, 0.6, Math.sin(sunAng) * sunR);
        group.add(sun);
        // Orbit ring for Sun
        var sunOrb = [];
        for (var k = 0; k <= 72; k++) {
            var a = (k / 72) * Math.PI * 2;
            sunOrb.push(new THREE.Vector3(Math.cos(a) * sunR, 0.15, Math.sin(a) * sunR));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(sunOrb),
            new THREE.LineBasicMaterial({ color: 0xfff59d, transparent: true, opacity: 0.45 })
        ));
        // Arm label sprites as small meshes for click targets
        var labels = [];
        var selected = 'overview';
        function placeLabel(armDef, atR) {
            var ang = armDef.phase + atR * 0.18;
            var m = new THREE.Mesh(
                new THREE.SphereGeometry(0.45, 10, 8),
                new THREE.MeshBasicMaterial({ color: armDef.color })
            );
            m.position.set(Math.cos(ang) * atR, 1.2, Math.sin(ang) * atR);
            m.userData = { kind: 'arm', name: armDef.name };
            group.add(m);
            labels.push(m);
        }
        placeLabel(ARMS[0], 22);
        placeLabel(ARMS[1], 20);
        placeLabel(ARMS[2], 28);
        sun.userData = { kind: 'sun', name: 'Sun' };
        gc.userData = { kind: 'center', name: 'Galactic center' };
        labels.push(sun, gc);
        function panelHtml(sel) {
            var base =
                '<h3>Milky Way map (top-down)</h3>' +
                '<p>Our galaxy, labeled - not a generic spiral. Diameter about ' + T3D_MW_DIAM_LY.toLocaleString('en-US') +
                ' light-years. The yellow fleck is the Sun about ' + T3D_MW_SUN_LY.toLocaleString('en-US') +
                ' light-years from the center on the Orion (Local) Arm.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Diameter</td><td>about ' + T3D_MW_DIAM_LY.toLocaleString('en-US') + ' ly</td></tr>' +
                '<tr><td>Sun from center</td><td>about ' + T3D_MW_SUN_LY.toLocaleString('en-US') + ' ly</td></tr>' +
                '<tr><td>Named arms (teaching)</td><td>Sagittarius / Orion (Local) / Perseus</td></tr>' +
                '<tr><td>Galactic year</td><td>about ' + T3D_MW_GYR_MYR + ' million years (range 225-250)</td></tr>' +
                '</table>';
            if (sel === 'Sun') {
                base += '<p><b>Sun</b> - about ' + T3D_MW_SUN_LY.toLocaleString('en-US') +
                    ' ly from center; one circuit of the galaxy takes about ' + T3D_MW_GYR_MYR +
                    ' Myr (published range often 225-250 Myr).</p>';
            } else if (sel === 'Galactic center') {
                base += '<p><b>Galactic center</b> - toward Sagittarius; Sagittarius A* sits in the dense core region (this map marks the center with an orange core fleck).</p>';
            } else if (sel && sel !== 'overview') {
                base += '<p><b>' + sel + ' Arm</b> - one of the teaching labels on this map. Arm names and paths are educational approximations; real surveys refine denser structure.</p>';
            }
            base += '<p class="t3d-note">Particle arms are parametric art sized to published diameters - this is not a gravitational N-body or Gaia survey catalog. The table figures are real order-of-magnitude references.</p>';
            return base;
        }
        t3dInfo(panelHtml('overview'));
        var playing = true;
        var gyrBtn = document.getElementById('t3dMwPlayBtn');
        if (gyrBtn) gyrBtn.addEventListener('click', function () {
            playing = !playing;
            gyrBtn.textContent = playing ? 'Pause spin' : 'Play spin';
        });
        var focusBtns = [
            ['t3dMwSunBtn', 'Sun'],
            ['t3dMwSagBtn', 'Sagittarius'],
            ['t3dMwOriBtn', 'Orion (Local)'],
            ['t3dMwPerBtn', 'Perseus'],
            ['t3dMwGcBtn', 'Galactic center']
        ];
        focusBtns.forEach(function (pair) {
            var b = document.getElementById(pair[0]);
            if (!b) return;
            b.addEventListener('click', function () {
                selected = pair[1];
                t3dInfo(panelHtml(selected));
            });
        });
        // Click objects via shell ray if available - lightweight: also status
        if (shell.dom && shell.dom.addEventListener) {
            shell.dom.addEventListener('pointerdown', function (ev) {
                // optional: skip if no raycaster wired - button focus covers literacy
            });
        }
        t3dStatus('Drag to orbit, scroll to zoom. Highlight Sun / arms / galactic center and watch a slow disk spin for one educational galactic-year beat.');
        return function animate(dt) {
            if (playing) group.rotation.y += dt * 0.00005;
        };
    }

    // ================= RETROGRADE MOTION =====================================
    // Apparent Mars loop from Earth\'s faster inside orbit - educational, not ephemeris.
    var T3D_RETRO_SYNODIC_D = 779.9;
    var T3D_RETRO_ARC_D = 72;
    var T3D_RETRO_MONTHS = 26;
    function t3dRetrogradeMotion(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.25));
        var sunL = new THREE.PointLight(0xfff3c4, 1.4, 200);
        sunL.position.set(0, 0, 0);
        scene.add(sunL);
        var group = new THREE.Group();
        scene.add(group);
        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 28, 20),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        group.add(sun);
        var earthR = 8;
        var marsR = 12.2;
        // Orbit rings
        function ring(r, color) {
            var pts = [];
            for (var i = 0; i <= 96; i++) {
                var a = (i / 96) * Math.PI * 2;
                pts.push(new THREE.Vector3(Math.cos(a) * r, 0, Math.sin(a) * r));
            }
            group.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.4 })
            ));
        }
        ring(earthR, 0x64b5f6);
        ring(marsR, 0xff8a65);
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 20, 16),
            new THREE.MeshLambertMaterial({ color: 0x42a5f5, emissive: 0x102040 })
        );
        group.add(earth);
        var mars = new THREE.Mesh(
            new THREE.SphereGeometry(0.42, 18, 14),
            new THREE.MeshLambertMaterial({ color: 0xe57373, emissive: 0x301010 })
        );
        group.add(mars);
        // LOS line Earth -> Mars
        var losGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(), new THREE.Vector3(1, 0, 0)
        ]);
        var los = new THREE.Line(losGeom, new THREE.LineBasicMaterial({ color: 0xffee58, transparent: true, opacity: 0.75 }));
        group.add(los);
        // Sky trail of apparent elongation (projected behind Earth along LOS direction onto a cylinder/arc belt)
        var trailPts = [];
        var trailMax = 180;
        var trailLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
            new THREE.LineBasicMaterial({ color: 0xce93d8, transparent: true, opacity: 0.85 })
        );
        group.add(trailLine);
        // Angular rates: Earth 360/365.25, Mars 360/686.98 - use compressed visual year
        // Synodic relative rate: when relative mean anomaly wraps once per T3D_RETRO_SYNODIC_D
        var day = 0;
        var playing = true;
        var showTrail = true;
        var showLos = true;
        // Place opposition near day 0 so scrub starts teaching the loop
        // Use mean motion: nE = 2pi/365.25, nM = 2pi/686.98
        var nE = (Math.PI * 2) / 365.25;
        var nM = (Math.PI * 2) / 686.98;
        function earthAngle(d) { return d * nE; }
        function marsAngle(d) { return d * nM + Math.PI; } // start near opposition geometry vs Earth at 0
        function elongDeg(d) {
            // Angle of Mars as seen from Earth relative to anti-sun / heliocentric transfer
            var ae = earthAngle(d);
            var am = marsAngle(d);
            var ex = Math.cos(ae) * earthR, ez = Math.sin(ae) * earthR;
            var mx = Math.cos(am) * marsR, mz = Math.sin(am) * marsR;
            var dx = mx - ex, dz = mz - ez;
            // Angle of LOS in plane, minus Earth\'s orbital angle (local sky abscissa)
            var losA = Math.atan2(dz, dx);
            var sky = ((losA - ae) * 180 / Math.PI + 540) % 360 - 180;
            return sky;
        }
        function isRetrograde(d) {
            // Finite difference of sky elongation
            var e0 = elongDeg(d - 0.5);
            var e1 = elongDeg(d + 0.5);
            var de = e1 - e0;
            if (de > 180) de -= 360;
            if (de < -180) de += 360;
            return de < 0; // westward on typical convention for outer planet near opposition
        }
        function panelHtml(d, elong, retro) {
            return '<h3>Mars retrograde (apparent)</h3>' +
                '<p>Earth on the inside track overtakes Mars. Near opposition the line of sight to Mars sweeps backward against the stars for a while - an optical loop, not Mars reversing its heliocentric orbit.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Mars synodic period</td><td>about ' + T3D_RETRO_SYNODIC_D + ' d (~' + T3D_RETRO_MONTHS + ' months)</td></tr>' +
                '<tr><td>Typical retrograde arc</td><td>about ' + T3D_RETRO_ARC_D + ' d</td></tr>' +
                '<tr><td>Day scrub</td><td>' + Math.round(d) + '</td></tr>' +
                '<tr><td>Approx. sky elongation</td><td>' + elong.toFixed(1) + ' deg (teaching scale)</td></tr>' +
                '<tr><td>Apparent motion</td><td>' + (retro ? 'Retrograde (westward stretch)' : 'Direct (eastward)') + '</td></tr>' +
                '</table>' +
                '<p class="t3d-note">Orbit sizes and rates are compressed for one view. Synodic and arc figures are published order-of-magnitude teaching values - not a high-precision ephemeris or sky chart for tonight.</p>';
        }
        function applyDay(d) {
            day = d;
            var ae = earthAngle(d);
            var am = marsAngle(d);
            earth.position.set(Math.cos(ae) * earthR, 0, Math.sin(ae) * earthR);
            mars.position.set(Math.cos(am) * marsR, 0, Math.sin(am) * marsR);
            var pos = los.geometry.attributes.position;
            pos.setXYZ(0, earth.position.x, earth.position.y, earth.position.z);
            pos.setXYZ(1, mars.position.x, mars.position.y, mars.position.z);
            pos.needsUpdate = true;
            los.visible = showLos;
            var elong = elongDeg(d);
            var retro = isRetrograde(d);
            // Build trail: sample past ~140 days of sky elongation mapped onto a raised arc above the plane
            trailPts = [];
            var span = 140;
            for (var i = 0; i <= span; i++) {
                var td = d - span + i;
                var el = elongDeg(td);
                // Map elongation to arc in sky belt above Earth-Sun average
                var mid = earth.position.clone().add(sun.position).multiplyScalar(0.5);
                // Place trail at radius ~16 around sun, height by sample, angle = elongation + earth
                var skyR = 16;
                var ang = ae + el * Math.PI / 180;
                var y = (i / span - 0.5) * 0.02; // nearly flat; keep subtle vertical to separate lines
                // Better: fixed ring height 3, longitude = elong over time so loop shapes show
                trailPts.push(new THREE.Vector3(Math.cos(ang) * skyR, 3.2 + (retro && Math.abs(el) < 40 ? 0.4 : 0), Math.sin(ang) * skyR));
            }

            trailLine.visible = showTrail;
            var slider = document.getElementById('t3dRetroDay');
            var label = document.getElementById('t3dRetroDayLabel');
            if (slider) slider.value = String(Math.round(((d % T3D_RETRO_SYNODIC_D) + T3D_RETRO_SYNODIC_D) % T3D_RETRO_SYNODIC_D));
            if (label) label.textContent = 'day ' + Math.round(d);
            var badge = document.getElementById('t3dRetroBadge');
            if (badge) {

        var playBtn = document.getElementById('t3dRetroPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {

        if (trailBtn) trailBtn.addEventListener('click', function () {

            applyDay(day);
        });
        var losBtn = document.getElementById('t3dRetroLosBtn');
        if (losBtn) losBtn.addEventListener('click', function () {
            showLos = !showLos;

            applyDay(day);
        });
        var oppBtn = document.getElementById('t3dRetroOppBtn');
        if (oppBtn) oppBtn.addEventListener('click', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play';
            // Find a nearby day with opposition-ish (Earth and Mars nearly aligned sun-earth-mars)
            var best = day;
            var bestScore = 1e9;
            for (var t = day - 400; t < day + 400; t += 1) {
                var ae = earthAngle(t), am = marsAngle(t);
                var diff = Math.abs(((am - ae + Math.PI) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2) - Math.PI);

        t3dStatus('Drag to orbit, scroll to zoom. Play the overtakes, toggle the sky trail, and watch Mars loop when Earth passes inside.');
        return function animate(dt) {
            if (playing) applyDay(day + (dt / 1000) * 18);
        };
    }

    // ================= SEASONS EARTH ===========================================
    // Axial tilt -> insolation / solstice+equinox subsolar point - educational, not climate model.
    var T3D_SEASONS_OBLIQ_DEG = 23.44;
    var T3D_SEASONS_PERI_AU = 0.983;
    function t3dSeasonsEarth(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.22));
        var sunL = new THREE.DirectionalLight(0xfff3c4, 1.55);
        sunL.position.set(40, 0, 0);
        scene.add(sunL);
        var group = new THREE.Group();
        scene.add(group);
        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(1.6, 32, 24),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        sun.position.set(0, 0, 0);
        group.add(sun);
        // Earth hold: orbit radius compressed for one view
        var earthHold = new THREE.Group();
        group.add(earthHold);
        var orbR = 12;
        // Axis tilt about Z so northern winter/summer reads while orbiting in XZ
        var tiltRad = T3D_SEASONS_OBLIQ_DEG * Math.PI / 180;
        var earthTilt = new THREE.Group();
        earthTilt.rotation.z = tiltRad;
        earthHold.add(earthTilt);
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(1.35, 36, 28),
            new THREE.MeshLambertMaterial({ color: 0x3a7bd5, emissive: 0x102038 })
        );
        earthTilt.add(earth);
        // Equator ring + axis pole stick
        earthTilt.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints((function () {
                var pts = [];
                for (var i = 0; i <= 64; i++) {
                    var a = (i / 64) * Math.PI * 2;
                    pts.push(new THREE.Vector3(Math.cos(a) * 1.42, 0, Math.sin(a) * 1.42));
                }
                return pts;
            })()),
            new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.55 })
        ));
        earthTilt.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, -2.2, 0), new THREE.Vector3(0, 2.2, 0)
            ]),
            new THREE.LineBasicMaterial({ color: 0xff7043 })
        ));
        // Tropic of Cancer / Capricorn guide circles (lat +/- obliquity)
        function tropic(latDeg, color) {
            var lat = latDeg * Math.PI / 180;
            var y = Math.sin(lat) * 1.36;
            var r = Math.cos(lat) * 1.36;
            var pts = [];
            for (var i = 0; i <= 48; i++) {
                var a = (i / 48) * Math.PI * 2;
                pts.push(new THREE.Vector3(Math.cos(a) * r, y, Math.sin(a) * r));
            }
            earthTilt.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.7 })
            ));
        }
        tropic(T3D_SEASONS_OBLIQ_DEG, 0xffe082);
        tropic(-T3D_SEASONS_OBLIQ_DEG, 0x80deea);
        // Subsolar marker (yellow fleck on lit side)
        var subsolar = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 10, 8),
            new THREE.MeshBasicMaterial({ color: 0xffeb3b })
        );
        earth.add(subsolar);
        // Orbit path
        var orbitPts = [];
        for (var i = 0; i <= 96; i++) {
            var th = (i / 96) * Math.PI * 2;
            orbitPts.push(new THREE.Vector3(Math.cos(th) * orbR, 0, Math.sin(th) * orbR));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(orbitPts),
            new THREE.LineBasicMaterial({ color: 0x546e7a, transparent: true, opacity: 0.45 })
        ));
        var day = 172; // ~June solstice
        var playing = true;
        var showTropics = true;
        function dayToAngle(d) {
            // Day 0 ~ perihelion early Jan; angle increases counter-clockwise
            return (d / 365.25) * Math.PI * 2;
        }
        function declinationDeg(d) {
            // Approximate solar declination: epsilon * sin(lambda), lambda ~ day from Mar equinox (~80)
            var eps = T3D_SEASONS_OBLIQ_DEG;
            var lambda = ((d - 80) / 365.25) * Math.PI * 2;
            return eps * Math.sin(lambda);
        }
        function seasonName(d) {
            // Northern: Mar~80 equinox, Jun~172 solstice, Sep~266, Dec~355
            var x = ((d % 365.25) + 365.25) % 365.25;
            if (x < 80) return 'Northern winter (past Dec solstice)';
            if (x < 172) return 'Northern spring (past Mar equinox)';
            if (x < 266) return 'Northern summer (past Jun solstice)';
            if (x < 355) return 'Northern autumn (past Sep equinox)';
            return 'Northern winter (past Dec solstice)';
        }
        function panelHtml(dec, d) {
            return '<h3>Seasons from axial tilt</h3>' +
                '<p>Earth\'s spin axis stays tilted about ' + T3D_SEASONS_OBLIQ_DEG + ' deg while Earth orbits the Sun. That tilt - not distance - drives the season cycle: solstice subsolar latitudes reach about +/-' + T3D_SEASONS_OBLIQ_DEG + ' deg.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Obliquity</td><td>' + T3D_SEASONS_OBLIQ_DEG + ' deg</td></tr>' +
                '<tr><td>Approx. solar declination</td><td>' + dec.toFixed(2) + ' deg</td></tr>' +
                '<tr><td>Day of year (scrub)</td><td>' + Math.round(d) + ' / 365</td></tr>' +
                '<tr><td>Season (N. hemisphere)</td><td>' + seasonName(d) + '</td></tr>' +
                '<tr><td>Perihelion distance</td><td>about ' + T3D_SEASONS_PERI_AU + ' AU in early January</td></tr>' +
                '</table>' +
                '<p class="t3d-note">Earth is closest to the Sun in January (perihelion about ' + T3D_SEASONS_PERI_AU + ' AU) - yet northern winter shows tilt rules seasons, not orbital distance. This is an educational geometry visualization, not a climate or weather model.</p>';
        }
        function applyDay(d) {
            day = ((d % 365.25) + 365.25) % 365.25;
            var ang = dayToAngle(day);
            earthHold.position.set(Math.cos(ang) * orbR, 0, Math.sin(ang) * orbR);
            // Keep axis orientation fixed in space (no precession demo): counter-rotate hold yaw lightly
            // Place subsolar at (lat=declination) on the sunward face
            var dec = declinationDeg(day);
            var lat = dec * Math.PI / 180;
            // Sunward direction from earth to sun (toward origin)
            var toSun = earthHold.position.clone().multiplyScalar(-1).normalize();
            // Build local orthonormal: east / north / out - approximate on tilted sphere
            var north = new THREE.Vector3(0, 1, 0).applyAxisAngle(new THREE.Vector3(0, 0, 1), tiltRad);
            // Position on untilted sphere then parent already tilted - use lat on earth local Y
            var cl = Math.cos(lat);
            // Put fleck on +X of earth local (rough sunward when orbit on +X); rotate earth so +X faces sun
            var face = Math.atan2(toSun.z, toSun.x);
            earth.rotation.y = -face;
            subsolar.position.set(Math.cos(lat) * 1.38, Math.sin(lat) * 1.38, 0);
            // Light from sun direction
            sunL.position.copy(toSun.clone().multiplyScalar(-50).add(earthHold.position));
            sunL.target.position.copy(earthHold.position);
            scene.add(sunL.target);
            var slider = document.getElementById('t3dSeasonsDay');
            var label = document.getElementById('t3dSeasonsDayLabel');
            if (slider) slider.value = String(Math.round(day));
            if (label) label.textContent = 'day ' + Math.round(day);
            t3dInfo(panelHtml(dec, day));
        }
        applyDay(day);
        var playBtn = document.getElementById('t3dSeasonsPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause year' : 'Play year';
        });
        var tropBtn = document.getElementById('t3dSeasonsTropicsBtn');
        if (tropBtn) tropBtn.addEventListener('click', function () {
            showTropics = !showTropics;
            earthTilt.children.forEach(function (c, idx) {
                // tropics are line idx 2 and 3 after equator+axis (mesh earth is idx0; wait structure)
            });
            // Toggle by walking Line materials that are tropic colors - simpler: scale visibility on last two Lines added before subsolar
            tropBtn.className = 'w3-button ' + (showTropics ? 'w3-amber' : 'w3-light-grey');
            tropBtn.textContent = showTropics ? 'Hide tropics' : 'Show tropics';
            // Tropics are earthTilt children after equator+axis (indices 2,3 of Line; earth is Mesh at 0)
            var lines = [];
            earthTilt.traverse(function (o) {
                if (o.isLine) lines.push(o);
            });
            // equator, axis, cancer, capricorn
            if (lines.length >= 4) {
                lines[2].visible = showTropics;
                lines[3].visible = showTropics;
            }
        });
        var jumper = function (btnId, d) {
            var b = document.getElementById(btnId);
            if (!b) return;
            b.addEventListener('click', function () {
                playing = false;
                if (playBtn) playBtn.textContent = 'Play year';
                applyDay(d);
            });
        };
        jumper('t3dSeasonsMarBtn', 80);
        jumper('t3dSeasonsJunBtn', 172);
        jumper('t3dSeasonsSepBtn', 266);
        jumper('t3dSeasonsDecBtn', 355);
        var slider = document.getElementById('t3dSeasonsDay');
        if (slider) slider.addEventListener('input', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play year';
            applyDay(parseFloat(slider.value || '0'));
        });
        t3dStatus('Drag to orbit, scroll to zoom. Scrub the year, jump to equinox/solstice, and watch the yellow subsolar point climb between the tropics.');
        return function animate(dt) {
            if (playing) applyDay(day + (dt / 1000) * 28);
        };
    }

    // ================= COMET ORBIT =============================================
    // Eccentric Halley-like orbit with anti-sunward ion + dust tails - educational.
    var T3D_COMET_P_YR = 76;
    var T3D_COMET_Q_AU = 0.586;
    var T3D_COMET_Q_AP_AU = 35.1;
    var T3D_COMET_E = 0.967;
    function t3dCometOrbit(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        var sunL = new THREE.PointLight(0xfff3c4, 1.6, 250);
        sunL.position.set(0, 0, 0);
        scene.add(sunL);
        var group = new THREE.Group();
        scene.add(group);
        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(1.4, 32, 24),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        group.add(sun);
        // Ellipse geometry: a from q = a(1-e), focus at sun (origin)
        // Compress aphelion for one-screen readability while panel cites real 35.1 AU
        var e = T3D_COMET_E;
        var aVis = 14; // visual semi-major so full orbit fits
        var bVis = aVis * Math.sqrt(1 - e * e);
        var cVis = aVis * e; // sun at focus: comet center offset along +x
        var orbitPts = [];
        for (var i = 0; i <= 160; i++) {
            var th = (i / 160) * Math.PI * 2;
            // parametric ellipse centered on empty focus; sun at (cVis,0)
            var x = aVis * Math.cos(th) + cVis;
            var z = bVis * Math.sin(th);
            orbitPts.push(new THREE.Vector3(x, 0, z));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(orbitPts),
            new THREE.LineBasicMaterial({ color: 0x78909c, transparent: true, opacity: 0.55 })
        ));
        var nucleus = new THREE.Mesh(
            new THREE.SphereGeometry(0.35, 16, 12),
            new THREE.MeshLambertMaterial({ color: 0xb0bec5, emissive: 0x333333 })
        );
        group.add(nucleus);
        // Dust tail (yellowish, longer) + ion tail (bluish) - both anti-sunward
        function makeTail(color, len, width) {
            var g = new THREE.ConeGeometry(width, len, 10, 1, true);
            g.translate(0, -len / 2, 0);
            var m = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.55, side: THREE.DoubleSide, depthWrite: false });
            var mesh = new THREE.Mesh(g, m);
            return mesh;
        }
        var ionTail = makeTail(0x81d4fa, 5.5, 0.22);
        var dustTail = makeTail(0xffe082, 3.8, 0.45);
        nucleus.add(ionTail);
        nucleus.add(dustTail);
        var progress = 0.08; // near perihelion start for visible tails
        var playing = true;
        var showIon = true;
        var showDust = true;
        function trueAnomaly(p) {
            // Map scrub 0..1 around orbit; denser time near perihelion via eccentric anomaly-ish
            return p * Math.PI * 2;
        }
        function cometPos(nu) {
            var x = aVis * Math.cos(nu) + cVis;
            var z = bVis * Math.sin(nu);
            return new THREE.Vector3(x, 0, z);
        }
        function heliocentricDistAU(pos) {
            // Map visual radius roughly onto published q..Q for panel readout only
            var rVis = pos.length();
            var rMin = aVis * (1 - e); // near perihelion visual
            var rMax = aVis * (1 + e);
            var t = Math.max(0, Math.min(1, (rVis - rMin) / (rMax - rMin)));
            return T3D_COMET_Q_AU + t * (T3D_COMET_Q_AP_AU - T3D_COMET_Q_AU);
        }
        function panelHtml(rAu) {
            return '<h3>Halley-like comet orbit</h3>' +
                '<p>An eccentric ellipse (e = ' + T3D_COMET_E + ') with perihelion about ' + T3D_COMET_Q_AU + ' AU and aphelion about ' + T3D_COMET_Q_AP_AU + ' AU. Both tails point roughly anti-sunward - ion (blue) and dust (yellow).</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Orbital period</td><td>about ' + T3D_COMET_P_YR + ' yr</td></tr>' +
                '<tr><td>Perihelion</td><td>' + T3D_COMET_Q_AU + ' AU</td></tr>' +
                '<tr><td>Aphelion</td><td>' + T3D_COMET_Q_AP_AU + ' AU</td></tr>' +
                '<tr><td>Eccentricity</td><td>' + T3D_COMET_E + '</td></tr>' +
                '<tr><td>Approx. heliocentric dist</td><td>' + rAu.toFixed(2) + ' AU (compressed orbit)</td></tr>' +
                '</table>' +
                '<p class="t3d-note">On-screen distances are compressed so perihelion and aphelion fit one view - the table has the real Halley figures. This is an educational geometry visualization, not an N-body or outgassing simulation.</p>';
        }
        function orientTails(pos) {
            // Point cone axis away from sun (radial out)
            var away = pos.clone().normalize();
            // Cone default axis is +Y; aim -Y along away (since geometry translated -Y)
            var quat = new THREE.Quaternion();
            quat.setFromUnitVectors(new THREE.Vector3(0, -1, 0), away);
            ionTail.setRotationFromQuaternion(quat);
            dustTail.setRotationFromQuaternion(quat);
            // Stretch tails when closer to sun
            var near = Math.max(0.15, 1 - Math.min(1, pos.length() / (aVis * 1.2)));
            ionTail.scale.set(1, 0.6 + near * 1.4, 1);
            dustTail.scale.set(1, 0.5 + near * 1.1, 1);
            ionTail.visible = showIon;
            dustTail.visible = showDust;
        }
        function applyProgress(p) {
            progress = ((p % 1) + 1) % 1;
            var nu = trueAnomaly(progress);
            var pos = cometPos(nu);
            nucleus.position.copy(pos);
            orientTails(pos);
            var rAu = heliocentricDistAU(pos);
            var slider = document.getElementById('t3dCometProgress');
            var label = document.getElementById('t3dCometProgressLabel');
            if (slider) slider.value = String(Math.round(progress * 100));
            if (label) label.textContent = Math.round(progress * 100) + '%';
            t3dInfo(panelHtml(rAu));
        }
        applyProgress(progress);
        var playBtn = document.getElementById('t3dCometPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause orbit' : 'Play orbit';
        });
        var ionBtn = document.getElementById('t3dCometIonBtn');
        if (ionBtn) ionBtn.addEventListener('click', function () {
            showIon = !showIon;
            ionBtn.className = 'w3-button ' + (showIon ? 'w3-amber' : 'w3-light-grey');
            applyProgress(progress);
        });
        var dustBtn = document.getElementById('t3dCometDustBtn');
        if (dustBtn) dustBtn.addEventListener('click', function () {
            showDust = !showDust;
            dustBtn.className = 'w3-button ' + (showDust ? 'w3-amber' : 'w3-light-grey');
            applyProgress(progress);
        });
        var slider = document.getElementById('t3dCometProgress');
        if (slider) slider.addEventListener('input', function () {
            playing = false;
            if (playBtn) playBtn.textContent = 'Play orbit';
            applyProgress(parseFloat(slider.value || '0') / 100);
        });
        t3dStatus('Drag to orbit, scroll to zoom. Scrub the Halley-like ellipse, toggle ion/dust tails, and watch both point away from the Sun.');
        return function animate(dt) {
