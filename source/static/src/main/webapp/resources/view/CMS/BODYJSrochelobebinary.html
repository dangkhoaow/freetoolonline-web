            updateFacts();
        });

        return function animate(dt) {
            if (state.playing) {
                state.year += dt * 0.00055;
                if (state.year > PERIOD_YR) state.year -= PERIOD_YR;
                if (yearEl) yearEl.value = String(state.year.toFixed(1));
            }
            state.spin += dt * 0.00045;
            placeUranus();
            if (Math.floor(state.year * 2) !== Math.floor((state.year - dt * 0.00055) * 2)) updateFacts();
            shell.applyCamera();
        };
    }

    function t3dSunspotCycle(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x0a0502, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.48));
        var key = new THREE.DirectionalLight(0xfff5e0, 1.08);
        key.position.set(10, 8, 12);
        scene.add(key);

        var RSUN = 4.2;
        var sunGroup = new THREE.Group();
        scene.add(sunGroup);

        var photosphere = new THREE.Mesh(
            new THREE.SphereGeometry(RSUN, shell.low ? 36 : 56, shell.low ? 24 : 40),
            new THREE.MeshLambertMaterial({ color: 0xffb300, emissive: 0xff6f00, emissiveIntensity: 0.28 })
        );
        sunGroup.add(photosphere);

        var beltGroup = new THREE.Group();
        sunGroup.add(beltGroup);
        var beltMarkers = [];
        [0, 18, 35].forEach(function (lat) {
            [-1, 1].forEach(function (sign) {
                var pts = [];
                for (var d = 0; d <= 72; d++) {
                    var lon = (d / 72) * 360;
                    var th = (90 - sign * lat) * Math.PI / 180;
                    var ph = lon * Math.PI / 180;
                    var r = RSUN * 1.012;
                    pts.push(new THREE.Vector3(
                        r * Math.sin(th) * Math.cos(ph),
                        r * Math.cos(th),
                        r * Math.sin(th) * Math.sin(ph)
                    ));
                }
                var g = new THREE.BufferGeometry().setFromPoints(pts);
                var line = new THREE.Line(g, new THREE.LineBasicMaterial({ color: 0xff8f00, transparent: true, opacity: 0.55 }));
                beltGroup.add(line);
                beltMarkers.push({ line: line, lat: sign * lat });
            });
        });

        var spotRoot = new THREE.Group();
        sunGroup.add(spotRoot);
        var spotMeshes = [];

        var state = { year: 5.5, playing: true, maunder: false, t: 0, rotEq: 0, rotPole: 0 };

        function sunVec(latDeg, lonDeg, r) {
            var th = (90 - latDeg) * Math.PI / 180;
            var ph = lonDeg * Math.PI / 180;
            return new THREE.Vector3(
                r * Math.sin(th) * Math.cos(ph),
                r * Math.cos(th),
                r * Math.sin(th) * Math.sin(ph)
            );
        }

        function periodDays(latDeg) {
            var a = Math.abs(latDeg);
            return 25 + (10 * a / 90);
        }

        function activityFactor() {
            if (state.maunder) return 0.02;
            var phase = (state.year / 11) * Math.PI;
            return 0.12 + 0.88 * Math.pow(Math.sin(phase), 2);
        }

        function clearSpots() {
            while (spotMeshes.length) {
                var s = spotMeshes.pop();
                spotRoot.remove(s.group);
                s.group.traverse(function (o) {
                    if (o.geometry) o.geometry.dispose();
                    if (o.material) o.material.dispose();
                });
            }
        }

        function addSpot(lat, lon, scale) {
            var g = new THREE.Group();
            var pos = sunVec(lat, lon, RSUN * 1.003);
            g.position.copy(pos);
            g.lookAt(pos.clone().multiplyScalar(2));
            var umbra = new THREE.Mesh(
                new THREE.CircleGeometry(0.11 * scale, shell.low ? 10 : 14),
                new THREE.MeshBasicMaterial({ color: 0x3e2723 })
            );
            var penumbra = new THREE.Mesh(
                new THREE.RingGeometry(0.11 * scale, 0.2 * scale, shell.low ? 12 : 18),
                new THREE.MeshBasicMaterial({ color: 0x6d4c41, transparent: true, opacity: 0.82, side: THREE.DoubleSide })
            );
            penumbra.position.z = -0.001;
            g.add(penumbra);
            g.add(umbra);
            spotRoot.add(g);
            spotMeshes.push({ group: g, lat: lat, lon: lon });
        }

        function rebuildSpots() {
            clearSpots();
            var act = activityFactor();
            var n = shell.low ? 14 : 28;
            var count = Math.max(1, Math.round(n * act));
            if (state.maunder) count = Math.min(2, count);
            for (var i = 0; i < count; i++) {
                var lat = (Math.random() - 0.5) * 56;
                var lon = Math.random() * 360;
                var sc = 0.75 + Math.random() * 0.55;
                addSpot(lat, lon, sc);
            }
            updateFacts();
        }

        function factsHtml() {
            var phaseLabel = state.maunder ? 'Maunder Minimum (1645-1715) - nearly spot-free' : ('Cycle year ' + state.year.toFixed(1) + ' / 11 yr');
            return '<h3>Sunspot cycle (teaching schematic)</h3>'
                + '<p>' + phaseLabel + '. Activity belts sit near solar latitudes; umbra (dark core) and penumbra (lighter rim) mark individual spots. Differential rotation: equator ~<b>25 days</b>, poles ~<b>35 days</b> per turn.</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Schwabe cycle</td><td>~11 yr</td><td>Sunspot number rises and falls over roughly eleven years</td></tr>'
                + '<tr><td>Equator rotation</td><td>~25 d</td><td>Faster than higher latitudes (differential rotation)</td></tr>'
                + '<tr><td>Pole rotation</td><td>~35 d</td><td>Slower turnover near the poles</td></tr>'
                + '<tr><td>Maunder Minimum</td><td>1645-1715</td><td>Prolonged low activity era in historical records</td></tr>'
                + '<tr><td>Current cycle year</td><td>' + state.year.toFixed(1) + ' yr</td><td>Slider spans one Schwabe cycle (0-11 yr)</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational photosphere + spot-belt schematic - not an MHD dynamo model. Spot counts and belt speeds are tuned for one-screen teaching.</p>';
        }
        function updateFacts() {
            t3dInfo(factsHtml());
            var act = activityFactor();
            t3dStatus('Schwabe ~11 yr - equator ~25 d - poles ~35 d - year ' + state.year.toFixed(1)
                + ' - activity ~' + Math.round(act * 100) + '%'
                + (state.maunder ? ' - Maunder 1645-1715' : '') + '.');
        }

        rebuildSpots();

        var yearEl = document.getElementById('t3dSpotYear');
        if (yearEl) yearEl.addEventListener('input', function () {
            state.year = Math.min(11, Math.max(0, parseFloat(yearEl.value || '5.5')));
            rebuildSpots();
        });
        var playBtn = document.getElementById('t3dSpotPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            state.playing = !state.playing;
            playBtn.textContent = state.playing ? 'Pause cycle' : 'Play cycle';
        });
        var maunderBtn = document.getElementById('t3dSpotMaunderBtn');
        if (maunderBtn) maunderBtn.addEventListener('click', function () {
            state.maunder = !state.maunder;
            maunderBtn.textContent = state.maunder ? 'Exit Maunder' : 'Maunder Minimum';
            if (state.maunder) state.playing = false;
            if (playBtn) playBtn.textContent = state.playing ? 'Pause cycle' : 'Play cycle';
            rebuildSpots();
        });

        return function animate(dt) {
            state.t += dt;
            if (state.playing && !state.maunder) {
                state.year += dt * 0.00035;
                if (state.year > 11) state.year -= 11;
                if (yearEl) yearEl.value = String(state.year.toFixed(1));
                if (Math.floor(state.t / 900) !== Math.floor((state.t - dt) / 900)) rebuildSpots();
            }
            var eqSpeed = (2 * Math.PI / 25) * dt * 0.0012;
            var poleSpeed = (2 * Math.PI / 35) * dt * 0.0012;
            state.rotEq += eqSpeed;
            state.rotPole += poleSpeed;
            photosphere.rotation.y = state.rotEq;
            beltMarkers.forEach(function (bm) {
                var blend = Math.abs(bm.lat) / 35;
                var ang = state.rotEq * (1 - blend) + state.rotPole * blend;
                bm.line.rotation.y = ang - state.rotEq;
            });
            spotMeshes.forEach(function (s) {
                var blend = Math.abs(s.lat) / 35;
                var ang = state.rotEq * (1 - blend) + state.rotPole * blend;
                var lonRad = (s.lon + ang * 180 / Math.PI) % 360;
                var pos = sunVec(s.lat, lonRad, RSUN * 1.003);
                s.group.position.copy(pos);
                s.group.lookAt(pos.clone().multiplyScalar(2));
            });
            shell.applyCamera();
        };
    }

    function t3dEarthMagnetosphere(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02050c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.42));
        var sunL = new THREE.DirectionalLight(0xffe0a0, 1.05);
        sunL.position.set(40, 12, 8);
        scene.add(sunL);

        var SCOUNT = shell.low ? 280 : 650;
        var spos = new Float32Array(SCOUNT * 3);
        for (var s = 0; s < SCOUNT; s++) {
            var v = new THREE.Vector3().randomDirection().multiplyScalar(90 + Math.random() * 160);
            spos[s * 3] = v.x; spos[s * 3 + 1] = v.y; spos[s * 3 + 2] = v.z;
        }
        var sgeo = new THREE.BufferGeometry();
        sgeo.setAttribute('position', new THREE.BufferAttribute(spos, 3));
        scene.add(new THREE.Points(sgeo, new THREE.PointsMaterial({ color: 0xb0bec5, size: 0.4, sizeAttenuation: false })));

        // Sunward cue (solar wind arrives from +X)
        var sunMarker = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 16, 12),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        sunMarker.position.set(48, 0, 0);
        scene.add(sunMarker);

        var RE = 2.2; // scene units per Earth radius
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(RE, shell.low ? 24 : 36, shell.low ? 16 : 24),
            new THREE.MeshLambertMaterial({ color: 0x2e7d32 })
        );
        scene.add(earth);
        var ocean = new THREE.Mesh(
            new THREE.SphereGeometry(RE * 0.995, shell.low ? 20 : 32, shell.low ? 14 : 20),
            new THREE.MeshLambertMaterial({ color: 0x1565c0 })
        );
        scene.add(ocean);

        var state = { tiltDeg: 11, pauseRe: 10, showWind: true, t: 0 };
        var fieldGroup = new THREE.Group();
        scene.add(fieldGroup);
        var pauseMesh = null;
        var windPts = null;
        var windPos = null;

        function dipolePoint(lat, lon, rRe, tiltRad) {
            var th = (90 - lat) * Math.PI / 180;
            var ph = lon * Math.PI / 180;
            var x = rRe * Math.sin(th) * Math.cos(ph);
            var y = rRe * Math.cos(th);
            var z = rRe * Math.sin(th) * Math.sin(ph);
            // tilt about Z then compress sunward (+X)
            var ct = Math.cos(tiltRad), st = Math.sin(tiltRad);
            var yt = y * ct - x * st;
            var xt = y * st + x * ct;
            // solar-wind compression: sunward hemisphere shrinks toward magnetopause scale
            var compress = state.pauseRe / 10;
            if (xt > 0) xt *= (0.55 + 0.45 * compress);
            else xt *= (1.15 + (10 - state.pauseRe) * 0.04);
            return new THREE.Vector3(xt * RE, yt * RE, z * RE);
        }

        function rebuildField() {
            while (fieldGroup.children.length) {
                var ch = fieldGroup.children.pop();
                if (ch.geometry) ch.geometry.dispose();
                if (ch.material) ch.material.dispose();
            }
            var tilt = state.tiltDeg * Math.PI / 180;
            var nLines = shell.low ? 10 : 16;
            for (var i = 0; i < nLines; i++) {
                var lon = (i / nLines) * 360;
                var pts = [];
                for (var j = 0; j <= 48; j++) {
                    var lat = -78 + (156 * j / 48);
                    var r = 1.15 + 0.35 * Math.pow(Math.cos(lat * Math.PI / 180), 2);
                    // stretch along field: higher |lat| closer to surface footpoints
                    var rLine = r + (Math.abs(lat) / 90) * (state.pauseRe * 0.55);
                    pts.push(dipolePoint(lat, lon, rLine, tilt));
                }
                var g = new THREE.BufferGeometry().setFromPoints(pts);
                var col = (i % 2 === 0) ? 0x4fc3f7 : 0x81d4fa;
                fieldGroup.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: 0.85 })));
            }
            if (pauseMesh) { scene.remove(pauseMesh); pauseMesh.geometry.dispose(); pauseMesh.material.dispose(); }
            // Magnetopause teaching shell - compressed ellipsoid
            var rx = state.pauseRe * RE * 0.92;
            var ry = state.pauseRe * RE * 1.05;
            var rz = state.pauseRe * RE * 1.05;
            pauseMesh = new THREE.Mesh(
                new THREE.SphereGeometry(1, shell.low ? 20 : 28, shell.low ? 14 : 20),
                new THREE.MeshBasicMaterial({ color: 0xff8a65, wireframe: true, transparent: true, opacity: 0.45 })
            );
            pauseMesh.scale.set(rx, ry, rz);
            // shift center slightly nightward so sunward standoff reads correctly
            pauseMesh.position.x = -RE * (10 - state.pauseRe) * 0.15;
            scene.add(pauseMesh);
            updateFacts();
        }

        function rebuildWind() {
            if (windPts) { scene.remove(windPts); windPts.geometry.dispose(); windPts.material.dispose(); windPts = null; }
            if (!state.showWind) return;
            var N = shell.low ? 180 : 420;
            windPos = new Float32Array(N * 3);
            for (var i = 0; i < N; i++) {
                windPos[i * 3] = 20 + Math.random() * 40;
                windPos[i * 3 + 1] = (Math.random() - 0.5) * 28;
                windPos[i * 3 + 2] = (Math.random() - 0.5) * 28;
            }
            var g = new THREE.BufferGeometry();
            g.setAttribute('position', new THREE.BufferAttribute(windPos, 3));
            windPts = new THREE.Points(g, new THREE.PointsMaterial({ color: 0xffecb3, size: 0.55, sizeAttenuation: false }));
            scene.add(windPts);
        }

        function factsHtml() {
            return '<h3>Earth magnetosphere (teaching schematic)</h3>'
                + '<p>Dipole field lines tilt ~<b>' + state.tiltDeg.toFixed(0) + ' deg</b> from the spin axis. Solar wind from the Sun compresses the sunward magnetopause to about <b>' + state.pauseRe + ' Re</b> (typical published range 6-10 Re).</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Surface field</td><td>~25-65 uT</td><td>Published surface intensity range</td></tr>'
                + '<tr><td>Dipole tilt</td><td>~11 deg</td><td>Magnetic axis vs rotation axis</td></tr>'
                + '<tr><td>Magnetopause (sunward)</td><td>~6-10 Re</td><td>Compressed by solar wind; slider sets teaching standoff</td></tr>'
                + '<tr><td>Current standoff</td><td>' + state.pauseRe + ' Re</td><td>Orange wire shell in this schematic</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational dipole + compressed boundary schematic - not an MHD magnetosphere model. Field-line paths and shell size are tuned for one-screen teaching.</p>';
        }
        function updateFacts() {
            t3dInfo(factsHtml());
            t3dStatus('Magnetopause ~' + state.pauseRe + ' Re sunward - dipole tilt ~' + state.tiltDeg.toFixed(0) + ' deg - surface field ~25-65 uT.');
        }

        rebuildField();
        rebuildWind();

        var tiltEl = document.getElementById('t3dMagTilt');
        if (tiltEl) tiltEl.addEventListener('input', function () {
            state.tiltDeg = Math.min(30, Math.max(0, parseFloat(tiltEl.value || '11')));
            rebuildField();
        });
        var pauseEl = document.getElementById('t3dMagPause');
        if (pauseEl) pauseEl.addEventListener('input', function () {
            state.pauseRe = Math.min(12, Math.max(6, parseFloat(pauseEl.value || '10')));
            rebuildField();
        });
        [['t3dMagQuietBtn', 10], ['t3dMagStormBtn', 6]].forEach(function (pair) {
            var btn = document.getElementById(pair[0]);
            if (btn) btn.addEventListener('click', function () {
                state.pauseRe = pair[1];
                if (pauseEl) pauseEl.value = String(pair[1]);
                rebuildField();
            });
        });
        var windBtn = document.getElementById('t3dMagWindBtn');
        if (windBtn) windBtn.addEventListener('click', function () {
            state.showWind = !state.showWind;
            windBtn.textContent = state.showWind ? 'Hide solar wind' : 'Show solar wind';
            rebuildWind();
        });

        return function animate(dt) {
            state.t += dt;
            earth.rotation.y += dt * 0.00015;
            ocean.rotation.y = earth.rotation.y;
            if (windPts && windPos) {
                var N = windPos.length / 3;
                var speed = 0.012 * dt;
                for (var i = 0; i < N; i++) {
                    windPos[i * 3] -= speed * (0.7 + (i % 5) * 0.08);
                    if (windPos[i * 3] < state.pauseRe * RE * 0.85) {
                        windPos[i * 3] = 20 + Math.random() * 40;
                        windPos[i * 3 + 1] = (Math.random() - 0.5) * 28;
                        windPos[i * 3 + 2] = (Math.random() - 0.5) * 28;
                    }
                }
                windPts.geometry.attributes.position.needsUpdate = true;
            }
            shell.applyCamera();
        };
    }

    function t3dOrbitalVelocity(shell) {
        var THREE = shell.THREE, scene = shell.scene;

        scene.add(new THREE.Points(sgeo, new THREE.PointsMaterial({ color: 0xcfd8dc, size: 0.42, sizeAttenuation: false })));

        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(2.4, 32, 16),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        scene.add(sun);

        var state = { aAu: 1.0, e: 0.017, color: 0x42a5f5, name: 'Earth', vMean: 29.78, M: 0, paused: false };
        var orbitLine, planet, periMesh, apoMesh, velArrow;
        var lastSpeed = 0, lastRau = 1;

        function auToScene(aAu) { return 6 + aAu * 3.8; }
        function periodYears(aAu) { return Math.pow(aAu, 1.5); }
        function posFromE(E, aScene, ecc) {
            var b = aScene * Math.sqrt(1 - ecc * ecc);
            return new THREE.Vector3(aScene * (Math.cos(E) - ecc), 0, b * Math.sin(E));
        }
        function rAuFromE(E, aAu, ecc) {
            var b = aAu * Math.sqrt(1 - ecc * ecc);
            var x = aAu * (Math.cos(E) - ecc);
            var z = b * Math.sin(E);
            return Math.sqrt(x * x + z * z);
        }
        function visVivaKmS(rAu, aAu, vMean) {
            var term = aAu * (2 / rAu - 1 / aAu);
            if (term < 0) term = 0;
            return vMean * Math.sqrt(term);
        }
        function tangentFromE(E, aScene, ecc) {
            var b = aScene * Math.sqrt(1 - ecc * ecc);
            return new THREE.Vector3(-aScene * Math.sin(E), 0, b * Math.cos(E)).normalize();
        }

        function rebuildOrbit() {
            if (orbitLine) { scene.remove(orbitLine); orbitLine.geometry.dispose(); orbitLine.material.dispose(); }
            if (planet) { scene.remove(planet); }
            if (periMesh) { scene.remove(periMesh); }
            if (apoMesh) { scene.remove(apoMesh); }
            if (velArrow) { scene.remove(velArrow); velArrow = null; }

            var aScene = auToScene(state.aAu), ecc = state.e, pts = [];
            for (var i = 0; i <= 140; i++) {
                var E = (i / 140) * Math.PI * 2;
                var p = posFromE(E, aScene, ecc);
                pts.push(p.x, p.y, p.z);
            }
            var g = new THREE.BufferGeometry();
            g.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
            orbitLine = new THREE.Line(g, new THREE.LineBasicMaterial({ color: 0x546e7a }));
            scene.add(orbitLine);

            planet = new THREE.Mesh(
                new THREE.SphereGeometry(Math.max(0.65, 1.4 - state.e * 0.35), 20, 12),
                new THREE.MeshLambertMaterial({ color: state.color })
            );
            scene.add(planet);

            var periPos = posFromE(0, aScene, ecc);
            var apoPos = posFromE(Math.PI, aScene, ecc);
            periMesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.55, 12, 8),
                new THREE.MeshBasicMaterial({ color: 0x66bb6a })
            );
            periMesh.position.copy(periPos);
            scene.add(periMesh);
            apoMesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.55, 12, 8),
                new THREE.MeshBasicMaterial({ color: 0xef5350 })
            );
            apoMesh.position.copy(apoPos);
            scene.add(apoMesh);

            shell.orbit.goalRadius = Math.max(28, aScene * 1.35);
            shell.orbit.radius = shell.orbit.goalRadius;
            updateFacts(visVivaKmS(state.aAu * (1 - ecc), state.aAu, state.vMean), state.aAu * (1 - ecc), 'periapsis');
        }

        function updateVelArrow(pos, tan, speedKmS) {
            if (velArrow) scene.remove(velArrow);
            var len = 1.8 + Math.min(6, speedKmS * 0.12);
            velArrow = new THREE.ArrowHelper(tan, pos, len, 0xffeb3b, 0.5, 0.35);
            scene.add(velArrow);
        }

        function factsTableHtml(speedKmS, rAu, label) {
            var vPeri = visVivaKmS(state.aAu * (1 - state.e), state.aAu, state.vMean);
            var vApo = visVivaKmS(state.aAu * (1 + state.e), state.aAu, state.vMean);
            return '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Vis-viva</td><td>v = sqrt(GM(2/r - 1/a))</td><td>Speed along an elliptical orbit</td></tr>'
                + '<tr><td>Mean speed (' + state.name + ')</td><td>' + state.vMean + ' km/s</td><td>Published mean orbital speed</td></tr>'
                + '<tr><td>Current speed</td><td>' + speedKmS.toFixed(2) + ' km/s</td><td>At ' + label + ' (r = ' + rAu.toFixed(3) + ' AU)</td></tr>'
                + '<tr><td>Periapsis speed</td><td>' + vPeri.toFixed(2) + ' km/s</td><td>Fastest - nearest the star</td></tr>'
                + '<tr><td>Apoapsis speed</td><td>' + vApo.toFixed(2) + ' km/s</td><td>Slowest - farthest from the star</td></tr>'
                + '<tr><td>Semi-major axis a</td><td>' + state.aAu + ' AU</td><td>Eccentricity e = ' + state.e + '</td></tr>'
                + '</tbody></table></div>';
        }

        function overviewHtml(speedKmS, rAu, label) {
            return '<h3>Orbital speed along an ellipse</h3>'
                + '<p>Vis-viva: <b>v = sqrt(GM(2/r - 1/a))</b>. On an eccentric orbit the body moves <b>faster near periapsis</b> (green marker) and <b>slower near apoapsis</b> (red marker). The yellow arrow shows the instantaneous velocity direction.</p>'
                + '<p>Published mean speeds: Mercury ~47.36 km/s, Earth ~29.78 km/s, Neptune ~5.43 km/s.</p>'
                + factsTableHtml(speedKmS, rAu, label)
                + '<p class="t3d-note">Educational visualization using Vis-viva and Kepler motion - not a full n-body gravity integrator. Orbit size is scaled for one-screen teaching; km/s figures follow published mean speeds.</p>';
        }

        function updateFacts(speedKmS, rAu, label) {
            lastSpeed = speedKmS; lastRau = rAu;
            t3dInfo(overviewHtml(speedKmS, rAu, label));
            t3dStatus(state.name + ' orbital speed ' + speedKmS.toFixed(2) + ' km/s at ' + label + ' - Vis-viva along the ellipse.');
        }

        rebuildOrbit();

        function applyPreset(key) {
            var p = T3D_ORBVEL_PRESETS[key];
            if (!p) return;
            state.aAu = p.aAu; state.e = p.e; state.color = p.color; state.name = p.name; state.vMean = p.vMean; state.M = 0;
            var eccEl = document.getElementById('t3dOrbVelEcc');
            if (eccEl) eccEl.value = String(p.e);
            rebuildOrbit();
        }

        ['mercury', 'earth', 'neptune'].forEach(function (key) {
            var btn = document.getElementById('t3dOrbVelBtn-' + key);
            if (btn) btn.addEventListener('click', function () { applyPreset(key); });
        });

        var eccSlider = document.getElementById('t3dOrbVelEcc');
        if (eccSlider) eccSlider.addEventListener('input', function () {
            state.e = Math.min(0.75, Math.max(0, parseFloat(eccSlider.value || '0.017')));
            state.name = 'Custom orbit';
            rebuildOrbit();
        });

        var playBtn = document.getElementById('t3dOrbVelPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            state.paused = !state.paused;
            playBtn.textContent = state.paused ? 'Play orbit' : 'Pause orbit';
        });

        return function animate(dt) {
            if (state.paused) { shell.applyCamera(); return; }
            var aScene = auToScene(state.aAu), ecc = state.e;
            var Ty = periodYears(state.aAu);
            var n = (Math.PI * 2) / (Ty * 10);
            state.M += (dt / 1000) * n;
            if (state.M > Math.PI * 2) state.M -= Math.PI * 2;
            var E = t3dSolveKepler(state.M, ecc);
            var pos = posFromE(E, aScene, ecc);
            var rAu = rAuFromE(E, state.aAu, ecc);
            var speedKmS = visVivaKmS(rAu, state.aAu, state.vMean);
            var tan = tangentFromE(E, aScene, ecc);
            if (planet) planet.position.copy(pos);
            updateVelArrow(pos, tan, speedKmS);
            if (Math.abs(speedKmS - lastSpeed) > 0.4 || Math.abs(rAu - lastRau) > 0.02) {
                var nearPeri = rAu < state.aAu;
                updateFacts(speedKmS, rAu, nearPeri ? 'periapsis approach' : 'apoapsis approach');
            }
            shell.applyCamera();
        };
    }

    function t3dCosmicDistanceLadder(shell) {

        function ringAt(r, color, opacity) {

            }

            { key: 'pc', label: '1 pc', km: T3D_CDL_PC_KM, color: 0xce93d8, kind: 'pc' },

            g.add(ring);

                new THREE.SphereGeometry(0.28, 10, 8),

            );

            g.add(hitch);
            clickTargets.push({ mesh: hitch, kind: rungs[ri].kind });
            rungMeshes.push({ ring: ring, hitch: hitch, def: rungs[ri], r: rr });
        }

        // Scale-bar radial tick along +X
        var barPts = [new THREE.Vector3(T3D_CDL_R_MIN, 0.05, 0), new THREE.Vector3(T3D_CDL_R_MAX, 0.05, 0)];
        var scaleBar = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(barPts),

            ctx.font = 'bold 32px sans-serif';
            ctx.textAlign = 'center';

            sprite.scale.set(scaleX || 7.5, 1.4, 1);
            sprite.position.copy(pos);
            labelGroup.add(sprite);
            return sprite;
        }
        makeLabel('Earth / 1 AU', '#81d4fa', new THREE.Vector3(t3dCdlKmToR(T3D_CDL_AU_KM), 1.4, 0), 6);
        makeLabel('1 light-year', '#a5d6a7', new THREE.Vector3(t3dCdlKmToR(T3D_CDL_LY_KM), 1.6, 0), 6.5);
        makeLabel('1 parsec (~3.26 ly)', '#ce93d8', new THREE.Vector3(t3dCdlKmToR(T3D_CDL_PC_KM), 1.8, 0), 8);
        makeLabel('Parallax to ~1000 pc', '#ffcc80', new THREE.Vector3(t3dCdlKmToR(T3D_CDL_PARALLAX_PC * T3D_CDL_PC_KM), 2.0, 0), 8);
        makeLabel('~1 Mpc (nearby-galaxy hint)', '#b0bec5', new THREE.Vector3(t3dCdlKmToR(T3D_CDL_MPC_KM), 2.2, 0), 9);

        shell.orbit.goalRadius = 45;
        shell.orbit.radius = 45;

        function ladderTableHtml() {
            return '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Rung</th><th>Figure</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>1 AU</td><td>1.496e8 km</td><td>Earth-Sun distance</td></tr>'
                + '<tr><td>1 ly</td><td>9.461e12 km</td><td>Light-travel in one year</td></tr>'
                + '<tr><td>1 pc</td><td>3.086e13 km (~3.26 ly)</td><td>Parallax of 1 arcsec</td></tr>'
                + '<tr><td>Parallax reach</td><td>~1000 pc</td><td>Hipparcos/Gaia teaching scale</td></tr>'
                + '<tr><td>Next rung</td><td>Cepheid P-L</td><td>Standard-candle step beyond parallax</td></tr>'
                + '</tbody></table></div>';
        }

        function overviewHtml() {
            var km = Math.pow(10, state.logKm);
            return '<h3>Cosmic distance ladder</h3>'

                + ladderTableHtml()
                + '<p>Parallax is reliable roughly to <b>~1000 pc</b> (Hipparcos/Gaia teaching scale). Cepheid period-luminosity is the next ladder rung beyond that - this page does not claim a full distance solution.</p>'

        function auFactsHtml() {

        }
        function lyFactsHtml() {
            return '<h3>1 light-year</h3>'
                + '<p><b>1 ly = 9.461e12 km</b>. Distance light travels in one Julian year. Useful everyday stretch scale between AU and parsecs.</p>';
        }
        function pcFactsHtml() {
            return '<h3>1 parsec</h3>'
                + '<p><b>1 pc = 3.086e13 km (~3.26 ly)</b>. Distance at which 1 AU subtends 1 arcsecond of parallax.</p>';

            return '<h3>Stellar parallax reach</h3>'
                + '<p>Parallax is reliable roughly to <b>~1000 pc</b> on the Hipparcos/Gaia teaching scale used here. Beyond that, standard candles (Cepheids) take the next rung.</p>';
        }
        function mpcFactsHtml() {
            return '<h3>~1 Mpc (label only)</h3>'
                + '<p>Order-of-magnitude nearby-galaxy scale shown as a pale outer rung label - not a measured galaxy distance in this scene.</p>';
        }
        function cursorFactsHtml() {

        function syncCursor() {
            var r = t3dCdlLogToR(state.logKm);

            var scrub = document.getElementById('t3dCdlZoomScrub');
            var lab = document.getElementById('t3dCdlZoomLabel');

            if (lab) {
                var km = Math.pow(10, state.logKm);
                lab.textContent = t3dCdlFmtKm(km);

            state.logKm = logKm;
            if (state.logKm < T3D_CDL_LOG_MIN) state.logKm = T3D_CDL_LOG_MIN;

            syncCursor();
        }

        t3dInfo(overviewHtml());
        t3dStatus('Cosmic distance ladder - log zoom across AU (1.496e8 km), ly (9.461e12 km), pc (3.086e13 km).');

        var btnP = document.getElementById('t3dCdlPlayBtn');

            var i, rr, dirLen, nx, ny, nz, speed;
            if (state.playing) {

                    if (rr < 2.5) rr = 2.5;

                    dirLen = Math.sqrt(nx * nx + ny * ny + nz * nz) || 1;
                    arr[i * 3] = (nx / dirLen) * rr;
                    arr[i * 3 + 1] = (ny / dirLen) * rr;
                    arr[i * 3 + 2] = (nz / dirLen) * rr;

                        pRad[i] = 2.5;

                pGeo.attributes.position.needsUpdate = true;
                sunMesh.rotation.y += dt / 4000;

    function t3dTidesEarthMoon(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x04060d, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.45));
        var sunLight = new THREE.DirectionalLight(0xfff3d0, 1.1);
        sunLight.position.set(40, 20, 10);
        scene.add(sunLight);

        var SCOUNT = shell.low ? 300 : 700;
        var spos = new Float32Array(SCOUNT * 3);
        for (var s = 0; s < SCOUNT; s++) {
            var v = new THREE.Vector3().randomDirection().multiplyScalar(70 + Math.random() * 110);
            spos[s * 3] = v.x; spos[s * 3 + 1] = v.y; spos[s * 3 + 2] = v.z;
        }
        var sgeo = new THREE.BufferGeometry();
        sgeo.setAttribute('position', new THREE.BufferAttribute(spos, 3));
        scene.add(new THREE.Points(sgeo, new THREE.PointsMaterial({ color: 0xcfd8dc, size: 0.35, sizeAttenuation: false })));

        var EARTH_R = 6, MOON_R = 1.5, MOON_ORBIT = 26;
        var earth = new THREE.Group();
        scene.add(earth);
        var earthMesh = new THREE.Mesh(
            new THREE.SphereGeometry(EARTH_R, 32, 20),
            new THREE.MeshLambertMaterial({ color: 0x2f6da8 })
        );
        earthMesh.userData = { kind: 'earth' };
        earth.add(earthMesh);

        // Observer marker fixed to Earth's rotating solid body (spins with earthMesh).
        var marker = new THREE.Mesh(new THREE.SphereGeometry(0.34, 12, 12), new THREE.MeshBasicMaterial({ color: 0xff5252 }));
        marker.position.set(EARTH_R + 0.05, 0, 0);
        earthMesh.add(marker);

        // Tidal bulge shell: semi-transparent, does NOT spin with Earth - it stays
        // aligned to the Earth-Moon axis (the real physics: the bulge tracks the
        // Moon; the solid body rotates underneath it).
        var bulge = new THREE.Mesh(
            new THREE.SphereGeometry(EARTH_R * 1.02, 40, 24),
            new THREE.MeshBasicMaterial({ color: 0x81d4fa, transparent: true, opacity: 0.22, depthWrite: false })
        );
        earth.add(bulge);

        var moon = new THREE.Mesh(new THREE.SphereGeometry(MOON_R, 20, 12), new THREE.MeshLambertMaterial({ color: 0xbdbdbd }));
        moon.userData = { kind: 'moon' };
        scene.add(moon);
        var moonRing = new THREE.Mesh(new THREE.TorusGeometry(MOON_ORBIT, 0.04, 6, 96), new THREE.MeshBasicMaterial({ color: 0x37474f }));
        moonRing.rotation.x = Math.PI / 2;
        scene.add(moonRing);

        // Sun direction indicator (repositioned by tide mode; not to real scale).
        var sunMarker = new THREE.Mesh(new THREE.SphereGeometry(2.2, 16, 10), new THREE.MeshBasicMaterial({ color: 0xffd54f }));
        sunMarker.userData = { kind: 'sun' };
        scene.add(sunMarker);

        var state = { playing: true, moonAngle: 0.4, earthSpin: 0, modeIdx: 1 };
        function mode() { return T3D_TIDE_MODES[state.modeIdx]; }

        function placeSun() {
            var rad = (mode().sunAngleDeg * Math.PI) / 180 + state.moonAngle;
            sunMarker.position.set(Math.cos(rad) * 90, 6, Math.sin(rad) * 90);
        }
        function updateBulge() {
            var stretch = 1 + 0.4 * mode().amp;
            bulge.scale.set(stretch, 1 / Math.sqrt(stretch), 1 / Math.sqrt(stretch));
            bulge.rotation.y = state.moonAngle;
        }
        function tideHeightAt(observerWorldAngle) {
            var delta = observerWorldAngle - state.moonAngle;
            return mode().amp * Math.cos(2 * delta); // two highs + two lows per rotation
        }
        function tideStateLabel() {
            var a = earthMesh.rotation.y;
            var h = tideHeightAt(a), hPrev = tideHeightAt(a - 0.02);
            if (h > 0.75) return 'High tide';
            if (h < -0.75) return 'Low tide';
            return (h > hPrev) ? 'Rising' : 'Falling';
        }
        function rangeTableHtml() {
            return '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small">'
                + '<thead><tr><th>Location</th><th>Typical tidal range</th></tr></thead><tbody>'
                + '<tr><td>Global ocean average</td><td>about 3 ft (0.9 m) - NOAA</td></tr>'
                + '<tr><td>Open Atlantic coastline</td><td>4-8 ft (1.5-2.5 m)</td></tr>'
                + '<tr><td>Bay of Fundy, Minas Basin (highest in the world)</td><td>up to 53 ft (16 m) - NOAA</td></tr>'
                + '</tbody></table></div>';
        }
        function overviewHtml() {
            return '<h3>Earth-Moon tidal bulges</h3>'
                + '<p>The red marker is a coastal observer riding the spinning Earth. The pale-blue shell is the equilibrium ocean bulge - it stays lined up with the Moon while the solid Earth rotates underneath, so the observer passes through <b>two high tides and two low tides every rotation</b> (real coasts: about every 12 h 25 min, a lunar day of 24 h 50 min - NOAA).</p>'
                + '<p>Current mode: <b>' + mode().label + '</b>. Observer state: <b>' + tideStateLabel() + '</b>.</p>'
                + rangeTableHtml()
                + '<p class="t3d-note">Educational equilibrium-tide model - not a hydrodynamic simulation. It has no coastlines, resonance, or currents; the bulge is exaggerated for readability, and the Spring/Neap amplitudes are arithmetic derived from NOAA\'s published figure that the Sun\'s tide-generating force is about half the Moon\'s.</p>';
        }
        function moonFactsHtml() {
            return '<h3>The Moon</h3><p>The Moon\'s gravity is the dominant tide-raising force on Earth. NOAA: the Sun\'s tide-generating force is only about half the Moon\'s, even though the Sun is far more massive - tide-raising force falls off with the cube of distance, and the Sun is roughly 390 times farther away.</p>' + rangeTableHtml();
        }
        function sunFactsHtml() {
            return '<h3>The Sun</h3><p>NOAA: the Sun\'s tide-generating force is about half the Moon\'s. When the Sun and Moon line up (Spring tide) their pulls add; at right angles (Neap tide) they partly cancel.</p>' + rangeTableHtml();
        }

        t3dInfo(overviewHtml());
        t3dStatus('Two tidal bulges track the Moon while Earth spins underneath - watch the red marker pass through high and low tide.');
        updateBulge();
        placeSun();

        var btnP = document.getElementById('t3dTidesEarthMoonPlayBtn');
        if (btnP) btnP.addEventListener('click', function () {
            state.playing = !state.playing;
            btnP.textContent = state.playing ? 'Pause rotation' : 'Resume rotation';

        var btnM = document.getElementById('t3dTidesEarthMoonModeBtn');
        if (btnM) btnM.addEventListener('click', function () {
            state.modeIdx = (state.modeIdx + 1) % T3D_TIDE_MODES.length;

        var btnT = document.getElementById('t3dTidesEarthMoonTableBtn');
        if (btnT) btnT.addEventListener('click', function () { t3dInfo('<h3>Tidal range table</h3>' + rangeTableHtml() + '<p class="t3d-note">Source: NOAA (noaa.gov/ocean/fundy-max; oceanservice.noaa.gov).</p>'); });

        var ray = new THREE.Raycaster();
        shell.onClick = function (e) {
            ray.setFromCamera(shell.ndc(e), shell.camera);
            var hits = ray.intersectObjects([earthMesh, moon, sunMarker], false);
            if (!hits.length) return;
            var kind = hits[0].object.userData && hits[0].object.userData.kind;
            if (kind === 'moon') t3dInfo(moonFactsHtml());
            else if (kind === 'sun') t3dInfo(sunFactsHtml());
            else if (kind === 'earth') t3dInfo(overviewHtml());
        };

        return function animate(dt) {
            if (state.playing) {
                state.earthSpin += dt * 0.00035;
                state.moonAngle += dt * 0.000018;
                earthMesh.rotation.y = state.earthSpin;
                moon.position.set(Math.cos(state.moonAngle) * MOON_ORBIT, 0, Math.sin(state.moonAngle) * MOON_ORBIT);
                updateBulge();
                placeSun();
            }
        };
    }
