        }
        root.add(axisLine(new THREE.Vector3(-8, 0, 0), new THREE.Vector3(8, 0, 0), 0x90a4ae));
        root.add(axisLine(new THREE.Vector3(0, -8, 0), new THREE.Vector3(0, 8, 0), 0xb0bec5));

        var origin = new THREE.Mesh(
            new THREE.SphereGeometry(0.18, 12, 10),
            new THREE.MeshBasicMaterial({ color: 0xffecb3 })
        );
        root.add(origin);

        var futureCone = null;
        var pastCone = null;
        var elsewhereGroup = new THREE.Group();
        root.add(elsewhereGroup);
        var probe = new THREE.Mesh(
            new THREE.SphereGeometry(0.16, 10, 8),
            new THREE.MeshBasicMaterial({ color: 0x4fc3f7 })
        );
        root.add(probe);
        var probeLink = null;

        function makeConeMesh(up, color) {
            // Open double-napped cone: radius grows with |ct| at 45 deg (c=1 units)
            var h = 6.5;
            var geo = new THREE.ConeGeometry(h, h, shell.low ? 24 : 40, 1, true);
            var mat = new THREE.MeshBasicMaterial({
                color: color, wireframe: true, transparent: true, opacity: 0.55, side: THREE.DoubleSide
            });
            var mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = up ? h / 2 : -h / 2;
            if (!up) mesh.rotation.x = Math.PI;
            return mesh;
        }

        function rebuildCones() {
            if (futureCone) { root.remove(futureCone); futureCone.geometry.dispose(); futureCone.material.dispose(); }
            if (pastCone) { root.remove(pastCone); pastCone.geometry.dispose(); pastCone.material.dispose(); }
            futureCone = makeConeMesh(true, 0x81c784);
            pastCone = makeConeMesh(false, 0xff8a65);
            futureCone.visible = state.showFuture;
            pastCone.visible = state.showPast;
            root.add(futureCone);
            root.add(pastCone);
        }

        function rebuildElsewhere() {
            while (elsewhereGroup.children.length) {
                var ch = elsewhereGroup.children.pop();
                if (ch.geometry) ch.geometry.dispose();
                if (ch.material) ch.material.dispose();
            }
            if (!state.showElsewhere) return;
            // Sample markers in spacelike region |x| > |ct|
            var pts = [];
            var n = shell.low ? 40 : 80;
            for (var i = 0; i < n; i++) {
                var x = (Math.random() - 0.5) * 14;
                var ct = (Math.random() - 0.5) * 10;
                if (Math.abs(x) <= Math.abs(ct) + 0.35) continue;
                pts.push(new THREE.Vector3(x, ct, (Math.random() - 0.5) * 0.4));
            }
            if (!pts.length) return;
            var g = new THREE.BufferGeometry().setFromPoints(pts);
            elsewhereGroup.add(new THREE.Points(g, new THREE.PointsMaterial({
                color: 0xce93d8, size: 0.12, sizeAttenuation: true
            })));
        }

        function causalLabel() {
            var x = state.eventX, ct = state.eventT;
            var absX = Math.abs(x), absT = Math.abs(ct);
            if (Math.abs(absX - absT) < 0.08) return 'null (light-like)';
            if (absT > absX) return ct >= 0 ? 'timelike future' : 'timelike past';
            return 'spacelike (elsewhere)';
        }

        function rebuildProbe() {
            probe.position.set(state.eventX, state.eventT, 0);
            if (probeLink) { root.remove(probeLink); probeLink.geometry.dispose(); probeLink.material.dispose(); }
            probeLink = axisLine(new THREE.Vector3(0, 0, 0), probe.position.clone(), 0x4fc3f7);
            root.add(probeLink);
            updateFacts();
        }

        function factsHtml() {
            return '<h3>Light cone (Minkowski teaching diagram)</h3>'
                + '<p>In units where <b>c = 1</b>, light traces <b>45 deg</b> null lines. Absolute speed of light <b>c = 299,792.458 km/s</b>. Regions: future / past (timelike) and elsewhere (spacelike).</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Speed of light c</td><td>299,792.458 km/s</td><td>Exact SI-defined literacy</td></tr>'
                + '<tr><td>Null lines</td><td>45 deg (c=1 units)</td><td>Light-like paths on this diagram</td></tr>'
                + '<tr><td>Probe event</td><td>x=' + state.eventX.toFixed(2) + ', ct=' + state.eventT.toFixed(2) + '</td><td>' + causalLabel() + '</td></tr>'
                + '<tr><td>Regions</td><td>past / future / elsewhere</td><td>Causal structure of flat spacetime</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational Minkowski diagram - not a curved-spacetime solver. Axes are teaching coordinates (ct vs x), not a GR geodesic integrator.</p>';
        }
        function updateFacts() {
            t3dInfo(factsHtml());
            t3dStatus('c = 299,792.458 km/s - null lines at 45 deg (c=1) - probe is ' + causalLabel() + '.');
        }

        rebuildCones();
        rebuildElsewhere();
        rebuildProbe();

        var xEl = document.getElementById('t3dConeX');
        if (xEl) xEl.addEventListener('input', function () {
            state.eventX = Math.min(6, Math.max(-6, parseFloat(xEl.value || '0')));
            rebuildProbe();
        });
        var tEl = document.getElementById('t3dConeT');
        if (tEl) tEl.addEventListener('input', function () {
            state.eventT = Math.min(6, Math.max(-6, parseFloat(tEl.value || '0')));
            rebuildProbe();
        });
        [['t3dConeFutureBtn', 'showFuture', 'Future cone'], ['t3dConePastBtn', 'showPast', 'Past cone'], ['t3dConeElseBtn', 'showElsewhere', 'Elsewhere']].forEach(function (row) {
            var btn = document.getElementById(row[0]);
            if (!btn) return;
            btn.addEventListener('click', function () {
                state[row[1]] = !state[row[1]];
                btn.textContent = (state[row[1]] ? 'Hide ' : 'Show ') + row[2];
                rebuildCones();
                rebuildElsewhere();
                updateFacts();
            });
        });
        var lightBtn = document.getElementById('t3dConeLightBtn');
        if (lightBtn) lightBtn.addEventListener('click', function () {
            // Place probe on the future null ray at 45 deg
            state.eventX = 3.2;
            state.eventT = 3.2;
            if (xEl) xEl.value = String(state.eventX);
            if (tEl) tEl.value = String(state.eventT);
            rebuildProbe();
        });

        return function animate(dt) {
            state.t += dt;
            root.rotation.y = Math.sin(state.t * 0.00008) * 0.12;
            shell.applyCamera();
        };
    }

    function t3dJupiterMagnetosphere(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02050c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        var sunL = new THREE.DirectionalLight(0xffe0a0, 1.0);
        sunL.position.set(55, 14, 10);
        scene.add(sunL);

        // Jupiter magnetosphere literacy: equatorial field ~420 uT; volume ~20,000x Earth;
        // magnetotail can extend past Saturn's orbit (~9.5 AU). Teaching schematic, not MHD.
        var RJ = 1.6;
        var state = { pauseRj: 70, showTail: true, showSaturn: true, showWind: true, t: 0 };

        var SCOUNT = shell.low ? 240 : 560;
        var spos = new Float32Array(SCOUNT * 3);
        for (var s = 0; s < SCOUNT; s++) {
            var v = new THREE.Vector3().randomDirection().multiplyScalar(100 + Math.random() * 180);
            spos[s * 3] = v.x; spos[s * 3 + 1] = v.y; spos[s * 3 + 2] = v.z;
        }
        var sgeo = new THREE.BufferGeometry();
        sgeo.setAttribute('position', new THREE.BufferAttribute(spos, 3));
        scene.add(new THREE.Points(sgeo, new THREE.PointsMaterial({ color: 0xb0bec5, size: 0.35, sizeAttenuation: false })));

        var sunMarker = new THREE.Mesh(
            new THREE.SphereGeometry(1.1, 14, 12),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        sunMarker.position.set(62, 0, 0);
        scene.add(sunMarker);

        var jup = new THREE.Mesh(
            new THREE.SphereGeometry(RJ, shell.low ? 22 : 34, shell.low ? 16 : 24),
            new THREE.MeshLambertMaterial({ color: 0xc9a66b })
        );
        scene.add(jup);
        var band = new THREE.Mesh(
            new THREE.SphereGeometry(RJ * 1.01, shell.low ? 20 : 30, shell.low ? 12 : 18),
            new THREE.MeshLambertMaterial({ color: 0x8d6e63, transparent: true, opacity: 0.35 })
        );
        scene.add(band);

        var fieldGroup = new THREE.Group();
        scene.add(fieldGroup);
        var pauseMesh = null;
        var tailGroup = new THREE.Group();
        scene.add(tailGroup);
        var saturnMarker = null;
        var windPts = null;
        var windPos = null;

        function dipolePoint(lat, lon, rRj) {
            var th = (90 - lat) * Math.PI / 180;
            var ph = lon * Math.PI / 180;
            var x = rRj * Math.sin(th) * Math.cos(ph);
            var y = rRj * Math.cos(th);
            var z = rRj * Math.sin(th) * Math.sin(ph);
            var compress = state.pauseRj / 70;
            if (x > 0) x *= (0.5 + 0.5 * compress);
            else x *= (1.2 + (100 - state.pauseRj) * 0.004);
            return new THREE.Vector3(x * RJ, y * RJ, z * RJ);
        }

        function rebuildField() {
            while (fieldGroup.children.length) {
                var ch = fieldGroup.children.pop();
                if (ch.geometry) ch.geometry.dispose();
                if (ch.material) ch.material.dispose();
            }
            var nLines = shell.low ? 10 : 16;
            for (var i = 0; i < nLines; i++) {
                var lon = (i / nLines) * 360;
                var pts = [];
                for (var j = 0; j <= 48; j++) {
                    var lat = -78 + (156 * j / 48);
                    var r = 1.2 + 0.4 * Math.pow(Math.cos(lat * Math.PI / 180), 2);
                    var rLine = r + (Math.abs(lat) / 90) * (state.pauseRj * 0.45);
                    pts.push(dipolePoint(lat, lon, rLine));
                }
                var g = new THREE.BufferGeometry().setFromPoints(pts);
                var col = (i % 2 === 0) ? 0x81d4fa : 0x4fc3f7;
                fieldGroup.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: 0.82 })));
            }
            if (pauseMesh) { scene.remove(pauseMesh); pauseMesh.geometry.dispose(); pauseMesh.material.dispose(); }
            var rx = state.pauseRj * RJ * 0.9;
            var ry = state.pauseRj * RJ * 1.05;
            var rz = state.pauseRj * RJ * 1.05;
            pauseMesh = new THREE.Mesh(
                new THREE.SphereGeometry(1, shell.low ? 18 : 26, shell.low ? 12 : 18),
                new THREE.MeshBasicMaterial({ color: 0xff8a65, wireframe: true, transparent: true, opacity: 0.42 })
            );
            pauseMesh.scale.set(rx, ry, rz);
            pauseMesh.position.x = -RJ * (100 - state.pauseRj) * 0.08;
            scene.add(pauseMesh);
            rebuildTail();
            updateFacts();
        }

        function rebuildTail() {
            while (tailGroup.children.length) {
                var ch = tailGroup.children.pop();
                if (ch.geometry) ch.geometry.dispose();
                if (ch.material) ch.material.dispose();
            }
            if (!state.showTail) return;
            // Night-side magnetotail teaching cone - literacy: can extend past Saturn (~9.5 AU).
            var tailLen = shell.low ? 48 : 70;
            var ringN = shell.low ? 4 : 6;
            for (var r = 0; r < ringN; r++) {
                var x = -state.pauseRj * RJ * 0.6 - (r + 1) * (tailLen / ringN);
                var rad = (state.pauseRj * RJ * 0.55) * (1 + r * 0.22);
                var pts = [];
                var n = shell.low ? 24 : 36;
                for (var i = 0; i <= n; i++) {
                    var a = (i / n) * Math.PI * 2;
                    pts.push(new THREE.Vector3(x, Math.cos(a) * rad * 0.55, Math.sin(a) * rad));
                }
                tailGroup.add(new THREE.Line(
                    new THREE.BufferGeometry().setFromPoints(pts),
                    new THREE.LineBasicMaterial({ color: 0x90caf9, transparent: true, opacity: 0.35 + r * 0.05 })
                ));
            }
            // Axis line toward night side
            tailGroup.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-state.pauseRj * RJ * 0.5, 0, 0),
                    new THREE.Vector3(-tailLen - state.pauseRj * RJ * 0.6, 0, 0)
                ]),
                new THREE.LineBasicMaterial({ color: 0x64b5f6, transparent: true, opacity: 0.55 })
            ));
        }

        function rebuildSaturn() {
            if (saturnMarker) {
                scene.remove(saturnMarker);
                saturnMarker.traverse(function (o) {
                    if (o.geometry) o.geometry.dispose();
                    if (o.material) o.material.dispose();
                });
                saturnMarker = null;
            }
            if (!state.showSaturn) return;
            // Teaching marker: Saturn orbit distance ~9.5 AU from Sun; Jupiter ~5.2 AU.
            // Place Saturn nightward of Jupiter so the magnetotail past Saturn reads on-screen.
            saturnMarker = new THREE.Group();
            var sat = new THREE.Mesh(
                new THREE.SphereGeometry(0.9, 14, 12),
                new THREE.MeshLambertMaterial({ color: 0xffe082 })
            );
            saturnMarker.add(sat);
            var ringGeo = new THREE.RingGeometry(1.2, 2.0, shell.low ? 24 : 40);
            var ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({
                color: 0xffecb3, side: THREE.DoubleSide, transparent: true, opacity: 0.65
            }));
            ring.rotation.x = Math.PI / 2.4;
            saturnMarker.add(ring);
            saturnMarker.position.set(-58, 0, 8);
            scene.add(saturnMarker);
        }

        function rebuildWind() {
            if (windPts) { scene.remove(windPts); windPts.geometry.dispose(); windPts.material.dispose(); windPts = null; }
            if (!state.showWind) return;
            var N = shell.low ? 160 : 380;
            windPos = new Float32Array(N * 3);
            for (var i = 0; i < N; i++) {
                windPos[i * 3] = 28 + Math.random() * 45;
                windPos[i * 3 + 1] = (Math.random() - 0.5) * 36;
                windPos[i * 3 + 2] = (Math.random() - 0.5) * 36;
            }
            var g = new THREE.BufferGeometry();
            g.setAttribute('position', new THREE.BufferAttribute(windPos, 3));
            windPts = new THREE.Points(g, new THREE.PointsMaterial({ color: 0xffecb3, size: 0.5, sizeAttenuation: false }));
            scene.add(windPts);
        }

        function factsHtml() {
            return '<h3>Jupiter magnetosphere (teaching schematic)</h3>'
                + '<p>Jupiter hosts the solar system\'s largest magnetosphere. Equatorial surface field ~<b>420 uT</b>; volume ~<b>20,000x</b> Earth\'s. The night-side magnetotail can extend past Saturn\'s orbit (~<b>9.5 AU</b>).</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Equatorial surface field</td><td>~420 uT</td><td>~4.2 G published literacy</td></tr>'
                + '<tr><td>Volume vs Earth</td><td>~20,000x</td><td>Scale differentiator vs Earth Magnetosphere 3D</td></tr>'
                + '<tr><td>Magnetotail</td><td>past Saturn (~9.5 AU)</td><td>Night-side extent literacy</td></tr>'
                + '<tr><td>Sunward magnetopause</td><td>~45-100 Rj</td><td>Teaching standoff; slider = ' + state.pauseRj + ' Rj</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational dipole + magnetopause + magnetotail schematic - not an MHD model. Distances are compressed for one-screen teaching; Saturn is a scale marker, not a full orbit tour.</p>';
        }
        function updateFacts() {
            t3dInfo(factsHtml());
            t3dStatus('Magnetopause ~' + state.pauseRj + ' Rj - field ~420 uT - volume ~20,000x Earth - tail past Saturn (~9.5 AU).');
        }

        rebuildField();
        rebuildSaturn();
        rebuildWind();

        var pauseEl = document.getElementById('t3dJupMagPause');
        if (pauseEl) pauseEl.addEventListener('input', function () {
            state.pauseRj = Math.min(100, Math.max(45, parseFloat(pauseEl.value || '70')));
            rebuildField();
        });
        [['t3dJupMagQuietBtn', 90], ['t3dJupMagStormBtn', 50]].forEach(function (pair) {
            var btn = document.getElementById(pair[0]);
            if (btn) btn.addEventListener('click', function () {
                state.pauseRj = pair[1];
                if (pauseEl) pauseEl.value = String(pair[1]);
                rebuildField();
            });
        });
        var tailBtn = document.getElementById('t3dJupMagTailBtn');
        if (tailBtn) tailBtn.addEventListener('click', function () {
            state.showTail = !state.showTail;
            tailBtn.textContent = state.showTail ? 'Hide magnetotail' : 'Show magnetotail';
            rebuildTail();
            updateFacts();
        });
        var satBtn = document.getElementById('t3dJupMagSaturnBtn');
        if (satBtn) satBtn.addEventListener('click', function () {
            state.showSaturn = !state.showSaturn;
            satBtn.textContent = state.showSaturn ? 'Hide Saturn marker' : 'Show Saturn marker';
            rebuildSaturn();
            updateFacts();
        });
        var windBtn = document.getElementById('t3dJupMagWindBtn');
        if (windBtn) windBtn.addEventListener('click', function () {
            state.showWind = !state.showWind;
            windBtn.textContent = state.showWind ? 'Hide solar wind' : 'Show solar wind';
            rebuildWind();
        });

        return function animate(dt) {
            state.t += dt;
            jup.rotation.y += dt * 0.00025;
            band.rotation.y = jup.rotation.y;
            if (saturnMarker) saturnMarker.rotation.y += dt * 0.00008;
            if (windPts && windPos) {
                var N = windPos.length / 3;
                var speed = 0.014 * dt;
                for (var i = 0; i < N; i++) {
                    windPos[i * 3] -= speed * (0.7 + (i % 5) * 0.08);
                    if (windPos[i * 3] < state.pauseRj * RJ * 0.85) {
                        windPos[i * 3] = 28 + Math.random() * 45;
                        windPos[i * 3 + 1] = (Math.random() - 0.5) * 36;
                        windPos[i * 3 + 2] = (Math.random() - 0.5) * 36;
                    }
                }
                windPts.geometry.attributes.position.needsUpdate = true;
            }
            shell.applyCamera();
        };
    }

    function t3dKuiperBeltOortCloud(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        var key = new THREE.DirectionalLight(0xfff2d6, 0.9);
        key.position.set(8, 10, 4);
        scene.add(key);

        // Outer-solar-system literacy: Kuiper 30-50 AU; Pluto 39.5 AU; Oort ~2,000-100,000 AU.
        var KUIPER_IN = 30, KUIPER_OUT = 50, PLUTO_AU = 39.5;
        var OORT_IN = 2000, OORT_OUT = 100000;
        var state = { mode: 'kuiper', zoom: 1.0, playing: true, t: 0, showOort: true };

        var root = new THREE.Group();
        scene.add(root);

        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(0.35, shell.low ? 16 : 24, shell.low ? 12 : 18),
            new THREE.MeshBasicMaterial({ color: 0xffe082 })
        );
        root.add(sun);

        // Neptune teaching ring at ~30 AU (Kuiper inner edge)
        function makeOrbitRing(r, color, opacity) {
            var pts = [];
            var n = shell.low ? 64 : 96;
            for (var i = 0; i <= n; i++) {
                var a = (i / n) * Math.PI * 2;
                pts.push(new THREE.Vector3(Math.cos(a) * r, 0, Math.sin(a) * r));
            }
            return new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: opacity })
            );
        }
        var neptuneRing = makeOrbitRing(3.0, 0x64b5f6, 0.55);
        root.add(neptuneRing);
        var kuiperInner = makeOrbitRing(3.0, 0x81c784, 0.35);
        var kuiperOuter = makeOrbitRing(5.0, 0x81c784, 0.35);
        root.add(kuiperInner);
        root.add(kuiperOuter);

        // Kuiper belt particles (30-50 AU teaching disk)
        var kN = shell.low ? 400 : 900;
        var kPos = new Float32Array(kN * 3);
        for (var ki = 0; ki < kN; ki++) {
            var rr = 3.0 + Math.random() * 2.0;
            var ang = Math.random() * Math.PI * 2;
            var y = (Math.random() - 0.5) * 0.18;
            kPos[ki * 3] = Math.cos(ang) * rr;
            kPos[ki * 3 + 1] = y;
            kPos[ki * 3 + 2] = Math.sin(ang) * rr;
        }
        var kGeom = new THREE.BufferGeometry();
        kGeom.setAttribute('position', new THREE.BufferAttribute(kPos, 3));
        var kuiperPts = new THREE.Points(kGeom, new THREE.PointsMaterial({
            color: 0xa5d6a7, size: 0.045, transparent: true, opacity: 0.9
        }));
        root.add(kuiperPts);

        // Pluto marker at 39.5 AU (~3.95 on 0.1 AU/unit teaching map where 30AU=3)
        var plutoR = 3.0 + (PLUTO_AU - KUIPER_IN) / (KUIPER_OUT - KUIPER_IN) * 2.0;
        var pluto = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 12, 10),
            new THREE.MeshLambertMaterial({ color: 0xd7ccc8, emissive: 0x4e342e, emissiveIntensity: 0.2 })
        );
        pluto.position.set(plutoR, 0.05, 0);
        root.add(pluto);
        var plutoLabel = makeOrbitRing(plutoR, 0xffcc80, 0.45);
        root.add(plutoLabel);

        // Oort cloud: sparse spherical shell (log-compressed so outer AU fit)
        var oN = shell.low ? 500 : 1200;
        var oPos = new Float32Array(oN * 3);
        function oortRadiusScreen(au) {
            // log map: 2000 AU -> 6.2, 100000 AU -> 11.5
            var t = (Math.log10(au) - Math.log10(OORT_IN)) / (Math.log10(OORT_OUT) - Math.log10(OORT_IN));
            return 6.2 + t * 5.3;
        }
        for (var oi = 0; oi < oN; oi++) {
            var au = OORT_IN * Math.pow(OORT_OUT / OORT_IN, Math.random());
            var rs = oortRadiusScreen(au);
            var u = Math.random() * Math.PI * 2;
            var v = Math.acos(2 * Math.random() - 1);
            oPos[oi * 3] = rs * Math.sin(v) * Math.cos(u);
            oPos[oi * 3 + 1] = rs * Math.cos(v);
            oPos[oi * 3 + 2] = rs * Math.sin(v) * Math.sin(u);
        }
        var oGeom = new THREE.BufferGeometry();
        oGeom.setAttribute('position', new THREE.BufferAttribute(oPos, 3));
        var oortPts = new THREE.Points(oGeom, new THREE.PointsMaterial({
            color: 0x90caf9, size: 0.035, transparent: true, opacity: 0.55
        }));
        root.add(oortPts);

        var oortInnerShell = new THREE.Mesh(
            new THREE.SphereGeometry(oortRadiusScreen(OORT_IN), shell.low ? 24 : 36, shell.low ? 16 : 24),
            new THREE.MeshBasicMaterial({ color: 0x42a5f5, wireframe: true, transparent: true, opacity: 0.12 })
        );
        root.add(oortInnerShell);

        function applyMode() {
            var kuiperOn = state.mode === 'kuiper' || state.mode === 'both';
            var oortOn = (state.mode === 'oort' || state.mode === 'both') && state.showOort;
            kuiperPts.visible = kuiperOn;
            kuiperInner.visible = kuiperOn;
            kuiperOuter.visible = kuiperOn;
            pluto.visible = kuiperOn;
            plutoLabel.visible = kuiperOn;
            neptuneRing.visible = kuiperOn || state.mode === 'both';
            oortPts.visible = oortOn;
            oortInnerShell.visible = oortOn;
            // camera radius hint via shell cam state if available
            if (shell.cam) {
                if (state.mode === 'kuiper') shell.cam.radius = 9 * state.zoom;
                else if (state.mode === 'oort') shell.cam.radius = 18 * state.zoom;
                else shell.cam.radius = 14 * state.zoom;
            }

        var starPts = [];
        for (var i = 0; i < 220; i++) {
            var th = i * 2.399963 + (i % 11) * 0.07;

            var ph = Math.acos(0.08 + u * 0.88);
            var r = 17.5;
            starPts.push(Math.cos(th) * Math.sin(ph) * r, Math.cos(ph) * r, Math.sin(th) * Math.sin(ph) * r);
        }

        );

        function radiantVector() {
            var cfg = SHOWERS[state.shower].radiant;
            var az = cfg.az * Math.PI / 180;
            var alt = cfg.alt * Math.PI / 180;
            return new THREE.Vector3(
                Math.sin(az) * Math.cos(alt),
                Math.sin(alt),
                -Math.cos(az) * Math.cos(alt)
            ).normalize();
        }

        function rebuildMeteorField() {
            while (meteorGroup.children.length) meteorGroup.remove(meteorGroup.children[0]);
            meteors = [];
            var rv = radiantVector();
            var color = SHOWERS[state.shower].color;
            radiantMarker.position.copy(rv.clone().multiplyScalar(10.5));
            radiantMarker.lookAt(radiantMarker.position.clone().multiplyScalar(2));
            for (var i = 0; i < 22; i++) {
                var spread = 0.15 + (i % 5) * 0.018;
                var basisA = new THREE.Vector3(rv.z, 0, -rv.x).normalize();
                if (basisA.lengthSq() < 0.01) basisA.set(1, 0, 0);
                var basisB = new THREE.Vector3().crossVectors(rv, basisA).normalize();
                var ax = ((i * 37) % 100) / 100 - 0.5;
                var ay = ((i * 73) % 100) / 100 - 0.5;
                var dir = rv.clone()
                    .add(basisA.clone().multiplyScalar(ax * spread))
                    .add(basisB.clone().multiplyScalar(ay * spread))
                    .normalize();
                var start = dir.clone().multiplyScalar(13.2 + (i % 6) * 0.7);
                var end = start.clone().add(dir.clone().multiplyScalar(-3.4 - (i % 4) * 0.45));
                var geom = new THREE.BufferGeometry().setFromPoints([start, end]);
                var line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.82 }));
                meteorGroup.add(line);
                meteors.push({ line: line, dir: dir, baseStart: start, len: start.distanceTo(end), phase: i / 22 });
            }
        }

        function updateMeteors(dt) {
            if (state.playing) state.t += dt * 0.00022 * state.speed;
            for (var i = 0; i < meteors.length; i++) {
                var m = meteors[i];
                var slide = ((state.t + m.phase) % 1);
                var head = m.baseStart.clone().add(m.dir.clone().multiplyScalar(-slide * 8.6));
                var tail = head.clone().add(m.dir.clone().multiplyScalar(-m.len * state.trail));
                m.line.geometry.setFromPoints([head, tail]);
                m.line.geometry.attributes.position.needsUpdate = true;
            }
        }

        function factsHtml() {

            return '<h3>Meteor shower radiant (' + cfg.name + ')</h3>'
                + '<p>Meteors in one shower travel on nearly parallel paths in space, but perspective makes them appear to radiate from a single point on the sky. This page contrasts the <b>' + cfg.name + '</b> radiant with the local horizon.</p>'

                + '<tr><td>Current radiant</td><td>' + cfg.name + '</td><td>Az ' + cfg.radiant.az + ' deg, alt ' + cfg.radiant.alt + ' deg teaching sky</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational perspective-geometry sky scene - not a real-time meteor forecast. Meteors are stylized parallel streaks, not a live shower simulator.</p>';
        }

        function updateFacts() {
            var cfg = SHOWERS[state.shower];
            t3dInfo(factsHtml());
            t3dStatus(cfg.name + ' radiant - peak ' + cfg.peak + ' - parent ' + cfg.parent
                + ' - speed ' + state.speed.toFixed(2)
                + (state.playing ? ' - playing' : ' - paused') + '.');
        }

        rebuildMeteorField();
        updateFacts();

        var typeEl = document.getElementById('t3dMeteorShowerType');
        if (typeEl) typeEl.addEventListener('change', function () {
            state.shower = typeEl.value || 'perseids';
            rebuildMeteorField();
            updateFacts();
        });
        var speedEl = document.getElementById('t3dMeteorSpeed');
        if (speedEl) speedEl.addEventListener('input', function () {
            state.speed = Math.min(2.5, Math.max(0.4, parseFloat(speedEl.value || '1')));
            updateFacts();
        });
        var trailEl = document.getElementById('t3dMeteorTrail');
        if (trailEl) trailEl.addEventListener('input', function () {

            updateFacts();

        var playBtn = document.getElementById('t3dMeteorPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {

            playBtn.textContent = state.playing ? 'Pause streaks' : 'Play streaks';
            updateFacts();
        });

            if (Math.floor(state.t * 1000 / 450) !== Math.floor((state.t * 1000 - dt) / 450)) updateFacts();

    function t3dThreeBodyProblem(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.45));
        var key = new THREE.DirectionalLight(0xfff2d6, 0.95);
        key.position.set(6, 10, 4);
        scene.add(key);

        // Chenciner-Montgomery figure-8 choreography (equal masses, G=1 units).
        // Classic IC published for the planar figure-8 periodic solution (2000).
        var state = { speed: 1.0, playing: true, t: 0, trailLen: shell.low ? 180 : 320, kick: 0 };

        var root = new THREE.Group();
        scene.add(root);

        // Bodies: equal mass teaching case
        var colors = [0xff8a80, 0x80cbc4, 0xffd54f];
        var bodies = [];
        var trails = [];
        var trailMeshes = [];
        for (var bi = 0; bi < 3; bi++) {
            var mesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.28, shell.low ? 14 : 22, shell.low ? 12 : 18),
                new THREE.MeshLambertMaterial({ color: colors[bi], emissive: colors[bi], emissiveIntensity: 0.18 })
            );
            root.add(mesh);
            bodies.push({ mesh: mesh, x: 0, y: 0, z: 0, vx: 0, vy: 0, vz: 0, m: 1 });
            trails.push([]);
            var tGeom = new THREE.BufferGeometry();
            var tPos = new Float32Array(state.trailLen * 3);
            tGeom.setAttribute('position', new THREE.BufferAttribute(tPos, 3));
            var tLine = new THREE.Line(tGeom, new THREE.LineBasicMaterial({
                color: colors[bi], transparent: true, opacity: 0.75
            }));
            root.add(tLine);
            trailMeshes.push({ geom: tGeom, line: tLine, pos: tPos });
        }

        function resetIC() {
            // Figure-8 initial conditions (planar; y-axis = screen vertical)
            var x1 = 0.97000436, y1 = -0.24308753;
            var vx1 = 0.4662036850, vy1 = 0.4323657300;
            bodies[0].x = x1; bodies[0].y = y1; bodies[0].z = 0;
            bodies[1].x = -x1; bodies[1].y = -y1; bodies[1].z = 0;
            bodies[2].x = 0; bodies[2].y = 0; bodies[2].z = 0;
            bodies[0].vx = vx1; bodies[0].vy = vy1; bodies[0].vz = 0;
            bodies[1].vx = vx1; bodies[1].vy = vy1; bodies[1].vz = 0;
            bodies[2].vx = -2 * vx1; bodies[2].vy = -2 * vy1; bodies[2].vz = 0;
            // optional tiny kick to show sensitivity (slider 0..1 maps to small dv)
            if (state.kick > 0) {
                bodies[0].vx += state.kick * 0.02;
                bodies[0].vy += state.kick * 0.01;
            }
            for (var ti = 0; ti < 3; ti++) trails[ti] = [];
            placeBodies();
            updateTrails();
        }

        function accel(parts) {
            var out = [];
            for (var i = 0; i < 3; i++) out.push({ ax: 0, ay: 0, az: 0 });
            for (i = 0; i < 3; i++) {
                for (var j = i + 1; j < 3; j++) {
                    var dx = parts[j].x - parts[i].x;
                    var dy = parts[j].y - parts[i].y;
                    var dz = parts[j].z - parts[i].z;
                    var r2 = dx * dx + dy * dy + dz * dz + 1e-8;
                    var r = Math.sqrt(r2);
                    var f = 1 / (r2 * r); // G=1, m=1
                    out[i].ax += f * dx; out[i].ay += f * dy; out[i].az += f * dz;
                    out[j].ax -= f * dx; out[j].ay -= f * dy; out[j].az -= f * dz;
                }
            }
            return out;
        }

        function snapshot() {
            return bodies.map(function (b) {
                return { x: b.x, y: b.y, z: b.z, vx: b.vx, vy: b.vy, vz: b.vz, m: b.m };
            });
        }

        function rk4Step(h) {
            var p0 = snapshot();
            var a0 = accel(p0);
            var p1 = p0.map(function (b, i) {
                return {
                    x: b.x + 0.5 * h * b.vx, y: b.y + 0.5 * h * b.vy, z: b.z + 0.5 * h * b.vz,
                    vx: b.vx + 0.5 * h * a0[i].ax, vy: b.vy + 0.5 * h * a0[i].ay, vz: b.vz + 0.5 * h * a0[i].az, m: 1
                };
            });
            var a1 = accel(p1);
            var p2 = p0.map(function (b, i) {
                return {
                    x: b.x + 0.5 * h * p1[i].vx, y: b.y + 0.5 * h * p1[i].vy, z: b.z + 0.5 * h * p1[i].vz,
                    vx: b.vx + 0.5 * h * a1[i].ax, vy: b.vy + 0.5 * h * a1[i].ay, vz: b.vz + 0.5 * h * a1[i].az, m: 1
                };
            });
            var a2 = accel(p2);
            var p3 = p0.map(function (b, i) {
                return {
                    x: b.x + h * p2[i].vx, y: b.y + h * p2[i].vy, z: b.z + h * p2[i].vz,
                    vx: b.vx + h * a2[i].ax, vy: b.vy + h * a2[i].ay, vz: b.vz + h * a2[i].az, m: 1
                };
            });
            var a3 = accel(p3);
            for (var i = 0; i < 3; i++) {
                bodies[i].x = p0[i].x + (h / 6) * (p0[i].vx + 2 * p1[i].vx + 2 * p2[i].vx + p3[i].vx);
                bodies[i].y = p0[i].y + (h / 6) * (p0[i].vy + 2 * p1[i].vy + 2 * p2[i].vy + p3[i].vy);
                bodies[i].z = p0[i].z + (h / 6) * (p0[i].vz + 2 * p1[i].vz + 2 * p2[i].vz + p3[i].vz);
                bodies[i].vx = p0[i].vx + (h / 6) * (a0[i].ax + 2 * a1[i].ax + 2 * a2[i].ax + a3[i].ax);
                bodies[i].vy = p0[i].vy + (h / 6) * (a0[i].ay + 2 * a1[i].ay + 2 * a2[i].ay + a3[i].ay);
                bodies[i].vz = p0[i].vz + (h / 6) * (a0[i].az + 2 * a1[i].az + 2 * a2[i].az + a3[i].az);
            }
        }

        function placeBodies() {
            var scale = 3.6;
            for (var i = 0; i < 3; i++) {
                bodies[i].mesh.position.set(bodies[i].x * scale, bodies[i].y * scale, bodies[i].z * scale);
            }
        }

        function updateTrails() {
            for (var i = 0; i < 3; i++) {
                var tr = trails[i];
                tr.push(bodies[i].mesh.position.x, bodies[i].mesh.position.y, bodies[i].mesh.position.z);
                while (tr.length > state.trailLen * 3) {
                    tr.shift(); tr.shift(); tr.shift();
                }
                var pos = trailMeshes[i].pos;
                for (var k = 0; k < pos.length; k++) pos[k] = tr[k] !== undefined ? tr[k] : 0;
                trailMeshes[i].geom.attributes.position.needsUpdate = true;
                trailMeshes[i].geom.setDrawRange(0, Math.floor(tr.length / 3));
            }
        }

        function factsHtml() {
            return '<h3>Three-body problem (figure-8 choreography)</h3>'
                + '<p>Three equal masses can follow a planar <b>figure-8</b> periodic orbit - the famous choreography solution (Moore; Chenciner &amp; Montgomery, 2000). Real SI gravity uses <b>G = 6.674e-11</b> m^3 kg^-1 s^-2; this demo uses G=1 teaching units.</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Newton G (SI)</td><td>6.674e-11</td><td>m^3 kg^-1 s^-2 (literacy constant)</td></tr>'
                + '<tr><td>Figure-8 solution</td><td>2000</td><td>Chenciner &amp; Montgomery choreography</td></tr>'
                + '<tr><td>Masses</td><td>equal (m=1)</td><td>Normalized teaching case</td></tr>'
                + '<tr><td>Integrator</td><td>RK4, G=1</td><td>Browser sandbox - not SPICE</td></tr>'
                + '<tr><td>Kick scrub</td><td>' + state.kick.toFixed(2) + '</td><td>Tiny IC change shows sensitivity</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational three-body sandbox - not a general N-body ephemeris. Distinct from Gravity Well 3D (potential surface) and Gravitational Slingshot 3D (flyby assist).</p>';
        }
        function updateFacts() {
            t3dInfo(factsHtml());
            t3dStatus('Figure-8 three-body choreography - G=6.674e-11 (SI literacy) - speed '
                + state.speed.toFixed(2)
                + (state.playing ? ' - playing' : ' - paused')
                + (state.kick > 0 ? ' - kick ' + state.kick.toFixed(2) : '') + '.');
        }

        resetIC();
        updateFacts();

        var speedEl = document.getElementById('t3dThreeBodySpeed');
        if (speedEl) speedEl.addEventListener('input', function () {
            state.speed = Math.min(3, Math.max(0.2, parseFloat(speedEl.value || '1')));
            updateFacts();
        });
        var kickEl = document.getElementById('t3dThreeBodyKick');
        if (kickEl) kickEl.addEventListener('input', function () {
            state.kick = Math.min(1, Math.max(0, parseFloat(kickEl.value || '0')));
            resetIC();
            updateFacts();
        });
        var playBtn = document.getElementById('t3dThreeBodyPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            state.playing = !state.playing;
            playBtn.textContent = state.playing ? 'Pause' : 'Play';
            updateFacts();
        });
        var resetBtn = document.getElementById('t3dThreeBodyResetBtn');
        if (resetBtn) resetBtn.addEventListener('click', function () {
            resetIC();
            updateFacts();
        });

        return function animate(dt) {
            state.t += dt;
            if (state.playing) {
                var steps = shell.low ? 2 : 4;
                var h = 0.006 * state.speed;
                for (var s = 0; s < steps; s++) rk4Step(h);
                placeBodies();
                updateTrails();
            }
            root.rotation.z = Math.sin(state.t * 0.00003) * 0.02;
            if (Math.floor(state.t / 500) !== Math.floor((state.t - dt) / 500)) updateFacts();
            shell.applyCamera();
        };
    }

    function t3dGravitationalSlingshot(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03060c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        var key = new THREE.DirectionalLight(0xfff2d6, 1.05);
        key.position.set(8, 10, 4);
        scene.add(key);

        // Voyager Jupiter gravity-assist literacy: heliocentric speed gain ~+10 km/s
        // (order-of-magnitude teaching figure; hyperbolic flyby schematic).
        var DV_KMS = 10;
        var state = { peri: 2.8, phase: 0.35, playing: true, t: 0 };

        var root = new THREE.Group();
        scene.add(root);

        // Moving planet (Jupiter teaching stand-in)
        var planet = new THREE.Mesh(
            new THREE.SphereGeometry(1.6, shell.low ? 28 : 40, shell.low ? 20 : 28),

            new THREE.MeshBasicMaterial({ color: 0xb8865a, transparent: true, opacity: 0.55 })
        );
        band.rotation.x = Math.PI / 2;
        root.add(band);

        // Planet velocity direction (prograde)
        var vPlanet = new THREE.Group();
        vPlanet.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(3.2, 0, 0)
            ]),

        root.add(vPlanet);

        // Hyperbolic flyby path (schematic in planet frame, then offset)
        var pathPts = [];
        var n = shell.low ? 80 : 120;
        for (var i = 0; i <= n; i++) {
            var u = (i / n) * 2 - 1; // -1..1 along flyby
            var x = u * 10;
            var z = state.peri * (1 + 0.15 * u * u) * (u < 0 ? 1 : -1) * Math.sign(1);
            // classic teaching hyperbola: approach from +z, bend, leave +x-ish
            var ang = u * 1.15;
            var r = state.peri / (1 + 0.55 * Math.cos(ang + 0.2));
            pathPts.push(new THREE.Vector3(Math.sin(ang) * r * 3.2, 0, Math.cos(ang) * r * 2.4));
        }
        var pathGeom = new THREE.BufferGeometry().setFromPoints(pathPts);
        var pathLine = new THREE.Line(pathGeom, new THREE.LineBasicMaterial({ color: 0x64b5f6, transparent: true, opacity: 0.9 }));
        root.add(pathLine);

        var craft = new THREE.Mesh(
            new THREE.ConeGeometry(0.22, 0.55, 8),
            new THREE.MeshBasicMaterial({ color: 0xfff176 })
        );
        craft.rotation.x = Math.PI / 2;
        root.add(craft);

        // Incoming / outgoing velocity ticks (schematic lengths)
        var vinGroup = new THREE.Group();
        var voutGroup = new THREE.Group();
        root.add(vinGroup);
        root.add(voutGroup);

        function rebuildPath() {
            pathPts = [];
            for (var i = 0; i <= n; i++) {
                var u = (i / n) * 2 - 1;
                var ang = u * 1.2;
                var e = 0.35 + (state.peri - 2.0) * 0.08;
                var r = Math.max(1.9, state.peri / (1 + e * Math.cos(ang)));
                pathPts.push(new THREE.Vector3(Math.sin(ang) * r * 2.8, 0.02 * Math.sin(i), Math.cos(ang) * r * 2.2));
            }
            pathGeom.setFromPoints(pathPts);
            pathGeom.attributes.position.needsUpdate = true;
        }

        function placeCraft() {
            var idx = Math.min(n, Math.max(0, Math.floor(state.phase * n)));
            var p = pathPts[idx];
            craft.position.copy(p);
            var p2 = pathPts[Math.min(n, idx + 1)];
            craft.lookAt(p2);
            // rebuild vin/vout ticks near ends
            while (vinGroup.children.length) vinGroup.remove(vinGroup.children[0]);
            while (voutGroup.children.length) voutGroup.remove(voutGroup.children[0]);
            var a0 = pathPts[2], a1 = pathPts[8];
            var b0 = pathPts[n - 8], b1 = pathPts[n - 2];
            vinGroup.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([a0, a1]),
                new THREE.LineBasicMaterial({ color: 0xef5350 })
            ));
            voutGroup.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([b0, b1]),
                new THREE.LineBasicMaterial({ color: 0xffb74d })
            ));
        }

        function factsHtml() {
            var gain = (DV_KMS * (1.15 - Math.min(0.35, (state.peri - 2.0) * 0.08))).toFixed(1);
            return '<h3>Gravitational slingshot (Voyager / Jupiter teaching case)</h3>'
                + '<p>A spacecraft on a hyperbolic flyby can leave with a higher heliocentric speed when it exits in the planet\'s velocity direction. Voyager\'s Jupiter assist is a classic literacy case at about <b>+10 km/s</b>.</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Teaching delta-v</td><td>~+' + DV_KMS + ' km/s</td><td>Voyager Jupiter assist order of magnitude</td></tr>'
                + '<tr><td>Periapsis scrub</td><td>' + state.peri.toFixed(2) + ' R</td><td>Closer flyby bends the hyperbola more</td></tr>'
                + '<tr><td>Schematic gain</td><td>~+' + gain + ' km/s</td><td>On-screen teaching scale only</td></tr>'
                + '<tr><td>Green arrow</td><td>planet velocity</td><td>Prograde direction of the planet</td></tr>'
                + '<tr><td>Blue path</td><td>hyperbolic flyby</td><td>Not a closed Hohmann ellipse</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational gravity-assist schematic - not an N-body ephemeris. Distinct from Hohmann Transfer 3D (two burns on ellipses) and Escape Velocity 3D (local launch speeds).</p>';
        }
        function updateFacts() {
            t3dInfo(factsHtml());
            t3dStatus('Gravity assist schematic - Voyager Jupiter ~+10 km/s - periapsis '
                + state.peri.toFixed(2) + ' R'
                + (state.playing ? ' - playing' : ' - paused') + '.');
        }

        rebuildPath();
        placeCraft();
        updateFacts();

        var periEl = document.getElementById('t3dSlingPeri');
        if (periEl) periEl.addEventListener('input', function () {
            state.peri = Math.min(5.5, Math.max(2.0, parseFloat(periEl.value || '2.8')));
            rebuildPath();
            placeCraft();
            updateFacts();
        });
        var phaseEl = document.getElementById('t3dSlingPhase');
        if (phaseEl) phaseEl.addEventListener('input', function () {
            state.phase = Math.min(1, Math.max(0, parseFloat(phaseEl.value || '0.35')));
            placeCraft();
            updateFacts();
        });
        var playBtn = document.getElementById('t3dSlingPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            state.playing = !state.playing;
            playBtn.textContent = state.playing ? 'Pause flyby' : 'Play flyby';
        });

        return function animate(dt) {
            state.t += dt;
            if (state.playing) {
                state.phase += dt * 0.00012;
                if (state.phase > 1) state.phase = 0;
                if (phaseEl) phaseEl.value = String(state.phase.toFixed(3));
            }
            // subtle planet drift to sell "moving planet" frame
            root.rotation.y = Math.sin(state.t * 0.00005) * 0.04;
            placeCraft();
            if (Math.floor(state.t / 400) !== Math.floor((state.t - dt) / 400)) updateFacts();
            shell.applyCamera();
        };
    }

    function t3dSolarAnalemma(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x0a1220, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.45));
        var key = new THREE.DirectionalLight(0xfff4d6, 1.05);

        var OBLIQ = 23.44;
        var state = { day: 172, playing: true, showEot: true };

        var root = new THREE.Group();
        scene.add(root);

        // Sky dome grid (schematic celestial sphere slice)
        var dome = new THREE.Mesh(
            new THREE.SphereGeometry(14, shell.low ? 24 : 36, shell.low ? 16 : 24),
            new THREE.MeshBasicMaterial({ color: 0x152238, transparent: true, opacity: 0.35, side: THREE.BackSide })
        );
        root.add(dome);

        // Meridian + horizon markers
        var meridian = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, -8, 0), new THREE.Vector3(0, 8, 0)
            ]),
            new THREE.LineBasicMaterial({ color: 0x607d8b })
        );
        root.add(meridian);
        var horizon = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints((function () {
                var pts = [];
                for (var i = 0; i <= 64; i++) {
                    var a = (i / 64) * Math.PI * 2;
                    pts.push(new THREE.Vector3(Math.cos(a) * 8, 0, Math.sin(a) * 8));
                }
                return pts;
            })()),
            new THREE.LineBasicMaterial({ color: 0x455a64 })
        );
        root.add(horizon);

        // Analemma path (figure-8) from teaching approx: declination + equation of time
        function dayToPos(dayOfYear) {
            var n = dayOfYear; // 0..365
            var B = (2 * Math.PI / 365) * (n - 81);
            // Equation of time minutes (Spencer / common teaching approx)
            var eotMin = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
            // Solar declination degrees
            var dec = OBLIQ * Math.sin((2 * Math.PI / 365) * (n - 81));
            // Map to local sky panel: x = EoT (east-west), y = declination (altitude-like)
            var x = (eotMin / 16) * 3.2; // ~+/-16 min scale
            var y = (dec / OBLIQ) * 5.5;
            return { x: x, y: y, eotMin: eotMin, dec: dec };
        }

        var pathPts = [];
        var N = shell.low ? 90 : 180;
        for (var i = 0; i <= N; i++) {
            var d = (i / N) * 365;
            var p = dayToPos(d);
            pathPts.push(new THREE.Vector3(p.x, p.y, 0));
        }
        var analemmaLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(pathPts),
            new THREE.LineBasicMaterial({ color: 0xffb300 })
        );
        root.add(analemmaLine);

        // Month ticks (approx day-of-year mid-month)
        var monthDays = [15, 46, 74, 105, 135, 166, 196, 227, 258, 288, 319, 349];
        monthDays.forEach(function (md) {
            var p = dayToPos(md);
            var tick = new THREE.Mesh(
                new THREE.SphereGeometry(0.12, 8, 6),
                new THREE.MeshBasicMaterial({ color: 0xffe082 })
            );
            tick.position.set(p.x, p.y, 0.05);
            root.add(tick);
        });

        var sunMarker = new THREE.Mesh(
            new THREE.SphereGeometry(0.42, 16, 12),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        root.add(sunMarker);

        var eotBar = new THREE.Mesh(
            new THREE.BoxGeometry(0.08, 0.08, 0.08),
            new THREE.MeshBasicMaterial({ color: 0x4fc3f7 })
        );
        root.add(eotBar);

        function place() {
            var p = dayToPos(state.day);
            sunMarker.position.set(p.x, p.y, 0.15);
            eotBar.visible = state.showEot;
            if (state.showEot) {
                eotBar.scale.set(1, 1, 1);
                eotBar.position.set(p.x * 0.5, -6.2, 0);
                eotBar.scale.x = Math.max(0.3, Math.abs(p.eotMin) / 4);
                eotBar.position.x = (p.eotMin >= 0 ? 1 : -1) * (eotBar.scale.x * 0.04);
            }
            return p;
        }

        function factsHtml() {
            var p = dayToPos(state.day);
            return '<h3>Solar analemma (teaching schematic)</h3>'
                + '<p>Photograph the Sun at the same clock time for a year and the spots form a figure-8. The shape mixes <b>declination</b> (Earth obliquity ~<b>23.44 deg</b>) with the <b>equation of time</b> (orbit eccentricity + obliquity).</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Obliquity</td><td>23.44 deg</td><td>IAU / Earth orientation - drives north-south swing</td></tr>'
                + '<tr><td>Equation of time range</td><td>about +/-16 min</td><td>Teaching approx (Spencer-style formula)</td></tr>'
                + '<tr><td>Day of year</td><td>' + Math.round(state.day) + '</td><td>Slider 0-365 (non-leap teaching year)</td></tr>'
                + '<tr><td>Declination now</td><td>' + p.dec.toFixed(1) + ' deg</td><td>Approx from obliquity sine model</td></tr>'
                + '<tr><td>Equation of time now</td><td>' + p.eotMin.toFixed(1) + ' min</td><td>Positive = sundial ahead of mean time</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational analemma schematic - not an ephemeris. The figure-8 uses a common teaching approximation for EoT and declination; sizes are exaggerated for one-screen clarity.</p>';
        }
        function updateFacts() {
            place();
            t3dInfo(factsHtml());
            var p = dayToPos(state.day);
            t3dStatus('Analemma day ' + Math.round(state.day)
                + ' - dec ' + p.dec.toFixed(1) + ' deg - EoT ' + p.eotMin.toFixed(1)
                + ' min - obliquity 23.44 deg.');
        }

        place();
        updateFacts();

        var dayEl = document.getElementById('t3dAnalemmaDay');
        if (dayEl) dayEl.addEventListener('input', function () {
            state.day = Math.min(365, Math.max(0, parseFloat(dayEl.value || '172')));
            updateFacts();
        });
        var playBtn = document.getElementById('t3dAnalemmaPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            state.playing = !state.playing;
            playBtn.textContent = state.playing ? 'Pause year' : 'Play year';
        });
        var eotBtn = document.getElementById('t3dAnalemmaEotBtn');
        if (eotBtn) eotBtn.addEventListener('click', function () {
            state.showEot = !state.showEot;
            eotBtn.textContent = state.showEot ? 'Hide EoT bar' : 'Show EoT bar';
            updateFacts();
        });

        return function animate(dt) {
            if (state.playing) {
                state.day += dt * 0.012;
                if (state.day > 365) state.day -= 365;
                if (dayEl) dayEl.value = String(state.day.toFixed(0));
            }
            place();
            if (Math.floor(state.day) !== Math.floor(state.day - dt * 0.012)) updateFacts();
            shell.applyCamera();
        };
    }

    function t3dRocheLimit(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x05070e, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        var key = new THREE.DirectionalLight(0xfff0d8, 1.1);
        key.position.set(12, 8, 10);
        scene.add(key);

        var RP = 3.2; // primary radius (schematic units)
        var FLUID = 2.44;
        var RIGID = 1.26;
        var state = { dist: 3.6, mode: 'fluid', playing: false, t: 0 };

        var root = new THREE.Group();
        scene.add(root);

        var primary = new THREE.Mesh(
            new THREE.SphereGeometry(RP, shell.low ? 28 : 40, shell.low ? 20 : 28),
            new THREE.MeshLambertMaterial({ color: 0x5b8def, emissive: 0x102038, emissiveIntensity: 0.2 })
        );
        root.add(primary);

        var rocheRing = new THREE.Mesh(
            new THREE.RingGeometry(RP * FLUID - 0.08, RP * FLUID + 0.08, shell.low ? 48 : 72),
            new THREE.MeshBasicMaterial({ color: 0xff7043, transparent: true, opacity: 0.85, side: THREE.DoubleSide })
        );
        rocheRing.rotation.x = -Math.PI / 2;
        root.add(rocheRing);

        var rigidRing = new THREE.Mesh(
            new THREE.RingGeometry(RP * RIGID - 0.06, RP * RIGID + 0.06, shell.low ? 40 : 64),
            new THREE.MeshBasicMaterial({ color: 0x81c784, transparent: true, opacity: 0.55, side: THREE.DoubleSide })
        );
        rigidRing.rotation.x = -Math.PI / 2;
        root.add(rigidRing);

        var moonGroup = new THREE.Group();
        root.add(moonGroup);
        var moonBody = new THREE.Mesh(
            new THREE.SphereGeometry(0.85, shell.low ? 16 : 24, shell.low ? 12 : 18),
            new THREE.MeshLambertMaterial({ color: 0xcfd8dc, emissive: 0x222428, emissiveIntensity: 0.12 })
        );
        moonGroup.add(moonBody);

        var shards = [];
        for (var i = 0; i < (shell.low ? 10 : 16); i++) {
            var sh = new THREE.Mesh(
                new THREE.BoxGeometry(0.18, 0.12, 0.15),
                new THREE.MeshLambertMaterial({ color: 0xb0bec5 })
            );
            sh.visible = false;
            moonGroup.add(sh);
            shards.push({ mesh: sh, ang: (i / 16) * Math.PI * 2, r: 0.4 + (i % 5) * 0.12 });
        }

        function limitR() {
            return RP * (state.mode === 'fluid' ? FLUID : RIGID);
        }

        function placeMoon() {
            var d = state.dist * RP;
            moonGroup.position.set(d, 0, 0);
            var inside = state.dist < (state.mode === 'fluid' ? FLUID : RIGID);
            moonBody.visible = !inside;
            shards.forEach(function (s, idx) {
                s.mesh.visible = inside;
                if (inside) {
                    var wobble = 0.15 * Math.sin(state.t * 0.004 + idx);
                    s.mesh.position.set(
                        Math.cos(s.ang + state.t * 0.001) * (s.r + wobble),
                        Math.sin(state.t * 0.003 + idx) * 0.25,
                        Math.sin(s.ang + state.t * 0.001) * (s.r + wobble)
                    );
                    s.mesh.rotation.y = state.t * 0.002 + idx;
                }
            });
            rocheRing.material.opacity = state.mode === 'fluid' ? 0.9 : 0.35;
            rigidRing.material.opacity = state.mode === 'rigid' ? 0.9 : 0.35;
        }

        function factsHtml() {
            var lim = state.mode === 'fluid' ? FLUID : RIGID;
            var inside = state.dist < lim;
            return '<h3>Roche limit (teaching schematic)</h3>'
                + '<p>A satellite closer than the Roche limit is torn by tidal forces. Fluid bodies: ~<b>2.44 R</b>; rigid bodies: ~<b>1.26 R</b> (equal-density rule of thumb). Slider distance is in primary radii.</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Fluid Roche limit</td><td>~2.44 R</td><td>Equal-density fluid satellite (classic Roche factor)</td></tr>'
                + '<tr><td>Rigid Roche limit</td><td>~1.26 R</td><td>Equal-density rigid-body approximation</td></tr>'
                + '<tr><td>Mode</td><td>' + state.mode + '</td><td>Orange ring = fluid 2.44 R; green ring = rigid 1.26 R</td></tr>'
                + '<tr><td>Orbital distance</td><td>' + state.dist.toFixed(2) + ' R</td><td>' + (inside ? 'INSIDE limit - shards shown' : 'OUTSIDE limit - intact moon') + '</td></tr>'
                + '<tr><td>Active limit</td><td>' + lim.toFixed(2) + ' R</td><td>Compared against the distance slider</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational Roche-limit schematic - not an N-body hydrodynamics solver. Densities are equal for the classic 2.44 / 1.26 factors; sizes are exaggerated for teaching.</p>';
        }
        function updateFacts() {
            t3dInfo(factsHtml());
            var lim = state.mode === 'fluid' ? FLUID : RIGID;
            t3dStatus('Roche ' + state.mode + ' ~' + lim.toFixed(2) + ' R - distance '
                + state.dist.toFixed(2) + ' R'
                + (state.dist < lim ? ' - INSIDE (disrupt)' : ' - outside (intact)') + '.');
        }

        placeMoon();
        updateFacts();

        var distEl = document.getElementById('t3dRocheDist');
        if (distEl) distEl.addEventListener('input', function () {
            state.dist = Math.min(5.5, Math.max(1.05, parseFloat(distEl.value || '3.6')));
            placeMoon();
            updateFacts();
        });
        var modeBtn = document.getElementById('t3dRocheModeBtn');
        if (modeBtn) modeBtn.addEventListener('click', function () {
            state.mode = state.mode === 'fluid' ? 'rigid' : 'fluid';
            modeBtn.textContent = state.mode === 'fluid' ? 'Mode: fluid 2.44 R' : 'Mode: rigid 1.26 R';
            placeMoon();
            updateFacts();
        });
        var playBtn = document.getElementById('t3dRochePlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            state.playing = !state.playing;
            playBtn.textContent = state.playing ? 'Pause approach' : 'Play approach';
        });

        return function animate(dt) {
            state.t += dt;
            if (state.playing) {
                state.dist -= dt * 0.00022;
                if (state.dist < 1.1) state.dist = 5.2;
                if (distEl) distEl.value = String(state.dist.toFixed(2));
            }
            placeMoon();
            if (Math.floor(state.t / 400) !== Math.floor((state.t - dt) / 400)) updateFacts();
            shell.applyCamera();
        };
    }

        var TILT_E = 23.44;
        var PERIOD_YR = 84;
        var RU = 3.6;

        for (var i = 0; i <= 96; i++) {

            new THREE.BufferGeometry().setFromPoints(orbitPts),

        );

        var plane = new THREE.Mesh(

        );

        );
        ring.rotation.x = Math.PI / 2;
        uranusGroup.add(ring);

        var axisLen = RU * 2.6;
        var axisGeom = new THREE.BufferGeometry().setFromPoints([

        var axisLine = new THREE.Line(axisGeom, new THREE.LineBasicMaterial({ color: 0xff7043 }));

        var earthGhost = new THREE.Group();

        root.add(earthGhost);
        var earthBody = new THREE.Mesh(
            new THREE.SphereGeometry(RU * 0.55, 20, 16),
            new THREE.MeshLambertMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.55 })
        );
        earthGhost.add(earthBody);
        var eAxis = new THREE.Line(

            uranusGroup.position.set(Math.cos(ang) * 11.5, 0, Math.sin(ang) * 11.5);
            // Spin axis nearly in the orbital plane (~97.8 deg from orbital normal).
            uranusGroup.rotation.set(0, 0, 0);
            uranusGroup.rotateZ(THREE.MathUtils.degToRad(TILT_U - 90));
            uranusGroup.rotateY(ang);
            uranusGroup.rotateY(state.spin);

        function factsHtml() {

                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'

                + '</tbody></table></div>'

        }
        function updateFacts() {
            t3dInfo(factsHtml());
            t3dStatus('Uranus tilt ~97.8 deg - orbit ~84 yr - year ' + state.year.toFixed(1)
                + (state.compareEarth ? ' - Earth compare 23.44 deg' : '') + '.');
        }

        placeUranus();
        updateFacts();

        var yearEl = document.getElementById('t3dUranusYear');
        if (yearEl) yearEl.addEventListener('input', function () {
            state.year = Math.min(PERIOD_YR, Math.max(0, parseFloat(yearEl.value || '0')));
