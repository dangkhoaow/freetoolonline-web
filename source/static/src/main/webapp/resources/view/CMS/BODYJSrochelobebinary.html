    function t3dRocheLobeBinary(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03040d, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.95));

        var state = { playing: true, fill: 0.98, xfer: true, t: 0 };
        var A = 12, M1 = 1.7, M2 = 1.0; // donor (star1, left) heavier; companion (star2, right)
        var x1 = -A * M2 / (M1 + M2), x2 = A * M1 / (M1 + M2), w2 = (M1 + M2) / (A * A * A);
        function Phi(x, y) {
            var r1 = Math.sqrt((x - x1) * (x - x1) + y * y) + 1e-6;
            var r2 = Math.sqrt((x - x2) * (x - x2) + y * y) + 1e-6;
            return -M1 / r1 - M2 / r2 - 0.5 * w2 * (x * x + y * y);
        }
        // L1 = potential maximum along the axis between the stars
        var xL1 = x1, phiL1 = -1e9;
        for (var xx = x1 + 0.02 * A; xx < x2 - 0.02 * A; xx += A / 600) { var p = Phi(xx, 0); if (p > phiL1) { phiL1 = p; xL1 = xx; } }

        var sysGroup = new THREE.Group(); scene.add(sysGroup);

        // background stars
        var bgGeo = new THREE.BufferGeometry(), bn = 200, bp = new Float32Array(bn * 3);
        for (var i = 0; i < bn; i++) { bp[i * 3] = (Math.random() - 0.5) * 60; bp[i * 3 + 1] = (Math.random() - 0.5) * 20; bp[i * 3 + 2] = (Math.random() - 0.5) * 60; }
        bgGeo.setAttribute('position', new THREE.BufferAttribute(bp, 3));
        scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0x5a6488, size: 0.22, transparent: true, opacity: 0.5 })));

        // ray-march the Roche lobe contour around a star center
        function lobe(cx) {
            var pts = [];
            for (var a = 0; a <= 120; a++) {
                var th = a / 120 * Math.PI * 2, cs = Math.cos(th), sn = Math.sin(th), hit = A * 0.75;
                for (var r = A / 400; r < A * 0.9; r += A / 400) { if (Phi(cx + r * cs, r * sn) >= phiL1) { hit = r; break; } }
                pts.push(new THREE.Vector3(cx + hit * cs, 0, hit * sn));
            }
            return pts;
        }
        var lobe1Pts = lobe(x1), lobe2Pts = lobe(x2);
        sysGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(lobe1Pts), new THREE.LineBasicMaterial({ color: 0xffb060 })));
        sysGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(lobe2Pts), new THREE.LineBasicMaterial({ color: 0x8fb6ff })));

        // mean lobe radius (for the fill scale)
        function meanR(pts, cx) { var s = 0; for (var i = 0; i < pts.length; i++) s += Math.sqrt((pts[i].x - cx) * (pts[i].x - cx) + pts[i].z * pts[i].z); return s / pts.length; }
        var rL1 = meanR(lobe1Pts, x1);

        // stars
        var donor = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 24), new THREE.MeshBasicMaterial({ color: 0xffce7a }));
        donor.position.set(x1, 0, 0); sysGroup.add(donor);
        var comp = new THREE.Mesh(new THREE.SphereGeometry(0.9, 28, 20), new THREE.MeshBasicMaterial({ color: 0xbcd4ff }));
        comp.position.set(x2, 0, 0); sysGroup.add(comp);
        // L1 marker
        var l1m = new THREE.Mesh(new THREE.SphereGeometry(0.28, 12, 10), new THREE.MeshBasicMaterial({ color: 0xffffff }));
        l1m.position.set(xL1, 0, 0); sysGroup.add(l1m);

        // accretion disk around the companion + a mass stream (donor -> L1 -> disk)
        var disk = new THREE.Mesh(new THREE.RingGeometry(1.1, 3.0, 40), new THREE.MeshBasicMaterial({ color: 0x6a9be0, side: THREE.DoubleSide, transparent: true, opacity: 0.35 }));
        disk.rotation.x = -Math.PI / 2; disk.position.set(x2, 0, 0); sysGroup.add(disk);
        var streamGeo = new THREE.BufferGeometry(); var SN = 60; streamGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(SN * 3), 3));
        var stream = new THREE.Points(streamGeo, new THREE.PointsMaterial({ color: 0xffd9a0, size: 0.5 }));
        sysGroup.add(stream);

        function applyFill() { var r = 0.35 + state.fill * (rL1 - 0.35); donor.scale.setScalar(r); }

        function refreshStream() {
            var filled = state.fill > 0.96 && state.xfer;
            stream.visible = filled; disk.visible = state.xfer;
            var sp = streamGeo.attributes.position;
            for (var i = 0; i < SN; i++) {
                var u = i / (SN - 1);
                // L1 -> curved fall toward the companion, then wrap into the disk
                var bx = xL1 + (x2 - xL1) * u;
                var curve = Math.sin(u * Math.PI) * 2.2 * (1 - u); // Coriolis-style bow, tightening near the star
                var wrap = u > 0.72 ? (u - 0.72) / 0.28 : 0;
                var rr = 2.4 - wrap * 1.3, ang = wrap * Math.PI * 1.6;
                var px = u > 0.72 ? x2 + rr * Math.cos(ang) : bx;
                var pz = u > 0.72 ? rr * Math.sin(ang) : -curve;
                sp.setXYZ(i, px, 0, pz);
            }
            sp.needsUpdate = true;
        }

        function facts() {
            var cfg = state.fill > 0.99 ? 'semi-detached - the donor overflows through L1' : (state.fill > 0.8 ? 'nearly filling its lobe' : 'detached - both stars sit inside their lobes');
            var html = '<h3>Two stars, two teardrop lobes, one bridge</h3>'
                + '<p>Each star in a close binary owns a <b>Roche lobe</b> - the teardrop region where its gravity wins. The two lobes meet at the <b>L1</b> point (white dot). Swell the orange <b>donor</b> star until it fills its lobe and gas spills through L1 onto the blue <b>companion</b>, forming an accretion disk. Right now: ' + cfg + '.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>Roche lobe</td><td>where a star gravity holds onto its gas</td></tr>'
                + '<tr><td>L1 point</td><td>the bridge where the two lobes meet</td></tr>'
                + '<tr><td>Overflow</td><td>a lobe-filling star feeds its companion</td></tr>'
                + '<tr><td>Lobe size</td><td>Eggleton 1983: R_L/a = 0.49 q^2/3 / (0.6 q^2/3 + ln(1 + q^1/3))</td></tr>'
                + '</table>'
                + '<p class="t3d-note">The lobes are the real Roche equipotential through L1 (mass ratio ' + (M1 / M2).toFixed(1) + ') computed in the co-rotating frame; the stream and disk are schematic. This drives cataclysmic variables and the Algol paradox. Not to scale.</p>';
            t3dInfo(html);
        }

        function wire() {
            var pBtn = document.getElementById('t3dRlPlayBtn');
            var xBtn = document.getElementById('t3dRlXferBtn');
            var sl = document.getElementById('t3dRlFill');
            if (pBtn) pBtn.onclick = function () { state.playing = !state.playing; pBtn.textContent = state.playing ? 'Pause' : 'Play'; };
            if (xBtn) xBtn.onclick = function () { state.xfer = !state.xfer; refreshStream(); };
            if (sl) sl.oninput = function () { state.fill = parseFloat(sl.value) / 100; applyFill(); refreshStream(); facts(); };
        }
        applyFill(); refreshStream(); wire(); facts();
        t3dStatus('Two Roche lobes meet at L1 (white). Fill the donor to spill gas onto the companion. Drag to orbit.');

        return function animate(dt) {
            dt = dt / 1000; // shell driver emits milliseconds; scene runs in seconds
            if (state.playing) { state.t += dt; sysGroup.rotation.y += dt * 0.25; disk.rotation.z += dt * 1.2; }
            shell.applyCamera();
        };
    }

    function t3dEarthshine(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x01020a, 1);
        var amb = new THREE.AmbientLight(0xffffff, 0.04); scene.add(amb);

        var state = { playing: true, glow: true, alphaDeg: 152 };

        // background stars
        var bgGeo = new THREE.BufferGeometry(), bn = 220, bp = new Float32Array(bn * 3);
        for (var i = 0; i < bn; i++) { bp[i * 3] = (Math.random() - 0.5) * 60; bp[i * 3 + 1] = (Math.random() - 0.5) * 40; bp[i * 3 + 2] = (Math.random() - 0.5) * 40 - 12; }
        bgGeo.setAttribute('position', new THREE.BufferAttribute(bp, 3));
        scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0x8893b8, size: 0.24, transparent: true, opacity: 0.7 })));

        var mariaData = [[1.4, 1.2, 4.6], [-1.8, 0.6, 4.5], [0.4, -2.0, 4.4], [-1.0, -1.4, 4.6]];
        for (var mi = 0; mi < mariaData.length; mi++) {
            var md = mariaData[mi], mp = new THREE.Mesh(new THREE.CircleGeometry(0.9 + mi * 0.12, 20), new THREE.MeshLambertMaterial({ color: 0x5f6360 }));
            mp.position.set(md[0], md[1], md[2]); mp.lookAt(md[0] * 2, md[1] * 2, md[2] * 2); moon.add(mp);
        }

        // Sun light (strong, sets the bright crescent) + Earth light (weak, the earthshine)
        var sun = new THREE.DirectionalLight(0xfff4e0, 1.5); scene.add(sun);
        var earth = new THREE.DirectionalLight(0xbcd4ff, 0.22); earth.position.set(0, 0, 10); scene.add(earth);

        // little Earth marker (where earthshine comes from) + a Sun marker
        var earthBall = new THREE.Mesh(new THREE.SphereGeometry(1.1, 24, 18), new THREE.MeshBasicMaterial({ color: 0x4d8fe0 }));
        earthBall.position.set(7.5, -4.5, 9); scene.add(earthBall);
        var earthGlow = new THREE.Mesh(new THREE.SphereGeometry(1.5, 16, 12), new THREE.MeshBasicMaterial({ color: 0x9fc0ff, transparent: true, opacity: 0.25 }));

        function facts() {

            var html = '<h3>The old Moon in the new Moon arms</h3>'
                + '<p>Only a thin <b>crescent</b> of this Moon is in direct sunlight, yet the whole disk is faintly visible. That ashen glow on the night side is <b>earthshine</b>: sunlight bounces off <b>Earth</b> (mostly its clouds) and dimly lights the lunar night. Leonardo da Vinci worked this out around <b>1510</b>.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>Sunlit crescent</td><td>about ' + sunlit + '% of the near side (drag the slider)</td></tr>'
                + '<tr><td>Clearest</td><td>a thin crescent, near new moon, at dusk or dawn</td></tr>'
                + '<tr><td>Earth from the Moon</td><td>~50x brighter than our full Moon; albedo ~0.30</td></tr>'

            if (gBtn) gBtn.onclick = function () { state.glow = !state.glow; setPhase(); facts(); };
            if (sl) sl.oninput = function () { state.playing = false; if (pBtn) pBtn.textContent = 'Play'; state.alphaDeg = parseFloat(sl.value); setPhase(); facts(); };
        }

    function t3dCoriolisEffect(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03040b, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.95));

        var state = { playing: true, hemi: 1, tau: 0, R0: 11, speed: 5.6, omega: 0.5, flight: 0 };
        state.flight = state.R0 * 1.7 / state.speed;

        // the ground disk (polar view) - latitude circles + meridian spokes + pole marker
        var disk = new THREE.Mesh(new THREE.CircleGeometry(state.R0 + 1.2, 60), new THREE.MeshBasicMaterial({ color: 0x0d1a2e }));
        disk.rotation.x = -Math.PI / 2; disk.position.y = -0.05; scene.add(disk);
        function ring(r) { var p = []; for (var a = 0; a <= 90; a++) { var t = a / 90 * Math.PI * 2; p.push(new THREE.Vector3(r * Math.cos(t), 0, r * Math.sin(t))); } return new THREE.Line(new THREE.BufferGeometry().setFromPoints(p), new THREE.LineBasicMaterial({ color: 0x36506e })); }
        for (var rr = 3; rr <= state.R0; rr += 3.6) scene.add(ring(rr));
        for (var s = 0; s < 8; s++) { var ang = s / 8 * Math.PI * 2, sp = [new THREE.Vector3(0, 0, 0), new THREE.Vector3((state.R0 + 1) * Math.cos(ang), 0, (state.R0 + 1) * Math.sin(ang))]; scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(sp), new THREE.LineBasicMaterial({ color: 0x24384f }))); }
        var pole = new THREE.Mesh(new THREE.SphereGeometry(0.55, 16, 12), new THREE.MeshBasicMaterial({ color: 0xffd23f })); scene.add(pole);
        // a curved arrow hint that the ground is spinning
        var spinHint = new THREE.Mesh(new THREE.RingGeometry(state.R0 + 1.6, state.R0 + 1.9, 40, 1, 0, Math.PI * 1.5), new THREE.MeshBasicMaterial({ color: 0x3a6a5a, side: THREE.DoubleSide, transparent: true, opacity: 0.6 }));
        spinHint.rotation.x = -Math.PI / 2; scene.add(spinHint);

        // straight "no-spin" reference line + the deflected ground track + the parcel
        var refLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, state.R0), new THREE.Vector3(0, 0, state.R0 - state.speed * state.flight)]), new THREE.LineBasicMaterial({ color: 0x4a5a72, transparent: true, opacity: 0.7 }));
        scene.add(refLine);
        var trailGeo = new THREE.BufferGeometry(); trailGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(400 * 3), 3));
        var trail = new THREE.Line(trailGeo, new THREE.LineBasicMaterial({ color: 0xff7a4d })); scene.add(trail);
        var parcel = new THREE.Mesh(new THREE.SphereGeometry(0.5, 14, 10), new THREE.MeshBasicMaterial({ color: 0xffa24d })); scene.add(parcel);
        var trailPts = [];

        function pos(tau) {
            var w = state.omega * state.hemi, z0 = state.R0 - state.speed * tau;
            return { x: -z0 * Math.sin(w * tau), z: z0 * Math.cos(w * tau) };
        }

        function facts() {
            var hemiName = state.hemi > 0 ? 'Northern' : 'Southern';
            var dirName = state.hemi > 0 ? 'RIGHT' : 'LEFT';
            var html = '<h3>Why moving things curve on a spinning planet</h3>'
                + '<p>Launch something across a rotating planet and, from the ground, its path bends - to the <b>' + dirName + '</b> in the <b>' + hemiName + ' Hemisphere</b>. The object is really going straight; the <b>ground turns underneath it</b>. That apparent bend is the <b>Coriolis effect</b>.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>Deflection</td><td>right in the North, left in the South</td></tr>'
                + '<tr><td>Strength</td><td>f = 2 x Omega x sin(latitude)</td></tr>'
                + '<tr><td>Earth spin</td><td>Omega = 7.29e-5 rad/s; max at poles, zero at the equator</td></tr>'
                + '<tr><td>Drives</td><td>cyclone spin, trade winds, ocean gyres</td></tr>'
                + '</table>'
                + '<p class="t3d-note">The grey line is the straight path with no spin; the orange track is what the ground sees. The spin rate is hugely exaggerated so the bend shows in seconds. Myth check: the Coriolis effect is far too weak to set which way a sink or toilet drains. Not to scale.</p>';
            t3dInfo(html);
        }

        function wire() {
            var pBtn = document.getElementById('t3dCoPlayBtn');
            var hBtn = document.getElementById('t3dCoHemiBtn');
            var rBtn = document.getElementById('t3dCoReplayBtn');
            if (pBtn) pBtn.onclick = function () { state.playing = !state.playing; pBtn.textContent = state.playing ? 'Pause' : 'Play'; };
            if (hBtn) hBtn.onclick = function () { state.hemi = -state.hemi; state.tau = 0; trailPts = []; hBtn.textContent = state.hemi > 0 ? 'Northern' : 'Southern'; facts(); };
            if (rBtn) rBtn.onclick = function () { state.tau = 0; trailPts = []; };
        }
        wire(); facts();
        t3dStatus('The orange path bends off the grey straight line - right in the North, left in the South. Toggle the hemisphere, drag to orbit.');

        return function animate(dt) {
            dt = dt / 1000; // shell driver emits milliseconds; scene runs in seconds
            if (state.playing) {
                state.tau += dt;
                if (state.tau > state.flight) { state.tau = 0; trailPts = []; }
                var p = pos(state.tau);
                parcel.position.set(p.x, 0.1, p.z);

    function t3dEquationOfTime(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x061024, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.95));

        var state = { playing: true, showMonths: true, t: 0 };
        var XS = 0.92, YS = 0.42, Y0 = 2.5;

        var ground = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), new THREE.MeshBasicMaterial({ color: 0x14261a, side: THREE.DoubleSide }));
        ground.rotation.x = -Math.PI / 2; ground.position.y = -12; scene.add(ground);

        function sample(d) {
            var B = 2 * Math.PI * (d - 81) / 365;
            var eot = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
            var decl = 23.44 * Math.sin(2 * Math.PI * (d - 80) / 365);
            return { x: eot * XS, y: decl * YS + Y0, eot: eot, decl: decl };
        }

        // reference axes: mean-sun vertical (EoT=0) + declination-0 horizontal
        var vax = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, -11, 0), new THREE.Vector3(0, 13.5, 0)]), new THREE.LineBasicMaterial({ color: 0x3a4a6a }));
        var hax = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-16, Y0, 0), new THREE.Vector3(16, Y0, 0)]), new THREE.LineBasicMaterial({ color: 0x3a4a6a }));
        scene.add(vax); scene.add(hax);

        // analemma figure-8
        var anaPts = [];
        for (var d = 0; d <= 365; d += 2) { var p = sample(d); anaPts.push(new THREE.Vector3(p.x, p.y, 0)); }
        var ana = new THREE.Line(new THREE.BufferGeometry().setFromPoints(anaPts), new THREE.LineBasicMaterial({ color: 0xffcaa0, transparent: true, opacity: 0.85 }));
        scene.add(ana);

        // month markers
        var months = [];
        for (var m = 0; m < 12; m++) {
            var dm = m * 30.4 + 15, pm = sample(dm);
            var dot = new THREE.Mesh(new THREE.SphereGeometry(0.32, 12, 10), new THREE.MeshBasicMaterial({ color: 0x9fd8ff }));
            dot.position.set(pm.x, pm.y, 0.05); scene.add(dot); months.push(dot);
        }

        var sun = new THREE.Mesh(new THREE.SphereGeometry(0.95, 20, 16), new THREE.MeshBasicMaterial({ color: 0xffe066 }));
        var sunGlow = new THREE.Mesh(new THREE.SphereGeometry(1.6, 16, 12), new THREE.MeshBasicMaterial({ color: 0xffd23f, transparent: true, opacity: 0.3 }));
        scene.add(sun); scene.add(sunGlow);

        function facts() {
            var html = '<h3>The equation of time</h3>'
                + '<p>Photograph the Sun at the same clock time every day for a year and it traces a figure-8 in the sky - the <b>analemma</b>. Its sideways swing is the <b>equation of time</b>: how far a sundial runs ahead of or behind the clock.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>Two causes</td><td>axial tilt (23.44 deg) + orbital eccentricity (0.0167)</td></tr>'
                + '<tr><td>Sundial ahead</td><td>up to ~ +16 minutes (early November)</td></tr>'
                + '<tr><td>Sundial behind</td><td>down to ~ -14 minutes (mid February)</td></tr>'
                + '<tr><td>Matches the clock</td><td>~4 times a year (around Apr 15, Jun 13, Sep 1, Dec 25)</td></tr>'
                + '</table>'
                + '<p class="t3d-note">Up-down is the Sun declination (+/-23.4 deg over the year); left-right is the equation of time. Blue dots mark the months. Positions use a standard approximation and are not to exact scale.</p>';
            t3dInfo(html);
        }

        function wire() {
            var pBtn = document.getElementById('t3dEotPlayBtn');
            var mBtn = document.getElementById('t3dEotMonthsBtn');
            if (pBtn) pBtn.onclick = function () { state.playing = !state.playing; pBtn.textContent = state.playing ? 'Pause' : 'Play'; };
            if (mBtn) mBtn.onclick = function () { state.showMonths = !state.showMonths; for (var i = 0; i < months.length; i++) months[i].visible = state.showMonths; };
        }
        wire(); facts();
        t3dStatus('The Sun traces a figure-8 (the analemma) over a year; its sideways swing is the equation of time. Drag to orbit.');

        return function animate(dt) {
            dt = dt / 1000; // shell driver emits milliseconds; scene runs in seconds
            if (state.playing) state.t += dt;
            var day = (state.t * 15) % 365;
            var p = sample(day);
            sun.position.set(p.x, p.y, 0.12); sunGlow.position.copy(sun.position);
            for (var i = 0; i < months.length; i++) months[i].visible = state.showMonths;
            shell.applyCamera();
        };
    }

    function t3dKirkwoodGaps(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.95));

        var state = { playing: true, showRes: true, t: 0 };
        var AU = 4;

        var sun = new THREE.Mesh(new THREE.SphereGeometry(1.4, 24, 18), new THREE.MeshBasicMaterial({ color: 0xffd23f }));
        scene.add(sun);
        var sunGlow = new THREE.Mesh(new THREE.SphereGeometry(2.0, 18, 14), new THREE.MeshBasicMaterial({ color: 0xffb733, transparent: true, opacity: 0.22 }));
        scene.add(sunGlow);

        function ring(rad, color, op) {
            var pts = [];
            for (var a = 0; a <= 120; a++) { var th = a / 120 * Math.PI * 2; pts.push(new THREE.Vector3(rad * Math.cos(th), 0, rad * Math.sin(th))); }
            return new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: op }));
        }
        var marsA = 1.52 * AU, jupA = 5.2 * AU;
        scene.add(ring(marsA, 0x6a3a2a, 0.5));
        scene.add(ring(jupA, 0x5a4a2a, 0.6));
        var mars = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 12), new THREE.MeshBasicMaterial({ color: 0xc1440e }));
        var jup = new THREE.Mesh(new THREE.SphereGeometry(1.5, 20, 16), new THREE.MeshBasicMaterial({ color: 0xd8a06a }));
        scene.add(mars); scene.add(jup);

        var gaps = [{ a: 2.06, w: 0.06 }, { a: 2.50, w: 0.10 }, { a: 2.82, w: 0.07 }, { a: 2.95, w: 0.05 }, { a: 3.28, w: 0.09 }];
        var resRings = [];
        for (var gi = 0; gi < gaps.length; gi++) { var rr = ring(gaps[gi].a * AU, 0x7fb0ff, 0.55); resRings.push(rr); scene.add(rr); }

        var NB = 2600;
        var aa = new Float32Array(NB), ang = new Float32Array(NB), yj = new Float32Array(NB);
        var pos = new Float32Array(NB * 3), col = new Float32Array(NB * 3);
        function inGap(a) { for (var k = 0; k < gaps.length; k++) { if (Math.abs(a - gaps[k].a) < gaps[k].w) return true; } return false; }
        var filled = 0, guard = 0;
        while (filled < NB && guard < NB * 25) {
            guard++;
            var a = 2.02 + Math.random() * (3.32 - 2.02);
            if (inGap(a)) continue;
            aa[filled] = a; ang[filled] = Math.random() * Math.PI * 2; yj[filled] = (Math.random() - 0.5) * 0.9;
            var c = a < 2.50 ? [0.68, 0.74, 0.95] : (a < 2.82 ? [0.95, 0.86, 0.62] : [0.72, 0.92, 0.78]);
            col[filled * 3] = c[0]; col[filled * 3 + 1] = c[1]; col[filled * 3 + 2] = c[2];
            filled++;
        }
        NB = filled;
        var beltGeo = new THREE.BufferGeometry();
        beltGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        beltGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));
        var belt = new THREE.Points(beltGeo, new THREE.PointsMaterial({ size: 0.28, vertexColors: true }));
        scene.add(belt);

        function facts() {
            var html = '<h3>Kirkwood gaps</h3>'
                + '<p>The asteroid belt is not a smooth ring. Where an orbit would beat in step with Jupiter, the giant planet repeated tugs pump up the eccentricity and clear the zone - leaving the dark <b>Kirkwood gaps</b>.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>3:1 resonance</td><td>2.50 AU (splits inner and middle belt)</td></tr>'
                + '<tr><td>5:2 / 7:3</td><td>2.82 AU / 2.95 AU</td></tr>'
                + '<tr><td>2:1 resonance</td><td>3.28 AU (the Hecuba gap)</td></tr>'
                + '<tr><td>Discovered</td><td>Daniel Kirkwood, 1866</td></tr>'
                + '</table>'
                + '<p class="t3d-note">The gaps are really dips in the distribution of orbital SIZE (semi-major axis). Here the asteroids ride idealized near-circular orbits so the gaps show as rings; in a real snapshot, eccentric orbits partly fill them. Blue rings mark the resonances. Distances not to scale.</p>';
            t3dInfo(html);
        }

        function wire() {
            var pBtn = document.getElementById('t3dKgPlayBtn');
            var rBtn = document.getElementById('t3dKgResBtn');
            if (pBtn) pBtn.onclick = function () { state.playing = !state.playing; pBtn.textContent = state.playing ? 'Pause' : 'Play'; };
            if (rBtn) rBtn.onclick = function () { state.showRes = !state.showRes; rBtn.textContent = state.showRes ? 'Hide resonances' : 'Resonances'; };
        }
        wire(); facts();
        t3dStatus('The belt orbits the Sun; watch the dark gaps swept clear at Jupiter resonances. Drag to orbit.');

        return function animate(dt) {
            dt = dt / 1000; // shell driver emits milliseconds; scene runs in seconds
            if (state.playing) state.t += dt;
            for (var i = 0; i < NB; i++) {
                var r = aa[i] * AU;
                var w = 3.2 * Math.pow(aa[i], -1.5);
                var th = ang[i] + state.t * w;
                pos[i * 3] = r * Math.cos(th); pos[i * 3 + 1] = yj[i]; pos[i * 3 + 2] = r * Math.sin(th);
            }
            beltGeo.attributes.position.needsUpdate = true;
            var mw = 3.2 * Math.pow(1.52, -1.5), jw = 3.2 * Math.pow(5.2, -1.5);
            mars.position.set(marsA * Math.cos(state.t * mw), 0, marsA * Math.sin(state.t * mw));
            jup.position.set(jupA * Math.cos(state.t * jw), 0, jupA * Math.sin(state.t * jw));
            for (var ri = 0; ri < resRings.length; ri++) resRings[ri].visible = state.showRes;
            shell.applyCamera();
        };
    }

    function t3dSolarGranulation(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x1a0a02, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));

        var state = { playing: true, showSuper: false, t: 0 };
        var HALF = 19;

        // horizontal patch (x-z plane, normal +y) so the top-down camera views it face-on
        var base = new THREE.Mesh(new THREE.PlaneGeometry(HALF * 2 + 5, HALF * 2 + 5), new THREE.MeshBasicMaterial({ color: 0x5a2408 }));
        base.rotation.x = -Math.PI / 2; base.position.y = -0.05;
        scene.add(base);

        var supers = [];
        for (var s = 0; s < 7; s++) {
            var sg = new THREE.Mesh(new THREE.RingGeometry(6.4, 7.0, 32), new THREE.MeshBasicMaterial({ color: 0xffd08a, transparent: true, opacity: 0.5 }));
            sg.rotation.x = -Math.PI / 2;
            sg.position.set((Math.random() - 0.5) * 30, 0.12, (Math.random() - 0.5) * 30);
            sg.visible = false; scene.add(sg); supers.push(sg);
        }

        var cols = 17, rows = 17, N = cols * rows, granules = [];
        var sp = (HALF * 2) / cols;
        for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
                var g = new THREE.Mesh(new THREE.CircleGeometry(1, 14), new THREE.MeshBasicMaterial({ color: 0xffb84d }));
                g.rotation.x = -Math.PI / 2;
                var x = -HALF + (c + 0.5) * sp + (Math.random() - 0.5) * sp * 0.55;
                var z = -HALF + (r + 0.5) * sp + (Math.random() - 0.5) * sp * 0.55;
                g.position.set(x, 0.05, z);
                g.userData = { phase: Math.random() * 100, dur: 2.6 + Math.random() * 2.8, rad: sp * (0.55 + Math.random() * 0.14) };
                scene.add(g); granules.push(g);
            }
        }

        function facts() {
            var html = '<h3>Solar granulation</h3>'
                + '<p>The Sun surface is not smooth - it boils. Each bright cell is a <b>granule</b>: hot plasma rising from below. The dark lanes between them are cooler plasma sinking back down. A granule brightens and fades over minutes, then a new one takes its place.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>Granule size</td><td>~1,000-1,500 km across</td></tr>'
                + '<tr><td>Lifetime</td><td>~8-20 minutes; about 4 million cover the Sun at once</td></tr>'
                + '<tr><td>Flow speed</td><td>~1-2 km/s (rising centres, sinking lanes)</td></tr>'
                + '<tr><td>Supergranules</td><td>~30,000 km across, lasting ~1 day (toggle to show)</td></tr>'
                + '</table>'
                + '<p class="t3d-note">Bright = rising hot plasma; dark lanes = sinking cooler plasma (intensity contrast ~15%). Imaged in detail by the DKIST telescope. Sizes, colours, and timing here are illustrative, not a convection simulation.</p>';
            t3dInfo(html);
        }

        function wire() {
            var pBtn = document.getElementById('t3dSgPlayBtn');
            var sBtn = document.getElementById('t3dSgSuperBtn');
            if (pBtn) pBtn.onclick = function () { state.playing = !state.playing; pBtn.textContent = state.playing ? 'Pause' : 'Play'; };
            if (sBtn) sBtn.onclick = function () { state.showSuper = !state.showSuper; sBtn.textContent = state.showSuper ? 'Hide supergranules' : 'Supergranules'; };
        }
        wire(); facts();
        t3dStatus('The photosphere boils: bright granules rise, dark lanes sink. Toggle supergranules; drag to orbit.');

        return function animate(dt) {
            dt = dt / 1000; // shell driver emits milliseconds; scene runs in seconds
            if (state.playing) state.t += dt;
            for (var i = 0; i < N; i++) {
                var g = granules[i], ud = g.userData;
                var ph = ((state.t + ud.phase) / ud.dur) % 1;
                var life = Math.sin(ph * Math.PI);

                var cc = 0.34 + life * 0.66;
                g.material.color.setRGB(Math.min(1, cc + 0.16), Math.min(1, 0.72 * cc + 0.04), 0.14 * cc);
            }
            for (var s2 = 0; s2 < supers.length; s2++) supers[s2].visible = state.showSuper;
            shell.applyCamera();
        };
    }

    function t3dCmbSky(shell) {

            var u = rnd() * 2 - 1, th = rnd() * Math.PI * 2, rr = Math.sqrt(1 - u * u);
            spots.push({ dir: new THREE.Vector3(rr * Math.cos(th), u, rr * Math.sin(th)), amp: (rnd() * 2 - 1), width: 0.18 + rnd() * 0.22 });
        }

                var d = dir.dot(spots[i].dir);

            var c = new THREE.Color();
            if (x < 0) c.setRGB(0.15 + 0.85 * (1 + x), 0.25 + 0.75 * (1 + x), 1.0);

        for (var i = 0; i < starN; i++) {
            var u = Math.random() * 2 - 1, th = Math.random() * Math.PI * 2, rr = Math.sqrt(1 - u * u);
            sp[i * 3] = rr * Math.cos(th) * R * 0.98;

        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x9fb4d8, size: 0.09 })));

            var g = new THREE.BufferGeometry(), n = seg || 128, a = new Float32Array((n + 1) * 3);
            for (var k = 0; k <= n; k++) {

                a[k * 3] = Math.cos(t) * R; a[k * 3 + 1] = Math.sin(t) * R; a[k * 3 + 2] = 0;
            }

            hor.add(dot(R, 0, 0, 0xffffff, 0.11));          // E
            hor.add(dot(0, 0, R, 0xffffff, 0.11));          // S

    function t3dNBodySandbox(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02030a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.55));

        // Newtonian gravitation literacy: G = 6.674 30(15) x 10^-11
        // m^3 kg^-1 s^-2 (CODATA 2022). Real pairwise F = G m1 m2 / r^2 for
        // every body added here - a genuine N-body integration, not a
        // scripted orbit. On-screen mass/distance units use a scaled
        // teaching constant so motion is visible in one screen; the real
        // G value above is shown for literacy, disclosed as scaled here.
        var G_REAL = 6.67430e-11;
        var G_TEACH = 2.2;
        var SOFTEN = 0.22;
        var MAX_BODIES = 16;

        var root = new THREE.Group();
        scene.add(root);
        var groundGeo = new THREE.RingGeometry(0.01, 6, 48);
        var groundMat = new THREE.MeshBasicMaterial({ color: 0x1a237e, transparent: true, opacity: 0.12, side: THREE.DoubleSide });
        var ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        root.add(ground);

        var bodies = [];
        function addBody(x, z, mass, vx, vz, color) {
            if (bodies.length >= MAX_BODIES) return null;
            var radius = 0.12 + Math.pow(mass, 1 / 3) * 0.16;
            var mesh = new THREE.Mesh(
                new THREE.SphereGeometry(radius, 14, 10),
                new THREE.MeshLambertMaterial({ color: color, emissive: color, emissiveIntensity: 0.15 })
            );
            mesh.position.set(x, 0, z);
            root.add(mesh);
            var trailGeo = new THREE.BufferGeometry();
            var MAX_TRAIL = 90;
            var trailPositions = new Float32Array(MAX_TRAIL * 3);
            trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
            trailGeo.setDrawRange(0, 0);
            var trailLine = new THREE.Line(trailGeo, new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.45 }));
            root.add(trailLine);
            var b = {
                mesh: mesh, mass: mass, radius: radius,
                pos: new THREE.Vector3(x, 0, z),
                vel: new THREE.Vector3(vx, 0, vz),
                acc: new THREE.Vector3(0, 0, 0),
                trailGeo: trailGeo, trailPositions: trailPositions, trailCount: 0,
                isPrimary: false
            };
            bodies.push(b);
            return b;
        }

        function reset() {
            for (var i = 0; i < bodies.length; i++) {
                root.remove(bodies[i].mesh);
                root.remove(bodies[i].trailGeo.__lineRef || bodies[i].mesh);
            }
            while (root.children.length > 1) root.remove(root.children[1]);
            bodies.length = 0;
            addBody(0, 0, 26, 0, 0, 0xffe082);
            addBody(1.9, 0, 0.9, 0, 1.35, 0x64b5f6);
            addBody(-2.7, 0.3, 0.6, 0.05, -1.05, 0xef9a9a);
            addBody(0.4, -3.3, 0.4, -1.0, -0.05, 0x81c784);
        }

        var state = { playing: true, nextMass: 'light', t: 0 };

        function primaryBody() {
            var best = null;
            for (var i = 0; i < bodies.length; i++) {
                if (!best || bodies[i].mass > best.mass) best = bodies[i];
            }
            return best;
        }

        function updateFacts() {
            var primary = primaryBody();
            var bound = 0, escaping = 0;
            for (var i = 0; i < bodies.length; i++) {
                var b = bodies[i];
                if (b === primary) continue;
                var relVel = b.vel.clone().sub(primary.vel);
                var relPos = b.pos.clone().sub(primary.pos);
                var r = Math.max(relPos.length(), 0.05);
                var energy = 0.5 * relVel.lengthSq() - (G_TEACH * primary.mass) / r;
                if (energy < 0) bound++; else escaping++;
            }
            var html = '<h3>N-body sandbox - real gravity, your setup</h3>'
                + '<p>Every body pulls on every other body with F = G m1 m2 / r^2. Add bodies and watch bound orbits, scatters, and captures emerge.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>Newtonian G (real)</td><td>6.674 30 x 10^-11 m^3 kg^-1 s^-2</td></tr>'
                + '<tr><td>Bodies in scene</td><td>' + bodies.length + ' of ' + MAX_BODIES + ' max</td></tr>'
                + '<tr><td>Bound orbits</td><td>' + bound + '</td></tr>'
                + '<tr><td>Escaping / scattering</td><td>' + escaping + '</td></tr>'
                + '<tr><td>Next body mass</td><td>' + state.nextMass + '</td></tr>'
                + '</table>'
                + '<p class="t3d-note">On-screen motion uses a scaled gravitational constant for visible dynamics in one screen - the real G = 6.674e-11 is shown here for literacy. Gravity is softened at close range to avoid a numerical blow-up, standard N-body practice.</p>';
            t3dInfo(html);
        }

        function wire() {
            var lightBtn = document.getElementById('t3dNbodyLightBtn');
            var heavyBtn = document.getElementById('t3dNbodyHeavyBtn');
            var playBtn = document.getElementById('t3dNbodyPlayBtn');
            var resetBtn = document.getElementById('t3dNbodyResetBtn');
            if (lightBtn) lightBtn.onclick = function () { state.nextMass = 'light'; updateFacts(); };
            if (heavyBtn) heavyBtn.onclick = function () { state.nextMass = 'heavy'; updateFacts(); };
            if (playBtn) playBtn.onclick = function () {
                state.playing = !state.playing;
                playBtn.textContent = state.playing ? 'Pause' : 'Play';
            };
            if (resetBtn) resetBtn.onclick = function () { reset(); updateFacts(); };
        }

        var ray = new THREE.Raycaster();
        var groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        shell.onClick = function (e) {
            ray.setFromCamera(shell.ndc(e), shell.camera);
            var hit = new THREE.Vector3();
            if (!ray.ray.intersectPlane(groundPlane, hit)) return;
            var mass = state.nextMass === 'heavy' ? 3.2 : 0.55;
            var color = state.nextMass === 'heavy' ? 0xba68c8 : 0x4dd0e1;
            var speed = 0.4 + Math.random() * 0.5;
            var ang = Math.random() * Math.PI * 2;
            addBody(hit.x, hit.z, mass, Math.cos(ang) * speed, Math.sin(ang) * speed, color);
            updateFacts();
        };

        reset();
        wire();
        updateFacts();
        t3dStatus('Click anywhere on the ground to add a body. Watch real pairwise gravity play out.');

        return function animate(dt) {
            dt = dt / 1000; // shell driver emits milliseconds; scene physics runs in seconds
            if (state.playing) {
                state.t += dt;
                for (var i = 0; i < bodies.length; i++) bodies[i].acc.set(0, 0, 0);
                for (var i = 0; i < bodies.length; i++) {
                    for (var j = i + 1; j < bodies.length; j++) {
                        var a = bodies[i], b = bodies[j];
                        var dx = b.pos.x - a.pos.x, dz = b.pos.z - a.pos.z;
                        var rSq = dx * dx + dz * dz + SOFTEN * SOFTEN;
                        var r = Math.sqrt(rSq);
                        var f = G_TEACH / (rSq * r);
                        var fx = f * dx, fz = f * dz;
                        a.acc.x += fx * b.mass;
                        a.acc.z += fz * b.mass;
                        b.acc.x -= fx * a.mass;
                        b.acc.z -= fz * a.mass;
                    }
                }
                for (var i = 0; i < bodies.length; i++) {
                    var body = bodies[i];
                    body.vel.x += body.acc.x * dt;
                    body.vel.z += body.acc.z * dt;
                    body.pos.x += body.vel.x * dt;
                    body.pos.z += body.vel.z * dt;
                    body.mesh.position.set(body.pos.x, 0, body.pos.z);

                    var idx = body.trailCount % (body.trailPositions.length / 3);
                    body.trailPositions[idx * 3] = body.pos.x;
                    body.trailPositions[idx * 3 + 1] = 0.02;
                    body.trailPositions[idx * 3 + 2] = body.pos.z;
                    body.trailCount = Math.min(body.trailCount + 1, body.trailPositions.length / 3);
                    body.trailGeo.setDrawRange(0, body.trailCount);
                    body.trailGeo.attributes.position.needsUpdate = true;
                }
                if (Math.floor(state.t * 3) !== Math.floor((state.t - dt) * 3)) updateFacts();
            }
        };
    }

        // (stars that never set) equals the observer latitude in degrees.

            var phiDeg = 6 + (i / STAR_COUNT) * 82;
            var thetaDeg = (i * 137.5) % 360;
            var brightness = 0.5 + Math.random() * 0.5;
            var color = new THREE.Color().setHSL(0.55 + Math.random() * 0.12, 0.25, 0.55 + brightness * 0.25);

            vAxis.copy(poleDir).cross(uAxis).normalize();

                tmp.addScaledVector(uAxis, Math.cos(theta) * Math.sin(s.phiRad));

    function t3dExpandingUniverse(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03040d, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.55));

        // Hubble Law literacy: v = H0 * d. H0 ~= 67.4 (Planck CMB) to ~73.5
        // (SH0ES distance-ladder) km/s/Mpc - the Hubble tension. Age ~13.8 Gyr.
        // The grid stretches uniformly (space itself expands) - distinct from a
        // single moving light source Doppler-shifting through static space.
        var H0_LOW = 67.4, H0_HIGH = 73.5;
        var state = { playing: true, scale: 1, t: 0, showVectors: true };

        var root = new THREE.Group();
        scene.add(root);

        var galaxies = [];
        var GRID = 4;
        var SPAN = 3.2;
        var galGroup = new THREE.Group();
        root.add(galGroup);
        for (var ix = -GRID; ix <= GRID; ix++) {
            for (var iy = -GRID; iy <= GRID; iy++) {
                for (var iz = -GRID; iz <= GRID; iz++) {
                    if (ix === 0 && iy === 0 && iz === 0) continue;
                    if (Math.random() > 0.34) continue;
                    var base = new THREE.Vector3(
                        (ix / GRID) * SPAN,
                        (iy / GRID) * SPAN,
                        (iz / GRID) * SPAN
                    );
                    var isFar = base.length() > SPAN * 0.62;
                    var geo = new THREE.SphereGeometry(isFar ? 0.05 : 0.07, shell.low ? 6 : 8, shell.low ? 5 : 6);
                    var mat = new THREE.MeshBasicMaterial({ color: isFar ? 0xff8a65 : 0x81d4fa });
                    var mesh = new THREE.Mesh(geo, mat);
                    galGroup.add(mesh);
                    galaxies.push({ mesh: mesh, base: base, isFar: isFar });
                }
            }
        }

        var observer = new THREE.Mesh(
            new THREE.SphereGeometry(0.1, shell.low ? 10 : 14, shell.low ? 8 : 10),
            new THREE.MeshBasicMaterial({ color: 0xffe082 })
        );
        root.add(observer);

        var vectorGroup = new THREE.Group();
        root.add(vectorGroup);
        var vectorLines = [];
        var SAMPLE_COUNT = 5;
        for (var i = 0; i < SAMPLE_COUNT && i < galaxies.length; i++) {
            var g = galaxies[Math.floor((i + 1) * galaxies.length / (SAMPLE_COUNT + 1))];
            if (!g) continue;
            var lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), g.base.clone()]);
            var lineMat = new THREE.LineBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.5 });

        function updateFacts() {
            var farGal = galaxies.filter(function (g) { return g.isFar; })[0];
            var nearGal = galaxies.filter(function (g) { return !g.isFar; })[0];
            var dFar = farGal ? mpcForDistanceUnit(farGal.base.length()) : 0;
            var dNear = nearGal ? mpcForDistanceUnit(nearGal.base.length()) : 0;
            var vFarLow = (H0_LOW * dFar / 1000).toFixed(0);
            var vFarHigh = (H0_HIGH * dFar / 1000).toFixed(0);
            var vNearLow = (H0_LOW * dNear / 1000).toFixed(0);
            var html = '<h3>Expanding universe - Hubble Law literacy</h3>'
                + '<p>Every marker recedes from every other marker as the grid stretches - speed is proportional to distance, per v = H0 d.</p>'
                + '<table class="w3-table w3-bordered">'
                + '<tr><td>Formula</td><td>v = H0 d</td></tr>'
                + '<tr><td>H0 (early-universe, Planck CMB)</td><td>~67.4 km/s/Mpc</td></tr>'
                + '<tr><td>H0 (late-universe, distance ladder)</td><td>~73.5 km/s/Mpc</td></tr>'
                + '<tr><td>Age of the universe</td><td>~13.8 billion years</td></tr>'
                + '<tr><td>Near marker (~' + dNear.toFixed(0) + ' Mpc)</td><td>~' + vNearLow + ' km/s</td></tr>'
                + '<tr><td>Far marker (~' + dFar.toFixed(0) + ' Mpc)</td><td>~' + vFarLow + ' to ' + vFarHigh + ' km/s</td></tr>'
                + '</table>'
                + '<p class="t3d-note">Teaching grid-stretch schematic - not a Friedmann-equation solver and not a single-source Doppler shift. Distances are compressed for legibility.</p>';

            };
        }

        wire();

        return function animate(dt) {

                    bars[i].scale.y = h;

        function wire() {

            if (reset) reset.onclick = function () {

                    var r = rings.pop();
                    ringGroup.remove(r);
                    r.geometry.dispose();
                    r.material.dispose();
                }

            };

        var lastSpawn = 0;
        wire();
        updateFacts();
        t3dStatus('Play the chirp - rings expand as frequency rises toward merger.');

        return function animate(dt) {
            if (state.playing) {
                state.t += dt * state.speed;
                state.phase = Math.min(1, state.phase + dt * state.speed * 0.12);
            }
            var R = orbitRadius(state.phase);
            var ang = state.t * (1.2 + 3.5 * state.phase);
            bhA.position.set(Math.cos(ang) * R * 0.55, 0.15, Math.sin(ang) * R * 0.55);
            bhB.position.set(Math.cos(ang + Math.PI) * R * 0.45, 0.12, Math.sin(ang + Math.PI) * R * 0.45);

            // Soft grid bobble - exaggerated strain cue.
            var amp = strainAmp(state.phase);
            var wob = Math.sin(state.t * (4 + 10 * state.phase)) * amp * 0.08;
            grid.scale.set(1 + wob, 1, 1 - wob * 0.6);

            if (state.playing && state.showRings && state.t - lastSpawn > Math.max(0.18, 0.55 - 0.35 * state.phase)) {
                spawnRing(0);
                lastSpawn = state.t;
            }
            for (var i = rings.length - 1; i >= 0; i--) {
                var mesh = rings[i];
                mesh.userData.age += dt * state.speed;
                var s = 0.4 + mesh.userData.age * (2.2 + 2.5 * state.phase);
                mesh.scale.set(s, s, s);
                mesh.material.opacity = Math.max(0, 0.55 - mesh.userData.age * 0.35);
                if (mesh.userData.age > 1.8) {
                    ringGroup.remove(mesh);
                    mesh.geometry.dispose();
                    mesh.material.dispose();
                    rings.splice(i, 1);
                }
            }
            if (Math.floor(state.t * 2) !== Math.floor((state.t - dt) * 2)) updateFacts();
        };
    }

    function t3dSpacetimeCurvature(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x04060d, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        var key = new THREE.DirectionalLight(0xe8eaf6, 0.9);
        key.position.set(8, 16, 10);
        scene.add(key);

        // Curved-spacetime literacy: r_s = 2GM/c^2; Sun ~2.95 km; Earth ~8.87 mm.
        // Teaching grid + geodesics - not a Schwarzschild metric solver.
        var BODIES = {
            earth: { label: 'Earth', rsKm: 8.87e-6, depth: 0.55, color: 0x42a5f5 },
            sun: { label: 'Sun', rsKm: 2.95, depth: 1.35, color: 0xffe082 },
            bh: { label: '10 Msun BH', rsKm: 29.5, depth: 2.4, color: 0xce93d8 }
        };
        var state = { body: 'sun', showGeodesics: true, showRs: true, t: 0 };

        var root = new THREE.Group();
        scene.add(root);

        var gridGroup = new THREE.Group();
        root.add(gridGroup);
        var geoGroup = new THREE.Group();
        root.add(geoGroup);
        var mass = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, shell.low ? 16 : 24, shell.low ? 12 : 18),
            new THREE.MeshLambertMaterial({ color: 0xffe082, emissive: 0x4e342e, emissiveIntensity: 0.35 })
        );
        root.add(mass);
        var rsRing = null;

        function depthFor(r, body) {
            var d = BODIES[body].depth;
            var soft = 0.55;
            return -d * Math.exp(-(r * r) / (2.8 * soft * soft));
        }

        function rebuildGrid() {
            while (gridGroup.children.length) {
                var ch = gridGroup.children.pop();
                if (ch.geometry) ch.geometry.dispose();
                if (ch.material) ch.material.dispose();
            }
            var n = shell.low ? 14 : 22;
            var span = 9;
            for (var i = 0; i <= n; i++) {
                var u = -span + (2 * span * i / n);
                var ptsX = [], ptsZ = [];
                for (var j = 0; j <= n; j++) {
                    var v = -span + (2 * span * j / n);
                    var r1 = Math.sqrt(u * u + v * v);
                    var r2 = Math.sqrt(v * v + u * u);
                    ptsX.push(new THREE.Vector3(u, depthFor(r1, state.body), v));
                    ptsZ.push(new THREE.Vector3(v, depthFor(r2, state.body), u));
                }
                var mat = new THREE.LineBasicMaterial({ color: 0x78909c, transparent: true, opacity: 0.7 });
                gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(ptsX), mat));
                gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(ptsZ), mat.clone()));
            }
            mass.material.color.setHex(BODIES[state.body].color);
            mass.position.y = depthFor(0, state.body) + 0.35;
            rebuildRs();
            rebuildGeodesics();
            updateFacts();
        }

        function rebuildRs() {
            if (rsRing) { root.remove(rsRing); rsRing.geometry.dispose(); rsRing.material.dispose(); rsRing = null; }
            if (!state.showRs) return;
            // Exaggerated teaching ring - real r_s is tiny vs orbital scales on this diagram.
            var rad = 0.85 + BODIES[state.body].depth * 0.15;
            var pts = [];
            var n = shell.low ? 36 : 56;
            for (var i = 0; i <= n; i++) {
                var a = (i / n) * Math.PI * 2;
                var x = Math.cos(a) * rad, z = Math.sin(a) * rad;
                pts.push(new THREE.Vector3(x, depthFor(rad, state.body) + 0.05, z));
            }
            rsRing = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: 0xff7043, transparent: true, opacity: 0.9 })
            );
            root.add(rsRing);
        }

        function rebuildGeodesics() {
            while (geoGroup.children.length) {
                var ch = geoGroup.children.pop();
                if (ch.geometry) ch.geometry.dispose();
                if (ch.material) ch.material.dispose();
            }
            if (!state.showGeodesics) return;
            var starts = shell.low ? [-6, -3, 3, 6] : [-7, -4.5, -2, 2, 4.5, 7];
            for (var s = 0; s < starts.length; s++) {
                var x0 = starts[s];
                var pts = [];
                for (var k = 0; k <= 40; k++) {
                    var z = -8 + (16 * k / 40);
                    // Pull toward mass: x bends inward near center (teaching geodesic)
                    var pull = 1.8 * BODIES[state.body].depth * Math.exp(-(z * z) / 8);
                    var x = x0 * (1 - pull / (Math.abs(x0) + 2.2));
                    var r = Math.sqrt(x * x + z * z);
                    pts.push(new THREE.Vector3(x, depthFor(r, state.body) + 0.12, z));
                }
                geoGroup.add(new THREE.Line(
                    new THREE.BufferGeometry().setFromPoints(pts),
                    new THREE.LineBasicMaterial({ color: 0x80cbc4, transparent: true, opacity: 0.95 })
                ));
            }
        }

        function factsHtml() {
            var b = BODIES[state.body];
            var rsTxt = state.body === 'earth' ? '~8.87 mm' : (state.body === 'sun' ? '~2.95 km' : '~29.5 km');
            return '<h3>Spacetime curvature (teaching schematic)</h3>'
                + '<p>Mass curves the teaching grid. Literacy: <b>r_s = 2GM/c^2</b>. Selected body: <b>' + b.label + '</b> with Schwarzschild radius <b>' + rsTxt + '</b>.</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>r_s formula</td><td>2GM/c^2</td><td>Schwarzschild radius</td></tr>'
                + '<tr><td>Sun r_s</td><td>~2.95 km</td><td>Published literacy</td></tr>'
                + '<tr><td>Earth r_s</td><td>~8.87 mm</td><td>Published literacy</td></tr>'
                + '<tr><td>10 Msun BH r_s</td><td>~29.5 km</td><td>10 x solar teaching scale</td></tr>'
                + '<tr><td>Current body</td><td>' + b.label + ' (' + rsTxt + ')</td><td>Orange ring exaggerated for one-screen teaching</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational curved-grid + geodesic schematic - not a Schwarzschild metric solver. The r_s ring is exaggerated; real solar r_s is only ~2.95 km.</p>';
        }
        function updateFacts() {
            t3dInfo(factsHtml());
            var b = BODIES[state.body];
            var rsTxt = state.body === 'earth' ? '~8.87 mm' : (state.body === 'sun' ? '~2.95 km' : '~29.5 km');
            t3dStatus(b.label + ' - r_s = 2GM/c^2 = ' + rsTxt + ' - curved grid + geodesics (teaching schematic).');
        }

        rebuildGrid();

        ['earth', 'sun', 'bh'].forEach(function (key) {
            var btn = document.getElementById('t3dCurv' + key.charAt(0).toUpperCase() + key.slice(1) + 'Btn');
            if (key === 'bh') btn = document.getElementById('t3dCurvBhBtn');
            if (key === 'earth') btn = document.getElementById('t3dCurvEarthBtn');
            if (key === 'sun') btn = document.getElementById('t3dCurvSunBtn');
            if (btn) btn.addEventListener('click', function () {
                state.body = key;
                rebuildGrid();
            });
        });
        var geoBtn = document.getElementById('t3dCurvGeoBtn');
        if (geoBtn) geoBtn.addEventListener('click', function () {
            state.showGeodesics = !state.showGeodesics;
            geoBtn.textContent = state.showGeodesics ? 'Hide geodesics' : 'Show geodesics';
            rebuildGeodesics();
            updateFacts();
        });
        var rsBtn = document.getElementById('t3dCurvRsBtn');
        if (rsBtn) rsBtn.addEventListener('click', function () {
            state.showRs = !state.showRs;
            rsBtn.textContent = state.showRs ? 'Hide r_s ring' : 'Show r_s ring';
            rebuildRs();
            updateFacts();
        });

        return function animate(dt) {
            state.t += dt;
            root.rotation.y = Math.sin(state.t * 0.00007) * 0.18;
            mass.rotation.y += dt * 0.0002;
            shell.applyCamera();
        };
    }

    function t3dLightCone(shell) {
