<script>
    // ===================================================================
    // DINOSAUR 3D VIEWER - scene archetype (dinosaur-3d cluster)
    // -------------------------------------------------------------------
    // Vendored three.js (ESM, dynamic import from /vendor/three/, NO CDN),
    // fully client-side. ONE skeleton serves the whole /dinosaur-3d/*
    // family; the species is dispatched from D3D_SLUG against the embedded
    // D3D_DINOS catalogue. Every dinosaur is assembled procedurally from
    // three.js PRIMITIVES by the single data-driven builder d3dBuildDino()
    // reading a per-species spec (body archetype + skin colors + eye + teeth
    // + feature flags). No model files, no textures fetched by default.
    //

    // model. Fossils do not preserve soft tissue or color, so skin/color are
    // interpretive; the info panel says so. Every NUMBER shown (length,
    // weight, era, discovery) is a REAL published figure from the per-tool
    // SKILL.md truth source.
    //
    // A visible wrapper + "Loading 3D engine..." placeholder renders
    // synchronously (G16 render-only pass); the ~0.7 MB engine lazy-loads
    // post-paint via requestIdleCallback and is cached by the browser.
    // Fullscreen targets the WRAPPER div (controls stay visible).
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    var D3D_SLUG = 'gryponyx';
    var D3D_STORE_KEY = 'ftol-dino-' + D3D_SLUG;

    // ---- species catalogue (one entry per page; the loop authors one BODYJS
    // per species with only that species' spec). Numbers are real published
    // figures; they are shown in the facts panel and MUST match the per-tool
    // SKILL.md truth source. archetype: theropod | sauropod | ceratopsian
    // | stegosaur | ankylosaur | marine | pterosaur | raptor.
    var D3D_DINOS = {
        'gryponyx': {
            name: 'Gryponyx', archetype: 'theropod',
            lengthM: 5, heightM: 1.8, weightKg: 485, eraMya: '201-190',
            period: 'Early Jurassic', diet: 'Herbivore (sauropodomorph)',
            discovered: '1911 (Broom)',
            skin: 0x8a7352, belly: 0xd4c4a0, pattern: 0x5a4a32, eye: 0x2c3e50,
            teeth: 'beak', feats: {},
            note: 'Early Jurassic hooked-claw sauropodomorph from South Africa (Upper Elliot Formation). Length about 5 m. Mass poorly constrained; one secondary estimate about 485 kg. Named by Broom 1911; historically entangled with Massospondylus, but Vasconcelos and Yates argued it is distinctive. Soft-tissue color is artistic.'
        }
    };

    function d3dSpec() {
        return D3D_DINOS[D3D_SLUG] || {
            name: 'Dinosaur', archetype: 'theropod', lengthM: 8, heightM: 3,
            weightKg: 2000, eraMya: '?', period: 'Mesozoic', diet: 'Unknown',
            discovered: '', skin: 0x7d8b5a, belly: 0xc2b98f, pattern: 0x5a6640,
            eye: 0xc0392b, teeth: 'conical', feats: {}, note: ''
        };
    }

    // ---- vendored ESM loader (cached import()) --------------------------
    function ftoLoadThree() {
        if (window.__ftoThreePromise) { return window.__ftoThreePromise; }
        var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/three';
        window.__ftoThreePromise = import(base + '/three.module.min.js').then(function (mod) {
            if (!mod || !mod.WebGLRenderer) { throw new Error('three.js loaded but WebGLRenderer is missing'); }
            return mod;
        });
        return window.__ftoThreePromise;
    }

    function d3dStatus(text) { var el = document.getElementById('d3dStatus'); if (el) el.textContent = text; }
    function d3dInfo(html) { var el = document.getElementById('d3dInfoPanel'); if (el) el.innerHTML = html; }
    function d3dLoadStore() { try { return JSON.parse(localStorage.getItem(D3D_STORE_KEY) || '{}') || {}; } catch (e) { return {}; } }
    function d3dSaveStore(obj) { try { localStorage.setItem(D3D_STORE_KEY, JSON.stringify(obj)); } catch (e) {} }
    function d3dFullscreen(el) {

        else if (el.mozRequestFullScreen) { el.mozRequestFullScreen(); }
        else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
    }

    // ---- OPTIONAL photoreal asset layer (progressive enhancement) --------
    // G16 CONTRACT: the procedural model is the INSTANT first paint. AFTER it
    // paints, we OPTIONALLY fetch a real, free-licensed glTF/GLB for this species
    // from the shared ftol-vm-assets CDN (per the runbook licence gate), verify
    // its sha256, IndexedDB-cache it, and swap it in for the procedural body. ANY
    // failure (no manifest, no entry for this species, network / parse / WebGL
    // error) leaves the procedural model exactly as-is - zero regression. NO CDN
    // engine and NO jsm bare-specifier: GLTFLoader is the self-contained vendored
    // ESM build at /vendor/three/gltf-loader.module.js.
    var D3D_ASSET_CDN = 'https://gh-static.freetool.online/dinosaur-3d';
    var D3D_ASSET_DB = 'ftol-dino3d-assets';
    function d3dIdbOpen() {
        return new Promise(function (resolve, reject) {
            var req = indexedDB.open(D3D_ASSET_DB, 1);
            req.onupgradeneeded = function () { if (!req.result.objectStoreNames.contains('assets')) { req.result.createObjectStore('assets', { keyPath: 'key' }); } };
            req.onsuccess = function () { resolve(req.result); };
            req.onerror = function () { reject(req.error || new Error('IndexedDB open failed')); };
        });
    }
    function d3dIdbGet(key) {
        return d3dIdbOpen().then(function (db) {
            return new Promise(function (resolve) {
                var tx = db.transaction('assets', 'readonly');
                var rq = tx.objectStore('assets').get(key);
                rq.onsuccess = function () { resolve(rq.result ? rq.result.blob : null); };
                rq.onerror = function () { resolve(null); };
            });
        }).catch(function () { return null; });
    }
    function d3dIdbPut(key, blob) {
        return d3dIdbOpen().then(function (db) {
            return new Promise(function (resolve) {
                var tx = db.transaction('assets', 'readwrite');
                tx.objectStore('assets').put({ key: key, blob: blob });
                tx.oncomplete = function () { resolve(true); };
                tx.onerror = function () { resolve(false); };
            });
        }).catch(function () { return false; });
    }
    function d3dSha256Hex(buf) {
        return crypto.subtle.digest('SHA-256', buf).then(function (hash) {
            var b = new Uint8Array(hash), hex = '';
            for (var i = 0; i < b.length; i++) hex += b[i].toString(16).padStart(2, '0');
            return hex;
        });
    }
    var __d3dGltfPromise = null;
    function d3dLoadGLTFLoader() {
        if (__d3dGltfPromise) return __d3dGltfPromise;
        var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/three';
        __d3dGltfPromise = import(base + '/gltf-loader.module.js').then(function (mod) {
            if (!mod || !mod.GLTFLoader) throw new Error('GLTFLoader missing from vendored module');
            return mod.GLTFLoader;
        });
        return __d3dGltfPromise;
    }
    function d3dFetchAssetBuffer(entry, version) {
        var idbKey = D3D_SLUG + '@' + version + ':' + entry.file;
        return d3dIdbGet(idbKey).then(function (cached) {
            if (cached) return cached.arrayBuffer();
            return fetch(D3D_ASSET_CDN + '/' + entry.file).then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.arrayBuffer();
            }).then(function (buf) {
                return d3dSha256Hex(buf).then(function (hex) {
                    if (entry.sha256 && hex !== entry.sha256) throw new Error('sha256 mismatch on ' + entry.file);
                    try { d3dIdbPut(idbKey, new Blob([buf])); } catch (e) {}
                    return buf;
                });
            });
        });
    }
    // Normalise a loaded glTF scene to the procedural framing (uniform scale so
    // its longest axis fills the frame; centred over the origin; sitting on the
    // y=0 ground), add a neutral PBR environment, then swap it in for the
    // procedural body. Rotation is driven by shell.rotTarget afterwards.
    function d3dInstallModel(shell, obj, entry) {
        var THREE = shell.THREE;
        var root = new THREE.Group();
        root.add(obj);
        // Orientation correction FIRST (manifest yaw/pitch, e.g. Z-up STL->glTF
        // conversions) so the scale/centre/ground maths below sees the FINAL pose.
        if (typeof entry.yaw === 'number') obj.rotation.y = entry.yaw;
        if (typeof entry.pitch === 'number') obj.rotation.x = entry.pitch;
        obj.updateMatrixWorld(true);
        var box = new THREE.Box3().setFromObject(obj);
        var size = new THREE.Vector3(); box.getSize(size);
        var longest = Math.max(size.x, size.y, size.z) || 1;
        var target = entry.targetLenUnits || 13;
        obj.scale.setScalar(target / longest);
        box.setFromObject(obj); var c = new THREE.Vector3(); box.getCenter(c);
        obj.position.x -= c.x;
        obj.position.z -= c.z;
        obj.position.y -= box.min.y;
        try {
            var pmrem = new THREE.PMREMGenerator(shell.renderer);
            var envScene = new THREE.Scene();
            envScene.background = new THREE.Color(0x9fb4c7);
            shell.scene.environment = pmrem.fromScene(envScene, 0.03).texture;
        } catch (e) {}
        if (shell.dino) shell.dino.visible = false;
        shell.scene.add(root);
        shell.rotTarget = root;
    }
    function d3dLoadModel(shell, spec) {
        if (typeof indexedDB === 'undefined' || typeof fetch !== 'function' || typeof crypto === 'undefined' || !crypto.subtle) return;
        fetch(D3D_ASSET_CDN + '/manifest.json', { cache: 'no-cache' })
            .then(function (r) { if (!r.ok) throw new Error('no manifest'); return r.json(); })
            .then(function (manifest) {
                var entry = manifest && manifest.models && manifest.models[D3D_SLUG];
                if (!entry || !entry.file) return; // nothing published for this species yet - stay procedural
                return d3dFetchAssetBuffer(entry, manifest.version || '0').then(function (buf) {
                    return d3dLoadGLTFLoader().then(function (GLTFLoader) {
                        return new Promise(function (resolve, reject) {
                            new GLTFLoader().parse(buf, '', function (gltf) { resolve(gltf); }, function (e) { reject(e); });
                        });
                    }).then(function (gltf) {
                        var obj = gltf.scene || (gltf.scenes && gltf.scenes[0]);
                        if (!obj) throw new Error('glTF has no scene');
                        d3dInstallModel(shell, obj, entry);
                        shell.assetInfo = { kind: entry.kind || 'fleshed', license: entry.license || '', credit: entry.credit || '', source: entry.source_url || '' };
                        if (typeof shell.refreshFacts === 'function') shell.refreshFacts();
                        d3dStatus('Showing a real 3D model of this species. Drag to rotate, scroll or pinch to zoom.');
                    });
                });
            })
            .catch(function () { /* stay procedural - G16 first paint preserved */ });
    }

    // ---- shared scene shell: renderer + camera + custom pointer-orbit ----
    // (same archetype as the space-3d t3dShell; OrbitControls is not vendored)
    function d3dShell(THREE, host, opts) {
        var coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        var low = coarse || ((navigator.hardwareConcurrency || 4) <= 4);
        var renderer = new THREE.WebGLRenderer({ antialias: !low, powerPreference: 'default' });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(opts.fov || 50, 1, 0.1, 4000);
        var orbit = {
            target: new THREE.Vector3(0, opts.targetY || 0, 0),
            radius: opts.radius, theta: opts.theta || 0.9, phi: opts.phi || 1.25,
            goalRadius: opts.radius, goalTheta: opts.theta || 0.9, goalPhi: opts.phi || 1.25,
            minR: opts.minR || 4, maxR: opts.maxR || 400
        };
        function applyCamera() {
            orbit.theta += (orbit.goalTheta - orbit.theta) * 0.14;
            orbit.phi += (orbit.goalPhi - orbit.phi) * 0.14;
            orbit.radius += (orbit.goalRadius - orbit.radius) * 0.14;
            var sp = Math.sin(orbit.phi), cp = Math.cos(orbit.phi);
            camera.position.set(
                orbit.target.x + orbit.radius * sp * Math.sin(orbit.theta),
                orbit.target.y + orbit.radius * cp,
                orbit.target.z + orbit.radius * sp * Math.cos(orbit.theta)
            );
            camera.lookAt(orbit.target);
        }
        function size() {
            var w = Math.max(260, host.clientWidth);
            var h = Math.round(w * 0.62);
            var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
            if (fsEl && fsEl.contains(host)) { h = Math.max(240, (window.innerHeight || h) - 150); }
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        host.appendChild(renderer.domElement);
        renderer.domElement.style.touchAction = 'none';
        renderer.domElement.style.borderRadius = '6px';
        var drag = null, pinch = null, moved = 0;
        host.addEventListener('pointerdown', function (e) { drag = { x: e.clientX, y: e.clientY }; moved = 0; host.setPointerCapture && host.setPointerCapture(e.pointerId); });
        host.addEventListener('pointermove', function (e) {
            if (!drag) return;
            var dx = e.clientX - drag.x, dy = e.clientY - drag.y;
            moved += Math.abs(dx) + Math.abs(dy);
            drag = { x: e.clientX, y: e.clientY };
            orbit.goalTheta -= dx * 0.006;
            orbit.goalPhi = Math.min(Math.max(orbit.goalPhi - dy * 0.005, 0.15), Math.PI - 0.2);
        });
        host.addEventListener('pointerup', function (e) { var wasClick = moved < 8; drag = null; if (wasClick && shell.onClick) { shell.onClick(e); } });
        host.addEventListener('wheel', function (e) { e.preventDefault(); orbit.goalRadius = Math.min(Math.max(orbit.goalRadius * (e.deltaY > 0 ? 1.12 : 0.9), orbit.minR), orbit.maxR); }, { passive: false });
        host.addEventListener('touchstart', function (e) { if (e.touches.length === 2) { pinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); } }, { passive: true });
        host.addEventListener('touchmove', function (e) {
            if (e.touches.length === 2 && pinch) {
                var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                orbit.goalRadius = Math.min(Math.max(orbit.goalRadius * (pinch / d), orbit.minR), orbit.maxR);
                pinch = d;
            }
        }, { passive: true });
        window.addEventListener('resize', size);
        document.addEventListener('fullscreenchange', size);
        document.addEventListener('webkitfullscreenchange', size);
        size();
        var shell = {
            THREE: THREE, renderer: renderer, scene: scene, camera: camera,
            orbit: orbit, low: low, applyCamera: applyCamera, size: size, onClick: null,
            ndc: function (e) { var r = renderer.domElement.getBoundingClientRect(); return new THREE.Vector2(((e.clientX - r.left) / r.width) * 2 - 1, -((e.clientY - r.top) / r.height) * 2 + 1); }
        };
        return shell;
    }

    // ---- shared organic-geometry helpers --------------------------------
    // The old builder placed disjoint primitives (an upright egg torso, a
    // floating head, arms splayed sideways) so nothing read as a dinosaur.
    // The fix: sweep ONE continuous tapered body along an archetype spine
    // curve (d3dSpineTube), then attach a shaped head, posed digitigrade
    // legs (d3dBone), tucked arms, and per-archetype extras. The spine is
    // kept planar (x=0) so the swept ring frame never twists.

    // A generalized tube: sweep a circle of per-sample radius along a
    // Catmull-Rom spine given as [y,z] control points. squash scales the
    // vertical (dorsoventral) axis; side axis is world X so it never twists.
    function d3dSpineTube(THREE, ctrl, radii, mat, opts) {
        opts = opts || {};
        var TS = opts.tubular || 90, RS = opts.radial || 18, squash = opts.squash || 1;
        var vch = ctrl.map(function (p) { return new THREE.Vector3(0, p[0], p[1]); });
        var curve = new THREE.CatmullRomCurve3(vch, false, 'catmullrom', 0.5);
        var pts = curve.getPoints(TS);
        function radAt(t) {
            var x = t * (radii.length - 1), i0 = Math.floor(x), i1 = Math.min(radii.length - 1, i0 + 1), f = x - i0;
            return radii[i0] * (1 - f) + radii[i1] * f;
        }
        var X = new THREE.Vector3(1, 0, 0);
        var pos = [], idx = [];
        for (var i = 0; i <= TS; i++) {
            var t = i / TS, P = pts[i];
            var pa = pts[Math.max(0, i - 1)], pb = pts[Math.min(TS, i + 1)];
            var T = new THREE.Vector3().subVectors(pb, pa);
            if (T.lengthSq() < 1e-9) T.set(0, 0, 1);
            T.normalize();
            var up = new THREE.Vector3().crossVectors(T, X);
            if (up.lengthSq() < 1e-9) up.set(0, 1, 0); else up.normalize();
            var r = radAt(t);
            for (var j = 0; j <= RS; j++) {
                var v = j / RS * Math.PI * 2, c = Math.cos(v), s = Math.sin(v);
                pos.push(
                    P.x + X.x * c * r + up.x * s * r * squash,
                    P.y + X.y * c * r + up.y * s * r * squash,
                    P.z + X.z * c * r + up.z * s * r * squash
                );
            }
        }
        for (var a = 1; a <= TS; a++) {
            for (var b = 1; b <= RS; b++) {
                var i00 = (RS + 1) * (a - 1) + (b - 1), i10 = (RS + 1) * a + (b - 1),
                    i11 = (RS + 1) * a + b, i01 = (RS + 1) * (a - 1) + b;
                idx.push(i00, i10, i01, i10, i11, i01);
            }
        }
        var g = new THREE.BufferGeometry();
        g.setIndex(idx);
        g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        g.computeVertexNormals();
        return new THREE.Mesh(g, mat);
    }

    // A tapered bone (limb segment) between two points.
    function d3dBone(THREE, a, b, r0, r1, mat) {
        var dir = new THREE.Vector3().subVectors(b, a), len = dir.length();
        if (len < 1e-6) len = 0.01;
        var m = new THREE.Mesh(new THREE.CylinderGeometry(r1, r0, len, 10), mat);
        m.position.copy(a).addScaledVector(dir, 0.5);
        m.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
        return m;
    }

    // ---- the ONE data-driven dinosaur builder ---------------------------
    // Builds a species from the spine sweep + posed appendages per spec.
    function d3dBuildDino(shell, spec) {
        var THREE = shell.THREE, scene = shell.scene;
        var feats = spec.feats || {};
        var arche = spec.archetype;
        var aquatic = !!feats.aquatic || arche === 'marine';

        // lighting + ground
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        var key = new THREE.DirectionalLight(0xfff2dc, 1.7); key.position.set(16, 30, 18); scene.add(key);
        var rim = new THREE.DirectionalLight(0x9fc0ff, 0.45); rim.position.set(-18, 12, -16); scene.add(rim);
        var ground = new THREE.Mesh(
            new THREE.CircleGeometry(34, 56),
            new THREE.MeshStandardMaterial({ color: aquatic ? 0x123a4d : 0x6b5b3e, roughness: 0.97, transparent: aquatic, opacity: aquatic ? 0.5 : 1 })
        );
        ground.rotation.x = -Math.PI / 2; ground.position.y = -0.02; scene.add(ground);

        var skinMat = new THREE.MeshStandardMaterial({ color: spec.skin, roughness: 0.85, metalness: 0.02 });
        var bellyMat = new THREE.MeshStandardMaterial({ color: spec.belly, roughness: 0.9 });
        var patMat = new THREE.MeshStandardMaterial({ color: spec.pattern, roughness: 0.85 });
        var toothMat = new THREE.MeshStandardMaterial({ color: 0xf4efe2, roughness: 0.4 });
        var clawMat = new THREE.MeshStandardMaterial({ color: 0x2b2b2b, roughness: 0.5 });

        var dino = new THREE.Group();
        var clickTargets = [];
        function tag(mesh, part) { mesh.userData = { part: part }; clickTargets.push(mesh); return mesh; }

        // ---- head (kind = theropod | raptor | marine | herb) ------------
        function buildHead(scale, kind) {
            var head = new THREE.Group();
            var longSnout = (kind === 'marine');
            var craniumD = longSnout ? 1.1 : 1.2, snoutD = longSnout ? 2.6 : 1.3;
            var w = (kind === 'raptor' ? 0.6 : longSnout ? 0.75 : 0.95) * scale;
            // cranium
            var cranium = tag(new THREE.Mesh(new THREE.BoxGeometry(w * 1.05, 0.85 * scale, craniumD * scale), skinMat), 'head');
            cranium.position.set(0, 0, 0); head.add(cranium);
            // tapered snout (front)
            var snout = new THREE.Mesh(new THREE.CylinderGeometry(w * 0.42, w * 0.55, snoutD * scale, 4), skinMat);
            snout.rotation.x = Math.PI / 2; snout.rotation.y = Math.PI / 4;
            snout.position.set(0, longSnout ? -0.02 * scale : 0.02 * scale, (craniumD * 0.5 + snoutD * 0.42) * scale);
            head.add(snout);
            // lower jaw (hinged, slightly open)
            var jaw = new THREE.Group();
            var jawLen = (craniumD * 0.5 + snoutD) * scale;
            var jawMesh = new THREE.Mesh(new THREE.BoxGeometry(w * 0.8, 0.28 * scale, jawLen), skinMat);
            jawMesh.position.set(0, -0.42 * scale, jawLen * 0.42);
            jaw.add(jawMesh);
            jaw.rotation.x = -0.12;
            head.add(jaw);
            head.userData.jaw = jaw;
            // teeth along upper + lower jaw front
            if (spec.teeth !== 'none' && spec.teeth !== 'beak') {
                var tCount = longSnout ? 8 : 5, tSize = (spec.teeth === 'serrated' ? 0.16 : 0.13) * scale;
                var tGeo = new THREE.ConeGeometry(tSize, tSize * (spec.teeth === 'serrated' ? 3 : 2.4), 5);
                for (var ti = 0; ti < tCount; ti++) {
                    var fz = (craniumD * 0.5 + snoutD * (ti / (tCount - 1)) * 0.85) * scale;
                    [-1, 1].forEach(function (sx) {
                        var tu = new THREE.Mesh(tGeo, toothMat);
                        tu.position.set(sx * w * 0.34, -0.28 * scale, fz); tu.rotation.x = Math.PI; head.add(tu);
                        var tl = new THREE.Mesh(tGeo, toothMat);
                        tl.position.set(sx * w * 0.32, -0.34 * scale, fz); jaw.add(tl);
                    });
                }
            }
            // eyes (sclera + iris + pupil), forward-set on the cranium
            [-1, 1].forEach(function (sx) {
                var e = new THREE.Group();
                var er = 0.2 * scale;
                e.add(new THREE.Mesh(new THREE.SphereGeometry(er, 14, 10), new THREE.MeshStandardMaterial({ color: 0xfbf6e9, roughness: 0.3 })));
                var iris = new THREE.Mesh(new THREE.SphereGeometry(er * 0.62, 12, 8), new THREE.MeshStandardMaterial({ color: spec.eye, emissive: spec.eye, emissiveIntensity: 0.3, roughness: 0.2 }));
                iris.position.z = er * 0.6; e.add(iris);
                var pup = new THREE.Mesh(new THREE.SphereGeometry(er * 0.3, 10, 8), new THREE.MeshBasicMaterial({ color: 0x000000 }));
                pup.position.z = er * 0.85; e.add(pup);
                e.position.set(sx * w * 0.5, 0.22 * scale, longSnout ? craniumD * 0.2 * scale : craniumD * 0.28 * scale);
                e.rotation.y = sx * 0.4;
                // brow ridge
                var brow = new THREE.Mesh(new THREE.BoxGeometry(w * 0.34, 0.12 * scale, 0.42 * scale), skinMat);
                brow.position.set(sx * w * 0.48, 0.42 * scale, craniumD * 0.2 * scale); head.add(brow);
                head.add(e);
            });
            if (feats.crest) {
                var crest = tag(new THREE.Mesh(new THREE.ConeGeometry(0.28 * scale, 1.5 * scale, 10), patMat), 'crest');
                crest.position.set(0, 0.7 * scale, -0.1 * scale); crest.rotation.x = -0.6; head.add(crest);
            }
            return head;
        }

        // place + orient a head group at a spine end

                    d3dStatus('Drag to rotate, scroll or pinch to zoom, click a body part for a fact.');
                    var last = performance.now();
                    shell.renderer.setAnimationLoop(function () {
                        var now = performance.now();
                        var dt = Math.min(now - last, 100);
                        last = now;
                        animate(dt);
                        shell.applyCamera();
                        shell.renderer.render(shell.scene, shell.camera);
                    });
                    try { d3dLoadModel(shell, spec); } catch (e) {}
                } catch (err) {
                    d3dStatus('This page needs WebGL to render the 3D scene. Your browser or device has it disabled - the facts panel below still works. (' + (err && err.message ? err.message : err) + ')');
                }
            }).catch(function (err) { d3dStatus('Could not load the 3D engine: ' + (err && err.message ? err.message : err)); });
        }
        if ('requestIdleCallback' in window) { requestIdleCallback(boot, { timeout: 2500 }); }
        else { setTimeout(boot, 300); }
    }
</script>
