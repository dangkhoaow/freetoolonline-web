<script>
    // Roman-numeral converter skeleton (roman-numeral-converter) - pure JS lookup-table
    // arithmetic, no lib, no upload, no backend. Registry Gate-H entry:
    // roman_numeral_converter_purejs. Converts a whole number (1-3999) to its
    // standard subtractive-notation Roman numeral and back, entirely in the
    // browser. Two linked inputs: typing in either field live-updates the
    // other. Framework contract: doAfterPageRendered(); renders a worked
    // example on load so e2e G16 has visible output with zero interaction.

    web.localUpload = false;

    var RNC_TABLE = [
        [1000, 'M'], [900, 'CM'], [500, 'D'], [400, 'CD'],
        [100, 'C'], [90, 'XC'], [50, 'L'], [40, 'XL'],
        [10, 'X'], [9, 'IX'], [5, 'V'], [4, 'IV'], [1, 'I']
    ];

    // Canonical (shortest-form) Roman numeral validator, 1-3999.
    var RNC_VALID = /^M{0,3}(CM|CD|D?C{0,3})(XC|XL|L?X{0,3})(IX|IV|V?I{0,3})$/i;

    function rncToRoman(num) {
        var n = Math.trunc(num);
        if (!(n >= 1 && n <= 3999)) throw new Error('Enter a whole number from 1 to 3999.');
        var out = '';
        for (var i = 0; i < RNC_TABLE.length; i++) {
            var value = RNC_TABLE[i][0], symbol = RNC_TABLE[i][1];
            while (n >= value) { out += symbol; n -= value; }
        }
        return out;
    }

    function rncFromRoman(raw) {
        var s = String(raw || '').trim().toUpperCase();
        if (!s) throw new Error('Enter a Roman numeral, e.g. MCMXCIV.');
        if (!RNC_VALID.test(s) || s.length === 0) {
            throw new Error('"' + s + '" is not a standard Roman numeral (1-3999).');
        }
        var map = { I: 1, V: 5, X: 10, L: 50, C: 100, D: 500, M: 1000 };
        var total = 0, prev = 0;
        for (var i = s.length - 1; i >= 0; i--) {
            var val = map[s[i]];
            if (val < prev) total -= val; else { total += val; prev = val; }
        }
        return total;
    }

    function doAfterPageRendered() {
        var root = document.getElementById('romanNumeralConverterTool');
        if (!root) return; // not a roman-numeral-converter page
        root.innerHTML =
            '<div class="w3-row" style="margin-bottom:12px;">' +
            '<label style="display:block;margin-bottom:4px;">Arabic number (1-3999)</label>' +
            '<input id="rncArabic" class="w3-input w3-border" type="number" min="1" max="3999" step="1" style="max-width:220px;margin:0 auto;font-family:monospace;">' +
            '</div>' +
            '<div style="font-size:1.4em;margin:6px 0;">&#8597;</div>' +
            '<div class="w3-row" style="margin-bottom:12px;">' +
            '<label style="display:block;margin-bottom:4px;">Roman numeral</label>' +
            '<input id="rncRoman" class="w3-input w3-border" type="text" placeholder="e.g. MCMXCIV" style="max-width:220px;margin:0 auto;font-family:monospace;text-transform:uppercase;">' +
            '</div>' +
            '<div id="rncOut" class="outputImgs" style="visibility:visible !important;font-family:monospace;font-size:1.2em;word-break:break-all;background:#f7f7f7;border:1px solid #ddd;border-radius:4px;padding:10px;min-height:2em;max-width:420px;margin:0 auto;text-align:left;"></div>' +
            '<div style="margin-top:8px;"><button id="rncCopy" type="button" class="w3-button w3-blue">Copy result</button></div>';

        var q = function (sel) { return root.querySelector(sel); };
        var arabicEl = q('#rncArabic'), romanEl = q('#rncRoman'), outEl = q('#rncOut');
        var lastResult = '';

        function fromArabic() {
            try {
                var roman = rncToRoman(arabicEl.value);
                romanEl.value = roman;
                lastResult = roman;
                outEl.textContent = arabicEl.value + ' = ' + roman;
            } catch (e) {
                outEl.textContent = 'Error: ' + (e && e.message ? e.message : String(e));
                lastResult = '';
            }
        }

        function fromRoman() {
            try {
                var num = rncFromRoman(romanEl.value);
                arabicEl.value = num;
                lastResult = String(num);
                outEl.textContent = romanEl.value.toUpperCase() + ' = ' + num;
            } catch (e) {
                outEl.textContent = 'Error: ' + (e && e.message ? e.message : String(e));
                lastResult = '';
            }
        }

        arabicEl.addEventListener('input', fromArabic);
        romanEl.addEventListener('input', fromRoman);
        q('#rncCopy').addEventListener('click', function () {
            if (lastResult && navigator.clipboard) { try { navigator.clipboard.writeText(lastResult); } catch (e) { void e; } }
        });

        // Worked example on load (visible output for e2e G16, zero interaction).
        arabicEl.value = '1994';
        fromArabic();
    }
</script>
