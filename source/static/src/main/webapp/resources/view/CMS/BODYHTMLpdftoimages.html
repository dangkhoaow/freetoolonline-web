<div class="w3-container">
</div>

<div class="w3-modal" id="settings">
    <div class="w3-modal-content" style="padding: 10px; padding-top: 40px">
        <span onclick="document.getElementById('settings').style.display='none'" class="w3-button w3-display-topright close-modal-btn">&times;</span>
        <div class='w3-container'>
            <div class="w3-display-topleft" style="left: 10px;top: 10px;color: #0066b3;">
                Settings
            </div>
            <div class='w3-row w3-container'>
                <div class='w3-container'>
                    <label>
                        <select class="w3-select" id='outputDPI' style='width: 60px;'>
                            <option value="72" selected="selected">72</option>
                            <option value="150">150</option>
                            <option value="300">300</option>
                        </select> Output image quality (DPI)
                    </label>
                </div>
            </div>
        </div>
    </div>
</div>
<div class='w3-row'>
    <div class='w3-container'>
        <div class='w3-panel w3-pale-blue w3-leftbar w3-border-blue'>
            <details class="p2i-client-disclosure">
            <summary class='stepHeading' style='cursor:pointer; font-weight:bold;'>Or render to images in your browser - no upload</summary>
            <p>Pick a PDF and render its pages to images on your device. The file never leaves your browser.</p>
            <p><input type='file' id='p2iClientFile' class='w3-input w3-border' accept='application/pdf,.pdf'/></p>
            <div class='w3-row'>
                <div class='w3-col m3 w3-container'>
                    <label class='w3-small'>Format</label>
                    <select class='w3-select' id='p2iFormat'>
                        <option value='jpg' selected='selected'>JPG</option>
                        <option value='png'>PNG</option>
                    </select>
                </div>
                <div class='w3-col m3 w3-container'>
                    <label class='w3-small'>JPG quality (1 to 100)</label>
                    <input type='range' id='p2iQuality' min='1' max='100' value='80' class='w3-input' style='padding:0'/>
                </div>
                <div class='w3-col m3 w3-container'>
                    <label class='w3-small'>Pages</label>
                    <input type='text' id='p2iPageRange' class='w3-input w3-border' value='all' placeholder='all, or 1-3, or 1,4'/>
                </div>
                <div class='w3-col m3 w3-container'>
                    <label class='w3-small'>Render scale</label>
                    <select class='w3-select' id='p2iScale'>
                        <option value='1'>1x</option>
                        <option value='1.5'>1.5x</option>
                        <option value='2' selected='selected'>2x</option>
                        <option value='3'>3x</option>
                    </select>
                </div>
            </div>
            <p>
                <button type='button' id='p2iClientBtn' class='w3-button w3-blue'>Render in browser</button>
                <button type='button' id='p2iZipBtn' class='w3-button w3-green w3-right' style='display:none'>Download all as ZIP</button>
            </p>
            <p id='p2iStatus' class='w3-small w3-text-grey'></p>
            <div id='p2iOutput' class='w3-row'></div>
            </details>
        </div>
    </div>
</div>
