<script>
    // In-browser image format converter archetype (passport-photo-maker) - Canvas toBlob, no
    // lib, no upload, no backend. Registry Gate-H entry: image_format_converter_canvas.
    // 100% client-side: the image never leaves the browser (2026 "no-upload image
    // converter" trend). Slug-dispatched target format: `png-to-webp` -> webp,
    // `jpg-to-png` -> png, `image-to-webp` -> webp; else a format selector.
    // Formats: PNG / JPEG / WebP (canvas-native). AVIF encode is browser-dependent
    // (Chromium); documented as best-effort. Framework contract: doAfterPageRendered();
    // no top-level DOM. Plain <input type=file>, no server upload widget.
    //
    // PASSPORT-PHOTO MODE (new-tool-discovery-loop fire211, 2026-07-17): when the
    // slug carries a passport/visa/id token (see isPassportPhotoSlug() in
    // emit-cms-fragments.mjs), this same skeleton renders a DIFFERENT UI - crop to
    // a fixed country-size preset (mm -> px @ 300 DPI), pan/zoom to position the
    // face, composite onto a white background (passport photos require a plain
    // light background; canvas has no background removal, so this always fills
    // white behind the crop - documented as a limitation, not a claim of bg
    // removal), and an optional tiled 4x6in print sheet. Still canvas + toBlob,
    // still 100% client-side, still the same mount div id.

    web.localUpload = false;

    var IC_SLUG = 'passport-photo-maker';
    var IC_MIME = { png: 'image/png', jpg: 'image/jpeg', jpeg: 'image/jpeg', webp: 'image/webp', avif: 'image/avif' };
    var IC_PASSPORT = /passport|visa|(^|-)id-photo|(^|-)id-picture/i.test(IC_SLUG);

    function icTargetFromSlug(slug) {
        var s = String(slug || '').toLowerCase();
        var m = s.match(/-to-([a-z0-9]+)/);
        if (m && IC_MIME[m[1]]) return m[1] === 'jpeg' ? 'jpg' : m[1];
        for (var k in IC_MIME) { if (new RegExp('\\b' + k + '\\b').test(s)) return k === 'jpeg' ? 'jpg' : k; }
        return '';
    }

    // ---- Passport-photo preset table (label, mm width, mm height). 300 DPI. ----
    var PP_PRESETS = [
        { id: 'us2x2', label: 'US Passport / Visa - 2x2 in (51x51mm)', mmW: 51, mmH: 51 },
        { id: 'india2x2', label: 'India Passport - 2x2 in (51x51mm)', mmW: 51, mmH: 51 },
        { id: 'schengen', label: 'Schengen / EU Passport - 35x45mm', mmW: 35, mmH: 45 },
        { id: 'uk', label: 'UK Passport - 35x45mm', mmW: 35, mmH: 45 },
        { id: 'australia', label: 'Australia Passport - 35x45mm', mmW: 35, mmH: 45 },
        { id: 'canada', label: 'Canada Passport - 50x70mm', mmW: 50, mmH: 70 },
        { id: 'china', label: 'China Visa - 33x48mm', mmW: 33, mmH: 48 },
        { id: 'custom', label: 'Custom size (mm)', mmW: 40, mmH: 50 }
    ];
    var PP_DPI = 300;
    function ppMmToPx(mm) { return Math.round((mm / 25.4) * PP_DPI); }
    function ppPresetById(id) { for (var i = 0; i < PP_PRESETS.length; i++) if (PP_PRESETS[i].id === id) return PP_PRESETS[i]; return PP_PRESETS[0]; }

    function icRenderPassportMode(root) {
        var optionsHtml = PP_PRESETS.map(function (p) { return '<option value="' + p.id + '">' + p.label + '</option>'; }).join('');
        root.innerHTML =
            '<div class="w3-row" style="margin-bottom:8px;"><input type="file" id="ppFile" accept="image/*" class="w3-input w3-border" style="max-width:420px;margin:0 auto;"></div>' +
            '<div class="w3-row" style="margin-bottom:8px;">Photo size ' +
            '<select id="ppPreset" class="w3-select w3-border" style="width:auto;display:inline-block;">' + optionsHtml + '</select></div>' +
            '<div id="ppCustomWrap" style="display:none;margin-bottom:8px;">Width <input id="ppCustomW" type="number" min="10" max="120" value="40" class="w3-input w3-border" style="width:70px;display:inline-block;"> mm &times; Height <input id="ppCustomH" type="number" min="10" max="120" value="50" class="w3-input w3-border" style="width:70px;display:inline-block;"> mm</div>' +
            '<div class="w3-row" style="margin-bottom:8px;">Zoom <input id="ppZoom" type="range" min="1" max="3" step="0.05" value="1" style="vertical-align:middle;width:200px;" disabled></div>' +
            '<div id="ppStageWrap" style="margin:0 auto 8px;display:none;">' +
            '<canvas id="ppStage" style="border:2px solid #1a73e8;cursor:move;touch-action:none;"></canvas>' +
            '<div style="font-size:.85em;color:#777;margin-top:4px;">Drag the photo to position the face. Use the zoom slider to fill the frame.</div>' +
            '</div>' +
            '<div class="w3-row" style="margin-bottom:8px;"><label><input type="checkbox" id="ppSheet"> Also generate a 4x6in print sheet (multiple copies)</label></div>' +
            '<div style="margin-bottom:8px;"><button id="ppRun" type="button" class="w3-button w3-green" disabled>Generate photo</button> ' +
            '<a id="ppDl" class="w3-button w3-blue" style="display:none;">Download photo</a> ' +
            '<a id="ppDlSheet" class="w3-button w3-blue" style="display:none;">Download print sheet</a></div>' +
            '<div class="w3-row outputImgs" style="visibility:visible !important;"><canvas id="ppOutCanvas" style="max-width:90vw;border:1px solid #ddd;display:none;"></canvas></div>' +
            '<div id="ppStatus" style="min-height:1.2em;margin-top:6px;color:#555;">Choose a photo. Cropping happens locally - nothing is uploaded.</div>';

        var fileEl = root.querySelector('#ppFile'), presetEl = root.querySelector('#ppPreset'), zoomEl = root.querySelector('#ppZoom');
        var customWrap = root.querySelector('#ppCustomWrap'), customW = root.querySelector('#ppCustomW'), customH = root.querySelector('#ppCustomH');
        var stageWrap = root.querySelector('#ppStageWrap'), stage = root.querySelector('#ppStage'), stageCtx = stage.getContext('2d');
        var sheetChk = root.querySelector('#ppSheet');
        var runBtn = root.querySelector('#ppRun'), dl = root.querySelector('#ppDl'), dlSheet = root.querySelector('#ppDlSheet');
        var outCanvas = root.querySelector('#ppOutCanvas'), outCtx = outCanvas.getContext('2d');
        var statusEl = root.querySelector('#ppStatus');

        var STAGE_UNIT = 260; // preview canvas long-edge target, in CSS px
        var img = null, panX = 0, panY = 0, drawnW = 0, drawnH = 0, dragging = false, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;

        function setStatus(m) { statusEl.textContent = m; }
        function activePreset() {
            var p = ppPresetById(presetEl.value);
            if (p.id === 'custom') {
                var w = parseFloat(customW.value) || p.mmW, h = parseFloat(customH.value) || p.mmH;
                return { id: 'custom', label: p.label, mmW: w, mmH: h };
            }
            return p;
        }
        function stageSize() {
            var p = activePreset();
            var ratio = p.mmH / p.mmW;
            var w = STAGE_UNIT, h = Math.round(STAGE_UNIT * ratio);
            if (h > STAGE_UNIT * 1.6) { h = Math.round(STAGE_UNIT * 1.6); w = Math.round(h / ratio); }
            return { w: w, h: h };
        }
        function clampPan() {
            var minX = stage.width - drawnW, minY = stage.height - drawnH;
            if (panX > 0) panX = 0; if (panX < minX) panX = minX;
            if (panY > 0) panY = 0; if (panY < minY) panY = minY;
        }
        function redrawStage() {
            if (!img) return;
            stageCtx.clearRect(0, 0, stage.width, stage.height);
            stageCtx.fillStyle = '#fff';
            stageCtx.fillRect(0, 0, stage.width, stage.height);
            stageCtx.drawImage(img, panX, panY, drawnW, drawnH);
            // Rule-of-thirds style head-guide overlay, purely visual.
            stageCtx.strokeStyle = 'rgba(26,115,232,.55)'; stageCtx.lineWidth = 1;
            stageCtx.strokeRect(0.5, 0.5, stage.width - 1, stage.height - 1);
        }
        function applyZoom(zoom) {
            if (!img) return;
            var baseScale = Math.max(stage.width / img.naturalWidth, stage.height / img.naturalHeight);
            var scale = baseScale * zoom;
            var cx = panX + drawnW / 2, cy = panY + drawnH / 2;
            drawnW = img.naturalWidth * scale; drawnH = img.naturalHeight * scale;
            panX = cx - drawnW / 2; panY = cy - drawnH / 2;
            clampPan();
            redrawStage();
        }
        function resetStageForNewImage() {
            var s = stageSize();
            stage.width = s.w; stage.height = s.h; stage.style.width = s.w + 'px'; stage.style.height = s.h + 'px';
            var baseScale = Math.max(stage.width / img.naturalWidth, stage.height / img.naturalHeight);
            drawnW = img.naturalWidth * baseScale; drawnH = img.naturalHeight * baseScale;
            panX = (stage.width - drawnW) / 2; panY = (stage.height - drawnH) / 2;
            zoomEl.value = '1'; zoomEl.disabled = false;
            clampPan();
            redrawStage();
        }

        fileEl.addEventListener('change', function () {
            dl.style.display = 'none'; dlSheet.style.display = 'none'; outCanvas.style.display = 'none';
            var f = fileEl.files && fileEl.files[0]; if (!f) return;
            var url = URL.createObjectURL(f);
            var im = new Image();
            im.onload = function () {
                img = im; stageWrap.style.display = ''; runBtn.disabled = false;
                resetStageForNewImage();
                setStatus('Drag to position the face, then click Generate photo.');
            };
            im.onerror = function () { setStatus('Could not read that image.'); };
            im.src = url;
        });
        presetEl.addEventListener('change', function () {
            customWrap.style.display = (presetEl.value === 'custom') ? '' : 'none';
            if (img) resetStageForNewImage();
        });
        customW.addEventListener('input', function () { if (img && presetEl.value === 'custom') resetStageForNewImage(); });
        customH.addEventListener('input', function () { if (img && presetEl.value === 'custom') resetStageForNewImage(); });
        zoomEl.addEventListener('input', function () { applyZoom(parseFloat(zoomEl.value) || 1); });

        function pointerXY(e) {
            var r = stage.getBoundingClientRect();
            var cx = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
            var cy = (e.touches && e.touches[0]) ? e.touches[0].clientY : e.clientY;
            return { x: (cx - r.left) * (stage.width / r.width), y: (cy - r.top) * (stage.height / r.height) };
        }
        function dragStart(e) {
            if (!img) return;
            dragging = true; var p = pointerXY(e); dragStartX = p.x; dragStartY = p.y; panStartX = panX; panStartY = panY;
            if (e.preventDefault) e.preventDefault();
        }
        function dragMove(e) {
            if (!dragging) return;
            var p = pointerXY(e);
            panX = panStartX + (p.x - dragStartX); panY = panStartY + (p.y - dragStartY);
            clampPan(); redrawStage();
            if (e.preventDefault) e.preventDefault();
        }
        function dragEnd() { dragging = false; }
        stage.addEventListener('mousedown', dragStart); stage.addEventListener('mousemove', dragMove);
        window.addEventListener('mouseup', dragEnd);
        stage.addEventListener('touchstart', dragStart, { passive: false }); stage.addEventListener('touchmove', dragMove, { passive: false });
        window.addEventListener('touchend', dragEnd);

        function renderFinalTo(ctx2, w, h, outScale) {
            ctx2.fillStyle = '#fff'; ctx2.fillRect(0, 0, w, h);
            ctx2.drawImage(img, panX * outScale, panY * outScale, drawnW * outScale, drawnH * outScale);
        }
        runBtn.addEventListener('click', function () {
            if (!img) { setStatus('Choose a photo first.'); return; }
            var p = activePreset();
            var targetW = ppMmToPx(p.mmW), targetH = ppMmToPx(p.mmH);
            var outScale = targetW / stage.width;
            outCanvas.width = targetW; outCanvas.height = targetH; outCanvas.style.display = '';
            renderFinalTo(outCtx, targetW, targetH, outScale);
            outCanvas.toBlob(function (blob) {
                if (!blob) { setStatus('This browser could not encode the photo.'); return; }
                var u = URL.createObjectURL(blob);
                dl.href = u; dl.download = 'passport-photo-' + p.id + '.jpg'; dl.style.display = ''; dl.textContent = 'Download photo (' + targetW + '×' + targetH + 'px)';
                var doneMsg = 'Cropped to ' + p.label + ' (' + targetW + '×' + targetH + 'px @ 300 DPI), white background, locally - no upload.';
                if (sheetChk.checked) {
                    var sheetW = ppMmToPx(101.6), sheetH = ppMmToPx(152.4); // 4x6 in
                    var margin = Math.round(PP_DPI * 0.08), gap = Math.round(PP_DPI * 0.04);
                    var cols = Math.max(1, Math.floor((sheetW - margin * 2 + gap) / (targetW + gap)));
                    var rows = Math.max(1, Math.floor((sheetH - margin * 2 + gap) / (targetH + gap)));
                    var sheetCanvas = document.createElement('canvas'); sheetCanvas.width = sheetW; sheetCanvas.height = sheetH;
                    var sctx = sheetCanvas.getContext('2d');
                    sctx.fillStyle = '#fff'; sctx.fillRect(0, 0, sheetW, sheetH);
                    for (var r = 0; r < rows; r++) {
                        for (var c = 0; c < cols; c++) {
                            var x = margin + c * (targetW + gap), y = margin + r * (targetH + gap);
                            sctx.drawImage(outCanvas, x, y, targetW, targetH);
                            sctx.strokeStyle = '#ccc'; sctx.lineWidth = 1; sctx.strokeRect(x + 0.5, y + 0.5, targetW - 1, targetH - 1);
                        }
                    }
                    sheetCanvas.toBlob(function (sblob) {
                        if (!sblob) return;
                        var su = URL.createObjectURL(sblob);
                        dlSheet.href = su; dlSheet.download = 'passport-photo-sheet-' + p.id + '.jpg'; dlSheet.style.display = '';
                        dlSheet.textContent = 'Download print sheet (' + (cols * rows) + ' copies, 4×6in)';
                        setStatus(doneMsg + ' Print sheet: ' + (cols * rows) + ' copies on one 4×6in page.');
                    }, 'image/jpeg', 0.92);
                } else {
                    setStatus(doneMsg);
                }
            }, 'image/jpeg', 0.92);
        });
    }

    function doAfterPageRendered() {
        var root = document.getElementById('imageConverterTool');
        if (!root) return; // not an image-converter page
        if (IC_PASSPORT) { icRenderPassportMode(root); return; }
        var fixed = icTargetFromSlug(IC_SLUG);
        var fmtOptions = ['png', 'jpg', 'webp', 'avif'].map(function (f) { return '<option value="' + f + '"' + (f === fixed ? ' selected' : '') + '>' + f.toUpperCase() + '</option>'; }).join('');
        root.innerHTML =
            '<div class="w3-row" style="margin-bottom:8px;"><input type="file" id="icFile" accept="image/*" class="w3-input w3-border" style="max-width:420px;margin:0 auto;"></div>' +
            '<div class="w3-row" style="margin-bottom:8px;">Convert to ' +
            '<select id="icFmt" class="w3-select w3-border" style="width:auto;display:inline-block;"' + (fixed ? ' disabled' : '') + '>' + fmtOptions + '</select>' +
            ' <span id="icQ" style="' + (fixed === 'jpg' || fixed === 'webp' || !fixed ? '' : 'display:none;') + '">Quality <input id="icQual" type="range" min="0.3" max="1" step="0.05" value="0.9" style="vertical-align:middle;"></span></div>' +
            '<div style="margin-bottom:8px;"><button id="icRun" type="button" class="w3-button w3-green" disabled>Convert</button> ' +
            '<a id="icDl" class="w3-button w3-blue" style="display:none;">Download</a></div>' +
            '<div class="w3-row outputImgs" style="visibility:visible !important;"><canvas id="icCanvas" style="max-width:90vw;border:1px solid #ddd;"></canvas></div>' +
            '<div id="icStatus" style="min-height:1.2em;margin-top:6px;color:#555;">Choose an image. It is converted locally - nothing is uploaded.</div>';
        var fileEl = root.querySelector('#icFile'), fmtEl = root.querySelector('#icFmt'), qualEl = root.querySelector('#icQual');
        var runBtn = root.querySelector('#icRun'), dl = root.querySelector('#icDl'), canvas = root.querySelector('#icCanvas'), ctx = canvas.getContext('2d');
        var statusEl = root.querySelector('#icStatus'), qWrap = root.querySelector('#icQ');
        var loaded = null, url = null;
        function setStatus(m) { statusEl.textContent = m; }
        function fmt() { return fixed || fmtEl.value; }
        function syncQ() { var f = fmt(); if (qWrap) qWrap.style.display = (f === 'jpg' || f === 'webp' || f === 'avif') ? '' : 'none'; }
        fileEl.addEventListener('change', function () {
            if (dl) dl.style.display = 'none';
            var f = fileEl.files && fileEl.files[0]; if (!f) return;
            if (url) URL.revokeObjectURL(url); url = URL.createObjectURL(f);
            var img = new Image();
            img.onload = function () { loaded = img; canvas.width = img.naturalWidth; canvas.height = img.naturalHeight; ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); runBtn.disabled = false; setStatus('Preview ready. Click Convert.'); };
            img.onerror = function () { setStatus('Could not read that image.'); };
            img.src = url;
        });
        if (fmtEl) fmtEl.addEventListener('change', syncQ);
        runBtn.addEventListener('click', function () {
            if (!loaded) { setStatus('Choose an image first.'); return; }
            var f = fmt(), mime = IC_MIME[f] || 'image/png';
            // JPEG has no alpha - paint white behind transparent pixels.
            if (f === 'jpg') { var t = ctx.getImageData(0, 0, canvas.width, canvas.height); ctx.save(); ctx.globalCompositeOperation = 'destination-over'; ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.restore(); void t; }
            var q = (qualEl && (f === 'jpg' || f === 'webp' || f === 'avif')) ? parseFloat(qualEl.value) : undefined;
            canvas.toBlob(function (blob) {
                if (!blob) { setStatus('This browser cannot encode ' + f.toUpperCase() + ' on canvas. Try PNG/JPEG/WebP.'); return; }
                var u = URL.createObjectURL(blob);
                var base = ((fileEl.files[0] && fileEl.files[0].name) || 'image').replace(/\.[^.]+$/, '');
                dl.href = u; dl.download = base + '.' + f; dl.style.display = ''; dl.textContent = 'Download .' + f;
                setStatus('Converted to ' + f.toUpperCase() + ' locally - no upload. ' + Math.round(blob.size / 1024) + ' KB.');
            }, mime, q);
        });
        syncQ();
    }
</script>
