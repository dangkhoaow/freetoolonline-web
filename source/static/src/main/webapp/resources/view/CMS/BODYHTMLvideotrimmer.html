<div class='w3-container'>
    <div class='w3-row w3-padding-small ffmpeg-edit-options' style='margin-bottom:8px'>
        <div class='w3-col m6'>
            <label for='ffmpegTrimStart'><b>Start time (mm:ss or seconds):</b></label>
            <input type='text' id='ffmpegTrimStart' class='w3-input w3-border' placeholder='0:00' value='0:00' style='max-width:200px'>
        </div>
        <div class='w3-col m6'>
            <label for='ffmpegTrimEnd'><b>End time (mm:ss or seconds, blank = end of file):</b></label>
            <input type='text' id='ffmpegTrimEnd' class='w3-input w3-border' placeholder='e.g. 1:30' style='max-width:200px'>
        </div>
    </div>

    <div class='w3-row'>
        <p class='w3-small w3-text-grey ffmpeg-status' style='margin:8px 0;display:none'></p>
    </div>

    <div class='w3-row outputImgs'>
        <div class="w3-col m2 col1"></div>
        <div class="w3-col m2 col2"></div>
        <div class="w3-col m2 col3"></div>
        <div class="w3-col m2 col4"></div>
        <div class="w3-col m2 col5"></div>
        <div class="w3-col m2 col6"></div>
    </div>
</div>

<div class="w3-container w3-padding-small" style="margin-top:8px">
    <p>Upload the file, enter a start and end time in seconds or mm:ss format (for example 90 or 1:30), and click Download once the status line reads Done. Leave the end time blank to trim from the start time to the end of the file.</p>
</div>
