<script>
    // 3D scene archetype skeleton (mars-terrain fire30) - vendored three.js (ESM, dynamic
    // import from /vendor/three/, NO CDN), fully client-side. Registry Gate-H
    // entry: three_3d_scene_vendored. ONE skeleton serves the 3D family; the
    // scene is dispatched from the slug: voxel (block-building sandbox game),
    // solar (solar system explorer), blackhole (black hole visualization),
    // galaxy (spiral galaxy). All geometry is procedural - no model files, no
    // textures fetched. The space scenes are EDUCATIONAL APPROXIMATIONS, not
    // physical simulations; scales are compressed and the info panel says so.
    //
    // A visible wrapper + "Loading 3D engine..." placeholder renders
    // synchronously (G16 render-only pass); the ~0.7 MB engine lazy-loads
    // post-paint via requestIdleCallback and is cached by the browser.
    // Fullscreen targets the WRAPPER div (controls stay visible).
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    var T3D_SLUG = 'venus-retrograde-rotation';
    var T3D_STORE_KEY = 'ftol-game-' + T3D_SLUG;

    function t3dDetectScene(slug) {
        var s = String(slug || '').toLowerCase();
        if (/voxel|builder|block/.test(s)) return 'voxel';
        if (/tides.?earth.?moon|earth.?moon.?tide|ocean.?tide.?bulge|tidal.?bulge/.test(s)) return 'tidesearthmoon';
        if (/solar.?wind|heliosphere|heliopause|termination.?shock|voyager.?1.?helios/.test(s)) return 'solarwindheliosphere';
        if (/escape.?velocity|escapevelocity/.test(s)) return 'escapevelocity';
        if (/hohmann|transfer.?orbit|leo.?to.?geo|delta.?v.?transfer|two.?burn/.test(s)) return 'hohmanntransfer';
        if (/binary.?star|sirius|alpha.?cen|barycenter|visual.?binary/.test(s)) return 'binarystarsystem';
        if (/galilean|io.?europa|jupiter.?moon|callisto|ganymede/.test(s)) return 'galileanmoons';
        if (/mars.?terrain|mola|mars.?elevation|mars.?relief|olympus.?mons|hellas.?planitia/.test(s)) return 'marsterrain';
        if (/^aurora$|auroral|aurora.?oval|ovation|kp.?index|geomagnetic.?storm.?aurora/.test(s)) return 'aurora';
        if (/sidereal.?vs.?solar|sidereal.?day|mean.?solar.?day|solar.?day.?vs/.test(s)) return 'siderealvssolarday';
        if (/black.?body|wien.?law|planck.?curve|spectral.?type.?temp/.test(s)) return 'blackbodyradiation';
        if (/constellation.?sphere|iau.?constellation|celestial.?sphere.?stars|asterism.?map/.test(s)) return 'constellationsphere';
        if (/gravity.?well|escape.?veloc|potential.?well|embedding.?diagram/.test(s)) return 'gravitywell';
        if (/ecliptic.?zodiac|zodiac.?ecliptic|ophiuchus|obliquity/.test(s)) return 'eclipticzodiac';
                                                                        if (/planetary.?nebula|planetarynebula|ring.?nebula.?m57/.test(s)) return 'planetarynebula';
        if (/supernova.?remnant|supernovaremnant|crab.?nebula.?remnant/.test(s)) return 'supernovaremnant';
        if (/saturn.?hexagon|saturnhexagon|polar.?hexagon.?saturn/.test(s)) return 'saturnhexagon';
        if (/solar.?analemma|analemma|equation.?of.?time.?analemma/.test(s)) return 'solaranalemma';
        if (/roche.?limit|rochelimit|tidal.?disruption.?limit/.test(s)) return 'rochelimit';
        if (/uranus.?tilt|uranustilt|uranus.?obliqu|sideways.?planet/.test(s)) return 'uranustilt';
        if (/sunspot.?cycle|sunspotcycle|schwabe|maunder.?minimum|solar.?activity.?cycle/.test(s)) return 'sunspotcycle';
        if (/magnetosphere|earth.?magnet|dipole.?field.?earth|magnetopause/.test(s)) return 'earthmagnetosphere';
        if (/orbital.?velocity|orbitalvelocity|vis.?viva|periapsis.?speed/.test(s)) return 'orbitalvelocity';
        if (/sun.?structure|sunstructure|solar.?interior|photosphere|radiative.?zone|convective.?zone|solar.?core/.test(s)) return 'sunstructure';
        if (/hr.?diagram|hertzsprung|hr.?locus|main.?sequence.?band/.test(s)) return 'hrdiagram';
        if (/precession|equinoxes|polaris.?vega|axial.?precession/.test(s)) return 'precessionequinoxes';
        if (/cosmic.?distance|distance.?ladder|parsec|light.?year.?scale/.test(s)) return 'cosmicdistanceladder';
        if (/parallax.?distance|stellar.?parallax|parsec|proxima.?parallax/.test(s)) return 'parallaxdistance';
        if (/stellar.?magnitude|apparent.?magnitude|absolute.?magnitude|pogson/.test(s)) return 'stellarmagnitude';
        if (/orbital.?resonance|laplace|io.?europa|ganymede.?resonance|mean.?motion/.test(s)) return 'orbitalresonance';
        if (/gas.?giant|great.?red.?spot|jupiter.?band|banded.?atmosphere/.test(s)) return 'gasgiantatmosphere';
        if (/neutron.?star|pulsar|lighthouse.?beam/.test(s)) return 'neutronstarpulsar';
        if (/lagrange|l1|l2|jwst|soho/.test(s)) return 'lagrangepoints';
        if (/milky.?way|orion.?arm|perseus.?arm|sagittarius.?arm/.test(s)) return 'milkywaymap';
                if (/venus.?retrograde|venusretrograderotation/.test(s)) return 'venusretrograderotation';
        if (/retrograde|mars.?loop|synodic/.test(s)) return 'retrogrademotion';
        if (/season.?earth|axial.?tilt|solstice|equinox|seasons/.test(s)) return 'seasonsearth';
        if (/comet.?orbit|halley|comet/.test(s)) return 'cometorbit';
        if (/asteroid.?belt|kirkwood|ceres/.test(s)) return 'asteroidbelt';
        if (/tidal.?lock|synchronous.?rotat/.test(s)) return 'tidallocking';
        if (/exoplanet|transit|light.?curve/.test(s)) return 'exoplanettransit';
        if (/star.*lifecycle|lifecycle.*star|starlifecycle/.test(s)) return 'starlifecycle';
        if (/planet.*size|size.*comparison|planetsize/.test(s)) return 'planetsizecomparison';
        if (/solar.*eclipse|eclipse.*solar/.test(s)) return 'solareclipse';
        if (/lunar.*eclipse|eclipse.*lunar/.test(s)) return 'lunareclipse';
        if (/iss|orbit.*tracker/.test(s)) return 'issorbittracker';
        if (/moon.*calendar|calendar.*moon/.test(s)) return 'mooncalendar3d';
        if (/moon.*phase|phases-3d/.test(s)) return 'moonphases3d';
        if (/kepler|kepler-orbits/.test(s)) return 'keplerorbits';
        if (/saturn|rings/.test(s)) return 'saturnrings';
        if (/solar|planet/.test(s)) return 'solar';
        if (/black/.test(s)) return 'blackhole';
        if (/galaxy/.test(s)) return 'galaxy';
        return 'solar';
    }

    // ---- vendored ESM loader (ftoLoadPdfLib shape, but a cached import()) ----
    function ftoLoadThree() {
        if (window.__ftoThreePromise) { return window.__ftoThreePromise; }
        var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/three';
        window.__ftoThreePromise = import(base + '/three.module.min.js').then(function (mod) {
            if (!mod || !mod.WebGLRenderer) { throw new Error('three.js loaded but WebGLRenderer is missing'); }
            return mod;
        });
        return window.__ftoThreePromise;
    }

    function t3dStatus(text) {
        var el = document.getElementById('t3dStatus');
        if (el) el.textContent = text;
    }
    function t3dInfo(html) {
        var el = document.getElementById('t3dInfoPanel');
        if (el) el.innerHTML = html;
    }
    function t3dLoadStore() {
        try { return JSON.parse(localStorage.getItem(T3D_STORE_KEY) || '{}') || {}; }
        catch (e) { return {}; }
    }
    function t3dSaveStore(obj) {
        try { localStorage.setItem(T3D_STORE_KEY, JSON.stringify(obj)); }
        catch (e) { t3dStatus('Could not save to browser storage (quota or private mode) - building still works.'); }
    }
    function t3dFullscreen(el) {
        if (el.requestFullscreen) { el.requestFullscreen(); }
        else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
        else if (el.mozRequestFullScreen) { el.mozRequestFullScreen(); }
        else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
    }

    // ---- shared scene shell: renderer + camera + custom pointer-orbit --------
    // OrbitControls is NOT vendored (jsm addons import the bare 'three'
    // specifier); this ~40-line orbit covers drag-rotate + wheel/pinch zoom
    // with damping and a clamped pitch.
    function t3dShell(THREE, host, opts) {
        var coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        var low = coarse || ((navigator.hardwareConcurrency || 4) <= 4);
        var renderer = new THREE.WebGLRenderer({ antialias: !low, powerPreference: 'default' });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(opts.fov || 55, 1, 0.1, 4000);
        var orbit = {
            target: new THREE.Vector3(0, opts.targetY || 0, 0),
            radius: opts.radius, theta: opts.theta || 0.6, phi: opts.phi || 1.15,
            goalRadius: opts.radius, goalTheta: opts.theta || 0.6, goalPhi: opts.phi || 1.15,
            minR: opts.minR || 4, maxR: opts.maxR || 400,
        };
        function applyCamera() {
            // critically-damped-ish lerp toward the goal orbit
            orbit.theta += (orbit.goalTheta - orbit.theta) * 0.14;
            orbit.phi += (orbit.goalPhi - orbit.phi) * 0.14;
            orbit.radius += (orbit.goalRadius - orbit.radius) * 0.14;
            var sp = Math.sin(orbit.phi), cp = Math.cos(orbit.phi);
            camera.position.set(
                orbit.target.x + orbit.radius * sp * Math.sin(orbit.theta),
                orbit.target.y + orbit.radius * cp,
                orbit.target.z + orbit.radius * sp * Math.cos(orbit.theta)
            );
            camera.lookAt(orbit.target);
        }
        function size() {
            var w = Math.max(260, host.clientWidth);
            var h = Math.round(w * 0.62);
            var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
            if (fsEl && fsEl.contains(host)) { h = Math.max(240, (window.innerHeight || h) - 150); }
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        host.appendChild(renderer.domElement);
        renderer.domElement.style.touchAction = 'none';
        renderer.domElement.style.borderRadius = '6px';
        // pointer-orbit input
        var drag = null, pinch = null, moved = 0;
        host.addEventListener('pointerdown', function (e) {
            drag = { x: e.clientX, y: e.clientY }; moved = 0;
            host.setPointerCapture && host.setPointerCapture(e.pointerId);
        });
        host.addEventListener('pointermove', function (e) {
            if (!drag) return;
            var dx = e.clientX - drag.x, dy = e.clientY - drag.y;
            moved += Math.abs(dx) + Math.abs(dy);
            drag = { x: e.clientX, y: e.clientY };
            orbit.goalTheta -= dx * 0.006;
            orbit.goalPhi = Math.min(Math.max(orbit.goalPhi - dy * 0.005, 0.15), Math.PI - 0.2);
        });
        host.addEventListener('pointerup', function (e) {
            var wasClick = moved < 8;
            drag = null;
            if (wasClick && shell.onClick) { shell.onClick(e); }
        });
        host.addEventListener('wheel', function (e) {
            e.preventDefault();
            orbit.goalRadius = Math.min(Math.max(orbit.goalRadius * (e.deltaY > 0 ? 1.12 : 0.9), orbit.minR), orbit.maxR);
        }, { passive: false });
        host.addEventListener('touchstart', function (e) {
            if (e.touches.length === 2) {
                pinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        }, { passive: true });
        host.addEventListener('touchmove', function (e) {
            if (e.touches.length === 2 && pinch) {
                var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                orbit.goalRadius = Math.min(Math.max(orbit.goalRadius * (pinch / d), orbit.minR), orbit.maxR);
                pinch = d;
            }
        }, { passive: true });
        window.addEventListener('resize', size);
        document.addEventListener('fullscreenchange', size);
        document.addEventListener('webkitfullscreenchange', size);
        size();
        var shell = {
            THREE: THREE, renderer: renderer, scene: scene, camera: camera,
            orbit: orbit, low: low, applyCamera: applyCamera, size: size, onClick: null,
            ndc: function (e) {
                var r = renderer.domElement.getBoundingClientRect();
                return new THREE.Vector2(((e.clientX - r.left) / r.width) * 2 - 1, -((e.clientY - r.top) / r.height) * 2 + 1);
            },
        };
        return shell;
    }

    // ================= SOLAR SYSTEM ==========================================
    // Display scale is COMPRESSED (planet sizes ~1000x vs distances) so all 8
    // planets fit one screen; the facts table carries the real figures.
    var T3D_PLANETS = [
        { name: 'Mercury', color: 0x9e9e9e, r: 0.9, orbit: 16, periodDays: 88, realKm: 4879, au: 0.39 },
        { name: 'Venus', color: 0xffcc80, r: 1.4, orbit: 22, periodDays: 225, realKm: 12104, au: 0.72 },
        { name: 'Earth', color: 0x42a5f5, r: 1.5, orbit: 29, periodDays: 365, realKm: 12756, au: 1.0 },
        { name: 'Mars', color: 0xef5350, r: 1.1, orbit: 36, periodDays: 687, realKm: 6792, au: 1.52 },
        { name: 'Jupiter', color: 0xd7a86e, r: 4.4, orbit: 50, periodDays: 4333, realKm: 142984, au: 5.2 },
        { name: 'Saturn', color: 0xf0e0a2, r: 3.8, orbit: 64, periodDays: 10756, realKm: 120536, au: 9.58 },
        { name: 'Uranus', color: 0x80deea, r: 2.4, orbit: 76, periodDays: 30687, realKm: 51118, au: 19.2 },
        { name: 'Neptune', color: 0x5c6bc0, r: 2.3, orbit: 86, periodDays: 60190, realKm: 49528, au: 30.05 },
    ];
    function t3dSolar(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        scene.add(new THREE.AmbientLight(0xffffff, 0.35));
        var sunLight = new THREE.PointLight(0xfff3d0, 1400, 0, 1.8);
        scene.add(sunLight);
        var sun = new THREE.Mesh(new THREE.SphereGeometry(7, 32, 16), new THREE.MeshBasicMaterial({ color: 0xffd54f }));
        sun.userData = { kind: 'sun' };
        scene.add(sun);
        var planets = [];
        for (var i = 0; i < T3D_PLANETS.length; i++) {
            var p = T3D_PLANETS[i];
            var mesh = new THREE.Mesh(
                new THREE.SphereGeometry(p.r, 24, 12),
                new THREE.MeshLambertMaterial({ color: p.color })
            );
            mesh.userData = { kind: 'planet', idx: i, angle: Math.random() * Math.PI * 2 };
            scene.add(mesh);
            var ring = new THREE.Mesh(
                new THREE.TorusGeometry(p.orbit, 0.06, 6, 96),
                new THREE.MeshBasicMaterial({ color: 0x37474f })
            );
            ring.rotation.x = Math.PI / 2;
            scene.add(ring);
            if (p.name === 'Saturn') {
                var sr = new THREE.Mesh(new THREE.TorusGeometry(p.r * 1.8, 0.35, 6, 48), new THREE.MeshLambertMaterial({ color: 0xd8cba8 }));
                sr.rotation.x = Math.PI / 2.4;
                mesh.add(sr);
            }
            planets.push(mesh);
        }
        var speedEl = document.getElementById('t3dSpeed');
        var paused = false;
        var pauseBtn = document.getElementById('t3dPauseBtn');
        if (pauseBtn) pauseBtn.addEventListener('click', function () { paused = !paused; pauseBtn.textContent = paused ? 'Resume orbits' : 'Pause orbits'; });
        function facts(idx) {
            if (idx === -1) {
                t3dInfo('<h3>The Sun</h3><p>A main-sequence star holding 99.8 percent of the solar system\'s mass. Diameter about 1,392,000 km - 109 Earths across.</p><p class="t3d-note">Scale note: sizes and distances on screen are compressed so all eight planets fit one view; the numbers here are the real ones.</p>');
                return;
            }
            var p = T3D_PLANETS[idx];
            var period = p.periodDays >= 1000 ? (p.periodDays / 365.25).toFixed(1) + ' years' : p.periodDays + ' days';
            t3dInfo('<h3>' + p.name + '</h3><table class="w3-table w3-bordered"><tr><td>Diameter</td><td>' + p.realKm.toLocaleString('en-US') + ' km</td></tr><tr><td>Distance from sun</td><td>' + p.au + ' AU</td></tr><tr><td>Orbital period</td><td>' + period + '</td></tr></table><p class="t3d-note">On-screen sizes and distances are compressed for readability - this table has the real figures.</p>');
        }
        facts(-1);
        var ray = new THREE.Raycaster();
        shell.onClick = function (e) {
            ray.setFromCamera(shell.ndc(e), shell.camera);
            var hits = ray.intersectObjects([sun].concat(planets), false);
            if (!hits.length) return;
            var u = hits[0].object.userData;
            facts(u.kind === 'sun' ? -1 : u.idx);
        };
        return function animate(dt) {
            if (paused) return;
            var mult = speedEl ? parseFloat(speedEl.value || '1') : 1;
            for (var i = 0; i < planets.length; i++) {
                var mesh = planets[i], p = T3D_PLANETS[i];
                // one real Earth year = ~12 on-screen seconds at 1x
                mesh.userData.angle += (dt / 1000) * (365.25 / p.periodDays) * mult * (Math.PI * 2 / 12);
                mesh.position.set(Math.cos(mesh.userData.angle) * p.orbit, 0, Math.sin(mesh.userData.angle) * p.orbit);
                mesh.rotation.y += dt * 0.0004;
            }
        };
    }

    // ================= LUNAR ECLIPSE =============================================
    // Sun-Earth-Moon alignment with umbra/penumbra shadow on the Moon - educational, not ephemeris.
    var T3D_TOTality_MAX_MIN = 107;
    var T3D_DANJON = [
        { l: 'L0', label: 'L0 - very dark', color: 0x1a1010 },
        { l: 'L1', label: 'L1 - dark gray-brown', color: 0x3d2820 },
        { l: 'L2', label: 'L2 - rust red', color: 0x6b3028 },
        { l: 'L3', label: 'L3 - brick red', color: 0x8b3a30 },
        { l: 'L4', label: 'L4 - copper-red', color: 0xa84838 }
    ];
    function t3dLunarEclipse(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x020408, 1);
        scene.add(new THREE.AmbientLight(0x222233, 0.2));
        var sunPos = new THREE.Vector3(-90, 8, 0);
        var sunLight = new THREE.DirectionalLight(0xfff4e0, 1.4);
        sunLight.position.copy(sunPos);
        scene.add(sunLight);
        var sunMesh = new THREE.Mesh(
            new THREE.SphereGeometry(6, 24, 16),
            new THREE.MeshBasicMaterial({ color: 0xffdd66 })
        );
        sunMesh.position.copy(sunPos);
        scene.add(sunMesh);
        var earthR = 10;
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(earthR, 48, 32),
            new THREE.MeshPhongMaterial({ color: 0x2e7d9a, emissive: 0x081018, shininess: 10 })
        );
        scene.add(earth);
        var umbraGeo = new THREE.ConeGeometry(earthR * 0.85, 55, 24, 1, true);
        var umbra = new THREE.Mesh(umbraGeo, new THREE.MeshBasicMaterial({ color: 0x050508, transparent: true, opacity: 0.35, depthWrite: false }));
        umbra.rotation.z = -Math.PI / 2;
        umbra.position.set(earthR * 0.5, 0, 0);
        scene.add(umbra);
        var penumbraGeo = new THREE.ConeGeometry(earthR * 1.35, 58, 24, 1, true);
        var penumbra = new THREE.Mesh(penumbraGeo, new THREE.MeshBasicMaterial({ color: 0x1a1a28, transparent: true, opacity: 0.18, depthWrite: false }));
        penumbra.rotation.z = -Math.PI / 2;
        penumbra.position.set(earthR * 0.5, 0, 0);
        scene.add(penumbra);
        var moonMat = new THREE.MeshLambertMaterial({ color: 0xcfd8dc });
        var moon = new THREE.Mesh(new THREE.SphereGeometry(4.5, 40, 28), moonMat);
        scene.add(moon);
        var progress = 0.35;
        var playing = false;
        var danjonIdx = 2;
        function moonShadowFactor(pos) {
            var toSun = sunPos.clone().sub(pos).normalize();
            var toEarth = earth.position.clone().sub(pos);
            var along = toSun.dot(toEarth);
            if (along <= 0) return 1;
            var closest = pos.clone().add(toSun.clone().multiplyScalar(along));
            var dist = closest.distanceTo(earth.position);
            var umbraEdge = earthR * 0.92;
            var penEdge = earthR * 1.38;
            if (dist < umbraEdge) return Math.max(0.02, dist / umbraEdge * 0.25);
            if (dist < penEdge) return 0.25 + 0.75 * ((dist - umbraEdge) / (penEdge - umbraEdge));
            return 1;
        }
        function phaseName(t, shade) {
            if (shade > 0.85) return 'Full moon (outside shadow)';
            if (shade > 0.55) return 'Penumbral eclipse';
            if (shade > 0.2) return 'Partial umbral eclipse';
            return 'Total eclipse (Danjon ' + T3D_DANJON[danjonIdx].l + ')';
        }
        function setProgress(t) {
            progress = Math.max(0, Math.min(1, t));
            var z = (progress - 0.5) * 28;
            moon.position.set(earthR + 22, 0, z);
            var shade = moonShadowFactor(moon.position);
            if (shade < 0.25) {
                var dj = T3D_DANJON[danjonIdx];
                moonMat.color.setHex(dj.color);
                moonMat.emissive.setHex(dj.color);
                moonMat.emissiveIntensity = 0.35;
            } else {
                moonMat.emissive.setHex(0x000000);
                moonMat.emissiveIntensity = 0;
                moonMat.color.setRGB(0.75 + shade * 0.2, 0.78 + shade * 0.15, 0.82 + shade * 0.1);
            }
            var label = document.getElementById('t3dEclipseProgressLabel');
            if (label) label.textContent = Math.round(progress * 100) + '%';
            var slider = document.getElementById('t3dEclipseProgress');
            if (slider && parseFloat(slider.value) !== progress * 100) slider.value = String(progress * 100);
            t3dInfo('<h3>' + phaseName(progress, shade) + '</h3><p>The Moon passes through Earth\'s penumbra (partial dimming) and umbra (full shadow) when Sun, Earth, and Moon align near a orbital node. The reddish totality is sunlight refracted through Earth\'s atmosphere - the Danjon scale rates its brightness.</p><table class="w3-table w3-bordered"><tr><td>Maximum totality duration</td><td>up to ' + T3D_TOTality_MAX_MIN + ' min</td></tr><tr><td>Danjon scale</td><td>L0 (darkest) through L4 (brightest copper-red)</td></tr><tr><td>Node alignment</td><td>Required - Moon must cross the ecliptic plane near full moon</td></tr><tr><td>Selected Danjon</td><td>' + T3D_DANJON[danjonIdx].label + '</td></tr></table><p class="t3d-note">Educational geometry visualization - not matched to tonight\'s sky or a specific eclipse date. This is not a physical simulation.</p>');
        }
        setProgress(progress);
        var playBtn = document.getElementById('t3dEclipsePlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () { playing = !playing; playBtn.textContent = playing ? 'Pause eclipse' : 'Play eclipse'; });
        var slider = document.getElementById('t3dEclipseProgress');
        if (slider) slider.addEventListener('input', function () { playing = false; if (playBtn) playBtn.textContent = 'Play eclipse'; setProgress(parseFloat(slider.value || '0') / 100); });
        T3D_DANJON.forEach(function (dj, i) {
            var btn = document.getElementById('t3dDanjonBtn-' + i);
            if (btn) btn.addEventListener('click', function () {
                danjonIdx = i;
                T3D_DANJON.forEach(function (_, j) {
                    var b = document.getElementById('t3dDanjonBtn-' + j);
                    if (b) b.className = 'w3-button ' + (j === danjonIdx ? 'w3-amber' : 'w3-light-grey');
                });
                setProgress(progress);
            });
        });
        t3dStatus('Drag to orbit the view, scroll to zoom. Scrub eclipse progress or press Play eclipse.');
        return function animate(dt) {
            if (!playing) return;
            setProgress(progress + (dt / 1000) * 0.08);
            if (progress >= 1) setProgress(0);
        };
    }

    // ================= SOLAR ECLIPSE =========================================
    // Moon umbra cone on Earth - educational geometry, not live ephemeris.
    var T3D_SUN_APPARENT_DEG = 0.53;
    var T3D_MOON_APPARENT_DEG = 0.52;
    var T3D_UMBRA_MIN_KM = 100;

    function t3dSolarEclipse(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x020408, 1);
        scene.add(new THREE.AmbientLight(0x334455, 0.3));
        var sunPos = new THREE.Vector3(-95, 6, 0);
        var sunLight = new THREE.DirectionalLight(0xfff4e0, 1.35);
        sunLight.position.copy(sunPos);
        scene.add(sunLight);
        var sunMesh = new THREE.Mesh(
            new THREE.SphereGeometry(7, 28, 18),
            new THREE.MeshBasicMaterial({ color: 0xffdd66 })
        );
        sunMesh.position.copy(sunPos);
        scene.add(sunMesh);
        var earthR = 12;
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(earthR, 56, 36),
            new THREE.MeshPhongMaterial({ color: 0x2e7d9a, emissive: 0x081018, shininess: 10 })
        );
        scene.add(earth);
        var atmos = new THREE.Mesh(
            new THREE.SphereGeometry(earthR * 1.015, 40, 28),
            new THREE.MeshBasicMaterial({ color: 0x66aaff, transparent: true, opacity: 0.1, depthWrite: false })
        );
        scene.add(atmos);
        var moonR = 3.2;
        var moon = new THREE.Mesh(
            new THREE.SphereGeometry(moonR, 32, 20),
            new THREE.MeshLambertMaterial({ color: 0xb0bec5 })
        );
        scene.add(moon);
        var umbraGeo = new THREE.ConeGeometry(moonR * 0.55, 42, 20, 1, true);
        var umbra = new THREE.Mesh(umbraGeo, new THREE.MeshBasicMaterial({ color: 0x050508, transparent: true, opacity: 0.4, depthWrite: false }));
        umbra.rotation.z = -Math.PI / 2;
        umbra.position.set(-moonR * 0.3, 0, 0);
        moon.add(umbra);
        var pathPts = [];
        for (var i = 0; i <= 64; i++) {
            var t = (i / 64) * Math.PI - Math.PI / 2;
            var lat = Math.sin(t) * 0.55;
            var lon = t * 1.4;
            var cl = Math.cos(lat);
            pathPts.push(new THREE.Vector3(
                Math.cos(lon) * cl * earthR * 1.002,
                Math.sin(lat) * earthR * 1.002,
                Math.sin(lon) * cl * earthR * 1.002
            ));
        }
        var pathGeo = new THREE.BufferGeometry().setFromPoints(pathPts);
        var pathLine = new THREE.Line(pathGeo, new THREE.LineBasicMaterial({ color: 0xffeb3b, transparent: true, opacity: 0.85 }));
        scene.add(pathLine);
        var shadowDot = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 12, 8),
            new THREE.MeshBasicMaterial({ color: 0x111111 })
        );
        scene.add(shadowDot);
        var penumbraRing = new THREE.Mesh(
            new THREE.RingGeometry(0.9, 1.8, 24),
            new THREE.MeshBasicMaterial({ color: 0x333344, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
        );
        scene.add(penumbraRing);
        var progress = 0.42;
        var playing = false;
        var showPath = true;
        function pathPoint(t) {
            var u = Math.max(0, Math.min(1, t));
            var idx = u * (pathPts.length - 1);
            var i0 = Math.floor(idx);
            var i1 = Math.min(pathPts.length - 1, i0 + 1);
            var f = idx - i0;
            return pathPts[i0].clone().lerp(pathPts[i1], f);
        }
        function setProgress(t) {
            progress = Math.max(0, Math.min(1, t));
            var zOff = (progress - 0.5) * 18;
            moon.position.set(-38, Math.sin(progress * Math.PI) * 2, zOff);
            moon.lookAt(earth.position);
            var hit = pathPoint(progress);
            shadowDot.position.copy(hit);
            var normal = hit.clone().normalize();
            penumbraRing.position.copy(hit.clone().add(normal.clone().multiplyScalar(0.05)));
            penumbraRing.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), normal);
            var label = document.getElementById('t3dSolarProgressLabel');
            if (label) label.textContent = Math.round(progress * 100) + '%';
            var slider = document.getElementById('t3dSolarProgress');
            if (slider && parseFloat(slider.value) !== progress * 100) slider.value = String(progress * 100);
            var phase = progress < 0.15 ? 'Partial eclipse begins' : progress < 0.35 ? 'Approaching totality' : progress < 0.65 ? 'Totality on the path' : progress < 0.85 ? 'Leaving totality' : 'Partial eclipse ends';
            t3dInfo('<h3>' + phase + '</h3><p>When the Moon crosses between Earth and the Sun, its umbra traces a narrow path of totality on the ground. The Sun and Moon look nearly the same size in the sky, so the shadow can be total along that track.</p><table class="w3-table w3-bordered"><tr><td>Sun apparent diameter</td><td>about ' + T3D_SUN_APPARENT_DEG + ' deg</td></tr><tr><td>Moon apparent diameter</td><td>about ' + T3D_MOON_APPARENT_DEG + ' deg</td></tr><tr><td>Umbra width (totality path)</td><td>about ' + T3D_UMBRA_MIN_KM + '-' + T3D_UMBRA_MAX_KM + ' km</td></tr><tr><td>Saros cycle</td><td>about ' + T3D_SAROS_YEARS + ' years ' + T3D_SAROS_DAYS + ' days</td></tr></table><p class="t3d-note">Educational geometry visualization - not matched to tonight\'s sky or a specific eclipse date. This is not a physical simulation.</p>');
        }
        function applyPathVis() {
            pathLine.visible = showPath;
            var btn = document.getElementById('t3dSolarPathBtn');
            if (btn) btn.textContent = showPath ? 'Hide totality path' : 'Show totality path';
        }
        setProgress(progress);
        applyPathVis();
        var playBtn = document.getElementById('t3dSolarPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () { playing = !playing; playBtn.textContent = playing ? 'Pause shadow' : 'Play shadow'; });
        var slider = document.getElementById('t3dSolarProgress');
        if (slider) slider.addEventListener('input', function () { playing = false; if (playBtn) playBtn.textContent = 'Play shadow'; setProgress(parseFloat(slider.value || '0') / 100); });
        var pathBtn = document.getElementById('t3dSolarPathBtn');
        if (pathBtn) pathBtn.addEventListener('click', function () { showPath = !showPath; applyPathVis(); });
        t3dStatus('Drag to orbit the view, scroll to zoom. Scrub shadow progress or press Play shadow.');
        return function animate(dt) {
            if (!playing) return;
            setProgress(progress + (dt / 1000) * 0.07);
            if (progress >= 1) setProgress(0);
        };
    }

        for (var i = 0; i < T3D_WORLDS.length; i++) {

            }
            t3dInfo('<h3>' + (sel ? sel.name : 'Planet sizes') + '</h3><p>Each sphere radius is proportional to the published NASA mean radius. Spacing is for readability only - orbital distances are not shown.</p><table class="w3-table w3-bordered">' + tableHtml() + '</table><p class="t3d-note">Educational size comparison - not an orbital model. Jupiter reference scale keeps inner planets visible beside the Sun.</p>');
        }
        highlight(selected);

        function interpStage(p) {

        var orbitPhase = 0;

        function deform(depth) {
            var pos = geo.attributes.position;
            for (var i = 0; i < pos.count; i++) {
                var x = pos.getX(i);
                var z = pos.getZ(i);
                var r = Math.sqrt(x * x + z * z);
                // Flamm-like funnels are extreme; use a smooth 1/sqrt(r^2+a^2) well
                var a = 1.15;
                var y = -depth * (1 / Math.sqrt(r * r + a * a) - 1 / Math.sqrt((size * 0.55) * (size * 0.55) + a * a));
                pos.setY(i, y);
            }
            pos.needsUpdate = true;
            geo.computeVertexNormals();
            wire.geometry.attributes.position.copy(pos);
            wire.geometry.attributes.position.needsUpdate = true;
        }

        function applyBody() {
            var b = T3D_GW_BODIES[bodyIdx];
            // Depth proxy scales with log(vesc) so Sun/Moon stay in one view
            var depth = (Math.log(b.vesc + 1) / Math.log(617.5 + 1)) * 6.5 * depthMul;
            deform(depth);
            bodyMesh.material.color.setHex(b.color);
            bodyMesh.scale.setScalar(0.7 + b.massScale * 0.45);
            bodyMesh.position.y = 0.2 + bodyMesh.scale.x * 0.45;
            rsRing.visible = showRs && b.id === 'sun';

            t3dStatus(b.name + ' well selected - escape ' + b.vesc + ' km/s. Drag to orbit the embedding sheet.');

        var rsBtn = document.getElementById('t3dGwRsBtn');

        if (moonBtn) moonBtn.addEventListener('click', function () { bodyIdx = 0; applyBody(); });
        if (earthBtn) earthBtn.addEventListener('click', function () { bodyIdx = 1; applyBody(); });
        if (jupBtn) jupBtn.addEventListener('click', function () { bodyIdx = 2; applyBody(); });
        if (sunBtn) sunBtn.addEventListener('click', function () { bodyIdx = 3; applyBody(); });
        if (rsBtn) rsBtn.addEventListener('click', function () {

        });

        applyBody();

            var R = 3.2 + b.massScale * 0.6;
            probe.position.set(Math.cos(orbitPhase) * R, bodyMesh.position.y + 0.15, Math.sin(orbitPhase) * R);
            bodyMesh.rotation.y += dt * 0.0004;

    // ================= SIDEREAL VS SOLAR DAY =================================

    // Mean sidereal day ~23h56m04.09s; mean solar day 24h; difference ~3m56s.
    // Educational approximation - not a precise ephemeris / equation-of-time plot.
    var T3D_SS_SIDEREAL_S = 86164.0905; // mean sidereal day seconds
    var T3D_SS_SOLAR_S = 86400;         // mean solar day seconds

        function panelHtml() {

                '</table>' +
                '<p class="t3d-note">Educational approximation inspired by NOAA SWPC OVATION / emission-line altitudes - not live space-weather data, not a particle solver. Distinct from Earth 3D Globe (geography / lighting).</p>';
        }

        function apply() {

            t3dInfo(panelHtml());
            t3dStatus('Aurora oval - green 557.7 nm / red 630.0 nm / N2+ 427.8 nm. Drag to orbit; raise Kp to expand equatorward.');

        if (playBtn) playBtn.addEventListener('click', function () {
            playing = !playing;
            playBtn.textContent = playing ? 'Pause spin' : 'Play spin';
        });
        if (resetBtn) resetBtn.addEventListener('click', function () { kp = 3; spin = 0; apply(); });

        apply();
        return function animate(dt) {
            if (playing) {
                spin += dt * 0.00025;

    function t3dSsFmtHms(sec) {

    }

        if (bothBtn) bothBtn.addEventListener('click', function () { mode = 'both'; apply(); });

        if (resetBtn) resetBtn.addEventListener('click', function () {

        return function animate(dt) {

    // ================= BLACK-BODY RADIATION ==================================
    // Star color vs temperature via Wien peak + Planck B(lambda) teaching curve.
    // Educational approximation - not a full stellar-atmosphere solver.
    // Wien: l_max (m) = 2.897771955e-3 / T(K); Sun Teff ~5772 K -> ~502 nm.
    var T3D_BB_WIEN = 2.897771955e-3; // m*K
    var T3D_BB_SUN_K = 5772;
    var T3D_BB_TYPES = [
        { id: 'O', name: 'O type', T: 30000, note: 'Hot blue - peak deep in UV; photosphere looks blue-white.' },
        { id: 'B', name: 'B type', T: 15000, note: 'Blue-white; peak still UV/blue.' },
        { id: 'A', name: 'A type', T: 8500, note: 'White; Vega-class temperatures.' },
        { id: 'F', name: 'F type', T: 6500, note: 'Yellow-white; between A and G.' },
        { id: 'G', name: 'G type (Sun)', T: 5772, note: 'Sun Teff about 5772 K; Wien peak about 502 nm.' },
        { id: 'K', name: 'K type', T: 4200, note: 'Orange; cooler photosphere.' },
        { id: 'M', name: 'M type', T: 3000, note: 'Cool red; peak in near-IR; looks reddish.' }
    ];
    function t3dBbLmaxNm(T) {
        return (T3D_BB_WIEN / T) * 1e9;
    }
    function t3dBbPlanck(lambdaNm, T) {
        // Relative spectral radiance (arbitrary units) - teach curve shape
        var l = lambdaNm * 1e-9;
        var h = 6.62607015e-34, c = 2.99792458e8, k = 1.380649e-23;
        var a = 2 * h * c * c / Math.pow(l, 5);
        var x = (h * c) / (l * k * T);
        if (x > 80) return 0;
        return a / (Math.exp(x) - 1);
    }
    function t3dBbTempToRgb(T) {
        // Approximate blackbody-to-sRGB teaching tint (not CIE XYZ convert)
        var t = Math.max(1000, Math.min(40000, T)) / 100;
        var r, g, b;
        if (t <= 66) {
            r = 255;
            g = 99.4708025861 * Math.log(t) - 161.1195681661;
            b = t <= 19 ? 0 : 138.5177312231 * Math.log(t - 10) - 305.0447927307;
        } else {
            r = 329.698727446 * Math.pow(t - 60, -0.1332047592);
            g = 288.1221695283 * Math.pow(t - 60, -0.0755148492);
            b = 255;
        }
        function clip(v) { return Math.max(0, Math.min(255, v)) / 255; }
        return { r: clip(r), g: clip(g), b: clip(b) };
    }
    function t3dBlackBodyRadiation(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.25));
        var group = new THREE.Group();
        scene.add(group);

        var star = new THREE.Mesh(
            new THREE.SphereGeometry(2.2, shell.low ? 24 : 40, shell.low ? 18 : 28),
            new THREE.MeshBasicMaterial({ color: 0xfff176 })
        );
        group.add(star);
        var glow = new THREE.Mesh(
            new THREE.SphereGeometry(2.9, 20, 16),
            new THREE.MeshBasicMaterial({ color: 0xffe082, transparent: true, opacity: 0.28, depthWrite: false })
        );
        star.add(glow);

        // Spectrum rail: visible band 380-750 nm colored markers + curve line
        var rail = new THREE.Group();
        rail.position.set(0, -4.2, 0);
        group.add(rail);
        var curvePts = [];
        var N = shell.low ? 48 : 96;
        var T = T3D_BB_SUN_K;
        var peakMarker = new THREE.Mesh(
            new THREE.SphereGeometry(0.18, 10, 8),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        rail.add(peakMarker);
        var curveLine = new THREE.Line(
            new THREE.BufferGeometry(),
            new THREE.LineBasicMaterial({ color: 0x80cbc4 })
        );
        rail.add(curveLine);

        // Base rainbow strip
        for (var i = 0; i < 40; i++) {
            var lam = 380 + (i / 39) * 370;
            var x = -6 + (i / 39) * 12;
            var col = new THREE.Color();
            // rough wavelength -> hue
            var hue = Math.max(0, Math.min(1, (750 - lam) / 370)) * 0.75;
            col.setHSL(hue, 0.85, 0.45);
            var bar = new THREE.Mesh(
                new THREE.BoxGeometry(12 / 40 * 0.92, 0.35, 0.2),
                new THREE.MeshBasicMaterial({ color: col })
            );
            bar.position.set(x, -0.6, 0);
            rail.add(bar);
        }

        function rebuildCurve() {
            var maxB = 0;
            var samples = [];
            for (var i = 0; i <= N; i++) {
                var lam = 200 + (i / N) * 1000; // 200-1200 nm teaching window
                var B = t3dBbPlanck(lam, T);
                samples.push({ lam: lam, B: B });
                if (B > maxB) maxB = B;
            }
            var pts = [];
            for (var j = 0; j < samples.length; j++) {
                var s = samples[j];
                var xn = -6 + ((s.lam - 200) / 1000) * 12;
                var yn = maxB > 0 ? (s.B / maxB) * 2.6 : 0;
                pts.push(new THREE.Vector3(xn, yn, 0));
            }
            curveLine.geometry.dispose();
            curveLine.geometry = new THREE.BufferGeometry().setFromPoints(pts);
            var lmax = t3dBbLmaxNm(T);
            var px = -6 + ((lmax - 200) / 1000) * 12;
            peakMarker.position.set(px, 2.85, 0.1);
        }

        function applyTemp() {
            var rgb = t3dBbTempToRgb(T);
            star.material.color.setRGB(rgb.r, rgb.g, rgb.b);
            glow.material.color.setRGB(rgb.r, rgb.g, rgb.b);
            rebuildCurve();
            var lmax = t3dBbLmaxNm(T);
            var typeHint = '';
            for (var i = 0; i < T3D_BB_TYPES.length; i++) {
                if (Math.abs(T3D_BB_TYPES[i].T - T) < 1) { typeHint = T3D_BB_TYPES[i].name; break; }
            }
            t3dInfo(panelHtml(lmax, typeHint));
            t3dStatus('T = ' + Math.round(T) + ' K - Wien peak ~' + lmax.toFixed(0) + ' nm. Drag to orbit the teaching star.');
        }

        function panelHtml(lmax, typeHint) {
            return '<h3>Black-body radiation</h3>' +
                '<p>Wien displacement law marks the peak wavelength of a black-body spectrum: l_max = 2.897771955e-3 / T (metres). The Planck curve shape is a teaching plot - not a stellar-atmosphere model with lines.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Temperature</td><td>' + Math.round(T) + ' K</td></tr>' +
                '<tr><td>Wien peak</td><td>~' + lmax.toFixed(0) + ' nm</td></tr>' +
                '<tr><td>Sun Teff</td><td>~5772 K -> ~502 nm</td></tr>' +
                '<tr><td>O / M teaching</td><td>~30,000 K blue / ~3,000 K red</td></tr>' +
                (typeHint ? '<tr><td>Preset</td><td>' + typeHint + '</td></tr>' : '') +
                '</table>' +
                '<p class="t3d-note">Distinct from Star Lifecycle 3D Explorer (evolution timeline) and Stellar Magnitude 3D Explorer (brightness). Color tint is a teaching approximation of blackbody chromaticity.</p>';
        }

        function setType(idx) {
            T = T3D_BB_TYPES[idx].T;
            applyTemp();
        }

        var oBtn = document.getElementById('t3dBbOBtn');
        var bBtn = document.getElementById('t3dBbBBtn');
        var aBtn = document.getElementById('t3dBbABtn');
        var fBtn = document.getElementById('t3dBbFBtn');
        var gBtn = document.getElementById('t3dBbGBtn');
        var kBtn = document.getElementById('t3dBbKBtn');
        var mBtn = document.getElementById('t3dBbMBtn');
        var coolBtn = document.getElementById('t3dBbCoolBtn');
        var hotBtn = document.getElementById('t3dBbHotBtn');
        if (oBtn) oBtn.addEventListener('click', function () { setType(0); });
        if (bBtn) bBtn.addEventListener('click', function () { setType(1); });
        if (aBtn) aBtn.addEventListener('click', function () { setType(2); });
        if (fBtn) fBtn.addEventListener('click', function () { setType(3); });
        if (gBtn) gBtn.addEventListener('click', function () { setType(4); });
        if (kBtn) kBtn.addEventListener('click', function () { setType(5); });
        if (mBtn) mBtn.addEventListener('click', function () { setType(6); });
        if (coolBtn) coolBtn.addEventListener('click', function () {
            T = Math.max(2500, T - 500);
            applyTemp();
        });
        if (hotBtn) hotBtn.addEventListener('click', function () {
            T = Math.min(40000, T + 500);
            applyTemp();
        });

        applyTemp();
        return function animate(dt) {
            star.rotation.y += dt * 0.00025;
        };
    }


    // ================= CONSTELLATION SPHERE ==================================
    // Teaching celestial sphere with embedded bright-star RA/Dec (hours, deg)
    // and a few classic asterism stick figures. Educational approximation -
    // not an all-sky survey texture and not the full IAU boundary polygons.
    // IAU recognizes 88 official constellations (1922/1930 delineation era).
    var T3D_CS_IAU = 88;
    // Bright-star sample: name, RA hours, Dec deg, V mag (approx standard values)
    var T3D_CS_STARS = [
        ['Sirius', 6.7525, -16.7161, -1.46],
        ['Canopus', 6.3992, -52.6957, -0.74],
        ['Arcturus', 14.2610, 19.1824, -0.05],
        ['Vega', 18.6156, 38.7837, 0.03],
        ['Capella', 5.2782, 45.9980, 0.08],
        ['Rigel', 5.2423, -8.2016, 0.13],

        ['Betelgeuse', 5.9195, 7.4071, 0.42],
        ['Altair', 19.8464, 8.8683, 0.76],
        ['Aldebaran', 4.5987, 16.5093, 0.85],
        ['Antares', 16.4901, -26.4319, 0.96],
        ['Spica', 13.4199, -11.1613, 0.97],
        ['Pollux', 7.7553, 28.0262, 1.14],
        ['Fomalhaut', 22.9608, -29.6222, 1.16],
        ['Deneb', 20.6905, 45.2803, 1.25],
        ['Regulus', 10.1395, 11.9672, 1.35],
        ['Adhara', 6.9771, -28.9721, 1.50],
        ['Castor', 7.5766, 31.8883, 1.58],
        ['Shaula', 17.5601, -37.1038, 1.62],
        ['Gacrux', 12.5194, -57.1132, 1.63],
        ['Bellatrix', 5.4189, 6.3497, 1.64],
        ['Elnath', 5.4382, 28.6077, 1.65],
        ['Alnilam', 5.6036, -1.2019, 1.69],
        ['Alnitak', 5.6793, -1.9426, 1.77],
        ['Alioth', 12.9005, 55.9598, 1.77],
        ['Dubhe', 11.0621, 61.7510, 1.79],
        ['Mirfak', 3.4054, 49.8612, 1.79],
        ['Alkaid', 13.7923, 49.3132, 1.86],
        ['Mintaka', 5.5334, -0.2991, 2.23],
        ['Mizar', 13.3987, 54.9254, 2.23],
        ['Merak', 11.0307, 56.3824, 2.37],
        ['Phecda', 11.8975, 53.6948, 2.44],
        ['Megrez', 12.2571, 57.0326, 3.31],
        ['Acrux', 12.4433, -63.0991, 0.77],
        ['Mimosa', 12.7954, -59.6888, 1.25],
        ['Delta Cru', 12.2524, -58.7489, 2.80]
    ];
    // Asterism edges as star-name pairs (traditional teaching sticks)
    var T3D_CS_FIGS = {
        orion: {
            label: 'Orion',
            edges: [['Betelgeuse','Bellatrix'],['Bellatrix','Mintaka'],['Mintaka','Alnilam'],['Alnilam','Alnitak'],['Alnitak','Rigel'],['Betelgeuse','Alnitak'],['Bellatrix','Mintaka']]
        },
        ursa: {
            label: 'Ursa Major (Big Dipper)',
            edges: [['Dubhe','Merak'],['Merak','Phecda'],['Phecda','Megrez'],['Megrez','Alioth'],['Alioth','Mizar'],['Mizar','Alkaid'],['Megrez','Dubhe']]
        },
        crux: {
            label: 'Crux (Southern Cross)',
            edges: [['Acrux','Gacrux'],['Acrux','Mimosa'],['Gacrux','Delta Cru'],['Mimosa','Delta Cru']]
        },
        summer: {
            label: 'Summer Triangle',
            edges: [['Vega','Deneb'],['Deneb','Altair'],['Altair','Vega']]
        }
    };
    function t3dCsRaDecToVec(raH, decDeg, radius) {
        var ra = (raH / 24) * Math.PI * 2;
        var dec = (decDeg / 180) * Math.PI;
        var x = Math.cos(dec) * Math.cos(ra);
        var y = Math.sin(dec);
        var z = Math.cos(dec) * Math.sin(ra);
        return { x: x * radius, y: y * radius, z: z * radius };
    }
    function t3dConstellationSphere(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x01010a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.35));
        var group = new THREE.Group();
        scene.add(group);

        var R = 12;
        // Faint celestial sphere shell
        group.add(new THREE.Mesh(
            new THREE.SphereGeometry(R, 48, 32),
            new THREE.MeshBasicMaterial({ color: 0x1a237e, transparent: true, opacity: 0.08, side: THREE.BackSide, depthWrite: false })
        ));
        // Equatorial grid (wire)
        var grid = new THREE.Group();
        for (var lat = -60; lat <= 60; lat += 30) {
            var pts = [];
            for (var i = 0; i <= 64; i++) {
                var ra = (i / 64) * 24;
                var v = t3dCsRaDecToVec(ra, lat, R * 0.985);
                pts.push(new THREE.Vector3(v.x, v.y, v.z));
            }
            grid.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color: 0x37474f, transparent: true, opacity: 0.45 })));
        }
        for (var h = 0; h < 24; h += 3) {
            var pts2 = [];
            for (var j = 0; j <= 48; j++) {
                var dec = -90 + (j / 48) * 180;
                var v2 = t3dCsRaDecToVec(h, dec, R * 0.985);
                pts2.push(new THREE.Vector3(v2.x, v2.y, v2.z));
            }
            grid.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts2), new THREE.LineBasicMaterial({ color: 0x455a64, transparent: true, opacity: 0.35 })));
        }
        group.add(grid);

        // Earth teaching bead at origin
        group.add(new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 24, 16),
            new THREE.MeshPhongMaterial({ color: 0x42a5f5, emissive: 0x0a2030, shininess: 20 })
        ));

        var byName = {};
        var starMeshes = [];
        var positions = [];
        var colors = [];
        T3D_CS_STARS.forEach(function (row) {
            var name = row[0], ra = row[1], dec = row[2], mag = row[3];
            var v = t3dCsRaDecToVec(ra, dec, R * 0.992);
            byName[name] = { x: v.x, y: v.y, z: v.z, mag: mag, ra: ra, dec: dec, name: name };
            positions.push(v.x, v.y, v.z);
            // brighter = larger/whiter
            var bri = Math.max(0.25, Math.min(1, (3.5 - mag) / 4.5));
            colors.push(0.55 + 0.45 * bri, 0.6 + 0.35 * bri, 0.85);
            var s = 0.12 + bri * 0.22;
            var m = new THREE.Mesh(
                new THREE.SphereGeometry(s, 10, 8),
                new THREE.MeshBasicMaterial({ color: new THREE.Color(0.7 + 0.3 * bri, 0.75 + 0.2 * bri, 1) })
            );
            m.position.set(v.x, v.y, v.z);
            m.userData = { name: name, mag: mag, ra: ra, dec: dec };
            group.add(m);
            starMeshes.push(m);
        });
        // Extra faint procedural field
        var nFaint = shell.low ? 400 : 900;
        var fPos = new Float32Array(nFaint * 3);
        for (var fi = 0; fi < nFaint; fi++) {
            var u = Math.random() * 24;
            var d = (Math.random() * 2 - 1) * 85;
            var fv = t3dCsRaDecToVec(u, d, R * 0.98);
            fPos[fi * 3] = fv.x; fPos[fi * 3 + 1] = fv.y; fPos[fi * 3 + 2] = fv.z;
        }
        var fgeo = new THREE.BufferGeometry();
        fgeo.setAttribute('position', new THREE.BufferAttribute(fPos, 3));
        var faintPts = new THREE.Points(fgeo, new THREE.PointsMaterial({ color: 0x90a4ae, size: 0.06, sizeAttenuation: true, transparent: true, opacity: 0.55 }));
        group.add(faintPts);

        var lineGroup = new THREE.Group();
        group.add(lineGroup);
        var focusKey = 'orion';
        var magLimit = 2.5;
        var showGrid = true;

        function rebuildLines() {
            while (lineGroup.children.length) lineGroup.remove(lineGroup.children[0]);
            var fig = T3D_CS_FIGS[focusKey];
            if (!fig) return;
            fig.edges.forEach(function (pair) {
                var a = byName[pair[0]], b = byName[pair[1]];
                if (!a || !b) return;
                lineGroup.add(new THREE.Line(
                    new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(a.x, a.y, a.z),
                        new THREE.Vector3(b.x, b.y, b.z)
                    ]),
                    new THREE.LineBasicMaterial({ color: 0xffcc80, transparent: true, opacity: 0.95 })
                ));
            });
        }

        function applyMag() {
            starMeshes.forEach(function (m) {
                var ok = m.userData.mag <= magLimit;
                m.visible = ok;
                m.scale.setScalar(ok && T3D_CS_FIGS[focusKey] && T3D_CS_FIGS[focusKey].edges.some(function (e) {
                    return e[0] === m.userData.name || e[1] === m.userData.name;
                }) ? 1.35 : 1);
            });
            t3dInfo(panelHtml());
            t3dStatus(T3D_CS_FIGS[focusKey].label + ' focused - mag limit ' + magLimit.toFixed(1) + '. IAU constellations: ' + T3D_CS_IAU + '.');
        }

        function panelHtml() {
            var fig = T3D_CS_FIGS[focusKey];
            var sample = starMeshes.filter(function (m) { return m.visible; }).slice(0, 1)[0];
            var bit = sample ? (sample.userData.name + ' V=' + sample.userData.mag + ' RA ' + sample.userData.ra.toFixed(2) + 'h Dec ' + sample.userData.dec.toFixed(1) + ' deg') : '';
            return '<h3>Constellation sphere</h3>' +
                '<p>A teaching celestial sphere with an embedded bright-star sample (RA hours, Dec degrees, V magnitude) and classic asterism sticks. The IAU recognizes ' + T3D_CS_IAU + ' official constellations - this page shows asterisms, not full boundary polygons or an all-sky texture.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>IAU constellations</td><td>' + T3D_CS_IAU + '</td></tr>' +
                '<tr><td>Focused asterism</td><td>' + fig.label + '</td></tr>' +
                '<tr><td>Magnitude limit</td><td>V &lt;= ' + magLimit.toFixed(1) + '</td></tr>' +
                '<tr><td>Sample star</td><td>' + bit + '</td></tr>' +
                '</table>' +
                '<p class="t3d-note">Educational approximation - stick figures follow traditional asterisms; faint field stars are procedural fill, not a survey catalog dump.</p>';
        }

        function setFocus(key) {
            focusKey = key;
            rebuildLines();
            applyMag();
        }

        var orionBtn = document.getElementById('t3dCsOrionBtn');
        var ursaBtn = document.getElementById('t3dCsUrsaBtn');
        var cruxBtn = document.getElementById('t3dCsCruxBtn');
        var summerBtn = document.getElementById('t3dCsSummerBtn');
        var magBtn = document.getElementById('t3dCsMagBtn');
        var gridBtn = document.getElementById('t3dCsGridBtn');
        if (orionBtn) orionBtn.addEventListener('click', function () { setFocus('orion'); });
        if (ursaBtn) ursaBtn.addEventListener('click', function () { setFocus('ursa'); });
        if (cruxBtn) cruxBtn.addEventListener('click', function () { setFocus('crux'); });
        if (summerBtn) summerBtn.addEventListener('click', function () { setFocus('summer'); });
        if (magBtn) magBtn.addEventListener('click', function () {
            magLimit = magLimit <= 1.5 ? 2.5 : (magLimit <= 2.5 ? 3.5 : 1.5);
            magBtn.textContent = 'Mag limit ' + magLimit.toFixed(1);
            applyMag();
        });
        if (gridBtn) gridBtn.addEventListener('click', function () {
            showGrid = !showGrid;
            grid.visible = showGrid;
            gridBtn.textContent = showGrid ? 'Hide grid' : 'Show grid';
        });

        // click stars for facts
        var raycaster = new THREE.Raycaster();
        var mouse = new THREE.Vector2();
        shell.renderer.domElement.addEventListener('pointerdown', function (ev) {
            var rect = shell.renderer.domElement.getBoundingClientRect();
            mouse.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, shell.camera);
            var hits = raycaster.intersectObjects(starMeshes, false);
            if (hits.length) {
                var u = hits[0].object.userData;
                t3dInfo(panelHtml() + '<p><b>' + u.name + '</b> - V mag ' + u.mag + ', RA ' + u.ra.toFixed(3) + 'h, Dec ' + u.dec.toFixed(2) + ' deg (approx catalog values).</p>');
            }
        });

        setFocus('orion');
        return function animate(dt) {
            group.rotation.y += dt * 0.00008;
        };
    }


    // ================= PARALLAX DISTANCE ======================================
    // Earth-baseline parallax angle -> stellar distance - educational geometry.
    var T3D_PX_PC_LY = 3.26;       // 1 parsec in light-years
    var T3D_PX_PC_AU = 206265;     // 1 parsec in AU (approx)
    var T3D_PX_PROXIMA_AS = 0.7687; // Proxima Centauri parallax arcsec
    function t3dParallaxDistance(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.25));
        var sun = new THREE.PointLight(0xfff3c4, 1.4, 80);
        sun.position.set(0, 2, 0);
        scene.add(sun);
        var group = new THREE.Group();
        scene.add(group);

        // Sun at origin, Earth orbit teaching ring (1 AU display radius)
        var sunMesh = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 24, 16),
            new THREE.MeshBasicMaterial({ color: 0xffe082 })
        );
        group.add(sunMesh);
        var earthR = 4.2;
        var earthOrbit = [];
        for (var i = 0; i <= 64; i++) {
            var a = (i / 64) * Math.PI * 2;
            earthOrbit.push(new THREE.Vector3(Math.cos(a) * earthR, 0, Math.sin(a) * earthR));
        }
        group.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(earthOrbit),
            new THREE.LineBasicMaterial({ color: 0x546e7a, transparent: true, opacity: 0.7 })
        ));
        var earthA = new THREE.Mesh(
            new THREE.SphereGeometry(0.22, 16, 12),
            new THREE.MeshBasicMaterial({ color: 0x4fc3f7 })
        );
        var earthB = new THREE.Mesh(
            new THREE.SphereGeometry(0.22, 16, 12),
            new THREE.MeshBasicMaterial({ color: 0x81d4fa })
        );
        earthA.position.set(earthR, 0, 0);
        earthB.position.set(-earthR, 0, 0);
        group.add(earthA); group.add(earthB);

        // Distant star on +Z teaching axis; distance scrubbed by parallax (arcsec)
        var star = new THREE.Mesh(
            new THREE.SphereGeometry(0.35, 16, 12),
            new THREE.MeshBasicMaterial({ color: 0xffecb3 })
        );
        group.add(star);
        var glow = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 12, 10),
            new THREE.MeshBasicMaterial({ color: 0xfff8e1, transparent: true, opacity: 0.3, depthWrite: false })
        );
        star.add(glow);

        // Sight lines Earth A/B -> star
        var lineA = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
            new THREE.LineBasicMaterial({ color: 0x90caf9, transparent: true, opacity: 0.85 })
        );
        var lineB = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
            new THREE.LineBasicMaterial({ color: 0xa5d6a7, transparent: true, opacity: 0.85 })
        );
        group.add(lineA); group.add(lineB);

        // Baseline chord A-B
        var baseLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
            new THREE.LineBasicMaterial({ color: 0xffab91, transparent: true, opacity: 0.9 })
        );
        group.add(baseLine);

        var parallaxAs = T3D_PX_PROXIMA_AS; // arcsec
        var presets = {
            proxima: T3D_PX_PROXIMA_AS,
            oneas: 1.0,
            half: 0.5
        };

        function distPc(pAs) { return 1 / pAs; }
        function distLy(pAs) { return distPc(pAs) * T3D_PX_PC_LY; }
        function distAu(pAs) { return distPc(pAs) * T3D_PX_PC_AU; }

        function applyGeometry() {
            // Teaching display: star Z scales with 1/parallax (softer clamp for camera)
            var pc = distPc(parallaxAs);
            var z = Math.min(28, 6 + Math.sqrt(pc) * 3.2);
            star.position.set(0, 0.15, z);
            // Parallax half-angle exaggerated for visibility (true angles are sub-arcsec)
            var halfAngle = Math.min(0.22, 0.04 + (0.12 / Math.max(parallaxAs, 0.2)));
            earthA.position.set(Math.cos(0) * earthR, 0, Math.sin(0) * earthR);
            earthB.position.set(Math.cos(Math.PI) * earthR, 0, Math.sin(Math.PI) * earthR);
            // Slight lateral offset of star endpoints for the textbook triangle
            var lat = Math.tan(halfAngle) * z * 0.35;
            lineA.geometry.setFromPoints([earthA.position.clone(), new THREE.Vector3(lat, 0.1, z)]);
            lineB.geometry.setFromPoints([earthB.position.clone(), new THREE.Vector3(-lat, 0.1, z)]);
            baseLine.geometry.setFromPoints([earthA.position.clone(), earthB.position.clone()]);
            star.position.x = 0;
        }
        applyGeometry();

        function panelHtml(focus) {
            var pc = distPc(parallaxAs);
            var html =
                '<h3>Stellar parallax distance</h3>' +
                '<p>With a 1 AU Earth-orbit baseline, parallax angle p (arcseconds) gives distance d = 1/p in parsecs. One parsec is about ' +
                T3D_PX_PC_LY + ' ly or about ' + T3D_PX_PC_AU.toLocaleString() + ' AU.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Current parallax p</td><td>about ' + parallaxAs.toFixed(4) + ' arcsec</td></tr>' +
                '<tr><td>Distance</td><td>about ' + pc.toFixed(3) + ' pc (~' + distLy(parallaxAs).toFixed(2) + ' ly)</td></tr>' +
                '<tr><td>1 pc</td><td>about ' + T3D_PX_PC_LY + ' ly = about ' + T3D_PX_PC_AU.toLocaleString() + ' AU</td></tr>' +
                '<tr><td>Proxima Centauri p</td><td>about ' + T3D_PX_PROXIMA_AS + ' arcsec</td></tr>' +
                '</table>';
            if (focus === 'proxima') {
                html += '<p><b>Proxima Centauri</b> - published parallax about ' + T3D_PX_PROXIMA_AS +
                    ' arcsec implies about ' + (1 / T3D_PX_PROXIMA_AS).toFixed(3) + ' pc (~' +
                    ((1 / T3D_PX_PROXIMA_AS) * T3D_PX_PC_LY).toFixed(2) + ' ly).</p>';
            } else if (focus === 'formula') {
                html += '<p><b>Formula</b> - d (pc) = 1 / p (arcsec). Doubling parallax halves distance.</p>';
            } else if (focus === 'baseline') {
                html += '<p><b>Baseline</b> - Earth at opposite ends of its orbit (about 2 AU apart) supplies the triangle base against the distant star.</p>';
            }
            html += '<p class="t3d-note">Sight-line angles are exaggerated for teaching - real stellar parallaxes are below one arcsecond. This is educational geometry, not a Hipparcos reduction pipeline.</p>';
            return html;
        }
        t3dInfo(panelHtml('overview'));

        var proxBtn = document.getElementById('t3dPxProxBtn');
        var oneBtn = document.getElementById('t3dPxOneBtn');
        var halfBtn = document.getElementById('t3dPxHalfBtn');
        var formBtn = document.getElementById('t3dPxFormBtn');
        var baseBtn = document.getElementById('t3dPxBaseBtn');
        if (proxBtn) proxBtn.addEventListener('click', function () {
            parallaxAs = presets.proxima; applyGeometry(); t3dInfo(panelHtml('proxima'));
            t3dStatus('Proxima Centauri preset - parallax about ' + T3D_PX_PROXIMA_AS + ' arcsec.');
        });
        if (oneBtn) oneBtn.addEventListener('click', function () {
            parallaxAs = presets.oneas; applyGeometry(); t3dInfo(panelHtml('formula'));
            t3dStatus('1.0000 arcsec preset - distance is exactly 1 parsec by definition.');
        });

                'uniform float uBandShift;',

                'varying vec3 vN;',

                '  vec3 dark = vec3(0.55, 0.32, 0.18);',

    // ================= RETROGRADE MOTION =====================================
    // Apparent Mars loop from Earth\'s faster inside orbit - educational, not ephemeris.
    var T3D_RETRO_SYNODIC_D = 779.9;
    var T3D_RETRO_ARC_D = 72;
    var T3D_RETRO_MONTHS = 26;
    function t3dRetrogradeMotion(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040c, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.25));
        var sunL = new THREE.PointLight(0xfff3c4, 1.4, 200);
        sunL.position.set(0, 0, 0);
        scene.add(sunL);
        var group = new THREE.Group();
        scene.add(group);
        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(1.2, 28, 20),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        group.add(sun);
        var earthR = 8;
        var marsR = 12.2;
        // Orbit rings
        function ring(r, color) {
            var pts = [];
            for (var i = 0; i <= 96; i++) {
                var a = (i / 96) * Math.PI * 2;
                pts.push(new THREE.Vector3(Math.cos(a) * r, 0, Math.sin(a) * r));
            }
            group.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.4 })
            ));
        }
        ring(earthR, 0x64b5f6);
        ring(marsR, 0xff8a65);
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 20, 16),
            new THREE.MeshLambertMaterial({ color: 0x42a5f5, emissive: 0x102040 })
        );
        group.add(earth);
        var mars = new THREE.Mesh(
            new THREE.SphereGeometry(0.42, 18, 14),
            new THREE.MeshLambertMaterial({ color: 0xe57373, emissive: 0x301010 })
        );
        group.add(mars);
        // LOS line Earth -> Mars
        var losGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(), new THREE.Vector3(1, 0, 0)
        ]);
        var los = new THREE.Line(losGeom, new THREE.LineBasicMaterial({ color: 0xffee58, transparent: true, opacity: 0.75 }));
        group.add(los);
        // Sky trail of apparent elongation (projected behind Earth along LOS direction onto a cylinder/arc belt)
        var trailPts = [];
        var trailMax = 180;
        var trailLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
            new THREE.LineBasicMaterial({ color: 0xce93d8, transparent: true, opacity: 0.85 })
        );
        group.add(trailLine);
        // Angular rates: Earth 360/365.25, Mars 360/686.98 - use compressed visual year
        // Synodic relative rate: when relative mean anomaly wraps once per T3D_RETRO_SYNODIC_D
        var day = 0;
        var playing = true;
        var showTrail = true;
        var showLos = true;
        // Place opposition near day 0 so scrub starts teaching the loop
        // Use mean motion: nE = 2pi/365.25, nM = 2pi/686.98
        var nE = (Math.PI * 2) / 365.25;
        var nM = (Math.PI * 2) / 686.98;
        function earthAngle(d) { return d * nE; }
        function marsAngle(d) { return d * nM + Math.PI; } // start near opposition geometry vs Earth at 0
        function elongDeg(d) {
            // Angle of Mars as seen from Earth relative to anti-sun / heliocentric transfer
            var ae = earthAngle(d);
            var am = marsAngle(d);
            var ex = Math.cos(ae) * earthR, ez = Math.sin(ae) * earthR;
            var mx = Math.cos(am) * marsR, mz = Math.sin(am) * marsR;
            var dx = mx - ex, dz = mz - ez;
            // Angle of LOS in plane, minus Earth\'s orbital angle (local sky abscissa)
            var losA = Math.atan2(dz, dx);
            var sky = ((losA - ae) * 180 / Math.PI + 540) % 360 - 180;
            return sky;
        }
        function isRetrograde(d) {
            // Finite difference of sky elongation
            var e0 = elongDeg(d - 0.5);
            var e1 = elongDeg(d + 0.5);
            var de = e1 - e0;
            if (de > 180) de -= 360;
            if (de < -180) de += 360;
            return de < 0; // westward on typical convention for outer planet near opposition
        }
        function panelHtml(d, elong, retro) {
            return '<h3>Mars retrograde (apparent)</h3>' +
                '<p>Earth on the inside track overtakes Mars. Near opposition the line of sight to Mars sweeps backward against the stars for a while - an optical loop, not Mars reversing its heliocentric orbit.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Mars synodic period</td><td>about ' + T3D_RETRO_SYNODIC_D + ' d (~' + T3D_RETRO_MONTHS + ' months)</td></tr>' +
                '<tr><td>Typical retrograde arc</td><td>about ' + T3D_RETRO_ARC_D + ' d</td></tr>' +
                '<tr><td>Day scrub</td><td>' + Math.round(d) + '</td></tr>' +
                '<tr><td>Approx. sky elongation</td><td>' + elong.toFixed(1) + ' deg (teaching scale)</td></tr>' +
                '<tr><td>Apparent motion</td><td>' + (retro ? 'Retrograde (westward stretch)' : 'Direct (eastward)') + '</td></tr>' +
                '</table>' +
                '<p class="t3d-note">Orbit sizes and rates are compressed for one view. Synodic and arc figures are published order-of-magnitude teaching values - not a high-precision ephemeris or sky chart for tonight.</p>';
        }
        function applyDay(d) {
            day = d;
            var ae = earthAngle(d);
            var am = marsAngle(d);

            mars.position.set(Math.cos(am) * marsR, 0, Math.sin(am) * marsR);
            var pos = los.geometry.attributes.position;
            pos.setXYZ(0, earth.position.x, earth.position.y, earth.position.z);
            pos.setXYZ(1, mars.position.x, mars.position.y, mars.position.z);
            pos.needsUpdate = true;

            var elong = elongDeg(d);
            var retro = isRetrograde(d);

            trailPts = [];
            var span = 140;
            for (var i = 0; i <= span; i++) {
                var td = d - span + i;
                var el = elongDeg(td);
                // Map elongation to arc in sky belt above Earth-Sun average
                var mid = earth.position.clone().add(sun.position).multiplyScalar(0.5);
                // Place trail at radius ~16 around sun, height by sample, angle = elongation + earth
                var skyR = 16;
                var ang = ae + el * Math.PI / 180;
                var y = (i / span - 0.5) * 0.02; // nearly flat; keep subtle vertical to separate lines
                // Better: fixed ring height 3, longitude = elong over time so loop shapes show
                trailPts.push(new THREE.Vector3(Math.cos(ang) * skyR, 3.2 + (retro && Math.abs(el) < 40 ? 0.4 : 0), Math.sin(ang) * skyR));
            }

            trailLine.visible = showTrail;

            var best = day;

                var ae = earthAngle(t), am = marsAngle(t);
                var diff = Math.abs(((am - ae + Math.PI) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2) - Math.PI);
                // Prefer Sun-Earth-Mars nearly straight: angle Mars - Earth ~ pi difference from Sun
