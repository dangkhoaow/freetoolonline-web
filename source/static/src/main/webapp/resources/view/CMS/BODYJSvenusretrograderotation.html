                state.t += dt / 1000;
                trajDots.forEach(function (rec, k) {
                    rec.phase = (state.t * (0.12 + k * 0.02)) % 1;
                });
                placeDots();
            }
            shell.applyCamera();
        };
    }

    function t3dGalileanMoons(shell) {
        var THREE = shell.THREE;
        var g = new THREE.Group();
        shell.scene.add(g);
        var jup = new THREE.Mesh(
            new THREE.SphereGeometry(2.8, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0xe8b070 })
        );
        g.add(jup);
        var state = { t: 0, playing: true, focus: null };
        var moons = [];
        var clickTargets = [{ mesh: jup, html: function () {
            return '<h3>Jupiter</h3><p>Central body for the four Galilean moons discovered by Galileo in 1610. Distances and moon sizes on screen are compressed; the periods and diameters in the panel are the NASA JPL published figures.</p>';
        }}];

        function sceneA(aKm) {
            // Map 422e3..1883e3 km onto ~5..18 scene units
            return 5 + (aKm - 422000) / (1883000 - 422000) * 13;
        }
        function moonScale(diamKm) {
            return 0.35 + (diamKm / 5268) * 0.75;
        }

        T3D_GALILEAN_MOONS.forEach(function (m) {
            var r = sceneA(m.aKm);
            var ringPts = [];
            var N = shell.low ? 64 : 120;
            for (var i = 0; i <= N; i++) {
                var th = (i / N) * Math.PI * 2;
                ringPts.push(new THREE.Vector3(Math.cos(th) * r, 0, Math.sin(th) * r));
            }
            var ring = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(ringPts),
                new THREE.LineBasicMaterial({ color: 0x557799, transparent: true, opacity: 0.7 })
            );
            g.add(ring);
            var mesh = new THREE.Mesh(
                new THREE.SphereGeometry(1, 18, 18),
                new THREE.MeshBasicMaterial({ color: m.color })
            );
            mesh.scale.setScalar(moonScale(m.diamKm));
            g.add(mesh);
            var rec = { meta: m, mesh: mesh, r: r, phase: Math.random() * Math.PI * 2 };
            moons.push(rec);
            clickTargets.push({ mesh: mesh, meta: m, html: function () { return moonFacts(m); } });
        });

        function moonFacts(m) {
            var ratio = (m.periodD / 1.769).toFixed(2);
            return '<h3>' + m.name + '</h3><p>' + m.note + '</p>'
                + '<table class="w3-table-all w3-small"><tbody>'
                + '<tr><td>Orbital period</td><td>' + m.periodD + ' Earth days</td></tr>'
                + '<tr><td>Mean diameter</td><td>' + m.diamKm.toLocaleString('en-US') + ' km</td></tr>'
                + '<tr><td>Mean distance from Jupiter</td><td>' + m.aKm.toLocaleString('en-US') + ' km</td></tr>'
                + '<tr><td>Period / Io</td><td>' + ratio + 'x</td></tr>'
                + '</tbody></table>'
                + '<p class="t3d-note">Io, Europa, and Ganymede lock in a Laplace resonance near 4:2:1 (Io completes about four orbits while Ganymede completes one). Callisto sits outside that lock. On-screen orbit radii and moon sizes are compressed; the numbers above are NASA JPL lithograph figures.</p>';
        }
        function overviewHtml() {
            var rows = T3D_GALILEAN_MOONS.map(function (m) {
                return '<tr><td>' + m.name + '</td><td>' + m.periodD + ' d</td><td>' + m.diamKm.toLocaleString('en-US') + ' km</td><td>' + m.aKm.toLocaleString('en-US') + ' km</td></tr>';
            }).join('');
            return '<h3>Galilean moons</h3>'
                + '<p>Io, Europa, Ganymede, and Callisto orbit Jupiter with published periods near 1.77, 3.55, 7.15, and 16.69 Earth days.</p>'
                + '<table class="w3-table-all w3-small"><thead><tr><th>Moon</th><th>Period</th><th>Diameter</th><th>Distance</th></tr></thead><tbody>'
                + rows + '</tbody></table>'
                + '<p class="t3d-note">Educational visualization of the four Galilean moons - not an n-body gravity simulation of Jupiter\'s full satellite system. Distances and sizes are compressed; periods and diameters are NASA JPL published figures. Source: NASA JPL Galilean moons lithograph / education fact sheet.</p>';
        }

        function place() {
            moons.forEach(function (rec) {
                var omega = (Math.PI * 2) / (rec.meta.periodD * 8); // ~8s per Io day at 1x
                var th = rec.phase + state.t * omega;
                rec.mesh.position.set(Math.cos(th) * rec.r, 0, Math.sin(th) * rec.r);
            });
        }
        place();
        t3dInfo(overviewHtml());
        t3dStatus('Galilean moons - click a moon for facts; Pause freezes the period ratios.');

        var btnP = document.getElementById('t3dGalileanPlayBtn');
        var btnO = document.getElementById('t3dGalileanOverviewBtn');
        if (btnP) btnP.addEventListener('click', function () {
            state.playing = !state.playing;
            btnP.textContent = state.playing ? 'Pause orbits' : 'Play orbits';
        });
        if (btnO) btnO.addEventListener('click', function () { t3dInfo(overviewHtml()); });

        shell.onClick = function (hits) {
            if (!hits || !hits.length) return;
            for (var i = 0; i < clickTargets.length; i++) {
                if (hits[0].object === clickTargets[i].mesh) {
                    t3dInfo(clickTargets[i].html());
                    return;
                }
            }
        };

        return function animate(dt) {
            if (state.playing) state.t += dt / 1000;
            place();
            shell.applyCamera();
        };
    }

    function t3dBinaryStarSystem(shell) {
        var THREE = shell.THREE;
        var g = new THREE.Group();
        shell.scene.add(g);
        var state = { key: 'sirius', t: 0, playing: true, speed: 1 };
        var bary = new THREE.Mesh(
            new THREE.SphereGeometry(0.45, 12, 12),
            new THREE.MeshBasicMaterial({ color: 0xfff066 })
        );
        g.add(bary);
        var starA = new THREE.Mesh(
            new THREE.SphereGeometry(1.8, 24, 24),
            new THREE.MeshBasicMaterial({ color: 0xddeeff })
        );
        var starB = new THREE.Mesh(
            new THREE.SphereGeometry(1.1, 20, 20),
            new THREE.MeshBasicMaterial({ color: 0xffe8b0 })
        );
        g.add(starA); g.add(starB);
        var orbitLine = null;
        var clickTargets = [];

        function baryFrac(mA, mB) {
            return mB / (mA + mB);
        }
        function buildOrbit(p) {
            if (orbitLine) { g.remove(orbitLine); orbitLine.geometry.dispose(); orbitLine.material.dispose(); }
            var N = shell.low ? 96 : 180;
            var pts = [];
            var a = 12;
            var e = p.ecc;
            var b = a * Math.sqrt(1 - e * e);
            for (var i = 0; i <= N; i++) {
                var th = (i / N) * Math.PI * 2;
                pts.push(new THREE.Vector3(a * Math.cos(th) - a * e, 0, b * Math.sin(th)));
            }
            orbitLine = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: 0x99ccff, transparent: true, opacity: 0.95 })
            );
            g.add(orbitLine);
        }
        function place(p, phase) {
            var a = 12;
            var e = p.ecc;
            var b = a * Math.sqrt(1 - e * e);
            var th = phase;
            var x = a * Math.cos(th) - a * e;
            var z = b * Math.sin(th);
            var fB = baryFrac(p.massA, p.massB);
            var fA = 1 - fB;
            // Relative vector A->B along the radius from bary approach; place opposite sides of barycenter.
            starA.position.set(-x * fB, 0, -z * fB);
            starB.position.set(x * fA, 0, z * fA);
            var rA = 0.7 + 0.55 * Math.pow(p.massA / 2.1, 0.55);
            var rB = 0.45 + 0.4 * Math.pow(p.massB / 1.1, 0.55);
            if (state.key === 'sirius') { rA = 1.9; rB = 0.85; starA.material.color.setHex(0xcce0ff); starB.material.color.setHex(0xfff4cc); }
            else { rA = 1.55; rB = 1.25; starA.material.color.setHex(0xfff0a8); starB.material.color.setHex(0xffc080); }
            starA.scale.setScalar(rA);
            starB.scale.setScalar(rB);
        }
        function factsHtml() {
            var p = T3D_BINARY_PRESETS[state.key];
            var fB = baryFrac(p.massA, p.massB);
            var rows = '<table class="w3-table-all w3-small"><tbody>'
                + '<tr><td>System</td><td>' + p.label + '</td></tr>'
                + '<tr><td>Orbital period</td><td>' + p.periodYr + ' years</td></tr>'
                + '<tr><td>Mass A</td><td>' + p.massA + ' Msun</td></tr>'
                + '<tr><td>Mass B</td><td>' + p.massB + ' Msun</td></tr>'
                + '<tr><td>Barycenter share (B)</td><td>' + (fB * 100).toFixed(1) + '% of A-B separation from A</td></tr>'
                + '<tr><td>Eccentricity</td><td>' + p.ecc + '</td></tr>';
            if (p.periAu != null) {
                rows += '<tr><td>Periastron / apastron</td><td>' + p.periAu + ' AU / ' + p.apoAu + ' AU</td></tr>';
            }
            rows += '</tbody></table>';
            return '<h3>' + p.label + '</h3>'
                + '<p>' + p.aNote + '. ' + p.sepNote + '.</p>'
                + rows
                + '<p class="t3d-note">Both stars orbit the shared barycenter (yellow). Heavier star sits closer to the barycenter - that is the mass-ratio offset. On-screen sizes and separations are compressed for readability; the period, masses, and eccentricity in the table are real published figures. Educational visualization - not an n-body gravity simulation. Source: ' + p.source + '.</p>';
        }
        function applyPreset(key) {
            state.key = key;
            buildOrbit(T3D_BINARY_PRESETS[key]);
            place(T3D_BINARY_PRESETS[key], state.t);
            t3dInfo(factsHtml());
            t3dStatus(T3D_BINARY_PRESETS[key].label + ' - drag to orbit; Play pauses/resumes the period.');
            clickTargets = [
                { mesh: starA, html: function () { return factsHtml(); } },
                { mesh: starB, html: function () { return factsHtml(); } },
                { mesh: bary, html: function () {
                    var p = T3D_BINARY_PRESETS[state.key];
                    var fB = baryFrac(p.massA, p.massB);
                    return '<h3>Barycenter</h3><p>The shared center of mass. With M_A=' + p.massA + ' Msun and M_B=' + p.massB + ' Msun, star B contributes '
                        + (fB * 100).toFixed(1) + '% of the A-B separation measured from A - so the heavier primary sits closer to this point.</p>';
                } }
            ];
        }
        applyPreset('sirius');

        var btnS = document.getElementById('t3dBinaryBtn-sirius');
        var btnA = document.getElementById('t3dBinaryBtn-alphacen');
        var btnP = document.getElementById('t3dBinaryPlayBtn');
        if (btnS) btnS.addEventListener('click', function () { applyPreset('sirius'); });
        if (btnA) btnA.addEventListener('click', function () { applyPreset('alphacen'); });
        if (btnP) btnP.addEventListener('click', function () {
            state.playing = !state.playing;
            btnP.textContent = state.playing ? 'Pause orbit' : 'Play orbit';
        });

        shell.onClick = function (hits) {
            if (!hits || !hits.length) return;
            for (var i = 0; i < clickTargets.length; i++) {
                if (hits[0].object === clickTargets[i].mesh || hits[0].object.parent === clickTargets[i].mesh) {
                    t3dInfo(clickTargets[i].html());
                    return;
                }
            }
        };

        return function animate(dt) {
            if (state.playing) {
                var p = T3D_BINARY_PRESETS[state.key];
                // One full period ~28s at 1x so the orbit is readable.
                state.t += (dt / 1000) * state.speed * (Math.PI * 2) / 28;
                place(p, state.t);
            }
            shell.applyCamera();
        };
    }

    function t3dHohmannEccentricity(p) {
        return (p.sceneR2 - p.sceneR1) / (p.sceneR2 + p.sceneR1);
    }
    function t3dHohmannTransfer(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x050810, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.42));
        var sunLight = new THREE.DirectionalLight(0xfff0d0, 1.1);
        sunLight.position.set(24, 30, 18);
        scene.add(sunLight);
        var SCOUNT = shell.low ? 300 : 700;
        var spos = new Float32Array(SCOUNT * 3);
        for (var s = 0; s < SCOUNT; s++) {
            var v = new THREE.Vector3().randomDirection().multiplyScalar(80 + Math.random() * 130);
            spos[s * 3] = v.x; spos[s * 3 + 1] = v.y; spos[s * 3 + 2] = v.z;
        }
        var sgeo = new THREE.BufferGeometry();
        sgeo.setAttribute('position', new THREE.BufferAttribute(spos, 3));
        scene.add(new THREE.Points(sgeo, new THREE.PointsMaterial({ color: 0xcfd8dc, size: 0.45, sizeAttenuation: false })));

        var bodyMesh = new THREE.Mesh(new THREE.SphereGeometry(2.4, 32, 16), new THREE.MeshBasicMaterial({ color: 0xffd54f }));
        scene.add(bodyMesh);

        var innerRing, outerRing, transferLine, craft, depMarker, arrMarker;
        var state = { key: 'leogeo', phase: 'onInner', t: 0, angleInner: 0, angleOuter: Math.PI };

        function updateFacts() { t3dInfo(factsHtml()); }

        function factsHtml() {
            var p = T3D_HOHMANN_PRESETS[state.key];
            var rows = '<tr><td>Inner orbit r1</td><td>' + p.r1Label + '</td></tr>' +
                '<tr><td>Outer orbit r2</td><td>' + p.r2Label + '</td></tr>' +
                '<tr><td>Transfer time (half the ellipse)</td><td>' + p.transferTime + '</td></tr>';
            if (p.dv1 && p.dv2) {
                rows += '<tr><td>Departure burn (teal marker)</td><td>' + p.dv1 + '</td></tr>' +
                    '<tr><td>Arrival burn (orange marker)</td><td>' + p.dv2 + '</td></tr>';
            }
            rows += '<tr><td>Total delta-v</td><td>' + p.dvTotal + '</td></tr>';
            var extra = p.extra ? '<p>' + p.extra + '</p>' : '';
            return '<h3>' + p.name + ' - Hohmann transfer</h3>' +
                '<p>Press Play transfer to fire the departure burn (teal marker), coast the teal transfer ellipse, and fire the arrival burn (orange marker) to circularize.</p>' +
                '<table class="w3-table w3-bordered">' + rows + '</table>' + extra +
                '<p class="t3d-note">Educational visualization of the classic two-burn maneuver - it does not model launch windows, plane changes, or the Oberth-effect savings real departures exploit. Transfer time note: ' + p.transferNote + '. On-screen orbit radii are compressed for readability; the r1, r2, transfer-time, and delta-v figures above are real. Source: ' + p.source + '.</p>';
        }

        function build() {
            var p = T3D_HOHMANN_PRESETS[state.key];
            bodyMesh.material.color.setHex(p.bodyColor);
            if (innerRing) { scene.remove(innerRing); innerRing.geometry.dispose(); innerRing.material.dispose(); }
            if (outerRing) { scene.remove(outerRing); outerRing.geometry.dispose(); outerRing.material.dispose(); }
            if (transferLine) { scene.remove(transferLine); transferLine.geometry.dispose(); transferLine.material.dispose(); }
            innerRing = new THREE.Mesh(new THREE.TorusGeometry(p.sceneR1, 0.05, 6, 96), new THREE.MeshBasicMaterial({ color: 0x42a5f5 }));
            innerRing.rotation.x = Math.PI / 2;
            scene.add(innerRing);
            outerRing = new THREE.Mesh(new THREE.TorusGeometry(p.sceneR2, 0.05, 6, 96), new THREE.MeshBasicMaterial({ color: 0xef5350 }));
            outerRing.rotation.x = Math.PI / 2;
            scene.add(outerRing);
            var a = (p.sceneR1 + p.sceneR2) / 2, e = t3dHohmannEccentricity(p);
            var pts = [];
            for (var i = 0; i <= 96; i++) {
                var E = (i / 96) * Math.PI; // only the half-ellipse actually flown
                pts.push(a * (Math.cos(E) - e), 0, a * Math.sqrt(1 - e * e) * Math.sin(E));
            }
            var g = new THREE.BufferGeometry();
            g.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
            transferLine = new THREE.Line(g, new THREE.LineBasicMaterial({ color: 0x26a69a }));
            scene.add(transferLine);
            if (!depMarker) {
                depMarker = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 8), new THREE.MeshBasicMaterial({ color: 0x26a69a }));
                scene.add(depMarker);
                arrMarker = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 8), new THREE.MeshBasicMaterial({ color: 0xffa726 }));
                scene.add(arrMarker);
                craft = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.4, 8), new THREE.MeshLambertMaterial({ color: 0xffffff }));
                scene.add(craft);
            }
            depMarker.position.set(p.sceneR1, 0, 0);
            arrMarker.position.set(-p.sceneR2, 0, 0);
            craft.position.set(p.sceneR1, 0, 0);
            state.phase = 'onInner'; state.t = 0; state.angleInner = 0; state.angleOuter = Math.PI;
            var pb = document.getElementById('t3dHohmannPlayBtn');
            if (pb) pb.textContent = 'Play transfer';
            updateFacts();
            t3dStatus('Drag to orbit, scroll or pinch to zoom. Press Play transfer to fire both burns, or click a marker for its facts.');
        }

        ['leogeo', 'earthmars'].forEach(function (key) {
            var btn = document.getElementById('t3dHohmannBtn-' + key);
            if (btn) btn.addEventListener('click', function () { state.key = key; build(); });
        });
        var playBtn = document.getElementById('t3dHohmannPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            if (state.phase === 'onOuter') { build(); return; }
            if (state.phase === 'onInner') {
                state.phase = 'transferring'; state.t = 0;
                craft.position.set(T3D_HOHMANN_PRESETS[state.key].sceneR1, 0, 0);
                playBtn.textContent = 'Transferring...';
            }
        });

        var ray = new THREE.Raycaster();
        shell.onClick = function (e) {
            ray.setFromCamera(shell.ndc(e), shell.camera);
            var hits = ray.intersectObjects([depMarker, arrMarker].filter(Boolean), false);
            if (!hits.length) return;
            var p = T3D_HOHMANN_PRESETS[state.key];
            if (hits[0].object === depMarker) {
                t3dInfo('<h3>Departure burn</h3><p>Fired at the inner orbit (r1 = ' + p.r1Label + ') to raise the far side of the orbit out to r2, entering the transfer ellipse.</p><table class="w3-table w3-bordered"><tr><td>Delta-v</td><td>' + (p.dv1 || p.dvTotal) + '</td></tr></table>');
            } else {
                t3dInfo('<h3>Arrival burn</h3><p>Fired at the outer orbit (r2 = ' + p.r2Label + ') to circularize the transfer ellipse into the outer circular orbit.</p><table class="w3-table w3-bordered"><tr><td>Delta-v</td><td>' + (p.dv2 || p.dvTotal) + '</td></tr></table>');
            }
        };

        build();
        return function animate(dt) {
            var p = T3D_HOHMANN_PRESETS[state.key];
            var a = (p.sceneR1 + p.sceneR2) / 2, e = t3dHohmannEccentricity(p);
            craft.rotation.y += dt * 0.002;
            if (state.phase === 'transferring') {
                state.t += dt / 3200; // about 3.2s on-screen for the whole half-ellipse
                var E = Math.min(state.t, 1) * Math.PI;
                craft.position.set(a * (Math.cos(E) - e), 0, a * Math.sqrt(1 - e * e) * Math.sin(E));
                if (state.t >= 1) {
                    state.phase = 'onOuter';
                    state.angleOuter = Math.PI;
                    var pb = document.getElementById('t3dHohmannPlayBtn');
                    if (pb) pb.textContent = 'Reset to inner orbit';
                    t3dStatus('Arrival burn complete - the craft is circularized on the outer orbit. Press Reset to run it again.');
                }
            } else if (state.phase === 'onInner') {
                state.angleInner += dt * 0.00035;
                craft.position.set(p.sceneR1 * Math.cos(state.angleInner), 0, p.sceneR1 * Math.sin(state.angleInner));
            } else if (state.phase === 'onOuter') {
                state.angleOuter += dt * 0.00018;
                craft.position.set(p.sceneR2 * Math.cos(state.angleOuter), 0, p.sceneR2 * Math.sin(state.angleOuter));
            }
        };
    }

    // ---- bootstrap ------------------------------------------------------------

    // ================= MARS TERRAIN (real MOLA elevation) ====================
    // Real Mars global elevation data (NASA MGS MOLA DEM mosaic, 463 m/px,
    // public domain via USGS Astrogeology PDS) is served from the ftol-vm-assets
    // CDN under the CLAUDE.md large-asset + license gate - NOT committed to this
    // repo. First paint is a plain procedural sphere (G16 render-only pass); the
    // real heightmap fetches + IndexedDB-caches afterward and enhances it in
    // place. Relief is exaggerated for teaching visibility - real Martian relief
    // is under 1% of the planet's radius and would look almost perfectly smooth
    // at true scale, and the info panel discloses this every time.
    var T3D_MARS_CDN = 'https://gh-static.freetool.online/space-3d';
    var T3D_MARS_DB = 'ftol-space3d-assets';

    function t3dMarsIdbOpen() {
        return new Promise(function (resolve, reject) {
            var req = indexedDB.open(T3D_MARS_DB, 1);
            req.onupgradeneeded = function () {
                if (!req.result.objectStoreNames.contains('assets')) {
                    req.result.createObjectStore('assets', { keyPath: 'key' });
                }
            };
            req.onsuccess = function () { resolve(req.result); };
            req.onerror = function () { reject(req.error || new Error('IndexedDB open failed')); };
        });
    }
    function t3dMarsIdbGet(key) {
        return t3dMarsIdbOpen().then(function (db) {
            return new Promise(function (resolve) {
                var tx = db.transaction('assets', 'readonly');
                var rq = tx.objectStore('assets').get(key);
                rq.onsuccess = function () { resolve(rq.result ? rq.result.blob : null); };
                rq.onerror = function () { resolve(null); };
            });
        }).catch(function () { return null; });
    }
    function t3dMarsIdbPut(key, blob) {
        return t3dMarsIdbOpen().then(function (db) {
            return new Promise(function (resolve) {
                var tx = db.transaction('assets', 'readwrite');
                tx.objectStore('assets').put({ key: key, blob: blob });
                tx.oncomplete = function () { resolve(true); };
                tx.onerror = function () { resolve(false); };
            });
        }).catch(function () { return false; });
    }
    function t3dMarsSha256Hex(buf) {
        return crypto.subtle.digest('SHA-256', buf).then(function (hash) {
            var b = new Uint8Array(hash), hex = '';
            for (var i = 0; i < b.length; i++) hex += b[i].toString(16).padStart(2, '0');
            return hex;
        });
    }

    function t3dMarsTerrain(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x05030a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.35));
        var sun = new THREE.DirectionalLight(0xfff1de, 1.0);
        sun.position.set(6, 3, 4);
        scene.add(sun);

        var R = 22; // scene units for the Mars sphere (compressed display scale)
        var MEAN_RADIUS_KM = 3389.5; // NASA planetary fact sheet, Mars mean (volumetric) radius
        var ELEV_MIN_M = -8201, ELEV_MAX_M = 21241; // NASA MGS MOLA global DEM, relative to the areoid
        var segs = shell.low ? { w: 72, h: 36 } : { w: 128, h: 64 };

        var geo = new THREE.SphereGeometry(R, segs.w, segs.h);
        var mat = new THREE.MeshStandardMaterial({ color: 0xb1531f, roughness: 0.95, metalness: 0.0 });
        var mesh = new THREE.Mesh(geo, mat);
        scene.add(mesh);

        var exaggeration = 16; // teaching default
        var heightCanvas = null; // filled once the real heightmap decodes
        var dataReady = false;

        function hypsoColor(lum) {
            // Schematic elevation ramp (NOT true-colour Mars imagery): dark
            // rust lowlands -> ochre midlands -> pale highlands.
            var stops = [
                [0.00, 0x5a2410], [0.35, 0x8a3f18], [0.60, 0xb9722c],
                [0.80, 0xd9a45c], [1.00, 0xefe0c0]
            ];
            for (var i = 1; i < stops.length; i++) {
                if (lum <= stops[i][0] || i === stops.length - 1) {
                    var a = stops[i - 1], b = stops[i];
                    var t = (lum - a[0]) / Math.max(0.0001, b[0] - a[0]);
                    var ca = new THREE.Color(a[1]), cb = new THREE.Color(b[1]);
                    return ca.lerp(cb, Math.min(1, Math.max(0, t)));
                }
            }
            return new THREE.Color(0xb1531f);
        }
        function buildHypsoLut() {
            var lut = new Uint8Array(256 * 3);
            for (var i = 0; i < 256; i++) {
                var col = hypsoColor(i / 255);
                lut[i * 3] = Math.round(col.r * 255);
                lut[i * 3 + 1] = Math.round(col.g * 255);
                lut[i * 3 + 2] = Math.round(col.b * 255);
            }
            return lut;
        }

        function applyExaggeration() {
            if (!dataReady) return;
            var pos = geo.attributes.position;
            var base = geo.userData.basePos;
            var lum = geo.userData.lum;
            var maxDisp = (ELEV_MAX_M - ELEV_MIN_M) / (MEAN_RADIUS_KM * 1000) * R;
            for (var i = 0; i < pos.count; i++) {
                var d = 1 + (lum[i] * maxDisp * exaggeration) / R;
                pos.setXYZ(i, base[i * 3] * d, base[i * 3 + 1] * d, base[i * 3 + 2] * d);
            }
            pos.needsUpdate = true;
            geo.computeVertexNormals();
        }

        function decodeHeightmap(img) {
            var c = document.createElement('canvas');
            c.width = img.width; c.height = img.height;
            var ctx = c.getContext('2d');
            ctx.drawImage(img, 0, 0);
            heightCanvas = c;
            var iw = c.width, ih = c.height;
            var idata = ctx.getImageData(0, 0, iw, ih).data;
            var lut = buildHypsoLut();
            var colorCanvas = document.createElement('canvas');
            colorCanvas.width = iw; colorCanvas.height = ih;
            var cctx = colorCanvas.getContext('2d');
            var out = cctx.createImageData(iw, ih);
            for (var p = 0; p < iw * ih; p++) {
                var v = idata[p * 4];
                out.data[p * 4] = lut[v * 3];
                out.data[p * 4 + 1] = lut[v * 3 + 1];
                out.data[p * 4 + 2] = lut[v * 3 + 2];
                out.data[p * 4 + 3] = 255;
            }
            cctx.putImageData(out, 0, 0);
            var tex = new THREE.CanvasTexture(colorCanvas);
            tex.flipY = false; // keep colour + displacement sampling on the same (u,v) convention below
            tex.colorSpace = THREE.SRGBColorSpace;
            mat.map = tex;
            mat.color.set(0xffffff);
            mat.needsUpdate = true;

            // per-vertex sample for displacement, using the SAME (u,v)->pixel
            // convention as the flipY=false texture above (internal consistency
            // between colour and bump matters more here than absolute lon/lat -
            // the page never claims an exact clicked coordinate, only elevation).
            var uv = geo.attributes.uv;
            var pos = geo.attributes.position;
            var basePos = new Float32Array(pos.count * 3);
            var lumArr = new Float32Array(pos.count);
            for (var i = 0; i < pos.count; i++) {
                basePos[i * 3] = pos.getX(i);
                basePos[i * 3 + 1] = pos.getY(i);
                basePos[i * 3 + 2] = pos.getZ(i);
                var u = uv.getX(i), v = uv.getY(i);
                var x = Math.min(iw - 1, Math.max(0, Math.round(u * iw)));
                var y = Math.min(ih - 1, Math.max(0, Math.round(v * ih)));
                lumArr[i] = idata[(y * iw + x) * 4] / 255;
            }
            geo.userData.basePos = basePos;
            geo.userData.lum = lumArr;
            dataReady = true;
            applyExaggeration();
        }

        function realElevationAt(u, v) {
            if (!heightCanvas) return null;
            var ctx = heightCanvas.getContext('2d');
            var x = Math.min(heightCanvas.width - 1, Math.max(0, Math.round(u * heightCanvas.width)));
            var y = Math.min(heightCanvas.height - 1, Math.max(0, Math.round(v * heightCanvas.height)));
            var px = ctx.getImageData(x, y, 1, 1).data;
            var lum = px[0] / 255; // canvas quantizes to 8-bit even though the source PNG is 16-bit
            return ELEV_MIN_M + lum * (ELEV_MAX_M - ELEV_MIN_M);
        }

        function loadRealData() {
            t3dStatus('Fetching real Mars elevation data (NASA MOLA, one time, then cached)...');
            fetch(T3D_MARS_CDN + '/manifest.json').then(function (r) { return r.json(); })
                .then(function (manifest) {
                    var asset = manifest && manifest.assets && manifest.assets['mars-terrain'];
                    var file = asset && asset.files && asset.files[0];
                    if (!file) throw new Error('manifest missing the mars-terrain asset');
                    var idbKey = 'mars-terrain@' + manifest.version;
                    return t3dMarsIdbGet(idbKey).then(function (cached) {
                        if (cached) return cached;
                        return fetch(T3D_MARS_CDN + '/' + file.file).then(function (r) {
                            if (!r.ok) throw new Error('HTTP ' + r.status);
                            return r.arrayBuffer();
                        }).then(function (buf) {
                            return t3dMarsSha256Hex(buf).then(function (hex) {
                                if (file.sha256 && hex !== file.sha256) { throw new Error('sha256 mismatch on downloaded elevation data'); }
                                var blob = new Blob([buf], { type: 'image/png' });
                                t3dMarsIdbPut(idbKey, blob);
                                return blob;
                            });
                        });
                    });
                })
                .then(function (blob) {
                    var url = URL.createObjectURL(blob);
                    var img = new Image();
                    img.onload = function () { decodeHeightmap(img); URL.revokeObjectURL(url); apply(); };
                    img.onerror = function () { t3dStatus('Could not decode the Mars elevation image - showing the procedural placeholder.'); };
                    img.src = url;
                })
                .catch(function (err) {
                    t3dStatus('Could not load real Mars elevation data (' + (err && err.message ? err.message : err) + ') - showing the procedural placeholder.');
                });
        }

        function panelHtml() {
            var scaleNote = dataReady
                ? 'Real NASA MOLA elevation is loaded - both the colour ramp and the bulge trace the actual dataset.'
                : 'Loading real elevation data now - this placeholder is a plain procedural sphere.';
            return '<h3>Mars terrain (real elevation)</h3>' +
                '<p>' + scaleNote + ' Relief is stretched ' + exaggeration + 'x here for visibility - real Martian relief is under 1% of the planet\'s radius and would look almost perfectly smooth at true scale.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Elevation range (areoid datum)</td><td>-8,201 m to +21,241 m</td></tr>' +
                '<tr><td>Highest mapped region</td><td>~21.2 km (near Olympus Mons)</td></tr>' +
                '<tr><td>Lowest mapped region</td><td>~-8.2 km (near Hellas Planitia)</td></tr>' +
                '<tr><td>Mars mean radius</td><td>3,389.5 km</td></tr>' +
                '<tr><td>Source</td><td>NASA MGS MOLA global DEM, 463 m/px, public domain (USGS Astrogeology PDS)</td></tr>' +
                '</table>' +
                '<p class="t3d-note">Colours are a schematic elevation ramp, not true-colour Mars imagery. Educational approximation - not a live rover feed, not a geology simulator.</p>';
        }

        function apply() {
            t3dInfo(panelHtml());
            var lbl = document.getElementById('t3dMarsTerrainReliefLabel');
            if (lbl) lbl.textContent = 'Relief ' + exaggeration + 'x';
            t3dStatus(dataReady
                ? 'Real MOLA elevation loaded. Drag to orbit; click the globe for a real elevation reading.'
                : 'Drag to orbit while the real elevation data downloads...');
        }

        shell.onClick = function (e) {
            if (!dataReady) return;
            var ndc = shell.ndc(e);
            var ray = new THREE.Raycaster();
            ray.setFromCamera(ndc, shell.camera);
            var hit = ray.intersectObject(mesh)[0];
            if (!hit || !hit.uv) return;
            var elev = realElevationAt(hit.uv.x, hit.uv.y);
            if (elev === null) return;
            t3dInfo(panelHtml() + '<p><b>At the point you clicked: real elevation ~' + Math.round(elev) + ' m (MOLA areoid datum).</b></p>');
        };

        var reliefDown = document.getElementById('t3dMarsTerrainReliefDown');
        var reliefUp = document.getElementById('t3dMarsTerrainReliefUp');
        var realBtn = document.getElementById('t3dMarsTerrainRealBtn');
        var resetBtn = document.getElementById('t3dMarsTerrainResetBtn');
        if (reliefDown) reliefDown.addEventListener('click', function () { exaggeration = Math.max(1, exaggeration - 5); applyExaggeration(); apply(); });
        if (reliefUp) reliefUp.addEventListener('click', function () { exaggeration = Math.min(40, exaggeration + 5); applyExaggeration(); apply(); });
        if (realBtn) realBtn.addEventListener('click', function () { exaggeration = 1; applyExaggeration(); apply(); });
        if (resetBtn) resetBtn.addEventListener('click', function () { exaggeration = 16; applyExaggeration(); apply(); });

        apply();
        loadRealData();

        var spin = 0;
        return function animate(dt) {
            spin += dt * 0.00006;
            mesh.rotation.y = spin;
        };
    }



    // ================= TIDES: EARTH-MOON OCEAN BULGES =========================
    // Equilibrium-tide teaching model: two tidal bulges align with the Earth-Moon
    // axis (near-side: direct pull; far-side: inertia/differential gravity - NOAA
    // oceanservice.noaa.gov/education/tutorial_tides/tides03_gravity.html) while
    // Earth's solid body spins underneath. NOT a real hydrodynamic tide model -
    // no coastlines, resonance, or currents; a single idealized ocean shell.
    var T3D_TIDE_MODES = [
        { id: 'spring', label: 'Spring tide (Sun + Moon aligned)', amp: 1.5, sunAngleDeg: 0 },
        { id: 'normal', label: 'Normal tide (Moon only, for reference)', amp: 1.0, sunAngleDeg: 45 },
        { id: 'neap', label: 'Neap tide (Sun + Moon at right angles)', amp: 0.5, sunAngleDeg: 90 },
    ];

    // Heliosphere teaching scale: termination shock ~94 AU; heliopause ~121 AU (Voyager 1, 2012); wind ~400 km/s.
    var T3D_SW_SHOCK_AU = 94;
    var T3D_SW_HP_AU = 121;
    var T3D_SW_WIND_KMS = 400;
    var T3D_SW_AU_SCALE = 0.22;


    // Cosmic distance ladder teaching constants (km).
    var T3D_CDL_AU_KM = 1.496e8;
    var T3D_CDL_LY_KM = 9.461e12;
    var T3D_CDL_PC_KM = 3.086e13;
    var T3D_CDL_PC_LY = 3.26;
    var T3D_CDL_PARALLAX_PC = 1000;
    var T3D_CDL_MPC_KM = 3.086e19;
    var T3D_CDL_LOG_MIN = Math.log10(T3D_CDL_AU_KM);
    var T3D_CDL_LOG_MAX = Math.log10(T3D_CDL_MPC_KM);
    var T3D_CDL_R_MIN = 2.5;
    var T3D_CDL_R_MAX = 36;

    function t3dCdlLogToR(logKm) {
        var t = (logKm - T3D_CDL_LOG_MIN) / (T3D_CDL_LOG_MAX - T3D_CDL_LOG_MIN);
        if (t < 0) t = 0;
        if (t > 1) t = 1;
        return T3D_CDL_R_MIN + t * (T3D_CDL_R_MAX - T3D_CDL_R_MIN);
    }
    function t3dCdlKmToR(km) { return t3dCdlLogToR(Math.log10(km)); }
    function t3dCdlScrubToLog(scrub) {
        return T3D_CDL_LOG_MIN + (Number(scrub) / 1000) * (T3D_CDL_LOG_MAX - T3D_CDL_LOG_MIN);
    }
    function t3dCdlLogToScrub(logKm) {
        return Math.round(1000 * (logKm - T3D_CDL_LOG_MIN) / (T3D_CDL_LOG_MAX - T3D_CDL_LOG_MIN));
    }
    function t3dCdlFmtKm(km) {
        if (km >= 1e19) return (km / 1e19).toFixed(2) + 'e19 km';
        if (km >= 1e12) return km.toExponential(3) + ' km';
        return km.toExponential(3) + ' km';
    }


    // Axial precession teaching constants (IAU-style figures).
    var T3D_PREC_PERIOD_YR = 25772;
    var T3D_PREC_OBLIQ_DEG = 23.44;
    var T3D_PREC_OBLIQ = T3D_PREC_OBLIQ_DEG * Math.PI / 180;
    var T3D_PREC_RATE_YR_PER_DEG = 72;
    var T3D_PREC_YEAR_NOW = 2000;
    var T3D_PREC_YEAR_VEGA = 14000;
    var T3D_PREC_POLE_R = 8.5;

    function t3dPrecYearToPhase(year) {
        return ((year - T3D_PREC_YEAR_NOW) / T3D_PREC_PERIOD_YR) * Math.PI * 2;
    }
    function t3dPrecPoleDir(year) {
        var phi = t3dPrecYearToPhase(year);
        var s = Math.sin(T3D_PREC_OBLIQ), c = Math.cos(T3D_PREC_OBLIQ);
        return { x: s * Math.cos(phi), y: c, z: s * Math.sin(phi) };
    }
    function t3dPrecFmtYear(y) {
        var n = Math.round(Number(y));
        if (n >= 0) return String(n) + ' CE';
        return String(-n) + ' BCE';
    }


    // HR diagram teaching constants (schematic loci, not a catalog).
    var T3D_HR_SUN_TEFF = 5772;
    var T3D_HR_SUN_L = 1;
    var T3D_HR_T_MIN = 2800;
    var T3D_HR_T_MAX = 42000;
    var T3D_HR_LOG_L_MIN = -3.5;
    var T3D_HR_LOG_L_MAX = 5.5;
    var T3D_HR_SPEC_CLASSES = ['O', 'B', 'A', 'F', 'G', 'K', 'M'];
    var T3D_HR_SPEC_TEFF = [35000, 15000, 8500, 6500, 5772, 4500, 3200];

    function t3dHrTeffToX(teff) {
        var u = (Math.log10(teff) - Math.log10(T3D_HR_T_MIN)) / (Math.log10(T3D_HR_T_MAX) - Math.log10(T3D_HR_T_MIN));
        return 11 - u * 22;
    }
    function t3dHrLogLToY(logL) {
        return (logL - T3D_HR_LOG_L_MIN) / (T3D_HR_LOG_L_MAX - T3D_HR_LOG_L_MIN) * 13 - 6.5;
    }
    function t3dHrTempColor(teff) {
        if (teff >= 20000) return 0x90caf9;
        if (teff >= 10000) return 0xe3f2fd;
        if (teff >= 7500) return 0xfff9c4;
        if (teff >= 5500) return 0xffd54f;
        if (teff >= 4000) return 0xff9800;
        return 0xe64a19;
    }
    function t3dHrMsLogL(teff) {
        return Math.max(T3D_HR_LOG_L_MIN + 0.2, Math.min(T3D_HR_LOG_L_MAX - 0.5, 7.2 * Math.log10(teff / T3D_HR_SUN_TEFF)));
    }

    function t3dHrDiagram(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x02040a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.55));

        var state = { highlight: 'all', specIdx: 4 };
        var groups = { ms: new THREE.Group(), giants: new THREE.Group(), wd: new THREE.Group(), sun: new THREE.Group() };
        scene.add(groups.ms, groups.giants, groups.wd, groups.sun);

        var y0 = t3dHrLogLToY(T3D_HR_LOG_L_MIN);
        var xHot = t3dHrTeffToX(T3D_HR_T_MAX);
        var xCool = t3dHrTeffToX(T3D_HR_T_MIN);
        var yTop = t3dHrLogLToY(T3D_HR_LOG_L_MAX);
        var axisMat = new THREE.LineBasicMaterial({ color: 0x607d8b, transparent: true, opacity: 0.85 });
        scene.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(xHot, y0, 0),
                new THREE.Vector3(xCool, y0, 0)
            ]),
            axisMat
        ));
        scene.add(new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(xCool, y0, 0),
                new THREE.Vector3(xCool, yTop, 0)
            ]),
            axisMat
        ));

        function addCloud(group, count, gen) {
            var pos = new Float32Array(count * 3);
            var cols = new Float32Array(count * 3);
            var i, p, c, teff;
            for (i = 0; i < count; i++) {
                p = gen(i);
                teff = p.teff;
                pos[i * 3] = t3dHrTeffToX(teff) + (Math.random() - 0.5) * 0.35;
                pos[i * 3 + 1] = t3dHrLogLToY(p.logL) + (Math.random() - 0.5) * 0.25;
                pos[i * 3 + 2] = (Math.random() - 0.5) * 0.6;
                c = new THREE.Color(t3dHrTempColor(teff));
                cols[i * 3] = c.r; cols[i * 3 + 1] = c.g; cols[i * 3 + 2] = c.b;
            }
            var geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
            group.add(new THREE.Points(geo, new THREE.PointsMaterial({
                size: shell.low ? 0.22 : 0.32, vertexColors: true, sizeAttenuation: false, transparent: true, opacity: 0.92
            })));
        }

        var msN = shell.low ? 220 : 520;
        addCloud(groups.ms, msN, function () {
            var teff = T3D_HR_T_MIN + Math.pow(Math.random(), 0.55) * (T3D_HR_T_MAX - T3D_HR_T_MIN);
            return { teff: teff, logL: t3dHrMsLogL(teff) + (Math.random() - 0.5) * 0.35 };
        });
        addCloud(groups.giants, shell.low ? 90 : 180, function () {
            var teff = 3200 + Math.random() * 2800;
            var logL = 1.2 + Math.random() * 3.8;
            return { teff: teff, logL: logL };
        });
        addCloud(groups.wd, shell.low ? 70 : 140, function () {
            var teff = 7000 + Math.random() * 28000;
            var logL = T3D_HR_LOG_L_MIN + 0.2 + Math.random() * 2.2;
            return { teff: teff, logL: logL };
        });

        var sun = new THREE.Mesh(
            new THREE.SphereGeometry(0.42, 16, 12),
            new THREE.MeshBasicMaterial({ color: 0xfff176 })
        );
        sun.position.set(t3dHrTeffToX(T3D_HR_SUN_TEFF), t3dHrLogLToY(Math.log10(T3D_HR_SUN_L)), 0.2);
        groups.sun.add(sun);
        var sunGlow = new THREE.Mesh(
            new THREE.SphereGeometry(0.7, 12, 10),
            new THREE.MeshBasicMaterial({ color: 0xfff59d, transparent: true, opacity: 0.35 })
        );
        sunGlow.position.copy(sun.position);
        groups.sun.add(sunGlow);

        shell.orbit.goalRadius = 24;
        shell.orbit.radius = 24;
        shell.orbit.goalPhi = 1.08;
        shell.orbit.phi = 1.08;

        function factsTableHtml() {
            return '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Locus</th><th>Figure</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Sun</td><td>Teff ~5,772 K, L = 1 Lsun</td><td>Main-sequence G-type anchor</td></tr>'
                + '<tr><td>Main sequence</td><td>Hot O/B to cool M dwarfs</td><td>Diagonal hydrogen-burning band</td></tr>'
                + '<tr><td>Giants / supergiants</td><td>L ~10 to 1e5+ Lsun</td><td>Upper-right high luminosity locus</td></tr>'
                + '<tr><td>White dwarfs</td><td>Hot but faint</td><td>Lower-left hot + low L region</td></tr>'
                + '<tr><td>Axes</td><td>Temperature (K), log(L/Lsun)</td><td>Hot left, cool right; log L vertical</td></tr>'
                + '</tbody></table></div>';
        }
        function overviewHtml() {
            return '<h3>HR diagram schematic</h3>'
                + '<p>Temperature runs <b>hot left / cool right</b>; luminosity is <b>log(L/Lsun)</b> upward. The <b>main sequence</b> spans O/B through M dwarfs. <b>Giants</b> sit at high L; <b>white dwarfs</b> are hot but faint.</p>'
                + '<p>The <b>Sun</b> sits at <b>Teff ~5,772 K</b> and <b>L = 1 Lsun</b> on the main sequence.</p>'
                + factsTableHtml()
                + '<p class="t3d-note">Educational schematic diagram of HR loci - not a full stellar catalog visualization.</p>';
        }
        function msFactsHtml() {
            return '<h3>Main sequence</h3>'
                + '<p>The colored band runs from hot blue-white O/B stars to cooler orange-red M dwarfs along the hydrogen-burning main sequence.</p>';
        }
        function giantsFactsHtml() {
            return '<h3>Giants and supergiants</h3>'
                + '<p>Expanded evolved stars with <b>high luminosity</b> (~10 to 1e5+ Lsun) in the upper-right region of the schematic.</p>';
        }
        function wdFactsHtml() {

        }
        function sunFactsHtml() {
            return '<h3>Sun marker</h3>'
                + '<p><b>Teff ~5,772 K</b> and <b>L = 1 Lsun</b> - the G-type main-sequence anchor on this teaching diagram.</p>';

        function applyHighlight(mode) {
            state.highlight = mode;
            var dim = 0.18, full = 1;
            groups.ms.children.forEach(function (ch) { if (ch.material) ch.material.opacity = (mode === 'all' || mode === 'ms') ? full : dim; });
            groups.giants.children.forEach(function (ch) { if (ch.material) ch.material.opacity = (mode === 'all' || mode === 'giants') ? full : dim; });
            groups.wd.children.forEach(function (ch) { if (ch.material) ch.material.opacity = (mode === 'all' || mode === 'wd') ? full : dim; });
            var sunOn = mode === 'all' || mode === 'sun';

        t3dInfo(overviewHtml());
        t3dStatus('HR Diagram 3D Explorer - Sun Teff ~5,772 K, L = 1 Lsun; main sequence, giants, white dwarfs.');

        bindBtn('t3dHrMsBtn', function () { applyHighlight('ms'); t3dInfo(msFactsHtml()); focusCamera(12000, 1.5); });
        bindBtn('t3dHrGiantsBtn', function () { applyHighlight('giants'); t3dInfo(giantsFactsHtml()); focusCamera(4200, 3.2); });
        bindBtn('t3dHrWdBtn', function () { applyHighlight('wd'); t3dInfo(wdFactsHtml()); focusCamera(12000, -1.8); });
        bindBtn('t3dHrSunBtn', function () { applyHighlight('sun'); t3dInfo(sunFactsHtml()); focusCamera(T3D_HR_SUN_TEFF, 0); });
        bindBtn('t3dHrOverviewBtn', function () { applyHighlight('all'); t3dInfo(overviewHtml()); shell.orbit.goalRadius = 24; });
        var spec = document.getElementById('t3dHrSpecScrub');

        if (spec) {

                applyHighlight('ms');

            });

        return function animate(dt) {

                var u = (i / jetN) + state.phase;
                var seg = Math.floor(u * 6) % 6;
                var f = (u * 6) - Math.floor(u * 6);
                var a0 = (seg / 6) * Math.PI * 2 - Math.PI / 2;
                var a1 = ((seg + 1) / 6) * Math.PI * 2 - Math.PI / 2;
                var x0 = Math.cos(a0) * hexR, z0 = Math.sin(a0) * hexR;
                var x1 = Math.cos(a1) * hexR, z1 = Math.sin(a1) * hexR;
                jetPos[i * 3] = x0 + (x1 - x0) * f;
                jetPos[i * 3 + 1] = 0.04 * Math.sin(state.t * 0.01 + i);
                jetPos[i * 3 + 2] = z0 + (z1 - z0) * f;
            }
            jetGeo.attributes.position.needsUpdate = true;
        }

        function factsHtml() {
            return '<h3>Saturn north-polar hexagon</h3>'
                + '<p>A persistent hexagonal jet stream around Saturn\'s north pole - imaged by Voyager and studied in detail by Cassini. Width ~<b>30,000 km</b>; side ~<b>13,800 km</b>; jet ~<b>120 m/s</b>.</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Width across</td><td>~30,000 km</td><td>NASA / Cassini literacy figure</td></tr>'
                + '<tr><td>Side length</td><td>~13,800 km</td><td>Regular-hexagon teaching side</td></tr>'
                + '<tr><td>Jet speed</td><td>~120 m/s</td><td>Polar jet stream order of magnitude</td></tr>'
                + '<tr><td>Saturn rotation</td><td>~' + ROT_H + ' h</td><td>System III teaching period</td></tr>'
                + '<tr><td>Rotation phase</td><td>' + (state.phase % 1).toFixed(2) + '</td><td>Schematic spin of the hexagon jet</td></tr>'
                + '<tr><td>Rings</td><td>' + (state.showRings ? 'shown' : 'hidden') + '</td><td>Context only - see Saturn Rings 3D for bands</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational polar-hexagon schematic - not a fluid-dynamics or weather model. Hexagon scale is exaggerated relative to the globe for teaching.</p>';
        }
        function updateFacts() {
            t3dInfo(factsHtml());
            t3dStatus('Saturn hexagon ~30,000 km across - jet ~120 m/s - phase '
                + (state.phase % 1).toFixed(2)
                + (state.playing ? ' - spinning' : ' - paused') + '.');
        }

        placeJets();
        updateFacts();

        var phaseEl = document.getElementById('t3dHexPhase');
        if (phaseEl) phaseEl.addEventListener('input', function () {
            state.phase = Math.min(1, Math.max(0, parseFloat(phaseEl.value || '0.15')));
            placeJets();
            updateFacts();
        });
        var playBtn = document.getElementById('t3dHexPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            state.playing = !state.playing;
            playBtn.textContent = state.playing ? 'Pause spin' : 'Play spin';
        });
        var ringBtn = document.getElementById('t3dHexRingBtn');
        if (ringBtn) ringBtn.addEventListener('click', function () {
            state.showRings = !state.showRings;
            ringGroup.visible = state.showRings;
            ringBtn.textContent = state.showRings ? 'Hide rings' : 'Show rings';
            updateFacts();
        });

        return function animate(dt) {
            state.t += dt;
            if (state.playing) {
                state.phase = (state.phase + dt * 0.00008) % 1;
                if (phaseEl) phaseEl.value = String(state.phase.toFixed(3));
            }
            root.rotation.y = state.phase * Math.PI * 2;
            placeJets();
            if (Math.floor(state.t / 400) !== Math.floor((state.t - dt) / 400)) updateFacts();
            shell.applyCamera();
        };
    }

    function t3dSolarAnalemma(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x0a1220, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.45));
        var key = new THREE.DirectionalLight(0xfff4d6, 1.05);
        key.position.set(6, 10, 8);
        scene.add(key);

        var OBLIQ = 23.44;
        var state = { day: 172, playing: true, showEot: true };

        var root = new THREE.Group();
        scene.add(root);

        // Sky dome grid (schematic celestial sphere slice)
        var dome = new THREE.Mesh(
            new THREE.SphereGeometry(14, shell.low ? 24 : 36, shell.low ? 16 : 24),
            new THREE.MeshBasicMaterial({ color: 0x152238, transparent: true, opacity: 0.35, side: THREE.BackSide })
        );
        root.add(dome);

        // Meridian + horizon markers
        var meridian = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, -8, 0), new THREE.Vector3(0, 8, 0)
            ]),
            new THREE.LineBasicMaterial({ color: 0x607d8b })
        );
        root.add(meridian);
        var horizon = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints((function () {
                var pts = [];
                for (var i = 0; i <= 64; i++) {
                    var a = (i / 64) * Math.PI * 2;
                    pts.push(new THREE.Vector3(Math.cos(a) * 8, 0, Math.sin(a) * 8));
                }
                return pts;
            })()),
            new THREE.LineBasicMaterial({ color: 0x455a64 })
        );
        root.add(horizon);

        // Analemma path (figure-8) from teaching approx: declination + equation of time
        function dayToPos(dayOfYear) {
            var n = dayOfYear; // 0..365
            var B = (2 * Math.PI / 365) * (n - 81);
            // Equation of time minutes (Spencer / common teaching approx)
            var eotMin = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
            // Solar declination degrees
            var dec = OBLIQ * Math.sin((2 * Math.PI / 365) * (n - 81));
            // Map to local sky panel: x = EoT (east-west), y = declination (altitude-like)
            var x = (eotMin / 16) * 3.2; // ~+/-16 min scale
            var y = (dec / OBLIQ) * 5.5;
            return { x: x, y: y, eotMin: eotMin, dec: dec };
        }

        var pathPts = [];
        var N = shell.low ? 90 : 180;
        for (var i = 0; i <= N; i++) {
            var d = (i / N) * 365;
            var p = dayToPos(d);
            pathPts.push(new THREE.Vector3(p.x, p.y, 0));
        }
        var analemmaLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(pathPts),
            new THREE.LineBasicMaterial({ color: 0xffb300 })
        );
        root.add(analemmaLine);

        // Month ticks (approx day-of-year mid-month)
        var monthDays = [15, 46, 74, 105, 135, 166, 196, 227, 258, 288, 319, 349];
        monthDays.forEach(function (md) {
            var p = dayToPos(md);
            var tick = new THREE.Mesh(
                new THREE.SphereGeometry(0.12, 8, 6),
                new THREE.MeshBasicMaterial({ color: 0xffe082 })
            );
            tick.position.set(p.x, p.y, 0.05);
            root.add(tick);
        });

        var sunMarker = new THREE.Mesh(
            new THREE.SphereGeometry(0.42, 16, 12),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        root.add(sunMarker);

        var eotBar = new THREE.Mesh(
            new THREE.BoxGeometry(0.08, 0.08, 0.08),
            new THREE.MeshBasicMaterial({ color: 0x4fc3f7 })
        );
        root.add(eotBar);

        function place() {
            var p = dayToPos(state.day);
            sunMarker.position.set(p.x, p.y, 0.15);
            eotBar.visible = state.showEot;
            if (state.showEot) {
                eotBar.scale.set(1, 1, 1);
                eotBar.position.set(p.x * 0.5, -6.2, 0);
                eotBar.scale.x = Math.max(0.3, Math.abs(p.eotMin) / 4);
                eotBar.position.x = (p.eotMin >= 0 ? 1 : -1) * (eotBar.scale.x * 0.04);
            }
            return p;
        }

        function factsHtml() {
            var p = dayToPos(state.day);
            return '<h3>Solar analemma (teaching schematic)</h3>'
                + '<p>Photograph the Sun at the same clock time for a year and the spots form a figure-8. The shape mixes <b>declination</b> (Earth obliquity ~<b>23.44 deg</b>) with the <b>equation of time</b> (orbit eccentricity + obliquity).</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Obliquity</td><td>23.44 deg</td><td>IAU / Earth orientation - drives north-south swing</td></tr>'
                + '<tr><td>Equation of time range</td><td>about +/-16 min</td><td>Teaching approx (Spencer-style formula)</td></tr>'
                + '<tr><td>Day of year</td><td>' + Math.round(state.day) + '</td><td>Slider 0-365 (non-leap teaching year)</td></tr>'
                + '<tr><td>Declination now</td><td>' + p.dec.toFixed(1) + ' deg</td><td>Approx from obliquity sine model</td></tr>'
                + '<tr><td>Equation of time now</td><td>' + p.eotMin.toFixed(1) + ' min</td><td>Positive = sundial ahead of mean time</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational analemma schematic - not an ephemeris. The figure-8 uses a common teaching approximation for EoT and declination; sizes are exaggerated for one-screen clarity.</p>';
        }
        function updateFacts() {
            place();
            t3dInfo(factsHtml());
            var p = dayToPos(state.day);
            t3dStatus('Analemma day ' + Math.round(state.day)
                + ' - dec ' + p.dec.toFixed(1) + ' deg - EoT ' + p.eotMin.toFixed(1)
                + ' min - obliquity 23.44 deg.');
        }

        place();
        updateFacts();

        var dayEl = document.getElementById('t3dAnalemmaDay');
        if (dayEl) dayEl.addEventListener('input', function () {
            state.day = Math.min(365, Math.max(0, parseFloat(dayEl.value || '172')));
            updateFacts();
        });
        var playBtn = document.getElementById('t3dAnalemmaPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            state.playing = !state.playing;
            playBtn.textContent = state.playing ? 'Pause year' : 'Play year';
        });
        var eotBtn = document.getElementById('t3dAnalemmaEotBtn');
        if (eotBtn) eotBtn.addEventListener('click', function () {
            state.showEot = !state.showEot;
            eotBtn.textContent = state.showEot ? 'Hide EoT bar' : 'Show EoT bar';
            updateFacts();
        });

        return function animate(dt) {
            if (state.playing) {
                state.day += dt * 0.012;
                if (state.day > 365) state.day -= 365;
                if (dayEl) dayEl.value = String(state.day.toFixed(0));
            }
            place();
            if (Math.floor(state.day) !== Math.floor(state.day - dt * 0.012)) updateFacts();
            shell.applyCamera();
        };
    }

    function t3dRocheLimit(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x05070e, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        var key = new THREE.DirectionalLight(0xfff0d8, 1.1);
        key.position.set(12, 8, 10);
        scene.add(key);

        var RP = 3.2; // primary radius (schematic units)
        var FLUID = 2.44;
        var RIGID = 1.26;
        var state = { dist: 3.6, mode: 'fluid', playing: false, t: 0 };

        var root = new THREE.Group();
        scene.add(root);

        var primary = new THREE.Mesh(
            new THREE.SphereGeometry(RP, shell.low ? 28 : 40, shell.low ? 20 : 28),
            new THREE.MeshLambertMaterial({ color: 0x5b8def, emissive: 0x102038, emissiveIntensity: 0.2 })
        );
        root.add(primary);

        var rocheRing = new THREE.Mesh(
            new THREE.RingGeometry(RP * FLUID - 0.08, RP * FLUID + 0.08, shell.low ? 48 : 72),
            new THREE.MeshBasicMaterial({ color: 0xff7043, transparent: true, opacity: 0.85, side: THREE.DoubleSide })
        );
        rocheRing.rotation.x = -Math.PI / 2;
        root.add(rocheRing);

        var rigidRing = new THREE.Mesh(
            new THREE.RingGeometry(RP * RIGID - 0.06, RP * RIGID + 0.06, shell.low ? 40 : 64),
            new THREE.MeshBasicMaterial({ color: 0x81c784, transparent: true, opacity: 0.55, side: THREE.DoubleSide })
        );
        rigidRing.rotation.x = -Math.PI / 2;
        root.add(rigidRing);

        var moonGroup = new THREE.Group();
        root.add(moonGroup);
        var moonBody = new THREE.Mesh(
            new THREE.SphereGeometry(0.85, shell.low ? 16 : 24, shell.low ? 12 : 18),
            new THREE.MeshLambertMaterial({ color: 0xcfd8dc, emissive: 0x222428, emissiveIntensity: 0.12 })
        );
        moonGroup.add(moonBody);

        var shards = [];
        for (var i = 0; i < (shell.low ? 10 : 16); i++) {
            var sh = new THREE.Mesh(
                new THREE.BoxGeometry(0.18, 0.12, 0.15),
                new THREE.MeshLambertMaterial({ color: 0xb0bec5 })
            );
            sh.visible = false;
            moonGroup.add(sh);
            shards.push({ mesh: sh, ang: (i / 16) * Math.PI * 2, r: 0.4 + (i % 5) * 0.12 });
        }

        function limitR() {
            return RP * (state.mode === 'fluid' ? FLUID : RIGID);
        }

        function placeMoon() {
            var d = state.dist * RP;
            moonGroup.position.set(d, 0, 0);
            var inside = state.dist < (state.mode === 'fluid' ? FLUID : RIGID);
            moonBody.visible = !inside;
            shards.forEach(function (s, idx) {
                s.mesh.visible = inside;
                if (inside) {
                    var wobble = 0.15 * Math.sin(state.t * 0.004 + idx);
                    s.mesh.position.set(
                        Math.cos(s.ang + state.t * 0.001) * (s.r + wobble),
                        Math.sin(state.t * 0.003 + idx) * 0.25,
                        Math.sin(s.ang + state.t * 0.001) * (s.r + wobble)
                    );
                    s.mesh.rotation.y = state.t * 0.002 + idx;
                }
            });
            rocheRing.material.opacity = state.mode === 'fluid' ? 0.9 : 0.35;
            rigidRing.material.opacity = state.mode === 'rigid' ? 0.9 : 0.35;
        }

        function factsHtml() {
            var lim = state.mode === 'fluid' ? FLUID : RIGID;
            var inside = state.dist < lim;
            return '<h3>Roche limit (teaching schematic)</h3>'
                + '<p>A satellite closer than the Roche limit is torn by tidal forces. Fluid bodies: ~<b>2.44 R</b>; rigid bodies: ~<b>1.26 R</b> (equal-density rule of thumb). Slider distance is in primary radii.</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'
                + '<tr><td>Fluid Roche limit</td><td>~2.44 R</td><td>Equal-density fluid satellite (classic Roche factor)</td></tr>'
                + '<tr><td>Rigid Roche limit</td><td>~1.26 R</td><td>Equal-density rigid-body approximation</td></tr>'
                + '<tr><td>Mode</td><td>' + state.mode + '</td><td>Orange ring = fluid 2.44 R; green ring = rigid 1.26 R</td></tr>'
                + '<tr><td>Orbital distance</td><td>' + state.dist.toFixed(2) + ' R</td><td>' + (inside ? 'INSIDE limit - shards shown' : 'OUTSIDE limit - intact moon') + '</td></tr>'
                + '<tr><td>Active limit</td><td>' + lim.toFixed(2) + ' R</td><td>Compared against the distance slider</td></tr>'
                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational Roche-limit schematic - not an N-body hydrodynamics solver. Densities are equal for the classic 2.44 / 1.26 factors; sizes are exaggerated for teaching.</p>';
        }
        function updateFacts() {
            t3dInfo(factsHtml());
            var lim = state.mode === 'fluid' ? FLUID : RIGID;
            t3dStatus('Roche ' + state.mode + ' ~' + lim.toFixed(2) + ' R - distance '
                + state.dist.toFixed(2) + ' R'
                + (state.dist < lim ? ' - INSIDE (disrupt)' : ' - outside (intact)') + '.');
        }

        placeMoon();
        updateFacts();

        var distEl = document.getElementById('t3dRocheDist');
        if (distEl) distEl.addEventListener('input', function () {
            state.dist = Math.min(5.5, Math.max(1.05, parseFloat(distEl.value || '3.6')));
            placeMoon();
            updateFacts();
        });
        var modeBtn = document.getElementById('t3dRocheModeBtn');
        if (modeBtn) modeBtn.addEventListener('click', function () {
            state.mode = state.mode === 'fluid' ? 'rigid' : 'fluid';
            modeBtn.textContent = state.mode === 'fluid' ? 'Mode: fluid 2.44 R' : 'Mode: rigid 1.26 R';
            placeMoon();
            updateFacts();
        });
        var playBtn = document.getElementById('t3dRochePlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            state.playing = !state.playing;
            playBtn.textContent = state.playing ? 'Pause approach' : 'Play approach';
        });

        return function animate(dt) {
            state.t += dt;
            if (state.playing) {
                state.dist -= dt * 0.00022;
                if (state.dist < 1.1) state.dist = 5.2;
                if (distEl) distEl.value = String(state.dist.toFixed(2));
            }
            placeMoon();
            if (Math.floor(state.t / 400) !== Math.floor((state.t - dt) / 400)) updateFacts();
            shell.applyCamera();
        };
    }

    function t3dUranusTilt(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x020810, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.42));
        var key = new THREE.DirectionalLight(0xfff4d6, 1.15);
        key.position.set(14, 2, 6);
        scene.add(key);

        var TILT_U = 97.8;
        var TILT_E = 23.44;
        var PERIOD_YR = 84;
        var RU = 3.6;

        var root = new THREE.Group();
        scene.add(root);

        var orbitPts = [];
        for (var i = 0; i <= 96; i++) {
            var a = (i / 96) * Math.PI * 2;
            orbitPts.push(new THREE.Vector3(Math.cos(a) * 11.5, 0, Math.sin(a) * 11.5));
        }
        var orbitLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(orbitPts),
            new THREE.LineBasicMaterial({ color: 0x4a6a88, transparent: true, opacity: 0.75 })

        root.add(orbitLine);

        var plane = new THREE.Mesh(
            new THREE.CircleGeometry(11.5, shell.low ? 48 : 72),
            new THREE.MeshBasicMaterial({ color: 0x1a3048, transparent: true, opacity: 0.18, side: THREE.DoubleSide })
        );
        plane.rotation.x = -Math.PI / 2;
        root.add(plane);

        var sunMarker = new THREE.Mesh(
            new THREE.SphereGeometry(0.55, 16, 12),
            new THREE.MeshBasicMaterial({ color: 0xffd54f })
        );
        sunMarker.position.set(11.5, 0, 0);
        root.add(sunMarker);

        var uranusGroup = new THREE.Group();
        root.add(uranusGroup);

        var body = new THREE.Mesh(
            new THREE.SphereGeometry(RU, shell.low ? 32 : 48, shell.low ? 24 : 36),
            new THREE.MeshLambertMaterial({ color: 0x7ec8d8, emissive: 0x12303a, emissiveIntensity: 0.18 })
        );
        uranusGroup.add(body);

        var ring = new THREE.Mesh(
            new THREE.RingGeometry(RU * 1.35, RU * 1.85, shell.low ? 36 : 56),
            new THREE.MeshBasicMaterial({ color: 0xa8c8d8, transparent: true, opacity: 0.55, side: THREE.DoubleSide })
        );
        ring.rotation.x = Math.PI / 2;
        uranusGroup.add(ring);

        var axisLen = RU * 2.6;
        var axisGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, -axisLen, 0),
            new THREE.Vector3(0, axisLen, 0)
        ]);
        var axisLine = new THREE.Line(axisGeom, new THREE.LineBasicMaterial({ color: 0xff7043 }));
        uranusGroup.add(axisLine);

        var northPole = new THREE.Mesh(
            new THREE.SphereGeometry(0.18, 10, 8),
            new THREE.MeshBasicMaterial({ color: 0xff5722 })
        );
        northPole.position.y = axisLen;
        uranusGroup.add(northPole);

        var earthGhost = new THREE.Group();

        root.add(earthGhost);

            new THREE.SphereGeometry(RU * 0.55, 20, 16),
            new THREE.MeshLambertMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.55 })
        );
        earthGhost.add(earthBody);
        var eAxis = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, -RU * 1.4, 0),
                new THREE.Vector3(0, RU * 1.4, 0)
            ]),
            new THREE.LineBasicMaterial({ color: 0x81c784 })
        );
        earthGhost.add(eAxis);
        earthGhost.position.set(-5.5, 0, 0);
        earthGhost.rotation.z = THREE.MathUtils.degToRad(TILT_E);

        var state = { year: 0, playing: true, compareEarth: false, spin: 0 };

        function placeUranus() {
            var ang = (state.year / PERIOD_YR) * Math.PI * 2;
            uranusGroup.position.set(Math.cos(ang) * 11.5, 0, Math.sin(ang) * 11.5);
            // Spin axis nearly in the orbital plane (~97.8 deg from orbital normal).
            uranusGroup.rotation.set(0, 0, 0);
            uranusGroup.rotateZ(THREE.MathUtils.degToRad(TILT_U - 90));
            uranusGroup.rotateY(ang);
            uranusGroup.rotateY(state.spin);
        }

        function seasonLabel() {
            var f = (state.year % PERIOD_YR) / PERIOD_YR;
            if (f < 0.12 || f > 0.88) return 'near solstice (pole toward Sun)';

        function factsHtml() {

                + '<p>Uranus spins with axial tilt ~<b>97.8 deg</b> - its poles spend long stretches aimed toward the Sun across an ~<b>84 yr</b> orbit. Compare with Earth obliquity <b>23.44 deg</b> on Seasons Earth 3D.</p>'
                + '<div class="w3-responsive"><table class="w3-table w3-bordered w3-small"><thead><tr><th>Figure</th><th>Value</th><th>Note</th></tr></thead><tbody>'

                + '</tbody></table></div>'
                + '<p class="t3d-note">Educational tilt + orbit schematic - not an N-body ephemeris or climate model. Ring plane and sizes are exaggerated for one-screen teaching.</p>';
        }
        function updateFacts() {
            t3dInfo(factsHtml());
            t3dStatus('Uranus tilt ~97.8 deg - orbit ~84 yr - year ' + state.year.toFixed(1)
                + (state.compareEarth ? ' - Earth compare 23.44 deg' : '') + '.');
        }

        placeUranus();
        updateFacts();

        var yearEl = document.getElementById('t3dUranusYear');
        if (yearEl) yearEl.addEventListener('input', function () {
            state.year = Math.min(PERIOD_YR, Math.max(0, parseFloat(yearEl.value || '0')));
            placeUranus();
            updateFacts();
        });
        var playBtn = document.getElementById('t3dUranusPlayBtn');
        if (playBtn) playBtn.addEventListener('click', function () {
            state.playing = !state.playing;
            playBtn.textContent = state.playing ? 'Pause orbit' : 'Play orbit';
        });
        var cmpBtn = document.getElementById('t3dUranusEarthBtn');

        return function animate(dt) {
