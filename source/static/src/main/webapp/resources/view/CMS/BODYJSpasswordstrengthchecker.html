<script>
    // Password strength checker skeleton (password-strength-checker) - zxcvbn (self-hosted at
    // /vendor/zxcvbn/), no upload, no backend. Registry Gate-H entry:
    // password_strength_checker_zxcvbn. Lazy-loads the ~800 KB zxcvbn bundle
    // on first keystroke so the page-load cost stays low; renders a strength
    // readout for a sample password on load so e2e G16 has visible output
    // with zero interaction (mirrors the password-generator skeleton's
    // "render on load" contract). NO fetch() against the password - it is
    // scored fully in-browser and never leaves this tab; it is never logged
    // or included in a URL. This tool does NOT check against breach
    // databases (that requires an external k-anonymity API call this tool
    // deliberately does not make).

    web.localUpload = false;

    var PSC_SAMPLE = 'CorrectHorseBattery9!';

    // Idempotent lazy-loader for the self-hosted zxcvbn UMD bundle
    // (window.zxcvbn), vendored at /vendor/zxcvbn/ (mirrors the
    // /vendor/js-beautify + /vendor/pdf-lib loader convention).
    function pscLoadZxcvbn() {
        if (window.zxcvbn) { return Promise.resolve(); }
        if (window.__ftoZxcvbnPromise) { return window.__ftoZxcvbnPromise; }
        var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/zxcvbn';
        window.__ftoZxcvbnPromise = new Promise(function (resolve, reject) {
            var s = document.createElement('script');
            s.src = base + '/zxcvbn.js';
            s.async = true;
            s.onload = function () { resolve(); };
            s.onerror = function () { reject(new Error('failed to load zxcvbn.js')); };
            document.head.appendChild(s);
        });
        return window.__ftoZxcvbnPromise;
    }

    var PSC_SCORE_LABELS = ['Very weak', 'Weak', 'Fair', 'Strong', 'Very strong'];
    var PSC_SCORE_COLORS = ['w3-red', 'w3-deep-orange', 'w3-amber', 'w3-light-green', 'w3-green'];

    function doAfterPageRendered() {
        var root = document.getElementById('passwordStrengthCheckerTool');
        if (!root) return; // not a password-strength-checker page
        root.innerHTML =
            '<div class="w3-row" style="margin-bottom:8px;">' +
            '<div style="position:relative;max-width:420px;">' +
            '<input id="pscInput" type="password" class="w3-input w3-border outputImgs" style="visibility:visible !important;padding-right:60px;" autocomplete="new-password" value="' + PSC_SAMPLE + '"> ' +
            '<button id="pscToggle" type="button" class="w3-button" style="position:absolute;right:0;top:0;height:100%;">Show</button>' +
            '</div></div>' +
            '<div class="w3-row" style="margin-bottom:6px;max-width:420px;">' +
            '<div style="height:8px;border-radius:4px;background:#e0e0e0;overflow:hidden;">' +
            '<div id="pscBar" style="height:100%;width:0%;transition:width .15s;"></div>' +
            '</div></div>' +
            '<div class="w3-row" style="margin-bottom:8px;">' +
            '<span id="pscLabel" class="w3-tag"></span>' +
            '</div>' +
            '<div id="pscCrack" class="w3-row" style="margin-bottom:8px;color:#555;"></div>' +
            '<ul id="pscFeedback" class="w3-ul" style="max-width:420px;"></ul>' +
            '<div id="pscStatus" style="min-height:1.2em;color:#555;">Scored locally in your browser with zxcvbn - the password is never sent anywhere, logged, or checked against a breach database.</div>';

        var q = function (id) { return root.querySelector(id); };
        var shown = false;
        q('#pscToggle').addEventListener('click', function () {
            shown = !shown;
            q('#pscInput').type = shown ? 'text' : 'password';
            this.textContent = shown ? 'Hide' : 'Show';
        });

        function render() {
            var pw = q('#pscInput').value || '';
            if (!pw) {
                q('#pscBar').style.width = '0%';
                q('#pscBar').style.background = '#e0e0e0';
                q('#pscLabel').textContent = '';
                q('#pscLabel').className = 'w3-tag';
                q('#pscCrack').textContent = '';
                q('#pscFeedback').innerHTML = '';
                return;
            }
            if (!window.zxcvbn) {
                q('#pscStatus').textContent = 'Loading the local scoring library...';
                pscLoadZxcvbn().then(render).catch(function () {
                    q('#pscStatus').textContent = 'Could not load the local scoring library. Try reloading the page.';
                });
                return;
            }
            var result = window.zxcvbn(pw);
            var score = Math.max(0, Math.min(4, result.score | 0));
            var colorClass = PSC_SCORE_COLORS[score];
            var bar = q('#pscBar');
            bar.style.width = ((score + 1) * 20) + '%';
            bar.className = '';
            bar.style.background = ({ 0: '#d32f2f', 1: '#e65100', 2: '#f9a825', 3: '#7cb342', 4: '#2e7d32' })[score];
            var tag = q('#pscLabel');
            tag.textContent = PSC_SCORE_LABELS[score] + ' (score ' + score + '/4)';
            tag.className = 'w3-tag ' + colorClass;
            var ct = result.crack_times_display || {};
            q('#pscCrack').textContent = 'Estimated crack time - online (throttled): ' +
                (ct.online_throttling_100_per_hour || 'n/a') + '; offline (fast hardware): ' +
                (ct.offline_fast_hashing_1e10_per_second || 'n/a') + '.';
            var fb = result.feedback || {};
            var items = [];
            if (fb.warning) items.push('<li>' + fb.warning + '</li>');
            (fb.suggestions || []).forEach(function (s) { items.push('<li>' + s + '</li>'); });
            q('#pscFeedback').innerHTML = items.join('');
            q('#pscStatus').textContent = 'Scored locally in your browser with zxcvbn - the password is never sent anywhere, logged, or checked against a breach database.';
        }

        q('#pscInput').addEventListener('input', render);
        // Pre-load the scoring library immediately so the sample password
        // renders a real score on first paint (visible output for e2e G16
        // with zero interaction), matching the "render on load" contract
        // used by the password-generator skeleton.
        render();
    }
</script>
