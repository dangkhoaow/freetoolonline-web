<script>
    // Data-visualizer - fully in-browser charting. Reference:
    // verified-browser-impl-registry.mjs entry `chart_generator_chartjs`. Page: /data-visualizer.html
    //
    // freetool-migration T4 port_logic: ports the framework-agnostic logic from
    // freetool.online/lib/services/data-visualization/data-processor.ts (CSV/JSON/
    // text parsing, color palettes, generateChartConfig, mapChartType, validate)
    // plus the WebGPU-gated AI-insight path (lib/services/webllm/webllm-service.ts:
    // dynamic import('@mlc-ai/web-llm') -> MLCEngine -> chat.completions.create).
    // NONE of the source React/shadcn UI is ported (operator UI/UX rule) - the page
    // is rendered in freetoolonline's own w3.css shell built in the ui_and_skill step.
    //
    // Processing model: 100% client-side. The deterministic charts-first path uses
    // NO network at all once Chart.js (a static CDN library, not a backend) is loaded;
    // the AI-insight path is OPTIONAL, lazy, and gated behind navigator.gpu (WebGPU) -
    // when WebGPU is absent the tool is the deterministic chart engine alone.
    // No user data ever leaves the browser. web.localUpload = false.
    //
    // The framework calls doAfterPageRendered() during page startup (it fires for
    // EVERY page once jQuery + base-script load). Do NOT call $(...) at the top
    // level: `$` is only defined inside the hook.

    web.localUpload = false;

    // Chart.js v4 UMD bundle (registry pins ^4.4.0). Exposes global `Chart`.
    var DV_CHARTJS_CDN = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
    // web-llm ESM module (registry entry llm_webgpu_mlcai pins ^0.2.80). ESM-only.
    var DV_WEBLLM_CDN = 'https://esm.run/@mlc-ai/web-llm@0.2.79';
    // Default small instruct model for the optional AI-insight path.
    var DV_WEBLLM_MODEL = 'Llama-3.2-1B-Instruct-q4f32_1-MLC';
    // localStorage key (matches source STORAGE_KEYS.RECENT_CHARTS).
    var DV_RECENT_KEY = 'ai_data_visualization_recent_charts';
    var DV_RECENT_CAP = 20;

    // Color palettes ported verbatim from data-processor.ts.
    var DV_COLORS = [
        'rgba(75, 192, 192, 0.6)', 'rgba(54, 162, 235, 0.6)', 'rgba(255, 99, 132, 0.6)',
        'rgba(255, 206, 86, 0.6)', 'rgba(153, 102, 255, 0.6)', 'rgba(255, 159, 64, 0.6)',
        'rgba(199, 199, 199, 0.6)', 'rgba(83, 102, 255, 0.6)', 'rgba(40, 159, 64, 0.6)',
        'rgba(210, 199, 199, 0.6)'
    ];
    var DV_BORDER_COLORS = [
        'rgba(75, 192, 192, 1)', 'rgba(54, 162, 235, 1)', 'rgba(255, 99, 132, 1)',
        'rgba(255, 206, 86, 1)', 'rgba(153, 102, 255, 1)', 'rgba(255, 159, 64, 1)',
        'rgba(199, 199, 199, 1)', 'rgba(83, 102, 255, 1)', 'rgba(40, 159, 64, 1)',
        'rgba(210, 199, 199, 1)'
    ];

    // Chart types offered (source CHART_TYPES, icons dropped for the plain UI).
    var DV_CHART_TYPES = [
        { id: 'bar', name: 'Bar Chart' },
        { id: 'line', name: 'Line Chart' },
        { id: 'pie', name: 'Pie Chart' },
        { id: 'doughnut', name: 'Doughnut Chart' },
        { id: 'polarArea', name: 'Polar Area' },
        { id: 'radar', name: 'Radar Chart' },
        { id: 'scatter', name: 'Scatter Plot' },
        { id: 'bubble', name: 'Bubble Chart' },
        { id: 'stackedBar', name: 'Stacked Bar' }
    ];

    // Sample data templates (source SAMPLE_DATA_TEMPLATES).
    var DV_TEMPLATES = [
        { id: 'salesData', name: 'Monthly Sales', data: 'Month,Sales\nJan,1200\nFeb,1900\nMar,1500\nApr,2100\nMay,2400\nJun,1800\nJul,2300\nAug,2100\nSep,1900\nOct,2500\nNov,2200\nDec,2800' },
        { id: 'compareProducts', name: 'Product Comparison', data: 'Product,Units Sold,Revenue\nProduct A,250,12500\nProduct B,150,7500\nProduct C,350,17500\nProduct D,200,10000\nProduct E,300,15000' },
        { id: 'expenses', name: 'Expense Categories', data: 'Category,Amount\nHousing,1200\nFood,600\nTransportation,300\nHealthcare,400\nEntertainment,200\nUtilities,250\nOther,150' }
    ];

    var dvChartInstance = null;      // live Chart.js instance (destroyed before re-render)
    var dvChartJsLoading = false;
    var dvChartJsQueue = [];

    function dvEscape(s) {
        return String(s == null ? '' : s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // ---- Data parsing (ported from data-processor.ts parseCSV/parseJSON/parseSimpleText) ----

    function dvParseCSV(data) {
        var lines = String(data).trim().split('\n');
        var headers = lines[0].split(',').map(function (h) { return h.trim(); });
        var labels = [];
        var datasets = [];
        if (headers.length > 1) {
            for (var i = 1; i < lines.length; i++) {
                var values = lines[i].split(',').map(function (v) { return v.trim(); });
                labels.push(values[0]);
            }
            for (var col = 1; col < headers.length; col++) {
                var dataset = { label: headers[col], data: [] };
                for (var row = 1; row < lines.length; row++) {
                    var rv = lines[row].split(',').map(function (v) { return v.trim(); });
                    var num = parseFloat(rv[col]);
                    dataset.data.push(isFinite(num) ? num : 0);
                }
                datasets.push(dataset);
            }
        } else {
            var single = { label: headers[0], data: [] };
            for (var k = 1; k < lines.length; k++) {
                labels.push('Item ' + k);
                var sn = parseFloat(lines[k]);
                single.data.push(isFinite(sn) ? sn : 0);
            }
            datasets.push(single);
        }
        return { labels: labels, datasets: datasets };
    }

    function dvParseJSON(data) {
        var labels = [];
        var datasets = [{ label: 'Value', data: [] }];
        if (Array.isArray(data) && data.length && typeof data[0] === 'object') {
            var keys = {};
            data.forEach(function (item) { Object.keys(item).forEach(function (key) { keys[key] = true; }); });
            var keyList = Object.keys(keys);
            var labelKey = '';
            var possibleLabelKeys = ['name', 'category', 'label', 'title', 'id'];
            for (var p = 0; p < possibleLabelKeys.length; p++) {
                if (keys[possibleLabelKeys[p]]) { labelKey = possibleLabelKeys[p]; break; }
            }
            if (!labelKey) {
                for (var ki = 0; ki < keyList.length; ki++) {
                    if (typeof data[0][keyList[ki]] === 'string') { labelKey = keyList[ki]; break; }
                }
            }
            if (!labelKey && keyList.length) labelKey = keyList[0];
            var valueKeys = [];
            for (var vk = 0; vk < keyList.length; vk++) {
                if (keyList[vk] !== labelKey && typeof data[0][keyList[vk]] === 'number') valueKeys.push(keyList[vk]);
            }
            data.forEach(function (item) { labels.push(String(item[labelKey])); });
            datasets = [];
            valueKeys.forEach(function (key) {
                datasets.push({ label: key, data: data.map(function (item) { return typeof item[key] === 'number' ? item[key] : 0; }) });
            });
            if (!datasets.length) datasets = [{ label: 'Value', data: data.map(function () { return 0; }) }];
        } else if (data && typeof data === 'object') {
            Object.keys(data).forEach(function (key) {
                labels.push(key);
                datasets[0].data.push(typeof data[key] === 'number' ? data[key] : 0);
            });
        }
        return { labels: labels, datasets: datasets };
    }

    function dvParseSimpleText(data) {
        var lines = String(data).trim().split('\n');
        var labels = [];
        var values = [];
        lines.forEach(function (line) {
            var parts = line.split(/[,:;\t]+/);
            if (parts.length >= 2) {
                labels.push(parts[0].trim());
                var n = parseFloat(parts[1].trim());
                values.push(isFinite(n) ? n : 0);
            }
        });
        return { labels: labels, datasets: [{ label: 'Value', data: values }] };
    }

    function dvParseDataManually(data) {
        if (data.indexOf(',') !== -1 && data.indexOf('\n') !== -1) {
            return dvParseCSV(data);
        }
        try {
            return dvParseJSON(JSON.parse(data));
        } catch (e) { /* not JSON */ }
        return dvParseSimpleText(data);
    }

    function dvValidateChartData(chartData) {
        if (!chartData || !Array.isArray(chartData.labels) || !Array.isArray(chartData.datasets)) return false;
        var n = chartData.labels.length;
        if (n === 0) return false;
        for (var i = 0; i < chartData.datasets.length; i++) {
            var ds = chartData.datasets[i];
            if (!Array.isArray(ds.data) || ds.data.length !== n) return false;
        }
        return true;
    }

    // ---- Chart config (ported from generateChartConfig + mapChartType) ----

    function dvMapChartType(chartType) {
        var typeMap = {
            bar: 'bar', line: 'line', pie: 'pie', doughnut: 'doughnut',
            polarArea: 'polarArea', radar: 'radar', scatter: 'scatter',
            bubble: 'bubble', stackedBar: 'bar', horizontalBar: 'bar'
        };
        return typeMap[chartType] || 'bar';
    }

    function dvGenerateChartConfig(parsed, chartType, title) {
        var datasets = parsed.datasets.map(function (dataset, index) {
            var colorIndex = index % DV_COLORS.length;
            var base = { label: dataset.label, data: dataset.data };
            if (['pie', 'doughnut', 'polarArea'].indexOf(chartType) !== -1) {
                base.backgroundColor = DV_COLORS;
                base.borderColor = DV_BORDER_COLORS;
                base.borderWidth = 1;
            } else if (chartType === 'line') {
                base.backgroundColor = DV_COLORS[colorIndex];
                base.borderColor = DV_BORDER_COLORS[colorIndex];
                base.borderWidth = 2;
                base.fill = false;
            } else if (chartType === 'radar') {
                base.backgroundColor = DV_COLORS[colorIndex];
                base.borderColor = DV_BORDER_COLORS[colorIndex];
                base.borderWidth = 2;
                base.fill = true;
            } else {
                base.backgroundColor = DV_COLORS[colorIndex];
                base.borderColor = DV_BORDER_COLORS[colorIndex];
                base.borderWidth = 1;
            }
            return base;
        });

        var config = {
            type: dvMapChartType(chartType),
            data: { labels: parsed.labels, datasets: datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: { display: !!title, text: title || '', font: { size: 16 } },
                    legend: { position: 'top' },
                    tooltip: { mode: 'index', intersect: false }
                }
            }
        };

        if (chartType === 'stackedBar') {
            config.options.scales = { x: { stacked: true }, y: { stacked: true } };
        } else if (chartType === 'horizontalBar') {
            config.options.indexAxis = 'y';
        } else if (['pie', 'doughnut', 'polarArea'].indexOf(chartType) !== -1) {
            if (parsed.datasets.length > 1) {
                config.data = {
                    labels: parsed.labels,
                    datasets: [{
                        label: parsed.datasets[0].label,
                        data: parsed.datasets[0].data,
                        backgroundColor: DV_COLORS.slice(0, parsed.labels.length),
                        borderColor: DV_BORDER_COLORS.slice(0, parsed.labels.length),
                        borderWidth: 1
                    }]
                };
            }
        }
        return config;
    }

    // ---- Chart.js lazy-load + render (with inline-SVG fallback for offline / CDN failure) ----

    function dvEnsureChartJs(cb) {
        if (window.Chart) { cb(true); return; }
        dvChartJsQueue.push(cb);
        if (dvChartJsLoading) return;
        dvChartJsLoading = true;
        var s = document.createElement('script');
        s.src = DV_CHARTJS_CDN;
        s.async = true;
        s.onload = function () {
            dvChartJsLoading = false;
            var ok = !!window.Chart;
            dvChartJsQueue.splice(0).forEach(function (f) { f(ok); });
        };
        s.onerror = function () {
            dvChartJsLoading = false;
            dvChartJsQueue.splice(0).forEach(function (f) { f(false); });
        };
        document.head.appendChild(s);
    }

    function dvRenderSvgFallback(parsed, title) {
        // First dataset rendered as bars - guarantees visible output if Chart.js
        // cannot load (offline / CDN blocked). Keeps the page useful without a lib.
        var ds = (parsed.datasets && parsed.datasets[0]) || { data: [] };
        var labels = parsed.labels || [];
        var n = Math.min(labels.length, ds.data.length);
        if (!n) return '<p class="dv-note">No numeric rows to plot.</p>';
        var W = 600, H = 320, pad = 40, gap = 8;
        var max = 0;
        for (var i = 0; i < n; i++) max = Math.max(max, Number(ds.data[i]) || 0);
        if (max <= 0) max = 1;
        var barW = (W - pad * 2 - gap * (n - 1)) / n;
        var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" role="img" '
                + 'aria-label="' + dvEscape(title || 'Bar chart of your data') + '" style="max-width:600px;">';
        svg += '<line x1="' + pad + '" y1="' + (H - pad) + '" x2="' + (W - pad) + '" y2="' + (H - pad) + '" stroke="#999999" />';
        for (var j = 0; j < n; j++) {
            var val = Number(ds.data[j]) || 0;
            var bh = (val / max) * (H - pad * 2);
            var x = pad + j * (barW + gap);
            var y = (H - pad) - bh;
            svg += '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + barW.toFixed(1)
                 + '" height="' + Math.max(0, bh).toFixed(1) + '" fill="#2196F3"><title>'
                 + dvEscape(labels[j]) + ': ' + val + '</title></rect>';
            svg += '<text x="' + (x + barW / 2).toFixed(1) + '" y="' + (H - pad + 14)
                 + '" font-size="10" text-anchor="middle" fill="#555555">' + dvEscape(labels[j]) + '</text>';
            svg += '<text x="' + (x + barW / 2).toFixed(1) + '" y="' + (y - 4).toFixed(1)
                 + '" font-size="10" text-anchor="middle" fill="#333333">' + val + '</text>';
        }
        svg += '</svg>';
        return svg;
    }

    function dvDestroyChart() {
        if (dvChartInstance && typeof dvChartInstance.destroy === 'function') {
            try { dvChartInstance.destroy(); } catch (e) { /* noop */ }
        }
        dvChartInstance = null;
    }

    function dvRenderChart(config, parsed) {
        var $chart = $('#dvChart');
        if (!$chart.length) return;
        dvDestroyChart();
        dvEnsureChartJs(function (ok) {
            if (ok && window.Chart) {
                $chart.html('<div class="dv-canvas-wrap" style="position:relative;height:360px;width:100%;"><canvas id="dvCanvas"></canvas></div>');
                var canvas = document.getElementById('dvCanvas');
                if (!canvas) { $chart.html(dvRenderSvgFallback(parsed, config.options.plugins.title.text)); return; }
                try {
                    dvChartInstance = new window.Chart(canvas.getContext('2d'), config);
                } catch (err) {
                    $chart.html(dvRenderSvgFallback(parsed, config.options.plugins.title.text));
                }
            } else {
                // CDN unreachable -> inline-SVG fallback so output still appears.
                $chart.html(dvRenderSvgFallback(parsed, config.options.plugins.title.text));
            }
        });
    }

    // ---- Recent charts (localStorage; source STORAGE_KEYS.RECENT_CHARTS) ----

    function dvGetRecent() {
        try {
            var raw = localStorage.getItem(DV_RECENT_KEY);
            var arr = raw ? JSON.parse(raw) : [];
            return Array.isArray(arr) ? arr : [];
        } catch (e) { return []; }
    }

    function dvSaveRecent(entry) {
        var list = dvGetRecent();
        list.unshift(entry);
        if (list.length > DV_RECENT_CAP) list = list.slice(0, DV_RECENT_CAP);
        try { localStorage.setItem(DV_RECENT_KEY, JSON.stringify(list)); } catch (e) { /* quota */ }
        dvRenderRecentList();
    }

    function dvClearRecent() {
        try { localStorage.removeItem(DV_RECENT_KEY); } catch (e) { /* noop */ }
        dvRenderRecentList();
    }

    function dvRenderRecentList() {
        var $list = $('#dvRecent');
        if (!$list.length) return;
        var list = dvGetRecent();
        $list.empty();
        if (!list.length) { $('#dvRecentEmpty').show(); return; }
        $('#dvRecentEmpty').hide();
        list.forEach(function (item, idx) {
            var label = dvEscape((item.title || 'Chart') + ' (' + (item.chartType || 'bar') + ')');
            var $li = $('<button type="button" class="w3-button w3-small w3-light-grey dv-recent-item" style="margin:2px;"></button>');
            $li.text(label).attr('data-idx', idx);
            $list.append($li);
        });
    }

    function dvLoadRecent(idx) {
        var list = dvGetRecent();
        var item = list[idx];
        if (!item) return;
        if ($('#dvData').length) $('#dvData').val(item.data || '');
        if ($('#dvChartType').length && item.chartType) $('#dvChartType').val(item.chartType);
        if ($('#dvTitle').length && item.title) $('#dvTitle').val(item.title);
        dvVisualize();
    }

    // ---- Main deterministic charts-first path ----

    function dvCurrentChartType() {
        return ($('#dvChartType').length && $('#dvChartType').val()) || 'bar';
    }
    function dvCurrentTitle() {
        return ($('#dvTitle').length && $('#dvTitle').val()) || 'My Chart';
    }

    function dvVisualize() {
        var raw = String(($('#dvData').val() || '')).trim();
        var $err = $('#dvError');
        if (!raw) {
            $err.text('Paste some data first - CSV (Label,Value rows), JSON, or one Label, Value per line.').show();
            $('#dvChart').empty();
            return null;
        }
        var parsed = dvParseDataManually(raw);
        if (!dvValidateChartData(parsed)) {
            $err.text('Could not read that data. Use CSV with a header row, valid JSON, or "Label, Value" lines.').show();
            $('#dvChart').empty();
            return null;
        }
        $err.hide().text('');
        var chartType = dvCurrentChartType();
        var title = dvCurrentTitle();
        var config = dvGenerateChartConfig(parsed, chartType, title);
        dvRenderChart(config, parsed);
        dvSaveRecent({ title: title, chartType: chartType, data: raw, timestamp: Date.now() });
        return config;
    }

    // ---- WebGPU-gated AI insight (optional; lazy-loads web-llm) ----

    function dvSupportsWebGPU() {
        return typeof navigator !== 'undefined' && !!navigator.gpu;
    }

    function dvBuildLLMPrompt(data, chartType) {
        var chartInstructions = '';
        if (chartType === 'bar' || chartType === 'line') {
            chartInstructions = "\n- Use one dataset.\n- The dataset label should be the value column name (e.g. 'Amount', 'Sales').\n- The data array must match the order of the labels array.";
        } else if (chartType === 'pie' || chartType === 'doughnut' || chartType === 'polarArea') {
            chartInstructions = '\n- Use one dataset.\n- The dataset label should be the value column name.\n- The data array must match the order of the labels array.';
        } else {
            chartInstructions = '\n- Output a valid Chart.js v4 config object.';
        }
        return 'You are a data visualization assistant. Given the following data, generate a valid Chart.js v4 '
            + 'configuration object for a "' + chartType + '" chart. The output must be a JavaScript object with '
            + 'fields type, data { labels: [...], datasets: [{ label, data, backgroundColor, borderColor, borderWidth }] }, '
            + 'and options. IMPORTANT: the data field MUST be a single object with labels (array) and datasets (array), '
            + 'NOT an array. Do not wrap the output in a variable assignment. Output only the object, no explanations.'
            + chartInstructions + '\n\nData:\n```\n' + data + '\n```';
    }

    function dvExtractChartConfigFromText(text, chartType, rawData) {
        var cleaned = String(text || '').trim();
        if (cleaned.indexOf('```') === 0) {
            cleaned = cleaned.replace(/^```[a-zA-Z]*\n?/, '').replace(/```$/, '').trim();
        }
        var assignMatch = cleaned.match(/^(const|let|var)\s+\w+\s*=\s*(\{[\s\S]*\})/);
        if (assignMatch && assignMatch[2]) cleaned = assignMatch[2];
        cleaned = cleaned.replace(/console\.log\([^)]*\);?/g, '').trim();

        var parsed = null;
        try {
            parsed = JSON.parse(cleaned);
        } catch (e1) {
            // Light JS-object -> JSON normalization (no JSON5 dependency): quote bare
            // keys, single -> double quotes, strip trailing commas.
            try {
                var norm = cleaned
                    .replace(/([{,]\s*)([A-Za-z_$][A-Za-z0-9_$]*)\s*:/g, '$1"$2":')
                    .replace(/'/g, '"')
                    .replace(/,\s*([}\]])/g, '$1');
                parsed = JSON.parse(norm);
            } catch (e2) { parsed = null; }
        }
        if (!parsed || typeof parsed !== 'object' || !parsed.data ||
            !Array.isArray(parsed.data.labels) || !Array.isArray(parsed.data.datasets)) {
            // Deterministic fallback - never block on a bad AI response.
            var fb = dvParseDataManually(rawData);
            if (dvValidateChartData(fb)) return dvGenerateChartConfig(fb, chartType, dvCurrentTitle());
            return null;
        }
        if (!parsed.type) parsed.type = dvMapChartType(chartType);
        if (!parsed.options) parsed.options = { responsive: true, maintainAspectRatio: false };
        return parsed;
    }

    function dvAiStatus(msg) {
        if ($('#dvAiStatus').length) $('#dvAiStatus').text(msg || '');
    }

    function dvRunAiInsight() {
        if (!dvSupportsWebGPU()) {
            dvAiStatus('This browser has no WebGPU support, so the on-device AI insight is unavailable. The chart above is built without AI - it works everywhere.');
            return;
        }
        var raw = String(($('#dvData').val() || '')).trim();
        if (!raw) { dvAiStatus('Paste some data first.'); return; }
        var chartType = dvCurrentChartType();
        dvAiStatus('Loading the on-device AI model (first run downloads it to your browser; nothing is uploaded)...');
        // Dynamic ESM import of web-llm; runs entirely on-device via WebGPU.
        import(DV_WEBLLM_CDN).then(function (webllm) {
            var engine = new webllm.MLCEngine();
            return engine.reload(DV_WEBLLM_MODEL, {
                initProgressCallback: function (p) {
                    dvAiStatus('Preparing AI model... ' + Math.round((p && p.progress ? p.progress : 0) * 100) + '%');
                }
            }).then(function () {
                dvAiStatus('Analyzing your data on-device...');
                return engine.chat.completions.create({
                    messages: [
                        { role: 'system', content: 'You are a helpful data analysis assistant.' },
                        { role: 'user', content: dvBuildLLMPrompt(raw, chartType) }
                    ],
                    temperature: 0.1,
                    max_tokens: 2048
                });
            }).then(function (completion) {
                var content = completion && completion.choices && completion.choices[0] &&
                    completion.choices[0].message ? completion.choices[0].message.content : '';
                var config = dvExtractChartConfigFromText(content, chartType, raw);
                if (config) {
                    var parsedForFallback = (config.data && config.data.labels) ?
                        { labels: config.data.labels, datasets: config.data.datasets } : dvParseDataManually(raw);
                    dvRenderChart(config, parsedForFallback);
                    dvAiStatus('AI insight applied - chart rebuilt from the model\'s reading of your data.');
                } else {
                    dvAiStatus('The AI response could not be turned into a chart; the deterministic chart above still stands.');
                }
            });
        }).catch(function (err) {
            dvAiStatus('Could not run the on-device AI model (' + (err && err.message ? err.message : 'load failed') + '). The chart above is built without AI.');
        });
    }

    // ---- Init ----

    function dvPopulateSelects() {
        var $type = $('#dvChartType');
        if ($type.length && $type.children().length === 0) {
            DV_CHART_TYPES.forEach(function (t) {
                $type.append($('<option></option>').attr('value', t.id).text(t.name));
            });
            $type.val('bar');
        }
        var $tpl = $('#dvTemplates');
        if ($tpl.length && $tpl.children().length <= 1) {
            DV_TEMPLATES.forEach(function (t) {
                $tpl.append($('<option></option>').attr('value', t.id).text(t.name));
            });
        }
    }

    function dvApplyTemplate(id) {
        var tpl = DV_TEMPLATES.filter(function (t) { return t.id === id; })[0];
        if (tpl && $('#dvData').length) { $('#dvData').val(tpl.data); dvVisualize(); }
    }

    function initDataVisualizer() {
        if ($('#dvData').length === 0) return; // not the data-visualizer page
        dvPopulateSelects();
        $('#dvRender').off('click.dv').on('click.dv', dvVisualize);
        if ($('#dvChartType').length) $('#dvChartType').off('change.dv').on('change.dv', dvVisualize);
        if ($('#dvTemplates').length) $('#dvTemplates').off('change.dv').on('change.dv', function () { dvApplyTemplate($(this).val()); });
        if ($('#dvAiInsight').length) $('#dvAiInsight').off('click.dv').on('click.dv', dvRunAiInsight);
        if ($('#dvClearRecent').length) $('#dvClearRecent').off('click.dv').on('click.dv', dvClearRecent);
        if ($('#dvAiNote').length) $('#dvAiNote').text(dvSupportsWebGPU()
            ? 'Optional: this browser supports private, on-device AI insight (no upload; first run downloads a model).'
            : 'The chart is built entirely on this device with no AI needed. On-device AI insight needs a WebGPU browser.');
        // Delegated clicks for recent-chart buttons.
        $('#dvRecent').off('click.dv').on('click.dv', '.dv-recent-item', function () {
            dvLoadRecent(parseInt($(this).attr('data-idx'), 10));
        });
        dvRenderRecentList();
        dvVisualize(); // render the seed sample so the page shows a chart on load
    }

    function doAfterPageRendered() {
        initDataVisualizer();
    }
</script>
