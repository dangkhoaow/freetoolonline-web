<script>
    // List skeleton - localStorage-backed checklist, fully in-browser.
    // Reference: verified-browser-impl-registry.mjs entry `generator_purejs`
    // (the list/tracker family - P4 extended its verb_tokens with
    // list/tracker/manager/organizer/keeper). Page: /todo-list.html
    //
    // What it does on the client:
    //   - Reads a new item from the text input; Add button or Enter appends it.
    //   - Empty / whitespace-only input renders an inline validation message
    //     next to the input (never throws).
    //   - Each item has a checkbox (toggle done) and a delete button.
    //   - The list persists in localStorage under a per-slug key, so it
    //     survives a page reload. Clearing this site's browser data removes it.
    //   - A live count of total / remaining items renders above the list.
    //
    // This tool processes everything in the browser, so the upload widget is
    // disabled. The framework calls doAfterPageRendered() during page startup
    // (it fires for EVERY page once jQuery + base-script load). Do NOT call
    // $(...) at the top level of this inline script: `$` is only defined inside
    // the deferred hook.

    web.localUpload = false;

    var LIST_STORAGE_KEY = 'ftol-list-todo-list';
    var listItems = [];

    function listEscapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function listLoad() {
        try {
            var raw = localStorage.getItem(LIST_STORAGE_KEY);
            if (!raw) { listItems = []; return; }
            var parsed = JSON.parse(raw);
            listItems = Array.isArray(parsed) ? parsed : [];
        } catch (e) {
            // Corrupt / unparseable storage - start clean rather than throw.
            listItems = [];
        }
    }

    function listSave() {
        try { localStorage.setItem(LIST_STORAGE_KEY, JSON.stringify(listItems)); }
        catch (e) { /* storage full or blocked - the in-memory list still works this session */ }
    }

    function listMakeId() {
        // No Date.now()/Math.random() dependency for the id beyond the wall
        // clock; collisions across a single session are avoided with a counter.
        return 'i' + (Date.now()).toString(36) + '-' + (listItems.length + 1);
    }

    function listRender() {
        var $items = $('#listItems');
        var $empty = $('#listEmpty');
        var $count = $('#listCount');
        if ($items.length === 0) return;

        $items.empty();
        if (!listItems.length) {
            $empty.show();
            $count.text('');
            return;
        }
        $empty.hide();

        var remaining = 0;
        for (var i = 0; i < listItems.length; i++) {
            var it = listItems[i];
            if (!it.done) remaining++;
            var doneCls = it.done ? ' list-item-done' : '';
            var checked = it.done ? ' checked' : '';
            $items.append(
                '<li class="list-item' + doneCls + '" data-id="' + listEscapeHtml(it.id) + '">' +
                    '<label class="list-item-main">' +
                        '<input type="checkbox" class="list-item-toggle"' + checked + ' /> ' +
                        '<span class="list-item-text">' + listEscapeHtml(it.text) + '</span>' +
                    '</label>' +
                    '<button type="button" class="w3-button w3-small w3-light-grey list-item-delete" ' +
                        'aria-label="Delete item">Delete</button>' +
                '</li>'
            );
        }
        $count.text(listItems.length + ' item' + (listItems.length === 1 ? '' : 's') +
            ', ' + remaining + ' remaining');
    }

    function listAdd() {
        var $input = $('#listInput');
        var $err = $('#listError');
        var text = ($input.val() || '').trim();
        if (!text) {
            $err.text('Type something before adding it to the list.');
            return;
        }
        $err.text('');
        listItems.unshift({ id: listMakeId(), text: text, done: false, createdAt: Date.now() });
        listSave();
        listRender();
        $input.val('').focus();
    }

    function listToggle(id) {
        for (var i = 0; i < listItems.length; i++) {
            if (listItems[i].id === id) { listItems[i].done = !listItems[i].done; break; }
        }
        listSave();
        listRender();
    }

    function listDelete(id) {
        listItems = listItems.filter(function (it) { return it.id !== id; });
        listSave();
        listRender();
    }

    function initList() {
        if ($('#listInput').length === 0) return; // not a list page
        listLoad();
        listRender();

        $('#listAddBtn').off('click.list').on('click.list', listAdd);
        $('#listInput').off('keydown.list').on('keydown.list', function (e) {
            if (e.key === 'Enter' || e.which === 13) { e.preventDefault(); listAdd(); }
        });
        // Clear the validation message as soon as the field holds real text,
        // so the reader is not left staring at a stale error while typing.
        $('#listInput').off('input.list').on('input.list', function () {
            if (($(this).val() || '').trim()) { $('#listError').text(''); }
        });
        // Delegated handlers so they survive re-render.
        $('#listItems').off('change.list', '.list-item-toggle')
            .on('change.list', '.list-item-toggle', function () {
                var id = $(this).closest('.list-item').attr('data-id');
                listToggle(id);
            });
        $('#listItems').off('click.list', '.list-item-delete')
            .on('click.list', '.list-item-delete', function () {
                var id = $(this).closest('.list-item').attr('data-id');
                listDelete(id);
            });
    }

    function doAfterPageRendered() {
        initList();
    }
</script>
