<div class="w3-container">
    <p>Hold jump to clear pixel spikes in an endless runner. Space, click, or tap to jump; sound toggle included. No install.</p>
</div>
<div id="psrWrapper" class="w3-container" style="background:#fafafa; padding:12px 8px 16px 8px;">
    <div class="outputImgs" style="visibility:visible !important;">
        <div id="psrStage" style="position:relative; width:100%; min-height:520px; background:#111; border-radius:6px; overflow:hidden;">
            <div id="psrLaunch" style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:#e6edf3; padding:16px;">
                <div style="font:700 22px system-ui,sans-serif; color:#7ec8ff;">PIXEL SPIKE RUN</div>
                <p style="font-size:14px; max-width:560px; margin:10px 0 14px 0; color:#9db0c5;">Endless pixel runner. Press Play to load about ~25 KB.</p>
                <button id="psrPlayBtn" type="button" class="w3-button w3-green w3-large" style="font-weight:700;">Play now</button>
            </div>
        </div>
        <div id="psrStatus" style="font:400 14px sans-serif; color:#333; margin-top:8px;">Press Play to start.</div>
    </div>
    <div style="text-align:center; margin-top:10px;">
        <button id="psrFullscreenBtn" type="button" class="w3-button w3-blue" disabled>Fullscreen</button>
        <span style="font-size:12.5px; color:#555; margin-left:8px;">Inside the frame: Space/click/tap to jump; hold for higher jumps.</span>
    </div>
    <style>#psrStage:fullscreen { border-radius:0; } #psrStage iframe { display:block; width:100%; height:560px; border:0; }</style>
</div>
