<div class="w3-container">
    <p>Paste rows of data as CSV, JSON, or one "Label, Value" per line, pick a chart type, and draw it right in your browser - no upload and no account.</p>
</div>

<style>
    #dvTool .dv-row { margin-bottom: 14px; }
    #dvTool label.dv-label { font-weight: bold; display: block; margin-bottom: 4px; }
    #dvTool textarea { font-family: monospace; }
    #dvTool .dv-controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    #dvTool .dv-controls .dv-field { flex: 1 1 200px; min-width: 160px; }
    #dvTool h3.dv-h { margin: 18px 0 6px; font-size: 1.05em; }
    #dvChart { margin-top: 12px; min-height: 60px; }
    #dvError { color: #b00020; }
    #dvAiStatus { color: #555555; margin-top: 6px; }
    #dvAiNote { color: #777777; font-size: 0.95em; margin-top: 6px; }
    #dvRecent { margin: 6px 0 0; }
    #dvRecentEmpty { color: #777777; padding: 6px 4px; }
</style>

<div id="dvTool" class="w3-container">
    <div class="dv-row">
        <label class="dv-label" for="dvData">Your data (CSV with a header row, JSON, or "Label, Value" lines)</label>
        <textarea id="dvData" class="w3-input w3-border" rows="6" style="width:100%;">Mon, 12
Tue, 19
Wed, 7
Thu, 15
Fri, 22</textarea>
    </div>

    <div class="dv-row dv-controls">
        <div class="dv-field">
            <label class="dv-label" for="dvChartType">Chart type</label>
            <select id="dvChartType" class="w3-select w3-border"></select>
        </div>
        <div class="dv-field">
            <label class="dv-label" for="dvTitle">Chart title</label>
            <input type="text" id="dvTitle" class="w3-input w3-border" maxlength="80" placeholder="My Chart" />
        </div>
        <div class="dv-field">
            <label class="dv-label" for="dvTemplates">Load a sample</label>
            <select id="dvTemplates" class="w3-select w3-border">
                <option value="">Load a sample dataset...</option>
            </select>
        </div>
    </div>

    <div class="dv-row">
        <button type="button" id="dvRender" class="w3-button w3-blue">Visualize</button>
    </div>

    <div id="dvError" class="dv-row" style="display:none;" aria-live="polite"></div>
    <div id="dvChart" class="dv-row" aria-live="polite"></div>

    <h3 class="dv-h">On-device AI insight (optional)</h3>
    <div class="dv-row">
        <button type="button" id="dvAiInsight" class="w3-button w3-light-grey">Get AI insight</button>
        <div id="dvAiNote" aria-live="polite"></div>
        <div id="dvAiStatus" aria-live="polite"></div>
    </div>

    <h3 class="dv-h">Recent charts</h3>
    <div id="dvRecent" aria-live="polite"></div>
    <div id="dvRecentEmpty">No recent charts yet.</div>
    <div class="dv-row">
        <button type="button" id="dvClearRecent" class="w3-button w3-small w3-light-grey">Clear recent</button>
    </div>
</div>
