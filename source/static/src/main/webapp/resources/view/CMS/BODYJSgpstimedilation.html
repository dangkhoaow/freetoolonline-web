<script>
    // 3D scene archetype skeleton (GPS Time Dilation) - vendored three.js
    // (ESM, dynamic import from /vendor/three/, NO CDN), fully client-side.
    // Built LEAN, forked from the torino-impact-hazard-scale shape - ONE
    // scene only (a relativity budget explorer). All geometry is procedural.
    //
    // EDUCATIONAL APPROXIMATION, not an orbital-mechanics or GPS-firmware
    // simulation. A teaching scene: Earth plus one GPS satellite on a
    // compressed-for-readability orbit, with a day-scrub control that
    // accumulates the two competing relativistic clock effects and shows
    // the resulting position-error budget with and without correction.
    //
    // Published figures (cross-checked via WebSearch 2026-07-24; see the
    // space-3d-discovery-loop-runbook candidate_backlog gps-time-dilation
    // evidence block, source: Neil Ashby, "Relativity in the Global
    // Positioning System", Living Reviews in Relativity (2003); figures
    // corroborated by NASA/USNO GPS timing documentation):
    //   - GPS satellites orbit at about 20,200 km altitude, about 3.874 km/s
    //     (about 14,000 km/h).
    //   - Special relativity (satellite velocity) makes the onboard clocks
    //     run SLOWER by about 7 microseconds per day relative to a ground
    //     clock.
    //   - General relativity (weaker gravity at altitude) makes the onboard
    //     clocks run FASTER by about 45 microseconds per day.
    //   - Net effect: the satellite clocks run about 38 microseconds per day
    //     FAST overall (general relativity wins). GPS satellite clocks are
    //     built with their rate offset in firmware to cancel this.
    //   - Left uncorrected, this net 38-microsecond/day clock drift would
    //     accumulate into position-fix errors of roughly 10 kilometers per
    //     day.
    //   - Distinct from gravitational-redshift.html (demonstrates the pure
    //     gravitational clock-rate effect in isolation) - THIS page is the
    //     applied engineering budget where BOTH relativistic effects fight
    //     inside every GPS receiver's position fix.
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    var T3D_SLUG = 'gpstimedilation';
    var T3D_STORE_KEY = 'ftol-game-' + T3D_SLUG;

    function t3dDetectScene(slug) { return 'gpstimedilation'; }

    function ftoLoadThree() {
        if (window.__ftoThreePromise) { return window.__ftoThreePromise; }
        var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/three';
        window.__ftoThreePromise = import(base + '/three.module.min.js').then(function (mod) {
            if (!mod || !mod.WebGLRenderer) { throw new Error('three.js loaded but WebGLRenderer is missing'); }
            return mod;
        });
        return window.__ftoThreePromise;
    }

    function t3dStatus(text) {
        var el = document.getElementById('t3dStatus');
        if (el) el.textContent = text;
    }
    function t3dInfo(html) {
        var el = document.getElementById('t3dInfoPanel');
        if (el) el.innerHTML = html;
    }
    function t3dLoadStore() {
        try { return JSON.parse(localStorage.getItem(T3D_STORE_KEY) || '{}') || {}; }
        catch (e) { return {}; }
    }
    function t3dSaveStore(obj) {
        try { localStorage.setItem(T3D_STORE_KEY, JSON.stringify(obj)); }
        catch (e) { t3dStatus('Could not save to browser storage (quota or private mode) - explorer still works.'); }
    }
    function t3dFullscreen(el) {
        if (el.requestFullscreen) { el.requestFullscreen(); }
        else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
        else if (el.mozRequestFullScreen) { el.mozRequestFullScreen(); }
        else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
    }

    function t3dShell(THREE, host, opts) {
        var coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        var low = coarse || ((navigator.hardwareConcurrency || 4) <= 4);
        var renderer = new THREE.WebGLRenderer({ antialias: !low, powerPreference: 'default' });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(opts.fov || 55, 1, 0.1, 4000);
        var orbit = {
            target: new THREE.Vector3(0, opts.targetY || 0, 0),
            radius: opts.radius, theta: opts.theta || 0.6, phi: opts.phi || 1.15,
            goalRadius: opts.radius, goalTheta: opts.theta || 0.6, goalPhi: opts.phi || 1.15,
            minR: opts.minR || 4, maxR: opts.maxR || 400,
        };
        function applyCamera() {
            orbit.theta += (orbit.goalTheta - orbit.theta) * 0.14;
            orbit.phi += (orbit.goalPhi - orbit.phi) * 0.14;
            orbit.radius += (orbit.goalRadius - orbit.radius) * 0.14;
            var sp = Math.sin(orbit.phi), cp = Math.cos(orbit.phi);
            camera.position.set(
                orbit.target.x + orbit.radius * sp * Math.sin(orbit.theta),
                orbit.target.y + orbit.radius * cp,
                orbit.target.z + orbit.radius * sp * Math.cos(orbit.theta)
            );
            camera.lookAt(orbit.target);
        }
        host.innerHTML = '';
        host.appendChild(renderer.domElement);
        function resize() {
            var w = host.clientWidth || 320, h = Math.max(220, Math.round(w * 0.62));
            renderer.setSize(w, h, false);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        resize();
        window.addEventListener('resize', resize);
        if (typeof ResizeObserver === 'function') {
            try { new ResizeObserver(resize).observe(host); } catch (e) {}
        }
        var dragging = false, lastX = 0, lastY = 0;
        host.addEventListener('pointerdown', function (e) {
            dragging = true; lastX = e.clientX; lastY = e.clientY;
            try { host.setPointerCapture(e.pointerId); } catch (err) {}
        });
        host.addEventListener('pointerup', function () { dragging = false; });
        host.addEventListener('pointercancel', function () { dragging = false; });
        host.addEventListener('pointermove', function (e) {
            if (!dragging) return;
            var dx = e.clientX - lastX, dy = e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            orbit.goalTheta -= dx * 0.005;
            orbit.goalPhi = Math.max(0.2, Math.min(Math.PI - 0.2, orbit.goalPhi + dy * 0.005));
        });
        host.addEventListener('wheel', function (e) {
            e.preventDefault();
            orbit.goalRadius = Math.max(orbit.minR, Math.min(orbit.maxR, orbit.goalRadius * (e.deltaY > 0 ? 1.08 : 0.92)));
        }, { passive: false });
        return { THREE: THREE, scene: scene, camera: camera, renderer: renderer, orbit: orbit, applyCamera: applyCamera, low: low, resize: resize };
    }

    // Real published GPS relativity figures (Ashby 2003 / NASA-USNO GPS
    // timing documentation). These four numbers are the only cited figures;
    // every other on-screen value is derived arithmetically from them
    // (day count x per-day rate) and labeled as such.
    var T3D_GPS_FACTS = {
        srMicrosPerDay: -7,
        grMicrosPerDay: 45,
        netMicrosPerDay: 38,
        posErrorKmPerDay: 10,
        altitudeKm: 20200,
        speedKmS: 3.874
    };

    function t3dGpsColorFor(errorKm) {
        if (errorKm < 1) return 0x66bb6a;
        if (errorKm < 50) return 0xffee58;
        if (errorKm < 150) return 0xffa726;
        return 0xef5350;
    }

    function t3dGpsTimeDilation(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        shell.renderer.setClearColor(0x03040a, 1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        var sunLight = new THREE.DirectionalLight(0xfff3d6, 1.1);
        sunLight.position.set(10, 6, 8);
        scene.add(sunLight);

        // Starfield backdrop
        var starN = shell.low ? 260 : 520;
        var starPos = new Float32Array(starN * 3);
        for (var s = 0; s < starN; s++) {
            var r = 40 + Math.random() * 60;
            var th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
            starPos[s * 3] = r * Math.sin(ph) * Math.cos(th);
            starPos[s * 3 + 1] = r * Math.cos(ph) * 0.55;
            starPos[s * 3 + 2] = r * Math.sin(ph) * Math.sin(th) - 10;
        }
        var starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        var stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xaad4ff, size: 0.3, sizeAttenuation: true, transparent: true, opacity: 0.7 }));
        scene.add(stars);

        // Earth (procedural, simple lit sphere - not a textured globe)
        var earth = new THREE.Mesh(
            new THREE.SphereGeometry(3, 32, 22),
            new THREE.MeshStandardMaterial({ color: 0x2f6fb0, roughness: 0.85, metalness: 0.05, emissive: 0x0a2540, emissiveIntensity: 0.15 })
        );
        scene.add(earth);
        var atmosphere = new THREE.Mesh(
            new THREE.SphereGeometry(3.16, 32, 22),
            new THREE.MeshBasicMaterial({ color: 0x64b5f6, transparent: true, opacity: 0.14 })
        );
        scene.add(atmosphere);

        // Ground station marker (fixed on Earth's surface, does not rotate
        // with Earth in this simplified render - it is a teaching anchor,
        // not a real longitude/latitude).
        var groundMarker = new THREE.Mesh(new THREE.ConeGeometry(0.16, 0.4, 12), new THREE.MeshBasicMaterial({ color: 0x9ccc65 }));
        groundMarker.position.set(0, 3.05, 0.9);
        groundMarker.rotation.x = Math.PI;
        scene.add(groundMarker);

        // GPS orbit ring - compressed for readability. Real ratio (orbit
        // radius from Earth's center over Earth's radius) is about 4.17;
        // this render uses about the same ratio at reduced absolute scale.
        var orbitRadius = 9;
        var ringGeo = new THREE.TorusGeometry(orbitRadius, 0.02, 8, 96);
        var ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color: 0x546e7a, transparent: true, opacity: 0.55 }));
        ring.rotation.x = Math.PI / 2 + 0.22;
        scene.add(ring);

        // GPS satellite (small procedural body: bus + two panel wings)
        var satGroup = new THREE.Group();
        var satBus = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.34, 0.34), new THREE.MeshStandardMaterial({ color: 0xcfd8dc, roughness: 0.5, metalness: 0.3 }));
        satGroup.add(satBus);
        var panelMat = new THREE.MeshStandardMaterial({ color: 0x1a237e, roughness: 0.4, metalness: 0.4 });
        var panelL = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.02, 0.22), panelMat);
        panelL.position.x = -0.5;
        var panelR = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.02, 0.22), panelMat);
        panelR.position.x = 0.5;
        satGroup.add(panelL, panelR);
        scene.add(satGroup);

        // Beacon halo around the satellite - color follows the current
        // accumulated position-error magnitude (the teaching cue).
        var beacon = new THREE.Mesh(new THREE.SphereGeometry(0.55, 16, 12), new THREE.MeshBasicMaterial({ color: 0x66bb6a, transparent: true, opacity: 0.28 }));
        scene.add(beacon);

        var day = 6;          // 0..30, scrubbable
        var correctionOn = true;
        var satAngle = 0.4;

        function currentErrorKm() {
            if (correctionOn) return 0;
            return day * T3D_GPS_FACTS.posErrorKmPerDay;
        }
        function currentOffsetMicros() {
            if (correctionOn) return 0;
            return day * T3D_GPS_FACTS.netMicrosPerDay;
        }

        function panelHtml() {
            var errKm = currentErrorKm();
            var offsetMicros = currentOffsetMicros();
            return '<h3>GPS relativity budget</h3>' +
                '<p>Two real relativistic effects act on every GPS satellite clock at once, in opposite directions.</p>' +
                '<table class="w3-table w3-bordered">' +
                '<tr><td>Special relativity (velocity)</td><td>' + T3D_GPS_FACTS.srMicrosPerDay + ' microseconds/day (runs slower)</td></tr>' +
                '<tr><td>General relativity (altitude)</td><td>+' + T3D_GPS_FACTS.grMicrosPerDay + ' microseconds/day (runs faster)</td></tr>' +
                '<tr><td>Net effect</td><td>+' + T3D_GPS_FACTS.netMicrosPerDay + ' microseconds/day (satellite clock runs fast overall)</td></tr>' +
                '<tr><td>Day ' + day + ', correction ' + (correctionOn ? 'ON' : 'OFF') + '</td><td>' + offsetMicros + ' microsecond drift, ' + errKm.toFixed(0) + ' km position error</td></tr>' +
                '</table>' +
                '<p class="t3d-note">Educational approximation - on-screen orbit size and Earth size are compressed for readability. The four relativity figures (-7, +45, +38 microseconds/day, and the roughly 10 km/day uncorrected error) are the real published values (Neil Ashby, Living Reviews in Relativity, 2003); the day-by-day totals above are simple day-count multiplication of that real per-day rate.</p>';
        }

        var dayEl = document.getElementById('t3dGpsDayScrub');
        var dayLab = document.getElementById('t3dGpsDayLabel');
        var toggleBtn = document.getElementById('t3dGpsToggleBtn');

        function apply() {
            var errKm = currentErrorKm();
            beacon.material.color.setHex(t3dGpsColorFor(errKm));
            if (toggleBtn) toggleBtn.textContent = correctionOn ? 'Correction: ON (turn OFF)' : 'Correction: OFF (turn ON)';
            if (dayLab) dayLab.textContent = 'Day ' + day;
            t3dInfo(panelHtml());
            try { t3dSaveStore({ day: day, correctionOn: correctionOn }); } catch (e) {}
        }

        var store = t3dLoadStore();
        if (typeof store.day === 'number' && store.day >= 0 && store.day <= 30) day = store.day;
        if (typeof store.correctionOn === 'boolean') correctionOn = store.correctionOn;
        if (dayEl) dayEl.value = String(day);
        apply();

        if (toggleBtn) toggleBtn.addEventListener('click', function () { correctionOn = !correctionOn; apply(); });
        if (dayEl) dayEl.addEventListener('input', function () {
            day = Math.max(0, Math.min(30, parseInt(dayEl.value || '6', 10)));
            apply();
        });

        t3dStatus('Drag to orbit, scroll to zoom. Scrub the day counter and toggle the relativistic correction.');
        return function animate(dt) {
            stars.rotation.y += dt * 0.00002;
            earth.rotation.y += dt * 0.00025;
            satAngle += dt * 0.00035;
            satGroup.position.set(orbitRadius * Math.cos(satAngle), orbitRadius * Math.sin(satAngle) * Math.sin(0.22), orbitRadius * Math.sin(satAngle) * Math.cos(0.22));
            satGroup.lookAt(0, 0, 0);
            beacon.position.copy(satGroup.position);
            beacon.scale.setScalar(1 + 0.06 * Math.sin(performance.now() * 0.003));
        };
    }

    function doAfterPageRendered() {
        var host = document.getElementById('t3dCanvasHost');
        var root = document.getElementById('threeSceneTool');
        if (!host || !root) return;
        var wrapper = document.getElementById('t3dWrapper') || root;
        var kind = t3dDetectScene(T3D_SLUG);
        var rows = { gpstimedilation: 't3dGpsControls' };
        for (var k in rows) {
            var el = document.getElementById(rows[k]);
            if (el) el.style.display = (k === kind) ? '' : 'none';
        }
        var fsBtn = document.getElementById('t3dFullscreenBtn');
        if (fsBtn) fsBtn.addEventListener('click', function () { t3dFullscreen(wrapper); });
        t3dStatus('Loading the 3D engine (about 0.7 MB, one time - then cached)...');
        function boot() {
            ftoLoadThree().then(function (THREE) {
                try {
                    var presets = { gpstimedilation: { radius: 20, maxR: 70, minR: 5, phi: 1.1, theta: 0.5, targetY: 0 } };
                    var shell = t3dShell(THREE, host, presets[kind]);
                    var animate = t3dGpsTimeDilation(shell);
                    var last = performance.now();
                    shell.renderer.setAnimationLoop(function () {
                        var now = performance.now();
                        var dt = Math.min(now - last, 100);
                        last = now;
                        animate(dt);
                        shell.applyCamera();
                        shell.renderer.render(shell.scene, shell.camera);
                    });
                } catch (err) {
                    t3dStatus('This page needs WebGL to render the 3D scene. Your browser or device has it disabled - the facts panel below still works. (' + (err && err.message ? err.message : err) + ')');
                }
            }).catch(function (err) {
                t3dStatus('Could not load the 3D engine: ' + (err && err.message ? err.message : err));
            });
        }
        if ('requestIdleCallback' in window) { requestIdleCallback(boot, { timeout: 2500 }); }
        else { setTimeout(boot, 300); }
    }
</script>
