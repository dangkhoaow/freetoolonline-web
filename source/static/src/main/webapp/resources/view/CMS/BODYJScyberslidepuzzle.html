<script>
    // Cyber Slide Puzzle launcher. Adapted from alfredang/openclaw-puzzle-game (MIT)
    // vendored at games/cyber-slide-puzzle/ in an isolated same-origin iframe.
    // Pure HTML/CSS/JS (~11 KB), zero runtime CDN after adaptation.
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    var CSP_GAME_URL = 'https://dangkhoaow.github.io/ftol-vm-assets/games/cyber-slide-puzzle/index.html';

    function cspStatus(text) {
        var el = document.getElementById('cspStatus');
        if (el) el.textContent = text;
    }

    function cspInjectFrame(stage) {
        var frame = document.createElement('iframe');
        frame.id = 'cspFrame';
        frame.src = CSP_GAME_URL;
        frame.title = 'Cyber Slide Puzzle';
        frame.setAttribute('allow', 'fullscreen');
        frame.setAttribute('allowfullscreen', '');
        frame.addEventListener('load', function () {
            cspStatus('Game loaded. Pick a difficulty, shuffle, then click or tap tiles next to the empty space.');
            try { frame.contentWindow.focus(); } catch (e) { }
        });
        var launch = document.getElementById('cspLaunch');
        if (launch && launch.parentNode === stage) { stage.removeChild(launch); }
        stage.appendChild(frame);
        return frame;
    }

    function doAfterPageRendered() {
        var stage = document.getElementById('cspStage');
        var playBtn = document.getElementById('cspPlayBtn');
        if (!stage || !playBtn) return;

        var fsBtn = document.getElementById('cspFullscreenBtn');
        playBtn.addEventListener('click', function () {
            cspStatus('Loading the game (about 11 KB)...');
            cspInjectFrame(stage);
            if (fsBtn) fsBtn.disabled = false;
        });

        if (fsBtn) fsBtn.addEventListener('click', function () {
            if (stage.requestFullscreen) { stage.requestFullscreen(); }
            else if (stage.webkitRequestFullscreen) { stage.webkitRequestFullscreen(); }
            var frame = document.getElementById('cspFrame');
            if (frame) { try { frame.contentWindow.focus(); } catch (e) { } }
        });
    }
</script>
