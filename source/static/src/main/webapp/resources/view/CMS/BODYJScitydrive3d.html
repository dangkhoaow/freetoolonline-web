<script>
    // 3D scene archetype skeleton (city-drive-3d) - vendored three.js (ESM, dynamic
    // import from /vendor/three/, NO CDN), fully client-side. Registry Gate-H
    // entry: three_3d_scene_vendored. ONE skeleton serves the 3D family; the
    // scene is dispatched from the slug: voxel (block-building sandbox game),
    // solar (solar system explorer), blackhole (black hole visualization),
    // galaxy (spiral galaxy), gputest (WebGL report + benchmark), city
    // (era-timeline city block), flight (gate-flying arcade), drive (city
    // driving arcade), earth (live day/night globe). All geometry is
    // procedural - no model files, no textures fetched (the earth map is
    // drawn at runtime from an embedded public-domain coastline encoding).
    // The space scenes are EDUCATIONAL APPROXIMATIONS, not physical
    // simulations; scales are compressed and the info panel says so.
    //
    // A visible wrapper + "Loading 3D engine..." placeholder renders
    // synchronously (G16 render-only pass); the ~0.7 MB engine lazy-loads
    // post-paint via requestIdleCallback and is cached by the browser.
    // Fullscreen targets the WRAPPER div (controls stay visible).
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    var T3D_SLUG = 'city-drive-3d';
    var T3D_STORE_KEY = 'ftol-game-' + T3D_SLUG;

    function t3dDetectScene(slug) {
        var s = String(slug || '').toLowerCase();
        if (/gpu/.test(s)) return 'gputest';
        if (/drive|driving/.test(s)) return 'drive';
        if (/city/.test(s)) return 'city';
        if (/sky|flight|plane|aircraft/.test(s)) return 'flight';
        if (/earth|globe/.test(s)) return 'earth';
        if (/voxel|builder|block/.test(s)) return 'voxel';
        if (/solar|planet/.test(s)) return 'solar';
        if (/black/.test(s)) return 'blackhole';
        if (/galaxy/.test(s)) return 'galaxy';
        return 'solar';
    }

    // Module registry: each T3D_MODULE block below registers itself here. The
    // fragment emitter (emit-cms-fragments.mjs) PRUNES non-matching module
    // blocks per slug, so an emitted page carries exactly one registration.
    // Bootstrap reads the registry instead of naming modules - pruned modules
    // simply never register and no dangling identifiers remain.
    var T3D_REGISTRY = {};

    // ---- vendored ESM loader (ftoLoadPdfLib shape, but a cached import()) ----
    function ftoLoadThree() {
        if (window.__ftoThreePromise) { return window.__ftoThreePromise; }
        var base = (typeof BASE_PATH === 'string' ? BASE_PATH : '') + '/vendor/three';
        window.__ftoThreePromise = import(base + '/three.module.min.js').then(function (mod) {
            if (!mod || !mod.WebGLRenderer) { throw new Error('three.js loaded but WebGLRenderer is missing'); }
            return mod;
        });
        return window.__ftoThreePromise;
    }

    function t3dStatus(text) {
        var el = document.getElementById('t3dStatus');
        if (el) el.textContent = text;
    }
    function t3dInfo(html) {
        var el = document.getElementById('t3dInfoPanel');
        if (el) el.innerHTML = html;
    }
    function t3dLoadStore() {
        try { return JSON.parse(localStorage.getItem(T3D_STORE_KEY) || '{}') || {}; }
        catch (e) { return {}; }
    }
    function t3dSaveStore(obj) {
        try { localStorage.setItem(T3D_STORE_KEY, JSON.stringify(obj)); }
        catch (e) { t3dStatus('Could not save to browser storage (quota or private mode) - building still works.'); }
    }
    function t3dFullscreen(el) {
        if (el.requestFullscreen) { el.requestFullscreen(); }
        else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
        else if (el.mozRequestFullScreen) { el.mozRequestFullScreen(); }
        else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
    }

    // ---- tiny procedural synth (Web Audio - NO audio files) ------------------
    // Category rule: sound is synthesized on-device and stays SILENT until the
    // reader clicks the page's sound toggle (autoplay-safe). blip() plays a
    // short envelope; hum() keeps a low filtered drone a module retunes.
    function t3dSynth() {
        var ctx = null, master = null, humOsc = null, humOsc2 = null, humGain = null, humFilter = null, on = false;
        function ensure() {
            if (ctx) return;
            var AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return;
            ctx = new AC();
            master = ctx.createGain(); master.gain.value = 0; master.connect(ctx.destination);
        }
        return {
            enabled: function () { return on; },
            toggle: function () {
                ensure();
                if (!ctx) return false;
                on = !on;
                if (ctx.state === 'suspended') { ctx.resume(); }
                master.gain.setTargetAtTime(on ? 0.5 : 0, ctx.currentTime, 0.05);
                return on;
            },
            blip: function (freq, dur, gain, type) {
                if (!ctx || !on) return;
                var o = ctx.createOscillator(), g = ctx.createGain();
                o.type = type || 'sine'; o.frequency.value = freq;
                g.gain.setValueAtTime(gain || 0.25, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + (dur || 0.18));
                o.connect(g); g.connect(master);
                o.start(); o.stop(ctx.currentTime + (dur || 0.18) + 0.02);
            },
            hum: function (freq, level) {
                if (!ctx) return;
                if (!humOsc) {
                    humOsc = ctx.createOscillator(); humOsc2 = ctx.createOscillator();
                    humFilter = ctx.createBiquadFilter(); humFilter.type = 'lowpass'; humFilter.frequency.value = 320;
                    humGain = ctx.createGain(); humGain.gain.value = 0;
                    humOsc.type = 'triangle'; humOsc2.type = 'triangle';
                    humOsc.connect(humFilter); humOsc2.connect(humFilter);
                    humFilter.connect(humGain); humGain.connect(master);
                    humOsc.start(); humOsc2.start();
                }
                humOsc.frequency.setTargetAtTime(freq, ctx.currentTime, 0.4);
                humOsc2.frequency.setTargetAtTime(freq * 1.007, ctx.currentTime, 0.4);
                humGain.gain.setTargetAtTime(level, ctx.currentTime, 0.4);
            },
        };
    }

    // ---- shared scene shell: renderer + camera + custom pointer-orbit --------
    // OrbitControls is NOT vendored (jsm addons import the bare 'three'
    // specifier); this ~40-line orbit covers drag-rotate + wheel/pinch zoom
    // with damping and a clamped pitch.
    function t3dShell(THREE, host, opts) {
        var coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
        var low = coarse || ((navigator.hardwareConcurrency || 4) <= 4);
        var renderer = new THREE.WebGLRenderer({ antialias: !low, powerPreference: opts.power ? 'high-performance' : 'default' });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(opts.fov || 55, 1, 0.1, 4000);
        var orbit = {
            target: new THREE.Vector3(0, opts.targetY || 0, 0),
            radius: opts.radius, theta: opts.theta || 0.6, phi: opts.phi || 1.15,
            goalRadius: opts.radius, goalTheta: opts.theta || 0.6, goalPhi: opts.phi || 1.15,
            minR: opts.minR || 4, maxR: opts.maxR || 400,
        };
        function applyCamera() {
            // critically-damped-ish lerp toward the goal orbit
            orbit.theta += (orbit.goalTheta - orbit.theta) * 0.14;
            orbit.phi += (orbit.goalPhi - orbit.phi) * 0.14;
            orbit.radius += (orbit.goalRadius - orbit.radius) * 0.14;
            var sp = Math.sin(orbit.phi), cp = Math.cos(orbit.phi);
            camera.position.set(
                orbit.target.x + orbit.radius * sp * Math.sin(orbit.theta),
                orbit.target.y + orbit.radius * cp,
                orbit.target.z + orbit.radius * sp * Math.cos(orbit.theta)
            );
            camera.lookAt(orbit.target);
        }
        function size() {
            var w = Math.max(260, host.clientWidth);
            var h = Math.round(w * 0.62);
            var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
            if (fsEl && fsEl.contains(host)) { h = Math.max(240, (window.innerHeight || h) - 150); }
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        host.appendChild(renderer.domElement);
        renderer.domElement.style.touchAction = 'none';
        renderer.domElement.style.borderRadius = '6px';
        // pointer-orbit input (opts.noInput skips it - a module that steers its
        // own camera, e.g. a chase-cam game or a benchmark, wires its own input)
        if (!opts.noInput) {
            var drag = null, pinch = null, moved = 0;
            host.addEventListener('pointerdown', function (e) {
                drag = { x: e.clientX, y: e.clientY }; moved = 0;
                host.setPointerCapture && host.setPointerCapture(e.pointerId);
            });
            host.addEventListener('pointermove', function (e) {
                if (!drag) return;
                var dx = e.clientX - drag.x, dy = e.clientY - drag.y;
                moved += Math.abs(dx) + Math.abs(dy);
                drag = { x: e.clientX, y: e.clientY };
                orbit.goalTheta -= dx * 0.006;
                orbit.goalPhi = Math.min(Math.max(orbit.goalPhi - dy * 0.005, 0.15), Math.PI - 0.2);
            });
            host.addEventListener('pointerup', function (e) {
                var wasClick = moved < 8;
                drag = null;
                if (wasClick && shell.onClick) { shell.onClick(e); }
            });
            host.addEventListener('wheel', function (e) {
                e.preventDefault();
                orbit.goalRadius = Math.min(Math.max(orbit.goalRadius * (e.deltaY > 0 ? 1.12 : 0.9), orbit.minR), orbit.maxR);
            }, { passive: false });
            host.addEventListener('touchstart', function (e) {
                if (e.touches.length === 2) {
                    pinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                }
            }, { passive: true });
            host.addEventListener('touchmove', function (e) {
                if (e.touches.length === 2 && pinch) {
                    var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    orbit.goalRadius = Math.min(Math.max(orbit.goalRadius * (pinch / d), orbit.minR), orbit.maxR);
                    pinch = d;
                }
            }, { passive: true });
        }
        window.addEventListener('resize', size);
        document.addEventListener('fullscreenchange', size);
        document.addEventListener('webkitfullscreenchange', size);
        size();
        var shell = {
            THREE: THREE, renderer: renderer, scene: scene, camera: camera,
            orbit: orbit, low: low, applyCamera: applyCamera, size: size, onClick: null,
            ndc: function (e) {
                var r = renderer.domElement.getBoundingClientRect();
                return new THREE.Vector2(((e.clientX - r.left) / r.width) * 2 - 1, -((e.clientY - r.top) / r.height) * 2 + 1);
            },
        };
        return shell;
    }








    /* T3D_MODULE:drive START */
    // ================= CITY DRIVE (games cluster) ============================
    // Free-roam arcade driving around a procedural city grid, plus an optional
    // timed checkpoint run (60 s + 8 s per checkpoint reached). Chase-cam
    // module: the shell is created with noInput and applyCamera is REASSIGNED,
    // so the untouched bootstrap keeps working. Arcade physics only - eased
    // speed/steering, soft bounce off buildings and traffic; no damage model,
    // no traffic-law simulation, and nothing to hit but geometry (family-safe
    // by design). All meshes are primitives + cached CanvasTexture windows.
    function t3dDriveRng(seed) {
        var a = seed >>> 0;
        return function () {
            a |= 0; a = a + 0x6D2B79F5 | 0;
            var t = Math.imul(a ^ a >>> 15, 1 | a);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
    }
    function t3dDrivePre() {
        var best = t3dLoadStore().best || null;
        var el = document.getElementById('t3dDriveBest');
        if (el && best) el.textContent = best.score + ' checkpoints';
    }
    function t3dCityDrive(shell) {
        var THREE = shell.THREE, scene = shell.scene;
        var synth = t3dSynth();
        var low = shell.low;
        shell.renderer.setClearColor(0x9fd3ee, 1);
        scene.fog = new THREE.Fog(0x9fd3ee, 90, 380);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        var sun = new THREE.DirectionalLight(0xffffff, 1.6);
        sun.position.set(60, 100, 40);
        scene.add(sun);

        // ---- static city: ground, road grid, buildings with AABBs ----------
        var BOUND = 66;
        var ground = new THREE.Mesh(new THREE.BoxGeometry(150, 0.1, 150), new THREE.MeshLambertMaterial({ color: 0x74836f }));
        ground.position.y = -0.05;
        scene.add(ground);
        var ROADS = [-39, -13, 13, 39];
        var roadMat = new THREE.MeshLambertMaterial({ color: 0x37474f });
        var dashMat = new THREE.MeshBasicMaterial({ color: 0xeceff1 });
        var ri, di;
        for (ri = 0; ri < ROADS.length; ri++) {
            var rx = new THREE.Mesh(new THREE.BoxGeometry(150, 0.06, 8), roadMat);
            rx.position.set(0, 0.03, ROADS[ri]);
            var rz = new THREE.Mesh(new THREE.BoxGeometry(8, 0.06, 150), roadMat);
            rz.position.set(ROADS[ri], 0.03, 0);
            scene.add(rx); scene.add(rz);
            for (di = -72; di <= 72; di += 9) {
                var d1 = new THREE.Mesh(new THREE.BoxGeometry(3, 0.02, 0.3), dashMat);
                d1.position.set(di, 0.07, ROADS[ri]);
                var d2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.02, 3), dashMat);
                d2.position.set(ROADS[ri], 0.07, di);
                scene.add(d1); scene.add(d2);
            }
        }
        var wallMats = [];
        (function () {
            var palettes = ['#8d9ea7', '#a1887f', '#90a4ae', '#78909c'];
            for (var pi = 0; pi < palettes.length; pi++) {
                var c = document.createElement('canvas');
                c.width = 128; c.height = 160;
                var x = c.getContext('2d');
                x.fillStyle = palettes[pi];
                x.fillRect(0, 0, 128, 160);
                var rng = t3dDriveRng(pi * 131 + 17);
                for (var r = 0; r < 8; r++) {
                    for (var col = 0; col < 6; col++) {
                        x.fillStyle = rng() < 0.3 ? '#fff59d' : '#33424c';
                        x.fillRect(8 + col * 20, 10 + r * 19, 12, 12);
                    }
                }
                wallMats.push(new THREE.MeshLambertMaterial({ map: new THREE.CanvasTexture(c) }));
            }
        })();
        var boxes = []; // {minX, maxX, minZ, maxZ} building colliders
        var LOTS = [-52, -26, 0, 26, 52];
        for (var ix = 0; ix < LOTS.length; ix++) {
            for (var iz = 0; iz < LOTS.length; iz++) {
                var rng2 = t3dDriveRng(3000 + ix * 41 + iz * 7);
                var foot = 9 + rng2() * 5;
                var h = 5 + rng2() * (low ? 18 : 26);
                var bld = new THREE.Mesh(
                    new THREE.BoxGeometry(foot, h, foot),
                    wallMats[Math.floor(rng2() * wallMats.length)]
                );
                bld.position.set(LOTS[ix], h / 2, LOTS[iz]);
                scene.add(bld);
                boxes.push({
                    minX: LOTS[ix] - foot / 2 - 1.6, maxX: LOTS[ix] + foot / 2 + 1.6,
                    minZ: LOTS[iz] - foot / 2 - 1.6, maxZ: LOTS[iz] + foot / 2 + 1.6,
                });
            }
        }

        // ---- the player's car ----------------------------------------------
        function makeCar(color) {
            var g = new THREE.Group();
            var mat = new THREE.MeshLambertMaterial({ color: color });
            var body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.0, 4.2), mat);
            body.position.y = 0.85;
            g.add(body);
            var cab = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.8, 1.9), mat);
            cab.position.set(0, 1.75, -0.3);
            g.add(cab);
            var wg = new THREE.CylinderGeometry(0.38, 0.38, 0.3, 10);
            var wm = new THREE.MeshLambertMaterial({ color: 0x212121 });
            for (var wx = -1; wx <= 1; wx += 2) {
                for (var wz = -1; wz <= 1; wz += 2) {
                    var wheel = new THREE.Mesh(wg, wm);
                    wheel.rotation.z = Math.PI / 2;
                    wheel.position.set(wx * 0.95, 0.38, wz * 1.35);
                    g.add(wheel);
                }
            }
            var lampMat = new THREE.MeshBasicMaterial({ color: 0xfff9c4 });
            for (var lx = -1; lx <= 1; lx += 2) {
                var lamp = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.1), lampMat);
                lamp.position.set(lx * 0.6, 0.9, 2.12);
                g.add(lamp);
            }
            return g;
        }
        var car = makeCar(0xd32f2f);
        car.position.set(0, 0, -13);
        scene.add(car);
        var heading = Math.PI / 2; // facing +x down the road
        var speed = 0;
        var fwd = new THREE.Vector3();

        // ---- traffic ---------------------------------------------------------
        var traffic = [];
        var tRng = t3dDriveRng(9001);
        var tColors = [0xcfd8dc, 0x455a64, 0x1565c0, 0x8d6e63, 0xf5f5f5];
        var tCount = low ? 6 : 10;
        for (var tk = 0; tk < tCount; tk++) {
            var tg = makeCar(tColors[Math.floor(tRng() * tColors.length)]);
            scene.add(tg);
            traffic.push({
                obj: tg,
                axis: tRng() < 0.5 ? 'x' : 'z',
                road: ROADS[Math.floor(tRng() * ROADS.length)],
                dir: tRng() < 0.5 ? 1 : -1,
                speed: 7 + tRng() * 6,
                pos: -60 + tRng() * 120,
            });
        }

        // ---- checkpoint run --------------------------------------------------
        var INTERSECTIONS = [];
        for (ri = 0; ri < ROADS.length; ri++) for (di = 0; di < ROADS.length; di++) INTERSECTIONS.push([ROADS[ri], ROADS[di]]);
        var beacon = new THREE.Group();
        var ringMesh = new THREE.Mesh(new THREE.TorusGeometry(3.2, 0.28, 10, 28), new THREE.MeshBasicMaterial({ color: 0xffd740 }));
        ringMesh.rotation.x = Math.PI / 2;
        ringMesh.position.y = 1.2;
        beacon.add(ringMesh);
        var column = new THREE.Mesh(
            new THREE.CylinderGeometry(1.4, 1.4, 26, 12, 1, true),
            new THREE.MeshBasicMaterial({ color: 0xffe082, transparent: true, opacity: 0.28, side: THREE.DoubleSide, depthWrite: false })
        );
        column.position.y = 13;
        beacon.add(column);
        beacon.visible = false;
        scene.add(beacon);
        var arrow = new THREE.Mesh(new THREE.ConeGeometry(0.55, 1.6, 8), new THREE.MeshBasicMaterial({ color: 0xffd740 }));
        arrow.rotation.x = Math.PI / 2; // cone tip points +z, yaw via parent group
        var arrowPivot = new THREE.Group();
        arrowPivot.add(arrow);
        arrow.position.z = 0.8;
        arrowPivot.visible = false;
        scene.add(arrowPivot);

        var scoreEl = document.getElementById('t3dDriveScore');
        var timeEl = document.getElementById('t3dDriveTime');
        var bestEl = document.getElementById('t3dDriveBest');
        var startBtn = document.getElementById('t3dDriveStart');
        var restartBtn = document.getElementById('t3dDriveRestart');
        var soundBtn = document.getElementById('t3dDriveSound');
        if (soundBtn) soundBtn.addEventListener('click', function () {
            soundBtn.textContent = 'Sound: ' + (synth.toggle() ? 'on' : 'off');
        });
        var run = null; // null = free roam; {score, time, over}
        function hud() {
            if (scoreEl) scoreEl.textContent = run ? String(run.score) : '0';
            if (timeEl) timeEl.textContent = run ? Math.max(0, Math.ceil(run.time)) + ' s' : '-';
        }
        function placeBeacon() {
            var options = [];
            for (var k = 0; k < INTERSECTIONS.length; k++) {
                var p = INTERSECTIONS[k];
                var dx = p[0] - car.position.x, dz = p[1] - car.position.z;
                if (dx * dx + dz * dz > 30 * 30) options.push(p);
            }
            if (!options.length) options = INTERSECTIONS;
            var pick = options[Math.floor(Math.random() * options.length)];
            beacon.position.set(pick[0], 0, pick[1]);
            beacon.visible = true;
            arrowPivot.visible = true;
        }
        function begin() {
            run = { score: 0, time: 60, over: false };
            if (startBtn) startBtn.style.display = 'none';
            if (restartBtn) restartBtn.style.display = 'none';
            placeBeacon();
            hud();
            t3dStatus('Checkpoint run - follow the arrow to the glowing ring. Each checkpoint adds 8 seconds.');
        }
        function endRun() {
            run.over = true;
            beacon.visible = false;
            arrowPivot.visible = false;
            var store = t3dLoadStore();
            if (!store.best || run.score > store.best.score) {
                store.best = { score: run.score, at: new Date().toISOString() };
                t3dSaveStore(store);
            }
            if (bestEl && store.best) bestEl.textContent = store.best.score + ' checkpoints';
            if (restartBtn) restartBtn.style.display = '';
            t3dStatus('Time up - ' + run.score + ' checkpoint' + (run.score === 1 ? '' : 's') + ' this run. Click Restart run to try again, or just keep cruising.');
            synth.blip(150, 0.4, 0.3, 'square');
            run = null;
            hud();
        }
        if (startBtn) startBtn.addEventListener('click', begin);
        if (restartBtn) restartBtn.addEventListener('click', begin);

        // ---- input: keyboard + on-screen pedals ------------------------------
        var keys = {};
        window.addEventListener('keydown', function (e) {
            var t = e.target || {};
            if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable) return;
            var k = e.key.toLowerCase();
            if (['arrowleft', 'arrowright', 'arrowup', 'arrowdown', 'a', 'd', 'w', 's'].indexOf(k) >= 0) {
                keys[k] = true;
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', function (e) { keys[(e.key || '').toLowerCase()] = false; });
        function pedal(id, key) {
            var b = document.getElementById(id);
            if (!b) return;
            var down = function (e) { e.preventDefault(); keys[key] = true; };
            var up = function () { keys[key] = false; };
            b.addEventListener('pointerdown', down);
            b.addEventListener('pointerup', up);
            b.addEventListener('pointerleave', up);
            b.addEventListener('pointercancel', up);
        }
        pedal('t3dDriveGas', 'w');
        pedal('t3dDriveBrake', 's');
        pedal('t3dDriveLeft', 'a');
        pedal('t3dDriveRight', 'd');

        // ---- chase-cam (replaces the orbit camera) ---------------------------
        var camPos = new THREE.Vector3(0, 8, -26);
        var lookAt = new THREE.Vector3();
        shell.applyCamera = function () {
            fwd.set(Math.sin(heading), 0, Math.cos(heading));
            var wantX = car.position.x - fwd.x * 12;
            var wantY = 6.2;
            var wantZ = car.position.z - fwd.z * 12;
            camPos.x += (wantX - camPos.x) * 0.08;
            camPos.y += (wantY - camPos.y) * 0.08;
            camPos.z += (wantZ - camPos.z) * 0.08;
            shell.camera.position.copy(camPos);
            lookAt.set(car.position.x + fwd.x * 8, 1.2, car.position.z + fwd.z * 8);
            shell.camera.lookAt(lookAt);
        };

        t3dInfo('<h3>How to play</h3><p>Drive anywhere on the block grid: W or the up arrow accelerates, S or the down arrow brakes and reverses, A / D or the left / right arrows steer, and phones get on-screen pedals. Cruise freely, or click Start checkpoint run for a timed game - reach the glowing ring at an intersection to score, and every checkpoint adds 8 seconds to the clock.</p><p class="t3d-note">Arcade driving with simplified physics - not a driving simulator, and there is no damage or traffic-law modeling: bumping a building or a passing car just slows you down. Your best run is saved only in this browser. Sound is engine hum synthesized on your device, off until you turn it on.</p>');

        var humT = 0;
        return function animate(dt) {
            var dts = dt / 1000;
            var active = !document.hidden;
            if (active) {
                // steering + throttle (arcade easing)
                var steer = (keys.arrowleft || keys.a ? 1 : 0) - (keys.arrowright || keys.d ? 1 : 0);
                var gas = (keys.arrowup || keys.w ? 1 : 0) - (keys.arrowdown || keys.s ? 1 : 0);
                if (gas > 0) speed = Math.min(34, speed + 26 * dts);
                else if (gas < 0) speed = Math.max(-9, speed - 38 * dts);
                else speed -= Math.sign(speed) * Math.min(Math.abs(speed), 10 * dts);
                heading += steer * dts * 2.1 * Math.max(-1, Math.min(1, speed / 18));
                fwd.set(Math.sin(heading), 0, Math.cos(heading));
                car.position.x += fwd.x * speed * dts;
                car.position.z += fwd.z * speed * dts;
                car.rotation.y = heading;
                car.rotation.z = -steer * Math.min(Math.abs(speed) / 34, 1) * 0.08;
                // boundary + building collisions: soft bounce
                if (Math.abs(car.position.x) > BOUND) { car.position.x = Math.sign(car.position.x) * BOUND; speed *= -0.3; }
                if (Math.abs(car.position.z) > BOUND) { car.position.z = Math.sign(car.position.z) * BOUND; speed *= -0.3; }
                for (var b = 0; b < boxes.length; b++) {
                    var bx = boxes[b];
                    if (car.position.x > bx.minX && car.position.x < bx.maxX && car.position.z > bx.minZ && car.position.z < bx.maxZ) {
                        var pushX = (car.position.x - (bx.minX + bx.maxX) / 2) > 0 ? bx.maxX - car.position.x : bx.minX - car.position.x;
                        var pushZ = (car.position.z - (bx.minZ + bx.maxZ) / 2) > 0 ? bx.maxZ - car.position.z : bx.minZ - car.position.z;
                        if (Math.abs(pushX) < Math.abs(pushZ)) car.position.x += pushX; else car.position.z += pushZ;
                        if (Math.abs(speed) > 4) synth.blip(90, 0.15, 0.2, 'square');
                        speed *= -0.25;
                        break;
                    }
                }
                // traffic
                for (var tk2 = 0; tk2 < traffic.length; tk2++) {
                    var tv = traffic[tk2];
                    tv.pos += tv.speed * tv.dir * dts;
                    if (tv.pos > 70) tv.pos = -70;
                    if (tv.pos < -70) tv.pos = 70;
                    var lane = tv.road + tv.dir * 1.9;
                    if (tv.axis === 'x') {
                        tv.obj.position.set(tv.pos, 0, lane);
                        tv.obj.rotation.y = tv.dir > 0 ? Math.PI / 2 : -Math.PI / 2;
                    } else {
                        tv.obj.position.set(lane, 0, tv.pos);
                        tv.obj.rotation.y = tv.dir > 0 ? 0 : Math.PI;
                    }
                    var ddx = car.position.x - tv.obj.position.x;
                    var ddz = car.position.z - tv.obj.position.z;
                    var dist = Math.sqrt(ddx * ddx + ddz * ddz);
                    if (dist < 3.2 && dist > 0.001) {
                        car.position.x += (ddx / dist) * (3.2 - dist);
                        car.position.z += (ddz / dist) * (3.2 - dist);
                        if (Math.abs(speed) > 4) synth.blip(120, 0.18, 0.22, 'square');
                        speed *= -0.35;
                    }
                }
                // checkpoint run
                if (run && !run.over) {
                    run.time -= dts;
                    if (run.time <= 0) { endRun(); }
                    else {
                        var cdx = beacon.position.x - car.position.x;
                        var cdz = beacon.position.z - car.position.z;
                        if (cdx * cdx + cdz * cdz < 7 * 7) {
                            run.score++;
                            run.time += 8;
                            synth.blip(980, 0.2, 0.3);
                            placeBeacon();
                        }
                        arrowPivot.position.set(car.position.x, 4.2, car.position.z);
                        arrowPivot.rotation.y = Math.atan2(beacon.position.x - car.position.x, beacon.position.z - car.position.z);
                        hud();
                    }
                }
                ringMesh.rotation.z += dts * 1.5;
                column.material.opacity = 0.2 + Math.abs(Math.sin(performance.now() / 400)) * 0.15;
                humT += dt;
                if (humT >= 120) { humT = 0; synth.hum(46 + Math.abs(speed) * 3.2, 0.05); }
            }
        };
    }
    T3D_REGISTRY.drive = {
        fn: t3dCityDrive,
        preset: { radius: 40, maxR: 150, minR: 10, phi: 1.15, noInput: true },
        row: 't3dDriveControls',
        ready: 'Drive with WASD / the arrow keys or the on-screen pedals - click Start checkpoint run for a timed game.',
        pre: t3dDrivePre,
    };

    // ---- bootstrap ------------------------------------------------------------
    function doAfterPageRendered() {
        var host = document.getElementById('t3dCanvasHost');
        var root = document.getElementById('threeSceneTool');
        if (!host || !root) return; // not a 3D scene page
        var wrapper = document.getElementById('t3dWrapper') || root;
        var kind = t3dDetectScene(T3D_SLUG);
        var mod = T3D_REGISTRY[kind];
        if (!mod) { for (var kk in T3D_REGISTRY) { kind = kk; mod = T3D_REGISTRY[kk]; break; } }
        if (!mod) { t3dStatus('No 3D scene module is registered on this page.'); return; }
        // Show only this scene's control row (emitted pages carry only their own).
        for (var k in T3D_REGISTRY) {
            var rowId = T3D_REGISTRY[k].row;
            var el = rowId ? document.getElementById(rowId) : null;
            if (el) el.style.display = (k === kind) ? '' : 'none';
        }
        var fsBtn = document.getElementById('t3dFullscreenBtn');
        if (fsBtn) fsBtn.addEventListener('click', function () { t3dFullscreen(wrapper); });
        // Modules with a sync pre-engine paint (e.g. the GPU capability report)
        // run it before the engine loads so the page is useful immediately.
        if (mod.pre) { try { mod.pre(); } catch (ePre) { /* pre-paint must never block boot */ } }
        t3dStatus('Loading the 3D engine (about 0.7 MB, one time - then cached)...');
        function boot() {
            ftoLoadThree().then(function (THREE) {
                try {
                    var shell = t3dShell(THREE, host, mod.preset);
                    var animate = mod.fn(shell);
                    if (mod.ready) t3dStatus(mod.ready);
                    var last = performance.now();
                    shell.renderer.setAnimationLoop(function () {
                        var now = performance.now();
                        var dt = Math.min(now - last, 100);
                        last = now;
                        animate(dt);
                        shell.applyCamera();
                        shell.renderer.render(shell.scene, shell.camera);
                    });
                } catch (err) {
                    t3dStatus('This page needs WebGL to render the 3D scene. Your browser or device has it disabled - the facts panel below still works. (' + (err && err.message ? err.message : err) + ')');
                }
            }).catch(function (err) {
                t3dStatus('Could not load the 3D engine: ' + (err && err.message ? err.message : err));
            });
        }
        if ('requestIdleCallback' in window) { requestIdleCallback(boot, { timeout: 2500 }); }
        else { setTimeout(boot, 300); }
    }
</script>
