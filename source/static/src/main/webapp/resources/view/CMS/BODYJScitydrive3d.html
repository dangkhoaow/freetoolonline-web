<script>
    // City Drive Open World 3D launcher. The full game is a self-contained
    // Vite-built bundle in an isolated same-origin iframe at games/city-drive/
    // (three.js r160 bundled INTO the hashed JS - NO CDN, no import map
    // needed). The page stays light: the ~1 MB game loads only when the
    // reader presses Play. Keyboard, touch joystick, and gamepad input all
    // live inside the iframe document, so nothing collides with page styles.
    //
    // Framework contract: bootstrap in doAfterPageRendered(). No top-level DOM.

    web.localUpload = false;

    // Relative to /games/, so it resolves under any base path (staging subpath
    // included) without needing BASE_PATH.
    var CD3D_GAME_URL = 'city-drive/index.html';

    function cd3dStatus(text) {
        var el = document.getElementById('cd3dStatus');
        if (el) el.textContent = text;
    }

    function cd3dInjectFrame(stage) {
        var frame = document.createElement('iframe');
        frame.id = 'cd3dFrame';
        frame.src = CD3D_GAME_URL;
        frame.title = 'City Drive Open World 3D game';
        frame.setAttribute('allow', 'fullscreen; gamepad; autoplay');
        frame.setAttribute('allowfullscreen', '');
        frame.addEventListener('load', function () {
            cd3dStatus('Game loaded. Click the title card, then Play on the menu; ESC pauses.');
            try { frame.contentWindow.focus(); } catch (e) { /* focus is best-effort */ }
        });
        var launch = document.getElementById('cd3dLaunch');
        if (launch && launch.parentNode === stage) { stage.removeChild(launch); }
        stage.appendChild(frame);
        return frame;
    }

    function doAfterPageRendered() {
        var stage = document.getElementById('cd3dStage');
        var playBtn = document.getElementById('cd3dPlayBtn');
        if (!stage || !playBtn) return; // not this page

        var fsBtn = document.getElementById('cd3dFullscreenBtn');
        playBtn.addEventListener('click', function () {
            cd3dStatus('Loading the game (about 1 MB, one time - then cached)...');
            cd3dInjectFrame(stage);
            if (fsBtn) fsBtn.disabled = false;
        });

        if (fsBtn) fsBtn.addEventListener('click', function () {
            if (stage.requestFullscreen) { stage.requestFullscreen(); }
            else if (stage.webkitRequestFullscreen) { stage.webkitRequestFullscreen(); }
            var frame = document.getElementById('cd3dFrame');
            if (frame) { try { frame.contentWindow.focus(); } catch (e) { } }
        });
    }
</script>
