<div class="w3-container">
</div>

<div class="w3-row w3-container" style="margin-bottom: 10px;font-size: 13px;">
    <div class="w3-container w3-col w3-half w3-rest" style="max-width: max-content;margin-right: 10px;">
        <label>
            <select class="w3-select" id="outputFormat" style="width: 52px;">
                <option value=".jpg" selected="selected">JPG</option>
                <option value=".png">PNG</option>
            </select> Output format
        </label>
    </div>
    <div class="w3-container w3-col w3-half w3-rest" style="max-width: 50%;">
        <label>
            <select class="w3-select" id="fps" style="width: 50px;">
            <option value="10">10</option>
            <option value="24" selected="selected">24</option>
            <option value="60">60</option>
            </select> Extract in FPS
        </label>
    </div>
</div>

<div class="w3-container w3-margin-top" id="gfClientPanel" style="border-top:1px solid #e0e0e0; padding-top:12px;">
    <details class="gf-client-disclosure">
    <summary style="cursor:pointer; margin:8px 0; font-size:1.05em; font-weight:bold;">Or extract frames in your browser (no upload)</summary>
    <p class="w3-small w3-text-grey" style="margin-top:0;">Pick one or more GIFs and pull the frames out on your device. Nothing is uploaded. Works in Chrome and Edge (uses the browser's built-in image decoder).</p>
    <div class="w3-row" style="margin-bottom:10px;">
        <input type="file" id="gfClientFile" class="w3-input w3-border" accept="image/gif" multiple />
    </div>
    <div class="w3-row w3-padding-small" style="margin-bottom:6px;">
        <div class="w3-col m4">
            <label for="gfMode" class="w3-small"><b>Frames to extract:</b></label>
            <select id="gfMode" class="w3-select w3-border" style="max-width:220px">
                <option value="all" selected>All frames</option>
                <option value="interval">Every Nth frame</option>
                <option value="specific">Specific frames</option>
            </select>
        </div>
        <div class="w3-col m4 gf-interval-c" style="display:none;">
            <label for="gfInterval" class="w3-small"><b>Every:</b></label>
            <input type="number" id="gfInterval" class="w3-input w3-border" min="1" max="999" value="5" style="max-width:120px" /> <span class="w3-small w3-text-grey">th frame</span>
        </div>
        <div class="w3-col m4 gf-specific-c" style="display:none;">
            <label for="gfSpecific" class="w3-small"><b>Frame numbers (comma-separated, 1-based):</b></label>
            <input type="text" id="gfSpecific" class="w3-input w3-border" placeholder="1, 5, 10" style="max-width:200px" />
        </div>
    </div>
    <div class="w3-row w3-padding-small" style="margin-bottom:6px;">
        <div class="w3-col m4">
            <label for="gfFormat" class="w3-small"><b>Output format:</b></label>
            <select id="gfFormat" class="w3-select w3-border" style="max-width:160px">
                <option value="png" selected>PNG</option>
                <option value="jpeg">JPG</option>
                <option value="webp">WebP</option>
            </select>
        </div>
        <div class="w3-col m4">
            <label for="gfQuality" class="w3-small"><b>Quality: <span id="gfQualityVal">90</span></b> (JPG / WebP)</label>
            <input type="range" id="gfQuality" min="1" max="100" step="1" value="90" style="width:100%" />
        </div>
        <div class="w3-col m4">
            <label for="gfResize" class="w3-small"><b>Max width (px, blank = original):</b></label>
            <input type="number" id="gfResize" class="w3-input w3-border" min="16" max="4096" placeholder="original" style="max-width:140px" />
        </div>
    </div>
    <div class="w3-row" style="margin-bottom:10px;">
        <button type="button" id="gfExtractBtn" class="w3-button w3-red">Extract frames</button>
        <button type="button" id="gfZipBtn" class="w3-button w3-small w3-light-grey" style="display:none;">Download all as ZIP</button>
    </div>
    <div id="gfProgressWrap" class="w3-row" style="display:none; margin-bottom:10px;">
        <progress id="gfProgress" value="0" max="100" style="width:100%;"></progress>
        <span id="gfProgressVal" class="w3-small w3-text-grey"></span>
    </div>
    <p id="gfError" class="w3-small w3-text-red" style="display:none;"></p>
    <div id="gfFrames" class="w3-row" aria-live="polite"></div>
    </details>
</div>
