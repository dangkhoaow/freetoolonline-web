<script>
    web.localUpload = false;
    var TCD_GAME_URL = 'thirteen-card-duel/index.html';
    function tcdStatus(t){ var el=document.getElementById('tcdStatus'); if(el) el.textContent=t; }
    function tcdInjectFrame(stage){
        var frame=document.createElement('iframe');
        frame.id='tcdFrame'; frame.src=TCD_GAME_URL; frame.title='Thirteen Card Duel';
        frame.setAttribute('allow','fullscreen'); frame.setAttribute('allowfullscreen','');
        frame.addEventListener('load',function(){ tcdStatus('Loaded. Click deck cards on your turn.'); });
        var launch=document.getElementById('tcdLaunch');
        if(launch&&launch.parentNode===stage) stage.removeChild(launch);
        stage.appendChild(frame);
    }
    function doAfterPageRendered(){
        var stage=document.getElementById('tcdStage'), playBtn=document.getElementById('tcdPlayBtn');
        if(!stage||!playBtn) return;
        var fsBtn=document.getElementById('tcdFullscreenBtn');
        playBtn.addEventListener('click',function(){
            tcdStatus('Loading about ~40 KB...'); tcdInjectFrame(stage);
            if(fsBtn) fsBtn.disabled=false;
        });
        if(fsBtn) fsBtn.addEventListener('click',function(){
            if(stage.requestFullscreen) stage.requestFullscreen();
            else if(stage.webkitRequestFullscreen) stage.webkitRequestFullscreen();
        });
    }
</script>
