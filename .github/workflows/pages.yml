name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout source repo
        run: |
          if [ -z "${SOURCE_REPO_TOKEN:-}" ]; then
            echo "::error title=Missing SOURCE_REPO_TOKEN::Set a repository secret named SOURCE_REPO_TOKEN with read access to dangkhoaow/freetoolonline."
            exit 1
          fi
          git clone --depth 1 --branch master "https://x-access-token:${SOURCE_REPO_TOKEN}@github.com/dangkhoaow/freetoolonline.git" source
        env:
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export static site
        env:
          SOURCE_REPO_ROOT: ${{ github.workspace }}/source
        run: npm run export

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
