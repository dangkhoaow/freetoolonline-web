<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-281f50-title svg-featurebadge-281f50-desc">
  <title id="svg-featurebadge-281f50-title">Collapse JSON tree nodes to read big payloads</title>
  <desc id="svg-featurebadge-281f50-desc">Click an object or array node to collapse it, then Copy Beautified to grab the indented JSON.</desc>
  <rect x="2" y="2" width="196" height="44" rx="22" ry="22" fill="#5B73AE" aria-hidden="true"/>
  <text x="100" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1C1C1E">collapse &amp; copy</text>
</svg>
