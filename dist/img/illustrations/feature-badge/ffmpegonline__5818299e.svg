<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-d1640e-title svg-featurebadge-d1640e-desc">
  <title id="svg-featurebadge-d1640e-title">Run FFmpeg or FFprobe commands without a local install</title>
  <desc id="svg-featurebadge-d1640e-desc">Upload a media file, supply the FFmpeg or FFprobe flags you would type locally, and the processing service runs the command and returns a downloadable output.</desc>
  <rect x="2" y="2" width="196" height="44" rx="22" ry="22" fill="#5B73AE" aria-hidden="true"/>
  <text x="100" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1C1C1E">no install</text>
</svg>
