<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-removepdfpassword-title svg-featurebadge-removepdfpassword-desc">
  <title id="svg-featurebadge-removepdfpassword-title">Unlock with the password you know</title>
  <desc id="svg-featurebadge-removepdfpassword-desc">Strip the password layer from a PDF you have the password for; download an unlocked copy ready to share, sign, or merge.</desc>
  <rect x="2" y="2" width="196" height="44" rx="22" ry="22" fill="#B3C5B0" aria-hidden="true"/>
  <text x="100" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1C1C1E">Unlock, no prompt</text>
</svg>
