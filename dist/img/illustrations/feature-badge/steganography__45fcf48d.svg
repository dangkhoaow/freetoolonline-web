<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-7bf9d6-title svg-featurebadge-7bf9d6-desc">
  <title id="svg-featurebadge-7bf9d6-title">Your image and message stay in your browser - never uploaded</title>
  <desc id="svg-featurebadge-7bf9d6-desc">The hide and reveal steps both run on your own device via canvas; the image and the secret text are never uploaded to a server.</desc>
  <rect x="2" y="2" width="196" height="44" rx="22" ry="22" fill="#7DAFA3" aria-hidden="true"/>
  <text x="100" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1C1C1E">no upload</text>
</svg>
