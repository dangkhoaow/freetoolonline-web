<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-d554ef-title svg-featurebadge-d554ef-desc">
  <title id="svg-featurebadge-d554ef-title">Your datetime stays in the browser - no upload</title>
  <desc id="svg-featurebadge-d554ef-desc">The conversion runs in your browser via Date.getTime(); nothing about the chosen datetime is uploaded and no API call is made.</desc>
  <rect x="2" y="2" width="196" height="44" rx="22" ry="22" fill="#B3C5B0" aria-hidden="true"/>
  <text x="100" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1C1C1E">no upload</text>
</svg>
