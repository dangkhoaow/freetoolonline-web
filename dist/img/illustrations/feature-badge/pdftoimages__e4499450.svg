<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-cfa553-title svg-featurebadge-cfa553-desc">
  <title id="svg-featurebadge-cfa553-title">Convert each PDF page to a JPG or PNG image and download it</title>
