<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-imagetobase64-title svg-featurebadge-imagetobase64-desc">
  <title id="svg-featurebadge-imagetobase64-title">Base64 is best for small images</title>
  <desc id="svg-featurebadge-imagetobase64-desc">Base64 adds about 33% byte overhead, so use it for small icons under a few KB.</desc>
  <rect x="2" y="2" width="196" height="44" rx="22" ry="22" fill="#E6D8A8" aria-hidden="true"/>
  <text x="100" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1C1C1E">small images</text>
</svg>
