<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-eea0d5-title svg-featurebadge-eea0d5-desc">
  <title id="svg-featurebadge-eea0d5-title">Generate an MD5 hash from text</title>
  <desc id="svg-featurebadge-eea0d5-desc">Paste text to generate a 32-char MD5 hash; To Text only looks up cached previous inputs.</desc>
  <rect x="2" y="2" width="196" height="44" rx="22" ry="22" fill="#D9C7A3" aria-hidden="true"/>
  <text x="100" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1C1C1E">text to MD5</text>
</svg>
