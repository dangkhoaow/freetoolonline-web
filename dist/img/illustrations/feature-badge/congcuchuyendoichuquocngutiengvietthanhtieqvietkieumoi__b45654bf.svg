<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-921efa-title svg-featurebadge-921efa-desc">
  <title id="svg-featurebadge-921efa-title">Chuyển đổi chạy trong trình duyệt, không tải lên máy chủ</title>
  <desc id="svg-featurebadge-921efa-desc">Câu tiếng Việt được chuyển sang Tiếq Việt ngay trong trình duyệt; nội dung không tải lên máy chủ và không lưu lại.</desc>
  <rect x="2" y="2" width="196" height="44" rx="22" ry="22" fill="#B3C5B0" aria-hidden="true"/>
  <text x="100" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1C1C1E">Không tải lên</text>
</svg>
