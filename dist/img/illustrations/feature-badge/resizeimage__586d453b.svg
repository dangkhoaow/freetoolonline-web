<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-feafbf-title svg-featurebadge-feafbf-desc">
  <title id="svg-featurebadge-feafbf-title">Resize a PNG or JPG to exact pixel dimensions with aspect lock</title>
  <desc id="svg-featurebadge-feafbf-desc">Drop a PNG or JPG, set exact pixel width and height or a scaling percentage, keep the aspect ratio locked to avoid distortion, then download the result.</desc>
  <rect x="2" y="2" width="196" height="44" rx="22" ry="22" fill="#E8C5C9" aria-hidden="true"/>
  <text x="100" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1C1C1E">Resize image</text>
</svg>
