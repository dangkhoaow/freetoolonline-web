<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-featurebadge-e329e8-title svg-featurebadge-e329e8-desc">
  <title id="svg-featurebadge-e329e8-title">Extract the text layer from a PDF and copy or download it</title>
  <desc id="svg-featurebadge-e329e8-desc">Upload a PDF and the server reads its text layer, returning the words in reading order so you can search, copy, or download the plain text.</desc>
  <rect x="2" y="2" width="196" height="44" rx="22" ry="22" fill="#5B73AE" aria-hidden="true"/>
  <text x="100" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1C1C1E">PDF to text</text>
</svg>
