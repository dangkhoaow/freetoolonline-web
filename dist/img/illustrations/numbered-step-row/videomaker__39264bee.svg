<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-numberedsteprow-0eab7e-title svg-numberedsteprow-0eab7e-desc">
  <title id="svg-numberedsteprow-0eab7e-title">Build an MP4 slideshow from images in three steps</title>
  <desc id="svg-numberedsteprow-0eab7e-desc">Upload images in order, set the per-frame duration and output resolution, then download a single MP4 that plays everywhere.</desc>
  <circle cx="100" cy="80" r="40" fill="#B3C5B0" aria-hidden="true"/>
  <text x="100" y="92" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="600" fill="#FFFFFF" aria-hidden="true">1</text>
  <text x="100" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#1C1C1E">Upload images</text>
  <path d="M 150 80 L 270 80 M 260 70 L 270 80 L 260 90" stroke="#3C3C3E" stroke-width="3" fill="none" aria-hidden="true"/>
  <circle cx="320" cy="80" r="40" fill="#B3C5B0" aria-hidden="true"/>
  <text x="320" y="92" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="600" fill="#FFFFFF" aria-hidden="true">2</text>
  <text x="320" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#1C1C1E">Set duration</text>
  <path d="M 370 80 L 490 80 M 480 70 L 490 80 L 480 90" stroke="#3C3C3E" stroke-width="3" fill="none" aria-hidden="true"/>
  <circle cx="540" cy="80" r="40" fill="#B3C5B0" aria-hidden="true"/>
  <text x="540" y="92" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="600" fill="#FFFFFF" aria-hidden="true">3</text>
  <text x="540" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#1C1C1E">Download MP4</text>
</svg>
