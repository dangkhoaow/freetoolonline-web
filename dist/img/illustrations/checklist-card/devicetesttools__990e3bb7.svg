<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-checklistcard-10f796-title svg-checklistcard-10f796-desc">
  <title id="svg-checklistcard-10f796-title">Fix a no-signal device test</title>
  <desc id="svg-checklistcard-10f796-desc">Three browser checks that fix most no-signal device tests: open the address-bar lock icon, allow camera and microphone access, then reload the page.</desc>
  <rect x="16" y="16" width="388" height="188" rx="12" fill="#F0F0F2" aria-hidden="true"/>
  <text x="36" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1C1C1E">Fix a no-signal test</text>
  <path d="M 38 92 L 47 101 L 62 83" stroke="#5B73AE" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"/>
  <text x="76" y="98" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#1C1C1E">Click the address-bar lock icon</text>
  <path d="M 38 132 L 47 141 L 62 123" stroke="#5B73AE" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"/>
  <text x="76" y="138" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#1C1C1E">Allow camera and mic access</text>
  <path d="M 38 172 L 47 181 L 62 163" stroke="#5B73AE" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"/>
  <text x="76" y="178" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#1C1C1E">Reload the page over HTTPS</text>
</svg>
