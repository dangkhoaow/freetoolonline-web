  <text x="90" y="54" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">ZIP</text>
  <rect x="170" y="28" width="140" height="40" rx="20" fill="#5B73AE" aria-hidden="true"/>
  <text x="240" y="54" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">PDF</text>
  <rect x="320" y="28" width="140" height="40" rx="20" fill="#5B73AE" aria-hidden="true"/>
  <text x="390" y="54" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">Image</text>
</svg>
