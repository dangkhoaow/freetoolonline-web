<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 480 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-formatchiprow-dfc237-title svg-formatchiprow-dfc237-desc">
  <title id="svg-formatchiprow-dfc237-title">Browse 100+ free tools by file type, action, or name</title>
  <desc id="svg-formatchiprow-dfc237-desc">Seven category hubs let you find tools by file type - ZIP, image, PDF, video. The site map lists tools by action. The home page search box finds any tool by name.</desc>
