<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 480 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-formatchiprow-e523cf-title svg-formatchiprow-e523cf-desc">
  <title id="svg-formatchiprow-e523cf-title">Image tools by task</title>
  <desc id="svg-formatchiprow-e523cf-desc">Compress, resize, and crop images in your browser - pick the tool that matches your task.</desc>
  <rect x="20" y="28" width="140" height="40" rx="20" fill="#5B73AE" aria-hidden="true"/>
  <text x="90" y="54" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">Compress</text>
  <rect x="170" y="28" width="140" height="40" rx="20" fill="#5B73AE" aria-hidden="true"/>
  <text x="240" y="54" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">Resize</text>
  <rect x="320" y="28" width="140" height="40" rx="20" fill="#5B73AE" aria-hidden="true"/>
  <text x="390" y="54" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">Crop</text>
</svg>
