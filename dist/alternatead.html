<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="robots" content="noindex, nofollow"/>
<link rel="canonical" href="https://freetoolonline.com/alternatead.html"/>
<title>Alternate Ad</title>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var url = params.get('url') || '';
  var img = params.get('img') || '';
  document.addEventListener('DOMContentLoaded', function(){
    document.body.innerHTML = '<a href="' + url.replaceAll('"', '&quot;') + '" target="_top"><img src="https://dkbg1jftzfsd2.cloudfront.net/image/ad/' + img.replaceAll('"', '&quot;') + '.jpg"/></a>';
  });
})();
</script>
</head>
<body></body>
</html>
